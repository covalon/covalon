  - sort: 400000
    name: 'Fey Courts Mission C: Fey Healer'
    type: text
    _id: nJWAMboNkCTOmYCF
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h3>Hook</h3><p>Some small harmless pranks have been reported throughout
        our camp. They're nothing insidious or damaging, but it's enough to be
        vexing. The feys' pranks are an attempt to prove non-hostility before
        requesting aid in helping their wounded allies. Adventurers are tasked
        with escorting the mischievous Fey to where their comrades are,
        identifying the problems with the injured and keeping them
        safe.</p><h3>Required Elements</h3><ol><li><p>The first encounter is
        <strong>moderate encounter</strong> along the way to where the injured
        Fey are hiding.</p></li><li><p>Next, the party must amass victory points
        to find and treat the fey. The guide can lead the party to the fey, but
        illusions hide the cave holding the wounded. The fey fell ill to metal
        poisoning while attempting to hide from the metallic invaders.</p><p>The
        players must overcome a series of skill challenges to treat the fey and
        ensure they remain unfound. This requires a <strong>#DC+2#</strong>
        check from each player. Each obstacle lasts for one round and requires 4
        Expediency points to be successfully overcome (3 points for groups of
        less than 6 players). If players amass enough Expediency points, the
        obstacle is quickly defeated, while failing an obstacle slows the
        party.</p><p>Record each obstacle the party successfully clears. The
        number of obstacles cleared determines what players learn and may
        increase the difficulty of the expedition's third <strong>moderate
        encounter.</strong></p><p><br /><strong>Critical Success </strong>The
        party gains 2 Expediency Points.<br /><strong>Success </strong>The party
        gains 1 Expediency Point.<br /><strong>Critical Failure </strong>The
        party loses 1 Expediency Point.</p><table><tbody><tr><td
        data-colwidth="448"><p>Climbing the Cliffs</p></td><td><p>Athletics,
        Nature, Survival</p></td></tr><tr><td data-colwidth="448"><p>Spotting
        the Protective Illusions</p></td><td><p>Perception, Survival,
        Arcana</p></td></tr><tr><td data-colwidth="448"><p>Identify the
        Problem</p></td><td><p>Crafting, Diplomacy,
        Medicine</p></td></tr><tr><td data-colwidth="448"><p>Stabilize the
        Wounds</p></td><td><p>Medicine, Nature,
        Thievery</p></td></tr></tbody></table></li><li><p>To complete the
        treatment, the party must defeat the patrol that wounded these fey and
        acquire their metal flesh in a <strong>moderate encounter with at least
        two creatures.</strong> Once this encounter is defeated, provide the
        party with information depending on how many obstacles they successfully
        overcame.</p><p><strong>4 Successes </strong>The party is expedient in
        their assistance of the injured. The fey inform the players the metal
        monsters emerged from a weird flesh pit in the palace and share the
        location of an entrance to the palace hidden behind a waterfall. The fey
        are healed enough to bolster their magics. They won't be found
        again.</p><p><strong>3 Successes </strong>The party gets a bit of
        information from the fey, who tell them the palace has an entrance
        hidden behind a waterfall. Warning from a nearby fey forces a hasty exit
        before the party can learn more, though the fey can hastily erect new
        defenses.</p><p><strong>2 or fewer Successes </strong>The party is too
        slow. The encounter in step 4 happens now and with an additional 40
        experience (30 for groups with less than 6 players), and the hostile
        creatures have access to the Cave-in! action.</p><p>Cave-in! (2
        actions)<br /><strong>Requirements</strong> the creature is adjacent to
        a wall.<br />The creature can trigger a partial collapse of the cave.
        This triggers a series of falling rocks and metals as magnetism rips
        them from the walls or ceiling of the hiding place. All non-metal
        creatures within the cave are required to roll a <strong>#Hazard 2-16
        HDC# </strong>basic Reflex save, dealing <strong>#Hazard 2-16 Complex
        Damage#.</strong></p><p>Once a creature uses Cave-in!, no other creature
        can use the activity until the end of the triggering creature's next
        turn.</p></li><li><p>If party learned the location of the palace's
        hidden entrance, the fey ask them to slay a nearby patrol to draw
        attention away from their hiding place. This <strong>moderate encounter
        </strong>occurs in the forest on the way back to
        camp.</p></li></ol><h3>Recommended Locations</h3><p>Cliffs or
        Waterfalls, Caves, Forest.</p><h3>Recommended Creatures</h3><p>Animals,
        Beasts, Elementals, Fey, Humanoids (all with the metal template if they
        lack the Metal trait already).</p><h3>Recommended Loot</h3><p>50% of the
        budget should be raw gold, while the remaining 50% should be items
        related to fey or metal. If the players achieved four successful events
        they earn bonus gold equal to 10% of the total treasure budget as the
        fey give them strange items from the First World.</p>
