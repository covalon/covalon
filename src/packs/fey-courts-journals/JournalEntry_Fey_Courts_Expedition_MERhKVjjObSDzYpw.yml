  - sort: 300000
    name: 'Fey Courts Mission B: Magnetism Breaker'
    type: text
    _id: KJpideCZq1EJrPrV
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h3>Hook</h3><p>A powerful magnetic field hinders our advance to the Fey
        Courts' castle! Another team is collects materials to develop
        countermeasures against its magnetism, and they need a diversion.
        Adventurers are to launch an assault against one of the four towers
        emitting the field. If they can destroy whatever its source is, all the
        better!</p><h3>Required Elements</h3><ol><li><p>Give the players
        catapult parts and two boulders during the briefing. <strong>Scene
        1</strong> consists of a series of skill checks to assemble, load, and
        fire the catapult at the tower. After the first shot, they must hop onto
        the second boulder and hurtle themselves toward the tower atop
        it.</p></li><li><p>Each party member is also given a glider, which they
        can use to escape <strong>Scene 2</strong> at <em>any point</em>, by
        spending an action while on the edge of the entrance. They can bring a
        willing, adjacent creature as they leave. During <strong>Scene
        2</strong>, players face multiple waves of enemies in the tower and must
        last until the alarm is rung.</p></li></ol><h3><strong>Scene 1: Dynamic
        Entry</strong></h3><p>The players must succeed at skill checks during
        each phase (see the below table) to accumulate Catapult
        Points.</p><p><strong>Critical Success</strong> The party gains 2
        Catapult Points.</p><p><strong>Success</strong> The party gains 1
        Catapult Point.</p><p><strong>Critical Failure</strong> The party loses
        1 Catapult Point.</p><ul><li><p>Once every player has attempted a check
        or used their actions in a given phase, move on to the next phase
        regardless of the number of Catapult Points.</p></li><li><p>You can let
        players come up with reasonable uses for their skills and reward
        creativity. Applicable skills for each phase are listed in case a player
        doesn't have any idea, and you can add more to this
        list.</p></li><li><p><span style="font-family:Signika,
        sans-serif">Alternatively, a player can gain three actions to use
        abilities to support their allies. </span>Particularly appropriate
        spells or abilities may allow a player to succeed or critically succeed
        without making a check, at your discretion.</p></li><li><p>Using the
        initiative tracker to see who has already acted is useful, but feel free
        to let players act in any order they want during each
        phase.</p></li></ul><table><tbody><tr><td
        data-colwidth="270"><p><strong>Phase</strong></p></td><td
        data-colwidth="289"><p><strong>Applicable
        Skills</strong></p></td></tr><tr><td
        data-colwidth="270"><p>Assembling</p></td><td
        data-colwidth="289"><p><strong>#DC-2#</strong> Crafting,
        <strong>#DC#</strong> Athletics, Survival, Thievery</p></td></tr><tr><td
        data-colwidth="270"><p>Loading</p></td><td
        data-colwidth="289"><p><strong>#DC#</strong> Athletics, Crafting,
        Thievery</p></td></tr><tr><td data-colwidth="270"><p>Aiming</p></td><td
        data-colwidth="289"><p><strong>#DC#</strong> Athletics, Crafting,
        Perception</p></td></tr><tr><td
        data-colwidth="270"><p>Shooting</p></td><td
        data-colwidth="289"><p><strong>#DC#</strong> Acrobatics, Performance
        (hyping up the character making the shot for example), <br />Simple
        Weapon ranged attack roll (to simplify this one, you can add a
        @Compendium[pf2e.equipment-srd.JNt7GmLCCVz5BiEI]{Javelin} to the
        players' sheets)</p></td></tr></tbody></table><ul><li><p>After the first
        boulder is shot and pierces the tower's wall, the last boulder is loaded
        and players hop on it. <em>One of them has to make the Final
        Shot</em>.</p></li><li><p><em>Final Shot</em> can be made using the
        skills used in the Shooting phase. However, how well was the catapult
        made is critical.</p></li><li><p>Subtract <strong>[Party Size x
        4]</strong> from the party's total Catapult Points. Players take an
        untyped penalty or bonus equal to the result on <em>Final Shot</em>
        checks.</p></li></ul><p><strong>Critical Success</strong> During the
        first round of Scene 2, the party is
        @Compendium[pf2e.conditionitems.nlCjDvLMf2EkV2dl]{Quickened}. They can
        use the extra action only to use an action with the <em>move</em>
        trait.</p><p><strong>Failure</strong> During the first round of Scene 2,
        the party is
        @Compendium[pf2e.conditionitems.AJh5ex99aV6VTggg]{Off-Guard}.</p><p><strong>Critical
        Failure</strong> As failure, and the party starts Scene 2
        @Compendium[pf2e.conditionitems.j91X7x0XSomq8d60]{Prone}.</p><h3><strong>Scene
        2: Struggle in the Tower</strong></h3><ul><li><p>The party makes an
        explosive entry atop their boulder. The fight starts immediately upon
        landing, and players cannot take exploration
        activities.</p></li><li><p>The room is filled with metal soldiers, and
        more keep coming from downstairs. For a party of 6 players, have a total
        of <strong>80 XP</strong> of creatures spread across at least
        <strong>3</strong> creatures. At the start of each round, if less than
        80 XP of creatures are alive, more creatures arrive.</p></li><li><p>In
        addition to those creatures, the encounter contains a Masked Core whose
        sheet is below.<br
        />@UUID[Compendium.covalon.fey-courts-actors.Actor.nZ3i7G4sD7ZGRDBf]{Masked
        Core}</p></li><li><p>Keep track of how many creatures are defeated. Once
        the players have defeated 240 XP worth of creatures, they hear an alarm
        being ring, which means their objective is
        complete.</p></li></ul><p><strong>Scene 2 for smaller party
        sizes</strong></p><ul><li><p>For parties of 5 players, spread <strong>70
        XP</strong> of creatures across at least <strong>3</strong> creatures.
        The alarm rings once 210 XP worth of creatures are
        defeated.</p></li><li><p>For parties of 4 players, spread <strong>60
        XP</strong> of creatures across at least <strong>2</strong> creatures.
        The alarm rings once 180 XP worth of creatures are
        defeated.</p></li></ul><h3><strong>Scene 3: Tactical
        Retreat</strong></h3><ul><li><p>Scene 3 starts once all players use
        their gliders to escape Scene 2. As they fly down toward their catapult,
        they see soldiers going after them on foot.</p></li><li><p>Players have
        10 minutes to use exploration activities before they hear soldiers
        closing in.</p></li><li><p>They then have the option to:<br
        /><strong>A:</strong> disassemble the catapult and escape with its
        parts; <br /><strong>B:</strong> stay and shoot down the advancing
        soldiers from their vantage point.</p></li></ul><h3><strong>Scene
        3A</strong></h3><ul><li><p>If the party decides to disassemble the
        catapult, use two <strong>Assemble</strong> phases from <strong>Scene
        1</strong>. The party needs <strong>[(Party Size - 1) x 2]</strong>
        Catapult Points by the end of the second phase to escape
        successfully.</p></li><li><p>If the party fails to escape, they enter a
        <strong>moderate combat encounter with </strong><em><strong>20
        additional XP</strong></em><strong> in its budget</strong>. The party
        can flee from this combat at any point, but they must leave the catapult
        behind to do so.</p></li></ul><h3><strong>Scene
        3B</strong></h3><ul><li><p>If the party decides to shoot down the
        soldiers, the process is almost identical to <strong>Scene 1</strong>.
        Use the below table for skill checks.</p></li></ul><table><tbody><tr><td
        data-colwidth="270"><p><strong>Phase</strong></p></td><td
        data-colwidth="289"><p><strong>Applicable
        Skills</strong></p></td></tr><tr><td data-colwidth="270"><p>Scavenging
        for ammunition</p></td><td
        data-colwidth="289"><p><strong>#DC-2#</strong> Survival,
        <strong>#DC#</strong> Nature, Perception, Thievery</p></td></tr><tr><td
        data-colwidth="270"><p>Loading</p></td><td
        data-colwidth="289"><p><strong>#DC#</strong> Athletics, Crafting,
        Thievery</p></td></tr><tr><td data-colwidth="270"><p>Aiming</p></td><td
        data-colwidth="289"><p><strong>#DC#</strong> Athletics, Crafting,
        Perception</p></td></tr><tr><td
        data-colwidth="270"><p>Shooting</p></td><td
        data-colwidth="289"><p><strong>#DC#</strong> Acrobatics, Performance,
        Simple Weapon ranged attack
        roll</p></td></tr></tbody></table><p>Depending on how many catapult
        points they accumulate, the party may enter a combat encounter during
        this Scene (see below). The party can from this combat at any point, but
        they must leave the catapult behind to do so.</p><table><tbody><tr><td
        data-colwidth="270"><p><strong>Catapult Points</strong></p></td><td
        data-colwidth="289"><p><strong>Outcome</strong></p></td></tr><tr><td
        data-colwidth="270"><p><strong>[Party Size]</strong> or less Catapult
        Points</p></td><td data-colwidth="289"><p>The party enters a moderate
        combat encounter with 20 additional XP in its
        budget.</p></td></tr><tr><td data-colwidth="270"><p><strong>[Party Size
        + 1]</strong> Catapult Points</p></td><td data-colwidth="289"><p>The
        party enters a moderate combat encounter.</p></td></tr><tr><td
        data-colwidth="270"><p><strong>[Party Size x 2]</strong> Catapult
        Points</p></td><td data-colwidth="289"><p>The party enters a moderate
        combat encounter. Enemies lose a quarter of their
        HP.</p></td></tr><tr><td data-colwidth="270"><p><strong>[Party Size x
        3]</strong> Catapult Points</p></td><td data-colwidth="289"><p>The party
        enters a moderate combat encounter. Enemies lose half of their
        HP.</p></td></tr><tr><td data-colwidth="270"><p><strong>[Party Size x
        4]</strong> or more Catapult Points</p></td><td
        data-colwidth="289"><p>The the enemy soldiers rout. The expedition is
        complete.</p></td></tr></tbody></table><h3>Recommended
        Locations</h3><p>For the catapult scenes: a forest of dead trees, a
        clearing, or even some wastelands.<br />For the tower scene, a map is
        provided in the module.</p><h3>Recommended Creatures</h3><p>Creatures
        with the metal trait; humanoids, fey, animals or beasts with the
        metal-blighted adjustment (see the Appendix 1: Creature Adjustments) who
        would reasonably work under the metal army; earth or electricity
        creatures switched to metal creatures.</p><h3>Recommended
        Loot</h3><p>The entirety of the treasure budget should be given out in
        raw GP. How well the party does during the expedition determines how
        much gold they receive.</p><table><tbody><tr><td
        data-colwidth="270"><p>Reached Scene 2</p></td><td
        data-colwidth="289"><p>25% of total treasure budget</p></td></tr><tr><td
        data-colwidth="270"><p>Reached Scene 2 and defeated 3
        creatures</p></td><td data-colwidth="289"><p>50% of total treasure
        budget</p></td></tr><tr><td data-colwidth="270"><p>Defeated more than 3
        creatures but left before the alarm rang</p></td><td
        data-colwidth="289"><p>75% of total treasure budget</p></td></tr><tr><td
        data-colwidth="270"><p>Ending Scene 2 after the alarm rang</p></td><td
        data-colwidth="289"><p>100% of total treasure
        budget</p></td></tr><tr><td data-colwidth="270"><p>Destroyed/Disabled
        the Masked Core during Scene 2</p><p>OR made the soldiers rout during
        Scene 3B</p></td><td data-colwidth="289"><p>+10% of total treasure
        budget (maximum 110%)</p></td></tr><tr><td
        data-colwidth="270"><p>Leaving the the catapult behind during Scene
        3</p></td><td data-colwidth="289"><p>-10% of total treasure
        budget</p></td></tr></tbody></table>
