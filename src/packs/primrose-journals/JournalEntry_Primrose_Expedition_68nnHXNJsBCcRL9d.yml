  - sort: 300000
    name: 'Primrose Mission C: Plunder the Tombs'
    type: text
    _id: gOLwseZADeDaqwBQ
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>by Acaelus Amaris</p><h3>Hook</h3><p>Duneveil's military forces are mostly composed of disposable undead warriors, with no shortage of them in sight. Covalon's contacts in the city have learned that these warriors come from the Necropolis District - a section of the city filled with tombs of bodies awaiting reanimation to serve the sultan, which are certain to be filled with valuable objects and magical equipment. The adventurers are tasked with raiding one of the tombs in the Necropolis District to preemptively destroy undead reinforcements and plunder anything that looks valuable or useful.</p><h3>Required Elements</h3><ol><li>All humanoid or beast creatures gain the undead trait and a weakness to positive damage equal to <strong>#Creature 2-8 Minimum#</strong>,</li><li>There must be 120 XP worth of hazards spread out across the adventure, and at least two of these hazards must be special hazards unique to this adventure (see: Necropolis Hazards).</li><li><p>Successfully disabling a special necropolis hazard rewards the PCs with a tomb key. If they players have two tomb keys, they can use them to unlock a chest in the tomb. (They can attempt to unlock the chest without both keys, but with a\_<strong>#DC +10#\_</strong>Thievery check; a critical failure prevents further attempts.) The chest contains an old grimoire that can be translated by a PC that can read Necril or with a successful <strong>#DC +5#\_</strong>Society check. The grimoire contains esoteric instructions for performing a ritual which can be understood by succeeding at a\_<strong>#DC +2#\_</strong>check with a skill that corresponds to the grimoire's tradition; roll [[/br 1d4]] to determine the grimoire's tradition.</p><ul><li><strong>Arcana\_</strong>The grimoire contains incomplete instructions on how to drain a soul to access more daily magic, similar to how wizards drain a bonded item.</li><li><strong>Occulitsm\_</strong>The grimoire contains incomplete instructions on how to infuse two souls within a single body.</li><li><strong>Nature\_</strong>The grimoire contains incomplete instructions on how to summon an earth elemental made of pure diamond.</li><li><strong>Religion\_</strong>The grimoire contains incomplete instructions on how to use crystals to preserve a soul, similar to how one would use herbs or magic to preserve a corpse.</li></ul></li></ol><h3>Necropolis Hazards</h3><p>Two of the hazards used in this adventure must come from the following list of special necropolis hazards. Each necropolis hazard is worth 40 XP (with the simple hazards being worth 8 XP each, but placed in groups of five), and upon successfully disabling a special necropolis hazard, the PCs will find a tomb key. (For simple hazards, the PCs must either disable or trigger all of the hazards of the same type in order to find a tomb key.) Tomb keys can only be found if the hazard is successfully disabled; destroying or running from the hazard will prevent the PCs from finding that hazard's tomb key.</p><p>The following hazards have disable and stealth DCs equal to\_<strong>#Hazard 2-13 High#</strong> with a profieciency requirement of <strong>#Hazard 2-14 Minimum Proficency Moderate#</strong>,\_or they can be destroyed using\_<strong>#Hazard 2-15 LAC#</strong>,\_<strong>#Hazard 2-15 Minimum Hardness#</strong>, and\_<strong>#Hazard 2-15 Maximum HP#</strong>.</p><p>For offense, simple hazards have an attack bonus of\_<strong>#Hazard 2-16 S. Atk#</strong> and deal\_<strong>#Hazard 2-16 Simple Dmg#</strong> damage while complex hazards have an attack bonus of <strong>#Hazard 2-16 C. Atk#</strong> and deal <strong>#Hazard 2-16 Complex Dmg#</strong> damage. For any DCs, both hazard types use a DC of\_<strong>#Hazard 2-16 HDC#</strong>.</p><table border=\"1\"><tbody><tr><td><h4><strong>Pillars of Fire</strong></h4><section><section class=\"traits\"><p>Complex</p><p>Evocation</p><p>Trap</p></section><p style=\"margin-top:0.5em\"><strong>Complexity\_</strong>Complex</p><p style=\"margin-top:0.5em\"><strong>Description\_</strong>Four crystals embedded into pillars around the room shoot beams of energy.</p><hr /><p style=\"margin-top:0.5em\"><strong>Disable</strong> Arcana, Thievery, or Religion on a crystal to cut off the crystal from its source of magic. Each disabled crystal reduces the hazard's actions by one, fully disabling the hazard when all four crystals are disabled.</p><p style=\"margin-top:var(--p-space,1em)\"><strong>Quadrangulate\_</strong><span class=\"pf2-icon\"><strong>r</strong></span>\_(attack);\_<strong style=\"margin-top:var(--p-space,1em)\">Trigger\_</strong>Four or more living creatures enter the room. <strong style=\"margin-top:var(--p-space,1em)\">Effect\_</strong>The hazard makes one energy beam Strike against up to four living creatures, then rolls initiative.</p><hr style=\"border-top:1px solid var(--color-border-light-primary);border-bottom:1px solid var(--color-border-light-highlight);margin-top:var(--p-space,1em)\" /><p style=\"margin-top:var(--p-space,1em)\"><strong>Routine\_</strong>(4 actions) The hazard makes an energy beam Strike against a living creature. The hazard does not take a multiple attack penalty, but each Strike must be against a different creature.</p><p style=\"margin-top:var(--p-space,1em)\"><strong>Ranged\_</strong>energy beam (range increment 30 feet), <strong style=\"margin-top:var(--p-space,1em)\">Damage\_</strong>fire damage, no multiple attack penalty</p></section></td></tr></tbody></table><p>\_</p><table style=\"font-family:var(--journal-serif);font-size:var(--font-size-14);width:94.0517%;height:603.594px\" border=\"1\"><tbody><tr style=\"height:603.594px\"><td style=\"width:100%;height:603.594px\"><h4><span style=\"font-family:var(--journal-serif)\">GRASPING GRAVES</span></h4><section><section class=\"traits\"><p><span style=\"font-family:var(--journal-serif)\">COMPLEX</span></p><p><span style=\"font-family:var(--journal-serif)\">HAUNT</span></p></section></section><p><span style=\"font-family:var(--journal-serif)\"><strong>Complexity\_</strong>Complex</span></p><p><span style=\"font-family:var(--journal-serif)\"><strong>Description\_</strong>Ghostly hands attempt to pull living creatures into three open sarcophagi.</span></p><hr /><p><span style=\"font-family:var(--journal-serif)\"><strong>Disable\_</strong>Crafting, Occultism, or Religion on a sarcophagus to exorcise the spirits in a sarcophagus. Each disabled sarcophagus reduces the hazard's actions by three, fully disabling the hazard when all three sarcophagi are disabled.</span></p><p><span style=\"font-family:var(--journal-serif)\"><strong>Lonely Coffins</strong>\_</span><span class=\"pf2-icon\"><span style=\"font-family:var(--journal-serif)\">r</span></span><span style=\"font-family:var(--journal-serif)\">\_<strong>Trigger\_</strong>Three or more living creatures of Large size or smaller enter the room. <strong>Effect\_</strong>The haunt attempts to grab up to three living creatures or Large size or smaller, then rolls initiative.</span></p><hr /><p><span style=\"font-family:var(--journal-serif)\"><strong>Routine\_</strong>(9 actions) Each sarcophagi gains three actions, which they will use to attempt to grab Strike a Large or smaller living creature within 90 feet. If they already have a creature grabbed, they will instead pull that creature 30 feet closer to the sarcophagus with each action. If a grabbed creature is pulled adjacent to the sarcophagus, the sarcophagus slams shut, trapping the grabbed creature inside and increasing the DC to Escape by 4. If a sarcophagus has a creature inside of it, it uses its actions to constrict that creature. A creature trapped inside a sarcophagus can be freed if a creature on the outside can make a successful Athletics check to Force Open against the hazard's normal DC. Successfully disabling a sarcophagus while a creature is trapped inside will prevent that sarcophagus from taking further actions, but the trapped creature will still need to free itself or be freed by an ally by Escaping or Forcing Open respectively.</span></p><p><span style=\"font-family:var(--journal-serif)\"><strong>Grapple\_</strong></span><span class=\"pf2-icon\"><span style=\"font-family:var(--journal-serif)\">1</span></span><span style=\"font-family:var(--journal-serif)\">\_90 foot maximum range, Athletics bonus is equal to attack bonus</span></p><p><span style=\"font-family:var(--journal-serif)\"><strong>Drag\_</strong></span><span class=\"pf2-icon\"><span style=\"font-family:var(--journal-serif)\">1</span></span><span style=\"font-family:var(--journal-serif)\">\_<strong>Requirements\_</strong>The sarcophagus has a creature grabbed.\_<strong>Effect\_</strong>The sarcophagus attempts to drag the creature. The creature attempts a Fortitude save. This is forced movement. If the creature is dragged adjacent to the sarcophagus, it becomes trapped inside, raising the DC to Escape by 4.</span></p><ul><li><span style=\"font-family:var(--journal-serif)\"><strong>Critical Success\_</strong>The sarcophagus fails to drag the creature.</span></li><li><span style=\"font-family:var(--journal-serif)\"><strong>Success\_</strong>The creature is dragged up to 15 feet towards the sarcophagus.</span></li><li><span style=\"font-family:var(--journal-serif)\"><strong>Failure\_</strong>The creature is dragged up to 30 feet towards the sarcophagus.</span></li><li><span style=\"font-family:var(--journal-serif)\"><strong>Critical Failure</strong>\_The creature is dragged up to 60 feet towards the sarcophagus.</span></li></ul><p><span style=\"font-family:var(--journal-serif)\"><strong>Constrict\_</strong></span><span class=\"pf2-icon\"><span style=\"font-family:var(--journal-serif)\">1</span></span><span style=\"font-family:var(--journal-serif)\">\_<strong>Requirements\_</strong>The sarcophagus has a creature trapped inside of it.\_<strong>Effect\_</strong>bludgeoning damage</span></p></td></tr></tbody></table><p>\_</p><table style=\"width:94.0517%;height:230.594px\" border=\"1\"><tbody><tr style=\"height:230.594px\"><td style=\"width:99.5775%;height:230.594px\"><h4>The Fury of the Desert</h4><section class=\"traits\"><p>Complex</p><p>Evocation</p><p>Trap</p></section><p><strong>Complexity\_</strong>Complex</p><p><strong>Description\_</strong>A staff begins to emit fire magic, making the room boiling hot.</p><hr /><p><strong>Disable </strong>Arcana, Nature, or Thievery to dislodge the staff from the floor and disrupt its magical energies; three total successes are needed to disable the hazard</p><p><strong>Sweltering Heat\_</strong><span class=\"pf2-icon\">r\_</span><strong>Trigger </strong>Living creatures enter the room.\_<strong>Effect\_</strong>The staff ignites the room with the heat of the desert. All living creatures in the room must succeed at a Fortitude save or be fatigued while they are in the room with the active staff, and for 10 minutes afterwards. Creatures that treat environmental heat effects as less extreme than normal automatically succeed at this save. The hazard then rolls initiative.</p><hr /><p><strong>Routine </strong>(1 action) The staff emits a pulse of heat. All living creatures in the room take fire damage with a basic Fortitude save. On a critical failure, a creature also increases their drained condition by 1.</p></td></tr></tbody></table><p>\_</p><table border=\"1\"><tbody><tr><td><h4>Concealed Spikes</h4><section class=\"traits\"><p>Mechanical</p><p>Trap</p></section><p><strong>Complexity\_</strong>Simple</p><p><strong>Description </strong>5 foot square tiles with sensitive pressure plates conceal dangerous spikes.</p><hr /><p><strong>Disable\_</strong>Crafting or Thievery to jam the pressure plate.</p><p><strong>Shish </strong><span class=\"pf2-icon\">r\_</span><strong>Trigger </strong>A creature steps onto a pressure plate. <strong>Effect </strong>The hazard makes a kebab strike against the triggering creature.</p><p><strong>Melee</strong> kebab,\_<strong>Damage\_</strong>piercing, and immobilizes target until they use an interact action to free themselves (this does not require a check)</p><p><strong>Special\_</strong>If this hazard is chosen, place five of them to meet the 40 XP requirement.</p></td></tr></tbody></table><p>\_</p><table style=\"height:30px;width:94.0517%\" border=\"1\"><tbody><tr><td style=\"width:99.5775%\"><h4>Snake-Filled Chutes</h4><section class=\"traits\"><p>Complex</p><p>Mechanical</p><p>Trap</p></section><p><strong>Complexity\_</strong>Complex</p><p><strong>Description\_</strong>Three chutes open from a 10 foot high ceiling, pouring skeletal snakes into the room.</p><hr /><p><strong>Disable </strong>Crafting, Nature, or Thievery to charm the snakes or jam a chute. One success must be made against each of the three chutes to disable the hazard.</p><p><strong>Why Did it Have to be Snakes? </strong><span class=\"pf2-icon\">r </span><strong>Trigger </strong>Living creatures enter the room.\_<strong>Effect\_</strong>The doors of the room slam shut and must be Forced Open with an Athletics check to open them while the hazard is in effect. The chutes in the ceiling open up, revealing the glowing eyes and hissing of the skeletal snakes. The hazard then rolls initiative.</p><hr /><p><strong>Routine </strong>(1 action) Skeletal snakes fall from the ceiling and bite all living creatures before scurrying away, exposing those creatures to skeletal snake venom.</p><p><strong>Skeletal Snake Venom</strong> (poison)\_<strong>Saving Throw\_</strong>Fortitude,\_<strong>Maximum Duration\_</strong>6 rounds;\_<strong>Stage 1\_</strong>poison damage (1 round); <strong>Stage 2\_</strong>poison damage (1 round); <strong>Stage 3\_</strong>poison damage (1 round)</p></td></tr></tbody></table><p>\_</p><table border=\"1\"><tbody><tr><td><h4>Soul-Crushing Pillars</h4><section class=\"traits\"><p>Conjuration</p><p>trap</p></section><p><strong>Complexity\_</strong>Simple</p><p><strong>Description </strong>An invisible pillar of force slams down onto 10-foot square from above.</p><hr /><p><strong>Disable </strong>Crafting or Thievery to destroy the targeting sigil</p><p><strong>Soul-Crusher </strong>\_<span class=\"pf2-icon\">r\_</span>(attack);\_<strong>Trigger\_</strong>A creature steps into a 10-foot square containing a targeting sigil.\_<strong>Effect\_</strong>The hazard drops an invisible pillar of force onto the targeting creature, making a force pillar Strike.</p><p><strong>Melee</strong> force pillar;\_<strong>Damage\_</strong>force, plus the target is knocked prone on a hit. Regardless of whether the Strike hits or misses, the target is shunted the nearest open 5-foot square and the squares occupying the targeting sigils become occupied by an invisible pillar of force, making them impassable.</p><p><strong>Special\_</strong>If this hazard is chosen, place five of them to meet the 40 XP requirement.</p></td></tr></tbody></table><h3>Recommended Locations</h3><p>Tombs, underground ruins, dungeons. Maps with branching hallways and non-linear paths work well for this adventure.</p><h3>Recommended Creatures</h3><p>Undead, with possibly a minor amount of elementals, constructs, geniekin, and beasts and animals (trained to be guard animals).</p><h3>Recommended Loot</h3><p>100% of the treasure budget should be awarded in the form of treasure and undead-themed equipment looted from the tomb (negative healing consumables, magic items with the necromancy trait, etc.) If the players sucessfully loot the grimoire from the locked tomb chest, translate the grimoire, and discover the meaning of the ritual instructions inside, they earn an Investigation Bonus in the form of raw gp equaling 10% of the total treasure budget.</p>"
