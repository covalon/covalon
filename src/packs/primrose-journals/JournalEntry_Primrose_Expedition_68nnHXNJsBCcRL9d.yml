  - sort: 400000
    name: Primrose Finale
    type: text
    _id: bjGqVXfD0wQ8rhhc
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<h2 style=\"box-sizing:border-box;user-select:text;border-bottom:1px solid var(--color-underline-header);color:#191813\">Saddam Syed, Sultan of the Sky\_</h2><h3>Hook</h3><p>Through shrewd diplomacy, cut-throat politics and beguiling manipulation the Covalon adventurers managed to gather enough allies in the Shahs of Primrose to stage an assault on the palace of the sultan. Despite their victory, however, the corrupting influence of the Maw remains a significant threat to the sapling housed in a secret chamber behind the statues. Luckily we have enough favour with the local Shahs to keep the fighting outside of the palace while we deal with this fresh fascimile!</p><h3>Assault on the Palace</h3><p>In an attempt to crush the growing sapling, the Maw has created a Facsimile of Saddam Syed, the Sultan of the Sky and has sent it to assault the palace and destroy the Seed of Terra. Covalon's scouts have determined that the attack will take place at any moment, so Covalon's finest must be ready to defend the sapling at all costs!\_</p><p>The PCs begin near the pillows in the centre of the room, with Saddam Syed starting at the southern entrance. Generally speaking, Saddam Syed prefers to walk upon the ground rather than fly and hover, but he will utilise his extended mobility to escape barriers and blockages he might find between him and his quarry. The encounter is more interesting when Saddam Syed does not need to spend actions hovering.\_</p><p>If the GM has not already done so, they should select one of the three Modifications to apply, or roll [[1d3]] to determine one randomly. Do not tell the players which modification is in effect prior to the session. For Hard Mode, use all three modifications.\_</p><p>The PCs are serving as guards for the sapling as part of this encounter, and do not have sufficient notice of exactly when the Facsimile of Saddam Syed will attack. They are unable to use items or abilities that grant short-term beneficial effects, though they can use anything that has a duration of at least 8 hours.</p><p>If the players need to escape from the encounter, they can do so by running out of the southern entrance.\_</p><h3 style=\"margin-top:var(--p-space,1em);width:643.891px;font-family:var(--sans-serif)\"><span style=\"font-family:var(--sans-serif)\">Tactics Overview</span></h3><p style=\"margin:0px auto;padding:0px;width:643.891px;color:#000000;font-family:Vollkorn, Eczar, Georgia, serif;font-size:14px\"><span style=\"font-family:Vollkorn, Eczar, Georgia, serif\">Saddam Syed is arrogant and self-righteous, but does not underestimate the party. He should be played intelligently, and use his abilities to their maximum effect where possible. As his health decreases, he should become more and more desperate for victory until he eventually uses\_<strong>Three Wishes</strong>.\_</span></p><p style=\"padding:0px;width:643.891px;color:#000000;font-family:Vollkorn, Eczar, Georgia, serif;font-size:14px;margin:var(--p-space,1em) auto 0px auto\"><span style=\"font-family:Vollkorn, Eczar, Georgia, serif\">The crystal elemental should make as much distance between itself and the party as possible and then throw rocks at them. You can hint that it is connected to Al-Kujani, but try not to give it away immediately.\_</span></p><p style=\"padding:0px;width:643.891px;color:#000000;font-family:Vollkorn, Eczar, Georgia, serif;font-size:14px;margin:var(--p-space,1em) auto 0px auto\"><span style=\"font-family:Vollkorn, Eczar, Georgia, serif\">Keep in mind that Saddam's\_<strong>Fist</strong>\_attack and\_<strong style=\"margin-top:var(--p-space,1em)\">Sudden Squall</strong>\_both have the Air trait, which triggers weakness from\_<strong style=\"margin-top:var(--p-space,1em)\">Return to Dust.</strong>\_</span></p><p style=\"padding:0px;width:643.891px;color:#000000;font-family:Vollkorn, Eczar, Georgia, serif;font-size:14px;margin:var(--p-space,1em) auto 0px auto\"><span style=\"font-family:Vollkorn, Eczar, Georgia, serif\">Al-Kujani should be unbothered by friendly fire on the water elemental from\_<strong>Vizier of Waves</strong>. It will be replaced anyway. Keep in mind also that after using <strong>Three Wishes</strong>, Al-Kujani gains some resistances!</span></p><p style=\"padding:0px;width:643.891px;color:#000000;font-family:Vollkorn, Eczar, Georgia, serif;font-size:14px;margin:var(--p-space,1em) auto 0px auto\"><span style=\"font-family:Vollkorn, Eczar, Georgia, serif\">You can more easily apply the effect of Elemental Form from <strong>Return To Dust</strong> by dragging from the Spell Effects Compendium.\_</span></p><h3 style=\"margin-top:var(--p-space,1em);width:643.891px;font-family:var(--sans-serif)\"><span style=\"font-family:var(--sans-serif)\">Loot</span></h3><p style=\"margin:0px auto;padding:0px;width:643.891px;color:#000000;font-family:Vollkorn, Eczar, Georgia, serif;font-size:14px\"><span style=\"color:#1c1c1c;font-size:15.6px\"><span style=\"font-family:Vollkorn, Eczar, Georgia, serif\">The entirety of the treasure budget is given out in raw GP, paid by the NPC used for the hook. Additionally, players unlock the ability to customize their Soul Seed, gaining access to the Air aspect.</span></span></p>"
