  - sort: 200000
    name: 'Primrose Mission B: Playing Politics'
    type: text
    _id: hA4UVcXTvyBhRDVZ
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>by Resh</p><h3>Hook</h3><p>Covalon's expeditionary force has made contact with some of the Shahs of the city and they've promised aid in exchange for favors. While it isn't entirely clear why they're assisting, they've helped adventurers sneak into the city and given them crucial information for navigating Duneveil. A Shah is now calling in a favor, and it would be unwise for the Covalonians to refuse.</p><h3>Required Elements</h3><ol><li>Servants belonging to one of the city's many Shahs smuggle the party into the city, through the streets and to their master's manor. An arrogant minor Shah (LE geniekin magus; see: Roleplaying the Shah) asks the party to recover documents from the home of a political rival and provides them with an explosive barrel for infiltration purposes (see: Noisy Infiltration).</li><li>The Shah instructs the party to use shaded alleys to reach the rival's residence and the sewers to escape the same. Choose to have the first encounter occur either during the alleys leading up to the manor or in the sewers afterwards. This accounts for one third of the adventure XP budget.</li><li>The players enter the rival's residence in the manner described in the Noisy Infiltration section and do combat with the rival's guards. This accounts for one third of the adventure XP Budget.</li><li>After their explosive entry, the players have a short window to rifle through documents. This chase scene\_accounts for a third of the adventure XP budget and determines whether the party learns a secret (see: Smash and Grab).</li></ol><h3>Roleplaying the Shah</h3><p>The Shah is a minor noble in Duneveil looking to elevate his status by using the PCs to undermine his rivals. The Shah used in this adventure can be a janni, djinni, shaitan, efreeti, or marid, and can be any gender (though this document uses a singular set of pronouns for clarity purposes).</p><p>The Shah is arrogant, and though he understands the advantages the party can procure, he considers them beneath his notice. The Shah tells the players of the route they will take to and from the rival's residence and provides them with an explosive barrel. He explains the barrel's nature but provides no other information, including about its safe activation, unless asked. Even then, he takes affront at the effort he must make and will answer only three questions, though adventurers can extract additional answers with a successful <strong>#DC+2# Diplomacy check</strong>.<strong>\_</strong></p><p>His answers to pertinent questions provide the players with useful information and/or mechanical effects used later in the adventure, as shown in the table below. If asked a separate question, he scoffs or gives benign information unrelated to the mission.</p><table style=\"width:94.1261%;height:194px\" border=\"1\"><tbody><tr><td style=\"width:16.6214%\"><p>Question</p></td><td style=\"width:48%\"><p>Information</p></td><td style=\"width:35.2621%\"><p>Effects</p></td></tr><tr style=\"height:54px\"><td style=\"width:16.6214%;height:54px\"><p>How do we use the barrel?</p></td><td style=\"width:48%;height:54px\"><p>The barrel can be safely activated with a successful Crafting check. Its explosion will heavily damage and stun creatures opposite an adjacent wall and damage nearby creatures.\_</p></td><td style=\"width:35.2621%\"><p>Players can activate the barrel with a <strong>#DC+2#</strong> Crafting check without first needing to succeed at a Perception check.</p></td></tr><tr style=\"height:20px\"><td style=\"width:16.6214%;height:20px\">How can we protect ourselves from the barrel's blast?</td><td style=\"width:48%;height:20px\">The PCs learn that they can use walls not adjacent to the barrel to Take Cover from the barrel's blast.</td><td style=\"width:35.2621%\">\_</td></tr><tr style=\"height:40px\"><td style=\"width:16.6214%;height:40px\">What documents are we looking for?</td><td style=\"width:48%;height:40px\">The PCs must seek ledgers, communications, and any other documents pertinent to the rival's business or political partners.</td><td style=\"width:35.2621%\">The DC for Perception checks to Search for Documents during the Smash and Grab chase scene decreases to <strong>#DC#</strong>.</td></tr><tr style=\"height:40px\"><td style=\"width:16.6214%;height:40px\">Where should we put the barrel/where are the guards?</td><td style=\"width:48%;height:40px\">The PCs learn the compass location of the bulk of the rival's guards relative to the rival's residence (e.g. The guards are in the manor's northeastermost room).</td><td style=\"width:35.2621%\">\_</td></tr><tr style=\"height:20px\"><td style=\"width:16.6214%;height:20px\">How is the manor guarded?</td><td style=\"width:48%;height:20px\">The PCs learn the rival is off conducting business and has taken most of the household guard with him. A small but threatening number remain on watch it in their absence.</td><td style=\"width:35.2621%\">\_</td></tr><tr style=\"height:20px\"><td style=\"width:16.6214%;height:20px\">What can you tell us about the rival's guards?</td><td style=\"width:48%;height:20px\">The PCs learn that some of the Shah's guards are susceptible to bribes.</td><td style=\"width:35.2621%\">Players not trained in Diplomacy can add their level to Diplomacy checks made during the \"The Guards Show Up Obstacle,\" and the DC non-Intimidation Charisma checks for that obstacle decreases to <strong>#DC-2#</strong></td></tr><tr><td style=\"width:16.6214%\">How should we escape from the rival's manor?</td><td style=\"width:48%\">The Shah provides more direct instructions for reaching the sewers.\_</td><td style=\"width:35.2621%\">The DCs of all checks for the \"Manhole Crawl\" obstacle decrease by 2.</td></tr></tbody></table><h3>Noisy Infiltration</h3><p>The rival's residence has been visibly fortified with magic and cannot be entered without the aid of the explosive barrel, which creates a hole in a wall of the manor with a powerful blast. Upon entry, the PCs face the rival's guards, most of whom will be grouped in a single room, in a combat encounter. The barrel and its effects do not impact the encounter experience budget, but if the players learn where\_</p><p>Unless the Shah told the party of the\_safest activation method, they must attempt a <span style=\"margin-top:var(--p-space,1em)\">blind </span><strong style=\"margin-top:var(--p-space,1em)\">#DC+5#</strong><span style=\"margin-top:var(--p-space,1em)\"> Perception\_</span>check to learn the safest way to explode the barrel. On a success, they learn an adjacent<span style=\"font-family:var(--journal-serif)\"> creature can attempt to safely activate the Explosive Barrel with a\_<strong style=\"font-family:var(--journal-serif)\">#DC+2# </strong>Crafting check\_with the effects described below.</span> Players who fail the Perception check still learn how to detonate the bomb, but the crafting DC to activate it safely increases to <strong>#DC+5#.\_</strong>The barrel will also be activated immediately if it takes any amount of fire damage, as if a Crafting check to activate it had criticall failed.</p><ul><li><strong>Critical Success </strong>As success, but the players get a +2 circumstance bonus to their Reflex save against the blast. If they already had a circumstance bonus from cover, it increases to +4.</li><li><strong>Success </strong>The barrel activates after a delay. The activating player can benefit from cover.</li><li><strong>Failure </strong>The barrel activates after a shorter-than-expected delay. Players take a -2 circumstance penalty to their Reflex save against the blast. The activating player cannot benefit from cover against the blast.</li><li><strong>Critical Failure</strong> The barrel activates immediately. Players take a -2 circumstance penalty to their save against the blast. The blast's damage against the activating player increases to <strong>#Hazard 2-16 Simple Damage#</strong>.</li></ul><p>Creatures on the other side of a wall that is adjacent to the barrel take <span style=\"font-family:var(--journal-serif)\"><strong style=\"font-family:var(--journal-serif);font-size:var(--font-size-14);margin-top:var(--p-space,1em)\">#Hazard 2-16 Simple Damage#\_</strong>bludgeoning damage with a\_<strong style=\"font-family:var(--journal-serif);font-size:var(--font-size-14)\">#DC+2#</strong> basic Reflex save. Creatures who fail this saving throw are stunned 1, or stunned 2 on a critical failure.</span></p><p>Player characters t<span style=\"font-family:var(--journal-serif)\">ake\_<strong style=\"font-family:var(--journal-serif);font-size:var(--font-size-14);margin-top:var(--p-space,1em)\">#Hazard 2-16 Complex Damage#\_</strong>split equally between bludgeoning and sonic damage with a <strong style=\"font-family:var(--journal-serif);font-size:var(--font-size-14)\">#DC+1#</strong> basic Reflex save. Players who fail this saving throw are deafened for one round, or one minute on a critical failure. Players benefitting from cover against the barrel gain a +2 circumstance bonus to their save as normal.</span></p><p>Combat with the rival's guards begins immediately after the barrel explodes. After the combat encounter concludes, players have time to spend three actions before the Smash and Grab chase scene begins.</p><h3>Smash and Grab</h3><p>The information sought by the PCs can be found on the second floor of the rival's residence, but the blast has destabilized the structure, and it won't be long before the second floor crumbles. The party has little time to comb through papers before the entire second floor collapses.</p><p>This non-combat encounter functions like a chase scene, with some minor changes. One obstacle will present itself per round, and players must obtain enouch chase points to clear the obstacle by the end of the round. If they don't, they take <strong>#Hazard 2-16 Complex Damage#</strong> at the end of the round. If there are less than 6 players in the party, reduce the amount of required Chase Points for each obstacle by 1 for each missing party member.</p><p>At any time during the chase, players can make <span style=\"font-family:var(--journal-serif)\"><strong style=\"font-family:var(--journal-serif)\">#DC+2# </strong></span>P<span style=\"font-family:var(--journal-serif)\">erception or <strong>#DC#</strong> Society checks to Search for Documents, securing one document on a success, two on a critical success, and losing one on a critical failute. Inform the players of this option at the outset of the chase. They must carefully balance obtaining chase points with recovering as many documents as possible, and their success in finding documents dictates whether they learn valuable information from the Shah.</span></p><hr /><h5>The Cracked Steps</h5><p><strong>Round</strong> 1; <strong>Chase Points</strong> 4; <strong>Overcome\_</strong>Athletics <strong>#DC+2#\_</strong>to hoist allies up,\_Acrobatics\_<strong>#DC#</strong> to hop up broken steps</p><p>The stairs to the second floor were damaged by the blast, impeding the PCs' progress.</p><hr /><h5>Dust From Above</h5><p><strong>Round </strong>2; <strong>Chase Points </strong>6; <strong>Overcome\_</strong>Fortitude\_<strong>#DC+3#</strong> or Survival\_<span style=\"font-family:var(--journal-serif)\"><strong style=\"font-family:var(--journal-serif);font-size:var(--font-size-14)\">#DC-2#</strong></span> <span style=\"font-family:var(--journal-serif)\">to endure it, Arcana or Nature\_<strong>#DC#</strong> to clear the air with magic</span></p><p><span style=\"font-family:var(--journal-serif)\">The roof begins to splinter and crack, sending a hail of blinding, choking dust onto the party.</span></p><hr /><h5>The wind blows in</h5><p><strong>Round </strong>3; <strong>Chase Points </strong>4; <strong>Overcome\_</strong>Crafting or Thievery\_<strong>#DC+2#\_</strong>to patch the cracks, Perception\_<strong>#DC+3#</strong> to point out pages borne by the wind</p><p><span style=\"font-family:var(--journal-serif)\">A gale tears in between the growing split in the roof, sending papers flying.</span></p><hr /><h5>The Guards Show Up</h5><p><strong>Round </strong>4; <strong>Chase Points </strong>4; <strong>Overcome </strong>Deception, Diplomacy, or Performance <strong>#DC#</strong> to stall the guards, Intimidation <strong>#DC+4#</strong> to frighten them</p><p><span style=\"font-family:var(--journal-serif)\">The city guards have questions about the explosion.</span></p><hr /><h5>Things Get Tense</h5><p><strong>Round </strong>5; <strong>Chase Points </strong>4; <strong>Overcome\_</strong>Religion\_<strong>#DC+2#</strong> to admonish their actions, ranged or spell attack\_<strong>#DC+3#</strong> to\_fight them back</p><p><span style=\"font-family:var(--journal-serif)\">The guards begin to storm the crumbling manor.</span></p><hr /><h5>The Floor gives way</h5><p><strong>Round </strong>6; <strong>Chase Points </strong>3; <strong>Overcome\_</strong>Reflex save\_<strong>#DC+1#</strong> to form a chain with your allies</p><p><span style=\"font-family:var(--journal-serif)\">The floor begins to give way, threatening to send the players tumbling down with it.</span></p><hr /><h5>The Entire Building Goes</h5><p><strong>Round </strong>7; <strong>Chase Points </strong>Special; <strong>Overcome </strong>Special</p><p><span style=\"font-family:var(--journal-serif)\">The building collapses. On their turn, each player must make a <strong>#DC-2# </strong>basic Reflex Save or take <strong>#Hazard 2-16 Complex Damage#</strong>. There is no additional damage at the end of this round.</span></p><hr /><h5>Manhole Crawl</h5><p><strong>Round </strong>8; <strong>Chase Points </strong>3; <strong>Overcome\_</strong>Stealth\_<strong>#DC#</strong> to hide among the dust, Nature or Occultism <strong>#DC+1#</strong> to magically blend in with the dust, Medicine\_<strong>#DC+3#</strong> to help allies</p><p>The rubble and papers continue to fall. Now's the time to escape, but there's one last shot at some information.</p><p><span style=\"font-family:var(--journal-serif)\">The chase ends with the players diving into the sewers as rubble chokes the entry shut. It will take a long time for the guards to excavate the manhole, so the players have plenty of time to patch their wounds before continuing on.</span></p><h3><span style=\"font-family:var(--journal-serif)\">Recommended Locations</span></h3><p><span style=\"font-family:var(--journal-serif)\">City alleys, city manor, house, or fortress, city sewers.</span></p><h3><span style=\"font-family:var(--journal-serif)\">Recommended Creatures</span></h3><p><span style=\"font-family:var(--journal-serif)\">Elementals, undead, construct, geniekin, beasts and animals (trained to be guard animals).</span></p><p>Guards belonging to the Shah's rival should match the rival's genie heritage and/or its accompanying elemental trait, which should be chosen (randomly or otherwise) from janni, efreeti, djinni, marid, or shaitan.</p><h3><span style=\"font-family:var(--journal-serif)\">Recommended Loot</span></h3><p><span style=\"font-family:var(--journal-serif)\">50% of the total treasure budget should be in the form of fire, water, earth, air, and geniekin-themed equipment (such as elemental gems, spellhearts, scrolls or wands of applicable spells, etc.). At the end of the adventure, the Shah pays the PCs additional gp based on how many times they successfully Searched for Documents during the chase sequence:</span></p><ul><li><span style=\"font-family:var(--journal-serif)\"><strong>3 or less successes</strong> The PCs receive 40% of the treasure budget in gp.</span></li><li><span style=\"font-family:var(--journal-serif)\"><strong>4 - 6 successes </strong>The PCs receive 50% of the treasure budget in gp.</span></li><li><p><span style=\"font-family:var(--journal-serif)\"><strong>7 or more successes</strong> The PCs receive 60% of the treasure budget in gp, and the Shah shares a rumor\_ about Duneveil's sultan with the party. The rumor that the Shah shares is depdendent on the rival's genie type:</span></p><ul><li><strong>Janni\_</strong>\"The sultan's true name is Saddam Syed. Before he usurped the throne of Duneveil, he was a Shah and adherant of Kujani in Primrose.\"</li><li><strong>Djinni\_</strong>\"The sultan of Duneveil protects himself with dust gales that whip into frenzies while he's in danger, obscuring him from flurries of attacks.\"</li><li><strong>Efreeti\_</strong>\"The sultan of Duneveil has been training to conjure great storms of wind and fire, but he has not yet learned to steer them properly.\"</li><li><strong>Marid\_</strong>\"Hastily-drawn summoning runes have been appearing in the sultan's palace, more akin to leaks of elemental energy than proper conjuration circles.\"</li><li><strong>Shaitan\_</strong>\"A servant from the sultan's palace contracted a peculiar affliction. It's a contagious limb-stiffening condition, but rather than spreading upon contact with another individual, the entire condition seems to jump bodies.\"</li></ul></li></ul>"
