  - sort: 100000
    name: 'Primrose Mission A: Siege the Walls'
    type: text
    _id: tdEOgFxUlRK10r5s
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>by Acaelus Amaris</p><h3>Hook</h3><p>We have aquired some loose alliances with some of the Shahs insided the city who have provided us a way in, but we need to keep our entry to the city masked. Adventurers will be tasked with sieging the walls of Duneveil and providing a distraction\_ so that our secret channels into the city will not be discovered. Adventurers will need to reach the city walls while under fire from siege equipment and scale the walls, before making their way down the ramparts, facing off against more guards, before finally ending up in a guard tower or gatehouse.</p><h3>Required Elements</h3><ol><li>The first combat encounter takes place while the PCs are approaching the city's walls, with the enemies being on top of the walls. The walls are 40 feet tall and have ballista emplacements on the ramparts, that if manned deal <span style=\"font-family:var(--journal-serif)\"><strong style=\"font-family:var(--journal-serif);font-size:var(--font-size-14)\">#Hazard 2-16 Complex Damage#</strong> \_with\_<strong style=\"font-family:var(--journal-serif);font-size:var(--font-size-14);margin-top:var(--p-space,1em)\">#Hazard 2-16 C. Atk#</strong></span>. A creature may use a ballista, using a single action to load, and a single action to fire, and they have range increments of 120 feet. The ballista can pivot, but can not be aimed at anything on the wall. This does not affect the experience budget. Players must start at least 60 feet away from the walls.</li><li>Magic ladders will be provided to the PCs for the first encounter which can be carried in one hand. While held, they are light bulk, but they can be Activated by placing them on the ground and speaking a command word (one action with the manipulate and concentrate traits) to cause them to extend 40 feet high. Attempting to Climb a ladder results in an automatic success. Otherwise, the wall is a <strong>#DC+2#</strong> Athletics check.</li><li>The second encounter should take place on the ramparts or in a guard tower. The third encounter should take place in a guard tower, barracks, or similar structure.</li><li>After the third encounter, PCs will be able to Search the building for information, finding either a criminal record or a confiscated child's book. The PCs can find this with a successful <strong>#DC+2#</strong> Perception or related lore (i.e. Acadedmia). If they find the document provide them with one of the following:</li></ol><table style=\"width:94.0146%;height:171px\" border=\"1\"><tbody><tr style=\"height:76px\"><td style=\"width:47.2251%;height:76px\">Criminal Ledger</td><td style=\"width:52.6218%;height:76px\">This ledger documents how several rebellious Shahs were executed through a process referred to as 'Returning to Dust', in which their bodies were sublimated into clouds of sand.</td></tr><tr style=\"height:95px\"><td style=\"width:47.2251%;height:95px\">Child's Book</td><td style=\"width:52.6218%;height:95px\">The story book is about the search for a mysterious city in the dunes. The city is refered to as a 'Mirage City' as it was visible from far away but anyone nearing it would have a sandstorm suddenly whip up, preventing them from being able to find the city.</td></tr></tbody></table><p>\_</p><h3>Recommended Locations</h3><p>City walls, ramparts, towers, gatehouses, barracks. Avoid maps that go too far into a city, as the goal of this mission is to cause commotion on the outside walls.</p><h3>Recommended Creatures</h3><p>Elementals, undead, constructs, geniekin, beasts and animals (trained to be guard animals). For the first encounter, it is recommended to use creatures with ranged attacks and/or spellcasting.</p><h3>Recommended Loot</h3><p>50% of the budget should be raw gp and art objects looted from the guards or the guard buildings, while the other 50% should be made up of items related to dangerous contraband (poisons, bombs, scrolls or wands containing destructive spells, drugs, etc.). If the players learn a secret from the book or ledger, they earn an Investigation Bonus in the form of raw gp equalling 10% of the total treasure budget.</p>"
