  - sort: 300000
    name: 'Whitespire Mission B: Fire the Forges'
    type: text
    _id: GaVay6nYwTz3ULhP
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h2>Hook</h2><p>Our scouts have recovered a strange metal of myth said
        to be stronger than adamantine when properly processed. We need you to
        bring a cart full of it to ancient dwarven forges in the catacombs
        below. Problem is, the deeper tunnels are full of concentrated
        petrification gas. We've devised an enchantment that should protect you,
        as long as you stay close enough to the minecart.</p><h2>Required
        Elements</h2><p>The party must escort a cart full of metal ore to an
        ancient forge (Scene 1), process it at the forge (Scene 2), and then
        escort the materials back to our camp (Scene 3). Scenes 1 and 3 take
        place entirely within the Stonewyrm’s Breath environmental hazard,
        detailed below.</p><blockquote><p><span
        style="text-decoration:underline"><em><strong><span
        style="text-decoration:underline">Stonewyrm’s
        Breath</span></strong></em></span></p><p>[Environmental][Primal][Magical][Poison]</p><p><em>Poisonous
        gas wells up from the bottom of the catacombs. Creatures that end their
        turn within the area of the hazard must attempt a <strong>#DC#</strong>
        Fortitude Save or become
        @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 1}. If the
        creature was already Slowed, its Slowed value instead increases by 1 on
        a failed save. If a creature becomes unable to act due to the slowed
        condition from this effect, it becomes permanently
        @UUID[Compendium.pf2e.conditionitems.dTwPJuKgBQCMxixg]{Petrified}. A
        creature’s Slowed condition reduces by 1 each time it ends its turn
        outside the hazard’s area.</em></p><p><em>Stonewyrm’s Breath is a
        magical effect that cannot be counteracted. Spells or other abilities
        that would cleanse the air (such as Cleanse Air) have their durations
        reduced to 1 round. Effects that provide breathable air (such as an
        Everair Mask) do not protect from Stonewyrm’s Breath - this deep in the
        catacombs, it is not an inhaled effect.</em></p></blockquote><p>Scenes 1
        and 3 use an Automagical Mine Cart (AMC) and one of the provided maps
        for this mission. The AMC begins positioned at one end of the track on
        the battlemap. If the AMC would reach the end of the track and go off
        the map, the players beat the encounter and escape. Enemies do not
        specifically target the AMC, though you can include it in AOE effects.
        Use the provided AMC stat block in the expedition compendium for the
        tier of your adventure.</p><p><strong>Note:</strong> If a player is
        petrified during this mission, you should let the party recover their
        corpse and bring them back to Covalon for recovery.</p><h3>Scene 1:
        Descent (Moderate Combat)</h3><p>The players descend into the catacombs,
        following old minecart tracks to the ancient forges of Whitespire. As
        they traverse the tunnels, they face <strong>one moderate combat
        encounter</strong> on one of the provided battlemaps for this
        mission.</p><p>Feel free to pick any of the maps, but be mindful of tier
        appropriate terrain (don't use lava in Tier 1!). Players must fight
        monsters while staying within the protective area of the minecart, or be
        petrified by Stonewyrm's Breath.</p><p>Avoid using monsters that reduce
        player actions (by inflicting Slowed or Stunned), using exclusively
        ranged monsters that don’t get close to the cart, or monsters with a
        high capability to move players around (such as gogiteths), or dragging
        players extreme distances into the Stonewyrm’s Breath. This mission is
        supposed to be fun, and petrification is a VERY scary condition. Play
        fair!</p><h3>Scene 2: The Forge (Skill Challenge)</h3><p>Players arrive
        at an ancient, underground forge, but must work together to process the
        metals they brought. Each PC can attempt a check to Overcome the
        obstacles below once, gaining 2 Forge Points on a Critical Success, one
        Forge Point on a Success, or losing one Forge Point on a Critical
        Failure.</p><p>The DC for all checks is <strong>#DC#</strong>. Each
        obstacle has a Failure effect; this effect occurs is the party does not
        gain at least <strong>#Party Size/2 rounded up#</strong> Forge Points on
        that particular obstacle.</p><p>Be flexible in what skills you allow,
        and adjust the DC as you see fit for thematic use of spells, abilities,
        or applicable lores. This skill challenge takes place over a larger
        period of time than a normal combat (~20 minutes or more per
        obstacle).</p><blockquote><h4><span
        style="text-decoration:underline"><em><strong><span
        style="text-decoration:underline">Gain
        Access</span></strong></em></span></h4><p><em>The stone doors of the
        forge are large and imposing, locked with ancient
        enchantments.</em></p><p><em><strong>Example Skills:</strong> Athletics
        or Thievery to physically force open the door, Magical Tradition skills
        to work through the runes, Dispel Magic, Spells that manipulate earth
        such as Shape Stone or Passwall,
        explosives.</em></p><p><em><strong>Failure:</strong> The doors are
        opened, but the forge sustains damage from the attempts. All future
        checks in this challenge take a -1 item penalty.</em></p><hr /><p><span
        style="text-decoration:underline"><em><strong><span
        style="text-decoration:underline">Study and
        Prepare</span></strong></em></span></p><p><em>The forge is dusty and
        long forgotten, constructed in a fashion so ancient as to be almost
        alien. You’ll need to get your bearings and make a plan before you get
        to work. PCs that can read Dwarven gain a +1 Circumstance Bonus to
        Overcome this Obstacle. Increase this to +2 for PCs that can read both
        Dwarven and Petran.</em></p><p><em><strong>Example Skills:</strong>
        Society or Crafting to examine old instructional runes, Perception to
        find useful equipment, Occultism to commune with lingering spirits,
        Spells that restore or organize information such as Quick Sort or
        Forgotten Lines</em></p><p><em><strong>Failure:</strong> The PCs only
        have a rough understanding of how the forge works. All future checks in
        this challenge take a -1 circumstance penalty.</em></p><hr /><p><span
        style="text-decoration:underline"><em><strong><span
        style="text-decoration:underline">Fire the
        Forge</span></strong></em></span></p><p><em>You’ll need to light the
        furnaces and keep the fire fueled to smelt your
        metals.</em></p><p><em><strong>Example Skills:</strong> Athletics or
        Crafting to hand pump the bellows, Spells that conjure materials to use
        as fuel such as Protector Tree or Creation, Fire abilities to light the
        furnaces, Air abilities to control the
        temperature</em></p><p><em><strong>Failure:</strong> Sweltering heat
        overpowers the forge. All PCs must succeed at a <strong>#DC+2#</strong>
        Fortitude save or become
        @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained 1}.
        (Drained 1 and
        @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled 1} for
        as long as they are drained in Tiers 4 and 5).</em></p><hr /><p><span
        style="text-decoration:underline"><em><strong><span
        style="text-decoration:underline">Shaping and
        Finishing</span></strong></em></span></p><p><em>The molten ores must be
        carefully imbued with magic, poured into ingot molds, and quenched to
        set them.</em></p><p><em><strong>Example skills:</strong> Crafting,
        Thievery or Acrobatics to pour with a steady hand, Any magic tradition
        to activate the runic enchantments, Spells that manipulate metal, Water
        or cold spells to cool and set the
        ingots</em></p><p><em><strong>Failure:</strong> Processing the ore takes
        much longer than expected. More enemies prowl the tunnels - during the
        encounter in Scene 3, add an extra 40 exp of enemies (30 exp for 5 PC
        parties, or 20 exp for 4 PC parties).</em></p></blockquote><h3>Scene 3:
        Ascent (Moderate Combat)</h3><p>The PCs must escort their freshly
        smelted metals back up the minecart tracks to camp. This encounter uses
        the same parameters as Scene 1. The combat may be slightly over Moderate
        EXP value if the party failed in the Shaping and Finishing step of Scene
        2.</p><p>You do not have to use the same battlemap you picked for Scene
        One, the players can be attacked in a different section of the minecart
        tracks.</p><h2>Recommended Locations</h2><p>Scenes 1 and 3 take place on
        one of the provided battlemaps. Scene 2 does not require a battlemap,
        and takes place within an ancient underground forge.</p><h2>Recommended
        Creatures</h2><p>Dragon trait creatures, Elementals, Undead, Animals,
        Beasts, or Aberrations that live underground. All creatures used are
        immune to the Stonewyrm's Breath effect.</p><h2>Recommended
        Loot</h2><p>The entire loot budget is rewarded in gold, based on how
        many total Forge Points were earned during Scene Two.</p><p>If the party
        gains enough Forge Points to get 110% gold value, they also discover a
        set of stone tablets depicting a fantastical tale of the founding clans
        of Whitespire fighting a massive serpentine dragon larger than the
        mountain itself. In this artistic rendition, dwarven warriors fight to
        keep hold of weapons that are melting under some incredible
        heat.</p><table><tbody><tr><td><p></p></td><td><p>90% Gold
        Value</p></td><td><p>100% Gold Value</p></td><td><p>110% Gold
        Value</p></td></tr><tr><td><p>Party of 4</p></td><td><p>7 or less Forge
        Points</p></td><td><p>8-11 Forge Points</p></td><td><p>12 or more Forge
        Points</p></td></tr><tr><td><p>Party of 5</p></td><td><p>10 or less
        Forge Points</p></td><td><p>11-14 Forge Points</p></td><td><p>15 or more
        Forge Points</p></td></tr><tr><td><p>Party of 6</p></td><td><p>13 or
        less Forge Points</p></td><td><p>14-17 Forge Points</p></td><td><p>18 or
        more Forge Points</p></td></tr></tbody></table><h2>Credits</h2><p>Thank
        you to Komainu for providing maps for this mission!</p>
