  - sort: 200000
    name: 'Whitespire Mission A: Explore the Catacombs'
    type: text
    _id: J6QcykZCrTiwgwsr
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h2>Hook</h2><p>If we’re to face a beast from legend, knowledge is key.
        We need you to delve down into the catacombs below Whitespire. These
        tunnels are ancient, and our best bet at learning this thing’s
        weaknesses. Stay alert for danger, and bring back anything useful you
        find.</p><h2>Required Elements</h2><p>As the players explore the
        twisting catacombs below Whitespire, they face <strong>three moderate
        combat encounters.</strong> During the adventure, you must use at least
        one simple and one complex hazard from the lists below.</p><p>Hazard
        stat blocks are provided in the Whitespire Actors folder. and their
        level can be adjusted with the Adjust Level dropdown. Do not run any
        hazards at a level more than APL+1. After the third encounter, the party
        finds <strong>one Discovery.</strong></p><p><strong>Simple
        Hazards:</strong> Despondent Spirit, Earthen Maw, Stonewyrm's
        Gasp</p><p><strong>Complex Hazards</strong>: Manic Miners, Wrath of the
        Mountain, Stonewyrm's Exhalations</p><h3>Discoveries</h3><p>Pick one
        discovery from the list below for your players to find after completing
        the third combat encounter. Each player can attempt a
        <strong>#DC#</strong> skill check using one of the listed skills (or
        another skill or ability, at your discretion) to investigate.</p><p>The
        player gains +2 Victory Points (VP) on a critical success, +1 VP on a
        success, or -1 VP on a critical failure. If the group earns at least
        <strong>#(Party Size/2)+1#</strong> (round up) VP, they successfully
        investigate that discovery and learn the information in the Success
        entry.</p><table><tbody><tr><td
        data-colwidth="123"><p><strong>Name</strong></p></td><td><p><strong>Description</strong></p></td><td><p><strong>Skills</strong></p></td><td><p><strong>Success</strong></p></td><td><p><strong>Failure</strong></p></td></tr><tr><td
        data-colwidth="123"><p>Petrified Dwarf</p></td><td><p>A petrified
        dwarven survivor from Whitespire, long trapped in the catacombs but
        miraculously still in one solid stone piece.</p></td><td><p>If the party
        can cure petrification, they succeed at this Discovery. Otherwise, they
        will need to carefully carry back the petrified corpse without
        shattering it.</p><p>Athletics to carry it, Survival or Perception to
        chart the easiest path, Acrobatics or Thievery to balance the body
        through tight passages, levitation based magic, etc</p></td><td><p>If
        the survivor is unpetrified (your Portal Guide can do this if the party
        can't), they thank the party profusely for the rescue, and promise to
        assist in taking back Whitespire from the draconic hordes. They share
        what they experienced during the fall of Whitespire. A horde of crazed
        draconic beasts with purple and red veins around their eyes chased them
        into the tunnels below, where they inhaled a strange gas and ended up
        petrified.</p></td><td><p>Disaster strikes - the petrified corpse is
        dropped and shatters into too many pieces to
        restore.</p></td></tr><tr><td data-colwidth="123"><p>Ancient Mine
        Cart</p></td><td><p>A minecraft with several raw chunks of a strange
        metal inside it, there are clear signs of claw marks and intentional
        destruction of the cart but the chunks of ore are
        untouched.</p></td><td><p>Crafting, Society, Mining/Metal/Dwarf lore to
        carefully handle the ore and identify it</p></td><td><p>This ore is a
        special alloy unique to Whitespire. When properly forged, it could be
        stronger than adamantine. In its current state, the metal is extremely
        fragile. It looks like this cart was specifically designed to carry this
        ore. The party can bring the ore back to our camp for further
        study.</p></td><td><p>The ore is surprisingly fragile, and a mishap
        causes the entire supply to crumble to dust. No information can be
        gained from the destroyed ore.</p></td></tr><tr><td
        data-colwidth="123"><p>Abandoned Settlement</p></td><td><p>A section of
        caverns that were clearly recently inhabited (within the last few years,
        post Cataclysm). Empty stone structures and fire rings are splashed with
        old, dried blood. Deep gouges of varying sizes are etched deep into the
        walls and floors, and old scorch marks.</p></td><td><p>Medicine,
        Society, Survival, Kobold Lore, Perception, Arcana, Nature, Magics that
        reveal past events such as Retrocognition, Forgotten Lines, Speak With
        Stones, or the Consult the Spirits skill feat.</p></td><td><p>These
        caverns were recently occupied by a small tribe of kobolds. There are no
        signs of an outsider attacking, instead, it appears that the kobolds
        were somehow mutated into a much larger, more dangerous draconic form,
        and they attacked each other, though no bodies were left
        behind.</p></td><td><p>Though the party can deduce a group of
        approximately a dozen kobolds lived here within the past year or so,
        whatever happened to them is a mystery. Some kind of animal attack,
        perhaps.</p></td></tr><tr><td data-colwidth="123"><p>Giant
        Scale</p></td><td><p>A strange metal is stuck partially out of the stone
        cavern wall.</p></td><td><p>Crafting, Thievery, Survival, Dragon Lore,
        or Metal/Ore/Mining Lore to investigate and unearth more of the
        scale</p></td><td><p>The metal is actually a gigantic, 50 bulk scale,
        over a foot thick and 6 feet tall. The material is organic and draconic
        in nature, and larger than any draconic creature the party can think of.
        The scale itself is harder than adamantine, nearly impervious to
        damage.</p></td><td><p>The party is unable to safely unearth the scale,
        and misidentifies it as a vein of normal
        adamantine.</p></td></tr><tr><td data-colwidth="123"><p>Burial
        Site</p></td><td><p>Deep within the catacombs, the party finds a hidden
        burial chamber. The tombs are decorated with complex murals that depict
        the stories and deeds of those buried within.</p></td><td><p>Society,
        Performance (to recall knowledge about Dwarven art and oral histories),
        Dwarf/Whitespire/Funeral lores, Spells such as Speak with Dead or other
        abilities that allow communication with spirits.</p></td><td><p>This
        tomb holds dwarves from one of the founding clans of Whitespire. The
        murals depict a combat against an ancient serpentine dragon larger than
        mountains. Together, the clans subdued the creature and imprisoned it
        deep underground, where it is shown slumbering, never to be seen
        again.</p></td><td><p>The murals depict some kind of battle, but the
        details have been worn away and lost to time.</p></td></tr><tr><td
        data-colwidth="123"><p>Research Lab</p></td><td><p>A hidden laboratory,
        with recent signs of life dating after the Cataclysm. Journals and notes
        (in Dwarven) and alchemical and magical experiments are scattered
        messily throughout the area.</p></td><td><p>Perception, Society,
        Crafting, Arcana, Nature, Dragon/Poison Lore</p></td><td><p>Whoever was
        using this lab was studying the petrification gas that plagues the
        catacombs below Whitespire. The gas is organic in composition, and
        extremely potent. Even at small concentrations, it can cause
        petrification with a long enough exposure time. At higher
        concentrations, petrification is much faster, and can petrify with mere
        contact, not just inhalation. The gas gets more concentrated with depth
        in the catacombs.</p></td><td><p>The ravings of a half crazed scientist
        are too difficult to decipher in a reasonable amount of time. The party
        can bring back materials to camp for further study, but they learn no
        information during the
        mission.</p></td></tr></tbody></table><h2>Recommended
        Locations</h2><p>Underground ruins, caverns, catacombs, underground
        rivers or lakes.</p><h2>Recommended Creatures</h2><p>Dragon trait
        creatures, Elementals, Undead, Animals, Beasts, or Aberrations that live
        underground. Classic “dungeon” creatures such as oozes or
        ropers.</p><h2>Recommended Loot</h2><p>The entire loot budget is
        flavored as treasure found in the catacombs. Up to 50% can be given as
        items; dwarven, earth, metal, or fire themed items are particularly
        appropriate.</p><p>If the party successfully investigates their
        Discovery, they gain a 10% loot bonus as gold.</p><p></p>
