  - sort: 700000
    name: 'Appendix A: Stonewyrm Touched Adjustment'
    type: text
    _id: KupYdNi2kMVj5fIj
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>The
        @UUID[Compendium.covalon.whitespire-items.Item.EUxtFqlkTTeEPKzs]{Stonewyrm
        Touched} Adjustment can be applied to dragons, animals, beasts,
        elementals, or undead in Whitespire Expedition
        missions.</p><ul><li><p>Add the Dragon trait.</p></li><li><p>Add
        Darkvision.</p></li><li><p>If the creature speaks any languages, add
        Draconic.</p></li><li><p>Add the
        @UUID[Compendium.covalon.whitespire-items.Item.vgC3BXsQFeqO3fQg]{Curse
        of the Stonewyrm}, adjusted for tier, as detailed
        below.</p></li><li><p>The creature should act crazed, and visually look
        Maw influenced; purpleish eyes, purple red veins, purple red haze to any
        magical effects, etc.</p></li></ul><p><strong>Curse of the
        Stonewyrm</strong></p><p><em>[Curse][Primal][Magical][Earth]</em></p><p>When this
        creature is slain, the creature that landed the killing blow must
        succeed at a <strong>#2-11 Moderate DC#</strong> Will Save or have their
        body partially turned to stone. This has the effects detailed below,
        based on tier. The curse lasts until removed.</p><p><em>Tiers 1-3:</em>
        The creature becomes Enfeebled 1 or Clumsy 1 (GM’s Choice, both on a
        critical failure). If a creature would be subjected to a second instance
        of this curse, they gain the other condition. Further exposures have no
        effect.</p><p><em>Tiers 4-5:</em> The creature becomes Enfeebled 1,
        Clumsy 1, or Drained 1 (GM’s Choice). If a creature would be subjected
        to further instances of this curse, the effect increases. The value of
        the condition inflicted by this curse goes up by 1, to a maximum of 2.
        Further exposures would inflict the other conditions, and then increase
        that new condition. A critical failure increases the chosen condition by
        2, to a maximum of 2.</p>
