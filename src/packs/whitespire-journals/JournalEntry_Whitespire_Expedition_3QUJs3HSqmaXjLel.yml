  - sort: 400000
    name: 'Whitespire Mission C: Wardstone Defenders'
    type: text
    _id: xGy5IrMlWm2bQMNo
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h2>Hook</h2><p>Scouts have spotted a draconic horde headed our way! Our
        base is defended by a circle of ancient dwarven wardstones. We need you
        to get out there and make sure the barrier holds. Do
        <strong>not</strong> let the dragons destroy the
        wardstones!</p><h2>Required Elements</h2><p>Players face up to
        <strong>three waves of moderate combats</strong> on the same battlemap,
        defending a pair of Dwarven Wardstones. The party can only take ten
        minutes of exploration activities before the first encounter, and then
        ten minutes between each subsequent encounter. Increase this to 30
        minutes in Tiers 1, 2, and 3.</p><p>Players may set traps or cast spells
        that manipulate terrain during this time, but may not cast pre-buffing
        spells with a duration shorter than ten minutes (such as Haste). Whether
        or not PCs can use other pre-buffs and how much time is remaining on
        those buffs when they roll initiative is at GM discretion.</p><p>Every
        creature used in this mission must have the
        @UUID[Compendium.covalon.whitespire-items.Item.EUxtFqlkTTeEPKzs]{Stonewyrm
        Touched} Adjustment from Appendix A, and has the
        @UUID[Compendium.covalon.whitespire-items.Item.LSaaqMuNBFgPl478]{Stonewyrm's
        Ire} action.</p><h3>Wardstones</h3><p>Place two
        @UUID[Compendium.covalon.whitespire-actors.Actor.OaCG5pCECXJiwuzi]{Runic
        Wardstones} on your battlemap, a distance apart equal to ~1.5 Strides
        from the slowest PC in your party. This should be about 35 feet in lower
        tiers, but could be up to 75 feet in higher tiers with Tailwind,
        Clockwork Heels, Boots of Bounding, etc. Your battlemap will need to be
        bigger in higher tiers.</p><p>Each wardstone is surrounded by a
        defensive aura. PCs (and other allied creatures) in the aura are
        affected by Benediction. All monsters have the
        @UUID[Compendium.covalon.whitespire-items.Item.LSaaqMuNBFgPl478]{Stonewyrm's
        Ire} action, and completing this ability is their primary goal.
        Wardstones have 3 total hit points, can only take damage from
        @UUID[Compendium.covalon.whitespire-items.Item.LSaaqMuNBFgPl478]{Stonewyrm's
        Ire}, and cannot be healed.</p><p>If a Wardstone is destroyed, any PCs
        (or allied pets/summons etc) in the Wardstone’s aura are affected by
        Malediction instead of Benediction.</p><p>If both Wardstones are
        destroyed, the mission fails, and draconic creatures are able to attack
        our basecamp. Finish the current encounter and then send the party back
        to camp, where they arrive just in time to see the Dungeoneering Society
        finish off the last of invading monsters. The camp sustains structural
        damage and some Dungeoneering Society workers and local Dwarves are
        injured.</p><h2>Recommended Locations</h2><p>All encounters take place
        on the same map. Caves or cave entrances, city ruins, rocky mountains,
        craggy plains, etc.</p><h2>Recommended Creatures</h2><p>Dragon,
        elemental, animal, or beast trait creatures with the
        @UUID[Compendium.covalon.whitespire-items.Item.EUxtFqlkTTeEPKzs]{Stonewyrm
        Touched} Adjustment from Appendix A. All monsters also have the
        @UUID[Compendium.covalon.whitespire-items.Item.LSaaqMuNBFgPl478]{Stonewyrm's
        Ire} ability.</p><p>Please use several different types of monsters for
        variety. This mission works best when the creatures are around the same
        level as the PCs (APL -1, +0, or +1).</p><h2>Recommended Loot</h2><p>The
        entire budget is granted in gold, paid by the portal guide. If both
        Wardstones are destroyed, the party only gains 80% of the total reward.
        If one Wardstone stands, they gain 100%.</p><p>If both Wardstones stand,
        they gain 110% of the budget and are able to investigate the corpses of
        some of the monsters they killed. They learn that some of these
        creatures were not originally draconic at all - something has corrupted
        and is controlling these beasts, turning them into linnorms!</p>
