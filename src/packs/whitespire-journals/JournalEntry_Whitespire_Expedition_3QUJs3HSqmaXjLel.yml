  - sort: 600000
    name: Whitespire Finale
    type: text
    _id: h5nFgW3sFigqDOmp
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h2>Hook</h2><ul><li><p><strong>Opening Weekend: </strong>"We've done it
        - the Den Mother drill is reinforced with specialized alloys capable of
        drilling into the lair of the ancient draconic beast that slumbers below
        Whitespire. Slay the Stonewyrm, and free Whitespire from the Maw's
        corruption!"</p></li><li><p><strong>Facsimiles:</strong> "The Maw stirs
        beneath the mountain. We need heroes to take care of this foul imitation
        of the ancient beast below."</p></li></ul><h2>Set
        Up</h2><ul><li><p>Place the <strong>Stonewyrm</strong> centered at the
        far north end of the
        @UUID[Compendium.covalon.whitespire-scenes.XjI7Ep4rMvFYBIrV]{Stonewrought
        Den}, and the <strong>Den Mother</strong> centered at the far south end,
        in the middle of the player spawn box.</p></li><li><p>If the PCs decide
        to flee the encounter, they can do so by returning to the spawn box at
        the far south of the map, or escaping off the left or right edges of the
        map.</p></li><li><p>You'll also need the <strong>Geokinetic
        Mastery</strong> hazard sheet. You can place this token off the map. It
        is not a typical hazard, it instead represents the ongoing environmental
        effects conjured by the Stonewyrm. It cannot be
        disabled.</p></li><li><p>Remember to elite or weak the Stonewyrm if your
        group is higher or lower than middle of tier APL, and set
        <strong>Geokinetic Mastery</strong> sheet's Level dropdown to your
        APL.</p></li><li><p>PCs can only precast buffs with a duration of
        <strong>8 hours or more</strong>.</p></li><li><p>To begin the encounter,
        describe how they follow the drill deep underground, and eventually
        drill through a thick metal shell into the Stonewyrm's
        lair.</p><blockquote><p>You follow the Den Mother deep underground, the
        massive drill grinding through earth until it eventually breaches a
        thick metal shell, bringing you directly into the Stonewyrm's coiled
        lair.</p></blockquote></li><li><p>The Stonewyrm's lair is surrounded by
        the Stonewyrm's massive coils, and players can only target the beast's
        head (its token).</p></li></ul><h2>Phase 1: Combat
        Begins</h2><ul><li><p>During combat, the Stonewyrm's <strong>Geokinetic
        Mastery </strong>always takes its turn just before the Stonewyrm.
        Creatures cannot delay or be moved between the two in
        initiative.</p><ul><li><p>This hazard has four different effects. You
        must use one per turn, and cycle through all four before repeating
        any.</p></li></ul></li><li><p>The Stonewyrm will open combat with
        <strong>Mythic Heat Metal </strong>or <strong>Poisonous
        Exhalation</strong> (once the PCs have moved into
        range).</p></li><li><p>The Stonewyrm's <strong>Earthen Spike</strong>
        attacks can reach the entire arena, and it's an intelligent foe that
        will save its <strong>Reactive Strike</strong> for higher impact
        abilities such as spellcasting or Battle Medicine.</p></li><li><p>Use
        <strong>Raise Cliffs </strong>to block line of sight, split up the
        party, and force movement as much as you can. This ability intentionally
        only summons three walls (so you can only make three walls of a box),
        but you <strong>can</strong> potentially trap PCs using the walls of the
        arena.</p></li><li><p>If the Stonewyrm gets stuck in an ongoing AOE or
        fails a nasty CC spell, use <strong>Resilience of Mountains </strong>to
        counteract it.</p></li><li><p>This phase probably won't be particularly
        difficult for most parties, and that's okay! The real challenge comes
        when they think they've killed it - and it won't
        die.</p></li></ul><h2>Phase 2: Maw Frenzy</h2><ul><li><p>The first time
        the Stonewyrm would be reduced to 0 HP, it instead triggers
        <strong>Mawtouched Lifeforce. </strong>Follow the steps in that ability
        to set up Phase 2.</p><ul><li><p>Explicitly tell the players they need
        to use the drill to kill the Stonewyrm when you add the
        <strong>@UUID[Compendium.covalon.whitespire-items.Item.B1qFNjfOX1dACQpL]{Power
        the Den Mother}</strong> action to their sheets, as it can't die by any
        other means.</p></li></ul></li><li><p>This phase is all about the PCs
        successfully driving the drill into the Stonewyrm before they wither
        away from the wyrm's death curse.</p></li><li><p>The Stonewyrm should
        use <strong>Raise Cliffs </strong>every turn to conjure walls between
        itself and the Den Mother.</p></li><li><p>It will also want to use
        <strong>Death Throes </strong>every turn to rack up stages of its Curse
        of Decay on the PCs.</p></li><li><p>You can allow players to
        <strong>@UUID[Compendium.pf2e.actionspf2e.HCl3pzVefiv9ZKQW]{Aid}</strong>
        checks to
        <strong>@UUID[Compendium.covalon.whitespire-items.Item.B1qFNjfOX1dACQpL]{Power
        the Den Mother}</strong> with Athletics or movement based abilities, but
        the drill itself is immune to all forced movement and
        teleportation.</p></li><li><p>When the <strong>Den Mother</strong>
        reaches the <strong>Stonewyrm</strong>, it immediately dies, ending the
        combat.</p></li></ul><h2>Modifications</h2><ul><li><p><strong>Obsidian
        Spikes</strong>: The walls conjured by <strong>Raise Cliffs </strong>are
        covered in dangerous spikes and have increased HP (see
        @UUID[Compendium.covalon.whitespire-actors.1S5SJtiUINUpn3wy]{Raise
        Cliffs Wall (T4)} and
        @UUID[Compendium.covalon.whitespire-actors.l91OUJoZNtny9F7U]{Raise
        Cliffs Wall (T5)}). If a creature deals damage to a wall from within 10
        feet, the spikes automatically deal piercing damage back to the creature
        equal to the wall's hardness.</p></li><li><p><strong>Greater Death
        Curse: </strong>The Stonewyrm's <strong>Curse of Decay</strong> is much
        more potent. Use the <strong>Curse of Greater Decay</strong>
        instead.</p></li><li><p><strong>Geokinetic Legend: </strong>The earthen
        battlefield effects are more dangerous. Use the upgraded
        <strong>Geokinetic Legend</strong> routine in the hazard's stat block
        instead of the base routine.</p></li></ul><h2>Loot</h2><p>The entirety
        of the treasure budget is given as raw gold, paid by your NPC Portal
        Guide. Additionally, players unlock the <a
        href="https://2e.aonprd.com/Relics.aspx?Aspect=20">Forge aspect</a> for
        their Soul Seed.</p><h2>Credits</h2><p>Thank you to Ateia for art
        assistance with the Stonewyrm's lair map! Thank you to our Campaign
        Designers (Ateia, Resh, Reginald-8, Night, and Broken Arrow) for
        assistance with playtesting this finale.</p>
