    value: >-
      <p><strong>Trigger</strong> Lich Faltyr would fall below 1 HP.</p>

      <hr />

      <p><strong>Effect</strong> Lich Faltyr instantly teleports to an active
      soul cage, shattering it in the process. The soul cage's destroyed effect
      instantly activates (even if the soul cage was disabled), Lich Faltyr
      regains [[/r (36)[void]]] HP, and the remnant energy of the soul cage
      energizes Lich Faltyr as if he had used the Channel Energy action.</p>
