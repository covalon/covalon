name: Ghostly Visage | Tier 3
type: action
effects: []
system:
  description:
    gm: ''
    value: >-
      <p dir="ltr"><strong>Trigger</strong> Lich Faltyr is targeted by a ranged
      strike.</p>

      <hr />

      <p dir="ltr"><strong>Effect</strong> Lich Faltyr waves a hand over his
      face revealing a ghostly mask. Each enemy must succeed at a
      @Check[type:Reflex|dc:26|name:Ghostly Visage] save to avert their gaze or
      find that a mask has formed on their face as well.</p>

      <p><strong id="docs-internal-guid-170b8fb6-7fff-d7ca-73b7-2ee4bf34fea1">
      Critical Success </strong>The creature is unaffected.<strong
      id="docs-internal-guid-170b8fb6-7fff-d7ca-73b7-2ee4bf34fea1"><br />Success
      </strong>The creature is
      @UUID[Compendium.pf2e.conditionitems.Item.TkIyaNPgTZFBCCuh]{Dazzled} for 1
      round.<strong
      id="docs-internal-guid-170b8fb6-7fff-d7ca-73b7-2ee4bf34fea1"><br />Failure
      </strong>The creature is
      @UUID[Compendium.pf2e.conditionitems.Item.XgEqL1kFApUbl5Z2]{Blinded} for 1
      round.<strong
      id="docs-internal-guid-170b8fb6-7fff-d7ca-73b7-2ee4bf34fea1"><br
      />Critical Failure </strong>The creature is
      @UUID[Compendium.pf2e.conditionitems.Item.XgEqL1kFApUbl5Z2]{Blinded} for 1
      round and
      @UUID[Compendium.pf2e.conditionitems.Item.TkIyaNPgTZFBCCuh]{Dazzled} for 1
      minute.</p>
