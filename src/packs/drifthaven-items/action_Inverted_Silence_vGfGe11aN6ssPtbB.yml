system:
  description:
    gm: ''
    value: >-
      <p><strong>Trigger</strong> A creature further than 20 ft would cast a
      spell or activate an ability with the Linguistic or Auditory trait.</p>

      <hr />

      <p><strong>Effect</strong> Lich Faltyr raises a boney finger and beckons
      the creature to come closer. Lich Faltyr silences the room, causing all
      creatures to be affected by
      @UUID[Compendium.pf2e.spells-srd.Item.gIdDLrbswTV3OBJy]{Silence}, except
      for Lich Faltyr and any creature within a
      @Template[type:emanation|distance:20]{20-foot} emanation of him until the
      end of the triggering creature’s next turn. Silenced creatures that enter
      the emanation stop being affected by Silence, and creatures that leave the
      emanation resume to be silenced.</p>
