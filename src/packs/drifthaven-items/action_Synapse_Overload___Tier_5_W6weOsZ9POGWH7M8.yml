    value: >-
      <p><strong>Trigger</strong> A creature ends a move action within 10 ft of
      Lich Faltyr.</p>

      <hr />

      <p><strong>Effect</strong> Lich Faltyr sends a mental blast in a wave that
      assaults all enemies in the area. Each enemy in a
      @Template[type:emanation|distance:30]{30-foot} emanation must succeed at a
      @Check[type:will|dc:34|name:Synapse Overload] save and suffer the
      following effects.</p>

      <p><br /><strong>Critical Success</strong> The creature is unaffected.<br
      /><strong>Success</strong> The creature is
      @UUID[Compendium.pf2e.conditionitems.Item.dfCMdR4wnpbYNTix]{Stunned 1}
      1.<br /><strong>Failure</strong> The creature is
      @UUID[Compendium.pf2e.conditionitems.Item.dfCMdR4wnpbYNTix]{Stunned 1}
      2.<br /><strong>Critical Failure</strong> The creature is
      @UUID[Compendium.pf2e.conditionitems.Item.dfCMdR4wnpbYNTix]{Stunned 1} for
      1 round.</p>
