ne-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-0fbe3e4e-7fff-e816-eebc-b6e0b95c8d78\">---------------------------</strong></span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Resistances </strong>Kirmona has a disdain for alchemy and science. The DC for attempts to influence them is increased by 2 if those topics are brought up, or the person talking to them openly carries such things.\_</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Weaknesses </strong>Kirmona likes powerful magic. If a spellcaster expends a spell of the highest level a full spellcaster of the APL of the party could cast as part of an attempt to Influence, the DC is reduced by 2.\_</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Background </strong>Kirmona commands magical forces for the devil army. They spend most of their time researching magical spells, and they keep an extensive personal library.\_</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Appearance </strong>Kirmona wears fine wizardly robes and carries themself with grace and pride.\_</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Personality </strong>Sly, studious, bookish, cunning</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"text-decoration:underline\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-0fbe3e4e-7fff-e816-eebc-b6e0b95c8d78\"><span style=\"text-decoration:underline\">General Alphys the Artful</span></strong></span></span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-0fbe3e4e-7fff-e816-eebc-b6e0b95c8d78\">[LE] [Medium] [Devil] [Fiend]</strong></span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><em><strong style=\"font-weight:normal\" id=\"docs-internal-guid-0fbe3e4e-7fff-e816-eebc-b6e0b95c8d78\">Male Ferrugon (Rust Devil) Crafting Contingent Commander, talented blacksmith</strong></em></span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Perception</strong> +#Creature[2-2][Low]</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Will</strong> +#Creature[2-6][Moderate]</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Discovery</strong> #DC-2# Crafting, #DC# Society or Perception, #DC+2# Religion</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Influence Skills</strong> #DC-5# Cooking or Baking Lore, #DC# Crafting, #DC+2# Intimidation, #DC+5# Deception, Diplomacy</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Influence 3: </strong>1 item from Table 1: Gossip</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Influence 6: </strong>1 item from Table 2: Hints\_</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-0fbe3e4e-7fff-e816-eebc-b6e0b95c8d78\">---------------------------</strong></span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Resistances </strong>Alphys is self conscious about his work. Any character that insults his work (even accidentally) takes a -5 circumstance penalty to all attempts to Influence him.\_</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Weaknesses </strong>Alphys has secretly always enjoyed baking. Crafting checks to Influence him have their DC reduced by 2 if the influencer is discussing baking.\_</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Background </strong>Alphys runs the forges that keep the devil army supplied. He usually keeps to himself and hates social events. He's very self conscious about rusting things accidentally.\_</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Appearance </strong>Alphys wears rusty plate armor and gets sweaty when he's nervous.\_</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Personality </strong>Gruff, introverted, nervous</span></p></td></tr></tbody></table></div><p></p><div dir=\"ltr\" style=\"margin-left:0pt\"><table style=\"border:none;border-collapse:collapse\"><tbody><tr style=\"height:21pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\" colspan=\"2\"><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Arial\"><strong>Table 1: Gossip</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">1</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">Everyone knows Holgoth's strength is because of certain enhancements he's fond of using. Alchemical, magical, he'll dope on anything.\_</span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">2</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">The blacksmiths say that they found a huge pile of rusted baking sheets outside of Alphys's quarters. Who knows what he was using all that for.\_</span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">3</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">Sevara broke up with her on again, off again boyfriend again last week. Apparently he didn't take good enough care of his feathers.</span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">4</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">Everyone says Kirmona is a terrible boss. They caught one of their mages working on some kind of alchemical potion last week and expelled them from the magical forces division on the spot!\_</span></p></td></tr></tbody></table></div><p></p><div dir=\"ltr\" style=\"margin-left:0pt\"><table style=\"border:none;border-collapse:collapse\"><tbody><tr style=\"height:21pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\" colspan=\"2\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Arial\"><strong>Table 2: Hints</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">1</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">Joe got in trouble with the boss again, this time he didn't get out without some serious evil-damage burns. The big boss's mojo is so powerful even devils are afraid of her.\_</span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">2</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">Kathy tried to steal a piece of the big boss's contract on a dare. The guards whisper that for a second, the big boss seemed a little panicked about it. Before Kathy got smashed right back into Hell by her wrath, of course.\_</span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">3</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">The big boss has been in a lot of meetings recently about the angels. I heard she's still refusing to negotiate with their forces commander.\_I think they're on the brink of a proper showdown!</span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">4</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">I heard a scout say they were in a skirmish and the angel's commander showed up. Before he hacked the heads off our platoon, he forced them all to kneel. Can you believe that! We'll show that overgrown glowing chicken who's boss soon.</span></p></td></tr></tbody></table></div><p><strong style=\"font-weight:normal\" id=\"docs-internal-guid-0fbe3e4e-7fff-e816-eebc-b6e0b95c8d78\"><br /></strong></p><p></p>"
