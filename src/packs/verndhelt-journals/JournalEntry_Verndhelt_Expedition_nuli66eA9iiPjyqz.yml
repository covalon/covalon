  - sort: 700000
    name: 'Verndhelt Appendix 1: Creature Adjustments'
    type: text
    _id: QWWOwesAkDd04Eay
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h3>Limited Stat Blocks</h3><p>As the number of true Angel and Devil
        stat blocks are limited, you may wish to use other types of stat blocks
        to represent angel and devil forces. Feel free to use other types of
        celestials or fiends reflavored to be angels and devils, or apply the
        adjustments below to other types of creatures. These adjustments are
        meant to represent humanoids, animals, or beasts touched by planar
        energy.</p><h3>Angel-touched Adjustment</h3><ul><li><p>Add the Celestial
        trait</p></li><li><p>Add the Celestial language if the creature is
        intelligent and can speak</p></li><li><p>Change the creature's alignment
        to LG</p></li><li><p>The creature gains Darkvision</p></li><li><p>The
        creature gains a weakness to Evil damage equal to
        #Creature[2-8][Minimum]. It gains three times that much
        HP.</p></li><li><p>In Tier 1 and 2, add 1 point of flat Good damage to
        all the creature's strikes. In Tier 3 or higher, add 1d6 Good damage too
        all the creature's strikes.</p></li><li><p>If the creature is at least
        level 7, it gains a Fly speed of 20 feet. The creature must end its turn
        on solid ground or it falls, unless it had a fly speed before applying
        this adjustment.</p></li></ul><h3>Devil-touched
        Adjustment</h3><ul><li><p>Add the Fiend
        trait</p></li></ul><ul><li><p>Add the Infernal language if the creature
        is intelligent and can speak</p></li><li><p>Change the creature's
        alignment to LE</p></li><li><p>The creature gains
        Darkvision</p></li><li><p>The creature gains Telepathy (30
        feet)</p></li><li><p>The creature gains a weakness to Good damage equal
        to #Creature[2-8][Minimum]. It gains resistance to Fire damage equal to
        the same amount.</p></li><li><p>In Tier 1 and 2, add 1 point of flat
        Evil damage to all the creature's strikes. In Tier 3 or higher, add 1d6
        Evil damage too all the creature's strikes.</p></li><li><p>If the
        creature is at least level 7, it gains an innate at-will 4th level
        dimension door. If the creature is at least level 9, it also gains one
        innate 5th level dimension door.</p><p></p></li></ul>
