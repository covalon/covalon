  - sort: 500000
    name: 'Verndhelt Mission B: Influence Encounter Guide'
    type: text
    _id: qCWyiK403ilhJEmC
    title:
      show: true
      level: 2
    image: {}
    text:
      format: 1
      content: "<h3 dir=\"ltr\" style=\"line-height:1.38;margin-top:16pt;margin-bottom:4pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-e170779c-7fff-02be-b17a-a4692cffe28e\">Influence Encounters</strong></span></h3><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-e170779c-7fff-02be-b17a-a4692cffe28e\">Influence is a sub-system where PCs gain Influence Points during a social encounter to get to a goal. In this encounter, your party of Covalonians is attempting to chat up devil generals to learn information about the devil’s plans, while keeping Covalon’s involvement a secret.\_</strong></span></p><h3 dir=\"ltr\" style=\"line-height:1.38;margin-top:16pt;margin-bottom:4pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-e170779c-7fff-02be-b17a-a4692cffe28e\">On Your Turn</strong></span></h3><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-bdd555db-7fff-286a-0490-8eeff85d1b24\">During an Influence round, your character can either Influence or Discover. The Influence action is how you gain points with an NPC. The Discover action helps you find out information about the NPC that can help Influence them.</strong></span></p><div dir=\"ltr\" style=\"margin-left:0pt\"><table style=\"border:none;border-collapse:collapse\"><tbody><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.656;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-81065c50-7fff-460e-efce-f6976b291a72\">INFLUENCE</strong></span></p><p dir=\"ltr\" style=\"line-height:1.656;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-81065c50-7fff-460e-efce-f6976b291a72\">[Concentrate] [Linguistic]</strong></span></p><p dir=\"ltr\" style=\"line-height:1.656;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-81065c50-7fff-460e-efce-f6976b291a72\">-------------</strong></span></p><p dir=\"ltr\" style=\"line-height:1.656;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-81065c50-7fff-460e-efce-f6976b291a72\">You attempt to make a favorable impression on an NPC to convince the NPC to support your cause. Choose an NPC, and attempt a skill check to impress that NPC. The DC, and whether success is possible, depend on the NPC’s preferences (typically found in the NPC’s influence stat block).</strong></span></p><p dir=\"ltr\" style=\"line-height:1.656;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Critical Success</strong> You gain 2 Influence Points with the chosen NPC.</span></p><p dir=\"ltr\" style=\"line-height:1.656;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Success</strong> You gain 1 Influence Point with the chosen NPC.</span></p><p dir=\"ltr\" style=\"line-height:1.656;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Failure</strong> You gain no Influence Points with the chosen NPC.</span></p><p dir=\"ltr\" style=\"line-height:1.656;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Critical Failure</strong> You lose 1 Influence Point with the chosen NPC.</span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-81065c50-7fff-460e-efce-f6976b291a72\">DISCOVER</strong></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-81065c50-7fff-460e-efce-f6976b291a72\">[Concentrate] [Secret]</strong></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-81065c50-7fff-460e-efce-f6976b291a72\">-------------</strong></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-81065c50-7fff-460e-efce-f6976b291a72\">You watch or study an NPC to learn more about that NPC’s preferences. Choose an NPC and attempt a Perception check or an appropriate skill check determined by the GM. The DC is typically found in the NPC’s influence stat block.</strong></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Critical Success</strong> Choose two of the options detailed in Success below; you can choose the same option twice to learn two pieces of information from the same category.</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Success</strong> Choose one of the following: You learn which skill that can Influence the NPC has the lowest DC (skipping any skills that you already know), one of the NPC’s personal biases, one of the NPC’s resistances, or one of the NPC’s weaknesses.</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Failure</strong> You learn no information.</span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Critical Failure</strong> Choose a piece of information to learn about, as success, but the information is incorrect. For instance, you might think the NPC is susceptible to flattery when actually the NPC is resistant to flattery.</span></p></td></tr></tbody></table></div><h3 dir=\"ltr\" style=\"line-height:1.38;margin-top:16pt;margin-bottom:4pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-e170779c-7fff-02be-b17a-a4692cffe28e\">Influence Stat Blocks</strong></span></h3><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-e170779c-7fff-02be-b17a-a4692cffe28e\">NPCs in influence encounters have special stat blocks. An example of an influence stat block is included below.\_You'll have to use Discover to find out what the Devil Generals' stat blocks look like!</strong></span></p><p></p><img src=\"https://assets.forge-vtt.com/608d82d517318c2169c5dcfb/Covalon/modules%20do%20not%20delete/influenceblock.PNG\" /><p></p>"
