  - folder: 7cyoYPoPYA01mErU
    img: systems/pf2e/assets/icons/spells/life-draining-roots.webp
    name: Life-Draining Roots
    system:
      description:
        gm: ''
        value: >-
          <p>Thorny roots erupt from your hands in a tangled cascade, puncturing
          creatures in the way of their growth and revitalizing you. You deal
          8d6 piercing damage to creatures in the line (basic Reflex save). You
          gain 1d4 temporary Hit Points for every living creature in the line,
          as the roots transfer nutrients from those damaged into you. The
          temporary Hit Points last for 1 minute.</p>

          <hr />

          <p><strong>Heightened (+1)</strong> The damage increases by 2d6.</p>
      rules: []
