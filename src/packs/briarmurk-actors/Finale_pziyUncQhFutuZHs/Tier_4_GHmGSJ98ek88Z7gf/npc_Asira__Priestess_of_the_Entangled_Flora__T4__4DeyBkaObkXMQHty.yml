  - folder: zDlxATrLAlbYA2Mv
    img: systems/pf2e/assets/icons/spells/roses-thorns.webp
    name: Erimia's Ire
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Rose's Thorns</strong></p><p>Rose bushes with razor-sharp
          thorns sprout from the ground in the area. The rose bushes deal 8d8
          piercing damage to each creature that's in the area when the spell is
          cast or that ends its turn in the area (basic Reflex save). A creature
          that critically fails its saving throw also takes
          @Damage[(ternary(gte(@item.rank,9),2,1))d8[persistent,bleed]] damage
          and is
          @UUID[Compendium.pf2e.conditionitems.Item.eIcWbB5o3pP6OIMe]{Immobilized}
          for 1 round or until the creature
          @UUID[Compendium.pf2e.actionspf2e.Item.SkZAQRkLLkmBQNB9]{Escapes}
          (against your spell DC), whichever comes first. The area is difficult
          terrain and hazardous terrain. A creature that moves through the area
          takes @Damage[(ternary(gte(@item.rank,9),8,5))[piercing]] damage for
          every square of that area it moves into. Each time you sustain this
          spell, the radius of the burst increases by 5 feet.</p><hr
          /><p><strong>Heightened (9th)</strong> The initial damage increases to
          12d8, the persistent bleed damage increases to 2d8, and the hazardous
          terrain damage increases to 8.</p>
