  - type: action
    name: A Pleasant Dream Taken
    system:
      actionType:
        value: reaction
      description:
        value: >-
          <p><strong>Trigger</strong> A creature casts an occult spell anywhere
          atop the Apex of Terrateotl, or casts a divine spell within Terina's
          third of the Apex.</p><p>Dreams show the reality of magic and take on
          a new form. Terina attempts to counteract the spell cast by the
          triggering creature. If the spell would be counteracted, Terina
          instead gains the ability to Cast that Spell without expending a slot.
          On her next turn, she can spend the same number of actions to Cast the
          Spell as the triggering creature, but chooses the targets (if any) and
          uses her spell attack modifier or spell DC as appropriate. The spell
          is heightened to 6th rank. The mimicked spell is occult and divine. If
          the mimicked spell is not used by the end of Terina's next turn, it is
          lost.</p>
