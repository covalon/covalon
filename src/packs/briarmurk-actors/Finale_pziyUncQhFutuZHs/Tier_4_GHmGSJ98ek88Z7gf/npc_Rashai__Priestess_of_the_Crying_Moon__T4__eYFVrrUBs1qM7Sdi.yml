    img: core/icons/magic/unholy/orb-beam-pink.webp
    name: Containment
    system:
      description:
        gm: ''
        value: >-
          <p>You wrap a creature in an immobile force field, whether to protect
          it or those around it. The field blocks attacks, effects, and
          creatures that would pass through it, including the target. The field
          has Hardness 10, 40 Hit Points, and immunity to critical hits and
          precision damage. If the target of containment is unwilling, the
          effects depend on the target's Reflex save.</p><hr
          /><p><strong>Critical Success</strong> The target escapes from the
          field as it's forming, causing it to collapse.</p>

          <p><strong>Success</strong> The field partially forms with 10 Hit
          Points instead of 40.</p>

          <p><strong>Failure</strong> The field has its normal effect.</p><hr
          /><p><strong>Heightened (+1)</strong> The field's Hit Points are 5
          higher on a success or 15 higher on a failure.</p>
