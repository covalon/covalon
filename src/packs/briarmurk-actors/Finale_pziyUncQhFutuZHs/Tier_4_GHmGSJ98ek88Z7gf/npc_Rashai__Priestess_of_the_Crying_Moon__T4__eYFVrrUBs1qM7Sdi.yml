  - type: action
    name: Premonitions of a Dark Future
    system:
      actionType:
        value: reaction
      description:
        value: >-
          <p><strong>Trigger</strong> A creature casts an arcane spell anywhere
          atop the Apex of Terrateotl, or casts a divine spell within Rashai's
          third of the Apex.</p><p>The moon sees all, and her predictions can
          twist the future. Rashai attempts to counteract the spell cast by the
          triggering creature. If the spell would be counteracted, Rashai
          instead gains the ability to Cast that Spell without expending a slot.
          On her next turn, she can spend the same number of actions to Cast the
          Spell as the triggering creature, but chooses the targets (if any) and
          uses her spell attack modifier or spell DC as appropriate. The spell
          is heightened to 6th rank. The mimicked spell is arcane and divine. If
          the mimicked spell is not used by the end of Rashai's next turn, it is
          lost.</p>
