  - folder: zDlxATrLAlbYA2Mv
    img: systems/pf2e/assets/icons/spells/lignify.webp
    name: One With The Earth
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Lignify</strong></p><p>You turn the target's flesh slowly
          into wood. The target must attempt a Fortitude save. Creatures with
          the plant trait have a +2 circumstance bonus to saves against this
          spell.</p><hr /><p><strong>Critical Success</strong> The target is
          unaffected.</p><p><strong>Success</strong> The target is
          @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed 1}
          for 1 round.</p><p><strong>Failure</strong> The target is slowed 1 and
          must attempt a Fortitude save at the end of each of its turns; this
          ongoing save has the incapacitation trait. On a failed save, the
          slowed condition increases by 1 (or 2 on a critical failure). A
          successful save reduces the slowed condition by 1. When a creature is
          unable to act due to the slowed condition from lignify, the creature
          is permanently non-magically petrified, though it's turned to wood
          instead of stone. The spell ends if the creature is magically
          petrified or the slowed condition is removed.</p><p><strong>Critical
          Failure</strong> As failure, but the target is initially
          @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed
          2}.</p>
      rules: []
