  - folder: zDlxATrLAlbYA2Mv
    img: systems/pf2e/assets/icons/spells/field-of-razors.webp
    name: Field of Brambles
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Field of Razors - 7 Damage per squares (ignore template
          damage adjustment)</strong></p><p>You grind a chunk of root to fine
          dust between your hands and blow it into the air, where it grows into
          a tangle of razor sharp brambles. The covered area is difficult
          terrain. A creature that moves through the area takes
          @Damage[5[slashing]] damage per square traversed.</p><p>If a creature
          takes slashing, piercing, or persistent bleed damage while inside the
          thicket, you can spend a reaction to grow the brambles in the shed
          blood into additional thorns, expanding the burst by 5 feet. You can
          grow the area four times in this way, to a maximum of a
          @Template[burst|distance:40].</p><hr /><p><strong>Heightened
          (+1)</strong> The damage per square increases by 2.</p>
