          <p><strong>Rose's Thorns</strong><br />Rose bushes with razor-sharp
          thorns sprout from the ground in the area. The rose bushes deal 8d8
          piercing damage to each creature that's in the area when the spell is
          cast or that ends its turn in the area (basic Reflex save). A creature
