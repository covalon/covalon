    name: Murderous Vine
    system:
      description:
        gm: ''
        value: >-
          <p>You summon a slithering, thorny vine that attempts to constrict and
          crush a foe against a wall or other surface. Make a spell attack roll
          against the target's Fortitude DC. On a success, the creature is
          grabbed and takes 3d6 bludgeoning damage and 2d8 piercing damage. At
