  - folder: zDlxATrLAlbYA2Mv
    img: core/icons/magic/nature/plant-undersea-orb-purple.webp
    name: Tanglecurse
    system:
      description:
        gm: ''
        value: >-
          <p>A fungal rot, the Tanglecurse can be said to be the bane of
          nature's enemies. This curse slowly eats away at those afflicted.. The
          target must attempt a Will save.</p><hr /><p><strong>Critical
          Success</strong> The target is
          unaffected.</p><p><strong>Success</strong> A fungal bloom springs up
          from the ground in a @Template[type:emanation|distance:5] around the
          target. This area is difficult terrain for creatures that enter the
          area. The target treats all terrain as difficult terrain since this
          swath of fungus moves with them as they do, transforming into a tangle
          of spores and floating tendrils if the target flies or a thick swath
          of stringy floating algae if the target swims. This effect ends after
          1 minute or as soon as the curse is lifted, whichever comes
          first.</p><p><strong>Failure</strong> As success, but the fungal bloom
          increases to 10 feet. It persists until the curse is lifted. In
          addition, the target is also affected by the spores exuded by the
          fungal bloom—roll [[/r 1d4]] and consult the results below to see how
          the spores affect them. This affect reactivates automatically every 24
          hours, replacing the previous result.</p><p><strong>1:</strong> The
          spores cause atrophy; the target is
          @UUID[Compendium.pf2e.conditionitems.Item.MIRkyAjyBeXivMa7]{Enfeebled
          1}.</p><p><strong>2:</strong> The spores cause fibrous fungal growths
          to sprout from the target; the target is
          @UUID[Compendium.pf2e.conditionitems.Item.i3OJZU2nk64Df3xm]{Clumsy
          1}.</p><p><strong>3:</strong> The spores settle in the target's blood
          and flesh and cause great pain; the target is
          @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained
          1}.</p><p><strong>4:</strong> The spores intrude upon the mind and
          cause hallucinations; the target is
          @UUID[Compendium.pf2e.conditionitems.Item.e1XGnhKNSQIm5IXg]{Stupefied
          1}.</p><p><strong>Critical Failure</strong> As failure, but the
          emanation increases to 15 feet, and the condition value caused by the
          spores increases to 2.</p>
      rules: []
      slug: tanglecurse
