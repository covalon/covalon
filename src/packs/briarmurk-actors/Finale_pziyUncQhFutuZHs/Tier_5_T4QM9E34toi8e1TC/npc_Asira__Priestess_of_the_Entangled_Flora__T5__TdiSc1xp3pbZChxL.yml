  - folder: T8AzYUgNIAgTJ9Iz
    img: core/icons/magic/nature/tree-animated-smile.webp
    name: Protector Tree
    system:
      description:
        gm: ''
        value: >-
          <p>A Medium tree suddenly grows in an unoccupied square within range.
          The tree has AC 10 and 10 Hit Points. Whenever an ally adjacent to the
          tree is hit by a Strike, the tree interposes its branches and takes
          the damage first. Any additional damage beyond what it takes to reduce
          the tree to 0 Hit Points is dealt to the original target. The tree
          isn't large enough to impede movement through its square. If the tree
          is in soil and survives to the end of the spell's duration, it remains
          as an ordinary, non-magical tree and continues to grow and thrive. The
          GM might determine that the tree disappears immediately in certain
          inhospitable situations.</p><p></p><p>(AC 10, HP 70)</p><hr
          /><p><strong>Heightened (+1)</strong> The tree has an additional 10
          Hit Points.</p>
