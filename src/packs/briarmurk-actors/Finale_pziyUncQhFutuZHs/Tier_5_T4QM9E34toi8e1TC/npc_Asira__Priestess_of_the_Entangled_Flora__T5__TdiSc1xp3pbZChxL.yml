  - type: action
    name: Nutrients for the Briars
    system:
      actionType:
        value: reaction
      description:
        value: >-
          <p><strong>Trigger</strong> A creature casts a primal spell anywhere
          atop the Apex of Terrateotl, or casts a divine spell within Asira's
          third of the apex.</p><p><strong>Effect </strong>The plants whisper
          secrets to their master. Asira attempts to counteract the spell cast
          by the triggering creature. If the spell would be counteracted, Asira
          instead gains the ability to Cast that Spell without expending a slot.
          On her next turn, she can spend the same number of actions to Cast the
          Spell as the triggering creature, but chooses the targets (if any) and
          uses her spell attack modifier or spell DC as appropriate. The spell
          is heightened to 8th rank. The mimicked spell is primal and divine. If
          the mimicked spell is not used by the end of Asira's next turn, it is
          lost.</p>
