  - folder: xqlqJ6eeiNtWb7bq
    img: core/icons/magic/light/beam-rays-yellow-blue-small.webp
    name: Withering Ray
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Ray of Corruption</strong></p><p>You unleash a sickly gray
          beam of toxic spores at your target. Make a spell attack against the
          target. If you hit a non-magical object that's made of organic
          material (such as a tree, wooden house, or massive skull), it melts
          away into a foul-smelling sludge. A single casting can destroy no more
          than a 10-foot cube of matter.</p><p>If you hit a creature, it takes
          6d12 poison damage and 6d12 spirit damage with a basic Fortitude save.
          If you critically hit, the target gets a result one degree of success
          worse than the outcome of its Fortitude save.</p><hr
          /><p><strong>Critical Success</strong> The target is
