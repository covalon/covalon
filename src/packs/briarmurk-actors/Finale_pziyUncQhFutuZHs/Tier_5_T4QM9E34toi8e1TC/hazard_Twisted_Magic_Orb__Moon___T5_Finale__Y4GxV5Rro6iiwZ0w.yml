  details:
    description: >-
      <p>An orb of brilliant white light appears atop the altar in the center of
      the apex.</p>
    level:
      value: 14
    isComplex: true
    disable: >-
      <p>The orb can be disabled using
      @UUID[Compendium.pf2e.actionspf2e.cYdz2grcOcRt4jk6]{Disable a Device} with
      @Check[arcana|dc:34|traits:action:disable-a-device]{Arcana},
      @Check[crafting|dc:34|traits:action:disable-a-device]{Crafting},
      @Check[religion|dc:34|traits:action:disable-a-device]{Religion},
      or@Check[thievery|dc:34|traits:action:disable-a-device]{Thievery}.</p><p><br>Three
      successes are required to completely disable this hazard. Each success
      reduces the number of actions in the hazard's routine by one (a critical
      success to disable counts as 2 successes).</p><p>The hazard can also be
      disabled by a creature casting a prepared or spontaneous spell with the
      Scrying trait while adjacent to the orb. The spell rank must be at least
      APL/2 -1 (round up), and this causes the spell to be consumed entirely by
      the orb. The spell has none of its usual effects. The caster attempts a
      Counteract check with the same DC as the Disable DC for the Religion
      skill, but they get one degree of success higher than they roll.</p>
    routine: >-
      <p>(3 actions) The hazard spends each of its actions on Bloody Wrath. It
      prioritizes targeting the closest enemies, and will not target the same
      creature twice in the same round. The hazard's attacks do not increment
      MAP.</p>
    reset: <p>The orb is dormant for 24 hours.</p>
    publication:
      title: Covalon - Briarmurk
      authors: Locke
      license: ORC
      remaster: true
