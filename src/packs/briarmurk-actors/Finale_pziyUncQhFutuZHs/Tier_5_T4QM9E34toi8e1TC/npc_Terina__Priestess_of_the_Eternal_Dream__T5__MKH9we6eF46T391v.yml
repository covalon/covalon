  - folder: iDjm2cXyRAe4VZ35
    img: core/icons/creatures/reptiles/serpent-horned-green.webp
    name: Ophidiophobia
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Slither</strong></p><p>A mass of snakes made of shadow rise
          up to capture creatures in the area. Each creature in the area when
          you Cast the Spell takes @Damage[3d6[piercing]] damage and
          @Damage[1d6[persistent,poison]] damage from a biting snake, and it's
          @UUID[Compendium.pf2e.conditionitems.Item.kWc1fhmv9LBiTuei]{Grabbed}
          or
          @UUID[Compendium.pf2e.conditionitems.Item.VcDeM8A5oI6VqhbM]{Restrained}
          depending on its Reflex save. A creature that ends its turn in the
          area must also attempt this save, even if it's already grabbed or
          restrained by the snakes. You can Dismiss the spell.</p><hr
          /><p><strong>Success</strong> The creature is
          unaffected.</p><p><strong>Failure</strong> The creature takes full
          damage and is grabbed by a snake. The snakes'
          @UUID[Compendium.pf2e.actionspf2e.Item.SkZAQRkLLkmBQNB9]{Escape} DC is
          equal to your spell DC. A creature can attack a snake to release the
          creature. A snake's AC is equal to your spell DC, and it's destroyed
          if it takes 12 or more damage at once. New snakes continually regrow
          as long as the spell lasts, so destroying snakes doesn't prevent
          slither from capturing more creatures.</p><p><strong>Critical
          Failure</strong> As failure, but the creature takes double damage and
          is restrained by a snake.</p><hr /><p><strong>Heightened (+2)</strong>
          The persistent poison damage increases by 1d6 and snake HP increases
          by 6.</p>
