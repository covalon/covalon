  - type: action
    name: Our Bond Maintains Us
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>Asira, Rashai, and Terina are bonded by magic and share a life
          force. Each priestess has an HP threshold at 66% and 33% HP. The first
          time a priestess would take damage past a threshold, she becomes
          immune to all damage until her sisters also reach the same threshold
          (66% HP or 33% HP), at which point they all can take damage as normal
          again.</p><p>The priestesses are using their shared energy to power a
          ritual atop the apex. When combat begins, designate one priestess as
          the Ritual Leader, which activates her associated Ritual Leader effect
          (Boughbringer, Sleepwalker, or Moonrise), and Twisted Magic Orb
          (Bramble, Mist, or Moon). The two priestesses who are not the RItual
          Leader can use the leader as the point of origin for any of their
          spells.</p><p>When the priestesses all pass an HP threshold and can
          take damage again, the Ritual Leader changes, ending the current
          Ritual Leader effect and swapping to the new Ritual Leader's
          associated Ritual Leader effect and activating the associated Twisted
          Magic Orb hazard. Each priestess is the Ritual Leader for one HP
          section of the fight (100% HP to 66% HP, 66% HP to 33% HP, and 33% HP
          to death.)</p><p></p><p>In short:</p><ul><li><p>All 3 have their HP
          hit an immunity threshold</p></li><li><p>Apply a new Ritual Leader
          effect, remove the old one</p></li><li><p>Activate a new hazard (do
          not remove an old one)</p></li><li><p>Remove damage
          immunities</p></li><li><p>The current leader can now be the origin of
          any of the 3's spells</p></li></ul>
