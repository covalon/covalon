  - folder: xqlqJ6eeiNtWb7bq
    img: core/icons/creatures/magical/humanoid-silhouette-glowing-pink.webp
    name: Dreaming Memories
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Attacked from Within</strong></p><p>You assert your power
          over the target's own spirit as you reach deep into its soul in order
          to discover a dream of excruciating anguish, debilitating humiliation,
          or abject despair. The target takes 12d8 spirit damage and must
          attempt a Will save.</p><hr /><p><strong>Critical Success</strong> The
          target takes no damage, with a brief sensation of pain followed by a
          pleasant memory.</p><p><strong>Success</strong> The target takes half
          damage and is
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          1}.</p><p><strong>Failure</strong> The target takes full damage and is
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          2}.</p><p><strong>Critical Failure</strong> The target takes double
          damage and is frightened 2 and
          @UUID[Compendium.pf2e.conditionitems.Item.AJh5ex99aV6VTggg]{Off-Guard}
          for 1 round.</p><hr /><p><strong>Heightened (+1)</strong> The damage
          increases by 2d8.</p>
      rules: []
      slug: attacked-from-within
