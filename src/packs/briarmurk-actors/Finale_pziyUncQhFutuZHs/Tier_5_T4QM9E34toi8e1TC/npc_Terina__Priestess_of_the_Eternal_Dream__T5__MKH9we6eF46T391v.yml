  - folder: IfuYSF4ymX48CZnm
    img: systems/pf2e/assets/icons/spells/falling-sky.webp
    name: Startled Awake
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Falling Sky</strong></p><p>A dreamlike trance overtakes you
          as you feel as though you are falling. All flying creatures in the
          area descend to the bottom of the spell's area, taking twice as much
          bludgeoning damage as if they had fallen the distance moved, to a
          maximum of 60 falling Damage if they fall 60 feet. They take this
          falling damage even if the spell's area is entirely in the air and
          they don't hit the ground, as they concuss against the bottom of the
          spell's area at great speed. Creatures on the ground and within the
          spell's area, including flying creatures forced to the ground, must
          attempt Fortitude saves.</p><hr /><p><strong>Critical Success</strong>
          The creature is unaffected, and if it was flying, it isn't knocked
          @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone}
          even though it took falling damage.</p><p><strong>Success</strong> The
          creature is knocked prone.</p><p><strong>Failure</strong> The creature
          is knocked prone and
          @UUID[Compendium.pf2e.conditionitems.Item.dfCMdR4wnpbYNTix]{Stunned
          2}.</p><p><strong>Critical Failure</strong> The creature is knocked
          prone and
          @UUID[Compendium.pf2e.conditionitems.Item.dfCMdR4wnpbYNTix]{Stunned}
          for 1 round.</p>
      rules: []
      slug: falling-sky
