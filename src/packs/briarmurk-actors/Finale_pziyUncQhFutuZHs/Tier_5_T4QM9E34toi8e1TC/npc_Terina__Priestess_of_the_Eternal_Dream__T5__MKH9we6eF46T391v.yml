  - folder: zDlxATrLAlbYA2Mv
    img: core/icons/magic/death/skull-energy-light-white.webp
    name: Missed Cue
    system:
      description:
        gm: ''
        value: >-
          <p>You make the spell's target remember a dream where they missed the
          chance to speak when it mattered. Sensations of overwhelming panic
          akin to stage fright flood the target's mind, causing them to suffer
          excruciating mental anguish and take 12d6 mental damage. The target
          might even become filled with the conviction that they've doomed
          themselves by missing their cue. The target must attempt a Will
          save.</p><hr /><p><strong>Critical Success</strong> The conviction of
          a missed cue is only a fleeting notion that passes quickly without any
          effect on the target.</p><p><strong>Success</strong> The target takes
          half damage and is
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          1}.</p><p><strong>Failure</strong> The target takes full damage and
          becomes
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          2}. In addition, the target is
          @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed 1}
          for as long as they remain frightened.</p><p><strong>Critical
          Failure</strong> The target takes double damage and becomes
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          3}. In addition, the target is slowed 1 for as long as they remain
          frightened.</p><hr /><p><strong>Heightened (+1)</strong> The damage
          increases by 2d6.</p>
