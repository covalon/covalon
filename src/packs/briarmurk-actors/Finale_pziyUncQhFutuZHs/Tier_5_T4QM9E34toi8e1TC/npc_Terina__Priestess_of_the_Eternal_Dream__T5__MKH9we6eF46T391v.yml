  - folder: xqlqJ6eeiNtWb7bq
    img: core/icons/magic/air/weather-wind-gust.webp
    name: Tycheam's Indignation
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Indolent Haze</strong></p><p>The faint scent of poppies and
          a soothing calm fill the area, urging creatures to lay down and take a
          rest, to do nothing at all, ever again. Creatures in the area when you
          Cast the Spell must attempt a Will save. Creatures who end their turn
          in the area must also attempt the save. You can Dismiss the
          spell.</p><hr /><p><strong>Critical Success</strong> The creature is
          unaffected.</p><p><strong>Success</strong> The creature lies down to
          rest, becoming
          @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone}. If
          they were already prone, they instead drift off to sleep, becoming
          @UUID[Compendium.pf2e.conditionitems.Item.fBnFDH2MTzgFijKf]{Unconscious}.</p><p><strong>Failure</strong>
          As success, except that the creature is so happy lying down that they
          cannot attempt to Stand or otherwise maneuver themself off of the
          ground on their next turn, though they can
          @UUID[Compendium.pf2e.actionspf2e.Item.Tj055UcNm6UEgtCg]{Crawl}
          (potentially to escape the spell's area).</p><p><strong>Critical
          Failure</strong> The creature immediately lies down and drifts off to
          sleep, becoming prone and unconscious. Any creature in the area who is
          already unconscious when you Cast the Spell (or whose turn ends in the
          spell's area while they are unconscious) takes 6d4 spirit damage as
          their life force is drained away through their dreams. This damage
          does not automatically wake them.</p><hr /><p><strong>Heightened
          (+1)</strong> The spirit damage increases by 2d4.</p>
      rules: []
      slug: indolent-haze
