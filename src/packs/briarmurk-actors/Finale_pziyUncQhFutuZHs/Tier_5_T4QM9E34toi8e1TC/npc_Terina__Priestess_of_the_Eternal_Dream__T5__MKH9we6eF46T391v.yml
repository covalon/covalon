  - folder: iDjm2cXyRAe4VZ35
    img: systems/pf2e/assets/icons/spells/synesthesia.webp
    name: Synesthesia
    system:
      description:
        gm: ''
        value: >-
          <p>The target's senses are suddenly rewired in unexpected ways,
          causing them to process noises as bursts of color, smells as sounds,
          and so on. This has three effects, and the target must attempt a Will
          save.</p><ul><li>Due to the distraction, the target must succeed at a
          @Check[flat|dc:5] each time it uses a concentrate action, or the
          action fails and is wasted.</li><li>The target's difficulty processing
          visual input makes all creatures and objects
          @UUID[Compendium.pf2e.conditionitems.Item.DmAIPqOBomZ7H95W]{Concealed}
          from it.</li><li><p>The creature has trouble moving, making it
          @UUID[Compendium.pf2e.conditionitems.Item.i3OJZU2nk64Df3xm]{Clumsy 3}
          and giving it a –10-foot status penalty to its
          Speeds.</p></li></ul><hr /><p><strong>Critical Success</strong> The
          target is unaffected.</p>

          <p><strong>Success</strong> The target is affected for 1 round.</p>

          <p><strong>Failure</strong> The target is affected for 1 minute.</p>

          <p><strong>Critical Failure</strong> As failure, and the target is
          @UUID[Compendium.pf2e.conditionitems.Item.dfCMdR4wnpbYNTix]{Stunned 2}
          as it attempts to process the sensory shifts.</p><hr
          /><p><strong>Heightened (9th)</strong> You can target up to five
          creatures.</p>
      rules: []
      slug: synesthesia
