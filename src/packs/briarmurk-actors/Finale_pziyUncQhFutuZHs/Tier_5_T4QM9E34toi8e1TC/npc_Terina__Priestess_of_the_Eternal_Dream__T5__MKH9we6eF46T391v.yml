  - type: action
    name: Ritual Leader - Sleepwalker
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>While Terina is the Ritual Leader, a sleeping cursed mist falls
          over the Apex. Immediatly when Terina becomes the Ritual Leader, all
          creatures must attempt a Will save against Sleepwalker's Curse.
          Creatures that are not already afflicted with the curse are exposed
          again at the end of each of their turns. Any instances of
          Sleepwalker's Curse immediatly end when Terina stops being the ritual
          leader. Terina, Rashai, and Asira are immune to this curse. The
          effects granted by this curse only persist while cursed. If a player
          goes from Stage 1 to Stage 0 (or the Ritual Leader changes) then the
          Fatigue will be removed.</p><hr /><p><strong>Sleepwalker's
          Curse</strong></p><p>You suddenly feel drowsy, as if in a waking
          dream.</p><p><strong>Saving Throw</strong>
          @Check[will|dc:33|options:occult,divine,dream];</p><p><strong>Stage
          1</strong> The creature is
          @UUID[Compendium.pf2e.conditionitems.Item.HL2l2VRSaQHu9lUw]{Fatigued}
          (1 round);</p><p><strong>Stage 2</strong> The creature is fatigued and
          @UUID[Compendium.pf2e.conditionitems.Item.e1XGnhKNSQIm5IXg]{Stupefied
          1} (1 round);</p><p><strong>Stage 3</strong> The creature falls
          @UUID[Compendium.pf2e.conditionitems.fBnFDH2MTzgFijKf]{Unconscious}
          (but not dying), drops
          @UUID[Compendium.pf2e.conditionitems.j91X7x0XSomq8d60]{Prone}, and
          drops whatever they are holding in their square. They can only be
          awoken by taking at least 20 points of damage from a single source.
          When they wake up, they are no longer afflicted by Sleepwalker's
          Curse.</p>
        gm: ''
      publication:
        title: ''
        authors: ''
        license: OGL
        remaster: false
