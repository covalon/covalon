  - type: action
    name: Modification - Our Ritual Maintains Us
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>The three Twisted Magic Orbs hazards cannot be fully disabled.
          After two successful disable checks (or one critical success), the
          hazard persists with only one action in its routine, or reduced to
          minimum radius for the Bramble Orb. A success or critical success to
          disable any of the hazards at this point only causes them to skip
          their routine for one round. The hazards recover to half HP (The BT)
          when they skip their routine.</p>
