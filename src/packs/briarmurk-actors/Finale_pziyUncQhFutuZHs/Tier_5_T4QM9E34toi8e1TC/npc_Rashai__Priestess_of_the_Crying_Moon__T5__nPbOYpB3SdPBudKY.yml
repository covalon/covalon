  - folder: IfuYSF4ymX48CZnm
    img: core/icons/skills/wounds/blood-cells-red.webp
    name: Boil Blood
    system:
      description:
        gm: ''
        value: >-
          <p>You heat a foe's blood and boil it within its veins. The target
          takes 10d10 fire damage, with a Fortitude save. A nonliving creature
          with blood in its body (such as a vampire) can be affected, but a
          creature with no blood is immune.</p>

          <hr />

          <p><strong>Critical Success</strong> The target is unaffected.</p>

          <p><strong>Success</strong> The target takes half damage.</p>

          <p><strong>Failure</strong> The target takes full damage and is
          @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained
          2}.</p>

          <p><strong>Critical Failure</strong> The target takes double damage
          and is
          @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained
          3}.</p>

          <hr />

          <p><strong>Heightened (+1)</strong> The damage increases by 1d10.</p>
      rules: []
      slug: boil-blood
