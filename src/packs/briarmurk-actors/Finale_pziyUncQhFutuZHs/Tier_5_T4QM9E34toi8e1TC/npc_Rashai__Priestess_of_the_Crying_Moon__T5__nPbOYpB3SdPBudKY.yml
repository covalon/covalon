  - type: action
    name: Modification - The Blood Protects Us
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>The lines of blood separating the three sections of the Apex of
          Terrateotl shimmer with magic. These lines block line of effect for
          any creature that is not Asira, Rashai, or Terina, nor does it affect
          the three orbs.</p><p>Line of Effect can be a complicated rule. For
          the purposes of this combat, pretend the blood line is a solid wall
          for any and all abilities, such as Battle Medicine, Haste, Area of
          Effect Spells, or ranged attacks. Players can only affect creatures in
          the same third of the battlemap as them. Creatures can still move
          through the lines normally.</p><p>At your discretion, you can allow
          certain abilities that do not need line of sight (such as
          @UUID[Compendium.pf2e.spells-srd.bfdiKEZQLVvslcDi]{Take Your Places}
          or Amped Message) to cross the blood lines.</p>
