  - folder: iDjm2cXyRAe4VZ35
    img: core/icons/magic/water/projectile-ice-impact-stone.webp
    name: Geyser
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Area</strong> 10-foot radius, 50-foot-tall cylinder</p>

          <hr />

          <p>A powerful geyser blasts up from the ground, potentially pushing
          creatures on top of it into the air. The bottom of this spell's area
          must be on solid ground. Each creature in the area takes 3d6
          bludgeoning damage and 4d6 fire damage, with a Reflex save. A creature
          pushed into the air by the geyser can't be pushed beyond the top of
          the geyser. After being pushed into the air, a creature falls unless
          it's flying or has some other means of staying aloft, taking falling
          damage (normally equal to half the distance it fell). After the geyser
          erupts, its area is filled with a cloud of steam for 1 round. All
          creatures in the steam are concealed, and all creatures outside the
          steam are concealed to creatures within it.</p>

          <hr />

          <p><strong>Critical Success</strong> The creature is unaffected.</p>

          <p><strong>Success</strong> The creature takes half damage and isn't
          pushed into the air.</p>

          <p><strong>Failure</strong> The creature takes full damage and is
          pushed 20 feet into the air.
          (@Damage[10[bludgeoning]|options:fall-damage] damage)</p>

          <p><strong>Critical Failure</strong> The creature takes double damage
          and is pushed 40 feet into the air.
          (@Damage[20[bludgeoning]|options:fall-damage] damage)</p>

          <hr />

          <p><strong>Heightened (+1)</strong> The damage increases by 1d6
          bludgeoning and 1d6 fire.</p>
