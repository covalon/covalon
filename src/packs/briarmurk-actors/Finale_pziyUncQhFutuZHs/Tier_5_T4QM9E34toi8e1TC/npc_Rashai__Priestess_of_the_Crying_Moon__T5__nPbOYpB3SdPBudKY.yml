  - folder: iDjm2cXyRAe4VZ35
    img: core/icons/magic/fire/blast-jet-stream-embers-orange.webp
    name: Blazing Fissure
    system:
      description:
        gm: ''
        value: >-
          <p>A thin crack rips through the earth, erupting with solar heat, then
