    img: systems/pf2e/assets/icons/spells/cutting-insult.webp
    name: Heatseeker
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Chain Lightning</strong></p><p>You release a frigid bolt of
          energy, seeking to sap away the heat of nearby creatures, dealing 8d12
          cold damage. The target must attempt a basic Reflex save. The cold
          bolt jumps to another creature within 30 feet of the first target,
          jumps to another creature within 30 feet of that target, and so on.
          You can end the chain at any point. You can't target the same creature
          more than once, and you must have line of effect to all targets. Roll
          the damage only once, and apply it to each target (halving or doubling
          as appropriate for its saving throw outcome). The chain ends if any
          one of the targets critically succeeds at its save.</p><hr
