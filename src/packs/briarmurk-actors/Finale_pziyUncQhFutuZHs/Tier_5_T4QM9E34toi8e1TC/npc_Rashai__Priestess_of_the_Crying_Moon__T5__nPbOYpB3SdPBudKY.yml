  - folder: xqlqJ6eeiNtWb7bq
    img: systems/pf2e/assets/icons/spells/eclipse-burst.webp
    name: Eclipse Burst
    system:
      description:
        gm: ''
        value: >-
          <p>A globe of freezing darkness explodes in the area, dealing 8d10
          cold damage to creatures in the area, plus an additional 8d4 void
          damage to living creatures. Each creature in the area must attempt a
          Reflex save.</p>

          <p>If the globe overlaps with an area of magical light or affects a
          creature affected by magical light, eclipse burst attempts to
          counteract the light effect.</p>

          <hr />

          <p><strong>Critical Success</strong> The creature is unaffected.</p>

          <p><strong>Success</strong> The creature takes half damage.</p>

          <p><strong>Failure</strong> The creature takes full damage.</p>

          <p><strong>Critical Failure</strong> The creature takes double damage
          and becomes
          @UUID[Compendium.pf2e.conditionitems.Item.XgEqL1kFApUbl5Z2]{Blinded}
          by the darkness for an unlimited duration.</p>

          <hr />

          <p><strong>Heightened (+1)</strong> The cold damage increases by 1d10
          and the void damage against the living increases by 1d4.</p>
      rules: []
      slug: eclipse-burst
