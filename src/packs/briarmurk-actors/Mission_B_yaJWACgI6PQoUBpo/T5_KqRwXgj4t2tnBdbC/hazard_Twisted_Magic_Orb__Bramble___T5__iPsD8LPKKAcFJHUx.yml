  - type: action
    name: Tangled Briar Thicket
    system:
      actionType:
        value: action
      description:
        value: >-
          <p>Briars grow and twist from the ground surrounding the Bramble Orb.
          This effect does not harm its allies. Intruders caught in this
          emanation and within 15ft of the ground must do a
          @Check[reflex|dc:34|basic|options:primal,divine,plant] save or take
          @Damage[(3d12+15)[piercing]|options:primal,divine,plant].</p><p>Anyone
          that fails must do a @Check[fortitude|dc:34|basic] save or have their
          blood drained by the roots becoming
          @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained 1}
          on a failure
          (@UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained
          2} on a critical failure).</p><p>To track the radius, apply
          @UUID[Compendium.covalon.briarmurk-items.Item.Bzd6mzPrkoidCWZ8]{Tangled
          Briar Thicket (T3-T5)} and left click the effect once each time an
          action is removed.</p>
