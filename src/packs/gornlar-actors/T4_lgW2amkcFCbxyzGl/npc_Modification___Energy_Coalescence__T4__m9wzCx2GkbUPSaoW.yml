  - type: action
    name: Metaphysical Form
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>As a being of pure energy, the Energy Coalescence is neither dead
          nor alive.</p><p>It is permanently
          @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed}, can
          only use its actions for Elemental Freedom and Elemental Attraction in
          this order, and it is immune to any effects that would further alter
          the number of actions it receives at the start of its turn.</p><p>It
          can be considered to be an object or a creature for the purpose of
          targeting, whichever would be more beneficial for the creature
          targeting it. At the GM's discretion, it may also be considered a
          willing creature for the purpose of targeting.</p><p>It is immune to
          all damage, death effects, and the Prone condition.</p>
        gm: ''
      publication:
        title: ''
        authors: ''
        license: OGL
