items:
  - type: action
    name: Elemental Attraction
    system:
      actionType:
        value: action
      description:
        value: >-
          <p>Being attracted to energy of the same attunement, the Coalescence
          unerringly moves towards the dragon it is attuned to.</p><p>The
          Coalescence loses all movement-impairing effects and then flies 25
          feet toward the dragon it is currently attuned to. As a being of pure
          energy, it can move through the space of other creatures and
          Fjordcarver's stalactites, but it can not pass through any other
          physical barriers.</p><p>This movement ignores Difficult Terrain and
          similar effects that would increase the movement cost of a square it
          passed through, and does not count as a Move action for the purpose of
          triggering reactions.</p>
        gm: ''
      publication:
        title: ''
        authors: ''
        license: OGL
