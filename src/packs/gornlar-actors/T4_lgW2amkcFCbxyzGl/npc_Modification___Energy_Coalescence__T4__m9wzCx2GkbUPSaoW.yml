    system:
      actionType:
        value: free
      description:
        value: >-
          <p><strong>Trigger</strong> The Coalescence shares a square with a
          dragon it is attuned to.</p><hr /><p>The matching primal energies of
          the Coalescence empower the triggering dragon and heal their
          wounds.</p><p>The dragon becomes
          @UUID[Compendium.pf2e.conditionitems.nlCjDvLMf2EkV2dl]{Quickened} for
          one round and gains 30 Temporary Hit Points that last for one
          minute.</p><p>They can use their Quickened action only to Stride,
