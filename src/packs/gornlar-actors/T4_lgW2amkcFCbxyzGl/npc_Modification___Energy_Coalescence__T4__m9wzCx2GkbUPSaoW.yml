  - type: action
    name: Slam Dunk
    system:
      actionType:
        value: free
      description:
        value: >-
          <p><strong>Trigger</strong> The Coalescence shares a square with a
          dragon it is not attuned to.</p><hr /><p>The opposing primal energies
          of the Coalescence and the dragon clash violently, dealing
          @Damage[2d12+15] untyped damage to the dragon with a Basic Reflex
          Save. On a failure, they are also
          @UUID[Compendium.pf2e.conditionitems.dfCMdR4wnpbYNTix]{Stunned
          1}.</p><p>The clash of energies then rebounds on the Coalescence,
          immediately triggering Elemental
          Attunement.</p><p><strong>Special:</strong> The DC of this save
          depends on how Slam Dunk was triggered.</p><p>If it was moved with an
          Athletics check, use the Athletics DC of the creature moving
          it.</p><p>If it was moved by a spell, use the appropriate Spell
          DC.</p><p>If it was moved by a different effect, use an appropriate
          statistic of the responsible creature, or the Reflex DC of the Energy
          Coalescence otherwise.</p>
        gm: ''
      publication:
