    system:
      description:
        gm: ''
        value: "<p>Fjordcarver's condescending eyes cause a foe's bones to lock up and seize. The target takes <span style=\"font-family:var(--font-primary)\">@Damage[3d8[bludgeoning]] damage with a\_(@Check[type:will|dc:32|basic:false] save). Regardless of their save, the target is immune to Calcifying Gaze for 1 round.</span></p><p><span style=\"font-family:var(--font-primary)\"><strong>Critical Success</strong> The target is unaffected.</span></p><p><span style=\"font-family:var(--font-primary)\"><strong>Success</strong> The target takes half damage and has their Speeds halved for 1 round.</span></p><p><span style=\"font-family:var(--font-primary)\"><strong>Failure</strong> The target takes full damage, has their Speeds halved for 1 round, and is @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed 1} for 1 round.</span></p><p><span style=\"font-family:var(--font-primary)\"><strong>Critical Failure</strong> The target takes double damage, has their Speeds halved for 1 round, and is @UUID[Compendium.pf2e.conditionitems.Item.dfCMdR4wnpbYNTix]{Stunned 1}.</span></p>"
