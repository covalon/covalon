  - _id: q6mf5J9zjAqagJ2N
    name: Heart of Earth
    type: action
    img: systems/pf2e/icons/actions/Passive.webp
    effects: []
    folder: null
    sort: 300000
    flags: {}
    system:
      description:
        gm: ''
        value: "<p>Fjordcarver's connection to the earth is too powerful for electricity to have any effect on him. Fjordcarver is immune to electicity damage.\_</p>\n<p>Fjordcarver's legs are weak and brittle, but his wings are strong and powerful. While Fjordcarver is not immobilized, he hovers slightly above the ground, and he does need to spend an action to Fly each turn in order to maintain this slight hover. Fjordcarver prefers to be flying at all times, and is off-guard while he is touching the ground. When Fjordcarver uses the Stand action, he can also return to his slight hovering state as part of that action.</p>"
