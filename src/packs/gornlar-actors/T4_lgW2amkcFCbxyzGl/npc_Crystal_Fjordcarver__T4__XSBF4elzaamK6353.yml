  - _id: kMQd5gb4l5rbWsBV
    name: Localized Glitterstorm
    type: action
    img: systems/pf2e/icons/actions/Passive.webp
    effects: []
    folder: null
    sort: 200000
    flags: {}
    system:
      description:
        gm: ''
        value: "<p>A halo of tiny, glittering crystalline shards follows Fjordcarver wherever he goes, which harries flying enemies. While Fjordcarver is alive, all other flying creatures in the arena must succeed at a @Check[type:acrobatics|dc:33|basic:false] check to Maneuver in Flight whenever they attempt to Fly. If the creature is not trained or better in Acrobatics, they automatically crit fail.</p>\n<p><strong>Critical Success\_</strong>The creature can fly normally.</p>\n<p><strong>Success\_</strong>The creature can fly at half speed.</p>\n<p><strong>Failure\_</strong>The creature doesn't fly, and wastes the action.</p>\n<p><strong>Critical Failure\_</strong>The creature falls.</p>\n<p>Additionally, the storm of crystals makes it difficult to move one's arms. Flying and air-walking creatures in the swarm take a -2 circumstance penalty to Strikes and must succeed at a <span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">@Check[type:flat|dc:5|basic:false]</span><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\"> when attempting any action with the manipulate trait. On a failure, the action is lost.</span></p>"
      rules: []
      slug: null
