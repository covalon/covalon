    system:
      description:
        gm: ''
        value: >-
          <p>Ashgut's presence rots the land she walks on. When a creature other
          than Ashgut ends their turn on Ashgut's side of the arena, they lose
          any mental weakness they have but gain weakness to negative equal to
          half their level (rounded up). If a creature is moved into the
          Blighted Fields area outside of their turn, the effect applies at the
          end of that turn.</p><p>If Fjordcarver dies, Blighted Fields expands
          to cover the entire
          arena.</p><p>@UUID[Compendium.covalon.gornlar-items.Item.nzqny6MIIZwzyjVM]{Effect:
