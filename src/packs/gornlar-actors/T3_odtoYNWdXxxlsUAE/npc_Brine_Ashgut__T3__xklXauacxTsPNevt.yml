      description:
        gm: ''
        value: >-
          <p>Ashgut continually emits an acidic mist from her body that
          complicates aerial combat. While Ashgut is alive, all flying and
          air-walking creatures in the arena must hold their breath or
          suffocate, and their visibility is reduced to 5 feet due to the
          intense watering of their eyes. Fjordcarver is unaffected by this
          ability during his slight hover, but will become affected by it if he
          flies higher.</p>
