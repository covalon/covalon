    system:
      description:
        gm: ''
        value: "<p>Fjordcarver's entrancing eyes cause his foes to fumble. The target takes <span style=\"font-family:var(--font-primary)\">@Damage[2d6[mental]] damage with a\_(@Check[type:reflex|dc:28|basic:false] save). Regardless of their save, the target is immune to Befuddling Gaze for 1 round.</span></p><p><span style=\"font-family:var(--font-primary)\"><strong>Critical Success</strong> The target is unaffected.</span></p><p><span style=\"font-family:var(--font-primary)\"><strong>Success</strong> The target takes half damage and has their Speeds halved for 1 round.</span></p><p><span style=\"font-family:var(--font-primary)\"><strong>Failure</strong> The target takes full damage, has their Speeds halved for 1 round, and is @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed 1} for 1 round.</span></p><p><span style=\"font-family:var(--font-primary)\"><strong>Critical Failure</strong> The target takes double damage, has their Speeds halved for 1 round, and is @UUID[Compendium.pf2e.conditionitems.Item.dfCMdR4wnpbYNTix]{Stunned 1}.</span></p>"
