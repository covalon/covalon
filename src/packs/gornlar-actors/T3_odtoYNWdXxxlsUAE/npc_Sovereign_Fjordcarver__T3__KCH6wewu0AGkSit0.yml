  - _id: yipsaDW5PAxHU2Hj
    name: Psychic Spears
    type: action
    img: systems/pf2e/icons/actions/FreeAction.webp
    effects: []
    folder: null
    sort: 1200000
    flags:
      LocknKey:
        IDKeysFlag: ''
        RemoveKeyonUseFlag: false
        LPFormulaFlag: ''
        LPFormulaOverrideFlag: false
        LBFormulaFlag: ''
        LBFormulaOverrideFlag: false
        ReplacementItemFlag: ''
    system:
      description:
        gm: ''
        value: "<p><strong>Trigger\_</strong>Fjordcarver's turn ends and Psychic Spears was not triggered last round. If Ashgut is alive, Ashgut must have triggered Lifewaster on her turn.</p><hr /><p>With a mighty roar, Fjordcarver wills spears of force into existence to pierce his foes. All creature in the arena in contact with the ground or a wall take @Damage[5d8[piercing]] damage with a @Check[type:will|dc:28|basic:true] save as ethereal stalagmites manifest in their squares. Each creature who makes a save can Step as a free action, unless they critically fail, in which case they are instead immobilized as they are impaled by the stalagmite. If there is no room for them to Step, the creature automatically critically fails their save.</p><p>The stalagmites are medium sized, have 27 AC, 40 hit points, 0 hardness, and are immune to critical hits and precision damage. They are immune to all of Ashgut and Fjordcarver's abilities, except for Lifewaster. When Ashgut uses Lifewaster, Fjordcarver loses focus on his Psychic Spears and they instantly disappear.</p>"
      rules: []
      slug: null
