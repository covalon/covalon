items:
  - type: action
    name: Elemental Attraction
    system:
      actionType:
        value: action
      description:
        value: >-
          <p>Being attracted to energy of the same attunement, the Coalescence
          unerringly moves towards the dragon it is attuned to.</p><p>The
          Coalescence flies up to its speed toward the dragon it is currently
          attuned to. As a being of pure draconic energy, it can move through
          the spaces of other creatures and Fjordcarver's stalactites, but it
          can not pass through any other physical barriers.</p><p>This movement
          ignores Difficult Terrain and similar effects that would increase the
          movement cost of a square it passed through, including increased cost
          by flying upwards.</p><p><strong>Special</strong> If only one dragon
          remains in the arena, the Coalescence's movement speed increases to 30
          feet.</p>
        gm: ''
      publication:
        title: ''
        authors: ''
        license: OGL
        remaster: false
      rules:
        - key: RollOption
          domain: all
          option: dragon-dead
          label: Ashgut or Fjordcarver is at 0 HP
          toggleable: true
          value: false
        - key: FlatModifier
          selector: fly-speed
          value: 10
          type: status
          predicate:
            - dragon-dead
      slug: null
      traits:
