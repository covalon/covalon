          Coalescence was
          @UUID[Compendium.pf2e.conditionitems.Item.eIcWbB5o3pP6OIMe]{Immobilized}
          before using this ability, reduce its speeds by 5 feet for the
          remainder of this turn.</p><p>If the Coalesence was
          @UUID[Compendium.pf2e.conditionitems.Item.VcDeM8A5oI6VqhbM]{Restrained}
          before using this ability, reduce its speeds by 10 feet for the
          remainder of this turn.</p><p>Other movement-impairing effects may
          reduce the movement speed by up to 10 feet at the GM's discretion.</p>
