  - type: action
    name: Ley-Line Resonance
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>The energy of the Coalescence resonates with Ashgut and
          Fjordcarver. Regardless of its initiative roll, it always acts
          immediately before Ashgut. If another creature delays their turn to go
          in between the Coalescence and Ashgut, Ashgut takes her turn first and
          that creature's initiative is delayed until after Ashgut (and
          Fjordcarver). If a player's initiative would change to force them
          between the Coalescence and Ashgut (such as from being knocked
          unconscious) the player should move above the Coalescence instead.</p>
