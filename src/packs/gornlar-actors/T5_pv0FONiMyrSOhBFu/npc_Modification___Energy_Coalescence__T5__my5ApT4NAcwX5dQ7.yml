  - type: action
    name: Elemental Attunement
    system:
      actionType:
        value: free
      description:
        value: >-
          <p><strong>Trigger</strong> The Coalescence rolls for Initiative,
          Ashgut uses Landwaster, Ashgut or Fjordcarver dies, or the Coalescence
          uses Draconic Resonance or Slam Dunk.</p><hr /><p>Absorbing the
          opposing magical energies of both Ashgut and Fjordcarver, the polarity
          of the Coalescence is inverted.</p><p>The attunement of the
          Coalescence changes (Or is set to a value of its choice if this
          ability is triggered by rolling Initiative), and it teleports to the
          middle of the arena, 35 feet away from the dragon it attuned itself to
          (As long as neither Ashgut nor Fjordcarver move, this places the
          Coalescence at the center of the arena, on the side of the respective
          dragon).</p><p>The Coalescence is then immune to all effects of
          Elemental Attunement until the start of its next turn.</p><p>Whenever
          Elemental Attunement triggers, the Coalescence should be described as
          changing its looks to match the dragon it attuned itself
          to.</p><p><strong>Special</strong> When Ashgut or Fjordcarver dies,
          the Coalescence permantly sets its attumenent to whichever dragon is
          still alive, and Landwaster no longer triggers Elemental
          Attunement.</p>
        gm: ''
      publication:
        title: ''
        authors: ''
        license: OGL
        remaster: false
      rules:
        - key: RollOption
          option: attunement
          suboptions:
            - label: Ashgut
              value: ashgut
            - label: Fjordcarver
              value: fjordcarver
          alwaysActive: true
          toggleable: true
          selection: ashgut
          priority: 40
      slug: null
