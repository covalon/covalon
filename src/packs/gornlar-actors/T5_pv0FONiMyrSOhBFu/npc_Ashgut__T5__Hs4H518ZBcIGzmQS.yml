          <p data-visibility="gm"><strong>Trigger</strong> Ashgut is targeted
          with a ranged attack.</p>

          <p><strong>Effect</strong> Ashgut swipes at the projectile with her
          magmatic wings, gaining a +2 circumstance bonus to AC against the
          attack. If the attack results in a miss, it is reflected back at the
