    blurb: ''
    publicNotes: >-
      <p>The most feral and least intelligent of all the chromatic dragons,
      white dragons are brutish, predatory, and chiefly motivated by
      self-preservation. Nearly all other dragons look down on white dragons as
      hopelessly hotheaded and dull, though this does not make them any less
      dangerous-in fact, it may mean the opposite. It's nearly impossible to
      treat with white dragons, not because they lack the capacity to do so, but
      because they just don't care to. They are as difficult to deal with as
      they are quick to anger, and they become incensed at almost anything. When
      a white dragon does speak, it spews threats, inane jokes, and incoherent
      babbling as a prelude to attacking-and when the attack comes, it's bloody
      and relentless.</p>

      <p>Thankfully, white dragons prefer very cold, remote locations that are
      far from people. Dwelling on glacial mountaintops or in ice caverns
      beneath forbidding tundra, they treat the lands around them as their own
      personal hunting grounds. They fly out to feed or terrorize other
      creatures, especially those who trespass near the dragon's territory, then
      bring any treasure back to be displayed in icy niches in their lairs. They
      collect all kinds of valuables, with a slight preference for items with
      high utility-such as tools, trade goods, and fine food-over coins or
      jewels. The ability to shape ice lets white dragons rearrange their lairs
      exactly to their specifications, and they take great pride in how they've
      decorated their homes over the years.</p>

      <hr />

      <p>While there are many types of dragons, from the powerful planar dragons
      to the strange esoteric dragons, few dragon varieties are as well-known
      and as rightly feared as the chromatic dragons. Differentiated by the hue
      of their scales, each color of dragon unleashes its own flavor of
      murderous cruelty-be it by claw, tooth, or breath-and unlike most
      creatures, dragons only become more powerful as they age. Their lust for
      treasure, food, bloodshed, and control are legendary. Physically powerful
      with egos to match, these dragons are often morally depraved and act as
      criminal masterminds, vicious tyrants, or voracious raiders.</p>
