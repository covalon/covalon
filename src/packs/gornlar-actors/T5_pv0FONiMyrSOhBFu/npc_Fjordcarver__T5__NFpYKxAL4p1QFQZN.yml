    system:
      description:
        gm: ''
        value: "<p>A localized blizzard follows Fjordcarver wherever he goes, which harries flying enemies. While Fjordcarver is alive, all other flying creatures in the arena must succeed at a @Check[type:acrobatics|dc:33|basic:false] check to Maneuver in Flight whenever they attempt to Fly. If the creature is not trained or better in Acrobatics, they automatically crit fail.</p><p><strong>Critical Success\_</strong>The creature can fly normally.</p><p><strong>Success\_</strong>The creature can fly at half speed.</p><p><strong>Failure\_</strong>The creature doesn't fly, and wastes the action.</p><p><strong>Critical Failure\_</strong>The creature falls.</p><p>Additionally, the battering snow makes it difficult to move one's arms. Flying and air-walking creatures in the blizzard take a -2 circumstance penalty to Strikes and must succeed at a <span style=\"font-family:var(--font-primary)\">@Check[type:flat|dc:5|basic:false] when attempting any action with the manipulate trait. On a failure, the action is lost.</span></p>"
      rules: []
