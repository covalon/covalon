      description:
        value: >-
          <p><strong>Requirements</strong> The dragon doesn't have a creature
          impaled on their horn</p>

          <hr />

          <p><strong>Effect</strong> The dragon attempts to gore a foe. They
          Stride, then attempt a horn Strike. On a hit, the target becomes
          impaled on the dragon's horn. The creature is
          @UUID[Compendium.pf2e.conditionitems.Item.kWc1fhmv9LBiTuei]{Grabbed}
          while on the horn (and can attempt to
          @UUID[Compendium.pf2e.actionspf2e.Item.SkZAQRkLLkmBQNB9]{Escape} as
          normal). The dragon doesn't need to use additional actions to keep the
          impaled creature grabbed. If the dragon moves, they bring the grabbed
          creature along with them.</p>
