    img: icons/magic/fire/flame-burning-earth-orange.webp
    name: Produce Flame
    sort: 0
    system:
      description:
        gm: ''
        value: >-
          <p>A small ball of flame appears in the palm of your hand, and you
          lash out with it either in melee or at range. Make a spell attack roll
          against your target's AC. This is normally a ranged attack, but you
          can also make a melee attack against a creature in your unarmed
          reach.</p>

          <p>On a success, you deal 2d4 fire damage. On a critical success, the
          target takes double damage and
          @Damage[(@item.level)d4[persistent,fire]] damage.</p>

          <hr />

          <p><strong>Heightened (+1)</strong> Increase the damage by 1d4 and the
          persistent damage on a critical hit by 1d4.</p>
