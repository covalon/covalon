  - img: icons/magic/water/snowflake-ice-blue-white.webp
    name: Personal Blizzard
    system:
      description:
        gm: ''
        value: >-
          <p>Your breath becomes blizzard of obscuring, scouring ice that
          follows your target. The target attempts a Fortitude save.</p><hr
          /><p><strong>Critical Success</strong> The target is
          unaffected.</p><p><strong>Success</strong> The target takes
          @Damage[4d10[cold]] damage, and the spell
          ends.</p><p><strong>Failure</strong> The target takes
          @Damage[4d10[cold]] damage and @Damage[4d10[persistent,cold]] damage.
          The persistent damage automatically ends when the spell ends. It is
          @UUID[Compendium.pf2e.conditionitems.Item.DmAIPqOBomZ7H95W]{Concealed}
          to other creatures, and other creatures are concealed to
          it.</p><p><strong>Critical Failure</strong> As failure, but both the
          cold damage and the persistent cold damage increase to
          @Damage[6d10[cold]] and @Damage[6d10[persistent,cold]].</p>
      rules: []
      slug: personal-blizzard
