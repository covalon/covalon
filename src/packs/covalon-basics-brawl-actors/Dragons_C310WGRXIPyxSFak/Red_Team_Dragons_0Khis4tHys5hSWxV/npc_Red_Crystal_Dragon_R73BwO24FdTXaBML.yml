  - img: systems/pf2e/icons/actions/FreeAction.webp
    name: Crystallize Flesh
    sort: 1600000
    system:
      actionType:
        value: free
      actions:
        value: null
      category: offensive
      description:
        value: >-
          <p><strong>Trigger</strong> The crystal dragon damages a creature made
          of flesh with a jaws Strike</p><p><strong>Frequency</strong> once per
          life</p><hr /><p><strong>Effect</strong> The dragon embeds
          transformative crystals in the creature's flesh. The creature must
          attempt a @Check[fortitude|dc:32] save.</p><hr /><p><strong>Critical
          Success</strong> The target is
          unaffected.</p><p><strong>Success</strong> The target is
          @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed 1}
          for 1 round as portions of its flesh turn
          crystalline.</p><p><strong>Failure</strong> The target is
          @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed 1}
          and must attempt a Fortitude save at the end of each of its turns;
          this ongoing save has the incapacitation trait. On a failed save, the
          slowed condition value increases by 1 (or by 2 on a critical failure).
          A successful save reduces the slowed condition value by 1. A creature
          unable to act due to the slowed condition from Crystallize Flesh is
          @UUID[Compendium.pf2e.conditionitems.Item.dTwPJuKgBQCMxixg]{Petrified}
          permanently, transforming into a crystalline statue. The effect ends
          if the creature is petrified or the slowed condition is
          removed.</p><p><strong>Critical Failure</strong> As failure, but the
          target is initially
          @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed
          2}.</p>
        gm: ''
