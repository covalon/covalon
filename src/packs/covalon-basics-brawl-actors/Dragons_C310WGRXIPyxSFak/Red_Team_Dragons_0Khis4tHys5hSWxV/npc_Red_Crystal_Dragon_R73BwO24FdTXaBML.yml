    img: systems/pf2e/icons/spells/glitterdust.webp
    name: Glitterdust
    sort: 0
    system:
      description:
        gm: ''
        value: >-
          <p>Creatures in the area are outlined by glittering dust. Each
          creature must attempt a Reflex save. If a creature has its
          invisibility negated by this spell, it is
          @UUID[Compendium.pf2e.conditionitems.Item.DmAIPqOBomZ7H95W]{Concealed}
          instead of
          @UUID[Compendium.pf2e.conditionitems.Item.zJxUflt9np0q4yML]{Invisible}.
          This applies both if the creature was already Invisible and if it
          benefits from new invisibility effects before the end of the
          invisibility negation effect from this spell.</p>

          <hr />

          <p><strong>Critical Success</strong> The target is unaffected.</p>

          <p><strong>Success</strong> The target's invisibility is negated for 2
          rounds.</p>

          <p><strong>Failure</strong> The target is
          @UUID[Compendium.pf2e.conditionitems.Item.TkIyaNPgTZFBCCuh]{Dazzled}
          for 1 minute and its invisibility is negated for 1 minute.</p>

          <p><strong>Critical Failure</strong> The target is
          @UUID[Compendium.pf2e.conditionitems.Item.XgEqL1kFApUbl5Z2]{Blinded}
          for 1 round and Dazzled for 10 minutes. Its invisibility is negated
          for 10 minutes.</p>
