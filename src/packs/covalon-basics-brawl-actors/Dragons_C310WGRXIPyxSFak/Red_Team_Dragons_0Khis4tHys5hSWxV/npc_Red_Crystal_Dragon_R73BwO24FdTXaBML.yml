  - img: icons/magic/air/air-wave-gust-blue.webp
    name: Slashing Gust
    system:
      description:
        gm: ''
        value: >-
          <p>You slash your hand through the air, channeling miniature ripples
          of air from each finger to slice your enemy. If you have two hands
          free, you can target two creatures with this spell; otherwise, you
          target one.</p>

          <p>Make a spell attack roll against each target's AC. This deals 2d4
          slashing damage. On a critical success, a target also takes
          @Damage[(@item.level)d4[bleed]] damage. If you're attacking two
          creatures, this counts as two attacks for your multiple attack
          penalty, but the penalty doesn't increase until after both
          attacks.</p><hr /><p><strong>Critical Success</strong> The target
          takes double damage and 1d4 persistent bleed damage.</p>

          <p><strong>Success</strong> The target takes full damage.</p><hr
          /><p><strong>Heightened (+1)</strong> The damage increases by 1d4, and
          the persistent damage on a critical hit increases by 1d4.</p>
