    img: systems/pf2e/icons/spells/searing-light.webp
    name: Holy Light
    sort: 0
    system:
      description:
        gm: ''
        value: >-
          <p>You shine a blazing ray of light tinged with holy energy. Make a
          ranged spell attack. The ray deals 5d6 fire damage. If the target has
          the unholy trait, you deal an extra 5d6 spirit damage.</p>

          <hr />

          <p><strong>Critical Success</strong> The target takes double
          damage.</p>

          <p><strong>Success</strong> The target takes full damage.</p>

          <p>If the light passes through an area of magical darkness or targets
          a creature affected by magical darkness, holy light attempts to
          counteract the darkness. If you need to determine whether the light
          passes through an area of darkness, draw a line between yourself and
          the spell's target.</p>

          <hr />

          <p><strong>Heightened (+1)</strong> The fire damage increases by 2d6,
          and the spirit damage against unholy creatures increases by 2d6.</p>
      rules:
        - damageType: spirit
          diceNumber: (@spell.level*2)-1
          dieSize: d6
