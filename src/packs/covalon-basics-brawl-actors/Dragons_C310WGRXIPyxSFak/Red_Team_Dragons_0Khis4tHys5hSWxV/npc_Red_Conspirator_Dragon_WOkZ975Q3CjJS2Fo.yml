  - img: systems/pf2e/icons/spells/unexpected-transposition.webp
    name: Unexpected Transposition
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Trigger</strong> You are targeted with an enemy's
          Strike.</p>

          <hr />

          <p>When attacked, you attempt to quickly swap your own position with
          that of another creature. A creature that is unwilling to swap places
          with you must attempt a Will save. Willing creatures automatically
          fail. If you successfully switch places with the target, the
          triggering attack is resolved against that creature as if it had been
          the original target of the attack. After the swap, you and the target
          are both temporarily immune to unexpected transposition spells for 1
          minute. You automatically switch places if the target is willing. If
          it's unwilling, it can attempt a Will save. Neither of you teleports
          if the target succeeds at its save.</p>
