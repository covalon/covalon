  - img: systems/pf2e/icons/default-icons/action.svg
    name: Conjure Disguise
    sort: 1400000
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: offensive
      description:
        value: >-
          <p><strong>Special</strong> The conspirator dragon spawns in Humanoid
          Form. While in Humanoid Form the conspirator dragon can strike with
          Poisoned Dagger and Psychic Warp.</p><hr /><p><strong>Effect</strong>
          The dragon conjures a perfect flesh-suit replica of a humanoid they've
          seen of their size or smaller and compresses themself into it, along
          with generating appropriate clothing for the humanoid. Once the
          process is complete, the dragon can remain in this disguise
          indefinitely.</p><p>If the dragon is critically hit while wearing the
          disguise, the suit is destroyed and immediately explodes. This has the
          effects of Detonate Disguise, except that creatures use the outcome
          one degree of success better than they rolled on their save.</p>
        gm: ''
      publication:
        license: ORC
        remaster: true
        title: ''
        authors: ''
      rules:
