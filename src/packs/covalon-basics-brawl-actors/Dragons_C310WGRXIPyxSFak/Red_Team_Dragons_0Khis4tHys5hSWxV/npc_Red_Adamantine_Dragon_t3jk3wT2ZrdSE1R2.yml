          1}, and is
          @UUID[Compendium.pf2e.conditionitems.Item.9PR9y0bi4JPKnHPR]{Deafened}
          for 1 round.</p>

          <p><strong>Critical Failure</strong> The target takes double damage,
          is
          @UUID[Compendium.pf2e.conditionitems.Item.fesd1n5eVhpCSS18]{Sickened
          2}, and is deafened for 1 minute.</p>

          <hr />

          <p><strong>Heightened (+1)</strong> The damage increases by 2d6.</p>
