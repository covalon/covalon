        value: >-
          <p>You send powerful sound waves through an opponent's body, vibrating
          its bones and internal organs painfully. The creature takes 8d6 sonic
          damage and must attempt a Fortitude save.</p>

          <hr />

          <p><strong>Critical Success</strong> The target is unaffected.</p>

          <p><strong>Success</strong> The target takes half damage.</p>

          <p><strong>Failure</strong> The target takes full damage, is
