    level:
      value: 6
    blurb: ''
    publicNotes: >-
      <p>Naiads protect streams, ponds, springs, and other natural bodies of
      fresh water. While most naiads lead solitary lives close to their chosen
      home, sometimes they congregate in coven-like groups where river
      tributaries meet, performing great magic and blessing the waters of the
      land. Because naiads' bonds to their bodies of water permit more
      flexibility, they are the nymphs most likely to interact with
      humanoids—and even visit their settlements on occasion. Unlike other
      nymphs, naiads occasionally become adventurers, especially when dark
      forces seek to despoil nature or otherwise threaten the land, joining
      forces with others to prevent the corruption of the natural world.</p>

      <hr />

      <p>Nymphs are a family of fey that take the form of beautiful humanoids
      with elven features and have a deep association with the natural world.
      The most common of their kind are the dryads, which are spirits that
      embody great trees, but many other kinds of nymphs exist, including
      naiads, who watch over bodies of water. All nymphs are guardians of some
      element of nature, typically a specific tree or pond, or even-in the case
      of nymph queens-whole forests or massive bodies of water</p>
