  - img: systems/pf2e/assets/icons/spells/electrified-crystal-ward.webp
    name: Glass Shield
    system:
      description:
        gm: ''
        value: >-
          <p>You summon a layer of clear glass to keep you from harm. This
          counts as using the
          @UUID[Compendium.pf2e.actionspf2e.Item.xjGwis0uaC2305pm]{Raise a
          Shield} action, giving you a +1 cirumstance bonus to AC until the
          start of your next turn, but it doesn't require a hand to use. You can
          @UUID[Compendium.pf2e.feats-srd.Item.jM72TjJ965jocBV8]{Shield Block}
          with the glass shield. It has Hardness 2. You can use the spell's
          reaction to reduce damage from any spell or magical effect, even if it
          doesn't deal physical damage. When you Shield Block, the shield
          explodes in a shower of glass. If creature that broke it is within 5
          feet, the shards deal 1d4 piercing damage to that creature with a
          basic Reflex save. After you use Shield Block, the spell ends and you
          can't cast it again for 10 minutes.</p>

          <p>@UUID[Compendium.pf2e.spell-effects.Item.oDDS6D2KTjpbA491]{Spell
          Effect: Glass Shield}</p><hr /><p><strong>Heightened (3rd)</strong>
          The shield has Hardness 4, and the damage increases to 3d4.</p>

          <p><strong>Heightened (5th)</strong> The shield has Hardness 7, and
          the damage increases to 4d4.</p>

          <p><strong>Heightened (7th)</strong> The shield has Hardness 10, and
          the damage increases to 5d4.</p>

          <p><strong>Heightened (9th)</strong> The shield has Hardness 12, and
          the damage increases to 6d4.</p>
      rules: []
      slug: glass-shield
