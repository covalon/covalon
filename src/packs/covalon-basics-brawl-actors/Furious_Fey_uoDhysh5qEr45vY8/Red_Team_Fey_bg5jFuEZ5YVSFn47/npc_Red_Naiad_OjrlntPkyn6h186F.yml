  - img: core/icons/magic/fire/beam-jet-stream-blue.webp
    name: Spout
    system:
      description:
        gm: ''
        value: >-
          <p>Water blasts upward, coming out of the ground, rising from a pool,
          or even manifesting from thin air. Any creatures in the area take 2d4
          bludgeoning damage, with a basic Reflex saving throw. A creature that
          critically fails its save is disoriented by the explosion of water,
          becoming
          @UUID[Compendium.pf2e.conditionitems.Item.AJh5ex99aV6VTggg]{Off-Guard}
          until the end of your next turn.</p>

          <p>You can change this spell's area to a @Template[burst|distance:5],
          provided you center the burst in a body of water. This body of water
          can be as small as a pond or creek, but not as small as a puddle or
          bathtub.</p><hr /><p><strong>Heightened (+1)</strong> The damage
          increases by 1d4.</p>
