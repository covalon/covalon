  - img: core/icons/commodities/wood/fence-posts-brown.webp
    name: Splinter Volley
    system:
      description:
        gm: ''
        value: >-
          <p>You launch a volley of splinters at your foes. Make a spell attack
          roll against a single creature. On a hit, the splinters deal 4d6
          piercing damage. The splinters deal double damage on a critical hit
          and @Damage[(floor(@item.level/2))[bleed]] damage. You can spend a
          third action while casting this spell to fire splinters at two
          different targets instead of one. These attacks each increase your
          multiple attack penalty, but you don't increase your multiple attack
          penalty until after you make both spell attack rolls for <em>splinter
          volley</em>.</p><hr /><p><strong>Heightened (+2)</strong> Increase the
          damage dealt to each target by 4d6 and the persistent bleed damage by
          1.</p>
