          @UUID[Compendium.pf2e.actionspf2e.Item.SkZAQRkLLkmBQNB9]{Escape}
          against your spell DC to remove the penalty and the immobilized
          condition.</p>

          <p><strong>Success</strong> The target takes a –10-foot circumstance
