    level:
      value: 6
    blurb: ''
    publicNotes: >-
      <p>Symbols of grace and purity, unicorns resemble proud and noble horses.
      They typically have pure white coats, but they are best known for the
      single, delicate horn that extends from the center of their forehead.
      While unicorns often serve as protectors of unspoiled wilderness and
      sacred places, they are themselves highly sought after for their horns,
      which are said to possess potent magical properties. To many, the mere
      idea of hunting such a magnificent creature in the hopes of severing its
      horn is utterly reprehensible. Indeed, a dehorned unicorn is a sorry
      sight, and few such unicorns survive much longer in the wild.</p>

      <p>Unicorns are found almost exclusively in remote, unsullied areas of
      wilderness. Sometimes associated with good-aligned deities, other times
      associated with nature and the fey, unicorns are always known for their
      righteousness and nobility. They are wary, at best, of most humanoid
      creatures, due in large part to poachers' tendency to hunt them for their
      horns, but unicorns are often rumored to have a weakness for those who are
      pure of both heart and spirit. Despite some tales, unicorns are equally
      likely to recognize purity in people of all genders.</p>
