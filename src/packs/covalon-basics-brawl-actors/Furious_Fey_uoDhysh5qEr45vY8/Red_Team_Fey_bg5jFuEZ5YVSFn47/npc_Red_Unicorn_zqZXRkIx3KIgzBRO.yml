    name: Light
    sort: 500000
    system:
      description:
        gm: ''
        value: >-
          <p>You create an orb of light that sheds bright light in a 20-foot
          radius (and dim light for the next 20 feet) in a color you choose. If
          you create the light in the same space as a willing creature, you can
          attach the light to the creature, causing it to float near that
          creature as it moves. You can Sustain the spell to move the light up
          to 60 feet; you can attach or detach it from a creature as part of
          this movement.</p>

          <p>You can Dismiss the spell. If you Cast the Spell while you already
          have four <em>light</em> spells active, you must choose one of the
          existing spells to end.</p>

          <p>@UUID[Compendium.pf2e.spell-effects.Item.cVVZXNbV0nElVOPZ]{Spell
          Effect: Light}</p>

          <hr />

          <p><strong>Heightened (4th)</strong> The orb sheds light in a 60-foot
          radius (and dim light for the next 60 feet).</p>
      rules: []
