  - img: core/icons/magic/acid/dissolve-arm-flesh.webp
    name: Acid Grip
    system:
      description:
        gm: ''
        value: >-
          <p>An ephemeral, taloned hand grips the target, burning it with
          magical acid. The target takes 2d8 acid damage plus
          @Damage[floor(@item.level/2)d6[persistent,acid]] damage depending on
          its Reflex save. A creature taking persistent damage from this spell
          takes a –10-foot status penalty to its Speeds.
          @UUID[Compendium.pf2e.spell-effects.Item.6TGcfVyzzVHEo7ke]{Spell
          Effect: Acid Grip}</p><hr /><p><strong>Critical Success</strong> The
          creature is unaffected.</p>

          <p><strong>Success</strong> The creature takes half damage and no
          persistent damage, and the claw moves it up to 5 feet in a direction
          of your choice.</p>

          <p><strong>Failure</strong> The creature takes full damage and
          persistent damage, and the claw moves it up to 10 feet in a direction
          of your choice.</p>

          <p><strong>Critical Failure</strong> The creature takes double damage
          and full persistent damage, and the claw moves it up to 20 feet in a
          direction of your choice.</p><hr /><p><strong>Heightened (+2)</strong>
          The initial damage increases by 2d8, and the persistent acid damage
          increases by 1d6.</p>
