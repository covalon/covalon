  - img: systems/pf2e/assets/icons/spells/lose-the-path.webp
    name: Lose the Path
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Trigger</strong> A creature in range Strides</p>

          <hr />

          <p>You surround a moving creature with lifelike illusions, shifting
          their perception of the terrain to subtly lead them off course. The
          target must attempt a Will save. Regardless of the result, the
          creature is immune to lose the path for 1 hour.</p>

          <hr />

          <p><strong>Success</strong> The creature is unaffected.</p>

          <p><strong>Failure</strong> The creature treats all squares as
          difficult terrain for its Stride.</p>

          <p><strong>Critical Failure</strong> As failure, except that you
          determine where the target moves during the Stride, though you can't
          move it into hazardous terrain or to a place it can't stand.</p>
