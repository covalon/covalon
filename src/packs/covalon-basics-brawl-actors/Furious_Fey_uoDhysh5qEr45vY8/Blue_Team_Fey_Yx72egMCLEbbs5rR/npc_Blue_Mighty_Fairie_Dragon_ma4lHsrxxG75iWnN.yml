      details: Telepathy 100 feet
    level:
      value: 6
    blurb: ''
    publicNotes: >-
      <p>Although they are much smaller than their larger dragon cousins, fey
      dragonets have many of the same physiological attributes, including long
      necks, toothy maws, sinuous tails, and sharp claws. They flit about on
      iridescent butterfly wings, the coloring of which changes based on where
      they live, giving them a natural camouflage. Unlike their larger kin, an
      adult fey dragonet remains the same size throughout their lifespan. The
      only visual clue to the age of a fey dragonet is the sheen on their
      scales, a glimmer that becomes more lustrous the older they get.</p>

      <p>Fey dragonets usually exhibit pleasant and good-natured temperaments,
      though they have a mischievous streak that leads them to play tricks on
      those around them. In search of amusement, they prefer harmless annoyances
      over wounding malice. While often spontaneous, they may also spend months,
      if not years, planning the perfect prank. Especially responsive targets
      endear themselves to fey dragonets and may create a lifelong bond. A fey
      dragonet's reputation as a trickster leads many to associate them with
      fey, with whom the tiny dragons have cordial relationships, and this
      association gives them their name.</p>

      <p>Peaceful by nature, fey dragonets don't enjoy confrontation. If faced
      with hostility, they prefer to remain at a distance and breathe euphoric
      gas at their foes, diffusing the skirmish by creating an atmosphere of
      bliss. If conflict escalates, they target their opponents with spells,
      using their renowned trickery to escape. If their companions are in
      danger, however, their desire to remain out of combat changes. Fey
      dragonets protect their friends by any means available, including physical
      combat.</p>

      <p>Sometimes, as fey dragonets grow older, their connection to the First
      World grows stronger. In addition to growing more lustrous and vibrant in
      appearance, these fey dragonets gain an increasing amount of magical
      primal power. Such fey dragonets increase in strength as appropriate—a fey
      dragonet of 20th level or even higher is possible, but it's exceptionally
      unusual to encounter a fey dragonet of 9th level or higher beyond the most
      remote regions of the First World. When creating a more powerful fey
      dragonet, change their spellcasting tradition to primal and grant them
      primal spells appropriate for a druid of their level. Fey dragonets don't
      grow much larger, regardless of how powerful they become. It's often
      difficult to tell how powerful one of these tiny dragons truly is at a
      glance!</p>
    privateNotes: ''
