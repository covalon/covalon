    system:
      description:
        gm: ''
        value: >-
          <p>You conjure grease, choosing an area or target.</p>

          <ul>

          <li><strong>Area</strong> <strong>[4 contiguous 5-foot
          squares]</strong> All solid ground in the area is covered with grease.
          Each creature standing on the greasy surface must succeed at a Reflex
          save or an Acrobatics check against your spell DC or fall
          @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone}.
          Creatures using an action to move onto the greasy surface during the
          spell's duration must attempt either a Reflex save or an Acrobatics
          check to
          @UUID[Compendium.pf2e.actionspf2e.Item.M76ycLAqHoAgbcej]{Balance}. A
          creature that Steps or Crawls doesn't have to attempt a check or
          save.</li>

          <li><strong>Target</strong> <strong>[1 object of Bulk 1 or
          less]</strong> If you Cast the Spell on an unattended object, anyone
          trying to pick up the object must succeed at an Acrobatics check or
          Reflex save against your spell DC to do so. If you target an attended
          object, the creature that has the object must attempt an Acrobatics
          check or Reflex save. On a failure, the holder or wielder takes a –2
          circumstance penalty to all checks that involve using the object; on a
          critical failure, the holder or wielder releases the item. The object
          lands in an adjacent square of the GM's choice. If you Cast this Spell
          on a worn object, the wearer gains a +2 circumstance bonus to
          Fortitude saves against attempts to grapple them.</li>

          </ul>
