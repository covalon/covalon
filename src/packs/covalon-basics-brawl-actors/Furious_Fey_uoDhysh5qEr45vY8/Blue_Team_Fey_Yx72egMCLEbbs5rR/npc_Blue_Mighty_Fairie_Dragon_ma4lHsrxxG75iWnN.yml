    name: Prestidigitation
    sort: 800000
    system:
      description:
        gm: ''
        value: >-
          <p>The simplest magic does your bidding. You can perform simple
          magical effects for as long as you Sustain the spell. Each time you
          Sustain the spell, you can choose one of four options.</p>

          <ul>

          <li><strong>Cook</strong> Cool, warm, or flavor 1 pound of nonliving
          material.</li>

          <li><strong>Lift</strong> Slowly lift an unattended object of light
          Bulk or less 1 foot off the ground.</li>

          <li><strong>Make</strong> Create a temporary object of negligible
          Bulk, made of congealed magical substance. The object looks crude and
          artificial and is extremely fragile-it can't be used as a tool,
          weapon, or locus or cost for a spell.</li>

          <li><strong>Tidy</strong> Color, clean, or soil an object of light
          Bulk or less. You can affect an object of 1 Bulk with 10 rounds of
          concentration, and a larger object a 1 minute per Bulk.</li>

          </ul>

          <p><em>Prestidigitation</em> can't deal damage or cause adverse
          conditions. Any actual change to an object (beyond what is noted
          above) persists only as long as you Sustain the spell.</p>
      rules: []
      slug: prestidigitation
