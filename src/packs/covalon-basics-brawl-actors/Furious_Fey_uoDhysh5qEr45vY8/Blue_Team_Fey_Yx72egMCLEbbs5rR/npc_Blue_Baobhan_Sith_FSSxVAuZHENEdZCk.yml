        value: 1
      category: offensive
      description:
        value: >-
          <p><strong>Requirements</strong> A bleeding creature is within the
          baobhan sith's reach</p><hr /><p><strong>Effect</strong> The baobhan
          sith tries to Drink the Blood from the bleeding creature's wounds. The
          baobhan sith attempts an @Check[athletics|defense:fortitude] check
          against the victim's Fortitude DC. On a success, the victim becomes
          @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained 1}
          and the baobhan sith regains @Damage[10[healing]] HP, gaining any Hit
          Points in excess of their maximum Hit Points as temporary Hit
          Points.</p><p>Drinking Blood from a victim that's already drained
          doesn't restore any Hit Points to the baobhan sith but increases the
          victim's drained value by 1.</p>
