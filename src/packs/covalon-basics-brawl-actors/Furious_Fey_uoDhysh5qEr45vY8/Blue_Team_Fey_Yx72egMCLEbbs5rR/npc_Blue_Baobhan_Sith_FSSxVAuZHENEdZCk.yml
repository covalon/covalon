  - _id: fxZztiCJybeYYeOI
    img: systems/pf2e/assets/icons/actions/TwoActions.webp
    name: Captivating Dance
    sort: 400000
    system:
      actionType:
        value: action
      actions:
        value: 2
      category: offensive
      description:
        value: >-
          <p>The baobhan sith sways rhythmically and Strides up to their Speed.
          Each enemy creature within 30 feet of the baobhan sith at the end of
          their movement must attempt a @Check[will|dc:24] save. No matter the
          result of the save, the creature is then immune to Captivating Dance
          until they die.</p><hr /><p><strong>Critical Success</strong> The
          creature is unaffected.</p><p><strong>Success</strong> The creature is
          @UUID[Compendium.pf2e.conditionitems.Item.AJh5ex99aV6VTggg]{Off-Guard}
          for 1 round.</p><p><strong>Failure</strong> The creature is
          @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed 1}
          until it ends a turn adjacent to the Baobhan Sith, or the Baobhan Sith
          dies.</p><p><strong>Critical Failure</strong> As failure, but the
          creature is also
          @UUID[Compendium.pf2e.conditionitems.Item.AJh5ex99aV6VTggg]{Off-Guard}
          while it is
          @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed
          1}.</p>
