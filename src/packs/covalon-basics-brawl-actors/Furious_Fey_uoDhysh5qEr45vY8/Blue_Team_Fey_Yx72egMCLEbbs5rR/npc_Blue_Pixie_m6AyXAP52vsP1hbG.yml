    name: Revealing Light
    sort: 350000
    system:
      description:
        gm: ''
        value: >-
          <p>A wave of magical light washes over the area. You choose the
          appearance of the light, such as colorful, heatless flames or
          sparkling motes. A creature affected by <em>revealing light</em> is
          @UUID[Compendium.pf2e.conditionitems.Item.TkIyaNPgTZFBCCuh]{Dazzled}.
          If the creature was
          @UUID[Compendium.pf2e.conditionitems.Item.zJxUflt9np0q4yML]{Invisible},
          it becomes
          @UUID[Compendium.pf2e.conditionitems.Item.DmAIPqOBomZ7H95W]{Concealed}
          instead. If the creature was already concealed for any other reason,
          it is no longer concealed.</p>

          <hr />

          <p><strong>Critical Success</strong> The target is unaffected.</p>

          <p><strong>Success</strong> The light affects the creature for 2
          rounds.</p>

          <p><strong>Failure</strong> The light affects the creature for 1
          minute.</p>

          <p><strong>Critical Failure</strong> The light affects the creature
          for 10 minutes.</p>
