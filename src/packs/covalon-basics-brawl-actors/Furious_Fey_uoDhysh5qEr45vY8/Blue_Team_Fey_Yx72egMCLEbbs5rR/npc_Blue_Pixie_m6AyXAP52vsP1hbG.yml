    name: Shield
    sort: 1000000
    system:
      description:
        gm: ''
        value: >-
          <p>You raise a magical shield of force. This counts as using the Raise
          a Shield action, giving you a +1 circumstance bonus to AC until the
          start of your next turn, but it doesn't require a hand to use.</p>

          <p>While the spell is in effect, you can use the
          @UUID[Compendium.pf2e.feats-srd.Item.jM72TjJ965jocBV8]{Shield Block}
          reaction with your magic shield. The shield has Hardness 5. You can
          use the spell's reaction to reduce damage from any spell or magical
          effect, even if it doesn't deal physical damage. After you use Shield
          Block, the spell ends and you can't cast it again for 10 minutes.</p>

          <p>@UUID[Compendium.pf2e.spell-effects.Item.Jemq5UknGdMO7b73]{Spell
          Effect: Shield}</p>

          <p>@UUID[Compendium.pf2e.spell-effects.Item.QF6RDlCoTvkVHRo4]{Effect:
          Shield Immunity}</p>

          <hr />

          <p><strong>Heightened (+2)</strong> The shield's Hardness increases by
          5.</p>
