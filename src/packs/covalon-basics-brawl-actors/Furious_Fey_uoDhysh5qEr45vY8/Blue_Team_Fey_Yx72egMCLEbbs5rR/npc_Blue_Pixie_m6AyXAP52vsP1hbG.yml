    name: Figment
    sort: 700000
    system:
      description:
        gm: ''
        value: >-
          <p>You create a simple illusory sound or vision. A sound adds the
          auditory trait to the spell and the sound can't include intelligible
          words or elaborate music. A vision adds the visual trait, can be no
          larger than a 5-foot cube, and is clearly crude and undetailed if
          viewed from within 15 feet. When you Cast or Sustain the Spell, you
          can attempt to
          @UUID[Compendium.pf2e.actionspf2e.Item.GkmbTGfg8KcgynOA]{Create a
          Diversion} with the illusion, gaining a +2 circumstance bonus to your
          Deception check. If the attempt fails against a creature, that
          creature disbelieves the <em>figment</em>.</p>

          <p>@UUID[Compendium.pf2e.spell-effects.Item.2Hg3a06gZCSnUgSA]{Spell
          Effect: Figment}</p>
