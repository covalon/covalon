    name: Invisibility
    sort: 400000
    system:
      description:
        gm: ''
        value: >-
          <p>Illusions bend light around the target, rendering it
          @UUID[Compendium.pf2e.conditionitems.Item.zJxUflt9np0q4yML]{Invisible}.
          This makes it
          @UUID[Compendium.pf2e.conditionitems.Item.VRSef5y1LmL2Hkjf]{Undetected}
          to all creatures, though the creatures can attempt to find the target,
          making it
          @UUID[Compendium.pf2e.conditionitems.Item.iU0fEDdBp3rXpTMC]{Hidden} to
          them instead. If the target uses a hostile action, the spell ends
          after that hostile action is completed.</p>

          <hr />

          <p><strong>Heightened (4th)</strong> The spell lasts 1 minute, but it
          doesn't end if the target uses a hostile action.</p>
