    blurb: ''
    publicNotes: >-
      <p>Insatiably curious, overly excitable, and just a bit puckish, pixies
      are wanderers and tricksters who use their pixie dust to create all sorts
      of whimsical situations, as well as to defend themselves. They take great
      pride in their skill at archery, even when not using their arrows to
      deliver magical ailments. They often practice by shooting drops of dew or
      severing vines and hairs. Other creatures often have trouble understanding
      a pixie's rapid, rambling way of speaking.</p>

      <hr />

      <p>Elusive, flighty, and ebullient, sprites are what many villagers first
      imagine when they hear the terms "fey" or "fairy." While their
      dispositions vary, all sprites share a connection to magic and a
      diminutive size. This family of fey shares its name with its slightest and
      most populous member, the common sprite.</p>
