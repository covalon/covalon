  - img: systems/pf2e/assets/icons/spells/cutting-insult.webp
    name: Cutting Insult
    system:
      description:
        gm: ''
        value: >-
          <p>You utter an insult so offensive that it cuts your target to the
          quick. Your target takes @Damage[4d6[mental]] damage and 1 persistent
          bleed damage and must attempt a Will save.</p>

          <hr />

          <p><strong>Critical Success</strong> The creature is unaffected.</p>

          <p><strong>Success</strong> The creature takes half mental damage but
          no persistent bleed damage, and it becomes
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          1}.</p>

          <p><strong>Failure</strong> The creature takes full mental damage and
          full persistent bleed damage, and it becomes
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          2}.</p>

          <p><strong>Critical Failure</strong> The creature takes double mental
          damage and double persistent bleed damage, and becomes
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          3}.</p>

          <hr />

          <p><strong>Heightened (+2)</strong> The mental damage increases by
          4d6, and the bleed damage increases by 1.</p>
