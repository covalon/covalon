  - img: systems/pf2e/assets/icons/spells/command.webp
    name: Command
    system:
      description:
        gm: ''
        value: >-
          <p>You shout a command that's hard to ignore. You can command the
          target to approach you, run away (as if it had the
          @UUID[Compendium.pf2e.conditionitems.Item.sDPxOjQ9kx2RZE8D]{Fleeing}
          condition), release what it's holding, drop
          @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone}, or
          stand in place. It can't
          @UUID[Compendium.pf2e.actionspf2e.Item.A72nHGUtNXgY5Ey9]{Delay} or
          take any reactions until it has obeyed your command. The effects
          depend on the target's Will save.</p>

          <hr />

          <p><strong>Success</strong> The creature is unaffected.</p>

          <p><strong>Failure</strong> For the first action on its next turn, the
          creature must use a single action to do as you command.</p>

          <p><strong>Critical Failure</strong> The target must use all its
          actions on its next turn to obey your command.</p>

          <hr />

          <p><strong>Heightened (5th)</strong> You can target up to 10
          creatures.</p>
