  - img: core/icons/skills/ranged/bullets-triple-ball-yellow.webp
    name: Telekinetic Projectile
    system:
      description:
        gm: ''
        value: >-
          <p>You hurl a loose, unattended object that is within range and that
          has 1 Bulk or less at the target. Make a spell attack roll against the
          target. If you hit, you deal 2d6 bludgeoning, piercing, or slashing
          damage—as appropriate for the object you hurled. No specific traits or
          magic properties of the hurled item affect the attack or the
          damage.</p>

          <hr />

          <p><strong>Critical Success</strong> You deal double damage.</p>

