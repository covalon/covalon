      details: ''
    level:
      value: 6
    blurb: ''
    publicNotes: >-
      <p>To a satyr, life is a party and everyone is invited. Notorious for
      their hedonism, these fey believe there's no greater beauty than can be
      found in song, drink, indulgent meals, and carnal pleasures. Satyrs use
      their enchanting songs and natural charm to encourage all manner of people
      to follow their true desires and free themselves from society's rules.
      This usually involves enticing mortals to join raucous parties or engage
      in trysts in moonlit glades. If a potential companion rejects a satyr's
      advances, however, the satyr has little interest in continuing a
      conversation and goes off to find more amenable revelers.</p>

      <p>The lifestyle of a satyr leaves no room for ongoing affairs or
      long-term friends. Once his party is over or his lust is satiated, the
      satyr disappears back into the forest. The offspring satyrs leave behind
      are satyrs themselves, and they usually end up being taken from their
      cradles by other fey rather than left in mortals' care. Satyrs are always
      male.</p>

      <p>The untouched beauty of the forest is sacred and precious to a satyr.
      Brutish intruders who clear-cut trees or massacre animals without eating
      them risk drawing a satyr's ire. A satyr so provoked uses his spells to
      undermine foes and attempts to dispatch them either with brutal ambushes
      or by leading a rush of forest animals to attack.</p>

      <p>Other fey, particularly more benevolent fey, look upon satyrs as
      loutish, embarrassing cousins. They're rarely hostile toward satyrs, but
      most find them insufferable and advise any mortals they like to steer
      clear of satyrs' glades.</p>
    privateNotes: ''
    publication:
      title: Pathfinder Monster Core
      authors: ''
      license: ORC
