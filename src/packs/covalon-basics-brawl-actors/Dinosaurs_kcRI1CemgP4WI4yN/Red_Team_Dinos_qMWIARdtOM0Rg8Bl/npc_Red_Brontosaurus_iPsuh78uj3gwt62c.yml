      actions:
        value: 2
      category: offensive
      description:
        value: >-
          <p>The brontosaurus makes a tail Strike and compares the attack roll
          to the AC of up to three foes, each of whom must be within its tail's
          melee reach and adjacent to at least one other target. It rolls damage
          only once and applies it to each creature hit.</p>

          <p>A Tail Sweep counts as two attacks for its multiple attack
          penalty.</p>
