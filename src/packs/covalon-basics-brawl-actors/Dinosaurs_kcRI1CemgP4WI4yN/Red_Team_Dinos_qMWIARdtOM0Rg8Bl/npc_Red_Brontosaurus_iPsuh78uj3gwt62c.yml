    level:
      value: 10
    blurb: ''
    publicNotes: >-
      <p>Brontosauruses are truly gigantic behemoths, herbivores large enough to
      be unafraid of all but the most massive predators. Brontosauruses have
      stout bodies and long, sinuous necks and tails. Although their feet are
      capable of crushing entire buildings, these herbivores are generally
      considerate of where they step.</p>

      <hr />

      <p>Remnants from the world's primeval era, these enormous reptilian
      animals still exist in large numbers in remote wildernesses or underground
      in magical Darklands caverns. Lizardfolk, orcs, giants, and other
      humanoids who live near dinosaurs use the animals as mounts, guards, or
      hunting beasts. Occasionally, rich nobles will collect dinosaurs to
      display them in menageries, which almost inevitably leads to cast-offs
      being nursed back to health by druids and other champions of nature. When
      dinosaurs establish themselves in regions outside their normal habitats,
      it's often the result of a large collection being released.</p>
