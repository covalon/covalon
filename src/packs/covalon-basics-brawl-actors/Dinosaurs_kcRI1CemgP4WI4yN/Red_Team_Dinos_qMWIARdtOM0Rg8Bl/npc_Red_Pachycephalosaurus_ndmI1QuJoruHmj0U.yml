          <p><strong>Trigger</strong> The pachycephalosaurus damages a Medium or
          smaller (or a fucking dinosaur) foe with its skull Strike</p><hr
          /><p><strong>Effect</strong> The pachycephalosaurus digs in and flings
          its head up, shoving its foe away. It attempts an
          @Check[athletics|defense:fortitude] check against the target's
          Fortitude DC.</p><hr /><p><strong>Critical Success</strong> The
          pachycephalosaurus pushes the opponent up to 10 feet away from itself
          and knocks the target
          @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone}.</p><p><strong>Success</strong>
