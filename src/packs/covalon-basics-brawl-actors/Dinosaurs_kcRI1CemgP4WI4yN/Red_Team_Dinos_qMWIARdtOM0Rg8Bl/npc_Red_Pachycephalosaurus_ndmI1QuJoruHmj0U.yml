          feet.</p><p><strong>Failure</strong> The pachycephalosaurus fails to
          push the opponent.</p><p><strong>Critical Failure</strong> As failure,
          but the failed attempt leaves the pachycephalosaurus
          @UUID[Compendium.pf2e.conditionitems.Item.AJh5ex99aV6VTggg]{Off-Guard}
