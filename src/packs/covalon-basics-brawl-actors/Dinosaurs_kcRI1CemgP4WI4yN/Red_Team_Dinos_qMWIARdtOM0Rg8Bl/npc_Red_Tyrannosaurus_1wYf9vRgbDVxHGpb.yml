      description:
        value: >-
          <p><strong>Requirements</strong> A creature is
          @UUID[Compendium.pf2e.conditionitems.Item.kWc1fhmv9LBiTuei]{Grabbed}
          in the tyrannosaurus's jaws</p>

          <hr />

          <p><strong>Effect</strong> The tyrannosaurus flings the creature into
          the air up to 10 feet up from its mouth and 20 feet away. The creature
          falls 25 feet (assuming the tyrannosaurus flings it as high as it can)
          and takes falling damage accordingly. If the flung creature lands on
          another creature, the creature it lands on takes the same amount of
          bludgeoning damage. The creature being landed on can attempt a
          @Check[reflex|dc:23|basic] save.</p>
