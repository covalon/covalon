    blurb: ''
    publicNotes: >-
      <p>Triceratopses are muscular quadrupeds with powerful short legs, thick
      necks, and heads crowned by a wide, bony frill. Though they bear three
      large horns, they use these bony protrusions only to defend themselves or
      fight for dominance. Short-tempered and obstinate, triceratopses are
      unlikely to back down from a fight unless they are hopelessly outmatched,
      and the creatures are known to fight to the death for no apparent reason
      beyond stubbornness. Triceratopses often serve as mounts for humanoids,
      particularly giants, who can comfortably ride behind the dinosaurs'
      protective bone frills. A triceratops is 30 feet long and weighs as much
      as 10 tons.</p>

      <hr />

      <p>Remnants from the world's primeval era, these enormous reptilian
      animals still exist in large numbers in remote wildernesses or underground
      in magical Darklands caverns. Lizardfolk, orcs, giants, and other
      humanoids who live near dinosaurs use the animals as mounts, guards, or
      hunting beasts. Occasionally, rich nobles will collect dinosaurs to
      display them in menageries, which almost inevitably leads to cast-offs
      being nursed back to health by druids and other champions of nature. When
      dinosaurs establish themselves in regions outside their normal habitats,
      it's often the result of a large collection being released.</p>
