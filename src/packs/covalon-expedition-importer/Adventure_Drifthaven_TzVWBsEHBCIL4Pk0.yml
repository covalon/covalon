      - type: action
        img: systems/pf2e/icons/default-icons/action.svg
        name: Two Steps Ahead
        system:
          description:
            gm: ''
            value: >-
              <p>Lich Faltyr has a number of contingencies at his disposal to
              prevent any unwelcome circumstances from befalling him. Before the
              fight, choose one contingency that Lich Faltyr has prepared. A
              contingency ability can only be used once.</p>

