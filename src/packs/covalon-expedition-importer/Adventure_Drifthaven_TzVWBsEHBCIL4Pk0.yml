      - type: action
        img: systems/pf2e/icons/default-icons/action.svg
        name: Icon of Death
        system:
          description:
            gm: >-
              <p>If the players successfully use the B.F.C. on the colossus, be
              sure to inform them that it's now possible to climb it, and that
              it would give them easier access to attacking the zombie's
              heart.</p>
            value: >-
              <p>The zombie colossus is so massive and its flesh is so dense
              that it is immune to all damage. If the zombie colossus is
              targeted with a Strike from a hacked B.F.C., the Strike
              automatically succeeds, the colossus loses its immunity to damage,
              and the hacked B.F.C. is destroyed after the Strike resolves.</p>

              <p>The impact from the weapon ruptures the colossus's body; new
              scars and protruding bones can be used as handholds for climbing
              creatures. A creature who spends two actions and succeeds at a
              @Check[type:athletics|dc:30] check can climb to a position that
              allows them to access the colossus's heart. The zombie colossus
              has weakness 13 to all damage from creatures in this position.</p>

              <p>The zombie colossus can remove a climbing creature by using the
              Shove action (or by hitting with Slab of Flesh and using the
              Improved Push ability). Creatures who are pushed off of the zombie
              colossus fall 20 ft.</p>
          rules: []
