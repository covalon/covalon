        name: 'Drifthaven Mission A: Find The Soul Cages'
        type: text
        _id: JZzvFudoeF2xbHGe
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3>Hook</h3><p>Scouts report clusters of undead surrounding a fortified bone fort, likely guarding one of numerous important defenses. Adventurers are tasked with sneaking into a fortress area to locate and destroy a Soul Cage and flee before reinforcements arrive.</p><h3>Required Elements</h3><ol><li><p>The first encounter is a series of <strong>six</strong> <strong>#DC+2# </strong>skill checks to sneak past a Soul Cage's defenses. <strong>Two</strong> adventurers roll for each obstacle, and <strong>both</strong> must succeed their check or fail the obstacle. One player can attempt to Follow the Expert for each of these checks.</p><p>If the players fail checks against <strong>three</strong> obstacles, they enter a <strong>moderate combat encounter with 20 additional experience</strong> in its budget.</p><table><tbody><tr><td data-colwidth=\"270\"><p>Event</p></td><td><p>Applicable Skills</p></td></tr><tr><td data-colwidth=\"270\"><p>Scouting the Area in advance</p></td><td><p>Perception</p></td></tr><tr><td data-colwidth=\"270\"><p>Sneaking up to the fortified area</p></td><td><p>Stealth</p></td></tr><tr><td data-colwidth=\"270\"><p>Covering your tracks</p></td><td><p>Survival, Nature</p></td></tr><tr><td data-colwidth=\"270\"><p>Disarming traps at the outskirts of the fortification</p></td><td><p>Arcana, Thievery</p></td></tr><tr><td data-colwidth=\"270\"><p>Identifying the threats within</p></td><td><p>Religion, Society</p></td></tr><tr><td data-colwidth=\"270\"><p>Impersonating the dead</p></td><td><p>Deception, Performance</p></td></tr></tbody></table></li><li><p>The second encounter takes place within the fortifications. Swarms and/or Troops must account for a least two-thirds of this <strong>moderate combat encounter's experience budget</strong>, and the encounter must occur in a confined area.</p></li><li><p>The final <strong>moderate combat encounter</strong> takes place in a bone ziggurat containing an Awakened Soul Cage, whose statistics are below.</p><table border=\"1\"><tbody><tr><td><h4><strong>Soul Cage, Awakened | Hazard #Level+1#</strong></h4><section><section class=\"traits\"><p>Complex</p><p>Necromancy</p><p>Trap</p></section><p style=\"margin-top:0.5em\"><strong>Complexity\_</strong>Complex</p><p><strong>Stealth</strong> <strong>#Hazard 2-13 High#</strong></p><p style=\"margin-top:0.5em\"><strong>Description\_</strong>A Soul Cage lashes out as the soul fragment within defends itself</p><hr /><p style=\"margin-top:0.5em\"><strong>Disable</strong> Arcana, Thievery or Religion <strong>#Hazard 2-13 High#</strong>. 3 Successes are required to disable this hazard. Each success removes 1 action; removing the abilities Drain the Living, Shake the Foundations, and Shatter their Minds, in that order.</p><p><strong>AC #Hazard 2-15 LAC# Fort #Hazard 2-15 H Save# Ref #Hazard 2-15 L Save#</strong></p><p><strong>Hardness #Hazard 2-15 Hardness Minimum# HP #Hazard 2-15 HP Max#</strong></p><p style=\"margin-top:var(--p-space,1em)\"><strong>Soul Siphon\_</strong><span class=\"pf2-icon\"><strong>r</strong></span>\_<strong style=\"margin-top:var(--p-space,1em)\">Trigger\_</strong>Four or more living creatures enter the room. <strong style=\"margin-top:var(--p-space,1em)\">Effect\_</strong>The hazard comes to life as the soul within uses <strong>Shake the Foundations</strong>.</p><hr style=\"border-top:1px solid var(--color-border-light-primary);border-bottom:1px solid var(--color-border-light-highlight);margin-top:var(--p-space,1em)\" /><p style=\"margin-top:var(--p-space,1em)\"><strong>Routine\_</strong>(3 actions) The Soul Cage gains three actions, which it uses to Drain the Living, Shake the Foundations, and Shatter their Minds, in that order.</p><p><strong>Drain the Living </strong>(1 Action)</p><p>The Soul Cage bolsters itself with souls ripped from the living. All living creatures within 45 ft. must attempt a <strong>#Hazard 2-16 HDC# Fortitude save </strong>with the following effects:</p><p>Success: No effect</p><p>Failure: Increase the @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained} condition by 1 (maximum of 5)</p><p>Critical Failure: Increase the @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained} condition by 2 (maximum of 5)</p><p><strong>Shake the Foundations </strong>(1 Action)</p><p>The Soul Cage shakes the ziggurat to its foundations. All living creatures within 45 ft. must succeed a <strong>#Hazard 2-16 HDC# Reflex save</strong>, or fall @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone}.</p></section><p><strong>Shatter their Minds </strong>(1 Action)</p><p>The Soul Cage's influence is overpowering, crushing weaker minds around it. All living creatures within 45 ft. take <strong>#Hazard 2-16 Complex Dmg | APL-1#</strong> with a <strong>#Hazard 2-16 HDC# Basic Will save. </strong>A creature that critically fails its saving throw is also @UUID[Compendium.pf2e.conditionitems.Item.e1XGnhKNSQIm5IXg]{Stupefied 1} for one minute.</p></td></tr></tbody></table></li></ol><p></p><h3>Recommended Locations</h3><p>Open plains and fields, confined courtyards, cramped rooms. Avoid maps with too much geographical variations, Drifthaven is fairly flat.</p><h3>Recommended Creatures</h3><p>Undead, Insects, Vermin.</p><h3>Recommended Loot</h3><p>50% of the budget should be raw gold, while the remaining 50% should be items related to necromancy and the undead. If the players succeed at sneaking in during encounter 1 they earn bonus gold equal to 10% of the total treasure budget, as they have time to gather gems from the shattered soul cage.</p>"
