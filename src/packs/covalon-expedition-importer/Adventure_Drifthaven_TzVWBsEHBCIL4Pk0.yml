      - type: action
        img: systems/pf2e/icons/default-icons/action.svg
        name: Bone Breaker
        system:
          description:
            gm: ''
            value: "<p>Lich Faltyr reaches out a hand to grasp an enemy's very bones, moving them around like an awkward marionette.</p>\n<hr />\n<p>A creature within 30 feet takes [[/r (10d8)[bludgeoning]]] must succeed at a @Check[type:fortitude|dc:30] save againt Lich Faltyr's grasp.</p>\n<p><strong>Critical Success</strong> The target is unaffected.</p>\n<p><strong>Success</strong> The target takes half damage and is @UUID[Compendium.pf2e.conditionitems.Item.kWc1fhmv9LBiTuei]{Grabbed}. While Lich Faltyr has a creature grabbed in this way they cannot use Bone Breaker against a new target.</p>\n<p><strong>Failure</strong> The target takes full and is thrown 20 feet in any direction. The target can choose to be @UUID[Compendium.pf2e.conditionitems.Item.dfCMdR4wnpbYNTix]{Stunned 1} and\_ @UUID[Compendium.pf2e.conditionitems.Item.kWc1fhmv9LBiTuei]{Grabbed} instead of moving. While Lich Faltyr has a creature grabbed in this way they cannot use Bone Breaker against a new target.</p>\n<p><strong>Critical Failure</strong> The target takes double damage and is thrown 40 feet in any direction. The target can choose to be @UUID[Compendium.pf2e.conditionitems.Item.dfCMdR4wnpbYNTix]{Stunned} for 1 round and\_ @UUID[Compendium.pf2e.conditionitems.Item.kWc1fhmv9LBiTuei]{Grabbed} instead of moving. While Lich Faltyr has a creature grabbed in this way they cannot use Bone Breaker against a new target.</p>"
