name: Drifthaven
img: modules/covalon/images/Drifthaven_Camp.webp
caption: ''
sort: 0
description: >-
  <div class="block template"><div class="block "><h3
  id="drifthaven">Drifthaven</h3></div><div class="block taglist"><section
  class="traits"><p><span class="inline-block
  tag">Civilization</span></p></section></div><p>The ever-partying
  paradise.</p><div class="block indented"><p><strong>Government</strong>
  Commune</p><p><strong>Population</strong> humans, halflings, elves,
  half-elves</p><p><strong>Religions</strong> various</p><p><strong>Primary
  Exports</strong> artwork, flayleaf, artisanal goods (such as cheeses and fruit
  juices), various other crops</p><p><strong>Geography</strong> warm and humid
  plain with heavy rains in the spring time, adjacent to dense
  forst</p><p><strong>Fate</strong> overrun by undead</p></div><hr
  /><p>Drifthaven was a relatively small town of peace loving folk. Much of
  their time was spent in revelry, often throwing large parties involving the
  entire town to celebrate anything from the changing of the seasons, to a group
  of people being in a particularly good mood that evening. Home to many artists
  and makers of music, a celebration had here was generally fairly memorable.
  The folks of the town welcomed travelers with open arms, encouraging them to
  stay around and enjoy events they had in town. Music, ale, and other creature
  comforts were traded for goods and news from the outside very often. The
  people of Drifthaven themselves hardly ever left their own borders. The town
  itself was comprised of almost no physical buildings besides a silo, a
  storehouse, and a stable. All other buildings were canvas structures, such as
  tents, pavilions, and their ilk. Most denizens of Drifthaven could speak both
  Common and Sylvan. Due to their down to earth mentality, most preferred the
  Sylvan language so much it became notable as their regional language. Swords,
  Daggers, Flails, and most weapons were strictly prohibited within the borders
  of Drifthaven. To be caught with a weapon was grounds for immediate banishment
  from the premises. Due to this, there was no military force. Due to a very low
  crime rate, law enforcement was minimal at best. A band of no more than 20
  people at a time with minimal training in non lethal weapons kept the peace in
  large gatherings. Because incidents were so low, they were hardly ever
  needed.</p><div class="blank"><p></p></div><p>The Cataclysm ended Drifthaven
  in a swarm of undead. Due to a distinct lack of military might, the tent city
  was destroyed in a matter of hours. Very few are expected to have
  survived.</p></div>
