      - sort: 400000
        name: 'Drifthaven Mission C: Songs of the Past'
        type: text
        _id: yRVWIvc5afvCBY1s
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3>Hook</h3><p><span style=\"font-family:Arial,sans-serif\"><em><strong style=\"font-weight:normal\" id=\"docs-internal-guid-201f5b70-7fff-4204-c645-1706aaa7f6ad\">We recovered a musical instrument that is magically tied to whatever is left of its former owner. With a bit of magic, you can return the instrument to the owner’s resting place and get some answers about what happened to Drifthaven and who is running this place.</strong></em></span></p><h3>Required Elements</h3><p>The party travels overland, chasing a slight magical pull felt by the instrument's holder to a cave or field where they face a moderate encounter that includes at least one humanoid undead (the instrument's owner).</p><p>After the encounter, the person holding the instrument feels a tug to the owner's corpse and knows their relationship.</p><p>The players can rest before and after performing a ceremony to call on spirits in the area, and face a second moderate encounter on their way back to camp.</p><h3>The Ceremony</h3><p>Following the portal guides instructions, the players light six candles in a chalk circle surrounding the body and call upon local spirits as they return the instrument to its owner.</p><p>Once the instrument is placed, angry and confused spirits fill the area and accuse the PCs of breaking the instrument and slaying its owner, starting a chase sequence. Players roll religion or Occultism for initiative. Spirits are placed at the end of initiative and toss debris dealing <strong>#Hazard 2-16 Complex Damage#</strong> bludgeoning damage with a <strong>#Hazard 2-16 HDC#</strong> basic Reflex save on each of their turns.</p><p>The players must finish the ritual to appease the spirits (players can run away at any time, preventing any additional reward). On their turn, a player can attempt a check to Complete the current Step and earn Ceremony Points for their party.</p><p><strong>Critical Success</strong> The party gains 2 Ceremony Points.<br /><strong>Success</strong> The party gains 1 Ceremony Point.<br /><strong>Critical Failure</strong> The party loses 1 Ceremony Point.</p><p>Alternatively, a player can gain three actions to use abilities to support their allies. Particularly appropriate spells or abilities may allow a player to succeed at Completing the Step without making a check, at the GM's discretion. Players cannot Delay their turns to after the spirits, and the spirits cannot be harmed.</p><p>Earning enough Ceremony points clears the current obstacle and resets the number of Ceremony points. The DC for all Complete a Step checks is <strong>#DC#</strong>. The number of Ceremony Points needed to overcome an obstacle is equal to the party size.</p><hr /><h4><span style=\"font-family:Arial,sans-serif\"><strong>Wish The Spirits Well</strong></span></h4><p>Ceremony Points 6; Overcome Religion or Occultism to center your mind and energy, Performance to act like you know what you’re doing, Intimidation to make the spirits cower in submission</p><p>The players focus their minds on the ritual as the spirits blame them for their deaths.</p><hr /><h4><span style=\"font-family:Arial,sans-serif\"><strong>The Candles Tip</strong></span></h4><p>Ceremony Points 6; Overcome Crafting or Acrobatics to position and right the candles, Survival or Nature to put out the fire, spells or abilities with the cold or water trait to control the fire spread (no check, cantrips won't work more than once)</p><p>The candles are knocked over, impeding the ritual and starting a fire.\_</p><hr /><h4><span style=\"font-family:Arial,sans-serif\"><strong>Listen and Understand</strong></span></h4><p>Ceremony Points 6; Overcome Society, Religion, or Perception to convey that you hear the spirits’ words</p><p>The players continue the ritual by listening and validating the spirits.</p><hr /><h4><span style=\"font-family:Arial,sans-serif\"><strong>Make Amends</strong></span></h4><p>Ceremony Points 6; Overcome Any skill that the player justifies as long as the GM thinks it will appease the fun loving, festive, yurt dwelling people (e.g. Performance to learn a Drifthaven tune later or Athletics to promise to put up a yurt). If what the player describes will not appease the people of Drifthaven, the players get an automatic fail regardless of what they roll.</p><p>The players offer to do things that will make the spirits of Drifthaven happy.</p><hr /><h3>Aftermath</h3><p>Once done, the area calms down and the spirit of the instrument's owner gives the party one piece of information about the lich and themself. Give them a name and a personality fitting an easygoing Drifthaven musician.</p><p><strong>Personal</strong></p><p>My performances were eagerly awaited by the townsfolk and travelers alike, for I had the ability to capture the essence of the moment in my songs. Whether it was the changing of the seasons, a wedding, or simply a night of revelry, my music was the heart and soul of Drifthaven's festivities:</p><ol><li><p>My music reflected what held Drifthaven together. In a town where weapons were shunned and violence was virtually unheard of, my music became a guardian of peace and unity. My songs could calm tempers, heal wounds of the heart, and unite the townsfolk in a shared experience of joy and togetherness.</p></li><li><p>In exchange for his music and the warmth of my company, I was showered with the Drifthaven's generosity. The townsfolk would barter fresh produce, handmade crafts, and the sweetest honey mead for my enchanting performances. There was a popular drink with the young folk where they took a thimble of honey mead and put it in their ale – called the drink a “honeybear”.</p></li><li><p>My musical prowess was not limited to any one genre. I could weave melodies that could make the most stoic heart dance with joy or compose haunting ballads that could bring tears to the eyes of even the toughest souls. My music was a bridge that connected the residents of Drifthaven to the travelers who ventured into our midst. Aided by my music, we exchanged stories, goods, and news from the outside world.</p></li><li><p>Despite the tranquil and harmonious nature of Drifthaven, I had my own aspirations. I dreamed of composing songs that would tell the tales of Drifthaven and its unique way of life. I spent countless hours in the forest, seeking inspiration from the whispering trees and the babbling brooks, weaving the essence of Drifthaven into every note.</p></li><li><p>My performances were eagerly awaited by the townsfolk and travelers alike, for I had the ability to capture the essence of the moment in my songs. Whether it was the changing of the seasons, a wedding, or simply a night of revelry, my music was the heart and soul of Drifthaven's festivities.</p></li></ol><p><strong>Lich</strong></p><ol><li><p>When the hoards came, they outnumbered us 10 to 1. But as I fell I noticed a necklace on one of the undead… it looked like a key.</p></li><li><p>I knew a little Necril so I understood when a magic-using skeleton was talking to someone while I was bleeding out. “Your soul cages will be made.”</p></li><li><p>The hordes came so viciously. When we took up arms to protect my town… I think those vile skeletons destroyed more of their own than we did.</p></li></ol><p></p><h3>Recommended Locations</h3><p><span>Fields, woods, small caves, and maps with temporary structures are appropriate for this expedition.</span></p><h3>Recommended Creatures</h3><p>Undead, constructs, and monsters reasonably created by a lich.</p><h3>Recommended Loot</h3><p>At least 50% of the treasure budget must be awarded as gold. Items may be found on the ground or on the bodies of the fallen mobs.</p>"
