          systemVersion: 6.4.1
          createdTime: null
          modifiedTime: null
          lastModifiedBy: null
          exportSource: null
        category: null
      - sort: 900000
        name: 'Appendix A - Mission B: Edge Cases'
        type: text
        _id: JECJmY9sYeKAb4jq
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<p>If the players discover the necromatic weapon, there's a number of different scenarios that can occur with it. The objective of this appendix is to cover what to do if the players attempt to do something unexpected with the weapon. You don't need to read this document unless a player is attempting to do something that you don't have an answer for.</p><ul><li><strong>If the players discover the necromatic weapon and take it, but don't hack it:\_</strong>the weapon can be used in combat. Use the statistics of a normal @UUID[Compendium.pf2e.equipment-srd.Item.LJdbVTOZog39EEbi]{Longsword}, @UUID[Compendium.pf2e.equipment-srd.Item.jcIabnkJgjwzK6Og]{Dwarven Scattergun}, or @UUID[Compendium.pf2e.equipment-srd.Item.4LJEpZ2HkCu9BvHI]{Hand Cannon} (depending on the weapon), but it deals void damage instead of its normal damage type(s) and its damage is treated as magical. All enemies in this adventure have negative healing, so it won't be very useful to the party. If the players are in the final encounter when the vitality explosion from the armory occurs, this destroys the necromatic weapon.</li><li><p><strong>If the players take the necromatic weapon, don't hack it, and are not in the final encounter when the vitality explosion from the armory occurs:\_</strong>this is an unusual situation, but it can occur if the PCs retreat from the final encounter before the positive energy explosion occurs. The players might have the foresight to destroy it on their own, but if they don't, they'll likely bring it back to base camp, in which the following scenarios can occur:</p><ul><li><p><strong>If the players bring a non-hacked necromatic weapon back to base camp:</strong> the mission NPC confiscates it, claiming that keeping possession of it would be more of a liability than an asset, and it should be destroyed. If a PC has an issue with this, encourage them to fill out an Expedition Acquisition Confiscation Reversion form and submit it to the desk of Kipza Quickclaw at the Dungeoneering Society. Should a PC actually want to do this, describe to them that Kipza Quickclaw's desk is absolutely flooded with forms that need to be processed, with the oldest one dating back to over a year ago. If the player\_<em>still</em> doesn't take the hint, be sure to describe the absolute ocean of paper that PC's form immediately gets lost in once they put the form onto Kipza's desk.</p><ul><li><p><strong>If the players bring a non-hacked necromatic weapon back to base camp and try to hide it from the mission NPC:\_</strong>during the debriefing, the party is interrupted by a group of mages from the Dungeoneering Society Department of Acquisition Accosting who claim that their divination enchantments cast all around base camp are picking up a very powerful source of void magic among the PCs. They request to search the PCs' possessions, and when they find the weapon, the mission NPC confiscates it (as above).</p><ul><li><strong>If the players are concealing the weapon by storing it in an extradimensional space:\_</strong>when the PC attempts to retrieve the item later, they find that it's no longer there. A successful <strong>#DC+5#\_</strong>Arcana or Occultism check reveals that the weapon's void energy consumed itself due to being in a plane absent of any latent vitality energy to feed off of. Don't you hate it when that happens?</li><li><strong>If the players are using\_</strong><em><strong>nondetection</strong></em><strong> or similar effects to conceal the weapon:\_</strong>the mages note that, although their personal\_<em>read aura</em> spells aren't able to detect anything, the powerful divination enchantments cast by some of Covalon's most powerful mages are returning evidence of a very powerful void item in the PCs' possession. The mages refuse to let the PCs leave until they turn over the item that is triggering the divination enchantments.</li></ul></li></ul></li></ul></li><li><p><strong>If the players hack the necromatic weapon:\_</strong>the weapon can be used in combat. Use the statistics of a normal @UUID[Compendium.pf2e.equipment-srd.Item.LJdbVTOZog39EEbi]{Longsword}, @UUID[Compendium.pf2e.equipment-srd.Item.jcIabnkJgjwzK6Og]{Dwarven Scattergun}, or @UUID[Compendium.pf2e.equipment-srd.Item.4LJEpZ2HkCu9BvHI]{Hand Cannon} (depending on the weapon), but it deals vitality damage instead of its normal damage type(s) and its damage is treated as magical. While it can be used to damage any creature with negative healing, it's best used to remove the damage immunity from the Graveknight-Captain, Skeletal Grand Champion, Undead Horde, or Zombie Colossus (which destroys the weapon after it does so).</p><ul><li><strong>If the players hack the necromatic weapon but aren't using it to remove the damage immunity from the creature in the final encounter:\_</strong>be sure to drop lots of hints that the weapon is absolutely overflowing with volatile vitality energy. Also, you should accent that the creatures' damage immunities could be countered by something that has the exact same qualities as the hacked weapon (for example, \"the Graveknight-Captain's armor appears to be made out of sheer void energy coalesced together... but maybe a powerful force of vitality energy could destroy it).</li><li><p><strong>If the players complete or retreat from the final encounter without using the hacked necromatic weapon:\_</strong>the weapon explodes in a blast of vitality energy just before the players return to base camp. Luckily, this happens before the expiration of any negative healing-reversal contracts on the party. How convenient!</p><ul><li><strong>Is it even possible to complete the last encounter if the players hack the necromatic weapon but don't use it?\_</strong><em>Maybe.</em> One of the creatures will be immune to damage and the explosion from the armory won't be powerful enough to outright destroy them which, theoretically, makes them impossible to defeat... but there might be some spell or combination of spells/abilities that <em>could</em> defeat the creature that this adventure doesn't account for. In such a case, the GM can discretionally allow the player's to \"complete\" the encounter.</li></ul></li></ul></li></ul>"
        video:
          controls: true
          volume: 0.5
        src: null
        system: {}
        ownership:
          default: -1
