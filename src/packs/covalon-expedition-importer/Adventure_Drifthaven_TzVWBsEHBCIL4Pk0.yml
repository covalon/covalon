      - type: action
        img: systems/pf2e/icons/default-icons/action.svg
        name: Grave Maker
        system:
          description:
            gm: ''
            value: >-
              <p><strong>Requirements</strong> Lich Faltyr channeled energy
              during his last turn.</p>

              <hr />

              <p><strong>Effect</strong> Each enemy within
              @Template[type:emanation|distance:100]{100 feet} takes [[/r
              (8d8)[bludgeoning]]] and must make succeed at a
              @Check[type:fortitude|dc:26|name:Grave Maker] save against the
              intense pull of Lich Faltyr’s magic.</p>

              <p><br /><strong>Critical Success</strong> The target is
              unaffected.<br /><strong>Success</strong> The target takes half
              damage and becomes
              @UUID[Compendium.pf2e.conditionitems.Item.AJh5ex99aV6VTggg]{Off-Guard}
              until the end of its next turn.<br /><strong>Failure</strong> The
              target takes full damage and is knocked
              @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone}.<br
              /><strong>Critical Failure</strong> The target takes double damage
              and is pulled down through the ground. The target is
              @UUID[Compendium.pf2e.conditionitems.Item.VcDeM8A5oI6VqhbM]{Restrained}
              and buried just beneath the surface and begins Suffocating at the
              end of their next turn. A buried creature must be dug up to be
              freed (see Burial).</p>

              <p>A buried creature or an ally can use a two-action activity that
              requires a free hand to dig free. This requires a successful
              @Check[type:Athletics|dc:24|name:Dig free] check.</p>
