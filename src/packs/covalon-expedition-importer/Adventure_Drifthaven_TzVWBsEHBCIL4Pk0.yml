        name: Contained Magic
        system:
          description:
            gm: ''
            value: "<p><strong>Trigger</strong> A soul cage is destroyed</p>\n<hr />\n<p><strong>Effect\_</strong>One of the following abilities activate.</p>\n<p>\_</p>\n<p><strong>Rise My Armies</strong> Summon one Lurching Troop.</p>\n<p><strong>Shade Of Darkness</strong> Each enemy must make a @Check[type:Will|dc:30|name:Shade Of Darkness] and suffer the following effects,</p>\n<p>\_ \_<strong>Critical Success</strong> The creature is unaffected.<br />\_ \_<strong>Success</strong> The creature is @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained 1}.<br />\_ \_<strong>Failure</strong> The creature is @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained 2}.<br />\_ \_<strong>Critical Failure</strong> The creature is @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained 3}.</p>\n<p><strong>Grasp Of Death</strong> Each enemy takes @Damage[(5d10)[void]] must make a @Check[type:Fortitude|dc:30|name:Grasp Of Death] and suffer the following effects,</p>\n<p>\_ \_<strong>Critical Success</strong> The creature is unaffected.<br />\_ \_<strong>Success</strong> The creature takes half damage.<br />\_ \_<strong>Failure</strong> The creature takes full damage and positive effects heal it only half as much as normal for 1 round.<br />\_ \_<strong>Critical Failure</strong> The creature takes double damage and positive effects heal it only half as much as normal for 1 minute.</p>"
