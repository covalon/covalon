        system:
          description:
            gm: ''
            value: "<p>Each Hand of Darkness may contribute actions to the Clap action.\_</p>\n<p>When 4 actions have been committed to Clap, each Hand may Fly up to 100ft in the same direction. The hands then slam together in a @Template[type:square|distance:10].\_ Creatures in the square take [[/r 4d6[bludgeoning]]] damage\_ and must make a @Check[type:reflex|dc:22|basic:true]. On a failure, a creature falls @Compendium[pf2e.conditionitems.j91X7x0XSomq8d60]{Prone}.</p>\n<p>\_</p>\n<p>The reverberations of the Clap also create a\_<span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">@Template[type:emanation|distance:30]. Creatures in the emanation take [[/r 4d6[sonic]]] damage Sonic damage and must make a @Check[type:fortitude|dc:22|basic:true]. On a failed save, creatures are @Compendium[pf2e.conditionitems.9PR9y0bi4JPKnHPR]{Deafened} for 1 round.\_</span></p>\n<p>\_</p>\n<p><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">The hands may then reposition themselves anywhere in the area of the emanation as a Free Action Fly.</span></p>\n<p>\_</p>\n<p><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">The Hands of Darkness may not Clap again for [[/gmr 1d4]] rounds.\_</span></p>"
