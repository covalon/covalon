name: Middlemist
img: modules/covalon/images/Middlemist%20Base%20Camp.webp
caption: ''
sort: 0
description: >-
  <div class="block template"><div class="block "><h3
  id="middlemist">Middlemist</h3></div><div class="block taglist"><section
  class="traits"><p><span class="inline-block
  tag">Civilization</span></p></section></div><p>Town of Leshies.</p><div
  class="block indented"><p><strong>Government</strong> The Tribunal (elected
  council)</p><p><strong>Population</strong> Mostly
  leshies</p><p><strong>Religions</strong> Erimia</p><p><strong>Primary
  Exports</strong> herbs, medicine, fruits,
  nuts</p><p><strong>Geography</strong> giant evergreen
  forest</p><p><strong>Fate</strong> swallowed by darkness</p></div><hr /><p>The
  town of Middlemist is a town hidden away from the eyes of mortals. The
  inhabitants are all Leshies that have either been abandoned, outlived, or
  escaped the druids that made them. This town was prosperous due to the natural
  bounty of the forest and the high-quality potions they produced. They traded
  with other villages through select merchants that would come and go. When the
  Calamity came, the forest was engulfed in supernatural darkness, and
  Middlemist hasn’t been seen since.</p></div>
