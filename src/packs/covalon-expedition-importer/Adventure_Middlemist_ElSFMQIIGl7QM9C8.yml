        name: 'Middlemist Mission C: Penumbra'
        type: text
        _id: RG2FMvtwkgvoWhkg
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h2>Hook</h2><p>“Walking our way to the center of Middlemist isn’t going to work, and we need to have a look-see at what lies there. We can’t walk… but maybe we can fly our way in.”</p><h2>Required Elements</h2><ol><li>Light and Darkvision function as described in the Middlemist Briefing.</li><li>Covalon's airship lifts the party into the sky before sending them gliding down in two Red Eyes, flying vehicles described in the Red Eye section.\_</li><li>The party maneuvers their vessels through Middlemist's pitch-black sky and are attacked by flying creatures in a moderate encounter, described in the Midnight Flight section. During combat, the Red Eyes must be <a href=\"https://2e.aonprd.com/Rules.aspx?ID=1288\">piloted</a> or they become <a href=\"https://2e.aonprd.com/Rules.aspx?ID=1293\">uncontrolled</a>.</li><li>30 minutes after the players defeat the Midnight Flight encounter, their ships are struck by a bolt of dark energy, breaking both vessels, which begin to hurtle toward the ground. This set piece encounter uses special rules, which are described in the Rocky Landing section.</li><li>The party crashes in the torn landscape near Middlemist's center described in the Return section and must journey home on foot. They encounter a single moderate combat encounter on the way.</li></ol><h3>Red eye</h3><p>The players attempt to scout Middlemist using up to two Red Eyes, Covalon’s newest invention. The flying ships can each hold up to three medium creatures, with mounting spots for up to one large creature each and uses the following statistics.</p><p>Player characters lack the expertise and equipment needed to Repair the Red Eyes.</p><h4>Red Eye (Huge, Vehicle)</h4><p><strong>Space </strong>15 feet long, 30 feet wide, 10 feet high. (10-feet wide with wings furled)</p><p><strong>Crew </strong>1 pilot, <strong>Passengers </strong>2</p><div><p><strong>Piloting Check </strong>Piloting Lore (#DC#) or Nature/Crafting (#DC+2#)</p><hr /></div><p><strong>AC </strong>#2-5 low-2# <strong>Fort</strong> #2-6 moderate#</p><p><strong>Hardness </strong>5\_x #tier-1# <strong>HP </strong>30 x #tier­­# (BT HP/2)</p><div><p><strong>Immunities </strong>critical hits, object immunities, precision damage</p><hr /></div><p><strong>Speed </strong>Fly 40 feet (Wind, Clockwork)</p><p><strong>Collision </strong>2d10 per tier <strong>#DC# </strong>Reflex</p><p><strong>Sluggish </strong>This vehicle must move twice its length for each 90-degree turn it makes</p><p><strong>Collapsing Wings </strong>When unfurled, the Red-Eye’s wings are uneven terrain creatures traversing their spaces must attempt a #DC# check to Balance. Any creatures standing atop the wings when someone uses the Furl Wings activity can attempt to Grab an Edge (DC 15) to avoid falling. Climbing Kits can prevent a creature's fall, but a creature saved by a Climbing Kit dangles from the end of a 40-foot rope until it can Climb (DC15) back up the jostling line.</p><hr /><p><strong>Flash </strong>◆ (light, magical, manipulate) A crew member activates the magical lanterns lining the Red Eye’s railing with a #DC-1# Divine or Crafting check with the following effects, which last one round and are unaffected by Middlemist’s Darkness.</p><ul><li><strong>Critical Success</strong> The Red Eye’s Body sheds bright light in a 30-feet radius, with dim light for an additional 30. Creatures within the light must attempt a #DC-1# save or be dazzled</li><li><strong>Success</strong> As critical success, but the radius of each type of light is 20 feet.</li><li><strong>Failure</strong> The lights fizzle and pop, emitting dim light in a 20-foot radius.</li><li><strong>Critical Failure</strong> The lights spark dangerously. The activating creature takes #2-16 Simple Damage# fire damage with a #DC# basic Reflex save.</li></ul><p><strong>Electric Broadside\_</strong><span class=\"pf2-icon\"><strong>3</strong></span> (electricity, magical, manipulate) A crackling beam of energy erupts from the one side of the Red Eye’s body at an angle of the activating crew member’s choice, dealing #2-16 Complex Damage) electricity damage to all creatures in a 60-foot line (#DC+1# basic Reflex save).</p><p><strong>Furl Wings </strong><span class=\"pf2-icon\"><strong>1</strong></span> (manipulate) The Pilot can spend one action to open or close to furl the wood and canvas wings that keep the Red Eye gliding. While the Red Eye’s wings are furled, it drops by 60 feet each round and its width is reduced to 10 ft. While plummeting, the Red Eye’s body is uneven ground (#DC#)</p><h3>Midnight Flight</h3><p>The adventurers are sent on a reconnaissance mission deep into the gloom of Middlemist. Darkvision and lights except those provided by the Red Eye function the same here as elsewhere within the veil. The Red Eye’s lights stretch for their normal distance and are unobstructed by the dark.</p><p>As they near the fringes of the riven landscape at Middlemist’s center, the party is beset by flying creatures native to the darkness. This is a Moderate encounter. The Red Eye and the piloting accounts for 20xp in the encounter budget.</p><p>The creatures target the Red Eye and their drivers over their passengers, hoping to crash the ships and foil the adventurer’s quest for knowledge.\_</p><p>If a Red Eye becomes Broken during this encounter, the creatures wave off and the Rocky Landing Encounter begins immediately. When a vehicle is broken, it becomes harder to use. It takes a -2 penalty to its AC, saves, and collision DC, and the DC of all piloting checks related to the vehicle increase by 5. The broken vehicle’s Speeds are halved.</p><h3>Rocky Landing</h3><p>Thirty minutes after defeating the Midnight Flight encounter, bolts of dark energy strike the Red Eyes, which immediately become broken and begin to descend to the ground at dangerous speeds. The adventurers must fight to regain control of the ships as they hurtle through the air, avoiding the airborne chunks of earth thrown up by the destructive energy at Middlemist’s center.</p><p>If a Red Eye was Broken during the Midnight Flight encounter, it descends without being struck by dark energy. Either way, this encounter accounts for one-third of the adventure’s experience budget.</p><p>This encounter functions similarly to a Chase, but instead of accumulating chase points, the party must succeed at piloting check to Take Control (<span class=\"pf2-icon\">2)</span> of the Red Eyes to avoid collision damage at the end of each round. The Red Eyes become uncontrolled at the start of each round. The Red Eyes’ statistics take their normal adjustments from the Broken condition, though players can make piloting the crafts easier by Aiding or by succeeding at the Flash action, which has the following effects instead of its usual ones:</p><ul><li><strong>Critical Success</strong>\_The Red Eye takes a -2 circumstance penalty to its Piloting Check DC for one round.</li><li><strong>Success</strong> As success, but the circumstance penalty is -1.</li><li><strong>Failure</strong>\_The light is too dim to aid the descent.</li><li><strong>Critical Failure</strong> As failure, but the activating creature takes #Hazard 2-16 Complex Damage# fire damage with a #DC# basic Reflex save.\_</li></ul><h4>Obstacles</h4><h5>A Cloud of Pebbles (Round 1)</h5><p>Small floating stones float in pockets ahead. At speed, they’re little better than a cloud of arrows.</p><div><p><strong>Special</strong> Collisions on this obstacle do piercing damage instead of bludgeoning damage.</p></div><h5>A Storm of Energy (Round 2)</h5><p>Negative energy roils in the path ahead, bolts of it crackling back and forth in the gloom.</p><div><p><strong>Special</strong>\_Collisions on this obstacle do negative damage instead of bludgeoning damage.</p></div><h5>Floating Islands (Round 3)</h5><p>Large rocks, broken and jagged, list in the air ahead, leaving only narrow spaces clear ahead.</p><div><p><strong>Special</strong> If a Red Eye’s wings are furled, its piloting DC for this obstacle takes a -2 circumstance penalty. If it already had a circumstance penalty, increase it by 2.</p></div><h5>A Cloud of Creatures (Round 4)</h5><p>Winged creatures, faceless and pale, swarm directly into the Red Eyes’ paths.</p><div><p><strong>Special</strong>\_If a Red Eye’s wings are unfurled, its piloting DC for this obstacle receives a +2 circumstance bonus.</p></div><h5>The Rapidly Approaching Ground (Round 5)</h5><p>Barren treetops peak out of the gloom below. The ground is coming, and it’s coming quickly.</p><p><strong>Special</strong>\_There’s no avoiding a collision with the ground. Instead of avoiding a collision, a successful piloting check instead increases the degree of success of the Reflex saving throws of every player riding the Red Eye by one.</p><p>Adventurers with both hands free can use a single action, which has the manipulate trait to increase their degree of success on their Reflex saving throw by one. This stacks with the bonus gained from successfully Taking Control of the crashing Red Eye. Characters immediately realize dropping gear here will likely lead to its loss.</p><h3>Return</h3><p>The Red Eyes crash in a strange landscape entirely bare of plant life. Dark energy pours out from cracks in the ground, and loose stones list through the air, connected by bolts of the same foul power. The very ground is torn and broken. If the party completed the Rocky Landing encounter and succeeded at Taking Control of the vehicle on four or more of the obstacles they receive an additional 10% Investigation Bonus at the end of the session.\_</p><p>The adventurers must return to camp on foot. On the way, they are accosted by a band of creatures. This moderate combat encounter accounts for one-third of the experience budget.</p><h2>Recommended Locations</h2><p>Forest, the alien landscape described in the Return section.</p><h2>Recommended Creatures</h2><p>Incorporeal undead, aberrations, nocturnal animals and beasts, hags, fungi, and creatures native to the darklands, including plants that can survive in darkness.\_</p><p>Corporeal undead and non-outsider creatures with the Humanoid trait are not well suited to this adventure.\_</p><p>Creatures in the Midnight Flight encounter must have a fly speed. Creatures with the Shadow or Negative traits are particularly suited to encounters near the site of the players' crash landing.</p><h2>Recommended Loot</h2><p>The Dungeoneering Society pays the adventurers gold equal to at least 50% of the total treasure budget for flying into the dark. Treasure and magic items related to shadow, darkness, light, and negative energy can account for no more than 50% of the total treasure budget.</p><p>If the party succeed on at least 4 obstacles of the Rocky Landing encounter the party gain an additional 10% Investigation Bonus of raw gp paid by the Dungeoneering Society for rare plants that they are able to salvage. The party also learns that falling would be very dangerous and instruct the Dungeoneering Society to build harnasses on the Airship for safety!\_</p><p>\_</p>"
