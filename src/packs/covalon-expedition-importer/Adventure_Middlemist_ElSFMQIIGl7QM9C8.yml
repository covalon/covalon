      - name: Middlemist Briefing
        type: text
        title:
          show: false
          level: 1
        text:
          format: 1
          content: "<h2 style=\"margin-top:var(--p-space,1em);width:644.088px;font-family:var(--serif)\">Background</h2>\n<p>The leshy town of Middlemist has never been at the centre of mortal perceptions, however, never has this been more true now that the entire area is covered in impenetrable darkness.\_</p>\n<p>Covalon's bravest adventurers have constructed an airship to arrive on the main continent nearby to Middlemist, however there is much to do to ensure our safety and set up a useful staging point for future expansions.\_</p>\n<p>We need to explore the darkness for clues of what happened here, and we'll also need to find some way to beat back the darkness. Some experimentation will be in order! Finally, we'll need to find out what's at the heart of this darkness if we're to have any hope of bringing light back to Middlemist.\_</p>\n<hr />\n<h2 style=\"margin-top:var(--p-space,1em);width:644.088px;font-family:var(--serif)\">Mission Overview:</h2>\n<p>While the specifics of Middlemist elude us due to the oppressive darkness, there is one thing for certain. The Seed of Terra can sense another Vessel of the Maw. We need to find out as much as we can about it and excise it from the land as soon as possible!</p>\n<p style=\"width:644.088px\">Middlemist's darkness is supernatural and acts as a fourth-level Darkness spell, except that it cannot be counteracted or counteract light effects. Instead, the range of all light sources is halved. Additionally, creatures with darkvision can see only 30 feet into Middlemist's gloom. Everything beyond that is pitch black. For creatures with greater darkvision, this range is 60 feet.</p>\n<hr />\n<h2 style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);width:649.531px;font-family:var(--serif)\">How to Run an Expedition</h2>\n<p style=\"box-sizing:border-box;user-select:text;width:649.531px;color:#1c1c1c;font-size:15.6px\">Expeditions are composed of two subtypes: missions and finales. Missions are a set of three dungeon-like adventures that are narratively linked, but can be completed in any order. Each mission must include predetermined narrative and mechanical elements while sticking to a theme of locations, creatures, and loot, which are included in its associated journal entry, with the specifics of the blanks to be filled in by the GM of the adventure. Like other adventure types, Dungeon Guides must submit their expedition missions for approval.</p>\n<p style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);width:649.531px;color:#1c1c1c;font-size:15.6px\">When reading the instructions for an expedition, you may see key terms surrounded by number signs. These indicate that the term should be replaced by a value that's dependent on the adventure's average party level.\_\_If you have any questions about how to apply these terms or any of the required elements, be sure to ask about them during your submission for approval.\_Here is a list of terms:</p>\n<ul style=\"box-sizing:border-box;user-select:text;padding-left:var(--space-m);width:649.531px;color:#1c1c1c;font-size:15.6px\">\n<li style=\"box-sizing:border-box;user-select:text;padding-left:var(--space-s)\"><strong style=\"box-sizing:border-box;user-select:text\">#Creature [Table Number] [Modifier]#</strong>\_should be replaced by a value according to a table in the\_<a style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em)\" href=\"https://2e.aonprd.com/Rules.aspx?ID=995\">Building Creatures</a>\_section of the Gamemastery Guide. For example, \"#Creature 2-8 Minimum# means that you should reference the Building Creatures rules, look for Table 2-8, and use the value in the Minimum column for the creature's level (adjusted for elite or weak as appropriate).</li>\n<li style=\"box-sizing:border-box;user-select:text;padding-left:var(--space-s)\"><strong style=\"box-sizing:border-box;user-select:text\">#Hazard [Table Number] [Modifier]#\_</strong>should be replaced by a value according to a table in the\_<a style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em)\" href=\"https://2e.aonprd.com/Rules.aspx?ID=1043\">Building Hazards</a>\_section of the Gamemastery Guide. For example, \"#Hazard 2-16 Simple Damage# means that you should reference the Building Hazards rules, look for table 2-16, and use the value in the Simple Damage column for the hazard's level.</li>\n<li style=\"box-sizing:border-box;user-select:text;padding-left:var(--space-s)\"><strong style=\"box-sizing:border-box;user-select:text\">#DC [Modifier]#\_</strong>should be replaced by a value according to the\_<a style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em)\" href=\"https://2e.aonprd.com/Rules.aspx?ID=554\" target=\"_blank\" rel=\"noopener\">DCs by Level</a>\_table in the Core Rulebook. If a modifier is included, the value should be adjusted accordingly. For example, \"#DC +5#\" means that you should reference the DCs by Level table, find the value appropriate for the party's average level, then add 5 to it.</li>\n</ul>\n<p style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);width:649.531px;color:#1c1c1c;font-size:15.6px\">Finales are singular encounters against a narratively significant threat that conclude an expedition. They come in two versions: normal mode and hard mode. Before a finale is cleared for the first time, it can only be run by Covalon administrators and moderators, and is ran at hard mode. Afterwards, the finale can be ran by any Dungeon Guide at normal mode (though players can request hard mode if they'd like). Normal mode can be run in Tier 2 or above, and hard mode can only be run at the highest tier, intended for max level characters. Unlike missions, finales use a specific map and specific creatures, included with this module.</p>\n<p style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);width:649.531px;color:#1c1c1c;font-size:15.6px\">Each finale comes with three variant modifications. When running a normal mode finale, a GM choose one of the three modifications to use, or can roll\_<a class=\"inline-roll roll\" style=\"box-sizing:border-box;user-select:text;font-family:var(--sans-serif)\" title=\"1d3\" data-mode=\"roll\" data-flavor data-formula=\"1d3\">\_1d3</a>\_to randomly determine which modification to use. When running a hard mode finale, the GM uses all three modifications.\_There are no additional rewards for completing hard mode.</p>\n<hr />\n<h2 style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);width:649.531px;font-family:var(--serif)\">Reporting a Completed Expedition</h2>\n<p style=\"box-sizing:border-box;user-select:text;width:649.531px;color:#1c1c1c;font-size:15.6px\">When reporting a completed expedition in the Dungeon Summaries channel, use the\_<strong style=\"box-sizing:border-box;user-select:text\">exact name</strong>\_of the adventure as the adventure's title. For example, if you ran the first mission of Ikouga, the summary's title should be \"Ikouga Mission A: Retame the Island\" exactly. The summary should otherwise follow the same format as dungeons.\_</p>\n<p style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);width:649.531px;color:#1c1c1c;font-size:15.6px\">Finally, any narrative-based knowledge or intrigue that the players gain as a result of the expedition should be left out of the summary. For example, if the players complete a bonus objective that allows them to learn special information as detailed in the Required Elements or Recommended Loot section of each journal entry, that should be left out of the dungeon summary.</p>"
