      - sort: 100000
        name: 'Middlemist Mission A: Delve the Dark'
        type: text
        _id: a5KjNCb1FydrqZa9
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h2>Hook</h2><p>“We have some maps of this place from before the cataclysm.\_ Gods know what's changed since, but maybe some towns yet stand. Go and see if there's anything or anyone there that can tell us of what happened here.”</p><hr /><h2>Required Elements</h2><ol><li>Light and Darkvision function as described in the Middlemist Briefing.</li><li>Adventurers are sent into the cloud of darkness surrounding Middlemist to enter a town depicted on a pre-cataclysm map and make their way there using Hexploration rules and encountering the skill checks as described in the Traveling section. They face a single moderate encounter on the way.</li><li>The players can search the town and examine the alien plants suffusing it to learn more about Middlemist as described in the Town section. Adventurers find a single hibernating Leshy not starved by the perpetual gloom among the shambles, which they must transport back to Covalon. The Leshy cannot be woken without being brought out of the gloom. Before the party leaves, they are ambushed, triggering a low encounter.</li><li>The party can retrace their route to the town without making skill checks, including to Travel, but enroute, they trigger a moderate encounter. The creatures prioritize targeting the Leshy, whose statistics are described in the Escape section.\_\_</li></ol><h2>Traveling</h2><p>The adventurers are sent into Middlemist’s gloom in search of knowledge, but the wilderness has little to offer, and the players must trek through the darkness until they stumble upon a Leshy village marked on a pre-cataclysm map.</p><p>Players explore the forest using the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=1265\">Hexploration Subsystem</a>, except the party gains hexploration activities each hour instead of each day and cannot perform a forced march.</p><p>Overlay a Hexploration grid with the dimensions below onto a suitable region map of your choice. Covalon possesses no maps that reflect Middlemist’s post-cataclysm landscape, so don’t worry about fitting it perfectly to the encounters in this expedition, combat or otherwise.</p><img src=\"modules/covalon/images/Hex_Grid_Shape.webp\" width=\"750\" height=\"462\" /><p>The players begin in the central purple hex with the goal of reaching any of the blue hexes.</p><p>The green hexes contain skill challenges the players face on their Travels, though they can Reconnoiter to reduce the DCs of a given skill challenge by 2. Skills and abilities other than those listed could apply to a given challenge, at the GM's discretion. Suitable abilities could even earn the party or player an automatic success.</p><p>The first time — <em><strong>and the first time only</strong></em> — the party enters one of the four red hexes, they trigger a moderate combat encounter that accounts for one-third of the adventure’s experience budget.</p><p>Once they enter any of the blue hexes, they find the town and can search it for clues.\_</p><h4>Skill challenges:</h4><table style=\"height:510px;width:100%;float:left\" border=\"1\"><tbody><tr style=\"height:20px\"><td style=\"width:8.47914%;height:20px\"><p>Name</p></td><td style=\"width:16.6891%;height:20px;text-align:center\"><p>Description</p></td><td style=\"width:39.1655%;height:20px;text-align:center\">Checks</td><td style=\"width:35.6662%;height:20px;text-align:center\">Negative Effects</td></tr><tr style=\"height:80px\"><td style=\"width:8.47914%;height:80px\"><p>Turned Around</p></td><td style=\"width:16.6891%;height:80px\"><p>The dead trees in this patch of Middlemist all look alike. The party must orient before continuing on.</p></td><td style=\"width:39.1655%;height:80px\"><p>#DC# Survival to Sense Direction or one #DC+4# Will Save to remember the path.</p><p>One Success required.</p></td><td style=\"width:35.6662%;height:80px\"><p>On a critical failure, the party is led through the darkness into a steep ravine. All players take #2-16 Complex Damage# bludgeoning damage with a basic reflex saving throw.</p></td></tr><tr style=\"height:114px\"><td style=\"width:8.47914%;height:114px\"><p>Alien Plants</p></td><td style=\"width:16.6891%;height:114px\"><p>Twisted alien plants and their massive roots suffuse this area, slowing the party’s progress to a crawl.</p></td><td style=\"width:39.1655%;height:114px\"><p>#DC+2# melee attack roll with a weapon or unarmed strike that deals slashing damage to cut a way through or #DC# spell attack by a creature who can cast a damaging spell with the Fire Trait.</p><p>Three Successes required.</p></td><td style=\"width:35.6662%;height:114px\"><p>On a critical failure, foul liquid from the plants’ wounds sprays the party. All players take #2-16 Complex Damage# negative damage with a basic fortitude saving throw.</p></td></tr><tr style=\"height:95px\"><td style=\"width:8.47914%;height:95px\"><p>Collapsed Great tree</p></td><td style=\"width:16.6891%;height:95px\"><p>One of Middlemist’s eldest trees lies collapsed before the party. Its great length and the destruction caused by its fall impede passage.</p></td><td style=\"width:39.1655%;height:95px\"><p>A player can attempt #DC+2# Athletics checks to Climb up the tree’s 50-foot trunk.</p><p>Players must succeed this check individually, but with suitable tools, a creature who reaches the top can attach a rope to reduce the Athletics check’s DC to 15.</p></td><td style=\"width:35.6662%;height:95px\"><p>A Creature that critically fails its check to Climb falls as normal.</p></td></tr><tr style=\"height:123px\"><td style=\"width:8.47914%;height:123px\"><p>Rot Pit</p></td><td style=\"width:16.6891%;height:123px\"><p>The Half-rotted trees husks littering this swampy patch of forest snare the party's advance.</p></td><td style=\"width:39.1655%;height:123px\"><p>An Adventurer can attempt a #DC+5# Nature or Survival check to Recall Knowledge to pick a dry path through the mire. On a success, all players can safely traverse the swamp. On a critical failure, the attempting player picks a bad trail and leads the party into the swamp.</p><p>Players can wade through the swamp without scouting a path, but doing so has negative effects, described to the right.</p></td><td style=\"width:35.6662%;height:123px\"><p>On crossing the swamp without successfully finding a dry path a player is exposed to Mire Guts, as described below, and takes #Environmental Damage 10-11 Minor# poison damage. For tiers above Tier Two, the poison damage increases to #Environmental Damage 10-11 Moderate# on a critical failure.</p><p>Mire Guts has the effects of\_<a href=\"https://2e.aonprd.com/Diseases.aspx?ID=22\">Swamp Guts</a>\_but its DC is #DC#.</p></td></tr><tr style=\"height:38px\"><td style=\"width:8.47914%;height:38px\"><p>Broken Ground</p></td><td style=\"width:16.6891%;height:38px\"><p>The ground here slopes down suddenly, pitching toward a massive root festooned with alien vines.\_</p></td><td style=\"width:39.1655%;height:38px\"><p>Adventurers must attempt #DC# Acrobatics checks or #DC+2# Reflex Saves to traverse it safely.</p></td><td style=\"width:35.6662%;height:38px\"><p>On a critical failure, a creature attempting the Acrobatics check tumbles down the ravine, taking #Hazard 2-16 Complex Damage# and reaching the other side.</p></td></tr><tr style=\"height:40px\"><td style=\"width:8.47914%;height:40px\"><p>Hackles Rising</p></td><td style=\"width:16.6891%;height:40px\"><p>The party becomes unnerved by the preternatural stillness of the wood.\_</p></td><td style=\"width:39.1655%;height:40px\"><p>Each player character must attempt a #DC# Will Saving throw.</p></td><td style=\"width:35.6662%;height:40px\"><p>On a failure, the character takes #Hazard 2-16 Complex Damage#. On a critical failure, the character also hears threats where there are none, giving them a -1 circumstance penalty to skill and perception checks for the next hour.</p></td></tr></tbody></table><p>\_</p><h2>Town</h2><p>After reaching the rightmost column of hexes, regardless of which hex they enter, the adventurers find a village overgrown by strange plants with twisting roots. This place is free of threats for the moment. The party can comb through the abandoned town, study the scattered Leshy bodies, and examine the flora that have taken root here.</p><p>Players can examine the Leshy corpses with a #DC# Medicine check. On a success, they notice roots grown into some of their backs. Players who succeed at #DC+2# Nature or Occultism check detect negative energy emanating from the roots.</p><p>Players who examine overgrown homes with a successful #DC+2# Perception Check notice wood and stone the roots have eroded adjacent wood and stone. Players who detect the erosion can attempt the Nature or Perception check described above.</p><p>After a brief time in the town, the party hears groans from a Leshy who entered a state of hibernation in time to avoid starvation. They will not wake until removed from Middlemist's gloom. The Leshy still needs to breath and can be carried in two hands. The Leshy weighs three bulk, as is typical for small creatures. Its other statistics are described in the Escape section.</p><h2>Escape</h2><p>The adventurers can follow their tracks back to camp without much issue, their path clearly marked in the dead earth between alien plants. Foul creatures alerted to their passage beset them on their return journey, attempting to kill off the Leshy survivor and prevent Covalon’s heroes of learning more about what befell Middlemist.</p><p>This is a moderate combat encounter. For the Leshy’s statistics, use the following: #Creature 2-5 moderate# for its AC, #Creature 2-6 Moderate# for all saves, and #Creature 2-7 Low# for its HP. Upon reaching zero hit points, the Leshy becomes Dying One, or Dying Two if it was reduced to zero by a critical hit or critically failed saving throw. The Leshy gains the Wounded condition as normal.</p><p>Upon defeating their assailants, the players can return to camp unmolested. Once in sunlight, the Leshy wakes and relays some information described in the Recommended Loot section. The Leshy is shaken from its slumber and the deaths of their fellows. It begins traveling away from the cloud of darkness as soon as the Covalonians have left.\_</p><h2>Recommended Locations</h2><p>Forests and swamps. Middlemist's inhabitants made homes of trees and other natural features. Constructed buildings (e.g. a house) are not appropriate to this adventure.</p><h2>Recommended Creatures</h2><p>Incorporeal undead, aberrations, nocturnal animals and beasts, hags, fungi, and creatures native to the darklands, including plants that can survive in darkness.</p><p>Corporeal undead and creatures with the Humanoid trait are not suitable for this adventure.\_</p><h2>Recommended Loot</h2><p>Adventurers are paid gold worth at least 50% of the total treasure budget at the end of the adventure. Treasure and magic items related to nature, poison, and light account for up to 50% of the total treasure budget and should be found mostly in town. If the party returns with the Leshy survivor, earn an Investigation Bonus in the form of raw gold worth 10% of the total budget.</p><p>If the Leshy survives, they inform the party that they should beware the shadows in the forest. They explain that sometimes the shadows themselves can grab on to you. The Leshy leaves the camp in good spirits to live its best Leshy life in the wild.\_</p>"
          markdown: ''
