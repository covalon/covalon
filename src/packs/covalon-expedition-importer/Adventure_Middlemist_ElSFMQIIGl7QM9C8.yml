      - sort: 200000
        name: 'Middlemist Mission B: In Search of Light'
        type: text
        _id: 5HzD7XLGmpQ4HYab
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h2>Hook</h2><p>“We need a way to beat back the darkness if we’re to make any progress here. The guild has plenty of ideas, but it’s up to you to figure out which actually work.\"</p><h2>Required Elements</h2><ol><li style=\"box-sizing:border-box;user-select:text;padding-left:var(--space-s)\">Light and Darkvision function as described in the Middlemist Briefing.</li><li>The party travels a way into Middlemists darkness, eventually finding a relatively clear patch of forest.</li><li>Once\_ there, the party activates one of three devices, triggering a moderate combat encounter. The devices act as complex hazards and are not counted in the encounter's experience budget. Their statistics are described in the Devices subsection.</li><li>The party can only rest for 10 minutes between encounters. In addition to their normal activities, adventurers can Study the most most recently disabled device as a 10-minute activity. This earns the party development points, as described in the Testing, Testing section.</li></ol><h3>Testing, Testing</h3><p>Triggering each device begins a moderate combat encounter and activates the device as a complex hazard that does not count against the encounter’s experience budget.</p><p>The lights draw attention, and the adventurers have been warned not to remain longer than they must. Players have enough time for one 10-minute activity between encounters. In addition to their normal activities, players can spend 10 minutes studying the most recently activated device using its listed skill. On a success, they earn one development point. If the party earns eight development points, they gain additional gold equal to 10% of the adventure’s treasure budget.</p><h3>Devices</h3><h4>Lightning Thrower</h4><p>This wooden barrel opens once activated, revealing a metal sphere carved with arcane runes.</p><p><strong>Routine </strong><span class=\"pf2-icon\">2</span> The Lightning Thrower uses its Electric Discharge action then uses its Positive Charge action.</p><p><strong>Electric Discharge\_</strong><span style=\"font-family:Pathfinder2eActions\">1\_</span><span style=\"font-family:var(--journal-serif)\">Lightning careens out of the device. All creatures in a cube created by Positive Charge take #2-16 Complex Damage# electricity damage with a #DC+2# basic reflex saving throw, becoming blinded for one round on a failure, or one minute on a critical failure. The cubes then dissipate.</span><strong><br /></strong></p><p><strong>Positive Charge </strong><span style=\"font-family:Pathfinder2eActions\">1 </span><span style=\"font-family:var(--journal-serif)\">The Lightning Thrower creates three non-overlapping 15-foot cubes centered on random creatures within 120 feet. Creatures wearing metal armor are Clumsy 1 while within the cube, and attacks made with metal weapons within the cube take a -1 circumstance penalty.</span></p><p><strong>Special </strong>The Lightning Thrower catches fire and stops functioning after four rounds. Players can Study the device with a #DC+2# Arcana or Crafting check.</p><h4>Heaven’s Box</h4><p>This small metal chest contains a small crystal infused with divine energy. Once activated, the crystal glows with a pulsing bright light that stretches 30 feet into Middlemist’s gloom</p><p><strong>Routine</strong>\_<span style=\"font-family:Pathfinder2eActions\">1</span> The Heaven’s Box sends out a pulse of light. All creatures within 30 feet of the device must make a #DC# Fortitude save with the following effects:</p><ul><li><strong>Critical Success</strong> Unaffected</li><li><strong>Success</strong> The creature is dazzled for one round. It can spend one Interact action to rub its eyes and remove the dazzled condition.</li><li><strong>Failure</strong> The creature is blinded for one round and dazzled for one minute. It can spend one interact action to rub its eyes and remove the dazzled condition.</li><li><strong>Critical Failure</strong> The creature is blinded for one minute.</li></ul><p><strong>Special </strong>The Heaven’s Box explodes in a shower of metal after 3 rounds. All creatures in a 15-foot emanation take #2-16 Complex Damage# equally split between bludgeoning and piercing with a #DC+2# basic reflex saving throw. Players can Study the device with a #DC+2# Religion or Crafting check.</p><h4>Fisher’s Sky</h4><p>This series of interconnected bladders spews glowing gas into the air once activated.</p><p><strong>Routine </strong><span style=\"font-family:Pathfinder2eActions\">2</span>\_The Fisher’s Sky uses its Spurt Cloud action then uses its Vent Exhaust action.</p><p><strong>Spurt Cloud\_</strong><span style=\"font-family:Pathfinder2eActions\">1 </span><span style=\"font-family:var(--journal-serif)\">The Fisher’s sky fills a 20-foot emanation with glowing spores. This has the effect of Stinking Cloud but the cloud also glows with bright light.</span></p><p><strong>Vent Exhaust </strong><span style=\"font-family:Pathfinder2eActions\">1 </span><span style=\"font-family:var(--journal-serif)\">The device sends a 60-foot cone of poisonous off-gases in a random direction. Living creatures in the cone take #2-16 Complex Damage# poison damage with a #DC+2# basic fortitude saving throw. Creatures who critically fail this save are Confused for one minute and can attempt a new save at the end of each of their turns.</span></p><p><strong>Special </strong>The Fisher’s Sky deflates harmlessly after five rounds. Players can study the device with a #DC+2# Nature, Occultism, or Crafting check.</p><h2>Recommended Locations</h2><p>A relatively clear patch of forest.</p><h2>Recommended Creatures</h2><p>Incorporeal undead, aberrations, nocturnal animals and beasts, fungi, and creatures native to the darklands.</p><p>Corporeal undead and creatures with the Humanoid trait are not suited to this adventure.\_</p><h2>Recommended Loot</h2><p>Gold paid by the Dungeoneering Society accounts for 100% of this adventure's treasure budget. Players earn some gold for journeying into the darkness and for each encounter cleared, as described in the table below. Additionally, if the party earns eight development points studying devices, they earn a development bonus in gold equal to 10% of the total treasure budget and learn a piece of information.</p><table style=\"width:93.9872%\" border=\"1\"><tbody><tr><td style=\"width:20.8432%\">Journeying Out</td><td style=\"width:79.1588%\">25% of total treasure budget</td></tr><tr><td style=\"width:20.8432%\">Encounter Clear</td><td style=\"width:79.1588%\">25% of total treasure budget per encounter cleared.</td></tr><tr><td style=\"width:20.8432%\">Eight Development points</td><td style=\"width:79.1588%\">10% of total treasure budget and the party learns that an adapted version of the devices could be kept on the Airship and used to disperse even the most intense patches of darkness.\_</td></tr></tbody></table><p>\_</p>"
