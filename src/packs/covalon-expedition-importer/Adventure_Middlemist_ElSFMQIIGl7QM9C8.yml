        flags: {}
        system:
          description:
            gm: ''
            value: "<p>A cascading wave of shadow bursts from the Hand of Darkness in a\_<span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">@Template[type:cone|distance:20]. Each non-shadow creature in the area takes [[/r 6d6]] mental damage and must succeed at a </span><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">@Check[type:will|dc:30] save with the following effects:</span></p>\n<p>\_</p>\n<p><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\"><strong>Critical Success</strong> - The creature is unaffected</span></p>\n<p><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\"><strong>Success</strong> - The creature takes half damage.</span></p>\n<p><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\"><strong>Failure</strong> - The creature takes full damage and is @Compendium[pf2e.conditionitems.e1XGnhKNSQIm5IXg]{Stupefied 1} and @Compendium[pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 1} for 1 round</span></p>\n<p><strong>Critical Failure</strong> - The creature takes double damage and is @Compendium[pf2e.conditionitems.e1XGnhKNSQIm5IXg]{Stupefied 2} for 1 minute and @Compendium[pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 2}</p>"
