      - sort: 400000
        name: Middlemist Finale
        type: text
        _id: LHO6OfDwDgBdeijD
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3>Hook</h3><p>Through dedicated research and dangerous excursions, Covalon has discovered that the source of the gloom over Middlemist is the presence of a huge Shadow Titan. Not only this, but it also is the location of another Vessel of the Maw! Despite our initial victory against the creature, it continues to replenish itself from the gloom and assault the Seed of Terra. Luckily we have the Airship intact to stage another assault to keep the Seed safe!\_</p><p>\_</p><h3>The Harbinger's Flight</h3><p>In an attempt to destroy the growing sapling, the Maw has replenished and bolstered the Shadow Titan into a facsimile and sent it to destroy the Seed. Our scouts have identified that it's nearly at a critical stage of its replenishment so we need to get out there as soon as possible! Ship preparations can take quite a while, so players may only use pre-buffing spells that last 8 hours or longer.\_</p><p>As part of the preparations, player characters are connected to a central line on the ship via a 50ft length rope. This rope cannot be destroyed, and can be fully retracted to the centre of the ship with a single Interact action. Players can Interact with their harness even while their hands are full.\_</p><p>The centre of the ship contains a light emitting device that is able to cut through the incredible gloom around the Shadow Titan. The device emits 80 feet of Bright Light that is not reduced by the Middlemist gloom effects in the Middlemist Briefing.\_</p><p>Unless it is prevented from moving by an Obstacle, the ship moves one stage at the start of the round except the first. The total moves are: Start -&gt; Obstacle 1 -&gt; Obstacle 2 -&gt; Showdown.\_</p><p>The PCs begin on the Harbinger, and the Shadow Titan starts on the far right of the map with its two hands nearby. 4 Clinging Shadow monsters spring to life on the ship at the start of combat and the first sabotage occurs.\_</p><div data-visibility=\"gm\"><p>The Airship is a Tile asset in Foundry. If you accidentally delete it, or it breaks, you can add a new one from the Tile tool. The dimensions should be Width - 1200, Height - 1700.\_</p></div><h4>Sabotage</h4><p>At the start of combat, and after each time the Harbinger moves a Sabotage occurs. GMs should select a random Sabotage from the below table. <strong>If a Sabotage is not resolved within 3 rounds, the ship is damaged beyond the ability to continue battle against the Shadow Titan and the party </strong><em><strong>must</strong></em><strong> retreat.</strong> Make players aware of this information so they can appropriately prioritise when multiple effects take place at once.\_</p><p>When adjudicating what works to resolve a Sabotage when players attempt a creative solution, use the below action costs as a guideline but be permissive where possible. For example, a successful attempt to\_<em>dispel magic</em> on the Luminous Overload Sabotage should succeed, even if it's not listed as a resolution.\_</p><p>\_</p><table style=\"width:94.0146%;height:76px\" border=\"1\"><tbody><tr style=\"height:19px\"><td style=\"width:22.7101%;height:19px\"><strong>Sabotage Name</strong></td><td style=\"width:77.1369%;height:19px\"><strong>\_Sabotage Effect and Resolution</strong></td></tr><tr style=\"height:19px\"><td style=\"width:22.7101%;height:19px\">Hull Breaches</td><td style=\"width:77.1369%;height:19px\"><p>\_4 Breaches appear on the ship as it is bombarded with Shadow bolts from the Titan.\_</p><p>A character who is at least Expert in Crafting or a relevant Lore may attempt to Repair the breaches with a single interact action. (#DC-2# for Lore and #DC# for Crafting).</p><p>Characters who are not Expert in either Crafting or a Relevant Lore may spend a total of 3 actions making a haphazard repair to fix a single breach. These actions do not need to come from the same creature, and a creature must be adjacent to a breach in order to attempt to fix it.\_</p></td></tr><tr style=\"height:19px\"><td style=\"width:22.7101%;height:19px\">Luminous Overload</td><td style=\"width:77.1369%;height:19px\"><p>The central machine generating light is overloaded with shadow energy! Left unchecked, it could explode before we have a chance to get close enough to the Shadow Titan! While this Sabotage is in effect, the central device only emits 15 ft of Bright Light.\_</p><p>A character who is at least Expert in Arcana, Nature, Religion, Occultism or trained in a relevant Magic-related Lore can attempt to control the shadow energies and disperse them. This requires a single action with the Flourish trait has is #DC# for Arcana, Nature, Religion or Occultism and #DC-2# for a relevant Lore skill.\_</p><p>Characters who are not Expert in the above skills, or trained in a relevant Lore may use a total of 9 actions to resolve the Sabotage automatically. These actions may be spread across multiple creatures.\_</p></td></tr><tr style=\"height:19px\"><td style=\"width:22.7101%;height:19px\">Engine Sabotage</td><td style=\"width:77.1369%;height:19px\"><p>Shadow Creatures have sabotaged the engine and hidden 3 critical components on the ship! You must locate the components and replace them in the Engine before it critically malfunctions!</p><p>The GM should choose 3 random locations for components to be hidden. Players must Seek to find the components and then take them to the Engine. Components require one hand to carry and have L bulk. Components can be replaced in the Engine with a single Interact action that requires no check.\_</p></td></tr></tbody></table><h4>Obstacles</h4><p>When the Ship reaches the marked areas on the map, it is halted by an Obstacle below. These obstacles may be presented in any order.\_</p><table style=\"width:93.9093%\" border=\"1\"><tbody><tr><td style=\"width:25.0833%\"><strong>Obstacle Name</strong></td><td style=\"width:74.9167%\"><strong>\_Obstacle Effect and Resolution</strong></td></tr><tr><td style=\"width:25.0833%\">Shadow Tendrils</td><td style=\"width:74.9167%\"><p>Tendrils of shadow grip the underside of the Ship's hull and prevent further movement. Tendrils have Total Cover from creatures on the Ship's deck, and they will need to either Fly or jump down from the deck on their tethers to target the Tendrils.\_</p><p>There are 250hp worth of tendrils in total, and they have the same AC, Saves and HP as the appropriate Clinging Shadow for the tier of play. The Shadow Tendrils do not inherit any of the Clinging Shadows others statistics or abilities.\_</p><div data-visibility=\"gm\"><p>When a character is hanging the full 50ft from their tether, they should be considered in Touch range of all shadow tendrils. For flying creatures and other measurements, assume that the Tendrils are immediately below the Ship.\_</p></div></td></tr><tr><td style=\"width:25.0833%\">Stolen Captain!</td><td style=\"width:74.9167%\"><p>The captain is kidnapped by one of the Hands of Darkness. The hand with the highest current hp Flies next to the captain, Grabs them and assumes their clenched form all as a single Free Action. This Action does not provoke reactions. The Hand cannot move more than 50ft from the Ship while holding the Captain due to the rope, and while holding the captain the Hand is @Compendium[pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 1} to represent consistently maintaining the Grab.\_</p><p>Reducing the hand to 0 hp releases the Captain, who is able to quickly return to their post and get the ship moving again.\_</p></td></tr></tbody></table><h4>Showdown</h4><p>After the party have arrived beyond the two Obstacles, the Captain rams the Titan with the ship for the final showdown. Have the Titan's token placed on the front of the ship so melee attacks are able to reach it. The party must bring the Shadow Titan to 0 hp and use the central Light device as a bomb to diminish it enough to leave the Vessel vulnerable and give them time to plant the Seed.\_</p><p>Once the Shadow Titan is brought to 0 hp, have it stop all attacks and allow the players to narrate how they utilise the overwhelming light of the ship's central device to destroy the Titan. Some examples may be having a particularly strong character throw it into the centre of the darkness, or having it fused with ballista ammo that the players can shoot at the titan.\_</p><h3>Tactics Overview</h3><p>The Shadow Titan is a cold and alien creature, and is attempting to disrupt the party as much as possible from completing their objectives in the first phase of the fight.\_</p><p>The Hands of Darkness shoot at the party with their <strong>Shadow Rays</strong> while they close the distance. Once they arrive close to the Ship they use <strong>Umbral Wave</strong> before using\_their melee abilities which tend to be more disruptive. Hands focus on using <strong>Clap</strong> when it's available, and otherwise attempting to\_<strong>Fling</strong> players off the ship. Remember that players are tethered!\_</p><p>The Shadow Titan uses <strong>Bind Shadows</strong> whenever it is available, and use the players abilities against them. While this is recharging, the Titan uses <strong>Soulrending Gaze\_</strong>to lower players statistics and then blast them from a distance with\_<strong>Tenebrous Bolt</strong>, attempting to hit as many players with the Negative Splash damage as possible.\_</p><p>Clinging Shadows focus on Grabbing players trying to complete tasks, or stacking their <strong>Gripping Shadows</strong> passive on players by hitting them with <strong>Shadow Bolts.</strong></p><h3>Loot</h3><p>The entirety of the treasure budget is given out in raw GP, paid by the NPC used for the hook. Additionally, players unlock the ability to customise their Soul Seed, gaining access to the Shadow aspect.\_</p><h3>Asset Credits</h3><p>Special thank you to Dr. Care for the Clinging Shadows token artwork, Mikom for the Background and Airship assets, and Sej for the Shadow Titan and Hands artwork!</p><p>\_</p><p>Thank you to Resh, Mikom, Kismet, Dr. Care, Tox and Asbil for helping to playtest!</p>"
