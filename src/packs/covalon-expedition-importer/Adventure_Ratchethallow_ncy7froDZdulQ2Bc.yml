      - sort: 300000
        name: 'Ratchethallow Mission B: Factory Infiltration'
        type: text
        _id: E98GCvRg3KqoQbGn
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <h3>Hook</h3><p>A way into Ratchethallow was discovered through one
            of the perimeter factories. While we can enter into the city from
            here, there may still be some vital manufacturing happening in that
            factory. We need you to venture into the factory and figure out what
            it is making.</p><h3>Required Elements</h3><ol><li><p>All creatures
            in this Mission must have the <strong>Construct</strong> Trait added
            to them if they do not already have it, they do not need to have the
            Mindless Trait though.</p></li><li><p>At least one third of this
            missions experience should be used on hazards specific to the
            factory, these can be found below.</p></li><li><p>Modifications to
            hazards when adjusting for Average Party Level (APL) should be as
            follows:</p><hr /><ul><li><p><strong>Shifting Floor
            (Complex):</strong> A 10x10 section of the floor moves horizontally
            moving any creatures on it with it. If it moves a creature so that
            it would trigger another hazard, that hazard will activate at the
            start of the creatures turn.</p><ul><li><p>Level should be equal to
            the Average Party Level</p></li><li><p>Disable Checks
            <strong>#Hazard 2-13 Extreme#</strong></p></li><li><p>Minimum
            Proficiency <strong>#Hazard 2-14
            Moderate#</strong></p></li></ul></li><li><p><strong>Arcing Horns
            (Simple):</strong> A conducting pole with electricity arcing off of
            it. Any creature that comes within 10 feet of it is struck by a
            lightning attack that arcs to another creature within 30 feet of the
            pole.</p><ul><li><p>Level should be Average Party Level
            -1</p></li><li><p>Disable Checks <strong>#Hazard 2-13
            High#</strong></p></li><li><p>Minimum Proficiency <strong>#Hazard
            2-14 Moderate#</strong></p></li><li><p>Attack Roll Modifier
            <strong>#Hazard 2-16 S.Atk+1#</strong></p></li><li><p>Damage Roll
            <strong>#Hazard 2-16 Simple
            Damage-1#</strong></p></li></ul></li><li><p><strong>Steam Vent
            (Complex):</strong> A vent in the floor nearly indistinguishable
            from any other vent, when a creature stands on it releases a 10x10
            burst of steam, dealing fire damage and concealing the area for one
            turn.</p><ul><li><p>Level should be Average Party Level
            -2</p></li><li><p>Disable Checks <strong>#Hazard 2-13
            High#</strong></p></li><li><p>Minimum Proficiency <strong>#Hazard
            2-14 Moderate#</strong></p></li><li><p>Attack Roll Modifier
            <strong>#Hazard 2-16 C.Atk#</strong></p></li><li><p>Damage Roll
            <strong>#Hazard 2-16 Complex
            Damage#</strong></p></li></ul></li><li><p><strong>Pistons
            (Simple):</strong> Pistons positioned in the walls or floor. These
            pop out and strike creatures that enter a space adjacent (or on top
            of) them and strike them, moving them 5 feet (10 on a critical) and
            dealing bludgeoning damage.</p><ul><li><p>Level should be Average
            Party Level -2</p></li><li><p>Disable Checks <strong>#Hazard 2-13
            High#</strong></p></li><li><p>Minimum Proficiency <strong>#Hazard
            2-14 Moderate#</strong></p></li><li><p>Attack Roll Modifier
            <strong>#Hazard 2-16 S.Atk+1#</strong></p></li><li><p>Damage Roll
            <strong>#Hazard 2-16 Simple
            Damage-1#</strong></p></li></ul></li></ul></li></ol><h3>Recommended
            Locations</h3><p>Locations such as Abandoned Warehouses or Factories
            are ideal.</p><h3>Recommended Creatures</h3><p>Animals, Beasts,
            Constructs, Giants, and Humanoids. Just make sure to add the
            Construct Trait to any non-construct creature as there is no organic
            life in Ratchethallow.</p><p>Feel free to remove the mindless Trait
            if you would like as these constructs often have a level of
            sentience, although not often much more than to make optimal
            decisions to perform basic functions and tasks.</p><h3>Recommended
            Loot</h3><p>The entirety of the treasure budget should given out in
            raw Gold.</p>
