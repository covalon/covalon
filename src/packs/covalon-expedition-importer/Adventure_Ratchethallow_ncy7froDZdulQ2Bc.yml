          up to 30 feet in a straight line moving any creatures on it with it.
          Creatures that are large in size or greater fall prone and do not move
          as the floor slides out from under them.</p>

          <p>This is a forced movement effect and DOES NOT provoke attacks of
          opportunity or other reactions triggered by a "movement" action.</p>

          <p>The area where the floor was is replaced with new flooring and does
          not create a pit or hole.</p>
