name: Ratchethallow
img: modules/covalon/images/Ratchethallow_Camp.webp
caption: ''
sort: 0
description: >-
  <div class="block template"><div class="block "><h3
  id="ratchethallow">Ratchethallow</h3></div><div class="block taglist"><p><span
  class="inline-block tag">Civilization</span></p></div><p>The inexorable march
  of progress.</p><div class="block indented"><p><strong>Government</strong> The
  Crown of Gears (Meritocratic Monarchy)</p><p><strong>Population</strong>
  kobolds, gnomes, humans, dwarves, hobgoblins,
  ysoki</p><p><strong>Religion</strong> none</p><p><strong>Primary
  Exports</strong> technological research, worked metals,
  jewellery</p><p><strong>Geography</strong> brush desert surrounded by
  mountains</p><p><strong>Fate</strong> unknown</p></div><hr /><p>Ratchethallow
  was a small city, specialising in the march of mechanical progress. Whirring
  cogs and whistling machines lined the cramped walkways of the city. Between
  brass houses and belching furnaces, the city attracted the brightest and most
  curious minds. Nowhere else in Elleaterra could boast such unfettered access
  to raw materials, precision tools and most importantly a distinct lack of
  bureaucratic red tape. Ratchethallow knew that failure was just a step towards
  progress, and that so called ‘Safety Regulations’ prevented progress more than
  any explosion could!</p><p></p><p>Yet even Ratchethallow knew that the
  Cataclysm would claim them eventually. The brightest minds converged in the
  development of the city’s greatest machine yet. A sprawling mass of exposing
  wiring, tubes and ingenuity designed to keep the city safe from even the
  unstoppable forces of the Cataclysm. Nothing was heard from Ratchethallow
  after the day the machine was due to be powered on. The fate of Ratchethallow
  remains unknown.</p></div>
