journal:
  - name: Ratchethallow Expedition
    pages:
      - sort: 100000
        name: Ratchethallow Briefing
        type: text
        _id: 6lj7JCJxSXPY6tdp
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h2>Background</h2><p>The greatest mechanical minds of Ratchethallow came together in rare cooperation after the start of the Cataclysm to create the Cataclysm Defence Machine, a mysterious contraption intended to keep the city safe from the wild and far-reaching effects of the Cataclysm. Included in this, is a wide mechanical barrier around the city. </p><p>Once the birthplace of progress, Ratchethallow has remained silent and mysteriously obscured by the mechanical barrier since the fateful day of its Cataclysm Defence Machine being activated. Plumes of smoke still billow from vents in the dome, however, and this can only be a sign of valuable resources inside. Hopefully the denizens of Ratchethallow remain, and can assist us in the fight against the Maw! </p><h2>Mission Overview</h2><p>After a bumpy journey across the land towards Ratchethallow's location, Covalon citizens noticed a number of mechanically augmented beasts and creatures in the vicinity of the City of Gears. They have been far too skittish for us to get close enough to study, but their very existence is deeply worrying. What mad mind had completed such experiments and 'augmentations'? For what purpose? </p><p>It is clear that we need to study these creatures. Further, we have been able to penetrate the barrier surrounding the city sufficiently to allow for small groups to infiltrate the dome and determine what is creating the smoke inside. We have also spotted some heavily guarded areas outside of the dome that look to be small industrial expansions. We need to know what these are, what their purpose is and also if they hold any insight into what has happened to Ratchethallow!</p><h2>How to Run an Expedition</h2><p>Expeditions are composed of two subtypes: missions and finales. Missions are a set of three dungeon-like adventures that are narratively linked, but can be completed in any order. Each mission must include predetermined narrative and mechanical elements while sticking to a theme of locations, creatures, and loot, which are included in its associated journal entry, with the specifics of the blanks to be filled in by the GM of the adventure. Like other adventure types, Dungeon Guides must submit their expedition missions for approval.</p><p>When reading the instructions for an expedition, you may see key terms surrounded by number signs. These indicate that the term should be replaced by a value that's dependent on the adventure's average party level. When submitting your expedition for approval, you must include the values you plan to replace these terms with. Here is a list of terms:</p><ul><li><strong>#Creature [Table Number] [Modifier]#</strong> should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=995\">Building Creatures</a> section of the Gamemastery Guide. For example, \"#Creature 2-8 Minimum# means that you should reference the Building Creatures rules, look for Table 2-8, and use the value in the Minimum column for the creature's level (adjusted for elite or weak as appropriate).</li><li><strong>#Hazard [Table Number] [Modifier]#\_</strong>should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=1043\">Building Hazards</a> section of the Gamemastery Guide. For example, \"#Hazard 2-16 Simple Damage# means that you should reference the Building Hazards rules, look for table 2-16, and use the value in the Simple Damage column for the hazard's level.</li><li><strong>#DC [Modifier]#\_</strong>should be replaced by a value according to the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=554\" target=\"_blank\" rel=\"noopener\">DCs by Level</a> table in the Core Rulebook. If a modifier is included, the value should be adjusted accordingly. For example, \"#DC +5#\" means that you should reference the DCs by Level table, find the value appropriate for the party's average level, then add 5 to it.</li></ul><p>Finales are singular encounters against a narratively significant threat that conclude an expedition. They come in two versions: normal mode and hard mode. Before a finale is cleared for the first time, it can only be run by Covalon administrators and moderators, and is ran at hard mode. Afterwards, the finale can be ran by any Dungeon Guide at normal mode (though players can request hard mode if they'd like). Normal mode can be run in Tier 2 or above, and hard mode can only be run at the highest tier, intended for max level characters. Unlike missions, finales use a specific map and specific creatures, included with this module.</p><p>Each finale comes with three variant modifications. When running a normal mode finale, a GM choose one of the three modifications to use, or can roll [[/r 1d3]] to randomly determine which modification to use. When running a hard mode finale, the GM uses all three modifications.\_There are no additional rewards for completing hard mode.</p><h2>Reporting a Completed Expedition</h2><p>When reporting a completed expedition in the Dungeon Summaries channel, use the\_<strong>exact name</strong> of the adventure as the adventure's title. For example, if you ran the first mission of Ratchethallow, the summary's title should be \"<span style=\"font-family:Signika, sans-serif\">Ratchethallow Mission A: Machine Hunter</span>\" exactly. The summary should otherwise follow the same format as dungeons.</p><p>Finally, any narrative-based knowledge or intrigue that the players gain as a result of the expedition should be left out of the summary. For example, if the players complete a bonus objective that allows them to learn special information as detailed in the Required Elements or Recommended Loot section of each journal entry, that should be left out of the dungeon summary.</p>"
