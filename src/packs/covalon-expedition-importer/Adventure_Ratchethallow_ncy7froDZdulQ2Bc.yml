      - sort: 400000
        name: 'Ratchethallow Mission C: Assault The Outpost'
        type: text
        _id: lU1NqaoVZYi89Khe
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<p>by Reginald-5</p><h3>Hook</h3><p>We have located heavily guarded outposts on the the edges of the magical barrier. We need adventurers to break in and retrieve what the Lord of Gear's is hiding within.</p><h3>Required Elements</h3><ol><li><p>The First and Third Encounters are fought on the same map, the enemies and players switching starting positions. The second encounter takes place further into the facility/outpost that the players are infiltrating in order to retrieve the supplies or information inside the Mastermind Chest.</p></li><li><p>The First and Third Encounter must have the Bursting Automatic Pillars (BAPs) complex hazard set to <strong>#APL#</strong>. In the Third Encounter the BAPs will be on the side of the Adventuring party if they succeeded in the Mastermind Chest encounter. Do not include the BAPs in the exp budget for the final encounter, even if the party failed to convert it.</p></li><li><p>The Second Encounter consists only of the Mastermind Chest complex hazard outlined below.</p></li><li><p>The Lord of Gears is notified of intruders during the First Encounter, and has dispatched an elite squad to deal with the intruders. If the players take more than two 10 minute rests between the First and Third Encounters, give the Third encounter enemies a +2 circumstance to initiative, as they had time to set-up around the building.</p></li></ol><h3>Stationary Electric Pillars</h3><table border=\"1\"><tbody><tr><td><h4><strong>Bursting Automatic Pillars</strong></h4><section><section class=\"traits\"><p>Complex</p><p>Magical</p><p>Trap</p><p>mechanical</p></section><p style=\"margin-top:0.5em\"><strong>Complexity\_</strong>Complex</p><p style=\"margin-top:0.5em\"><strong>Description\_</strong>A medium sized magical turret is stationary on a wall overlooking an open area. A tube feeds a limitless number of cogs into its barrel to attack any intruders that are not attuned to it.</p><hr /><p style=\"margin-top:0.5em\"><strong>Disable</strong> <span class=\"pf2-icon\">a</span><span style=\"font-family:Signika\"><strong>\_</strong></span><span class=\"pf2-icon\">a </span><strong>#Hazard 2-13 Low Max# </strong>Thievery check to jam the loading mechanism. <strong>#Hazard 2-13 High# </strong>Arcana or Occult check to disrupt the targeting system. Both checks requires the creature to be adjacent to the turret and require proficiency of <strong>#Hazard 2-14 Minimum Proficency Moderate#</strong>.</p><p></p></section><section><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><strong>AC</strong> </span><strong>#Hazard 2-15 HAC#</strong><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\">, <strong>Fort</strong> </span><strong>#Hazard 2-15 H Save#</strong><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\">, <strong>Ref</strong> </span><strong>#Hazard 2-15 L Save#</strong><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><br /><strong>Hardness</strong> </span><strong>#Hazard 2-15 Minimum Hardness#</strong><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\">, <strong>HP</strong> </span><strong>#Hazard 2-15 Maximum HP#</strong><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\">(BT 1/2 HP) to destroy the cogs firing mechanisms; <strong>Immunities</strong> critical hits, object immunities, precision damage</span></p><p style=\"margin-top:var(--p-space,1em)\"><strong>Intruder </strong><span class=\"pf2-icon\"><strong>r</strong></span>\_(attack);\_<strong style=\"margin-top:var(--p-space,1em)\">Trigger\_</strong>An creature that is not attuned to the turret enters its first range increment. <strong style=\"margin-top:var(--p-space,1em)\">Effect\_</strong>The hazard makes 2 ranged attacks at the creature, then rolls initiative.<br /><br /><strong>Attuned Splash</strong> (passive) Creatures attuned to the BAPs do not take splash damage from its attacks.</p><hr style=\"border-top:1px solid var(--color-border-light-primary);border-bottom:1px solid var(--color-border-light-highlight);margin-top:var(--p-space,1em)\" /><p style=\"margin-top:var(--p-space,1em)\"><strong>Routine\_</strong>(4 actions) The hazard alternates between both ranged Strikes against the closest 4 enemies, it ignores multiple attack penalty. Shocking on attacks 1 &amp; 3, and boiling on attacks 2 &amp; 4.</p><p style=\"margin-top:var(--p-space,1em)\"><strong>Ranged </strong><span class=\"pf2-icon\">a</span><span style=\"font-family:Signika\"><strong>\_</strong></span>shocking burst <strong>#Hazard 2-16 C. Atk# </strong>(range increment 60 feet, splash 5t), <strong style=\"margin-top:var(--p-space,1em)\">Damage\_</strong><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><strong>#Creature 2-10 Mod.# </strong></span>electricity damage, no multiple attack penalty (the flat damage portion is treated as splash damage, for example APL 14 will do 3d8 electricity damage and 15 electricity splash damage)</p></section><p style=\"margin-top:var(--p-space,1em)\"><strong>Ranged </strong><span class=\"pf2-icon\">a</span><span style=\"font-family:Signika\"><strong>\_</strong></span>boiling burst <strong>#Hazard 2-16 C. Atk# </strong>(range increment 60 feet), <strong style=\"margin-top:var(--p-space,1em)\">Damage\_</strong><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><strong>#Creature 2-10 Mod.# </strong></span>fire damage, no multiple attack penalty (the flat damage portion is treated as splash damage, for example APL 14 will do 3d8 fire damage and 15 fire splash damage)</p></td></tr></tbody></table><h3>Mastermind Chest</h3><p><strong>NOTE FOR LOW TIERS (1 &amp; 2): </strong>The Maximum number of oozes present at once for Tiers 1 &amp; 2 should be 3. When an ooze is destroyed for any reason in these tiers, it is immediately replaced. The mechanics of the hazard are otherwise unchanged. </p><table style=\"font-family:var(--journal-serif);font-size:var(--font-size-14);width:94.0517%;height:603.594px\" border=\"1\"><tbody><tr style=\"height:603.594px\"><td style=\"width:100%;height:603.594px\"><h4><span style=\"font-family:Signika\"><strong>Mastermind aka \"Hack\" the System</strong></span></h4><section><section class=\"traits\"><p><span style=\"font-family:Signika\">COMPLEX</span></p><p><span style=\"font-family:var(--journal-serif)\">abjuration</span></p><p><span style=\"font-family:var(--journal-serif)\">conjuration</span></p><p><span style=\"font-family:Signika\">Evocation</span></p><p><span style=\"font-family:Signika\">enchantment</span></p><p><span style=\"font-family:Signika\">illusion</span></p><p><span style=\"font-family:Signika\">magical</span></p><p><span style=\"font-family:Signika\">trap</span></p></section></section><p><span style=\"font-family:Signika\"><strong>Complexity\_</strong>Complex</span></p><p><span style=\"font-family:Signika\"><strong>Description\_</strong>An adamantine chest is heavily enchanted and sealed. When a creature attempts to open the box, advanced magical sigils appear over the locking mechanism, and 6 oozes appear nearby (2 blue, 2 yellow, 2 red). The creature has 1 minute (the end of the 10th round of combat) to decipher and enter the combination, or else the box remains sealed, and combination can't be retried for an hour. If the creature is successful, the chest unlocks and any nearby Bursting Automatic Pillars are repaired and become attuned to the occupants of the room.</span></p><blockquote><p><span style=\"font-family:var(--journal-serif)\">Make clear to the players that there are 3 differently coloured buttons/lights/panels on the chest that correspond to the colours of the oozes. This should be sufficient to indicate to the players that there is more to do here than simply kill the oozes indiscriminately</span></p></blockquote><hr /><p><span style=\"font-family:Signika\"><strong>Disable SECRET\_\_</strong></span><span class=\"pf2-icon\">a</span><span style=\"font-family:Signika\"><strong>\_</strong></span><span class=\"pf2-icon\">a </span><span style=\"font-family:Signika\">Crafting <strong>#Hazard 2-13 High#</strong> to re-align magical arrays to display the combination; or Arcana, Divine, Primal, Occult <strong>#Hazard 2-13 Low Max#</strong> to decipher the magical flows and identify the combination. To determine the color combination, roll secret 3d6 and use the results [1-2] blue, [3-4] yellow, [5-6] red, max of 2 duplicate numbers. The order of dice matter e.g. 3d6 = 2, 4, 6 must be entered as blue, yellow, red. This a <strong>secret</strong> check, and the correct combination must be entered 4 times to open the chest (best to prep these ahead of time). </span><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\">When an ooze is destroyed in the correct combination, it does not reappear until the whole combination is correctly completed. Each time the combination is entered correctly, all current oozes are destroyed and replaced with 6 fresh oozes. You must also generate a new combination.</span></span></p><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><br /><strong>Critical Success</strong> As Success except the combination counts as 2 correct entries.<br /><strong>Success</strong> The creature successfully identifies the current color combination, as part of the 2 actions they may shout out the combination.<br /><strong>Failure</strong> The colors and writing is shifting too much to identify the color combination. The creature learns nothing.<br /><strong>Critical Failure</strong> As Success, but instead they learn an <strong>incorrect</strong> combination.<br /><br /></span></span></p><p><span style=\"font-family:Signika\"><strong>Release the Ooze! </strong></span><span class=\"pf2-icon\"><strong>r</strong></span>\_<span style=\"font-family:Signika\"><strong>Trigger\_</strong>A creature attempts to open the lid of the chest <strong>Effect\_</strong>A layer of colorful magic encompasses the chest, and 6 oozes (2 blue, 2 yellow, 2 red) appear within 10ft. Each color group rolls its own initiative, the chest does not have an initiative.</span></p><hr /><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><strong>Ooze Stats<br />Traits </strong>N Small Mindless Ooze Summoned<strong><br />Perception </strong>no vision, tremorsense (imprecise) 60ft<strong><br />AC</strong> </span></span><span style=\"font-family:Signika\"><strong>#Hazard 2-15 LAC-5#</strong></span><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\">, <strong>Fort</strong> </span></span><span style=\"font-family:Signika\"><strong>#Hazard 2-15 E Save#</strong></span><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\">, <strong>Ref</strong> </span></span><span style=\"font-family:Signika\"><strong>#Hazard 2-15 L Save#, Will #Hazard 2-15 L Save# </strong></span><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><br /><strong>HP</strong> <strong>#Tier*25#</strong>; <strong>Immunities</strong> critical hits, precision damage, mental, trip, flat-footed, prone, sickened, fear effects, blue = cold, red = fire, yellow = electricity</span></span></p><p><span style=\"font-family:Signika\"><strong>Wrong Color!</strong> (arcane, evocation, *ooze element type) When an ooze is destroyed in the wrong combination it explodes in a @Template[type:emanation|distance:20]{20 feet} emanation. All creatures other than oozes make a <strong>#DC#</strong> basic Reflex saving throw or take <strong>#Hazard 2-16 Simple Dmg#</strong> cold/electricity/fire. This passive cannot damage the other oozes. When an ooze is destroyed in this manner, the chest conjures any colored oozes that have been destroyed as a free action within 10 ft. The creature must re-enter the correct combination.<br /><strong>Tethered Summon</strong> The ooze cannot willing move more that 80ft from the chest that summoned it. If the ooze breaks the 80ft tether via forced movement, it immediately activates the Wrong Color! passive.</span></p><hr /><p><span style=\"font-family:Signika\"><strong>Routine\_</strong>(3 actions per ooze) Each pair of colored oozes share the same initiative and have 3 actions each. They have a ground speed of 40ft. On the oozes' turn, they aim to catch as many intruders in their Bright Color ability, then stride as far away as possible, without breaking their tether to the chest. The Bright Color ability may only be used once per round per ooze.</span></p><p><span style=\"font-family:var(--journal-serif)\"><br /></span></p><p><span style=\"font-family:Signika\"><strong>(BLUE) Bright Color\_</strong></span><span class=\"pf2-icon\">a</span><span style=\"font-family:Signika\">\_<strong>Traits (</strong>arcane, conjuration, cold, flourish) <strong>Effect\_</strong>The blue ooze releases a blast of muscle freezing cold in a @Template[type:emanation|distance:10]{10 feet} emanation. Make a <strong>#DC#</strong> Fortitude saving throw.</span></p><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><strong>Critical Success</strong> The creature is unaffected.</span></span></p><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><strong>Success</strong> Cold saps the creature, they must treat all movement as difficult terrain until the end of their next turn.</span></span></p><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><strong>Failure</strong> Ice encases the creature, they take </span></span><span style=\"font-family:Signika\"><strong>#Creature 2-12 Unlimited#</strong> </span><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\">and is @Compendium[pf2e.conditionitems.eIcWbB5o3pP6OIMe]{Immobilized} until the end of their next turn.</span></span></p><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><strong>Critical Failure</strong> The cold bites deep into the creature's muscles. As Failure plus, the creature takes </span></span><span style=\"font-family:Signika\"><strong>#1 persistent per Tier#</strong></span><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"> cold damage, and is @Compendium[pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed} until the persistent damage is removed.</span></span></p><p><span style=\"font-family:var(--journal-serif)\"><br /></span><span style=\"font-family:Signika\"><strong>(YELLOW) Bright Color\_</strong></span><span class=\"pf2-icon\">a</span><span style=\"font-family:Signika\">\_<strong>Traits (</strong>arcane, evocation, lightning, flourish, visual) <strong>Effect\_</strong>The yellow ooze emits a bright light, shocking creatures in a @Template[type:emanation|distance:10]{10 feet} emanation. Make a <strong>#DC# </strong>Reflex saving throw.</span></p><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><strong>Critical Success</strong> The creature is unaffected.</span></span></p><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><strong>Success</strong> The creature is @Compendium[pf2e.conditionitems.TkIyaNPgTZFBCCuh]{Dazzled} until the end of their next turn.</span></span></p><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><strong>Failure</strong> The bright light pierces the creatures eyes, they take </span></span><span style=\"font-family:Signika\"><strong>#Creature 2-12 Unlimited#</strong> electricity damage and is </span><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\">@Compendium[pf2e.conditionitems.XgEqL1kFApUbl5Z2]{Blinded} until the end of their next turn.</span></span></p><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><strong>Critical Failure</strong> Electricity assaults the creatures eyes. As Failure plus, the creature takes </span></span><span style=\"font-family:Signika\"><strong>#1 persistent per Tier#</strong></span><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"> cold damage, and is @Compendium[pf2e.conditionitems.XgEqL1kFApUbl5Z2]{Blinded} until the persistent damage is removed.</span></span></p><p><span style=\"font-family:var(--journal-serif)\"><br /></span><span style=\"font-family:Signika\"><strong>(RED) Bright Color\_</strong></span><span class=\"pf2-icon\">a</span><span style=\"font-family:Signika\">\_<strong>Traits (</strong>arcane, emotion, enchantment, fire, flourish, mental) <strong>Effect\_</strong>The red ooze pulses a wild befuddling glow, creatures in a @Template[type:emanation|distance:10]{10 feet} emanation make a <strong>#DC#</strong> Will saving throw.</span></p><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><strong>Critical Success</strong> The creature is unaffected.</span></span></p><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><strong>Success</strong> The creature babbles incoherently and is @Compendium[pf2e.conditionitems.dfCMdR4wnpbYNTix]{Stunned 1}</span></span></p><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><strong>Failure</strong> Flames burn confusion into the creature, they take </span></span><span style=\"font-family:Signika\"><strong>#Creature 2-12 Unlimited#</strong> fire damage and </span><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\">is @Compendium[pf2e.conditionitems.yblD8fOR1J8rDwEQ]{Confused} until the end of their next turn.</span></span></p><p><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"><strong>Critical Failure</strong> Flames of confusion linger in the creatures eyes. As Failure plus, the creature takes </span></span><span style=\"font-family:Signika\"><strong>#1 persistent per Tier#</strong></span><span id=\"ctl00_RadDrawer1_Content_MainContent_DetailedOutput\"><span style=\"font-family:Signika\"> fire damage, and is @Compendium[pf2e.conditionitems.yblD8fOR1J8rDwEQ]{Confused} for 3 rounds.</span></span></p></td></tr></tbody></table><p>\_</p><h3>Recommended Locations</h3><p>Urban areas with a single entrance large building, the more defensible the better. Should have an interior room or area that is large enough for 12 medium sized creatures to move about freely. Having multiple levels to chase the oozes is a good idea.</p><h3>Recommended Creatures</h3><p>Automatons, constructs, golems, animals with the construct template added to them.</p><h3>Recommended Loot</h3><p>Construct and mechanically themed loot is encouraged, however do consult the allowlist to ensure that it is permissable. Remember that the tech level is gunpowder and clockwork and stasian tech is too advanced for the setting.</p><p></p><p>The remainder of the loot is provided in raw gold. Award an additional 10% in raw gold if the party never trigger the \"Wrong Color!\" reaction from the Mastermind Hazard.</p>"
