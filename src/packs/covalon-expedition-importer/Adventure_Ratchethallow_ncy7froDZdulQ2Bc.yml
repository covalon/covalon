      - sort: 500000
        name: Ratchethallow Finale
        type: text
        _id: 77VuvjqQlUGc6mm7
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3 data-anchor=\"hook\" style=\"box-sizing:border-box;user-select:text;margin:0px 0px 0.5rem;padding:0px;font-weight:normal;font-size:1.25em;border-bottom:1px solid var(--color-underline-header);color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><span style=\"font-family:Signika, sans-serif\">Hook</span></h3><p>We found the base of operations of the gigantic construct that controlled Ratchethallow. Although our brave adventurers have slain the initial ruler, the Maw keeps sending facsimilies of it back to take out the Seed!</p><h3 data-anchor=\"conflict-in-the-quinate\" style=\"box-sizing:border-box;user-select:text;margin:1rem 0px 0.5rem;padding:0px;font-weight:normal;font-size:1.25em;border-bottom:1px solid var(--color-underline-header);color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><span style=\"font-family:Signika, sans-serif\">War of the Workshop</span></h3><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;min-height:unset;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:14px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">The Maw keeps sending the Lord of Gears back to try to recapture his workshop and take back control of the city!</span></p><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;min-height:unset;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:14px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">The PCs begin in the doorway of the map. The Lord of Gears starts at one of the workbenches near the bottom of the map. When the PCs enter, the Pillars flare up out of the ground with scalding steam filling the air throughout the workshop, sending energy streaming into the Lord of Gears. The ceilings in the workshop are 25 feet high. The Pillars reach up to the ceiling, and all other objects can be assumed to be 5 feet tall.</span></p><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;min-height:unset;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:14px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">As is standard for finales, no pre-buffs with a duration of less than 8 hours can be used.</span></p><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;min-height:unset;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:14px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">If the GM has not done so yet, they should select one of the three Modifications to apply (found in the Lord of Gears' stackblock) or roll [[/r 1d3]] to determine one randomly. Do not tell the players which Modification is in effect. (For Hard Mode, use all 3 modifications.)</span></p><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;min-height:unset;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:14px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">Should the PCs need to escape from the encounter, they can do by spending one action to open one of the doors and then one action to move through the door. Once outside of the workshop, the player is considered to be out of the encounter; they cannot re-enter and are immediately removed from initiative.</span></p><p>Note: The Energy Siphon Ability (permanent quickened from the Pillars) is not present in Tier 2 and Tier 3. Similarly, for Tiers 2 and 3, Energetic Overload increases quickened to 1 instead of 2.</p><h3 data-anchor=\"tactics-overview\" style=\"box-sizing:border-box;user-select:text;margin:1rem 0px 0.5rem;padding:0px;font-weight:normal;font-size:1.25em;border-bottom:1px solid var(--color-underline-header);color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><span style=\"font-family:Signika, sans-serif\">Tactics Overview</span></h3><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;min-height:unset;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:14px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">The Lord of Gears primary objective at the beginning of the fight is to protect the Pillars. As such, its primary target is likely to be whoever is posing the largest threat to the Pillars, or whoever is stopping it from defending the Pillars effectively.</span></p><p>When possible, the Lord of Gears should use its <strong>Shocking Siphon</strong> ability every turn. This leaves a vulnerability for the PCs to take advantage of and attempt to destroy one of the Pillars. The Pillar deactivated should always be the active Pillar furthest from any of the PCs.</p><p>Once all three pillars are completely destroyed, <strong>Energetic Overload</strong> occurs. Waves of electricity arc throughout the workshop, damaging PCs and empowering the Lord of Gears. It gains access to its <strong>Blast Off</strong> ability, allowing swift, safe movement throughout the workshop, and becomes faster and stronger, gaining an extra action and a bonus to damage. The wave of electricity also empowers the Lord of Gears, granting it a portion of its health back. However, the lack of power source remaining slowly siphons energy away from the Lord of Gears.</p><p>At this point, with no pillars to protect, the Lord of Gears acts to swiftly end the fight, since it doesn't have long until deactivation. It no longer has access to <strong>Shocking Siphon</strong>, with no Pillar to drain, and so focuses heavily on movement and taking down PCs as fast as possible.</p><p>The Pillars only have 1 action each turn and should use it to attack the largest cluster of people within range. If there isn't anywhere to attack that would affect more than 1 target, the Pillar will simply attack the closest target available.</p><p>In the <strong>Secure Power Source </strong>modification, the Lord of Gears is more likely to focus on ranged or flying targets, trusting the walls to defend the Pillars from more melee-dependent combatants.</p><p>In the <strong>Enhanced Hook</strong> modification, the Lord of Gears can use its grappling hook to pull itself towards a target, which it can follow with a <strong>Hydraulic Punch</strong> for massive amounts of damage with no multiple attack penalty. However, it shouldn't do this every turn as it wouldn't be able to use <strong>Shocking Siphon</strong>. This combination becomes particularly effective after <strong>Energetic Overload</strong>.</p><p>In the <strong>Shifting Floors</strong> modification, the Lord of Gears can move the floor around at the end of its turns. This can be used to move it into a better position, protect the pillars from groups of melee combatants, or even move enemies into the scalding steam from its Vent Steam ability.</p><h2 data-anchor=\"loot\" style=\"box-sizing:border-box;user-select:text;margin:1rem 0px 0.5rem;padding:0px;font-weight:normal;font-size:1.5em;border-bottom:1px solid var(--color-underline-header);color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial\"><span style=\"font-family:Signika, sans-serif\">Loot</span></h2><p style=\"box-sizing:border-box;user-select:text;margin:0.5em 0px;min-height:unset;color:rgb(25, 24, 19);font-family:Signika, sans-serif;font-size:14px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start\"><span style=\"font-family:Signika, sans-serif\">The entirety of the treasure budget is given out in raw GP, paid by the NPC used for the hook. By completing the Ratchethallow Finale, players can unlock a Second Gift Category for use at once. They are still limited to the same maximum number of gifts, but can mix two different categories.\_</span></p>"
