              <p>There are platforms built into the floors around the workshop
              that The Lord of Gears can control. At the end of its turn, The
              Lord of Gears can move any 3x3 (15 foot by 15 foot) section of
              floor up to 30 feet in any horizontal direction, pulling creatures
              standing on it along with it. This doesn't leave a hole in the
              floor.</p>

              <p>As this is forced movement, it doesn't trigger attack of
              opportunity. It shifts the floor throughout the workshop, and so
              can move terrain through other creatures, but cannot move through
              the pillars.</p>
