      - sort: 400000
        name: Taltain Finale
        type: text
        _id: XsZXv1DAyCYQ2yBc
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h2>Taltain Finale: The Council of Taltain</h2><h3>Hook</h3><p>On its surface, Taltain appeared to be a city untouched by the Cataclysm, but the adventurers of Covalon were not so easily deceived. Behind the wooden masks of Taltain's citizenry hid aberrations connected to a hivemind that instructed them to imitate the former civilization. Though it's still not clear why the aberrations were doing this, the Covalonians uncovered their enabler - a Vessel of the Maw, kept under guard by the city's twisted councilors in a building called the Quinate. Though the Vessel has been destroyed, the Seed transplanted in the Quinate still needs rotating shifts of guards be protected it from the facsimiles of the councilors that appear on its doorstep.</p><h3>Conflict in the Quinate</h3><p>The Maw is aware that its Vessel in Taltain has been destroyed, and it is not content to take the loss without retaliation. Facsimiles of the Taltain councilors have appeared in Taltain, but engaging them among the people in the city is a certain death sentence. They need to be fought in a location away from the eyes and ears of the rest of the city, and it just so happens that the Quinate serves as the perfect battleground.</p><p>The PCs begin near the councilors' chairs at the north end of the map, while the five councilors start at the southern end of the map. The doors behind the councilors swing shut as they enter, and they will refuse to retreat or use the outside hallway during the fight. The platform at the north end of the room featuring the chairs is only a foot high and can be reached from the ground as part of a Stride, Step, or any other normal move action without being considered difficult terrain. The ceiling is a dome, but for ease of play, it should be treated as 30 feet high in all areas. The six pillars in the Quinate extend from the floor to the ceiling, providing cover and blocking line of effect like normal terrain. The PCs are serving a full guard shift as part of this adventure, so they won't have sufficient advance notice of when the facsimiles of the councilors arrive to use abilities or items that grant short-term beneficial effects (though anything with a duration of 8 hours or longer can be used).</p><p>If the GM has not done so yet, they should select one of the three Modifications to apply (found on The Assembled Council of Taltain's statblock) or roll [[/r 1d3]] to determine one randomly. Do not tell the players which Modification is in effect. (For Hard Mode, use all 3 modifications.) Note: The modifications only apply to The Assembled Council of Taltain; any abilities or effects they grant are not applied to the individual councilors unless otherwise stated.</p><p>Should the PCs need to escape from the encounter, they can do by spending one action to open one of the doors at the south end of the arena and then moving south of them. Players may not fight from outside the building; any PC that moves past the doors should be removed from the encounter and is considered to have escaped.</p><h3>Tactics Overview</h3><p>The fight begins with the players facing off against a random selection of five councilors of Taltain. They each have unique abilities, but their tactics are mostly straightforward.</p><ul><li>Belle prefers to stay close to enemy spellcasters so she can interrupt them with Not Your Line!. She should focus on using her reach to trip enemy spellcasters or problematic enemies, and if she's in range of an ally, she can also use Whip into Shape! to make efficient use of an action instead of spending it on a third attack roll.</li><li>Carloni uses her Thunder-Thrower to target enemies that her fellow councilors are attacking while she uses Battle Graft to nimbly \"heal\" her allies. If the opportunity presents itself to where she can hit a decent number of allies and/or enemies with Ultravolt!, she should take it, especially if it can also hit a pillar.</li><li>Darkscale should use Agitating Shadows immediately upon his first turn to sow chaos among the PCs. Although the other councilors will also be affected by the sight limit form this ability, they can use the darkness to reach opportune positions for future turns. Aside from that, he can use Shadow Jump to quickly travel the battlefield and his powerful Strikes to inflict large amounts of damage on high-priority targets.</li><li>Ferdi should try to use Hunt Heretic every turn, if possible. His Hatred of Heretics ability requires him to focus on attacking creatures with visible symbols of deity, and the 100 ft. range of his rifle will allow him to do so in most circumstances. While Agitating Shadows is in effect, Ferdi can use Chameleon Skin to become undetected to the PCs, and he can also use it before using Hunt Heretic to make his target flat-footed.</li><li>Oster should attempt to use his Mega Bomb when he can hit as many PCs as possible without hitting any of his allies; if he rolls well on initiative, his first turn is opportune for this. His Pyromaniac ability gives his HP some significant heft, so he shouldn't be adverse to fighting on the front lines.</li><li>Fiola focuses on staying mobile while threatening enemies with Unauthorized Exit! and landing Strikes buffed by her Envenom Fangs.</li><li>Nathioli starts the fight with I'm Destabilizing My Timestream! He then prioritizes staying safe while acting as a blaster caster with his fire and ice abilities. When possible, he buffs/debuffs with Manipulate Time.</li><li>Rodney uses his powerful control spells to debilitate enemies, and then follows up with high damage necromancy spells or his Summon Explosive Zombie ability.</li></ul><p>Once three councilors are defeated, the Coagulating Council ability triggers and The Assembled Council of Taltain appears. The Assembled Council's beginning position is to the GM's discretion, but should be somewhere close to the center of the Quinate. Instead of rolling initiative, it gets slotted in at the position of the councilor who as next up in the initiative order when Coagulating Council was triggered.</p><p>At the end of each of its turns, the Assembled Council triggers Shifting Form. The GM should always give a brief description of which form the Assembled Council is entering - and for Gun Arm Form in particular, the GM should be sure to announce which PC is the target of the Assembled Council's focus. The ability granted by the selected form should be used as the first action(s) of the Assembled Council's next turn, if possible. Here are some specific details for each form:</p><ul><li>Bomber Form is simple. When the Assembled Council's turn next comes up, they should use Mega-Bomb Barrage as their first actions. (Allowing them to Stride first prevents the PCs from appropriately using the pillars to counter the ability.)</li><li>Gun Arm Form should use Arm Cannon as their first actions on their next turn as well. The line for this ability can originate from any of the Assembled Council's squares.</li><li>Duelist Form causes the Assembled Council to enter Duelist Dance immediately, meaning they can use their new reactions before their next turn. They can use one reaction on every creature's turn, plus one additional reaction before their next turn, meaning that one particularly unlucky creature could receive two of the Assembled Council's reactions while in this form.</li><li>Shadowcaller Form uses Swirling Darkness immediately, but the effects have an important order to them. First, any creature\_<em>farther</em> than 10 feet away from the Assembled Council must make the required Will save; creatures 10 feet away or closer to the Assembled Council automatically succeed. Afterwards, the Assembled Council can teleport 60 feet. The teleport must occur\_<em>after</em> the Will saves, as the players should be guaranteed to avoid the effect if they use their turn to move within 10 feet of the Assembled Council.</li><li>Mad Scientist Form should use OMEGAVOLT! as their first actions on their next turn. It is best to switch to this form when enemies are close to the pillars, such as after using Bomber Form. The red squares on the arena designate the 10 foot emanations around each pillar - these can be seen by the GM but are hidden to the players.</li><li>Necromancy Form should position to hit as many enemies as possible before using Grasping Undead.</li><li>Oscillating Form should use Fire and Ice to damage as many enemies as possible.</li><li>Pestilence Fangs Form should position to be within reach of three (if possible) or at least two enemies before using Wild Bites.</li></ul><p>If the Flesh Pods Modification is enabled, the Assembled Council should direct their minions to harry hard-to-reach enemies, or they can be used to provide flanking for the Assembled Council's attacks in addition to using their other abilities. If the Destabilisation Modification is in play, it can be used to punish PCs that hug too close together, such as if they attempt to mitigate damage being dealt to an Arm Cannon target.</p><h3>Loot</h3><p>The entirety of the treasure budget is given out in raw GP, paid by the NPC used for the hook. Additionally, players unlock the ability to customize their Soul Seed, gaining access to the Soul aspect.</p>"
