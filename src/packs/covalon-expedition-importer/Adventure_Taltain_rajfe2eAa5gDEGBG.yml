      - sort: 50000
        name: 'Taltain Mission B: Gather Information'
        type: text
        _id: qyFvVSlmJ0PlpQA4
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3>Hook</h3><p>The council of Covalon is convinced that there is a Vessel of the Maw hiding out somewhere in Taltain - the problem is finding it in the massive capital. Covalon's spies have reported that the people of Taltain are amicable to conversation as long as they believe they're talking to a fellow citizen, so the adventurers are tasked with disguising themselves and talking to the citzenry directly to gather information.</p><h3>Required Elements</h3><ol><li>During the briefing, the PCs should be informed that they will need to put together disguises for this mission. Each player will need a disguise kit (which can be purchased from the general store if the PC does not have one) and will need to roll a Deception check to Impersonate a villager. Each PC needs to make their own Deception check, but they can Follow the Expert if they are unskilled in Deception, and other players can Aid as normal. (As a reminder, regardless of the result of the PCs' Impersonate checks, NPCs only receive a chance to see through the PC's disguises if they use an action to Seek, and most NPCs should not attempt this unless they're given a reason to be suspicious of the PCs.)</li><li><p>After the players have assumed their disguises, the players are instructed to meet with a spy in the field who will give them vital tips on how to interact with the citzenry. The spy informs the PCs that although the people of Taltain are amicable to conversation, there are a few key topics that should be avoided, as they seem to instantly raise suspicion among the citizens. When an NPC has their suspicion raised, their attitude drops to Unfriendly and they Seek the triggering PC with a Perception modifier of <strong>#DC -10#</strong>. If they see through the disguise, or if their attitude is made hostile, they will either engage the PCs in combat or call for guards if they are not fit for combat themselves. Below are topics that will raise suspicion among NPCs:</p><ul><li>The Cataclysm</li><li>The Maw, the Heart of the Maw, Vessels of the Maw</li><li>The Heart of Terra, Covalon</li><li>Aberrations disguised as people, aberrations that overthrew Taltain</li><li>The wooden masks that everyone wears, questioning local customs or idioms, questioning anything that might be common knowledge to citizens</li><li>Being \"new in town\"</li><li>Trying to get an NPC to divulge additional information after they've already revaled one piece of objective information (keep this topic a secret from the PCs)</li></ul></li><li>The spy tells the PCs that they won't be able to outright ask if there's a Vessel of the Maw in the city, or where it's being kept, but there are two things they can ask about that could prove vital to Covalon's investigation: who is in charge of the city, and where it is they congregate. The spy indicates that there are three locations that would be worth gathering investigation in: a tavern, a marketplace, and a theater. There are no mandatory combat encounters in this adventure - instead, each location's social encounter constitutes 120 XP in the XP budget, though these encounters may become combat encounters if the citizens become suspicious of the PCs. The PCs can earn one piece of objective information from each location, selected from the list in the Required Loot section. The players can visit these three locations in any order.</li><li>In the tavern, players can choose to approach either the patrons or the barkeep. The patrons are rowdy and difficult to impress or get along with, and regardless of how friendly the PCs are, the patrons will eventually ask the PCs to leave them alone, leading to a bar fight if the players do not comply. The bar fight is a normal 120 XP combat encounter, except all enemies use non-lethal force. If any player makes a lethal attack, all enemies immediately switch to using lethal force instead and the barkeep calls for additional guards, which will likely overwhelm the PCs if they do not flee. Should the PCs win the bar fight nonlethally, the patrons will immediately become Friendly with the PCs and voluntarily offer up one piece of objective information to the players.</li><li><p>If the PCs instead choose to approach the barkeep, they will find the barkeep difficult to Make an Impression with (<strong>#DC 5#</strong>)<strong>,</strong> and even more difficult to Request information from (<strong>#DC +10#</strong>), remarking that he doesn't feel like talking unless the PCs buy drinks for him and themselves. If the PCs do so, the barkeep challenges them to a drinking contest to make things more interesting. Should the PCs win, he will be open to having a conversation with them, but should they lose, they will have to buy drinks for the whole tavern. (A mug of ale is 1 copper piece, so this does not amount to a relevant cost.) The barkeep tells the PCs that they can all work together to attempt to outdrink him.</p><ul><li>The first team to reach 18 Victory Points wins.\_</li><li><p>Each PC rolls initiative, with the barkeep taking a turn after each PC. During their turn, a PC can perform one of three actions:</p><ul><li><strong>Drink!</strong> The participant drinks. The participant attempts a\_<strong>#DC# </strong>Fortitude save, earning 1 Victory Point on a success. When the barkeep performs this action, his modifier is <strong>#DC -5#</strong>.</li><li><strong>Chug! Chug! Chug!\_</strong>The pariticpant drinks a lot. The participant attempts a\_<strong>#DC +4#\_</strong>Fortitude save, earning 3 Victory Points on a success. The barkeep only performs this action if he is currently losing by at least 3 points, and his modifier is <strong>#DC -5#</strong>.</li><li><strong>Cheer On!</strong> The participant cheers on their ally. The next ally who attempts a Fortitude save during the drinking contest gains a +1 circumstance bonus to their save.</li></ul></li><li>If the PCs win the game, the bartender's attitude becomes helpful and he divulges one piece of objective information to the party. If the bartender wins the game, he and the patrons laugh the PCs out of the tavern, refusing to talk to them for having weak stomachs.</li></ul></li><li>The marketplace is mostly empty. There are several merchants in stalls, but they are more interested in hawking junk than conversing with the PCs. There is one NPC interested in talking to them - a gambler on a carpet waves them over and invites them to play Swindlebones. While playing, the gambler is interested in making conversation - this is a good opportunity for the PCs to try to get information out of him. The players can also wager gold in exchange for information, but the gambler is a high stakes player, and won't be enticed by bets less than 10% of the adventure's total treasure budget. Otherwise, the gambler is happy to play without stakes. Whether through being beaten at Swindlebones or by being distracted by conversation during the game, the gambler will no longer play after revealing one piece of objective information. For information on how to play Swindlebones, see the \"Taltain Mission B Appendix: How to Play Swindlebones\" journal entry.</li><li><p>As the PCs approach the theater, they are stopped by an NPC who mistakes the PCs as the missing actors for the show that is about to begin. The NPC attempts to hurry the players through a side door and shove them onto a stage; if the players don't comply, the NPC becomes suspicious. If the players do comply, they are immediately thrust into a scene in a play where they take on the role of six adventurers going on an adventure through a portal to find treasure to bring back home - a scenario eerily similar to the operations of the Dungeoneering Society back in Covalon. For each scene, the party must make at least one check - each success awards 1 Victory Point, a critical success earns 2 Victory Points, and a critical failure causes the party to lose 1 Victory Point.</p><ul><li>First, the party receives a mission briefing from an actor playing the role of a portal specialist. At the end of the briefing, the actor asks if the party has any questions. The party must improvise dialogue by making a\_<strong>#DC#\_</strong>Performance or Society check.</li><li>Second, the party travels through the portal (which is a casting of dancing lights) to fight actors wearing costumes of various creatures. The party must attempt convincing stage combat by making a\_<strong>#DC#</strong> Performance or Athletics check.</li><li>Finally, the party comes across the treasure they seek, but it's across a large gorge that can only be crossed by swinging on a trapeze decorated to blend in with the scene's environment. The party must attempt to cross to the other side and retrieve the treasure by making a\_<strong>#DC#\_</strong>Performance or Acrobatics check.</li><li><p>Depending on the amount of Victory Points the players have achieved, one of the following events occurs:</p><ul><li>9+ Victory Points: The players receive a standing ovation as the curtain falls to signify the end of the act. The NPC who originally approached the PCs congratulations them on an incredible performance, and hands them a boquet of crystal flowers - a gift from a wealthy member of the audience. She also provides the PCs with a copy of the script, commenting that although their improvisation was incredible, they should brush up on their lines before the next act. While flipping through the script, the PCs find lines and stage directions that provide one piece of objective information. If the players try to wait for the next act instead of leaving the theater, they hear a conversation down the hallway about how someone has figured out that the PCs are not the actors who were supposed to be on stage; if they <em>still\_</em>don't leave the theater, the NPC sees through their disguises when she next sees the PCs and calls the guards.</li><li>6-8 Victory Points: The players receive applause as the curtain falls to signify the end of the act. The NPC who originally approached the PCs provides them with a copy of the script, commenting that although their improvisation was admirable, they should brush on their lines before the next act. While flipping through the script, the PCs find lines and stage directions that provide one piece of objective information. If the players try to wait for the next act instead of leaving the theater, they hear a conversation down the hallway about how someone has figured out that the PCs are not the actors who were supposed to be on stage; if they\_<em>still\_</em>don't leave the theater, the NPC sees through their disguises when she next sees the PCs and calls the guards.</li><li>5 or less Victory Points: The audience boos the PCs, and the original NPC who approached the PCs becomes suspicious. If she sees through one of their disguises, she runs out onto the stage and outs them. Otherwise, the curtain falls to signify the end of the act, and the NPC tells the PCs to leave her theater before she calls the guards.</li></ul></li></ul></li></ol><h3>Recommended Locations</h3><p>City streets, tavern, marketplace, theater, though the entirety of this adventure can take place in the theater of the mind, unless combat breaks out and the players choose not to flee.</p><h3>Recommended Creatures</h3><p>This entire mission can be completed without combat (excluding the bar fight), but the GM may want to have some level-appropriate humanoid guards on hand just in case combat breaks out. If such a situation occurs, the GM may use up to 240 XP worth of guards in an encounter if combat breaks out - the PCs should be encouraged to run away. If combat breaks out in a secluded, private place, the creatures can fight in their un-masked aberration forms.</p><h3>Recommended Loot</h3><p>For each piece of objective information that the players uncover, they receive one-third of the total treasure budget in raw gold pieces. Before the mission begins, the GM should roll [[/r 1d6]] three times to determine which pieces of objective information can be obtained during the mission, rerolling any duplicate results.</p><table style=\"width:94.0146%\" border=\"1\"><tbody><tr><td style=\"width:53.2238%;text-align:center\">Die Result</td><td style=\"width:46.6231%;text-align:center\"><p>Objective Information</p></td></tr><tr><td style=\"width:53.2238%;text-align:center\">1</td><td style=\"width:46.6231%;text-align:center\">One of the leaders of Taltain is a woman named Belle. She is the propietier of the entertainment district and is known to physically reprimand performers who bungle their acts.</td></tr><tr><td style=\"width:53.2238%;text-align:center\">2</td><td style=\"width:46.6231%;text-align:center\">One of the leaders of Taltain is a woman named Carloni. She is the chief of medicine in Taltain, but prefers grafting machinery onto her patients instead of treating them with more traditional medicines.</td></tr><tr><td style=\"width:53.2238%;text-align:center\">3</td><td style=\"width:46.6231%;text-align:center\">One of the leaders of Taltain is a man named Oster. He is the head of urban development in Taltain, and rumors say he sets fire to undesireable districts so he can build new, upscale buildings in their place.</td></tr><tr><td style=\"width:53.2238%;text-align:center\">4</td><td style=\"width:46.6231%;text-align:center\">One of the leaders of Taltain is a man named Ferdi. He is the pope of Taltain, but better known among the people as the high inquisitor, due to his dogmatic pursuit of heretics.</td></tr><tr><td style=\"width:53.2238%;text-align:center\">5</td><td style=\"width:46.6231%;text-align:center\">One of the leaders of Taltain is a man named Captain Darkscale. He is Taltain's general, and the head of its guard, and prefers to deal with lawbreakers in nightly raids before they go to court.</td></tr><tr><td style=\"width:53.2238%;text-align:center\">6</td><td style=\"width:46.6231%;text-align:center\">The leaders of Taltain meet every other week in a building called the Quinate, but better known to the general population as the councilor's court.</td></tr></tbody></table>"
