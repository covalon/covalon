journal:
  - name: Taltain Expedition
    flags:
      core: {}
    pages:
      - name: Taltain Briefing
        type: text
        title:
          show: false
          level: 1
        text:
          format: 1
          content: "<h2>Background</h2>\n<p>For most of history, Taltain was a relatively quiet nation. Generations of noble families ruled the island chain, providing work and safety to the peasant class in exchange for their loyalty and a percentage of the fruits of their labor. The situation was never particularly ideal for the majority of Taltain's citizenry, but knowing no other way of life, they didn't think too much about it.</p>\n<p>As the civilizations of the world developed and advanced, Taltain was mostly excluded from international politics, due to their location on the far side of the world and the isolationist policies of the nobility. Still, traders from Gornlar would share stories of the freeholds' exploits, and over time, the peasants of Taltain became envious of the lives their neighbors were living. The nobles, too, were paying attention to the rest of the world, and their eyes were set on Keydo in particular. The divine emperor was ruthlessly expanding the empire to cover the entirety of the Dragon Isles, and the Taltain nobility figured it was only a matter of time before the empire would desire their lands, too.</p>\n<p>For the first time in its history, the feudal structure of Taltain changed dramatically. The nobles absorbed everything the peasants produced, becoming the sole controller of wealth and commodities. They strictly rationed out food, clothing, and other necessities to the peasants, but without the logistic prowess to do so efficiently, leading to frustration and even periods of starvation among the working class. The nobles rationalized their actions by believing these were necessary preparations for a coming invasion, but the invasion that manifested was not the one they predicted.</p>\n<p>Pushed to a breaking point, citizens of Taltain abandoned the nation in droves, landing in Gornlar as refugees and begging for the great warriors of the freeholds to help them overthrow the oppressive nobility. Fleets of Gornlarian ships arrived on Taltain's shores, and the nation's army stood down as the mercenaries from the freeholds ransacked the nobles' palaces, ending the ruling class' reign overnight.</p>\n<p>For ten years, Taltain floundered in anarchy. The Gornlarian mercenaries took a liking to the islands and attempted to establish new freeholds, though these amounted to little more than gangs amidst a population that was interested in finally having the opportunity to govern themselves. Unfortunately for the peasants, their lack of education made them ill-suited for the task; verbal agreements over drinks at the tavern and threats of retaliation on the edges of buildings were the glue that held what was hardly a semblance of society together. Order would eventually find its way to Taltain via the Cataclysm - aberrations disguised as friends, neighbors, and even spouses revealed themselves in a coordinated attack that massacred an unprepared and disorganized society.</p>\n<p>For more information on Taltain, see its entry in the <a href=\"https://scribe.pf2.tools/v/8vMfPSF7-covalon-player-s-guide\" target=\"_blank\" rel=\"noopener\">Covalon Player's Guide</a>.</p>\n<h2>Mission Overview</h2>\n<p>The apparatus of the octopus arrived on the shores of Taltain unmolested - a first in Covalon's history of expeditions. Even more surprising, the capital city appeared to be in good condition, and there were even people going about their daily lives like the world wasn't a post-apocalyptic hellscape. But on further inspection, the Covalonians could see that something wasn't quite right. The way the people moved was so deliberate, it was almost mechanical, and there was a synchronicity between them all that gave the impression that they were all in on some sort of sinister plan together. But perhaps the most peculiar thing about the people were the strange wooden masks they wore, hiding everything on their faces except for their eyes and mouths. Secreting themselves in an abandoned tavern on the outskirts of town, the Covlonians prepare to explore the city, creating their own masks to blend in - the aberrations that recently conquered Taltain may still be hiding among the remaining population. There is surely a Vessel of the Maw hiding here, but in a city this big, it could be anywhere.</p>\n<h2>Special Notes about Taltain</h2>\n<p>Taltain's expedition is unlike any adventure type in Covalon's campaign thus far. Social encounters will be common, and GMs may find themselves roleplaying as a variety of different NPCs for PCs who are trying to stay disguised. Here are some details that GMs should keep in mind during Taltain expedition missions:</p>\n<ul>\n<li>NPCs in Taltain are human-like, but not exactly human. In fact, they are\_<em>all</em> aberrations (such as faceless stalkers) posing as regular people, hiding behind wooden masks. Their speech may contain idioms that don't make sense (such as \"the cobblers in the marketplace are just fishing for owls\"), their routines may seem nonsensical or redundant (such as a woman who carries water from one well only to pour it into another, repeated endlessly), and they may occasionally exhibit inexplicable synchronized movements that they don't acknowledge (such as every person in a room simultaneously hiccuping).</li>\n<li>Most encountered in Taltain will be aberrations posing as humanoids, and they fight using statblocks for humanoids. The NPCs from the NPC Gallery in the Gamemastery Guide work great for these. For higher level enemies, there are a handful of statblocks in the Lost Omens Character Guide, but GMs may need to use the creature creation rules from the Gamemastery Guide to level up other NPCs.</li>\n<li>PCs will be using the Impersonate exploration activity to pass themselves off as ordinary mask-wearing citizens of Taltain during missions, which requires each player using a disguise kit and making a Deception skill check to Impersonate - PCs without training in Deception should be advised to Follow the Expert on someone who does. As a reminder, regardless of the result of their Impersonate checks, NPCs only receive a chance to see through the PC's disguises if they use an action to Seek, and most NPCs should not attempt this unless they're given a reason to be suspicious of the PCs (see below).</li>\n<li>PCs should be encouraged to engage with NPCs to gather information that will help them complete their mission, but they must be careful not to raise suspicion as they do so. All NPCs start with an attitude of Indifferent towards the players, but this attitude is automatically lowered by one step if any PC mentions any of the following topics: the Cataclysm, the Maw, the Heart of Terra, the Heart of the Maw, aberrations disguised as people, the aberrations that overthrew Taltain, the wooden masks that everyone wears, or anything that questions what seems like perfectly normal customs to the Taltainians. When an NPC's attitude becomes unfriendly, they attempt a check to Seek and potentially uncover the triggering player's disguise, using a Perception modifier of <strong>#DC -10#</strong>. If they successfully see through the player's disguise (or their attitude becomes hostile), they may call for guards or engage the PCs in combat themselves. If the location is sufficiently crowded, there may be too many hostiles for the PCs to have a reasonable chance at victory, and they may need to retreat.</li>\n</ul>\n<h2>How to Run an Expedition</h2>\n<p>Expeditions are composed of two subtypes: missions and finales. Missions are a set of three dungeon-like adventures that are narratively linked, but can be completed in any order. Each mission must include predetermined narrative and mechanical elements while sticking to a theme of locations, creatures, and loot, which are included in its associated journal entry, with the specifics of the blanks to be filled in by the GM of the adventure. Like other adventure types, Dungeon Guides must submit their expedition missions for approval.</p>\n<p>When reading the instructions for an expedition, you may see key terms surrounded by number signs. These indicate that the term should be replaced by a value that's dependent on the adventure's average party level.\_\_If you have any questions about how to apply these terms or any of the required elements, be sure to ask about them during your submission for approval.\_Here is a list of terms:</p>\n<ul>\n<li><strong>#Creature [Table Number] [Modifier]#</strong> should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=995\">Building Creatures</a> section of the Gamemastery Guide. For example, \"#Creature 2-8 Minimum# means that you should reference the Building Creatures rules, look for Table 2-8, and use the value in the Minimum column for the creature's level (adjusted for elite or weak as appropriate).</li>\n<li><strong>#Hazard [Table Number] [Modifier]#\_</strong>should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=1043\">Building Hazards</a> section of the Gamemastery Guide. For example, \"#Hazard 2-16 Simple Damage# means that you should reference the Building Hazards rules, look for table 2-16, and use the value in the Simple Damage column for the hazard's level.</li>\n<li><strong>#DC [Modifier]#\_</strong>should be replaced by a value according to the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=554\" target=\"_blank\" rel=\"noopener\">DCs by Level</a> table in the Core Rulebook. If a modifier is included, the value should be adjusted accordingly. For example, \"#DC +5#\" means that you should reference the DCs by Level table, find the value appropriate for the party's average level, then add 5 to it.</li>\n</ul>\n<p>Finales are singular encounters against a narratively significant threat that conclude an expedition. They come in two versions: normal mode and hard mode. Before a finale is cleared for the first time, it can only be run by Covalon administrators and moderators, and is ran at hard mode. Afterwards, the finale can be ran by any Dungeon Guide at normal mode (though players can request hard mode if they'd like). Normal mode can be run in Tier 2 or above, and hard mode can only be run at the highest tier, intended for max level characters. Unlike missions, finales use a specific map and specific creatures, included with this module.</p>\n<p>Each finale comes with three variant modifications. When running a normal mode finale, a GM choose one of the three modifications to use, or can roll [[/r 1d3]] to randomly determine which modification to use. When running a hard mode finale, the GM uses all three modifications.\_There are no additional rewards for completing hard mode.</p>\n<h2>Reporting a Completed Expedition</h2>\n<p>When reporting a completed expedition in the Dungeon Summaries channel, use the\_<strong>exact name</strong> of the adventure as the adventure's title. For example, if you ran the first mission of Ikouga, the summary's title should be \"Ikouga Mission A: Retame the Island\" exactly. The summary should otherwise follow the same format as dungeons.</p>\n<p>Finally, any narrative-based knowledge or intrigue that the players gain as a result of the expedition should be left out of the summary. For example, if the players complete a bonus objective that allows them to learn special information as detailed in the Required Elements or Recommended Loot section of each journal entry, that should be left out of the dungeon summary.</p>"
