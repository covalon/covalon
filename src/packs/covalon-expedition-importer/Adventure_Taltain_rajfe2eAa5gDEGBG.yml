            value: "<p><strong>Frequency\_</strong>Once per round</p>\n<hr />\n<p>The Assembled Council designates one creature to become Destabilised for 1 round. While Destabilised, that creature emits a 10 foot aura, and any creature hostile to the Assembled Council that enters or ends their turn in the aura must make a @Check[type:fortitude|dc:30|basic:false]. This includes the Destabilised creature if they are hostile to the Assembled Council.</p>\n<p>On a failure, the creature takes [[/r 3d10]] mental damage and becomes sickened 1.</p>"
