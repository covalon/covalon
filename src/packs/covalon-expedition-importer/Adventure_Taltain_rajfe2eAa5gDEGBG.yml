      - sort: 300000
        name: 'Taltain Mission C: Palace Infiltration'
        type: text
        _id: eJ4sT4FwSMsX43AN
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3>Hook</h3><p>The palaces from the old aristocracy before the people's revolution are still standing in Taltain. It's possible that they could hold secrets regarding what's going on in the city, or, if nothing else, valuable treasure. The palaces are too heavily guarded for traditional infiltration, so adventurers will need to sneak in. It is highly recommended that parties attempting this mission contain at least one stealth expert.</p><h3>Required Elements</h3><ol><li>To infiltrate the palace, the party must first find a way in, making appropriate skill checks against a DC of <strong>#DC#</strong> in order to enter. Obvious points of entry may include scaling the exterior to enter via a balcony (Athletics), disguising themselves as servants to enter through the servants' quarters (Deception), or quietly unlocking and opening a door from the outside (Thievery), but the GM may include other points of entry at their discretion.</li><li>Once inside the palace, the PCs are free to explore. Ocassionally, a patrolling guard will make their way towards the PCs, which can be detected in advance by a Scouting PC who succeeds at a <strong>#DC#\_</strong>Perception check. When a patrolling guard is detected, the PCs can hide by ducking into an adjacent room (if available) or using skill checks against a DC of\_<strong>#DC#</strong>. Stealth can always be used, but other skills may be applicable depending on the room, such as using Athletics to hang from rafters or Survival to create makeshift camouflage from nearby boxes and barrels. If the guard does not detect the players, the players can continue exploration after the guard passes, but if the guard detects the players, he alerts other guards nearby, beginning an encounter with a maximum XP budget of 160 instead of the usual 120 (which should almost always result in an additional guard equal to the party level). A maximum of three encounters can be triggered this way; if a third encounter is triggered, patrols in the palace will cease. It is possible to complete this adventure without triggering any encounters.</li><li>The palace should include three of the following rooms which contain clues. The first room listed is mandatory, while the other two rooms can be selected by rolling [[/r 1d6]].</li></ol><table style=\"width:94.0146%;height:494px\" border=\"1\"><tbody><tr style=\"height:19px\"><td style=\"width:48.876%;text-align:center;height:19px\">Die Result</td><td style=\"width:50.9709%;text-align:center;height:19px\">Palace Room with Clue</td></tr><tr style=\"height:171px\"><td style=\"width:48.876%;text-align:center;height:171px\">Mandatory</td><td style=\"width:50.9709%;text-align:center;height:171px\">A great hall contains a gargantuan clump of pulsing flesh anchored to the ceiling. Occasionally, a merdium-sized clumg of flesh falls to the floor and forms into a humanoid figure. The figure puts on a pair of clothes folded neatly on a table nearby and a wooden mask, then begins performing the role associated with the clothes they put on (such as a maid wearing a maid outfit or a guard wearing a guard uniform).</td></tr><tr style=\"height:114px\"><td style=\"width:48.876%;text-align:center;height:114px\">1</td><td style=\"width:50.9709%;text-align:center;height:114px\">A dining room, which contains a number of servants setting the table in preparation for a meal. A\_<strong>#DC +2#\_</strong>Perception or Society check notices that the servants are actually undoing part of the table settings as they work their way around the table, creating an endless loop of table setting.</td></tr><tr style=\"height:114px\"><td style=\"width:48.876%;text-align:center;height:114px\">2</td><td style=\"width:50.9709%;text-align:center;height:114px\">An office, which contains various documents filed neatly in several cabinets. A\_<strong>#DC +2#\_</strong>Perception or Society check or a\_<strong>#DC#\_</strong>Warfare Lore check reveals that some of these documents are orders for the palace guards, and only date back to the day the Covalonians arrived in Taltain.</td></tr><tr style=\"height:19px\"><td style=\"width:48.876%;text-align:center;height:19px\">3</td><td style=\"width:50.9709%;text-align:center;height:19px\">A training yard, where palace guards are training their martial skills. A\_<strong>#DC +2#\_</strong>Perception or Athletics check or a\_<strong>#DC#</strong> Warfare Lore check reveals that the guards are all moving in perfect unison and performing the exact same moves, even though no one is audibly instructing the drills.</td></tr><tr style=\"height:19px\"><td style=\"width:48.876%;text-align:center;height:19px\">4</td><td style=\"width:50.9709%;text-align:center;height:19px\">A library, filled with all sorts of books, illuminated dimly by candelabras. The books themselves appear to be normal, but a <strong>#DC+2#\_</strong>Perception or Crafting check reveals that all of the candles contain the same amount of wax, and are burning at the exact same rate, with wax dripping in the exact same places.</td></tr><tr style=\"height:19px\"><td style=\"width:48.876%;text-align:center;height:19px\">5</td><td style=\"width:50.9709%;text-align:center;height:19px\">A locked room. Opening it requires a successful\_<strong>#DC +2#\_</strong>Thievery check to Pick a Lock or Athletics check to Force Open the door. Inside is a servant who seems \"stuck\" - he constantly walks into a wall, turns slightly, then walks into another wall, repeating the cycle endlessly. The servant does not acknowledge the PCs' presence whatsoever.</td></tr><tr style=\"height:19px\"><td style=\"width:48.876%;text-align:center;height:19px\">6</td><td style=\"width:50.9709%;text-align:center;height:19px\">A parlor room, where several hooded figures are hunched over crystal balls on small tables. A successful\_<strong>#DC +2#\_</strong>Arcana, Nature, Occultism, or Religion check reveals that these figures are using the crystal balls to scry on various areas of the city. (If the PCs choose to engage these hooded figures in combat, use 160 XP of spellcasting NPCs and subtract one patrolling guard from the mission.)</td></tr></tbody></table><h3>Recommended Locations</h3><p>A palace. Because this is a dungeon crawl that takes place in a palace, it may be difficult to find a suitable map. If you don't wish to put in the time and effort to create a detailed palace dungeon crawl map of your own, consider using an application such as <a href=\"https://dungeonscrawl.com/\" target=\"_blank\" rel=\"noopener\">Dungeon Scrawl</a> to create a basic map quickly and easily.</p><h3>Recommended Creatures</h3><p>Humanoids, with the occasional guard animal, such as a guard dog. Alternatively, the creatures can fight in their un-masked aberration forms if they aren't within the main thoroughfares of the palace, but due to the increased XP budgets, GMs should opt to use aberrations equal or lesser than the party's level instead of aberrations higher than the party's level.</p><h3>Recommended Loot</h3><p>80% of the treasure budget can be composed of any loot. The players are then awarded 10% of the total treasure budget in raw gold pieces for each clue the clues they uncover in the palace, for a total of 30% if they find all three rooms and succeed at both skill checks.</p>"
