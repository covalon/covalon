name: Taltain
img: modules/covalon/images/Taltain%20Outpost.webp
caption: ''
sort: 0
description: >-
  <div class="block template"><div class="block "><h3
  id="taltain">Taltain</h3></div><div class="block taglist"><p><span
  class="inline-block tag">Civilization</span></p></div><p>The overturned
  throne.</p><div class="block indented"><p><strong>Government</strong> None
  (anarchy)</p><p><strong>Population</strong> humans, dwarves, halflings,
  gnomes, goblins</p><p><strong>Religion</strong> Aelia, Karatu,
  Noctune</p><p><strong>Primary Exports</strong> seafood, silk, wine, clothing,
  silver, sugar, cotton</p><p><strong>Geography</strong> coastal islands with
  inland tropical jungle</p><p><strong>Fate</strong> monstrous coup</p></div><hr
  /><p>Taltain was a small sovereign nation led by powerful noble families. Only
  humans lived a life of pleasure, coming from generations of wealth and
  fortune. They profited from the hard working lower class, offering them
  livable conditions as long as they continued to power the economical workhorse
  that was required to power their life styles. A number of well trained
  mercenary groups kept the families safe and were paid very handsomely for
  their duties.</p><p>Only a decade before the Cataclysm, the lower class sought
  aid from the nearby freeholds of Gornlar to overthrow their noble oppressors,
  staging an assault upon the island chains. With their help, the noble families
  of Taltain were all but decimated. Taltain, now ran by the usurping lower
  class, joined Gornlar as an official vassal. Ironically, the Cataclysm would
  manifest itself in Taltain by way of another coup. Faceless aberrations
  disguised as mercenaries infiltrated the city and slaughtered the citizens of
  Taltain indiscriminately.</p></div>
