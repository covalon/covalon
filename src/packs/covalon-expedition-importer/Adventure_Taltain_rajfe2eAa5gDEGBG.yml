        system:
          description:
            gm: ''
            value: >-
              <p>You channel the forces of undeath to briefly call forth an
              amalgam of the vengeful dead slain by your enemies and allies
              alike. This amalgam manifests as a large tornado of insubstantial,
              howling faces. It occupies the space of a Huge creature and has a
              Speed of 60 feet.</p>

              <p><strong>Arrive</strong> (negative) <em>Vortex of Death</em>
              Each enemy creature within a 60-foot emanation must attempt a
              Fortitude save with the following effects.</p>

              <hr />

              <p><strong>Critical Success</strong> The creature is
              unaffected</p>

              <p><strong>Success</strong> The creature is
              @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained
              1}.</p>

              <p><strong>Failure</strong> The creature is
              @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained
              2}.</p>

              <p><strong>Critical Failure</strong> The creature is
              @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained
              3}.</p>

              <hr />

              <p><strong>Depart</strong> (emotion, fear, mental) <em>Howl of
              Eternity</em> The vengeful dead lets out an anguished scream. All
              your enemies within a 100-foot emanation must attempt
              @Check[type:will|name:Tempest of Shades
              Depart|traits:necromancy,emotion,fear,mental] saves with the
              following effects.</p>

              <hr />

              <p><strong>Critical Success</strong> The creature is
              unaffected.</p>

              <p><strong>Success</strong> The creature is
              @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
              1}.</p>

              <p><strong>Failure</strong> The creature is
              @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
              3}.</p>

              <p><strong>Critical Failure</strong> The creature is frightened 3.
              It's also
              @UUID[Compendium.pf2e.conditionitems.Item.sDPxOjQ9kx2RZE8D]{Fleeing}
              for 1 round or until it's no longer frightened, whichever comes
              first.</p>
