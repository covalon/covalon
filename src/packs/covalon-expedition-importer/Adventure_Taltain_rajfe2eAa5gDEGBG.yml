      - img: >-
          https://assets.forge-vtt.com/bazaar/systems/pf2e/assets/icons/spells/shield.webp
        name: Shield
        system:
          description:
            gm: ''
            value: >-
              <p>You raise a magical shield of force. This counts as using the
              Raise a Shield action, giving you a +1 circumstance bonus to AC
              until the start of your next turn, but it doesn't require a hand
              to use.</p>

              <p>While the spell is in effect, you can use the
              @UUID[Compendium.pf2e.feats-srd.Item.jM72TjJ965jocBV8]{Shield
              Block} reaction with your magic shield. The shield has Hardness 5.
              After you use Shield Block, the spell ends and you can't cast it
              again for 10 minutes. Unlike a normal Shield Block, you can use
              the spell's reaction against the
              <em>@UUID[Compendium.pf2e.spells-srd.Item.gKKqvLohtrSJj3BM]{Magic
              Missile}</em> spell.</p>

              <p>Heightening the spell increases the shield's Hardness.</p>

              <p>@UUID[Compendium.pf2e.spell-effects.Item.Jemq5UknGdMO7b73]{Spell
              Effect: Shield}</p>

              <p>@UUID[Compendium.pf2e.spell-effects.Item.QF6RDlCoTvkVHRo4]{Effect:
              Shield Immunity}</p>

              <hr />

              <p><strong>Heightened (3rd)</strong> The shield has Hardness
              10.</p>

              <p><strong>Heightened (5th)</strong> The shield has Hardness
              15.</p>

              <p><strong>Heightened (7th)</strong> The shield has Hardness
              20.</p>

              <p><strong>Heightened (9th)</strong> The shield has Hardness
              25.</p>
