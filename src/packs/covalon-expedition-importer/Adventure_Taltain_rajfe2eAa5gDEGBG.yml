      - sort: 150000
        name: 'Mission B Appendix: How to Play Swindlebones'
        type: text
        _id: 4Zv9b9W2xis4eu4O
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <h2>Introduction</h2><p>Swindlebones is the Covalon-themed version
            of Steve Jackson's Swindlestones. A simplified version of liar's
            dice, often played using knucklebones carved to make four-sided dice
            (or eight-sided dice with two faces for each number). The game is
            played between two players, often accompanied by a wager.</p><h2>How
            to Play</h2><p>Both players begin with five total knucklebones. At
            the beginning of each round, both players roll their knucklebones
            privately (use the "Self Roll" feature in Foundry). The player who
            goes first makes a bet by guessing the combined minimum number of
            dice showing a particular face that have been rolled by both
            players. For example, if a player says "two threes," they are
            betting that between both players, two or more threes have been
            rolled. The opposing player may then either "raise" the bet, in
            which case they counter with a new bet, or they may "call" the bet,
            in which case both players reveal their dice to see if the last bet
            was correct. When a bet is called, if the bet turned out to be
            incorrect, the betting player loses one of their dice. If the bet
            turned out to be correct, the calling player loses one of their
            dice. The rounds repeat until one player no longer has any
            dice.</p><h3>Rolling Dice</h3><p>Players should roll their dice
            privately in Foundry so that their opponent cannot see the rolls
            until a bet is called. After rolling dice, a player can click on
            their roll card in the chat log to see the individual results of
            each roll. The following buttons can be used as roll
            shortcuts:</p><p>5 dice: [[/sr 5d4]]<br />4 dice: [[/sr 4d4]]<br />3
            dice: [[/sr 3d4]]<br />2 dice: [[/sr 2d4]]<br />1 die: [[/sr
            1d4]]</p><h3>Raising a Bet</h3><p>When raising a bet, the raised bet
            must include a higher quantity of dice or the same quantity of dice
            with a greater face value. For example, if the previous bet was "two
            threes," a raised bet could be "two fours," "three ones," or even
            "six twos," but not "two twos" or "one four."</p><h3>Calling a
            Bet</h3><p>When a bet is called, both players must reveal their dice
            (right-click on your roll in Foundry and choose the "Reveal to
            Everyone" option. The players then check to see if the combined dice
            have faces greater than or equal to the called bet. For example, if
            the called bet was "two twos" and there are three twos among both
            players, the bet is correct, but if there is only one two, the bet
            is incorrect. If the called bet is incorrect, the betting player
            loses a die. If the called bet is correct, the calling player loses
            a die.</p><h3>Ending the Game</h3><p>The game ends when one player
            no longer has any dice.</p>
