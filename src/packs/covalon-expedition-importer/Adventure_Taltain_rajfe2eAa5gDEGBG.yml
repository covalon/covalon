              Block} reaction with your magic shield. The shield has Hardness 5.
              After you use Shield Block, the spell ends and you can't cast it
              again for 10 minutes. Unlike a normal Shield Block, you can use
              the spell's reaction against the
              <em>@UUID[Compendium.pf2e.spells-srd.Item.gKKqvLohtrSJj3BM]{Magic
              Missile}</em> spell.</p>

              <p>Heightening the spell increases the shield's Hardness.</p>

