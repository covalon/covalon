      - sort: 25000
        name: 'Taltain Mission A: Nighttime Ambush'
        type: text
        _id: Rs9a4k6jk9bGw7me
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3>Hook</h3><p>Since arriving in Taltain, Covalon's expedition force quickly set up a network of spies around the city that listen for guard activity and do whatever they can to throw them off the scent of Covalon's trail. Covalon's adventurers in the city have not gone unnoticed, but so far, the main camp has yet to be discovered. In order to subvert the guards' efforts to find it, spies have been setting up decoy camps and tipping off the guards to their locations. The raids on these fake camps not only continue to ensure the safety of Covalon's main outpost, but also present an opportunity for Covalonians to sabotage the guards' future endeavors.</p><p>Adventurers are tasked with camping out at one of these decoy bases and intercepting the guards that attempt to raid them, then sneaking over to the local guard precinct to sabotage their evidence and uncover any information that could assist Covalon's efforts in locate the Vessel of the Maw.</p><h3>Required Elements</h3><ol><li><p>Before the first encounter, the party must prepare their defenses for their decoy camp. The players may use any snares and long-duration spells\_ they possess (such as glyph of warding) to prepare defenses, and can also attempt to create up to three special defenses (chosen from the below list) to help secure their camp's permiter.</p><ul><li>Bear Trap:\_<strong>#DC#\_</strong>Survival check to create. Occupies a 5-foot square and deals <strong>#Hazard 2-16 Complex Damage#\_</strong>piercing damage to a creature that stands on it, with a\_<strong>#Hazard 2-16 HDC#\_</strong>basic Reflex save; on a failure, the creature is also immobilized for 1 round.</li><li>Hidden Pit:\_<strong>#DC#\_</strong>Stealth check to create. Occupies a 10-foot square and causes the first creature that steps on it to fall into a pit that is 10 feet deep, taking 5 damage and landing prone as per the normal falling rules. To climb out, a creature must succeed at a\_<strong>#Hazard 2-16 HDC#\_</strong>Athletics check to Climb.</li><li>Spear Launcher:\_<strong>#DC#\_</strong>Crafting check to create. Occupies a 5-foot square and deals\_<strong>#Hazard 2-16 Simple Damage#\_</strong>piercing damage to a creature that steps in it, with a\_<strong>#Hazard 2-16 HDC# </strong>basic Reflex save.</li></ul></li><li>The players must also set up a watch schedule. The players don't know when the guards will be coming, so they need to divide themselves to keep watch between three different shifts. During each shift, any number of players may choose to be awake and any number of players may choose to sleep, but any PC that doesn't choose to sleep for at least two shifts is fatigued for the rest of the mission (unless they have an abiltiy that prevents them from requiring sleep). Additionally, players must sleep unarmored, or they become fatigued immediately on waking up (unless they have an ability that allows them to sleep in armor, such as armor with the Comfort trait).</li><li>After defenses have been placed and watches have been established, the GM rolls [[/r 1d3]] to determine during which watch the ambush occurs. When the ambush occurs, the players who were awake roll initiative as normal, but the sleeping players roll initiative with a -4 penalty, and will probably need to use their first actions during combat to stand up and grab their weapons.</li><li>After surviving the ambush, the players will need to quickly make their way to the nearest guard precinct to infiltrate it while it's low on guards. The next encounter should take place on the way to the guard precinct, with the final encounter taking place inside the precinct.</li><li>Inside the precinct, the players find maps and notes detailing the Covalonians' activities, and the players can sabotage this evidence by destroying them or creating edits to mislead the guards. A player who searches and succeeds at a\_<strong>#DC+2# </strong>Perception check notices some hidden notes written in Aklo. When deciphered, the notes read: \"The Seed requires a steady supply of blood to nourish it. Detain any large sources of blood and notify Captain Darkscale immediately.\"</li></ol><h3>Recommended Locations</h3><p>Plains, forests, jungles, and beaches for the camp. Urban streets, rooftops, and urban indoors for the rest of the mission.</p><h3>Recommended Creatures</h3><p>Humanoids, maybe with the occassional animal companion. Alternatively, the creatures can fight in their un-masked aberration forms if they're not in a public place.</p><h3>Recommended Loot</h3><p>Any. If the players decipher the hidden note in the guard precinct, an Investigation Bonus is added in the form of raw GP equaling 10% of the total treasure budget.</p>"
