      - _id: SHKjq98tzuaKtCaP
        name: Shifting Form
        type: action
        img: systems/pf2e/icons/actions/Passive.webp
        effects: []
        folder: null
        sort: 1300000
        flags: {}
        system:
          description:
            gm: ''
            value: "<p>At the end of each of its turns, the Assembled Council shifts its form into one on the below table. A form may not be used a second time until all forms have been used at least once, and it does not have access to forms from councilors that were not present in the previous phase. While in a form, the Assembled Council gains access to the corresponding ability.\_</p>\n<table style=\"width:100%;height:170px\" border=\"1\">\n<tbody>\n<tr style=\"height:17px\">\n<td style=\"width:21.9144%;height:17px\">Number</td>\n<td style=\"width:33.5626%;height:17px\">Form</td>\n<td style=\"width:44.523%;height:17px\">Ability</td>\n</tr>\n<tr style=\"height:17px\">\n<td style=\"width:21.9144%;height:17px\">1</td>\n<td style=\"width:33.5626%;height:17px\">\n<p>Bomber Form (Oster)</p>\n</td>\n<td style=\"width:44.523%;height:17px\">Mega-Bomb Barrage</td>\n</tr>\n<tr style=\"height:17px\">\n<td style=\"width:21.9144%;height:17px\">2</td>\n<td style=\"width:33.5626%;height:17px\">\n<p>Gun Arm Form (Ferdi)</p>\n</td>\n<td style=\"width:44.523%;height:17px\">Arm Cannon</td>\n</tr>\n<tr style=\"height:17px\">\n<td style=\"width:21.9144%;height:17px\">3</td>\n<td style=\"width:33.5626%;height:17px\">\n<p>Duelist Form (Belle)\_</p>\n</td>\n<td style=\"width:44.523%;height:17px\">Dueling Dance</td>\n</tr>\n<tr>\n<td style=\"width:21.9144%\">4</td>\n<td style=\"width:33.5626%\">\n<p>Shadowcaller Form (Darkscale)</p>\n</td>\n<td style=\"width:44.523%\">Swirling Darkness</td>\n</tr>\n<tr>\n<td style=\"width:21.9144%\">5</td>\n<td style=\"width:33.5626%\">\n<p>Mad Scientist Form (Carloni)\_</p>\n</td>\n<td style=\"width:44.523%\">Omegavolt!</td>\n</tr>\n<tr>\n<td style=\"width:21.9144%\">6</td>\n<td style=\"width:33.5626%\">\n<p>Necromancy Form (Rodney)</p>\n</td>\n<td style=\"width:44.523%\">Grasping Undead</td>\n</tr>\n<tr>\n<td style=\"width:21.9144%\">7</td>\n<td style=\"width:33.5626%\">\n<p>Oscillating Form (Nathioli)</p>\n</td>\n<td style=\"width:44.523%\">Fire and Ice</td>\n</tr>\n<tr>\n<td style=\"width:21.9144%\">8</td>\n<td style=\"width:33.5626%\">\n<p>Pestilence Fangs Form (Fiola)</p>\n</td>\n<td style=\"width:44.523%\">Wild Bites</td>\n</tr>\n</tbody>\n</table>\n<p>When the Assembled Council enters Gun Arm form, it should visibly focus on a single creature. This focus is obvious to all observers.\_</p>\n<p>\_</p>\n<p>The first time the Assembled Council \_uses Shifting Form, all non-allied creatures must make a\_<span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">@Check[type:fortitude|dc:26|basic:false] save</span><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">. On a failure, creatures becomes sickened 1. On a critical failure, creatures becomes sickened 2.\_</span></p>"
