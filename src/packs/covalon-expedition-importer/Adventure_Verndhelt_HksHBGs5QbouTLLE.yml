        name: Divine Wrath
        sort: 500000
        system:
          description:
            gm: ''
            value: >-
              <p>You can channel the fury of your deity against foes of opposed
              alignment. Choose an alignment your deity has (chaotic, evil,
              good, or lawful). You can't cast this spell if you don't have a
              deity or your deity is true neutral. This spell gains the trait of
              the alignment you chose. You deal 4d10 damage of the alignment you
              chose; each creature in the area must attempt a Fortitude save.
              Creatures that match the alignment you chose are unaffected. Those
              that neither match nor oppose it treat the result of their saving
              throw as one degree better.</p>

              <hr />

              <p><strong>Critical Success</strong> The creature is
              unaffected.</p>

              <p><strong>Success</strong> The creature takes half damage.</p>

              <p><strong>Failure</strong> The creature takes full damage and is
              @UUID[Compendium.pf2e.conditionitems.Item.fesd1n5eVhpCSS18]{Sickened
              1}.</p>

              <p><strong>Critical Failure</strong> The creature takes full
              damage and is
