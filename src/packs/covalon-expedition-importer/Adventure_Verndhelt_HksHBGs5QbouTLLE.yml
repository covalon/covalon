        publicNotes: "<div data-visibility=\"gm\">\n<p>Paste this text to a player that succeeds on a Recall Knowledge check on the contract.\_</p>\n</div>\n<p>Contractus infernalis est contractus a Concilio Ferreo Verndhelt subscriptus acerrimo conatu suae potentiae in Cataclysmo primo percussus haerendi.</p>\n<p>Verba contractus singula membra Consilii Ferrarii defendunt a \"periculis plani materialis\". His legibus consentientes multo plus quam expectaverant videtur omiserunt, et se ad ultimum usque defendunt.</p>"
        privateNotes: "<div data-visibility=\"gm\">\n<p>Do not reveal this text to the players.\_</p>\n<p>\_</p>\n<p>The Infernal Contract is a contract signed by the Iron Council of Verndhelt in a desperate attempt to cling to their power at the Cataclysm first struck.\_</p>\n<p>The contract terms protect individual members of the Iron Council from the \"dangers of the material plane\". It seems they gave up much more than they expected when agreeing to these terms, and only intended to protect themselves to the very end.\_\_</p>\n</div>"
