name: Verndhelt
img: modules/covalon/images/Verndhelt_Basecamp.webp
caption: ''
sort: 0
description: >-
  <div class="block wide"><div class="block template"><div class="block "><h3
  id="verndhelt">Verndhelt</h3></div><div class="block taglist"><p><span
  class="inline-block tag">Civilization</span></p></div><p>The iron
  empire.</p><div class="block indented"><p><strong>Government</strong> Knight
  Lords of the Iron Council (aristocratic
  oligarchy)</p><p><strong>Population</strong> human, elf,
  halfling</p><p><strong>Religion</strong> Derelis, Levona, Laws of
  Mortality</p><p><strong>Primary Exports</strong> iron, copper, tin, precious
  metals, precious stones, weapons, armor</p><p><strong>Geography</strong> snowy
  coast and mountains</p><p><strong>Fate</strong> swallowed by the
  earth</p></div><hr /><p>Verndhelt was a highly xenophobic and amibitious
  empire that leveraged their heavily armored forces to conquer territory that
  the Iron Council demanded was theirs by right of might. Led by the
  divine-adjacent Knight Lords, these forces showed little mercy as their
  martial prowess fed the empire’s expansion. Children with potential to lead in
  the Empire’s Finest were scouted from ages as young as seven, and parents were
  paid a substantial stipend to turn their child over to the Iron Academies to
  learn how best they could serve their country. Citizens of Verndhelt could
  expect strict law enforcement, though activities within the bounds of law were
  encouraged, as the belief that beneficial destiny came to those who earned it
  with the toil of their back, but non-humans were ostricised by the nation’s
  culture, with tieflings treated especially poorly.</p><p>When the Cataclysm
  found Verndhelt, it came as a rumbling of the earth. The Iron Palace, the
  military academies, and most of their standing armies crumpled into the depths
  as a sinkhole swallowed the capital whole.</p></div></div>
