      - _id: N25w4821kKI9PZbV
        flags:
          core: {}
        img: systems/pf2e/icons/spells/charm.webp
        name: Charm
        sort: 800000
        system:
          description:
            gm: ''
            value: >-
              <p>To the target, your words are honey and your visage seems
              bathed in a dreamy haze. It must attempt a Will save, with a +4
              circumstance bonus if you or your allies recently threatened it or
              used hostile actions against it.</p>

              <p>You can Dismiss the spell. If you use hostile actions against
              the target, the spell ends. When the spell ends, the target
              doesn't necessarily realize it was charmed unless its friendship
              with you or the actions you convinced it to take clash with its
              expectations, meaning you could potentially convince the target to
              continue being your friend via mundane means.</p>

              <hr />

              <p><strong>Critical Success</strong> The target is unaffected and
              aware you tried to charm it.</p>

              <p><strong>Success</strong> The target is unaffected but thinks
              your spell was something harmless instead of charm, unless it
              identifies the spell.</p>

              <p><strong>Failure</strong> The target's attitude becomes
              @UUID[Compendium.pf2e.conditionitems.Item.v66R7FdOf11l94im]{Friendly}
              toward you. If it was Friendly, it becomes
              @UUID[Compendium.pf2e.conditionitems.Item.v44P3WUcU1j0115l]{Helpful}.
              It can't use hostile actions against you.</p>

              <p><strong>Critical Failure</strong> The target's attitude becomes
              Helpful toward you, and it can't use hostile actions against
              you.</p>

              <hr />

              <p><strong>Heightened (4th)</strong> The duration lasts until the
              next time you make your daily preparations.</p>

              <p><strong>Heightened (8th)</strong> The duration lasts until the
              next time you make your daily preparations, and you can target up
              to 10 creatures.</p>
          rules: []
          slug: charm
