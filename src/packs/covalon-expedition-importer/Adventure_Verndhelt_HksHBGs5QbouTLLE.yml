              <p>Opening a door that bypasses normal space, you instantly
              transport yourself and any items you're wearing and holding from
              your current space to a clear space within range you can see. If
              this would bring another creature with you-even if you're carrying
              it in an extradimensional container-the spell is lost.</p>

