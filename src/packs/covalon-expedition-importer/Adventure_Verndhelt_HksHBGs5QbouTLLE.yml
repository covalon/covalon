          content: >-
            <h1><strong style="font-weight:normal"
            id="docs-internal-guid-51da8832-7fff-e854-9cec-a72737876399">Verndhelt
            Finale</strong></h1><h2><strong style="font-weight:normal"
            id="docs-internal-guid-51da8832-7fff-e854-9cec-a72737876399">Yazeri,
            Archdevil of the Nine Hells and Solarius, First General of the
            Celestial Court</strong></h2><h3><strong style="font-weight:normal"
            id="docs-internal-guid-51da8832-7fff-e854-9cec-a72737876399">Hook</strong></h3><p
            dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt"><strong
            style="font-weight:normal"
            id="docs-internal-guid-51da8832-7fff-e854-9cec-a72737876399">Through
            arcane rituals, charismatic displays of devilish charm and dangerous
            exploration, Covalon’s adventurers have learned Vessel of the Maw
            lies in Verndhelt devils’ war room. Facsimiles of Yazeri and
            Solarius skulk at the site of Covalon’s victory. Protect the sapling
            at all costs!</strong></p><h3><strong style="font-weight:normal"
            id="docs-internal-guid-51da8832-7fff-e854-9cec-a72737876399">Putting
            the War in War Room</strong></h3><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt"><strong
            style="font-weight:normal"
            id="docs-internal-guid-51da8832-7fff-e854-9cec-a72737876399">The Maw
            has spawned copies of Yazeri and Solarius to continue the
            extraplanar conflict that feeds its presence in Verndhelt. They come
            for the sapling, which Covalon must defend at all
            costs.</strong></p><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt"><strong
            style="font-weight:normal"
            id="docs-internal-guid-51da8832-7fff-e854-9cec-a72737876399">The
            players begin in the center of the room. Yazeri and two
            tier-appropriate devils enter from its south. Roll for any active
            contract clauses and modifications. For Hard Mode, use all three
            modifications (Lengthy Contract, Eternal Warriors, and Stunning
            Entrance).</strong></p><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt"><strong
            style="font-weight:normal"
            id="docs-internal-guid-51da8832-7fff-e854-9cec-a72737876399">Solarius
            crashes through the roof and impales Yazeri once her hit points are
            reduced to zero. He attacks the party next, marking them as servants
            of the archdevil. The Maw’s dark energies prevent him from listening
            to reason.</strong></p><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt"><strong
            style="font-weight:normal"
            id="docs-internal-guid-51da8832-7fff-e854-9cec-a72737876399">The
            players are posing as throne room guards and are uncertain when the
            facsimiles will attack. This prevents use of items or abilities that
            grant effects with a duration of less than 8 hours before
            combat.</strong></p><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt"><strong
            style="font-weight:normal"
            id="docs-internal-guid-51da8832-7fff-e854-9cec-a72737876399">The
            room’s ceilings are 60 ft. high, and the hole Solarius creates on
            entry is not passable terrain. Players can escape the encounter
            through the southern entrance, if needed.</strong></p><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt"><strong
            style="font-weight:normal"
            id="docs-internal-guid-51da8832-7fff-e854-9cec-a72737876399">This
            Finale is balanced for parties with an APL at the middle of their
            tier. If the party’s APL is a full level above or below the middle,
            apply the Weak or Elite Template to all hostile
            creatures.</strong></p><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt"><strong
            style="font-weight:normal"
            id="docs-internal-guid-51da8832-7fff-e854-9cec-a72737876399">After
            Solarius is defeated, the Contract encases itself in crystal,
            roiling the celestial and fiendish energies in the room. The crystal
            can not be damaged, altered, or moved in any way. The Contract
            remains encased until new facsimiles
            attack.</strong></p><h3>Contractual Catastrophe</h3><p dir="ltr"
            style="line-height:1.38;margin-top:14pt;margin-bottom:0pt">This
            finale will occasionally invoke clauses from the Infernal Contract.
            When this happens, roll one <strong>IF</strong> statement and one
            <strong>THEN</strong> statement from the included RollTables.
            <strong>THEN</strong> statements take effect immediately after the
            triggering action in their paired <strong>IF
            </strong>statement.</p><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt">@UUID[RollTable.85DosliujNsRNI8l]{Basic
            Rules - IF Clauses}</p><p>@UUID[RollTable.oU6zKAUO50NOzcuH]{Basic
            Rules - THEN
            Clauses}</p><p>@UUID[RollTable.HG5wf8SGpcDYhfga]{Advanced Rules - IF
            Clauses}</p><p>@UUID[RollTable.lv5HfG0tSBhmWSc6]{Advanced Rules -
            THEN Clauses}</p><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt">Where
            required, the DC for the Contract and its abilities is
            <strong>##DC+2##</strong></p><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt">Add active
            contract clauses in the tiles underneath the MAP as a reminder.
            These should be visible to players at all times.</p><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt">All
            players gain access to the special
            @UUID[Item.k9t36ZqXDVWCQfwO]{Litigation Larceny} and
            @UUID[Compendium.covalon.verndhelt-actions.Item.P00pIth8tnEgJKy1]{Clausible
            Deniability} actions during this Finale. Add them to your players’
            character sheets and inform them you have done so.</p><h3>Tactics
            Overview</h3><p dir="ltr"
            style="line-height:1.38;margin-top:14pt;margin-bottom:0pt">Yazeri is
            wily fighter ready to use every advantage. She uses
            @UUID[Actor.kklC5AV3sLwD2O0I.Item.hebNWNWHwylH67FI]{Perish Post-It}
            at the start of each of her turns, targeting a creature whose name
            she has not yet captured and prioritizing those she intends to
            harm.</p><p dir="ltr"
            style="line-height:1.38;margin-top:14pt;margin-bottom:0pt">Yazeri
            rerolls unfavorable or useless Contract clauses using
            @UUID[Actor.kklC5AV3sLwD2O0I.Item.IMPd16pq4s0JCcmh]{Favourable
            Terms} with the quickened action provided by
            @UUID[Actor.kklC5AV3sLwD2O0I.Item.gNu6zeJlrYM5PF6i]{Quick Mind}.
            Yazeri has great control of the contract and morphs its terms to her
            benefit. If satisfied with the active contract clauses, she prefers
            to @UUID[Actor.kklC5AV3sLwD2O0I.Item.gLUQ9rxBN4Wm69BT]{Castigate}.
            Yazeri can cast
            @UUID[Actor.kklC5AV3sLwD2O0I.Item.fuugsFyrctLkPtUY]{Suspended
            Retribution (Mythic)} and
            @UUID[Actor.kklC5AV3sLwD2O0I.Item.5LaIqQD1Qc0WbaUE]{Blistering
            Invective} twice each. She uses Blistering Invective early in the
            fight to spread persistent damage as widely as possible.</p><p
            dir="ltr"
            style="line-height:1.38;margin-top:14pt;margin-bottom:0pt">Solarius
            bursts through the ceiling and impales Yazeri once she reaches zero
            hit points. Solarius joins initiative at the current turn and begins
            his turn immediately. The Contract comes under his control at the
            start of his first turn.</p><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt">Solarius
            uses @UUID[Actor.zp3IByN8WlB3O3rr.Item.Li3xHz14r8EizmrA]{"Kneel,
            Interloper!"} at every available opportunity and will
            @UUID[Actor.zp3IByN8WlB3O3rr.Item.GrmOR2zXOGwJcnqK]{Invoke Radiance}
            whenever he can hit at least three creatures. He prioritizes using
            @UUID[Actor.zp3IByN8WlB3O3rr.Item.5NAlZJARTvGow0f5]{Blade of
            Justice}, especially against evil-aligned creatures.</p><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt">Encourage
            players to roleplay their action to remove the Fatigued condition
            imposed by
            @UUID[Actor.zp3IByN8WlB3O3rr.Item.IhUGfYdxuhnwYARx]{Weight of
            Guilt}.</p><h3>Loot</h3><p dir="ltr"
            style="line-height:1.38;margin-top:5pt;margin-bottom:5pt">The
            entirety of the treasure budget is given out in raw GP, paid by the
            NPC used for the hook. Additionally, players unlock the ability to
            customize their Soul Seed and gain access to the Fiend
            aspect.</p><p><br class="Apple-interchange-newline" /></p>
