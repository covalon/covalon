journal:
  - folder: Nay2KkD73AUZiLCU
    name: Verndhelt Expedition
    _id: nuli66eA9iiPjyqz
    pages:
      - sort: 100000
        name: Verndhelt Briefing
        type: text
        _id: gMi1BSgJLEIVU4On
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h2>Background</h2><p>Verndhelt once stood as an imperial monument to strength. An impenetrable fortress of iron and mercilessness. Citizens of Verndhelt could expect strict law enforcement, often to the detriment of the populace but always in the strict pursuit of what the Iron Council maintained was justice. Verndhelt was built on the foundation that hard work paid off, but in truth this was only the case for humans.</p><p>Xenophobic in a way matched only by the nation's ambition, Verndhelt treated non-human ancestries poorly. Yet it was this arrogant hubris that resulted in Verndhelt's downfall. An obsession with the strict hierarchies of the lower planes, and a seeping, insidious growth in the nation's willingness to make literal deals with the devil led to the destruction of the mightiest military nation on Elleaterra.</p><p>When the Cataclysm came for Verndhelt, it showed just as little mercy as the Iron Academies showed its subjects. The quaking of the very foundation of the earth swallowed whole the imperial spires of Iron.</p><p>Some say it's better off that way.</p><p></p><p>For more information on Verndhelt, see its entry in the <a href=\"https://scribe.pf2.tools/v/8vMfPSF7-covalon-player-s-guide\" target=\"_blank\" rel=\"noopener\">Covalon Player's Guide</a>.</p><h2>Mission Overview</h2><p>After an eventful journey across the skies, Covalon crash landed at the outskirts of the pit that was once Verndhelt. During the approach, it was clear that the site had become a battleground for the eternal war between Angels and Devils.</p><p>After a stark warning from the angel Solarius, and no such pleasantries from the devil Yazeri, Covalon's vehicle was struck out of the sky by both parties in a coincidental, simultaneous attack on perceived interlopers. Covalon's attempts to discuss the importance of the destruction of the Vessel of the Maw fell on deaf ears, as the unnaturally fuelled war continued to rage on.</p><p>Establishing a rapid basecamp, it came time for adventurers to determine just what was fuelling this war. More research was needed; What's causing this aggression from both sides? What can we learn from them both about what's happening? What on Elleaterra is going on in that pit?!</p><h2>Verndhelt Required Elements</h2><p>All Verndhelt missions share some required elements. The area around and inside the pit is scattered with floating scraps of paper, soaring in the hot air currents rising from the deep. These scraps are fragments of a devilish contract, and their power continues to affect the local area in unpredictable ways.</p><p>All missions run in Verndhelt are affected by one of the below rows. You may choose an appropriate benefit you feel will be enjoyable for your group, or you may select randomly. Each player upside must be used with its corresponding monster upside - you may not mix and match.</p><p></p><div dir=\"ltr\" style=\"margin-left:0pt\"><table style=\"border:none;border-collapse:collapse;table-layout:fixed;width:451.27559055118115pt\"><colgroup><col></col><col></col></colgroup><tbody><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong>Player Upside</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong>Monster Upsides</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">Consider a 19 on the dice the same as a 20 (increase the stage of success by one).</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">All monsters have @UUID[Compendium.pf2e.feats-srd.Item.XRahcvEPEAEdGUn8]{Gang Up}</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">All players gain access to and can cast </strong></span><span style=\"text-decoration:underline\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\"><span style=\"text-decoration:underline\">@UUID[Compendium.pf2e.spells-srd.Item.Vctwx1ewa8HUOA94]{Diabolic Edict}</span></strong></span></span><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\"> as a Divine Innate Spell. If they do not already have a focus point, they gain one focus point for the duration of this adventure.</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">The Devils presence whips creatures into a rage! All non-pc creatures in the adventure have the effects of </strong></span><span style=\"text-decoration:underline\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\"><span style=\"text-decoration:underline\">@UUID[Compendium.pf2e.classfeatures.Item.WZUCvxqbigXos1L9]{Rage}</span></strong></span></span><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">. They may use Concentrate actions while raging in this way.\_</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">All players gain an extra temporary hero point, up to a maximum of 4 total for the game.\_</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">Monsters receive 2 Villain Points that can be used in the same way as Hero Points (they cannot be used to stabilise.) These points do not replenish and are shared by all monsters.\_</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">All players gain physical resistance equal to one third their level.\_</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">Players gain weakness equal to Tierx2 to all energy damage (fire, cold, acid, electricity, sonic). This applies once per effect.\_\_</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">All players deal 1d4 Good or Evil damage on a successful Strike or damaging Spell Attack Roll.\_</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">All monsters gain temporary Hit Points equal to their level.\_</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">Players may spend (2a) (Concentrate) to gain Fast Healing equal to their Tierx2 for 1 minute.\_Each player may use this ability once.</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">All monsters cause half the tier rounded up d6 Bleed damage on a successful Strike.</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">All player spells have the effect of @UUID[Compendium.pf2e.feats-srd.Item.FoWO4RnHRwfEIC7Q]{Widen Spell} .\_</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">All monsters gain the @UUID[Compendium.pf2e.feats-srd.Item.BWomK7EVY0WXxWgh]{Reach Spell} action.\_</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">All players gain a fly speed equal to their speed.\_</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">All monsters gain a +10 status bonus to their speeds. All monsters gain the benefits of an @UUID[Compendium.pf2e.equipment-srd.Item.bJORQsO9E1JCJh6i]{Extending} rune.\_</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">All Players gain the @UUID[Compendium.pf2e.feats-srd.Item.1MWL2uEmyiOfYtJn]{Disarming Flair} feat.\_</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">@UUID[Compendium.pf2e.spell-effects.Item.1gTnFmfLUQnCo3TK]{Spell Effect: Dread Ambience (Success)} ritual effect applies to all players throughout the adventure.</strong></span></p></td></tr><tr style=\"height:72.99462890625pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">All Players gain access to and can cast </strong></span><span style=\"text-decoration:underline\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\"><span style=\"text-decoration:underline\">@UUID[Compendium.pf2e.spells-srd.Item.ps0nmhclT6aIXgd8]{Ki Rush}</span></strong></span></span><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\"> as an Divine Innate Spell. If they do not already have a focus point, they gain one focus point for the duration of this adventure.</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">The highest level creature (ties are GM’s choice) gain a 20ft Hazardous Terrain aura that deals Tier damage to Players only.\_</strong></span></p><p></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">Players get the @UUID[Compendium.pf2e.feats-srd.Item.jzflcD1XnBp2bSZI]{Distracting Flattery} reaction, and this reaction can be used for Influence subsystem mechanics. Each player can use this reaction once.\_</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial,sans-serif\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-328fdd14-7fff-aae1-eb57-0efd9ee95458\">One Monster of the GM’s choice in each combat encounter gains the @UUID[Compendium.pf2e.feats-srd.Item.PfnlKlLuqKOOhLyK]{Big Debut} action from @UUID[Compendium.pf2e.feats-srd.Item.MNArjo5Z5LUYITQm]{Celebrity}.\_</strong></span></p></td></tr></tbody></table></div><p></p><h2>How to Run an Expedition</h2><p>Expeditions are composed of two subtypes: missions and finales. Missions are a set of three dungeon-like adventures that are narratively linked, but can be completed in any order. Each mission must include predetermined narrative and mechanical elements while sticking to a theme of locations, creatures, and loot, which are included in its associated journal entry, with the specifics of the blanks to be filled in by the GM of the adventure. Like other adventure types, Dungeon Guides must submit their expedition missions for approval.</p><p>When reading the instructions for an expedition, you may see key terms surrounded by number signs. These indicate that the term should be replaced by a value that's dependent on the adventure's average party level.\_\_If you have any questions about how to apply these terms or any of the required elements, be sure to ask about them during your submission for approval.\_Here is a list of terms:</p><ul><li><strong>#Creature [Table Number] [Modifier]#</strong> should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=995\">Building Creatures</a> section of the Gamemastery Guide. For example, \"#Creature 2-8 Minimum# means that you should reference the Building Creatures rules, look for Table 2-8, and use the value in the Minimum column for the creature's level (adjusted for elite or weak as appropriate).</li><li><strong>#Hazard [Table Number] [Modifier]#\_</strong>should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=1043\">Building Hazards</a> section of the Gamemastery Guide. For example, \"#Hazard 2-16 Simple Damage# means that you should reference the Building Hazards rules, look for table 2-16, and use the value in the Simple Damage column for the hazard's level.</li><li><strong>#DC [Modifier]#\_</strong>should be replaced by a value according to the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=554\" target=\"_blank\" rel=\"noopener\">DCs by Level</a> table in the Core Rulebook. If a modifier is included, the value should be adjusted accordingly. For example, \"#DC +5#\" means that you should reference the DCs by Level table, find the value appropriate for the party's average level, then add 5 to it.</li></ul><p>Finales are singular encounters against a narratively significant threat that conclude an expedition. They come in two versions: normal mode and hard mode. Before a finale is cleared for the first time, it can only be run by Covalon administrators and moderators, and is ran at hard mode. Afterwards, the finale can be ran by any Dungeon Guide at normal mode (though players can request hard mode if they'd like). Normal mode can be run in Tier 2 or above, and hard mode can only be run at the highest tier, intended for max level characters. Unlike missions, finales use a specific map and specific creatures, included with this module.</p><p>Each finale comes with three variant modifications. When running a normal mode finale, a GM choose one of the three modifications to use, or can roll [[/r 1d3]] to randomly determine which modification to use. When running a hard mode finale, the GM uses all three modifications.\_There are no additional rewards for completing hard mode.</p><h2>Reporting a Completed Expedition</h2><p>When reporting a completed expedition in the Dungeon Summaries channel, use the\_<strong>exact name</strong> of the adventure as the adventure's title. For example, if you ran the first mission of Ikouga, the summary's title should be \"Ikouga Mission A: Retame the Island\" exactly. The summary should otherwise follow the same format as dungeons.\_</p><p>Finally, any narrative-based knowledge or intrigue that the players gain as a result of the expedition should be left out of the summary. For example, if the players complete a bonus objective that allows them to learn special information as detailed in the Required Elements or Recommended Loot section of each journal entry, that should be left out of the dungeon summary.</p><p></p><h3>Special Thanks</h3><p>Special thanks to Axerwan, Kore, and Fuzzzytail for providing art assets for use in Verndhelt!</p>"
