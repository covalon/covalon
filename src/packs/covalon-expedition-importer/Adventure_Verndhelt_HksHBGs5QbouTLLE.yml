      - sort: 400000
        name: 'Verndhelt Mission B: Playing Both Sides'
        type: text
        _id: 4bmXClW7teb2l7Yu
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3>Hook</h3><p>We’ve intercepted an infernal missive. One of Vernheldt’s nobles survived, and is attempting to gain favor with the devil armies by hosting a...party? We’re anticipating there will be high ranking devil generals at the event. This could be the perfect opportunity to gain information about our foes. The one problem is your ticket in; the invite says all attending groups are to bring a freshly plucked angel feather.</p><h3>Required Elements</h3><p>This expedition has three encounters. The party must obtain an angel feather from a nearby camp to enter a devil party, where they can influence devil generals to reveal their plans before retreating into an ambush. The Portal Guide explains the party must keep Covalon’s activity and location secret from the angel and devil forces.</p><h4><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Encounter 1</span></span></h4><p>The Portal Specialist provides the location of a small angel camp whose layout is determined by the GM. The party can steal or negotiate for a feather, or they can obtain it by defeating the angels in a Moderate combat encounter.</p><p>The party can obtain a feather without force by succeeding six #DC+2# appropriate skill checks before failing such checks three times. Critical successes/failures count twice. The GM can apply (very) hard/easy adjustments to this DC for smart use of skills or abilities. If the players fail three skill checks, the angels attack.</p><p>Adapt to your camp layout and party’s plan when determining which skill checks you should request. Allow your group to be creative.</p><h4><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Encounter 2</span></span></h4><p>The group can enter the devil party once they have an angel feather. When they arrive at the party, they can attempt to Impersonate or Lie (#DC+2#) about who they are. If they succeed, they begin the Influence encounter with one Influence Point (IP) for each general in attendance.</p><p>During this encounter, the party must gather IP to glean information from devil generals attending a mansion party hosted by a surviving Vernheldt noble who has allied with the infernal army. Read <a href=\"https://2e.aonprd.com/Rules.aspx?ID=1201\" title=\"Influence\">this page</a> for influence encounter rules.</p><p>Choose two Devil General stat blocks whose Influence skills are appropriate to your party from Appendix A: General Influence Stat Blocks. The party can coax information for three Influence rounds before the Devil Generals must hurry back to their posts. They're on a very tight schedule!</p><h4><span style=\"text-decoration:underline\"><span style=\"text-decoration:underline\">Encounter 3</span></span></h4><p>On the way back from the party, the players are ambushed by a jealous group of humanoids allied with either the angels or the devils. This is a moderate combat encounter.</p><h3>Recommended Locations</h3><p>Mountainous encampment, fancy manor, snowy mountain terrain</p><h3>Recommended Creatures</h3><p>Celestials to represent angel forces, Fiends to represent devil forces, Humanoid enemies</p><h3>Recommended Loot</h3><p>Items or treasure items gifted from angels/devils the party makes friends with, Items related to celestials and fiends, Items that would be used to fight celestials or fiends, Gold reward from the portal guide for information gathered. If the party earns at least 9 total IP they get a gold reward bonus of 10% of the loot budget.</p><h3>Running for Smaller Groups</h3><div dir=\"ltr\" style=\"margin-left:0pt\"><table style=\"border:none;border-collapse:collapse;table-layout:fixed;width:468pt\"><colgroup><col></col><col></col><col></col><col></col></colgroup><tbody><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">4 Players</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">5 Players</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">6 Players</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">Encounter 1: Total Successes Needed\_</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">4</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">5</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">6</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">Encounter 1: Failure Threshold for Angel attack</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">2</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">2</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">3</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">Encounter 2: Highest Influence Threshold on all Influence Blocks</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">4</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">5</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">6</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-175ce9ee-7fff-f77b-87da-36508bdbbd93\">Encounter 2: First Influence Threshhold on all Influence Blocks</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong style=\