        text:
          format: 1
          content: "<h2>Hook</h2><p>We know a Maw vessel is here, but its whereabouts are still a mystery. We will be sending teams of adventurers with a Dungeoneering Society cartographer to map the area. Protect them, for they have no skill in combat.</p><h2>Required Elements</h2><p>Players have eight hours and enough fuel to explore nine hexes of the Verhneldt sinkhole before their miniature hot air balloon self-destructs. In each hex, players face a moderate combat encounter, obstacle, or opportunity. The order of these falls to GM discretion, but a given type of encounter cannot repeat until players encounter both other types.</p><h3>The Cartographer</h3><p>The party must protect their noncombatant cartographer, who suffers the Wounded and Dying conditions as player characters would. GMs can target the cartographer during combat encounters but should avoid focusing them down.<br /><br /><strong>For the Cartographer statistics, use the following:</strong> #Creature 2-5 moderate# for its AC, #Creature 2-6 Moderate# for all saves, and #Creature 2-7 Low# for its HP.</p><h3>Victory Points</h3><p>The party can overcome Obstacles and Opportunities by gathering victory points. Succeeding an Obstacle or Opportunity skill check grants one victory point, or two on a critical success. Critically failing such a check subtracts one victory point.</p><p>When your party encounters an Obstacle or Opportunity, roll initiative. Every party member can attempt one of the listed checks once, then the Obstacle or Opportunity is resolved. <br /><br />An Obstacle usually takes one round to resolve. An opportunity can take longer to resolve depending on the parties actions, initiative can still be useful for keeping track of who has rolled and who has not.</p><h3>Exploring</h3><p>Exploring a hex usually takes an hour but can be faster or slower depending on a party’s performance.<br /><br />The party can take one ten minute rest per hex without any time penalty. If they stop to take more than one ten minute rest, that time counts towards their 8 hour time limit.</p><h3>Combats\_</h3><p>Searching hexes containing a combat encounter takes one hour, or 30 minutes if the party completes the encounter in two rounds or less.</p><h3>Obstacles</h3><p>Select three obstacles from <strong>Table 3-1</strong> for your group to encounter. Clearing an Obstacle usually takes one hour, but can take more or less time depending on the amount of victory points the party accumulates. Victory points also determine the effect of a given Obstacle (see Appendix).</p><table><tbody><tr><td><p>Six or more victory points</p></td><td><p>Critical Success, half an hour</p></td></tr><tr><td><p>Four to five victory points</p></td><td><p>Success, an hour</p></td></tr><tr><td><p>Two to three victory points</p></td><td><p>Failure, an hour</p></td></tr><tr><td><p>Less than two victory points</p></td><td><p>Critical failure, two hours</p></td></tr></tbody></table><h3>Opportunities</h3><p>Select three opportunities from <strong>Table 3-2</strong> for your group to encounter. Clearing an Opportunity usually takes one hour, but can take less time if the party accumulates enough victory points, which also determine the effect of a given Opportunity (see Appendix).</p><table><tbody><tr><td><p>Six or more victory points</p></td><td><p>Critical Success, half an hour</p></td></tr><tr><td><p>Four to five victory points</p></td><td><p>Success, an hour</p></td></tr><tr><td><p>Two to three victory points</p></td><td><p>Failure, an hour</p></td></tr><tr><td><p>Less than two victory points</p></td><td><p>Critical failure, an hour</p></td></tr></tbody></table><h2><br />Recommended Locations</h2><p>Tunnels and caves. The Vernheldt sinkhole leads all the way to the pits of hell. Anything of interest will be found in openings at the hole’s edges.</p><h2>Recommended Creatures\_</h2><p>Celestials, devils, and subterranean creatures or any creature that has a Celestial- or Devil-touched adjustment.</p><h2>Recommended Loot</h2><p>At least 50% of the total treasure budget is paid out in gold. Treasure and magic items related to devils or celestials can account for up to 50% of the total treasure budget and can only be found following combat encounters. If the party explores at least eight hexes, they earn an Exploration Bonus equal to 10% of the total treasure budget.</p><h2>Running for Smaller Groups</h2><p>Use the following tables to determine success and failure states for parties of less than six players.</p><h3><strong>Obstacles:</strong></h3><p><strong>Five Players</strong></p><table><tbody><tr><td><p>Five or more victory points</p></td><td><p>Critical success, half an hour</p></td></tr><tr><td><p>Three to four victory points</p></td><td><p>Success, an hour</p></td></tr><tr><td><p>Two victory points</p></td><td><p>Failure, an hour</p></td></tr><tr><td><p>Less than two victory points</p></td><td><p>Critical failure, two hours</p></td></tr></tbody></table><p><strong>Four Players</strong></p><table><tbody><tr><td><p>Four or more victory points</p></td><td><p>Critical success, half an hour</p></td></tr><tr><td><p>Three victory points</p></td><td><p>Success, an hour</p></td></tr><tr><td><p>Two victory points</p></td><td><p>Failure, an hour</p></td></tr><tr><td><p>Less than two victory points</p></td><td><p>Critical failure, two hours</p></td></tr></tbody></table><h3><strong>Opportunities:</strong></h3><p>F<strong>ive Players</strong></p><table><tbody><tr><td><p>Five or more victory points</p></td><td><p>Critical success, half an hour</p></td></tr><tr><td><p>Three to four victory points</p></td><td><p>Success, an hour</p></td></tr><tr><td><p>Two victory points</p></td><td><p>Failure, an hour</p></td></tr><tr><td><p>Less than two victory points</p></td><td><p>Critical failure, two hours</p></td></tr></tbody></table><p><strong>Four Players</strong></p><table><tbody><tr><td><p>Four or more victory points</p></td><td><p>Critical success, half an hour</p></td></tr><tr><td><p>Three victory points</p></td><td><p>Success, an hour</p></td></tr><tr><td><p>Two victory points</p></td><td><p>Failure, an hour</p></td></tr><tr><td><p>Less than two victory points</p></td><td><p>Critical failure, two hours</p></td></tr></tbody></table><h1>C-1 Appendix: Tables</h1><table style=\"border:none;border-collapse:collapse\"><tbody><tr style=\"height:20pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\" colspan=\"4\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Arial\"><strong>Table 3-1 Obstacles</strong></span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Arial\">Name</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Arial\">Description\_</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Arial\">Checks</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt;text-align:center\"><span style=\"font-family:Arial\">Effect</span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">Annoying Imp Swarm</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">During the travel down a massive swarm of imps pours out from one of the side passages and attacks!\_</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>#DC+2# Intimidation</strong> to scare them away</span></p><p></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>#DC+2# Deception</strong> to distract them</span></p><p></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>#DC+5# Perception</strong> to find a safe path\_</span></p><p></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Area damage</strong> to drive them back (1 automatic point)\_</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">CS: No effect</span></p><p></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">S: Group takes half of #Hazard [2-16][Complex]# as piercing damage</span></p><p></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">F: Group takes full of #Hazard [2-16][Complex]#, half piercing, half poison</span></p><p></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">CF: Group takes double of #Hazard [2-16][Complex]#, half piercing, half poison and are Clumsy 1 from imp venom for the next hour</span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">Huge Maw Tendrils Blocking the way</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">A twisting knot of roots and other strange maw bits have created a natural wall blocking the path. As you approach, the tendrils lash out viciously!\_\_</span></p></td><td style=\"b