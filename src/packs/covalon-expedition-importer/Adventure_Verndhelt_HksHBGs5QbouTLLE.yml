\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>#DC+2# Society</strong> to understand their hierarchy and use that to the party’s advantage<br /><br /></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Items or gold value worth 15% of total loot budget</strong>, This counts as an automatic critical success.<br /><br /></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Intimidation #DC+4#</strong> to show the kobolds you are much more of a threat than then<br /><br /></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Performance #DC+4#</strong> to distract the group away from the contract they are guarding.</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">CS: The party earns another contract choice and the kobolds share a clue: the devil forces are guarding something at the bottom of the sinkhole<br /><br />S: The party earns another contract choice<br /><br />F: The party takes full of <strong>#Hazard [2-16][Complex]#</strong> as piercing <br /><br />CF: The party takes double of <strong>#Hazard [2-16][Complex]#</strong> as piercing\_</span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">An Angel losing its lifeforce\_</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">The part games across a dying angel with a maw tendril stuck in it sucking out its life-force. Perhaps some knowledge can be gleaned.</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\" data-colwidth=\"221\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Medicine #DC#</strong> to determine what is happening to the angel <br /><br /></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Occultism #DC+4#</strong> to recognize this tendril is an extension of the maw feeding off the angel<br /><br /></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Religion #DC#</strong> to RK about the angel and guess what may have happened</span></p><p></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">CS:The party earns a clue: The maw is feeding off the Celestial and Devil conflict and they intervened quick enough the angel reveals </span><span style=\"font-family:'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif\">\"Solarius will make all you interlopers bow before him\"</span><span style=\"font-family:Arial\"><br /><br />S: The party earns a clue: The maw is feeding off the Celestial and Devil conflict.This angel is however lost. <br /><br />F: The party does not learn any useful information.<br /><br />CF: The party takes <strong>#Hazard [2-16][Complex]# </strong>as negative as they get too close to the tendrils</span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">Remnants of Verndhelt</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">One of the tunnels seems large enough to reasonably explore. While searching some aspects of post cataclysm Verndhelt are found, journal, art, remains.</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\" data-colwidth=\"221\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Society to Decipher Writing #DC +2#</strong> to decipher the writings of a journal<br /><br /><br /></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Perception #DC + 4#</strong> to spot some remains of Verndhelt citizens with what looks like their life force sucked out<br /><br /></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Religion to Decipher #DC +2#</strong> to find a series of pamphlets (Written in Celestial or Infernal) that are acting as recruitment messages to join one of the two factions. <br /><br /></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Religion RK #DC +2#</strong> to recognize some scripture of someone or thing pledging loyalty to one of the two [name of finale bosses ranks]</span></p><p></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><br />CS:The party earns a clue:Several Verndhelt citizens swore allegiance to a Arch Devil of the Maw they also learn this arch devil</span><span style=\"font-family:'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif\"> is in possession of an extremely powerful contract. </span><span style=\"font-family:Arial\"><br /><br />S:The party earns a clue: Several Verndhelt citizens swore allegiance to a Arch Devil of the Maw<br /><br />F:No information is gained<br /><br />CF: While picking through the remnants they accidently cave in the entire tunnel. The party takes <strong>#Hazard [2-16][Complex]# </strong>as bludgeoning<strong> </strong>as they are escaping.</span></p></td></tr><tr style=\"height:0pt\"><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">A Lucky Break! Piece of contract floats by to catch</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">While moving downward the highest perception party member notices a piece of contract floating up from below.\_</span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\" data-colwidth=\"221\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Reflex #DC + 2#</strong> to quickly maneuver with the balloon to grab the contact<br /><br /></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Thievery#DC +2#</strong> to deftly grab the contract out of the air<br /><br /></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Crafting\_ #DC +4</strong># to quickly fashion some sort of object to catch the contract in<br /><br /></span></p><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\"><strong>Perception to aid #DC#</strong></span></p></td><td style=\"border-left:solid #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000 1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt 5pt;overflow:hidden;overflow-wrap:break-word\"><p dir=\"ltr\" style=\"line-height:1.2;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Arial\">CS: The party acquires a piece of contract in record time! <br /><br />S: The part acquires a piece of contract<br /><br />F: The party fails to catch the contract piece.<br /><br />CF: The cartographer ends up falling off the balloon! They land on some debris hanging off the side of the sinkhole. The Party wastes an extra hour rescuing them and calming them down.</span></p></td></tr></tbody></table><h1>C-2 Appendix: Resources</h1><img src=\"https://assets.forge-vtt.com/60d12e8eb10f8c2f16c2edea/DO%20NOT%20DELETE%20IDIOT/Verndhelt%20Mission%20C%20Map.jpg\" /><img src=\"https://assets.forge-vtt.com/60d12e8eb10f8c2f16c2edea/DO%20NOT%20DELETE%20IDIOT/VerndheltToken.png\" />"
