      - sort: 650000
        name: Verndhelt Finale
        type: text
        _id: Ttq9qcjuAb3hpT2W
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h2>Yazeri, Archdevil of the Nine Hells and Solarius, First General of the Celestial Court</h2><h3>Hook</h3><p>Through arcane rituals, charismatic displays of devilish charm and dangerous exploration the Covalon adventurers have managed to identify the location of the Vessel of the Maw in the War Room of the devils in Verndhelt. Despite Covalon's initial victory, a facsimile of Yazeri and Solarius have been skulking around. We need to protect the sapling at all costs!</p><h3>Putting the War in War Room</h3><p>The Maw is relentless in its feeding on the conflict at Verndhelt, and the extraplanar conflict is continuously fuelled by its dark presence. The Maw has regenerated a facsimile of both Yazeri and Solarius to continue their eternal war, and disrupt the healing energies of the Sapling. Covalon's finest must defend this sapling at all costs!</p><p>The PCs begin in the centre of the room, and Yazeri enters from the south with two tier appropriate devils. If the GM has not already done so, roll for any active contract clauses. You should also select which modifications will be active and apply these now. For Hard Mode, use all three modifications. The modifications are Lengthy Contract, Eternal Warriors, and Stunning Entrance.</p><p>When Yazeri is defeated, Solarius crashes through the roof alone and impales her on his sword. He then turns against the party, believing them to be influenced by the archdevil. He does not listen to reason, as he is equally influenced by the Maw's dark energy.</p><p>The PCs are serving as guards for the encounter, and do not have sufficient notice of exactly when the facsimile will attack. <span style=\"font-family:Signika, sans-serif\">They are unable to use items or abilities that grant short-term beneficial effects, though they can use anything that has a duration of at least 8 hours.</span></p><p><span style=\"font-family:Signika, sans-serif\">If the players need to escape from the encounter, they can do so by running out of the southern entrance.\_</span></p><p>The height of the room is 60ft. The hole created by Solarius entering is not passable terrain.</p><p>This encounter is balanced for the middle APL of a tier. If the party is above or below this APL by a full level, apply the Elite or Weak template to Yazeri, Solarius, and all of their allies respectively.</p><p>After Solarius is defeated, the combined celestial and fiendish energy burst forth from the room. The Infernal Contract encases itself in crystal to keep itself safe. This crystal cannot be damaged, broken or removed in any way. The contract remains in this crystal until a new facsimile attacks.</p><h3>Contractual Catastrophe</h3><p>Yazeri and Solarius' abilities occasionally call for a clause from the Infernal Contract to be invoked. When doing so, you must roll for one <strong>IF</strong> statement and one <strong>THEN</strong> statement from the included RollTables. When the <strong>IF</strong> statement is fulfilled, the selected <strong>THEN </strong>statement takes effect immediately after the triggering effect is resolved.</p><p>@UUID[RollTable.85DosliujNsRNI8l]{Basic Rules - IF Clauses}</p><p>@UUID[RollTable.oU6zKAUO50NOzcuH]{Basic Rules - THEN Clauses}</p><p>@UUID[RollTable.HG5wf8SGpcDYhfga]{Advanced Rules - IF Clauses}</p><p>@UUID[RollTable.lv5HfG0tSBhmWSc6]{Advanced Rules - THEN Clauses}</p><p>These are added as tiles underneath the map. Active contract clauses should be placed in the active sections on the bottom of the map as a reminder. These should be visible to all players at all times.</p><p>All players also gain access to the special Litigation Larceny action for the duration of this Finale. Details can be found below:</p><p>@UUID[Item.k9t36ZqXDVWCQfwO]{Litigation Larceny}</p><p>@UUID[Item.P00pIth8tnEgJKy1]{Clausible Deniability}</p><p>Where required, the DC for the contract and its abilities is <strong>##DC+2##.</strong></p><h3>Tactics Overview</h3><p>Yazeri is a wily fighter, capricious and intelligent. She should ensure to use her @UUID[Actor.kklC5AV3sLwD2O0I.Item.hebNWNWHwylH67FI]{Perish Post-It} ability at the start of each of her turns on a creature whose name she has not already captured in the contract, starting with creatures she intends to attack this round.</p><p>If the contract clauses do not benefit Yazeri, she should use her quickened action from @UUID[Actor.kklC5AV3sLwD2O0I.Item.gNu6zeJlrYM5PF6i]{Quick Mind} to use @UUID[Actor.kklC5AV3sLwD2O0I.Item.IMPd16pq4s0JCcmh]{Favourable Terms} and maximise her use of the contract. Yazeri is the creature that has the most ability to change the contract clauses, and should use this to her benefit whenever possible. When she is satisfied with the current clauses, she prefers to use @UUID[Actor.kklC5AV3sLwD2O0I.Item.gLUQ9rxBN4Wm69BT]{Castigate} regularly. She has two uses each of @UUID[Actor.kklC5AV3sLwD2O0I.Item.5LaIqQD1Qc0WbaUE]{Blistering Invective} and @UUID[Actor.kklC5AV3sLwD2O0I.Item.fuugsFyrctLkPtUY]{Suspended Retribution (Mythic)} and should prioritise the use of @UUID[Actor.kklC5AV3sLwD2O0I.Item.5LaIqQD1Qc0WbaUE]{Blistering Invective} early in the fight to get the persistent damage on as many creatures as possible.</p><p>Upon Yazeri reaching zero hitpoints, Solarius bursts through the ceiling and impales Yazeri on his blade. Solarius is completely under the influence of the Maw and believes the PCs to be evil and beyond redemption. Solarius immediately takes control of the contract when he arrives. Solarius joins initiative at the current turn and takes his turn immediately.</p><p>Solarius prioritises using @UUID[Actor.zp3IByN8WlB3O3rr.Item.Li3xHz14r8EizmrA]{\"Kneel, Interloper!\"} whenever he can to assert dominance over the adventurers. He will also @UUID[Actor.zp3IByN8WlB3O3rr.Item.GrmOR2zXOGwJcnqK]{Invoke Radiance} whenever he can hit three or more creatures.</p><p>When using @UUID[Actor.zp3IByN8WlB3O3rr.Item.IhUGfYdxuhnwYARx]{Weight of Guilt}, encourage players to roleplay their action to remove the fatigued condition where possible.</p><p>Solarius prioritises the use of @UUID[Actor.zp3IByN8WlB3O3rr.Item.5NAlZJARTvGow0f5]{Blade of Justice}, particularly against evil-aligned creatures.</p><h3>Loot</h3><p>The entirety of the treasure budget is given out in raw GP, paid by the NPC used for the hook. Additionally, players unlock the ability to customize their Soul Seed, gaining access to the Fiend aspect.</p>"
          markdown: ''
