      - sort: 200000
        name: 'Verndhelt Mission A: Ritual of Locating'
        type: text
        _id: yRVWIvc5afvCBY1s
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3>Hook</h3><p><em>A Devil has contacted us and is angry with the other Devils in charge of Verndhelt. They have agreed to help us locate the Vessel of the Maw but we will need to complete a ritual to do so. Just be careful not to get roped into anything unnecessary.</em></p><h3>Required Elements</h3><p><span>The party must collect four ingredients to complete a ritual with the aid of a devil, who provides the items’ location.</span></p><ul><li><p class=\"MsoListParagraphCxSpFirst\" style=\"text-indent:-18.0pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\">-\_\_\_\_\_\_\_\_\_ </span><span>An iron chalice</span></p></li><li><p class=\"MsoListParagraphCxSpMiddle\" style=\"text-indent:-18.0pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\">-\_\_\_\_\_\_\_\_\_ </span><span>Onyx Stones</span></p></li><li><p class=\"MsoListParagraphCxSpMiddle\" style=\"text-indent:-18.0pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\">-\_\_\_\_\_\_\_\_\_ </span><span>Ritual Candles</span></p></li><li><p class=\"MsoListParagraphCxSpLast\" style=\"text-indent:-18.0pt;mso-list:l0 level1 lfo1\"><span style=\"mso-list:Ignore\">-\_\_\_\_\_\_\_\_\_ </span><span>Sulphur Crystals</span></p></li></ul><p class=\"MsoNormal\"><span>Upon arriving at the location, the party faces one moderate combat encounter and can collect the ingredients without the need for skill checks before returning to perform the ritual.</span></p><h3>The Ritual</h3><p><span>The ritual consists of a series of #DC+2# skill checks. Up to two party members can attempt a check against each obstacle, gaining one victory point on a success, two on a critical success, and losing one on a critical failure. The party can gain victory points once per obstacle.</span></p><ul><li><p>Engrave Lawful writings onto the Chalice (Crafting, Diplomacy, or Society)</p></li><li><p>Crush Sulphur Crystals (Crafting or Athletics)</p></li><li><p>Enchant Onyx Stones (Arcana or Occultism)</p></li><li><p>Place Ritual Candles (Occultism or Religion)</p></li><li><p>Make Ritual Circle (Religion, Occultism, or Primal)</p></li><li><p>Help Devil evoke the locating Ritual (Any Magic Tradition or Society)</p></li></ul><hr /><p class=\"MsoNormal\"><span><em>GMs are encouraged to reward creativity and appropriate use of spells or abilities by allowing players to substitute an appropriate modifier or even to succeed automatically.</em></span></p><hr /><p class=\"MsoNormal\"><span>Ritual rewards depend on the number of accumulated victory points:</span></p><ul><li><p>3 or fewer Victory Points: The Ritual fails, exploding in the face of the party dealing <span><strong>#Hazard 2.16 Simple Damage APL-2#</strong>, inflicting @UUID[Compendium.pf2e.conditionitems.Item.3uh1r86TzbQvosxv]{Doomed 1} on the Player Characters and killing the Devil.</span></p></li><li><p>4 to 6 Victory Points: The Ritual succeeds and the players gain some information to one of several locations that the Vessel of the Maw is located.</p><section class=\"secret revealed\" id=\"secret-dd4qsbjXSGIVzkE1\"><p>This location should be deep in the pit, and should relate to rumours the devil has heard, rather then providing the party specific locations. Feel free to be creative here, examples could include:</p><ul><li><p>The devil scries Yazeri's meeting chambers to see a pulsating Maw vein</p></li><li><p>The ritual locates Maw presence deep inside the pit's depths</p></li><li><p>The ritual determines that the deeper down you go, the more influences and traces of the Maw's presence is detected.</p></li></ul></section></li><li><p>7+ Victory Points: As above, but the Devil is so impressed with the Players that they give them an additional rewards. (See Recommended Loot.)</p></li></ul><h3>Aftermath</h3><p><span>Angels attack the party immediately after the ritual concludes, killing the devil before turning to exterminate the party for “conducting illegal, evil rituals.” They cannot be reasoned with.</span></p><h3>Recommended Locations</h3><p><span>Abandoned Buildings, City Streets, or maps that have elements of \"Demonic Influence\" are appropriate for this expedition.</span></p><h3>Recommended Creatures</h3><p><span>Celestials to represent angel forces, Fiends to represent devil forces, Humanoid enemies.</span></p><h3>Recommended Loot</h3><p><span>At least 50% of the treasure budget must be awarded as gold. If the Players gain 5 or more Victory Points in the Ritual, they receive additional Gold equal to 10% of the total treasure budget, divided equally among the players.</span></p>"
