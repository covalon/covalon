        system:
          description:
            gm: ''
            value: "<p><strong>Trigger</strong> A creature within 30 feet damages Solarius.</p>\n<p><strong>Effect</strong> Solarius focuses his divine ire on a single creature, forcing them to kneel. The triggering creature must make a @Check[type:will|dc:28|basic:false] with the following effects:</p>\n<p><strong>Critical Success</strong>\_The triggering creature is unaffected and is immune to \"Kneel, Interloper!\" for 24 hours.\_</p>\n<p><strong>Success</strong> The triggering creature resists the urge to kneel, but is @UUID[Compendium.pf2e.conditionitems.Item.AJh5ex99aV6VTggg]{Off-Guard} for 1 round.\_</p>\n<p><strong>Failure </strong>The triggering creature kneels in forced deference to Solarius. The creature is @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone}.</p>\n<p><strong>Critical Failure</strong>\_The triggering creature prostrates themselves before Solarius' divine glory. The triggering creature is @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone} and cannot Stand until the end of their next turn.\_</p>"
