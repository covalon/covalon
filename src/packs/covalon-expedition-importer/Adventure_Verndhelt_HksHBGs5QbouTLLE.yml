        sort: 1100000
        system:
          description:
            gm: ''
            value: >-
              <p>You make an appeal to a powerful devil, asking it to bind some
              of its subordinates to your service. If you succeed, the devil
              sends you its choice of one devil whose level is no more than
              double <em>infernal pact's</em> level, two devils whose levels are
              each at least 2 less than double the spell level, or three devils
              whose levels are each at least 3 less than double the spell
              level.</p>

              <hr />

              <p><strong>Critical Success</strong> The devils are sent to you
              and serve you for [[/r 1d4 #weeks]]{1d4 weeks}.</p>

              <p><strong>Success</strong> The devils are sent to you and serve
              you for [[/r 1d4 #days]]{1d4 days}.</p>

              <p><strong>Failure</strong> Your request is denied.</p>

