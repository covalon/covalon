        flags: {}
        system:
          description:
            gm: ''
            value: >-
              <p>The battle against Ashgut and Fjordcarver takes place on a ley
              line, amplifying the magical terrain created by the two dragons.
              The weakness to damage dealt by effects with the water trait
              granted by Marine Fields stacks, incrementing at the end of a
              creature's turn as normal. All stacks are removed if a creature
