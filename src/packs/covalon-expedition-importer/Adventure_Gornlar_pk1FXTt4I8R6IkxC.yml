      - sort: 300000
        name: 'Gornlar Mission C: Explore the Ice Mountain'
        type: text
        _id: HTi65oLYZ9haHFrq
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h2>Gornlar Mission C: Explore the Ice Mountain</h2><h3>Hook</h3><p>The white dragon spotted along the journey to Gornlar looked more powerful than any dragon the Covalonians have ever seen. Historians are doing their best to look for records of legendary dragons that might fit the creature's description, but aren't having any luck finding definitive information. Adventurers are tasked with exploring a nearby icy mountain - likely the home of the white dragon - to see if they can find any clues, as well as any resources that could help the outpost withstand the heat from the opposite dragon. The only way up the mountain is via vertical cliff face, so the adventurers should be prepared for a grueling climb.</p><h3>Required Elements</h3><ol><li>The temperature condition for this mission is extreme cold, dealing\_<strong>#Hazard 2-16 Complex Damage#</strong> to the PCs every 10 minutes. If a PC has an ability that allows them to treat extreme cold as severe cold, they only take that damage every hour instead - this includes winter clothing. As a reminder, if the players spend four hours in the cold without appropriate gear or effects to mitigate the weather, they will become fatigued.</li><li>The first encounter is a mountain climbing skill challenge, budgeted as 120 XP. The players will need to climb a sheer ice shelf in order to get closer to the dragon's lair, which is where the players will have the best luck finding clues about the white dragon. See the Mountain Climb section for more details.</li><li>At any point after the mountain climb, there should be a tiny crevice broken into the side of the mountain, with an unnatural heat emanating through the attached 50-foot long dark tunnel. A medium or small creature can attempt to Squeeze through the tunnel by succeeding at a <strong>#DC#</strong> Acrobatics check, or a tiny creature can walk through it normally, and while in the tunnel, the interval at which that creature takes environmental temperature damage is paused and reset. At the end of the tunnel is a narrow shaft in the mountain that rises 20 feet, and can be climbed by succeeding at a <strong>#DC#\_</strong>Athletics check. Finally, at the top of the shaft lies a small opening in the ceiling covered by loose rocks. A successful\_<strong>#DC +2#</strong> Thievery check allows the creature to carefully remove the rocks from the opening and pull themselves up and outside, but a critical failure causes the shaft to cave in, causing the creature to take\_<strong>#Hazard 2-16 Simple Damage#</strong> and rendering the shaft unable to be further traversed. A creature who manages to successfully pull themselves up and outside the shaft sees a huge glacier surrounded by lava. The lava continually melts the glacier at its edges, but more ice continually expands from the middle of the glacier, creating an endless cycle. Carved into the side of the glacier facing the creature is a name in the Draconic alphabet: \"Fjordcarver.\"</li><li>After the final encounter, the players find a magical chunk of ice that radiates an extremely cold aura - a successful <strong>#DC -2#\_</strong>Arcana or Nature check reveals that this is permafrost - magical ice that never melts - and would prove extremely valuable for countering the heat from the magma dragon.</li></ol><h3>Mountain Climb</h3><p>The mountain climb is a cooperative skill challenge that involves the PCs working together to climb a mountain. Not all of the players will be proficient in Athletics, so cooperation will be vital for the ascent. If any players attempt to begin the adventure without climbing gear or winter clothing, the mission NPC should strongly encourage those players to purchase them from the general store.</p><p>Before the climb begins, the party should form rope teams. Rope teams are composed of any number of climbers and a single belayer - the climbers make Athletics checks to climb, while the belayer uses a Fortitude save to act as a safeguard should any of the climbers begin to fall. More climbers in a rope team can allow a team to climb faster, but if any of the climbers fall, the entire rope team will be at risk of falling!</p><p>Each round of climbing, every climber in a rope team attempts a\_<strong>#DC#</strong> Athletics check to climb. If there are multiple climbers in a rope team, use the worst rolled result for that rope team.</p><p><strong>Critical Success\_</strong>The rope team climbs 300 feet in 10 minutes, plus an additional 50 feet for each climber beyond the first.<br /><strong>Success\_</strong>The rope team climbs 250 feet in 10 minutes, plus an additional 25 feet for each climber beyond the first.<br /><strong>Failure\_</strong>The rope team climbs 125 feet in 10 minutes.<br /><strong>Critical Failure\_</strong>The rope team is in danger of falling! No progress is made, and the belayer must attempt a\_<strong>#DC#</strong> Fortitude save. On a success, the belayer is able to prevent the fall and the rope team can continue climbing as normal, but on a failure, the belayer is unable to prevent the fall and the rope team disbands. Any player in the rope team who has a climbing kit can attempt a DC 5 flat check as normal to arrest their fall: on a success, they stop falling and can continue climbing as normal, but on a failure (or if the player doesn't have a climbing kit), they fall, likely to their death, though items or spells such as snapleaves or feather fall may be able to save their life after falling some distance (determined by the GM). A rope team that has been disbanded due to a fall must be at the same elevation in order to reform a rope team, which may involve a player needing to climb solo to reach separated players.</p><p>The cliff is 3,000 feet tall. Instead of tracking climbing by round, climbing is tracked in sets of 10 minutes. At 1,000 and 2,000 feet up the cliff, there are wide shelves where the players can rest and perform other exploration activities.\_Getting back down the mountain is much easier than climbing up - the players can repel down the mountain using the existing ropes, pullies, and pitons that they set into the mountain while climbing up. This doesn't require any checks, and can be handwaived at the end of the adventure.</p><p>A climber who has a climb speed automatically succeeds at their checks to climb. If players to choose to fly up the cliff, the speed at which they fly will need to be calculated. A player with a fly speed of 40 feet could travel vertically at 20 feet per action (flying speed is halved when flying up), or 60 feet per round, or 600 feet per minute, so they could reach the top of the cliff in 5 minutes. Flying players aren't able to embed the belay system into the cliff as they fly up unless they cut their flying speed in half yet again (so a player with a fly speed of 40 would be flying up at a speed of 10 feet per action, 30 feet per round, and 300 feet per minute). If the belay system isn't embedded during the players' ascent, then climbing down the mountain will need to be played out, and the DCs are increased by +2 due to the increased difficulty when climbing down a mountain compared to climbing up. Other creative solutions may be allowed to assist with the ascent at the GM's discretion, but if the players aren't able to embed the belay system into the cliff, they will not be able to skip the climb down.</p><h3>Recommended Locations</h3><p>Snowy mountains, steppes, cliffs, or hills, frozen caves or caverns. The mountain climb will likely need to take place in the theater of the mind.</p><h3>Recommended Creatures</h3><p>Animals, beasts, elementals, dragons, drakes, giants, cold creatures, trolls, and any creatures that typically live in arctic environments, such as worms, some types of hags, and some types of fey.</p><h3>Recommended Loot</h3><p>The chunk of permafrost should be worth 50% of the total treasure budget (paid as gp at the end of the adventure), with the other 50% coming from treasure and magic items related to ice, earth, metal, mountain survival gear, or arctic environments. If the at least one player learns Fjordcarver's name from reading the Draconic carved into the glacier and see the enless cycle between the lava and the expanding glacier, they earn an Investigation Bonus in the form of raw gp equaling 10% of the total treasure budget.</p>"
