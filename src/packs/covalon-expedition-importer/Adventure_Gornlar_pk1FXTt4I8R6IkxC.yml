      - _id: ViQwKKJ03d4Mnqac
        name: Heart of Fire
        type: action
        img: systems/pf2e/icons/actions/Passive.webp
        effects: []
        folder: null
        sort: 1000000
        flags: {}
        system:
          description:
            gm: ''
            value: >-
              <p>Ashgut's internal flames are too intense for cold to have any
              effect on her. Instead of having a weakness to cold damage like
              other magma dragons, Ashgut is immune to it. Additionally, Flash
              Freeze does not target Ashgut.</p>

              <p>Although she is a magma dragon, Ashgut's wings are too covered
              in molten rock to be useful, and she cannot fly as a result. If
              Ashgut is not touching the ground, swimming in lava, or in contact
