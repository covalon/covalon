      - sort: 400000
        name: Gornlar Finale
        type: text
        _id: 951syDfgG0YnBk7s
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h2>Gornlar Finale: Ashgut and Fjordcarver</h2><h3>Hook</h3><p>In the mountains south of Gornlar, the Covalon adventurers discovered that a pair of legendary dragons had been roused from hibernation by the Cataclysm, partaking in the power of the Maw in order to cause untold destruction to the surrounding lands. Though Ashgut and Fjordcarver were defeated and a Vessel was destroyed, the Maw refuses to take this loss lying down. Another pair of dragons has been spotted heading for the transplanted Seed of Terra sapling - and they look eerily similar to dragons that were recently felled.</p><h3>Battle in the Dichotomous Valley</h3><p>In an attempt to regain lost ground, the Maw has created facsimiles of both Ashgut and Fjordcarver and has sent them barreling towards the transplanted Seed of Terra. Covalon's tacticians have determined that the valley half-covered in frost and half-covered in flame will serve as the best place to intercept them, and once again, both dragons will need to be fought at the same time in order to use their conflicting energies against them.</p><p>The PCs begin in the middle of the map, with Ashgut starting at the west end of the valley and Fjordcarver starting at the east end. Generally speaking, Ashgut and Fjordcarver prefer to utilize their long range rather than move, but they can move if they need to maneuver around conjured objects, effects, or anything that would significantly hinder them. Although Ashgut can climb up the sides of the valley and Fjordcarver can fly high into the air, they generally should not do this as it would create a negative play experience for the players, especially since this encounter is designed to take place on the ground.</p><p>If the GM has not done so yet, they should select one of the three Modifications to apply (found in both Ashgut and Fjordcarver's statblocks), or roll [[/r 1d3]] to determine one randomly. Do not tell the players which Modification is in effect. (For Hard Mode, use all 3 modifications.) Note: The same modification must be chosen for both Ashgut and Fjordcarver; they cannot have different modifications.</p><p>Though not shown on the map, if the PCs need to escape from the encounter, they can do so by running through a tunnel in the southern wall at the middle of the map. This tunnel should not be used for fighting though, as the dragons' special abilities will make quick work of any party foolish enough to entrench themselves there.</p><h3>Tactics Overview</h3><p>Ashgut and Fjordcarver are both immensely powerful on their own, but their signature abilities conflict with each other, giving the PCs an advantage by battling both of the dragons simultaneously. The main gimmick of the encounter is <strong>Flash Freeze\_</strong>and\_<strong>Landwaster</strong>. At the end of her first turn, Ashgut will begin charging Landwaster, firing it off at the beginning of her next turn and dealing immense damage to anyone in contact with the ground or a wall in the arena. But before Ashgut can finish using Landwaster, Fjordcarver will use Flash Freeze, which \"accidentally\" creates icicles that reduce the damage dealt by Landwaster as long as a PC is adjacent to one when Landwaster's damage occurs. (Fjordcarver's\_<strong>Jealousy</strong> ability ensures that he always moves after Ashgut, regardless of initiative results or delays.) The icicles are then destroyed, which prevents the arena from being flooded with obstacles. Without Flash Freeze, Ashgut's Landwaster would deal incredible amounts of damage that would quickly overwhelm the players, while without Landwaster, Fjordcarver's Flash Freeze would eventually fill the entire arena with icicles, preventing players from dodging them and forcing them to be impaled.</p><p>Players may consider using flight to avoid these powerful attacks, but Ashgut's\_<strong>Sulfuric Skies\_</strong>and Fjordcarver's\_<strong>Localized Blizzard\_</strong>make flight a risky prospect. These abilities impose powerful penalties and adverse conditions on flying players, but have no effect against players on the ground or players who are climbing (though climbing does not make a player safe from Flash Freeze or Landwaster).</p><p>Ahsgut and Fjordcarver's presences are so strong that they affect the very terrain around them.\_<strong>Molten Fields\_</strong>and\_<strong>Frozen Fields\_</strong>impose elemental weaknesses on the PCs that allow the dragons to deal more damage, and during the\_<strong>Modification - Ley Line Intersection\_</strong>modification, players may need to swap back and forth between the two fields in order to manage their weakness stacks. If\_<strong>Modification - Clinging Energy\_</strong>is in play, the PCs may also need to routinely swap sides so they can clear their persistent damage and avoid taking bonus damage from their elemental weakness.</p><p>Due to the interaction of Flash Freeze and Landwaster, players are incentivized to try to kill both dragons at the same time. This should generally be the most effective strategy, but\_<strong>Modification - Rapturous Rivalry\_</strong>can throw a wrench in this by giving one of the dragons a significant heal when their rival dies.\_</p><p>Ashgut and Fjordcarver should be content to remain at their opposite ends of the arena, using their ranged <strong>Spit Magma\_</strong>and\_<strong>Spit Ice\_</strong>strikes<strong>, Breath Weapon</strong>, and <strong>Burning Stare\_</strong>or\_<strong>Frosty Gaze\_</strong>to hit PCs that aren't in range of their melee strikes. Though GMs may be tempted to use the Breath Weapons each round, it has lower damage than a normal dragon's Breath Weapon, and it may not put as much pressure on the players as focusing on downing a single PC would.</p><h3>Superdragon Superbowl!</h3><p>The Maw has changed its tactics after the defeat of its Facsimiles! It has created alternate versions of the original Fjordcarver and Ashgut with modified abilities. The new pairings should be run in the following pairs:</p><table style=\"width:45.4015%\" border=\"1\"><tbody><tr><td style=\"width:51.3605%\"><strong>Ashgut</strong></td><td style=\"width:48.6395%\"><strong>Fjordcarver</strong></td></tr><tr><td style=\"width:51.3605%\">Blue Ashgut</td><td style=\"width:48.6395%\">Crystal Fjordcarver</td></tr><tr><td style=\"width:51.3605%\">Umbral Ashgut</td><td style=\"width:48.6395%\">Sovereign Fjordcarver</td></tr><tr><td style=\"width:51.3605%\">Brine Ashgut</td><td style=\"width:48.6395%\">Sea Fjordcarver</td></tr></tbody></table><h3>Loot</h3><p>The entirety of the treasure budget is given out in raw GP, paid by the NPC used for the hook. Additionally, players unlock the ability to customize their Soul Seed, gaining access to the Dragon aspect.</p>"
          markdown: ''
