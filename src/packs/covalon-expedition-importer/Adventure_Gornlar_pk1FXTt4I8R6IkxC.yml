        system:
          description:
            gm: ''
            value: "<p><strong>Trigger\_</strong>Fjordcarver's turn ends and Crystallize was not triggered last round. If Ashgut is alive, Ashgut must have triggered Landshocker on her turn.</p><hr /><p>With a mighty roar, Fjordcarver wills crystal spears to rise from the ground and pierce his foes. All creature in the arena in contact with the ground or a wall take @Damage[6d8[piercing]] damage with a @Check[type:reflex|dc:36|basic:true] save as crystal stalagmites manifest in their squares. Each creature who makes a save can Step as a free action, unless they critically fail, in which case they are instead immobilized as they are impaled by the stalagmite. If there is no room for them to Step, the creature automatically critically fails their save.</p><p>The stalagmites are medium sized, have 27 AC, 40 hit points, 0 hardness, and are immune to critical hits and precision damage. They are immune to all of Ashgut and Fjordcarver's abilities, except for Landshocker, which turns them into crystalline dust, destroying them instantly.</p>"
          rules: []
