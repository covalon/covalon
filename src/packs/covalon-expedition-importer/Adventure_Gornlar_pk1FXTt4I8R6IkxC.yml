              her into acidic sludge. Ashgut is immune to effects with the water
              trait. Additionally, Oceanic Spikes does not target Ashgut.</p>

              <p>Although she is a brine dragon, Ashgut's wings are too damaged
              to be useful, and she cannot fly as a result. If Ashgut is not
              touching the ground, swimming, or in contact with a solid surface
              that is touching the ground (such as a wall while climbing), she
              is off-guard.</p>
