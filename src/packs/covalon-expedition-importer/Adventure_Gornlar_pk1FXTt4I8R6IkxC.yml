        system:
          description:
            gm: ''
            value: "<p><strong>Trigger\_</strong>Fjordcarver's turn ends and Saline Spikes was not triggered last round. If Ashgut is alive, Ashgut must have triggered Seawaster on her turn.</p><hr /><p>With a mighty roar, Fjordcarver wills spears of crystalized seawater to rise from the earth and pierce his foes. All creatures in the arena in contact with the ground or a wall take @Damage[5d8[piercing]] damage with a @Check[type:reflex|dc:28|basic:true] save as salty stalagmites manifest in their squares. Each creature who makes a save can Step as a free action, unless they critically fail, in which case they are instead immobilized as they are impaled by the stalagmite. If there is no room for them to Step, the creature automatically critically fails their save.</p><p>The stalagmites are medium sized, have 27 AC, 40 hit points, 0 hardness, and are immune to critical hits and precision damage. They are immune to all of Ashgut and Fjordcarver's abilities, except for Seawaster, which melts them into sludge, destroying them instantly.</p>"
