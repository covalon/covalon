      - sort: 200000
        name: 'Gornlar Mission B: Explore the Fire Mountain'
        type: text
        _id: vglwZ01cVEiFzZee
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3>Hook</h3><p>The magma dragon spotted along the journey to Gornlar looked more powerful than any dragon the Covalonians have ever seen. Historians are doing their best to look for records of legendary dragons that might fit the creature's description, but aren't having any luck finding definitive information. Adventurers are tasked with exploring a nearby fiery mountain - likely the home of the magma dragon - to see if they can find any clues, as well as any resources that could help the outpost withstand the cold from the opposite dragon. This is a reconnaissance mission - if the adventurers encounter the magma dragon, they are advised to run away instead of engaging.</p><h3>Required Elements</h3><ol><li>The temperature condition for this mission is extreme heat, dealing <strong>#Hazard 2-16 Complex Damage#</strong> to the PCs every 10 minutes. If a PC has an ability that allows them to extreme heat as severe heat, they only take that damage every hour instead.</li><li>The final encounter should be a chase sequence, budgeted as 120 XP. The players will unknowingly approach Ashgut's nest, and find a sizeable stone on an ornate dias that glows red and gleams when light hits it - a successful <strong>#DC -2#\_</strong>Arcana or Nature check to Recall Knowledge reveals that this is a magma dragon egg, equally as dangerous as it is valuable, radiating a constant heat that could help in counter the cold from the white dragon (though the examination also reveals that the egg is non-viable). If the players decide to take it, Ashgut erupts into the area shortly after, beginning the chase sequence. See the Chase Sequence section for more details.</li><li style=\"padding-left:var(--space-s)\">At any point before the chase sequence, there should be an illusory wall somewhere in the adventure which can be disbelieved by a character that interacts with it and succeeds at a\_<strong>#DC +2#\_</strong>Will save (a character taking the Search exploration activity is considered to be interacting with it). Beyond the illusory wall lies a chamber covered by a 4th-level\_<em style=\"margin-top:var(--p-space,1em)\">darkness</em> spell. If the PCs enter the chamber, they are hailed by an old man who introduces himself as a displaced Caligni (N male caligni wizard). The caligni's attitude towards the PCs starts off as neutral, be he welcomes them into his home and offers them water, encouraging them to rest and take a break from the heat in his cool-temperature home, which pauses and resets the temperature damage interval (the PCs likely won't have greater darkvision, but can feel around for furniture to sit on). The Caligni is hesitant to talk about certain topics, but the PCs can obtain information about the magma dragon from him if they make a successful <strong style=\"margin-top:var(--p-space,1em)\">#DC +2#\_</strong>Diplomacy check to Request or Intimidation check to Coerce. (Players can also make\_<strong style=\"margin-top:var(--p-space,1em)\">#DC#</strong> Diplomacy checks to Make an Impression on him and improve his attitude towards them, which adjusts the Request/Coerce DCs as normal.) On a success, the Caligni tells them that the magma dragon is a legendary creature who has lived for hundreds of years and goes by the name of Ashgut. In the past, she had a violent rivalry with a white dragon that ended up with the two of them being too wounded to continue fighting, and has since been living quietly in the volcano - until recently when she suddenly became violent and active again, scattering the Caligni's tribe to different corners of the mountain. On a critical success, he remembers that the injury Ashgut sustained was to her wings, and she can no longer fly as a result. If the players use a light spell to counteract the 4th-level <em style=\"margin-top:var(--p-space,1em)\">darkness</em> inside the Caligni's home, or if they use <em style=\"margin-top:var(--p-space,1em)\">dispel magic</em> or some other type of ability to remove the darkness, the Caligni's attitude immediately turns hostile, and he demands the players leave him immediately. If he is attacked, he will defend himself, using the stats for a @Compendium[pf2e.pathfinder-bestiary-3.zdJgaVe6VRSfEE1n]{Caligni Caller}.</li></ol><h3>Chase Sequence</h3><p>When the chase sequence begins, all players roll Perception for initiative - this determines how quickly they react to the event and the order in which they'll be attempting to escape from Ashgut, who is placed at the end of initiative.\_On each of Ashgut's turns, she rains down molten fury on the players with her powerful breath weapon, dealing\_<strong>#Hazard 2-16 Complex Damage#</strong> damage with a <strong>#Hazard 2-16 HDC#\_</strong>basic Reflex save. Half the damage is fire, and half is bludgeoning.</p><p>The players must overcome a series of Obstacles in order to escape from Ashgut. On their turn, a player can attempt a check to Overcome the current Obstacle and earn Chase Points for their party.</p><p><strong>Critical Success\_</strong>The party gains 2 Chase Points.<br /><strong>Success</strong> The party gains 1 Chase Point.<br /><strong>Critical Failure </strong>The party loses 1 Chase Point.</p><p>Alternatively, instead of making a check to Overcome the Obstacle, a player can gain three actions as normal that they can use to support their fellow party members. A player might even have a spell or ability that allows them to succeed at Overcoming the Obstacle without even needing to make a check, at the GM's discretion. Players cannot Delay during the chase, nor can they attack Ashgut; the heat of her flames are much too intense to allow anyone to get close, even with protective magic.</p><p>Once enough Chase Points have been achieved to clear an Obstacle, the entire party moves onto the next Obstacle. Chase Points do not carry over between Obstacles. Use\_<strong>#DC#\_</strong>for the DC of all checks to overcome obstacles. Each Obstacle requires a number of Chase Points to clear based on the size of the party; if there are less than 6 players in the party, reduce the amount of required Chase Points to equal the party size.</p><hr /><h5>Gravel Slope</h5><p><strong>Chase Points\_</strong>6;\_<strong>Overcome\_</strong>Acrobatics or Performance to balance while sliding down the slope, Survival to find the safest path down, ride a shield like a sled to get to safety (no check, requires wooden, steel, or tower shield that is not broken, reduces the shield's HP to its broken threshold)</p><p>The players must slide down a treacherous gravel slope in order to escape Ashgut's nest.</p><hr /><h5>Magma Crossing</h5><p><strong>Chase Points\_</strong>6;\_<strong>Overcome\_</strong>Athletics to jump across the magma flows, Survival or Nature to identify the safest places to cross, spells or abilities with the cold or water trait to cool sections of magma for easier crossing (no check, cantrips won't work more than once)</p><p>A series of magma flows impede the players' progress as they continue to run from Ashgut.</p><hr /><h5><strong>Tight Tunnels</strong></h5><p><strong>Chase Points\_</strong>6;\_<strong>Overcome\_</strong>Acrobatics to squeeze into tunnel sections too big for Ashgut, Deception to throw your voice and mislead Ashgut, Crafting to use junk as barricades to harry Ashgut's chase, spells or magic items with the illusion trait to trick Ashgut (no check, cantrips won't work more than once)</p><p>The players descend into narrow tunnels as Ashgut scrambles to reach them.</p><hr /><h5>Dark Labyrinth</h5><p><strong>Chase Points\_</strong>6;\_<strong>Overcome\_</strong>Survival to navigate towards the exit, Thievery to search for hidden shortcuts, Occultism to ask local spirits for directions, spells, abilities, or items that create light and see the way (no check, the whole party can only gain a Chase Point from this once), use a compass to navigate (no check, the whole party can only gain a Chase Point from this once)</p><p>Having accidentally stumbled into a dark labyrinth of caverns, the players must find a way out while Ashgut is still hot on their heels.</p><hr /><h5>Nauseating Sulfur</h5><p><strong>Chase Points\_</strong>6;\_<strong>Overcome\_</strong>Fortitude to overcome the smell, Crafting to assemble makeshift noseplugs, Athletics to run faster through the area, spells, abilities, or items that can dampen or nullify smells (no check, cantrips won't work more than once)</p><p>The sickening smell of sulfur nauseates the players as they continue to run from Ashgut.</p><hr /><h5>Leap of Faith</h5><p><strong>Chase Points </strong>Special;\_<strong>Overcome\_</strong>Special</p><p>The players come to the end of the cavern, which is significantly cooler than the rest of the cave network. A river runs through the cave, ending in a waterfall that empties into an outside lake below. With no other way to go, the players must jump into the lake. Instead of requiring Chase Points, each player must dive into the water, taking <span style=\"font-family:var(--journal-serif)\"><strong style=\"font-family:var(--journal-serif);font-size:var(--font-size-14)\">#Hazard 2-16 Complex Damage#\_</strong></span>with a\_<strong>#DC#</strong> basic Reflex save to minimize the damage they take from impact with the surface of the lake. Ashgut will remain at the top of the cliff, roaring in frustration, then leave the way she came.</p><p>The Chase Sequence is the final encounter of the adventure. After completing the Chase Sequence, the GM should return the players to the outpost and conclude the adventure.</p><h3>Recommended Locations</h3><p>Caves, caverns, volcanic mountains, wastelands, plains, or\_ caverns. The Caligni's dwelling and the chase sequence can take place in the theater of the mind if necessary.</p><h3>Recommended Creatures</h3><p>Animals, beasts, elementals, dragons, drakes, giants, fire creatures, oozes, and any creatures that typically live in volcanic environments, such as reptiles, kobolds, and some types of fey.</p><h3>Recommended Loot</h3><p>The magma dragon egg should be worth 50% of the total treasure budget (paid as gp at the end of the adventure), with the other 50% coming from treasure and magic items related to fire, earth, metal, mountain survival gear, or volcanic environments. If the players learn Ashgut's name from the Caligni, they earn an Investigation Bonus in the form of raw gp equaling 10% of the total treasure budget.</p>"
