      - sort: 100000
        name: 'Gornlar Mission A: Secure The Caves'
        type: text
        _id: PVWJkM1WRLF8Zn2x
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3>Hook</h3><p>The cliff face that the drill bored into revealed an entry way into an extensive cave system. These caves can be used to allow adventurers to move throughout the mountains undetected by the dragons, but they'll need to be secured from any creatures coming the other way in order to keep base camp hidden and safe. Adventurers are tasked with guarding one of the many cave checkpoints from aggressive creatures. If the checkpoint becomes too dangerous to guard, the adventurers are instructed to cause a cave-in before escaping.</p><h3>Required Elements</h3><ol><li>This adventure takes place on a single battlemap and features several waves of enemies - three moderate encounters of creatures with a 10 minute break in between each, followed by a fourth, infinite encounter.</li><li>Players must protect a gate from the aggressive creatures during the encounter. The gate has\_<strong>#Creature 2-7 Low Maximum#\_</strong>hit points. Strikes against it automatically succeed and it automatically fails its saving throw against damaging effects. It is immune to critical hits and has object immunities. It can be repaired by using the Repair exploration activity with a DC of\_<strong>#DC#</strong>. If the gate is destroyed, the players should be informed that the cave is no longer viable for holding and they should prepare to Cause a Cave-In and escape, and the current encounter becomes infinite.</li><li>\_During encounters, all players gain access to the Cause a Cave-In activity. By standing adjacent to a cave wall and spending one action, a player can attempt a <strong>#DC +2#\_</strong>Athletics or Survival check to reduce the structural integrity of the cave; on a success, they earn 1 Cave-In Point, or 2 on a critical success, with no points awarded for a failure or critical failure. Once 3 Cave-In Points have been obtained, the Cave-In begins, and players have two rounds to secure themselves behind the gate (or where the gate was located if it is now destroyed). Once all players have positioned themselves behind the gate, or once two rounds have passed, the cave collapses, dealing <strong>#Hazard 2-16 Simple Damage#\_</strong>to all creatures not behind the gate with a basic\_<strong>#Hazard 2-16 EDC#\_</strong>Reflex save (the gate does not take damage from the cave-in). Creatures that fail or critically fail their Reflex save are also buried beneath rubble, and begin suffocating. Rubble is impassible, but a 5-foot section of the rubble can be cleared by using two actions and succeeding at a <strong>#DC +2#\_</strong>Athletics or Survival check.</li><li>An \"infinite\" encounter starts off like a moderate encounter, but once a creature is defeated, that creature is replaced by another creature. When an infinite encounter begins, the GM should warn the players that they can hear many more creatures coming down the cave. After the first creature is defeated and replaced, the GM should warn the players that the sounds of many more creatures coming down the cave is growing louder. After the second creature is defeated and replaced (and for all subsequent creatures defeated), the GM should warn the players that there seems to be no end to the approaching creatures.</li></ol><h3>Recommended Locations</h3><p>Cave, cavern, mountain valley, mountain pass. Exterior locations should flavor the cave-in as an avalanche instead.</p><h3>Recommended Creatures</h3><p>Animals, beasts, fungi, elementals, drakes, giants, and any creatures that typically live in subterranean environments, such as xulgath, caligni, and drow. Any sapient creatures should be either uncooperatively territorial or mad with bloodlust.</p><h3>Recommended Loot</h3><p>The entirety of the treasure budget should be given out in raw GP, depending on how many encounters the players clear before they escape and whether or not they escape by causing a cave-in.</p><table style=\"width:93.9759%\" border=\"1\"><tbody><tr><td style=\"width:49.8218%\">Clearing an encounter</td><td style=\"width:50.1782%\">25% of total treasure budget per encounter cleared</td></tr><tr><td style=\"width:49.8218%\">Escaping by causing a cave-in</td><td style=\"width:50.1782%\"><p>25% of total treasure budget</p></td></tr><tr><td style=\"width:49.8218%\">The gate is still intact after causing a cave-in</td><td style=\"width:50.1782%\"><p>10% of total treasure budget, and a flock of dead bird falls onto the safe side of the gate from the cave-in, though they don't appear to have any injuries. A <strong>#DC#</strong> Medicine check reveals that these birds died from both smoke suffocation and freezing to death simultaneously.</p></td></tr></tbody></table><p>For example, if the players clear all three encounters (the fourth cannot be cleared because it is infinite), escape by causing a cave-in, and the gate is still intact, the players earn 110% of the total treasure budget. If the players clear three encounters but do not cause a cave-in before escaping, they will only earn 75% of the total treasure budget (regardless of whether or not the gate is still intact).</p>"
