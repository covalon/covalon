          description:
            gm: ''
            value: "<p>Fjordcarver's condescending eyes cause a foe to feel the relentless battering of angry seas. The target takes <span style=\"font-family:var(--font-primary)\">@Damage[2d8[bludgeoning]] damage with a\_(@Check[type:will|dc:28|basic:false] save). Regardless of their save, the target is immune to Whirlpool Gaze for 1 round.</span></p><p><span style=\"font-family:var(--font-primary)\"><strong>Critical Success</strong> The target is unaffected.</span></p><p><span style=\"font-family:var(--font-primary)\"><strong>Success</strong> The target takes half damage and has their Speeds halved for 1 round.</span></p><p><span style=\"font-family:var(--font-primary)\"><strong>Failure</strong> The target takes full damage, has their Speeds halved for 1 round, and is slowed 1 for 1 round.</span></p><p><span style=\"font-family:var(--font-primary)\"><strong>Critical Failure</strong> The target takes double damage, has their Speeds halved for 1 round, and is stunned 1.</span></p>"
