        effects: []
        folder: null
        sort: 0
        flags: {}
        system:
          description:
            gm: ''
            value: "<p>Fjordcarver's connection with pure seawater is so powerful, it purifies acid that comes close. Fjorcarver is immune to acid damage.\_</p>\n<p>Fjordcarver's legs are weak and brittle, but he is an adept flier. While Fjordcarver is not immobilized, he hovers slightly above the ground, and he does need to spend an action to Fly each turn in order to maintain this slight hover. Fjordcarver prefers to be flying at all times, and is off-guard while he is touching the ground. When Fjordcarver uses the Stand action, he can also return to his slight hovering state as part of that action.</p>"
