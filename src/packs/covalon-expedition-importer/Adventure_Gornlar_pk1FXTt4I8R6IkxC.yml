              effect on him. Instead of having a weakness to fire damage like
              other white dragons, Fjordcarver is immune to it.</p>

              <p>Fjordcarver's legs are weak and brittle, but his wings are
              strong and powerful. While Fjordcarver is not immobilized, he
              hovers slightly above the ground, and he does need to spend an
              action to Fly each turn in order to maintain this slight hover.
              Fjordcarver prefers to be flying at all times, and is off-guard
              while he is touching the ground. When Fjordcarver uses the Stand
              action, he can also return to his slight hovering state as part of
              that action.</p>
