name: Gornlar
img: modules/covalon/images/Gornlar%20Outpost.webp
caption: ''
sort: 0
description: >-
  <div class="block template"><div class="block "><h3
  id="gornlar">Gornlar</h3></div><div class="block taglist"><section
  class="traits"><p><span class="inline-block
  tag">Civilization</span></p></section></div><p>Freeholds united by
  ambition.</p><div class="block indented"><p><strong>Government</strong> The
  Wolves of the Holds (stratocracy)</p><p><strong>Population</strong> humans,
  dwarves, half-orcs, hobgoblins</p><p><strong>Religions</strong>
  Gunvald</p><p><strong>Primary Exports</strong> weapons, armor, ore, tools,
  lumber, ships</p><p><strong>Geography</strong> mountain ridges and rocky
  flatlands</p><p><strong>Fate</strong> razed by dragons</p></div><hr
  /><p>Gornlar began as a collection of hunters and mercenaries constructing
  hunting outposts in fertile hunting grounds. After finding many plentiful
  mountainsides lined with mines, they began unifying together as a single
  entity. Their weapons, armor, and military might was widely considered
  threatening, but too chaotic to truly be feared. Multiple warlords from each
  outpost bickered and even fought amongst themselves over territory within the
  collective. As the freeholds began to grow, they began to overthrow smaller
  nations. Eventually, they established themselves as an official freehold. As
  the end of days came, mighty dragons descended from the mountains and brought
  ruin to the freeholds.</p></div>
