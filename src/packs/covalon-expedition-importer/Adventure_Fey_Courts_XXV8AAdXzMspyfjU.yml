      - img: icons/magic/light/projectile-needles-salvo-white.webp
        name: Needle Darts
        system:
          description:
            gm: ''
            value: >-
              <p>You shape three needles out of a piece of metal in your
              possession and send them flying in a tight group toward one
              target. Make a spell attack roll against your target's AC. The
              needles deal 3d4 piercing damage and might cause bleeding.</p>

              <p>The needles impart any special properties of the metal that
              forms them; for instance, cold iron needles deal additional damage
              to creatures with weakness to cold iron. All the needles are made
              of the same metal, and the metal returns to you after the
              attack.</p>

              <hr />

              <p><strong>Critical Success</strong> The target takes double
              damage and [[/r (@item.level)[bleed]]] damage.</p>

              <p><strong>Success</strong> The target takes full damage.</p>

              <hr />

              <p><strong>Heightened (+1)</strong> You send one additional
              needle, increasing the regular damage by 1d4 and increasing the
              persistent bleed damage on a critical hit by 1.</p>
