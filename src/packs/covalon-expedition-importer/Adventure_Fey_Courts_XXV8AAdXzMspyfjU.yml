        name: Noxious Metals
        system:
          description:
            gm: ''
            value: >-
              <p>This spell forces toxic metal to coalesce on the skin or
              surface of all living creatures in the area, dealing
              @Damage[4d6[poison]] damage with a basic Fortitude save. Any
              creature that has the plant trait, has the wood trait, or has an
              anathema toward metal, takes the following effects depending on
              the result of that Fortitude save.</p>

              <hr />

