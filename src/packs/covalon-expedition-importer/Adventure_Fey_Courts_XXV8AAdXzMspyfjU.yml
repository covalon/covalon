      - img: systems/pf2e/icons/spells/field-of-razors.webp
        name: Field of Razors
        system:
          description:
            gm: ''
            value: >-
              <p>You grind a chunk of your choice of metal to fine dust between
              your hands and blow it into the air, where it grows into a tangle
              of wires covered in razor-sharp prongs. The metal must be of a
              type you currently have in your possession. The covered area is
              difficult terrain. A creature that moves through the area takes
              @Damage[5[slashing]] damage per square traversed.</p>

              <p>If a creature takes slashing, piercing, or persistent bleed
              damage while inside the thicket, you can spend a reaction to grow
              the iron in the shed blood into additional wires, expanding the
              burst by 5 feet. You can grow the area four times in this way, to
              a maximum of a @Template[type:burst|distance:40].</p>

              <p>The barbed wires are made of the metal you chose and activate
              resistances, weaknesses, and the like normally. The metal reforms
              in your possession when the spell ends.</p>

              <hr />

              <p><strong>Heightened (+1)</strong> The damage per square
              increases by 2.</p>
