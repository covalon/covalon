      - img: systems/pf2e/icons/actions/OneAction.webp
        name: Demoralize
        system:
          description:
            gm: ''
            value: >-
              <p>With a sudden shout, a well-timed taunt, or a cutting put-down,
              you can shake an enemy's resolve. Choose a creature within 30 feet
              of you who you're aware of. Attempt an <span
              data-pf2-action="demoralize"
              data-pf2-glyph="A">Intimidation</span> check against that target's
              Will DC. If the target doesn't understand the language you are
              speaking, or you're not speaking a language, you take a –4
              circumstance penalty to the check. Regardless of your result, the
              target is temporarily immune to your attempts to Demoralize it for
              10 minutes.</p>

              <hr />

              <p><strong>Critical Success</strong> The target becomes
              @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
              2}.</p>

