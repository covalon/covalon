      - type: action
        name: Magnetic Personality (On turn start)
        system:
          description:
            gm: ''
            value: >-
              <p><strong>Trigger</strong> Lethallica's turn begins.</p><hr
              /><p>Lethallica focuses their magnetism on one creature they can
              sense within 60 feet. The target must attempt a
              @Check[will|dc:35].</p><p><strong>Success </strong>The creature is
              unaffected.</p><p><strong>Failure </strong>The creature
              immediately uses a single action (Stride, Fly, Activating an item,
              etc.) to move as far as possible either toward or away from
              Lethallica (Lethallica chooses), avoiding obvious dangers as it
              does so. This movement doesn't trigger
              reactions.</p><p><strong>Critical Failure </strong>As failure, but
              the creature doesn’t avoid obvious dangers (such as Skymetal
              pools).</p>
