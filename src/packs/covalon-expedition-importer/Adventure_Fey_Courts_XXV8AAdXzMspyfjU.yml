      - img: systems/pf2e/icons/spells/elemental-counter.webp
        name: Elemental Counter
        system:
          description:
            gm: ''
            value: >-
              <p><strong>Trigger</strong> You or a creature within 60 feet rolls
              a saving throw against a spell with the earth, fire, metal, plant,
              water, or wood trait, or are targeted by a spell attack with such
              a trait.</p>

              <p><strong>Requirements</strong> You have a spell slot from which
              you could Cast a Spell of the triggering spell's countering
              element; see text.</p>

              <hr />

              <p>Each element in the elemental cycle counters another, and you
              can use your elemental spells to protect against elements they
              counter. You lose your spell slot as if you had cast the
              triggering spell. You then attempt to counteract the triggering
              spell, using the rank of the spell you lost for the counteract
              rank. You can lose a plant or wood spell to counter earth, an
              earth spell to counter water, a water spell to counter fire, a
              fire spell to counter metal, or a metal spell to counter plant or
              wood.</p>
