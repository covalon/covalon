        hardness: 22
        stealth:
          value: 31
          details: >-
            <p>For APL 10, set the AC to 26 and reduce the saves by 2.</p><p>For
            APL 12, set the AC to 29, increase the saves by 1, and increase the
            Hardness <em>to</em> 21.</p><p>Make sure to use the dropdown above
            to adjust the rest of the sheet.</p>
        emitsSound: encounter
        resistances: []
      details:
        isComplex: true
        level:
          value: 14
        disable: >-
          <p>Arcana, Crafting, Nature, Thievery or <em>dispel magic</em>. A
          total of two successes are required to disable it. <br>A thieves's
          toolkit is required for Thievery, and either a thieves's toolkit or a
          repair toolkit is required for
          Crafting.<br>@Check[arcana|dc:27|traits:action:disable-a-device]
          @Check[nature|dc:27|traits:action:disable-a-device]
          @Check[thievery|dc:28|traits:action:disable-a-device]
          @Check[crafting|dc:29|traits:action:disable-a-device]</p><p>The
          counteract DC for <em>dispel magic </em>is <strong>#DC#</strong> and
          the Pool's counteract rank is <strong>APL/2 rounded up</strong>. A
          successful counteract counts as one successful disable, unless the
          counteract check was a critical success in which case it fully
          disables the Pool.</p>
        description: >-
          <p>A pool is filled with liquid <strong>inubrix </strong>and<strong>
          orichalcum</strong> agitated by the Maw's influence, with a control
          panel next to it. It doesn't hinder movement.</p><p>This pool is
          <strong>not</strong> automatically destroyed by effects such as
          <em>@UUID[Compendium.pf2e.spells-srd.r7ihOgKv19eJQnik]{Disintegrate}</em>
          and is instead affected as if it was a creature.</p><hr /><p>While
          adjacent to this pool, players gain the
          @UUID[Compendium.covalon.fey-courts-items.Item.tBc6dWmVXcJUjX8p]{Sky
          Coating} action, even if it's disabled or destroyed.</p><hr /><p>A
          creature other than Lethallica that enters the pool becomes
          @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 1} for 1
          round.</p><p>Once fully disabled or destroyed this pool can be
          traversed safely, and it can't be used for Lethallica's
          Metalligrasp.</p>
        reset: ''
        routine: >-
          <p>(1 action) The pool causes Lethallica to become
          @UUID[Compendium.pf2e.conditionitems.nlCjDvLMf2EkV2dl]{Quickened} for
          1 round; they can use the extra action for any action.</p><p>Other
          creatures in a @Template[type:burst|distance:5] within 120 feet must
          attempt a @Check[fortitude|dc:30|traits:metal,magical]. This is a
          magical and metal effect.</p><p><strong>Critical Success</strong> The
          creature is unaffected.</p><p><strong>Success</strong> The creature is
          @UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy 1} for 1
          round.</p><p><strong>Failure</strong> The creature is Clumsy 1 and
          @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 1} for 1
          round.</p><p><strong>Critical Failure</strong> The creature is
          @UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy 2} and
          @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 2} for 1
          round, and Clumsy 1 for 1 minute.</p>
