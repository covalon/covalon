      - sort: 450000
        name: Fey Courts Finale
        type: text
        _id: XvFyJXgwZNSeDQmx
        system: {}
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h2>The Sky Liege Lethallica &amp; the four Skymetal Pools</h2><h3>Hook</h3><p><em>Thanks to intel from fey survivors and reports from our scouts who managed to slip through the magnetic field, Covalon adventurers have managed to identify the location of the Vessel of the Maw in the Throne Room of the Fey Courts Castle.</em></p><h3>Nobody cared who I was 'til I put on the Masks</h3><p>The Maw, hidden behind Lethallica's throne, empowers and assists them in their invasion of the Material Plane. This cannot be allowed to continue!</p><p>The PCs begin anywhere within the south corridor right before the room expands, as Lethallica looks down upon them from their throne. If you haven't already done so, choose and set up which mask Lethallica begins the encounter with in their sheet, place six Hung Masks on the pedestals behind them, and make sure to set each of those masks to the remaining six metals in their respective sheets. You should also select which modification will be active and apply it now. For Hard Mode, use all three modifications. The modifications are Ubiquitous Grasp, Bursting Masks, and Orbing Time (see the Fey Courts Actors folder for this last modification).</p><p>Roll initiative for Lethallica and each of the four Pools separately. Each time Lethallica would be reduced to 0 HP, they stay at 1 HP unless their <strong>Super Regeneration</strong> has been deactivated; if it was deactivated and they have at least one Hung Mask remaining, their <strong>Beneath the Seven Masks</strong> ability activates. When it does, remember to change Lethallica's worn mask and to remove the corresponding Hung Mask from the map.</p><p><em>The PCs are covered in an oil that lets them move through the magnetic field unimpeded and undetected, but because of the numerous and everchanging patrols of the metal army, they don't know exactly when will they be able to infiltrate all the way to the throne room</em>. <span style=\"font-family:Signika, sans-serif\">They are unable to use items or abilities that grant short-term beneficial effects, though they can use anything that has a duration of at least 8 hours.</span></p><p><span style=\"font-family:Signika, sans-serif\">If the players need to escape from the encounter, they can do so by running out through the southern entrance.\_</span></p><p>The height of the room is 35 ft.</p><p>This encounter is balanced for the middle APL of a tier. If the party is above or below this APL by a full level, apply the Elite or Weak template to Lethallica, and apply to the four pools and the hung mask the changes listed in their respective sheets before dragging them onto the map.</p><h3>Handling Recall Knowledge</h3><p>The Recall Knowledge (RK) action is crucial in order for the encounter to go smoothly for the PCs. If a PC RKs about a Skymetal Pool, you can share info about all four pools unless they're asking about the specific effects of the pool.</p><p>In addition to the info they'd gain, if they succeed let them know that they can coat their weapons/unarmed attacks/spells/impulses while adjacent to a pool and add the @UUID[Compendium.covalon.fey-courts-items.tBc6dWmVXcJUjX8p]{Sky Coating} action to their sheets. Even on a failed RK check, any PC at least expert in Arcana, Crafting or Nature can recognize what metal(s) is in each pool, as well as what metal each Hung Mask is made of (or vice versa if they RK'd about the Hung Masks). The RK DC for Skymetal Pools and Hung Masks is <span style=\"font-family:Signika, sans-serif\"><strong>#DC#</strong>, and the skills used are Arcana, Crafting, Nature or a relevant Lore.</span></p><p>Players don't need to RK to know that they can pass through the pools, and that doing so would be hazardous.</p><p>As for Lethallica, if they ask you about resistances, weaknesses or immunities on a successful RK, tell them about Super Regeneration instead the first time. Super Regeneration, Beneath the Seven Masks, Metalligrasp and Masked Reaction are their most noteworthy abilities, in that order.</p><h3>Tactics Overview</h3><p>Lethallica is filled with hubris and likes to taunt the players, crushing the party with their full power from the get-go. Their self confidence only breaks down when they have to use their <strong>Rust Form</strong>.</p><p>Lethallica attempts to put players into active Skymetal Pools as often as possible in order to weaken them, whether that is through their <strong>Improved Push</strong> after a Sky Cane strike, <strong>Rock You!</strong> after a Grapple, or <strong>Magnetic Personality</strong> at the start of each of their turns.</p><p>Lethallica uses their <strong>Dazzling Smile</strong> early on in order to reduce the party's accuracy. Remember that on their turn, their reach increases massively thanks to their <strong>Metalligrasp</strong>! If they decide to focus a player during their turn, they might <strong>Demoralize</strong> before attacking.</p><p>If they're immobilized or separated from the rest of the encounter, Lethallica has the option of using <strong>Metallic Ride</strong> to get back into the fray (or escape their restraints), although <strong>Metalligrasp</strong> can also work as long as they can see their target (or sense it via Metalsense).</p><p>The Skymetal Pools are agitated by the Maw and act in Lethallica's best interest, at your discretion. For the Adamantine Pool, this might be blocking ranged characters harassing Lethallica, or protecting Hung Masks under attack.</p><p><em>Once Lethallica is fully defeated, all remaining pools go dormant.</em></p><h3>Final checklist</h3><ul><li><p>If the APL is above or below the middle APL of the tier by a full level, apply corresponding adjustments to Lethallica, the Pools and the Hung Mask sheets.</p></li><li><p>Lethallica cannot become Dying before they reach their rust form. Either they'll be at 1 HP thanks to Super Regeneration, or they'll be immediately healed and quickened when their worn mask breaks.</p></li><li><p>When their last worn mask is destroyed, Lethallica enters their rust form, being fully healed, removing all negative conditions, gaining 100 temporary HP and unleashing their <strong>Corrosion of the Metal Plane</strong> ability.</p></li><li><p>Pools and Hung Masks are treated as creatures for <em>disintegrate</em> and similar effects. Hung Masks in particular don't use one degree worse for their save even on a critical hit from those effects. Resistances and hardness still apply.</p></li><li><p>Once metals in the Pools/Masks have been identified, remember to reveal their name with the checkbox in their respective sheets for a smoother player-experience. Also remember to make the Sky Coating action available to your players once they find out about it. Players can still use Sky Coating even if a pool is disabled or destroyed.</p></li><li><p>If you use the Bursting Masks modification, go into its Details tab and turn on \"Death Note\" in order not to forget it.</p></li></ul><h3>Loot</h3><p>The entirety of the treasure budget is given out in raw GP, paid by the NPC used for the hook. Additionally, players unlock the ability to customize their Soul Seed, gaining access to the Metal aspect.</p>"
