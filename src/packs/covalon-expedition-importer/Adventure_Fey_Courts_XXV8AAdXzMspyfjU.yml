            value: >-
              <p>Lethallica says <em>cheese</em>! Creatures in a
              @Template[type:cone|distance:45] must attempt a
              @Check[fortitude|dc:33].</p><p><strong>Critical Success</strong>
              The creature is unaffected.</p><p><strong>Success</strong> The
              creature is
              @UUID[Compendium.pf2e.conditionitems.TkIyaNPgTZFBCCuh]{Dazzled}
              for 1 round or until it uses an Interact action to wipe its
              eyes.</p><p><strong>Failure</strong> As success, but the creature
              is dazzled for 3 rounds and
              @UUID[Compendium.pf2e.conditionitems.AJh5ex99aV6VTggg]{Off-Guard}
              while dazzled.</p><p><strong>Critical Failure</strong> The
              creature is dazzled for 1 minute and
              @UUID[Compendium.pf2e.conditionitems.XgEqL1kFApUbl5Z2]{Blinded}
              for 1 round. It can end the blinded condition early by using an
              Interact action to wipe its eyes.</p>
