              <p><strong>Failure</strong> As success, except
              @Damage[1d4[persistent,poison]] damage and
              @UUID[Compendium.pf2e.conditionitems.Item.fesd1n5eVhpCSS18]{Sickened
              2}.</p>

              <p><strong>Critical Failure</strong> As success, except
              @Damage[1d8[persistent,poison]] damage and
              @UUID[Compendium.pf2e.conditionitems.Item.fesd1n5eVhpCSS18]{Sickened
              3}.</p>

              <hr />

