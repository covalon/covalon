name: Fey Courts
img: modules/covalon/images/Fey%20Courts%20Camp.webp
caption: ''
sort: 0
description: >-
  <div class="block template"><div class="block "><h3 id="the-fey-courts">The
  Fey Courts</h3></div><div class="block taglist"><section
  class="traits"><p><span class="inline-block
  tag">Civilization</span></p></section></div><p>Subjects of the Alidian
  Forest.</p><div class="block indented"><p><strong>Government</strong> Fey
  Courts (monarchy)</p><p><strong>Population</strong> fey, elves, leshy, gnomes,
  and various druids</p><p><strong>Religions</strong>
  naturalism</p><p><strong>Primary Exports</strong> none
  (isolationist)</p><p><strong>Geography</strong> large forest featuring many
  glades, two major rivers, and a series of hidden
  waterfalls</p><p><strong>Fate</strong> unknown</p></div><hr /><p>Three or so
  centuries ago, the Fey Court returned at the behest of the Ailidian Commune of
  the Ailidian Forests to combat the encroachment of kingdoms wishing to
  excavate their ancient trees. Upon the Fey Courts’ arrival, the forests took
  on a more twisted, surreal look, drawing many would-be timberers into
  nutrients for the slowly expanding woodlands.</p></div>
