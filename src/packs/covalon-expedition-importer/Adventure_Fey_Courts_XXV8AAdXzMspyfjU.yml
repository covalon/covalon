      - img: icons/environment/traps/saw-steel-grey.webp
        name: Beheading Buzz Saw
        system:
          description:
            gm: ''
            value: >-
              <p>You compress molten scraps pulled from the Plane of Metal into
              a spinning disc with gruesome blades protruding from its edges. It
              wheels forward, slicing through anyone in its path. Each creature
              in the area takes 5d10 slashing damage and 4d6 persistent bleed
              damage, with a Reflex save.</p>

              <p><strong>Success</strong> The creature is unaffected.</p>

              <p><strong>Failure</strong> The creature takes full damage.</p>

              <p><strong>Critical Failure</strong> The creature takes double
              damage. If the creature has a head, it must succeed at a
              @Check[type:fortitude|dc:resolve(@actor.system.attributes.spellDC.value)|traits:death,incapacitation]
              save or be decapitated; this kills any creature except ones that
              don't require a head to live. For creatures with multiple heads,
              this usually kills the creature only if you sever its last head.
              This second save has the death and incapacitation traits.</p>

              <hr />

              <p><strong>Heightened (+1)</strong> The slashing damage increases
              by 1d10, and the persistent bleed damage increases by 1d6.</p>
