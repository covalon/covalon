      - img: icons/magic/air/fog-gas-smoke-orange.webp
        name: Rust Cloud
        system:
          description:
            gm: ''
            value: >-
              <p>Red-blown flecks of rust jitter in the air, forming a cloud of
              agitated particles. All creatures within the cloud become
              @UUID[Compendium.pf2e.conditionitems.Item.DmAIPqOBomZ7H95W]{Concealed},
              and all creatures outside the cloud become concealed to creatures
              within it. The cloud deals 5d10 slashing damage to any creature
              that starts its turn in the area, with a basic Fortitude save.</p>

              <p>Metal that rusts off of a creature adds to the cloud. When a
              metal creature takes damage from the cloud, the cloud's area
              increases by 5 feet (to a maximum of a
              @Template[type:burst|distance:40]), and the creature starts to
              rust, taking
              @Damage[(floor(@item.level/2)-1)d4[persistent,slashing]] damage.
              You can Dismiss the cloud.</p>

              <hr />

              <p><strong>Heightened (+2)</strong> The cloud's slashing damage
              increases by 1d10 and the persistent damage increases by 1d4.</p>
