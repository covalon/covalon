      - sort: 200000
        name: 'Fey Courts Mission A: Ore Collector'
        type: text
        _id: GrpPdb7FOyTJGu8h
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <h3>Hook</h3><p>A powerful magnetic field surrounding the Fey
            Courts' castle hinders our advance! Our scouts have found that
            heavily guarded metal seems to disrupt the field. While another team
            is making a diversion not far away, adventurers must infiltrate the
            mines to collect this special ore!</p><h3>Required
            Elements</h3><ol><li><p>During <strong>Scene 2</strong>, the party
            faces a series of skill checks that affect the last encounter in
            <strong>Scene 3</strong>. Keep track of how many points the party
            accumulates during <strong>Scene 2, </strong>as they affect
            rewards.</p></li><li><p><strong>Scene 3 </strong>always contains a
            special creature called the <strong>Fallen Noble</strong> (see the
            Fey Courts Actors folder in the module). The Fallen Noble's level
            should be equal to the party's average level +
            1.</p></li></ol><h3><strong>Scene 1: Brutal
            Infiltration</strong></h3><p>The players face a moderate encounter
            against the few remaining guards blocking the mine's entrance.
            Afterwards, they're able to take exploration activities before
            moving on to Scene 2.</p><h3><strong>Scene 2: To The Mines With
            You</strong></h3><p>This scene contains three phases. The party must
            succeed at skill checks during each phase to accumulate Mining
            Points. </p><p><strong>Critical Success</strong> The party gains 2
            Mining Points.</p><p><strong>Success</strong> The party gains 1
            Mining Point.</p><p><strong>Critical Failure</strong> The party
            loses 1 Mining Point.</p><ul><li><p>Once each player has contributed
            to a phase, compare the amount of Mining Points they have to the
            Outcome Table below, using the highest threshold
            possible.</p></li><li><p>You can let players come up with reasonable
            uses for their skills and reward creativity. Applicable skills for
            each phase are listed in case a player doesn't have any idea, and
            you can add more to this list.</p></li><li><p><span
            style="font-family:Signika, sans-serif">Alternatively, a player can
            gain three actions to use abilities to support their allies.
            </span>Particularly appropriate spells or abilities may allow a
            player to succeed or critically succeed without making a check, at
            your discretion.</p></li><li><p>Using the initiative tracker to see
            who has already acted is useful, but feel free to let players act in
            any order they want during each phase.</p></li><li><p>Keep track of
            the Mining Points accumulated as the total determines the mission's
            rewards.</p></li></ul><h3>Phase 1: Identification</h3><p>The mines
            are filled with a variety of metals, and the party has to find the
            one they're after.</p><p><strong>Applicable Skills:</strong>
            <strong>#DC#</strong> Crafting, Nature or Survival, <strong>#DC
            +2#</strong> Perception, <strong>#DC -2#</strong> relevant
            Lore</p><table><tbody><tr><td><p><strong>Minimum of Mining Points
            required</strong></p></td><td><p><strong>Outcome</strong></p></td></tr><tr><td><p><strong>[Party
            Size + 1] </strong>points</p></td><td><p>The party gains a +1
            circumstance bonus to all checks in later
            phases.</p></td></tr><tr><td><p><strong>[Party Size]
            </strong>points</p></td><td><p>The party identifies the correct
            metal successfully.</p></td></tr><tr><td><p><strong>[Party Size / 2]
            </strong>(rounded down)<strong> </strong>points</p></td><td><p>The
            party takes a -1 circumstance penalty to all checks in later
            phases.</p></td></tr><tr><td><p><strong>1 or less</strong>
            points</p></td><td><p>The party has no clue which metal they're
            looking for and has to take everything they can. They take a -2
            circumstance penalty to all checks in later
            phases.</p></td></tr></tbody></table><h3>Phase 2:
            Stabilization</h3><p>The party finds the metal, but it's strangely
            unstable. Transporting it as-is might be
            dangerous.</p><p><strong>Applicable Skills:</strong>
            <strong>#DC#</strong> Arcana or Nature to stabilize using magic,
            <strong>#DC#</strong> Crafting to come up with a chemical to make
            the metal inert, <strong>#DC +5#</strong> Fortitude to bear with it
            (Juggernaut and such don't
            apply)</p><table><tbody><tr><td><p><strong>Minimum of Mining Points
            required</strong></p></td><td><p><strong>Outcome</strong></p></td></tr><tr><td><p><strong>[Party
            Size + 1] </strong>points</p></td><td><p>The fallen noble begins the
            encounter
            @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained 1} as
            the presence of the stabilized metal affects its vestigial fae
            body.</p></td></tr><tr><td><p><strong>[Party Size]
            </strong>points</p></td><td><p>The party identifies the correct
            metal successfully.</p></td></tr><tr><td><p><strong>[Party Size / 2]
            </strong>(rounded down)<strong> </strong>points</p></td><td><p>The
            party becomes
            @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained
            1}.</p></td></tr><tr><td><p><strong>1 or less</strong>
            points</p></td><td><p>The party is severely affected, becoming
            @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained
            2}.</p></td></tr></tbody></table><h3>Phase 3:
            Extraction</h3><p><strong>Applicable Skills:</strong>
            <strong>#DC#</strong> Athletics or <strong>#DC +5#</strong> unarmed
            attack to jostle the metal free, <strong>#DC#</strong> Survival or
            <strong>#DC -2# </strong>Thievery to loosen or file it
            out</p><table><tbody><tr><td><p><strong>Minimum of Mining Points
            required</strong></p></td><td><p><strong>Outcome</strong></p></td></tr><tr><td><p><strong>[Party
            Size + 1] </strong>points</p></td><td><p>The Fallen Noble is easily
            noticed with so much metal extracted. It starts at the bottom of
            initiative.</p></td></tr><tr><td><p><strong>[Party Size]
            </strong>points</p></td><td><p>The party successfully collects the
            metal.</p></td></tr><tr><td><p><strong>[Party Size / 2]
            </strong>(rounded down)<strong> </strong>points</p></td><td><p>The
            Fallen Noble ambushes the party. It starts at the top of
            initiative.</p></td></tr><tr><td><p><strong>1 or less</strong>
            points</p></td><td><p>The fallen noble starts at the top of
            initiative, and the players are
            @UUID[Compendium.pf2e.conditionitems.AJh5ex99aV6VTggg]{Off-Guard}
            until the start of their first
            turn.</p></td></tr></tbody></table><p>As soon as this phase is
            completed, move to Scene 3. Players may not take exploration
            activities.</p><h3><strong>Scene 3: Rock You</strong></h3><p>The
            party faces a moderate encounter containing the Fallen Noble, who
            spawns creatures to fight at its side using the surrounding metal at
            the start of the encounter.</p><h3>Recommended Locations</h3><p>For
            the first encounter: entrance of a cave in wastelands, forest of
            dead trees, or mountainous area.</p><p>For the rest of the session:
            mines, caves or other underground locations.</p><h3>Recommended
            Creatures</h3><p>Creatures with the metal trait; humanoids, fey,
            animals or beasts with the metal-blighted adjustment (see the
            Appendix 1: Creature Adjustments) who would reasonably work under
            the metal army; earth or electricity creatures switched to metal
            creatures.</p><h3>Recommended Loot</h3><p>The entirety of the
            treasure budget should be given out in raw GP. How well the party
            does during the expedition determines how much gold they
            receive.</p><table><tbody><tr><td
            data-colwidth="270"><p><strong>Mining Points</strong></p></td><td
            data-colwidth="289"><p><strong>Outcome</strong></p></td></tr><tr><td
            data-colwidth="270"><p><strong>[Party Size] or less
            </strong>points</p></td><td data-colwidth="289"><p>50% of total
            treasure budget</p></td></tr><tr><td
            data-colwidth="270"><p><strong>[Party Size x 2]
            </strong>points</p></td><td data-colwidth="289"><p>75% of total
            treasure budget</p></td></tr><tr><td
            data-colwidth="270"><p><strong>[(Party Size x 2) + 1] or more
            </strong>points</p></td><td data-colwidth="289"><p>100% of total
            treasure budget</p></td></tr><tr><td
            data-colwidth="270"><p><strong>[Party Size x 3] or more
            </strong>points</p></td><td data-colwidth="289"><p>110% of total
            treasure budget</p></td></tr></tbody></table>
