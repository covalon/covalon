        name: Super Regeneration 50 (Deactivated by Mask’s Metal)
        sort: 100000
        system:
          description:
            gm: ''
            value: >-
              <p>As long as they wear a mask, Lethallica <span
              style="font-family:Roboto, sans-serif">regains [[/r 50[healing]]]
              Hit Points each round at the beginning of their turn.
              <strong>Their Hit Points can never go below 1 as long as their
              regeneration is active.</strong></span></p><p><span
              style="font-family:Roboto, sans-serif">However, if they take
              damage from a weapon or effect matching the metal of their worn
              mask, the regeneration deactivates until the end of their next
              turn. For example, an adamantine weapon or spell would deactive
              the regeneration if Lethallica was wearing their adamantine mask.
              </span></p><p><span style="font-family:Roboto,
              sans-serif">Deactivate the regeneration before applying any damage
              from an appropriate effect.</span></p>
