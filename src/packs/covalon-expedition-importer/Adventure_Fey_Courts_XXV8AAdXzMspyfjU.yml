      - sort: 500000
        name: 'Appendix 1: Creature Adjustments'
        type: text
        _id: 0L5c8XPC9qPwIBNA
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: >-
            <h3>Limited Stat Blocks</h3><p>As the number of true metal creature
            stat blocks is limited, you may wish to use other types of stat
            blocks to represent the forces of the metallic invaders. Feel free
            to use earth and electricity elementals reflavored as metal
            elementals (swapping the relevant trait and language for the metal
            trait and Talican language), or apply the adjustment below to other
            types of creatures. This adjustment is meant to represent humanoids,
            fey, animals or beasts corrupted by the corrosion from the Plane of
            Metal and the influence of the Maw.</p><h3>Metal Taint
            Adjustment</h3><ul><li><p>Add the <em>metal</em>
            trait</p></li><li><p>If the creature has any languages, add
            Talican</p></li><li><p>The creature gains
            Darkvision</p></li><li><p>The creature gains a resistance to
            Electricity damage equal to
            #Creature[2-8][Minimum]</p></li><li><p>In Tier 1 and 2, add 1 point
            of flat electricity damage to all of the creature's strikes. In Tier
            3 or higher, add 1d6 electricity damage to all of the creature's
            strikes</p></li><li><p>If the creature can cast spells, you can
            replace some of them with metal spells of the same rank, such as:
            <strong>Cantrip</strong> needle darts, <strong>1st</strong>
            conductive weapon, <strong>2nd</strong> magnetic repulsion,
            <strong>3rd</strong> noxious metals, <strong>4th</strong> rust
            cloud, <strong>5th</strong> impaling spike, <strong>6th</strong>
            field of razors, <strong>7th</strong> beheading buzz saw,
            <strong>8th</strong> ferrous form, <strong>9th</strong> magnetic
            dominion.</p></li></ul>
