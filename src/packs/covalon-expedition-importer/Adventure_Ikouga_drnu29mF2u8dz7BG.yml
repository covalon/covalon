              has a creature grabbed using this action. <strong>Effect</strong>
              The monster automatically Grabs the target until the end of the
              monster's next turn. The creature is grabbed by whichever body
              part the monster attacked with, and that body part can't be used
              to Strike creatures until the grab is ended. Using Grab extends
              the duration of the monster's Grab until the end of its next turn
              for all creatures grabbed by it. A grabbed creature can use the
              Escape action to get out of the grab, and the Grab ends for a
              grabbed creatures if the monster moves away from it.</p>
