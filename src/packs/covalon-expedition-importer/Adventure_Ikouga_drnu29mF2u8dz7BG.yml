      - sort: 300000
        name: 'Ikouga Mission C: Gather Resources'
        type: text
        _id: MwpboF8WW2CZXueP
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h2>Ikouga Mission C: Gather Resources</h2><h3>Hook</h3><p>While in the Noctune Tropic, it would be a good idea to stock up on supplies that are only available in the region - especially creature parts. Adventurers are provided a feather token (swan boat) as well as feather tokens (fan) to travel to one of the nearby islands, harvest natural resources, and hunt wildlife from it.</p><h3>Required Elements</h3><ol><li>All creatures have resistance\_<strong>#Creature 2-8 Minimum#</strong>\_to acid.</li><li>This adventure takes place on a single battlemap and features several waves of enemies - up to four moderate encounters of creatures with a 10 minute break in between each. (Unlike descents, players can choose to escape the adventure at any time - even during an encounter.)</li><li>During each 10 minute break, players may choose to perform a special \"Gather Resources\" exploration activity that takes 10 minutes instead of another exploration activity, which allows them to harvest nearby natural resources as well as parts from the creatures they've just defeated. Doing so determines how much treasure they receive at the end of the adventure.</li></ol><h3>Recommended Locations</h3><p>Tropical jungle, island cove, tropical beach, crystal cave, tropical river. This adventure does not take place on the main island of Ikouga, so there should be no urban development. A location with access to natural resources - such as fruit, ore, or plants - is appropriate for this adventure.</p><h3>Recommended Creatures</h3><p>Animals, beasts, plants, fungi, dinosaurs, elementals,\_amphibious creatures. No sapient creatures. (Intelligent creatures may be reflavored to have devolved into being unintelligent.)</p><h3>Recommended Loot</h3><p>The entirety of the treasure budget should be given out in raw GP, depending on how many times the Gather Resources exploration activity is performed. The gathered resources should be flavored as a combination of the available natural resources in the location, along with the hides, organs, and bones of the creatures they defeat (if applicable).</p><table style=\"width:94.0146%;height:76px\" border=\"1\"><tbody><tr style=\"height:19px\"><td style=\"width:51.3605%;height:19px\">0 times</td><td style=\"width:48.4864%;height:19px\">No loot awarded</td></tr><tr style=\"height:19px\"><td style=\"width:51.3605%;height:19px\">1-2 times</td><td style=\"width:48.4864%;height:19px\">25% of total treasure budget</td></tr><tr style=\"height:19px\"><td style=\"width:51.3605%;height:19px\">3-4 times</td><td style=\"width:48.4864%;height:19px\">50% of total treasure budget</td></tr><tr style=\"height:19px\"><td style=\"width:51.3605%;height:19px\">5-6 times</td><td style=\"width:48.4864%;height:19px\">75% of total treasure budget</td></tr><tr><td style=\"width:51.3605%\">7-8 times</td><td style=\"width:48.4864%\">100% of total treasure budget</td></tr><tr><td style=\"width:51.3605%\">9+ times</td><td style=\"width:48.4864%\">110% of total treasure budget, and the players learn that the hides of the creatures they defeated are particularly water-resistant</td></tr></tbody></table>"
          markdown: ''
