        sort: 0
        flags: {}
        system:
          description:
            gm: ''
            value: "<p>When a Tentacle Grabs a creature, that creature cannot attempt to Escape using the basic Escape action. When a tentacle is brought to half hp, any creature currently grabbed by it can attempt to make a single special Escape check as a free action. The ally who brought the tentacle to the hp threshold is considered to have taken sufficient preparation to use their reaction to Aid. Allies of a grabbed player can help them escape by Shoving the grabbed player, as a grabbed player affected by forced movement will break the grab as normal.</p>\n<p>\_</p>\n<p>If a Tentacle has a creature Grabbed, it does not lose the Grabbed condition at the end of the Tentacle's next turn. It remains Grabbed until it Escapes or the Tentacle is destroyed.\_If a Tentacle has a creature Restrained, the Restrained condition is reduced to Grabbed at the end of the Tentacle's next turn.</p>\n<p>\_</p>\n<p data-visibility=\"gm\">You should allow abilities such as Liberating Command or Freedom of Movement to allow characters to Escape as normal.</p>"
