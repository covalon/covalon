      - _id: AHJyKThevpzZ3heV
        name: Magical Kraken - Air Bubble
        type: action
        img: systems/pf2e/icons/actions/TwoActions.webp
        effects: []
        folder: null
        sort: 0
        flags: {}
        system:
          description:
            gm: ''
            value: "<p>A bubble of air 10 feet in diameter forms in an unoccupied space within 120 feet. This bubble of air must form underwater and remain underwater for the duration. When Scylladon first uses this ability, and each time they spend a single action with the concentrate tag to focus on the bubble,Scylladon\_can roll the orb up to 10 feet in any direction. The bubble can move through the spaces of any creatures or obstacles that can fit inside it.</p>\n<p>\_</p>\n<p>The bubbles collects creatures it moves through. Any Large or smaller creature whose space the bubble tries to move through can attempt a\_<span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">@Check[type:reflex|dc:30|name:Whirlpool|basic:false]</span><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">\_save to avoid being engulfed. If a creature succeeds at this save, it can either let the orb pass (remaining in its space or moving out of the bubble's path into a space of the creature's choice) or allow itself to be pushed in front of the bubble to the end of the bubble's movement. The bubble can try to Engulf a creature only once per turn.\_</span></p>\n<p>\_</p>\n<p>A creature that fails its save is pulled into the bubble. It becomes Grabbed, moves along with the orb and can breath normally. An engulfed creasture can get free either by Swimming with a successful @Check[type:athletics|dc:29|name:Air Bubble Swim] check, or by Escaping. A creature that critically failed its reflex save is further stuck and must attempt to Escape instead of Swim. The orb can contain as many creatures as can fit in its space.\_</p>"
          rules: []
          slug: null
