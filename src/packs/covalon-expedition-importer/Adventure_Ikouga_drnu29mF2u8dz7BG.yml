        text:
          format: 1
          content: "<h2>Ikouga Finale: Scylladon, the Starbreaker</h2><h3>Hook</h3><p>During their adventures to reclaim Ikouga, the citizens of Covalon discovered that the city's problems originated from a Cataclysm-corrupted legendary kraken known as Scylladon. Although the beast has been defeated, the Maw Vessel beneath the city has been destroyed, and the wind has returned to the Noctune Tropic, the city and the Seed of Terra aren't safe yet. Scouts have reported a familiar whirlpool moving towards the city, with a Maw-like facsimile of Scylladon at its center. A brave team of adventurers is needed to descend beneath the waves and defeat the creature before it gets too close to Ikouga.</p><h3>Part 1: Assemble the Diving Suits</h3><p>Before the adventurers can dive under the waves, they'll need to assemble diving suits from the water-resistant pelts of the local creatures that were defeated as part of the expedition missions. The following skill challenges are presented to the party in order. Up to two party members can attempt a check to complete each skill challenge, using one of the listed skills for the challenge (or an applicable lore, at the GM's discretion). The DC to succeed at a skill challenge is <strong>#DC +1#</strong>. A success or critical success yields one Victory Point while a failure or critical failure yields no Victory Points. Only one Victory Point can be obtained per skill challenge, even if both PCs attempting it succeed.</p><ul><li>Prepare the hides (Nature or Survival)</li><li>Break apart bones to access the infused marrow (Athletics)</li><li>Carefully remove monster organs (Medicine or Thievery)</li><li>Craft the suits (Crafting)</li><li>Make spooky noises to scare away the local wildlife to prevent work from being interrupted (Intimidation or Occultism)</li><li>Infuse the suits (Arcana or Religion)</li></ul><p>Depending on the amount of Victory Points earned, the diving suits grant effects to the party.</p><ul><li><strong>2 or fewer Victory Points </strong>The suits provide the effect of a\_water breathing\_spell for the duration of the adventure.</li><li><strong>3 Victory Points\_</strong>The suits provide a swim speed equal to half of the wearer's land speed and the effect of a water breathing\_spell for the duration of the adventure.</li><li><strong>4 or more Victory Points</strong><span style=\"font-family:var(--journal-serif)\">\_</span>The suits provide acid resistance 10, a swim speed equal to the wearer's land speed, and the effect of a water breathing\_spell for the duration of the adventure.</li></ul><p>The diving suits do not require investment and can be worn over the PCs' other gear without restricting access to anything.</p><h3>Part 2: The Facsimile of Scylladon</h3><p>Scylladon has already been defeated, but the Maw's vengeance for the destruction of its Vessel has manifested as an imitation of the legendary creature. The PCs dive underwater to face off against a Facsimile of Scylladon and its tentacles.</p><p>The players begin at the south end of the map, on the ocean shelf, while Scylladon sits at the north end of the map, along with four tentacles that are randomly spread out around the arena, none of which should be adjacent to the starting positions of the PCs (hard mode can have up to two start adjacent to the PCs). Scylladon and its tentacles do not move during the encounter, with one exception: the tentacles may swim higher or lower in the water to reach a player that is above or below them.</p><p>If the GM has not done so yet, they should select one of the three Modifications to apply (found on Scylladon's statblock), or roll [[/r 1d3]] to determine one randomly. Do not tell the players which Modification is in effect. (For Hard Mode, use all 3 modifications.)</p><h3>Loot</h3><p>The entirety of the treasure budget is given out in raw GP, paid by the NPC used for the hook. Additionally, players unlock the ability to customize their Soul Seed, gaining access to the Water aspect.</p>"
          markdown: ''
