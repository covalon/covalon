      - sort: 200000
        name: 'Ikouga Mission B: Investigate the Goop'
        type: text
        _id: Z7ZiXytCncCeiPQh
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h2>Ikouga Mission B: Investigate the Goop</h2><h3>Hook</h3><p>The purple mucus that's been seen covering the plants and animals in the area is certainly unnatural and cause for concern, but learning more about us may reveal clues about what has happened to Ikouga since the Cataclysm. Adventurers are given goop testing kits containing alchemical and magical catalysts, and are tasked with finding mucus out in the field and conducting tests on it to learn more about it.</p><h3>Required Elements</h3><ol><li>All creatures have resistance\_<strong>#Creature 2-8 Minimum#\_</strong>to acid.</li><li><p>There must be four mucus samples scattered around the adventure that the players will need to find. Upon finding a mucus sample, the players must choose one of the following four tests to perform. The players get three chances to perform the chosen test on the mucus, and each attempt must be made by a different player. After three attempts, the mucus shrivels up and dries out. <strong>This required element accounts for the same amount of XP as a moderate encounter in the adventure's total encounter budget.</strong></p><ol><li>Analysis Test - up to three players attempt a Arcana or Nature checks to Recall Knowledge about the goop with a DC of <strong>#DC +2#</strong>, studying how the goop reacts to a magical catalyst. If a player succeeds, they learn that the source of the goop is magical in nature, linked to the conjuration school of magic.</li><li>Viscosity Test - up to three players attempt a DC <strong>#DC +2#\_</strong>Athletics check to stretch the goop with their hands. If a player succeeds, they learn that being engulfed by this goop would render someone completely incapable of movement unless they were assisted by magic or help from someone else.</li><li>Composition Test - up to three players attempt a DC\_<strong>#DC +2#</strong> Crafting check, studying how the goop reacts to an alchemical catalyst. If a player succeeds, they learn that the goop contains traces of poisonous ink.</li><li>Taste Test - a singular player tastes some of the goop. They take\_<strong>#Hazard 2-16 Simple Damage#\_</strong>acid damage with a DC\_<strong>#Hazard 2-16 HDC#</strong> basic Fortitude save. If they survive, they learn that the goop is very salty, as if originating from sea water.</li></ol></li></ol><ul><li>If the players succeed at all four test, they learn that the goop shares many similar properties to that of the Maw Stones - undeniable evidence that the goop is linked to the Maw. If the players do not succeed at all four tests, they do not receive the Investigation Bonus reward (see Recommended Loot).</li></ul><h3>Recommended Locations</h3><p>Heavily urban areas, urban areas where nature is slowly starting to crawl back, slightly-ruined urban areas, caves dug into or underneath buildings by beasts. Avoid too much greenery or other nature, as this mission takes place on the main island which was entirely urban development. Think of it as creatures having moved into a city after it had been abandoned by people.</p><p>Alternatively, the players can be provided with a feather token (swan boat) and feather tokens (fan) to go to a nearby island for this adventure, in which case it would be appropriate to use a location involving a tropical jungle, island cove, tropical beach, crystal cave, or tropical river.</p><h3>Recommended Creatures</h3><p>Animals, beasts, plants, fungi, dinosaurs, non-intelligent undead,\_amphibious creatures. No sapient creatures. (Intelligent creatures may be reflavored to have devolved into being unintelligent.)</p><h3>Recommended Loot</h3><p>Any. If the players succeed at all four tests, an\_Investigation Bonus is added in the form of raw GP equaling 10% of the total treasure budget.</p>"
          markdown: ''
