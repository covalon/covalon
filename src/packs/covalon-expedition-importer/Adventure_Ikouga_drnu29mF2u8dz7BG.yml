      - sort: 100000
        name: 'Ikouga Mission A: Retame the Island'
        type: text
        _id: BpbJXQW2Ylf32KnR
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h2>Ikouga Mission A: Retame the Island</h2><h3>Hook</h3><p>Since Ikouga was abandoned, nature has slowly started to reclaim the island, but the local flora and fauna are different from what's written about in Ikougan history books. They're highly territorial and covered in this slimy, purple mucus that's highly corrosive. Adventurers are tasked with destroying a nearby creature den to keep the aggressive creatures under control.</p><h3>Required Elements</h3><ol><li>All creatures have resistance <strong>#Creature 2-8 Minimum# </strong>to acid. Additionally, half of the damage they deal with Strikes is converted to acid damage. While a player is grabbed or swallowed by or flat-footed to a creature, that player has weakness <strong>#Creature 2-8 Minimum# </strong>to acid.</li><li><p>There must be a hidden area that can only be revealed by a Searching PC who succeeds at a DC <strong>#DC +5#</strong> Perception check. Inside the hidden area are clues about a mythical beast.\_<strong>It should be possible for players to miss this hidden area if they neglect to Search or if they roll poorly.</strong>\_Choose one of the following:</p><ul><li>The hidden area is a cave, with paintings on the wall drawn by an ancient civilization that existed long before Ikouga. They depict several scenes: a gargantuan squid-like creature rising from the center of a whirlpool in a landless ocean; the same creature inhaling all of the clouds in the sky; the creature blasting a jet of water that shatters one of two moons; the massive pieces of the moon falling into the sea and forming islands; the squid-like creature sinking back below the waves as the people of the newly-created islands bow in reverence.</li><li>The hidden area is an abandoned study, with books scattered about. Of particular interest is a skeleton clutching a magazine on Ikougan seafood that has a page ripped out. If the players Search for the missing page (automatic success), they find it, which is a section on the culinary uses of squid ink. It ends with, \"With all the varied uses of squid ink, it's no wonder it has such a dedicated market in Ikouga. If the scylladon were real, its ink would probably be worth more than gold!\"</li><li>The hidden area is a destroyed dressing room for performers. Skeletons litter the room in a half circle against a singular skeleton wearing a costume that appears to be an octopus armored by various pieces of shipwreck. The skeleton has a spear lodged in its ribcage; one of the few pieces of the costume not protected by the shipwreck accessories. If the players Search the area, they move the costumed body out of the way to find fungal evidence of rotted vegetables.</li></ul></li></ol><h3>Recommended Locations</h3><p>Heavily urban areas, urban areas where nature is slowly starting to crawl back, slightly-ruined urban areas, caves dug into or underneath buildings by beasts. Avoid too much greenery or other nature, as this mission takes place on the main island which was entirely urban development. Think of it as creatures having moved into a city after it had been abandoned by people.</p><h3>Recommended Creatures</h3><p>Animals, beasts, plants, fungi, dinosaurs, non-intelligent undead, amphibious creatures. No sapient creatures. (Intelligent creatures may be reflavored to have devolved into being unintelligent.)</p><h3>Recommended Loot</h3><p>Any. If the players find the hidden area, an Investigation Bonus is added in the form of raw GP equaling 10% of the total treasure budget.</p>"
          markdown: ''
