            value: "<p>Scylladon creates a swirling torrent of water that manifests along a straight line. Affected creatures must make a\_<span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">@Check[type:fortitude|dc:26|name:Water Jet|basic:true]</span><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">save.</span></p>\n<p>\_</p>\n<p>The torrent deals [[/r 9d6]] bludgeoning damage. Creatures and objects that fail the save are also knocked back 5 feet (10 feet on a critical failure).</p>\n<p>Scylladon cannot use Water Jet again for [[/r 1d4]] rounds.</p>"
