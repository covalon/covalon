name: Ikouga
img: modules/covalon/images/Ikouga_Outpost.webp
caption: ''
sort: 0
description: >-
  <div class="block wide"><div class="block template"><div class="block "><h3
  id="ikouga">Ikouga</h3><p><span class="inline-block label">CREATED BY Kipza
  Quickclaw</span></p></div><div class="block taglist"><section
  class="traits"><p><span class="inline-block
  tag">Civilization</span></p></section></div><p>The jewel of the Noctune
  Tropic.</p><div class="block indented"><p><strong>Government</strong> The
  Ikougan Republic (senate of elected
  representatives)</p><p><strong>Population</strong> humans, halflings, gnomes,
  azarketi, catfolk, lizardfolk</p><p><strong>Religions</strong> Aelia, Noctune,
  Kujani, Karatu, Erimia</p><p><strong>Primary Exports</strong> rum, coffee,
  fruits, precious stones, drugs, seafood, ships, spices, cotton, oil,
  resins</p><p><strong>Geography</strong> tropical
  island</p><p><strong>Fate</strong> environmental catastrophe</p></div><hr
  /><p>Out of the thousands of islands in the Noctune Tropic archipelago, only a
  fraction have been charted, and only a fraction of those are even worth
  mentioning. Upon one of such islands once sat the republic of Ikouga - a hub
  of trade between the other islands in the Tropic and other major civilizations
  such as Primrose and Gornlar. The city boasted an impressive navy that allowed
  it to stay separate from international politics, as well as enough
  ne’er-do-well privateers to keep it busy. Its idyllic climate and acces to a
  wealth of natural resources made it an attractive place for those both looking
  to fill their purse and their minds, housing headquarters for several
  international trading companies as well as an academy of magic and science. In
  time, Ikouga’s technology grew and urban development expanded, with the city
  encompassing more and more of the original island with every passing year,
  until the city expanded to the point where the entire original island had been
  covered by city - no original tropical forest remained.</p><div
  class="blank"><p></p></div><p>In spite of their wealth and knowledge, the
  denizens of Ikouga found themselves powerless on the day the wind stopped and
  the ocean stood still. Over the weeks that followed, civilization in Ikouga
  completely destabilized from being cut off from the rest of the world, and the
  city descended to anarchy. Some people were killed over conflicts for food
  while others merely starved to death, but the greatest fools of all were the
  ones who attempted to flee the city by rowboat; although the ocean’s surface
  stood still, the beasts below the surface were more restless than
  ever.</p></div></div>
