        name: Tail of Opportunity
        system:
          description:
            gm: ''
            value: "<p><strong>Trigger</strong>\_A creature within your reach uses a\_<a href=\"https://2e.aonprd.com/Traits.aspx?ID=104\">manipulate</a>\_action or a\_<a href=\"https://2e.aonprd.com/Traits.aspx?ID=114\">move</a>\_action, makes a ranged attack, or leaves a square during a move action it’s using.</p>\n<p>Make a melee Tail Strike against the triggering creature. If your attack is a critical hit and the trigger was a manipulate action, you <a href=\"https://2e.aonprd.com/Rules.aspx?ID=394\">disrupt</a> that action. This Strike doesn’t count toward your multiple attack penalty, and your multiple attack penalty doesn’t apply to this Strike.\_</p>"
