      - sort: 300000
        name: 'Pudersnö Mission C: Thin the Ranks'
        type: text
        _id: AlezN6iSN5RIj5j3
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h1>Hook</h1><p>The mountainside near the top of the mountain is swarming with violent monsters. If we head to the top we will be swarmed from all sides! Heroes of Covalon must head to the upper mountainside and take out as many of these evil creatures as possible before heading home.</p><h1>Required Elements</h1><ol><li>The mountainside is too far and dangerous to reach on foot. The party will be tied together and shot at the destination via a catapult from our encampment. Don’t tell the players this before they assemble for your game. As they ‘land’ the tethers holding them together automatically break but they take <strong>#Hazard 2-16</strong> <strong>Simple Damage#</strong> with a <strong>#DC +4#</strong> basic reflex save (note you cannot crit succeed this check as you are shot at a mountain; crit success takes half damage like a success). All players that failed land prone.</li><li>To get home, all players are given a L bulk wooden toboggan. It takes one action to ready the toboggan and one to slide out of the encounter. Each player can use a reaction to drag one unconscious or willing player with them as they leave.</li><li>This area is swarming with creatures and the encounter is a perpetual fight. Always have three (apl-1) mobs on the field at all times for a 6 person party (for a total of 90 exp of mobs). When one dies, have another join the map from an edge of the map, far from the party. The number of enemies defeated will determine the reward (see recommended loot). For variety's sake, please use at least two different creatures.</li><li>There are no exploration activities, the fight starts immediately on landing.</li></ol><table border=\"1\"><tbody><tr><td><p><strong>Avalanche</strong></p><section><p dir=\"ltr\">CONJURATION\_ TRAP</p></section></td></tr><tr><td><p dir=\"ltr\" style=\"line-height:1.38;margin-top:12pt;margin-bottom:6pt\"><span style=\"font-family:Georgia\"><strong>Complexity </strong>Complex</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:12pt;margin-bottom:6pt\"><span style=\"font-family:Georgia\"><strong>Description </strong></span>A 20ft wide wave of snow hurls itself down the mountain in a straight line from top to bottom of the map.</p></td></tr><tr><td><p dir=\"ltr\" style=\"line-height:1.38;margin-top:12pt;margin-bottom:6pt\"><span style=\"font-family:Georgia\"><strong>Disable </strong>No.</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:12pt;margin-bottom:6pt\"><span style=\"font-family:Georgia\"><strong>Routine </strong></span>(1 action) Either Rumble or Fall.</p><p>Rumble, ping where pebbles of snow are starting to slide down the mountain. This should be used to catch the most players in the path of the hazard. This allows the use of Fall next round.</p><p>Fall, a 20 ft wide avalanche of snow barrels down your map from top to bottom! All creatures that are in the path of the avalanche take #Hazard 2-16 Complex Dmg# (half bludgeoning and half cold damage) with a basic reflex save #DC#. Any creature that fails will slide to the bottom of the map. This allows the use of Rumble next round.</p></td></tr></tbody></table><h1>Recommended Locations</h1><p>A mountainside covered in snow and rocks. The elevation at the top of the map should be higher than the bottom. Moving here should be regular terrain, not difficult.\_</p><h1>Recommended Creatures</h1><p>Animals, beasts, air, cold, electricity, and creatures suited to cold climates. All creatures are immune to cold damage from the environment but not the bludgeoning damage from the avalanche.\_</p><h1>Recommended Loot</h1><p>Gold from the Dungeoneering Society. Players get 100% of the budget for defeating 6 monsters, and receive an additional 10% of the loot budget for defeating 10 or more monsters. </p>"
