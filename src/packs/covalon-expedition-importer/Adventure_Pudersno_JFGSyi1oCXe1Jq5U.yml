      - sort: 400000
        name: Pudersnö Finale
        type: text
        _id: Nkk6lJCioGjwz0jz
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3>Hook</h3><p>Through arduous exploration and dedication research, Covalon has discovered the source of the mighty storms around Pudersnö. A mighty Mpeshi has taken residence at the top of the mountain and seems to be acting strangely! It wears a strange crown and each time we strike it down a new one takes its place. Nevertheless, we must continue to defend Covalon's stake in Pudersnö.</p><p></p><h2>Hoofin' It</h2><p>In an attempt to destroy the growing sapling, the Maw has recreated its cursed crown and bolstered the Mpeshi King with a directive to destroy the Seed of Terra. Our scouts have identified that a new facsimile has come, so we need to take action as soon as possible before the storms get unbearable! Preparing the cannons can take a while, so players may only use pre-buffing spells that last 8 hours or longer.</p><p>As part of their preparations, players are loaded into a definitely-very-safe cannon designed by the greatest minds Covalon can muster. In fact, to ensure a safe landing they are being loaded with a bed to ensure a safe landing! How thoughtful!</p><p>The PCs begin on the broken bed in the Pudersno Summit map. The Mpeshi King starts on its hay bed in the north of the map, flanked by two Goat Swarms. If the Horned Glyph modification is in use, it is active in the centre of the map. The Mpeshi King, Goat Swarm and Horned Glyph (if it is present) roll initiative separately.</p><h2>Baa-aahd News</h2><p>The Mpeshi King is a territorial and dangerous creature, and attempts to destroy any invaders to its mountaintop throne.</p><p>The Mpeshi King prioritises the use of <strong>Sleipner Breaker</strong>, striking two creatures as often as it can with its <strong>King's Horns</strong> strike. As this deals lightning damage, it activates <strong>Thunder Aura</strong>, reminding creatures why the King is not to be trifled with. If the modification is active, the Mpeshi King uses <strong>Baaah of Ages</strong> as often as it can, hitting as many creatures as possible.</p><p>Defensively, the Mpeshi King demands the utmost from its subjects, defending itself from damage with <strong>Long Live The King.</strong> Players are incentivised to either burst down the King, or defeat its subjects to avoid splitting their damage too much. The Mpeshi King always uses <strong>Royal Decree</strong> to ensure use of its defensive reaction every turn, and will change between using <strong>Long Live The King </strong>and <strong>Tail of Opportunity</strong> depending on the situation.</p><p>Upon reaching half hitpoints, the Mpeshi King immediately uses <strong>The Second Crucible of Capra Rex</strong>, becoming untargetable until the start of its next turn. After appropriate narrative and resolving the required Reflex saves, place the <strong>Metal Shards</strong> loot actor in the centre of the map and inform players of the club-shaped metal protruding from the ground. Make clear to the players that there is a building static charge around the club, but that the goat swarms appear fearful of it.</p><h2>Loot</h2><p><span style=\"font-family:Signika, sans-serif\">The entirety of the treasure budget is given out in raw GP, paid by the NPC used for the hook. Additionally, players unlock the ability to customise their Soul Seed, gaining access to the Beast aspect.\_</span></p><p></p><h2>Asset Credits</h2><p>Special thank you to Kismet for the map, token and design work for this finale.</p><p></p><p>Thank you to Kipza, Resh, Tox, Sej, Celeste, Rex and Kismet for playtesting the finale.</p>"
