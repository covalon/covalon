      - sort: 100000
        name: 'Pudersnö Mission A: Lightning Tamer'
        type: text
        _id: qaLM72OAbPRqCu63
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3>Hook</h3><p>Our base is repeatedly struck by lightning! Thankfully, a strange metal in this area seems to attract the strikes. If we get enough of the metal, our crafters can fashion lightning rods to keep our base safe. Adventurers are tasked with collecting more of this material from the mountain side.</p><h3>Required Elements</h3><ol><li style=\"box-sizing:border-box;user-select:text;padding-left:var(--space-s)\">This encounter includes 8 uses of the Sky Goat Strike hazard. A tiny Mpeshi flies down from the sky into the pc, deals damage, gives a gruff 'baaaa', and then<span id=\"docs-internal-guid-ef348e8c-7fff-e145-d374-07988e95a925\"><span style=\"font-family:Georgia\"> </span></span>immediately disappears into a snowdrift never to be seen again. This is a 10x10 foot tile that deals <span style=\"font-family:var(--journal-serif)\"><strong style=\"box-sizing:border-box;user-select:text;color:#1c1c1c;font-family:var(--journal-serif);font-size:var(--font-size-14)\">#Hazard 2-16 Simple Damage# </strong></span>(bludgeoning) with a <strong style=\"box-sizing:border-box;user-select:text;color:#1c1c1c;font-size:15.6px\">#DC+2# </strong>basic reflex save. This does not count in the encounter exp.\_</li><li style=\"box-sizing:border-box;user-select:text;padding-left:var(--space-s)\">This adventure takes place on a single battlemap and features several waves of enemies - up to four moderate encounters of creatures with a 10 minute break in between each.\_</li><li style=\"box-sizing:border-box;user-select:text;padding-left:var(--space-s)\">During each 10 minute break, players may choose to perform a special \"Gather Metal\" exploration activity that takes 10 minutes instead of another exploration activity, which allows them to harvest the strange metal in one of 4 snowbanks. Doing so determines how much treasure they receive at the end of the adventure.\_</li></ol><h3 style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);width:649.531px;font-family:var(--sans-serif)\"><span style=\"font-family:var(--sans-serif)\">Recommended Locations</span></h3><p>A relatively clear section of snow on a hill-side. Ice will work as well. Some trees are fine but rare.\_ There are 4 snowbanks on the map for the players to harvest the strange metal. Place them far apart enough for the players to encounter the Sky Goat Strike hazards.\_</p><h3>Recommended Creatures</h3><p>Animals, beasts, air, cold, electricity, and creatures suited to cold climate.\_</p><h3>Recommended Loot</h3><p style=\"box-sizing:border-box;user-select:text;width:649.531px;color:#1c1c1c;font-size:15.6px\">The entirety of the treasure budget should be given out in raw GP, depending on how many times the Gather Resources exploration activity is performed. The gathered resources should be flavored as digging in the snow and finding chunks of the electric blue metal.</p><table style=\"user-select:text;width:649.641px;border-top:1px solid var(--color-border-light-tertiary);border-bottom:1px solid var(--color-border-light-tertiary);margin-top:var(--p-space,1em);color:#1c1c1c;font-size:15.6px;height:227.672px\" border=\"1\"><tbody style=\"box-sizing:border-box;user-select:text;border:1px solid var(--secondary)\"><tr style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);height:35.4062px\"><td style=\"box-sizing:border-box;user-select:text;width:333.641px;height:35.4062px\">Going to the location</td><td style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);width:315px;height:35.4062px\">25% of total treasure budget</td></tr><tr style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);height:35.4062px\"><td style=\"box-sizing:border-box;user-select:text;width:333.641px;height:35.4062px\">1-4 times</td><td style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);width:315px;height:35.4062px\">50% of total treasure budget</td></tr><tr style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);height:35.4062px\"><td style=\"box-sizing:border-box;user-select:text;width:333.641px;height:35.4062px\">5-6 times</td><td style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);width:315px;height:35.4062px\">75% of total treasure budget</td></tr><tr style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);height:35.4062px\"><td style=\"box-sizing:border-box;user-select:text;width:333.641px;height:35.4062px\">7-8 times</td><td style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);width:315px;height:35.4062px\">100% of total treasure budget</td></tr><tr style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);height:86.0469px\"><td style=\"box-sizing:border-box;user-select:text;width:333.641px;height:86.0469px\">9+ times</td><td style=\"box-sizing:border-box;user-select:text;margin-top:var(--p-space,1em);width:315px;height:86.0469px\">110% of total treasure budget, and the players learn that the metal has the ridges of horns marked on them, as if it was struck by a powerful goat</td></tr></tbody></table>"
