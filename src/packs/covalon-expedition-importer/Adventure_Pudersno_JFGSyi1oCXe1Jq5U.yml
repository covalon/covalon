      - type: action
        img: systems/pf2e/icons/actions/FreeAction.webp
        name: Second Crucible of Capra Rex
        system:
          description:
            gm: ''
            value: "<p><strong>Trigger\_</strong>Mpeshi King is reduced to half HP or less.</p>\n<p><strong>Frequency\_</strong>once per day</p>\n<p><strong>Special\_</strong>The Mpeshi King can use this ability even if he is afflicted with conditions that would normally prevent him from acting (such as stunned).</p>\n<hr />\n<p>With an ear-shattering \"baa!,\" the Mpeshi King launches himself into the sky, rupturing the ground beneath him. The Mpeshi King temporarily leaves the battle; adjust his position in initiative to directly before the current turn. All creatures touching the ground must attempt a <span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">@Check[type:reflex|dc:21|basic:false] save), falling prone on a failure. As a result of the ground rupturing, blue metal shards fly out of the ground, including a large piece of blue metal about the size of a club.</span></p>\n<p>\_</p>\n<p><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">At the beginning of his next turn, the Mpeshi King slams from the sky into the square containing the blue metal club. The explosion deals [[/r (9d6)[electricity]]] electricity damage to all creatures in the encounter with a @Check[type:reflex|dc:25|basic:true] save, and any creatures within 30 feet of the explosion treats their save as one degree worse. Lastly, a massive crater is created as a result of the impact; the floor of the arena descends 100 feet and all creatures touching the ground (except for the Mpeshi King) slide down the rubble dealing [[/r (10)[bludgeoning]]] damage and they become prone. This is not a fall, and flying creatures remain 100 feet above the new ground level. Afterwards, the Mpeshi King takes his turn as normal.\_</span></p>\n<p>\_</p>\n<p><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">If a creature is holding the metal club when the Mpeshi King returns to the battlefield, Mpeshi King aims at that player's square instead. The player can use a reaction to attempt to deflect the Mpeshi King with the club by succeeding at a @Check[type:athletics|dc:28|basic:false] check or succeeding at an attack roll against the Mpeshi King's AC (treat the club as a simple weapon in the club weapon group for the purposes of determining proficiency). If the deflection fails, the Mpeshi King slams into the ground as normal, centered on the player holding the club. If the deflection succeeds, the Mpeshi King is instead launched into a nearby mountain, crashing into it in a crackling explosion of electricity. If this occurs, the Mpeshi King loses hit points equal to half of its remaining hit points, and must use Sleipner Breaker as its first action on its turn in order to return to the battlefield, ignoring the normal leap distance of the ability.</span></p>"
          rules: []
          slug: null
