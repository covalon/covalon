      - sort: 200000
        name: 'Pudersnö Mission B: Investigate the Craters'
        type: text
        _id: nW8wvPf0wcnw2JnT
        title:
          show: true
          level: 1
        image: {}
        text:
          format: 1
          content: "<h3>Hook</h3><p>The tundra ice fields have constant storms and odd craters dotting the slippery surface. Similar conditions were seen at the top of the mountain before our ship crashed. Adventurers need to grab a coat and go investigate the ice fields, gather samples of the environment, and learn what we need to survive at the top!</p><h3>Required Elements</h3><ol><li style=\"list-style-type:none\"><p dir=\"ltr\">There are rocky 5x5 squares scattered around the field. If a PC moves in any direction, they continue to move in that direction until they bump into one of those rocks (pokemon ice gym style). Players cannot change directions while sliding, nothing stops the slide until they bump into an object or creature on the terrain. Leap or other jumps will cause a similar slide. Teleportation will not.\_</p><ol><li dir=\"ltr\" aria-level=\"1\"><p dir=\"ltr\">A blizzard covers the entire area. All PCs must succeed at a <strong>#DC#</strong> Acrobatics check to Maneuver in Flight whenever they attempt to Fly. If the creature is not trained or better in Acrobatics, they automatically crit fail.</p><ol><li style=\"list-style-type:none\"><p dir=\"ltr\">Critical Success The creature can fly normally.</p><ol><li dir=\"ltr\" aria-level=\"2\"><p dir=\"ltr\">Success The creature can fly at half speed.</p></li><li dir=\"ltr\" aria-level=\"2\"><p dir=\"ltr\">Failure The creature doesn't fly, and wastes the action.</p></li><li dir=\"ltr\" aria-level=\"2\"><p dir=\"ltr\">Critical Failure The creature falls.</p></li></ol></li></ol></li><li dir=\"ltr\" aria-level=\"1\"><p dir=\"ltr\">There must be three craters scattered around the adventure that the players will need to find. Upon any player reaching a crater, creatures jump out of the crater or rocks to attack the party.\_</p></li><li dir=\"ltr\" aria-level=\"1\"><p dir=\"ltr\">This area counts as Extreme cold and will deal 2d6 Cold damage every 10 minutes.</p></li><li dir=\"ltr\" aria-level=\"1\"><p dir=\"ltr\">Your exp budget for the first and third encounter must include the Snonado Hazzard worth 40 exp. It will spawn on top of the first creature killed in the first and third encounter and use that creature's initiative. As players are known to do, these encounters can be triggered by them in any order.\_</p></li><li>Up to 2 players can make a <strong>#DC#</strong> Crafting or Nature check per crater to learn about it. Only one PC needs to succeed to get one Investigation Point</li></ol></li></ol><table border=\"1\"><tbody><tr><td><p><span style=\"font-family:Georgia\"><strong>Snownado</strong></span></p><section class=\"traits\"><p dir=\"ltr\">EVOCATION\_ TRAP</p></section></td></tr><tr><td><p dir=\"ltr\" style=\"line-height:1.38;margin-top:12pt;margin-bottom:6pt\"><span style=\"font-family:Georgia\"><strong>Complexity </strong>Complex</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:12pt;margin-bottom:6pt\"><span style=\"font-family:Georgia\"><strong>Description </strong>A 15x15 whirlwind of snow and electricity comes from the sky above the fallen creature.</span></p></td></tr><tr><td><p dir=\"ltr\" style=\"line-height:1.38;margin-top:12pt;margin-bottom:6pt\"><span style=\"font-family:Georgia\"><strong>Disable </strong>Nature or Arcana to dissipate the snownado within 100 feet. Need two successes or one crit success at <strong>#Hazard 2-16 HDC#</strong></span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:12pt;margin-bottom:6pt\"><span style=\"font-family:Georgia\"><strong>Routine </strong>(1 action) Roll a d20 and move the snownado 40 feet as described below.</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:12pt;margin-bottom:6pt\"><span style=\"font-family:Georgia\">1-15 move in a straight line through the nearest PC</span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:12pt;margin-bottom:6pt\"><span style=\"font-family:Georgia\">16-20 move in a straight line through the nearest enemy creature</span></p><p><span id=\"docs-internal-guid-c5ff2d72-7fff-3a55-192e-560dd7dfb609\"><span style=\"font-family:Georgia\">All creatures that are in the path of the snownado take <strong>#Hazard 2-16 Complex Dmg# </strong>with a basic reflex save <strong>#DC#</strong>. Any creature that failed slides away from the snownado in a random direction determined by the GM (see Required elements for sliding).</span></span></p></td></tr></tbody></table><h3>Recommended Locations</h3><p><span id=\"docs-internal-guid-5e2a3ba5-7fff-8473-ddf4-54d11c6852a8\"><span style=\"font-family:Georgia\">An open ice field with rocks.\_ There are 3 craters on the map for the players to investigate and start the encounter.\_</span></span></p><h3>Recommended Creatures</h3><p><span id=\"docs-internal-guid-702e6ec6-7fff-b3ee-73ac-162cb25d1b1c\"><span style=\"font-family:Georgia\">Animals, beasts, air, cold, electricity, and creatures suited to cold climates. All creatures move and fly speeds work as normal despite the environmental natural disasters. Be nice and don't keep the flying creatures out of reach of the players for too long.</span></span></p><h3>Recommended Loot</h3><p><span id=\"docs-internal-guid-b5d671ff-7fff-def6-d3f8-53df9e874f16\"><span style=\"font-family:Georgia\">Any. The people who once lived here may have dropped items or the winds redistributed them into the craters. If the players have 3 Investigation Points, an Investigation Bonus is added in the form of raw GP equaling 10% of the total treasure budget.</span></span></p>"
