      - type: action
        img: systems/pf2e/icons/actions/Passive.webp
        name: Modification - You're Gonna Have a Baaad Time
        system:
          description:
            gm: ''
            value: "<p>Whenever a creature critically fails an attempt to take a hostile action against the Mpeshi King, or when the Mpeshi King critically succeeds on a save against a hostile effect originating from a creature, the creature that attempted the action or created the effect must attempt a @Check[type:will|dc:29|basic:false] save.</p>\n<p>\_</p>\n<p><strong>Critical Success\_</strong>The creature is unaffected.</p>\n<p><strong>Success\_</strong>The creature begins to feel sheepish about fighting. They take a -1 status penalty to all checks and DCs until the beginning of their next turn.</p>\n<p><strong>Failure\_</strong>For a moment, the creature believes that they are actually a goat instead of a heroic adventurer. They drop any items they are currently holding. Until the end of their current turn, they can only perform basic actions (such as a Stride or Step), and they can't perform any actions with the manipulate or linguistic traits. At the end of their turn, they suffer the same effects as are listed in the success entry.</p>\n<p><strong>Critical Failure</strong> The creature so strongly believes that they are actually a goat that they momentarily transform into one. As failure, but the effect lasts until the end of their next turn, and they also physically transform into a goat (this does not change their statistics aside from the penalty listed in the success entry).</p>\n<div data-visibility=\"gm\">\n<p><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">As this is a polymorph effect, it can only affect creatures who are already under a polymorph effect by counteracting the existing one. Its counteract modifier is +22. [[/r 1d20+22]]</span></p>\n</div>"
          rules: []
          slug: null
