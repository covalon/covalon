              system:
                description:
                  gm: ''
                  value: "<p><strong>Trigger</strong> The Mpeshi King would take damage.</p>\n<p><strong>Requirements\_</strong>A goat guard or goat swarm is within 30 ft of the Mpeshi King.</p>\n<p>A goat guard leaps in the way of the incoming damage and takes all of the damage instead of the Mpeshi King.\_</p>\n<p>Or a single goat from the goat swarm will leap in the way of the incoming damage instead of the Mpeshi King. The swarm takes damage equal to the triggering effect to represent the goat loss. This loss of hp to the swarm can't be blocked in any way.\_</p>"
