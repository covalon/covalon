name: Pudersno
img: modules/covalon/images/Pudersno_Base.webp
caption: ''
sort: 0
description: >-
  <div class="block template"><div class="block "><h3
  id="pudersnö">Pudersnö</h3></div><div class="block taglist"><p><span
  class="inline-block tag">Civilization</span></p></div><p>Silhouettes against
  the blinding white.</p><div class="block
  indented"><p><strong>Government</strong> Chief (nomadic
  tribes)</p><p><strong>Population</strong> humans, goblins,
  giants</p><p><strong>Religion</strong> Gunvald, Noctune</p><p><strong>Primary
  Exports</strong> animal skins, ores</p><p><strong>Geography</strong> glaciers,
  snowy mountains, tundra, frozen coastlines</p><p><strong>Fate</strong>
  lightning storm</p></div><hr /><p>The Pudersnö is about as far north as one
  can travel in the known world, inhabited by nomadic tribes who search the
  frozen wasteland for food and precious metals. To the north, tribes of raiders
  controlled the coastline with their swift and easily landed ships. It is a
  harsh environment where the slightest mistake could kill a man. The tribes of
  Pudersnö were strong and hardy, but totally unprepared for the sky’s wrath
  that followed the Cataclysm.</p></div>
