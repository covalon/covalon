folder: null
name: Briarmurk Expedition
pages:
  - sort: 100000
    name: Briarmurk Briefing
    type: text
    _id: MzczdAFCFoRwnTBN
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<h2>Background</h2><p>Briarmurk is a region known for its inhospitable environments and abundance of poisons and diseases. Only the strongest could survive here… but it mustn't have always been this way. A city of tall ziggurats was seen on our arrival to this long forgotten area. Deep in the murk, massive towers of stone reach from the depths; though many are covered by tangled plants, thick mists, and an ever vigilant Blood Moon Iris watching the area.</p><p>Not much is known about what happened here or what it was like before Covalon found it…</p><p>For more information on Briarmurk, see its entry in the<a href=\"https://covalon.github.io/covalon-guide/\"> Covalon Player's Guide</a>.</p><h2>Mission Overview</h2><p>We've been seen, our S.E.N.T;I.PE.D.E. hastily brought to a halt in Briarmurk and have set up a mud-logged base of operations near the shore, a large pillar blocking this area from the moon allowing a camp to be set up. The Iris upon the Blood Moon is constantly watching and the plants and mists seem too thick for us to do anything. We need to figure out how to bypass these problems!</p><h2>How to Run an Expedition</h2><p>Expeditions are composed of two subtypes: missions and finales. Missions are a set of three dungeon-like adventures that are narratively linked, but can be completed in any order. Each mission must include predetermined narrative and mechanical elements while sticking to a theme of locations, creatures, and loot, which are included in its associated journal entry, with the specifics of the blanks to be filled in by the GM of the adventure. Like other adventure types, Dungeon Guides must submit their expedition missions for approval.</p><p>When reading the instructions for an expedition, you may see key terms surrounded by number signs. These indicate that the term should be replaced by a value that's dependent on the adventure's average party level. When submitting your expedition for approval, you must include the values you plan to replace these terms with. Here is a list of terms:</p><ul><li><strong>#Creature [Table Number] [Modifier]#</strong> should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=995\">Building Creatures</a> section of the Gamemastery Guide. For example, \"#Creature 2-8 Minimum# means that you should reference the Building Creatures rules, look for Table 2-8, and use the value in the Minimum column for the creature's level (adjusted for elite or weak as appropriate).</li><li><strong>#Hazard [Table Number] [Modifier]#\_</strong>should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=1043\">Building Hazards</a> section of the Gamemastery Guide. For example, \"#Hazard 2-16 Simple Damage# means that you should reference the Building Hazards rules, look for table 2-16, and use the value in the Simple Damage column for the hazard's level.</li><li><strong>#DC [Modifier]#\_</strong>should be replaced by a value according to the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=554\" target=\"_blank\" rel=\"noopener\">DCs by Level</a> table in the Core Rulebook. If a modifier is included, the value should be adjusted accordingly. For example, \"#DC +5#\" means that you should reference the DCs by Level table, find the value appropriate for the party's average level, then add 5 to it.</li></ul><p>Finales are singular encounters against a narratively significant threat that conclude an expedition. They come in two versions: normal mode and hard mode. Before a finale is cleared for the first time, it can only be run by Covalon administrators and moderators, and is ran at hard mode. Afterwards, the finale can be ran by any Dungeon Guide at normal mode (though players can request hard mode if they'd like). Normal mode can be run in Tier 4 or above, and hard mode can only be run at the highest two tiers, intended for max level characters. Unlike missions, finales use a specific map and specific creatures, included with this module.</p><p>Each finale comes with three variant modifications. When running a normal mode finale, a GM choose one of the three modifications to use, or can roll [[/r 1d3]] to randomly determine which modification to use. When running a hard mode finale, the GM uses all three modifications.\_There are no additional rewards for completing hard mode.</p><h2>Reporting a Completed Expedition</h2><p>When reporting a completed expedition in the Dungeon Summaries channel, use the\_<strong>exact name</strong> of the adventure as the adventure's title. For example, if you ran the first mission of Briarmurk, the summary's title should be \"<span style=\"font-family:Signika, sans-serif\">Briarmurk Mission A: Obscure The Lunar Lens</span>\" exactly. The summary should otherwise follow the same format as dungeons.</p><p>Finally, any narrative-based knowledge or intrigue that the players gain as a result of the expedition should be left out of the summary. For example, if the players complete a bonus objective that allows them to learn special information as detailed in the Required Elements or Recommended Loot section of each journal entry, that should be left out of the dungeon summary.</p>"
