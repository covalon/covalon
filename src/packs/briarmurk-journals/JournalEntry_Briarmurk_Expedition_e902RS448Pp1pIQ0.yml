  - sort: 300000
    name: 'Briarmurk Mission B: Carve A Path'
    type: text
    _id: baoguDsDPL833gbk
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<h3>Hook</h3><p>One of the three threats we are facing seems to have powerful areas full of thick patches of thorny vines and they seem to grow out from there. You need to go in, cut a path through, and stop these plants from growing.</p><h3>Required Elements</h3><p>This mission has three major requirements during its 3 moderate encounters.</p><ol><li><p>All the encounters should be on forested and swampy terrains with at least 50% of the map designated as difficult terrain. By stepping into this terrain the player will take piercing damage equal to their tier per square stepped on (for large PCs they take damage once per 5ft moved even if all 4 squares move across difficult terrain) this is Hazardous Terrain. For Tiers 1-2 reduce this to 20% of the map.</p></li><li><p>During the entire mission due to the Blood Moon constantly watching the players, it will notice anyone who flies more than 10ft above the ground (or away from a surface in the case of heightened terrain). If someone flies higher than that they become Frightened 1, and may be used as the origin point for enemy casters' spells (if applicable), including touch range spells. This effect reduces as normal, but does not reduce if still above this height.</p></li><li><p>The final encounter must have 1 of 3 Twisted Magic Orbs; this counts as 40exp towards the encounters budget (ensure that you use the templates to match the APL of the game). The statistics can be found in the Briarmurk Actors for Mission B.</p></li></ol><p>If the Orb is deactivated (not destroyed) the players may attempt a single skill check using Religion or the Orb's magical tradition skill at <strong>#DC +5#</strong>. If they succeed they learn that the magic holding this together is volatile. Depending on the Orb determines the information they successfully gather.</p><p>Moon - Using the orb you feel a sense of dread. Looking up you see the Blood Moon staring right at you. You (and anyone else adjacent to you) are Frightened 1 for the duration of holding the orb. </p><p>Bramble - Using the orb you find as thorns grow from the ground, they make the area difficult to move through as barbs painfully stab into the legs of any who walk through them.</p><p>Mist - Using the orb you feel as though you are falling into a dream; a nasty dream. You (and anyone nearby) are briefly affected by an incredibly intense moment of nodding off to sleep before suddenly snapping awake.\_</p><p>Additionally, the players would learn that these can be deactivated using a countering spell of at least (APL/2) - 1 rank with a successful counteract. If this counteract is successful it counts as a critical success instead for deactivating the hazard. (Scrying for Moon, Void for Bramble, or Air for Mist though this must be a spell related to wind.) This information is ONLY to be given out if the hazard was deactivated and successfully inspected and for the matching orb.</p><h3>Recommended Locations</h3><p>Locations such as forests and swamps, as well as abandoned city streets are ideal.</p><h3>Recommended Creatures</h3><p>Ideal creatures include undead, humanoids (swamp dwelling creatures such as Iruxi, or swamp adapted zealots, kept alive for many years), plant, fungus, ooze, animals, and beasts.</p><h3>Recommended Loot</h3><p>Up to 50% of the loot budget can be given out as loot related to plants or occult magic. The remainder is to be given as gold. If the players successfully deactivated the Twisted Magic Orb and investigated it afterwards provide them an additional 10% reward as gp.</p><p><br /></p>"
