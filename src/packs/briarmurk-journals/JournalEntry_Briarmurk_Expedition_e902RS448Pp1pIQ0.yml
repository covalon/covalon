      format: 1
      content: "<h2>Briarmurk Finale: The Priestesses of Terrateotl</h2><h3><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Hook</strong></span></h3><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Opening Weekend: We’ve cleared the witches’ defenses, learned their secrets, and distracted the Lunar Lens. Now it’s time to strike back! Make your way to the Apex of Terrateotl and defeat these defenders of the Maw.\_</strong></span></p><p></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Facsimiles: The mists are gathering once again at the Apex of Terrateotl. We need you to strike down these Maw copies of the witches before they can complete any foul rituals.\_</strong></span></p><h3><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Set Up\_</strong></span></h3><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">The Apex of Terrateotl map is split into thirds; Rashai is always placed at the northern point, Asira in the bottom left, and Terina in the bottom right.\_</strong></span></p><p></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Each priestess has an associated Twisted Magic Orb hazard that activates on the dias in the center of the map when they become the Ritual Leader. There are three differently colored lights on the lighting layer to represent these hazards. When a hazard is active, toggle on its light.\_</strong></span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\"><br /></strong></span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">As the PCs climb the Apex of Terrateotl, the party becomes suddenly shrouded in mist. They find themselves atop the temple, split into three groups of two. Allow the PCs to pick their starting locations, with 2 PCs at the top of each staircase, one on each side of the blood line.</strong></span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\"><br /></strong></span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong>Our Bond Maintains Us:</strong><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\"> When combat begins, select one priestess to become the Ritual Leader. That priestess’s associated Ritual Leader effect (Boughbringer, Sleepwalker, or Moonrise) covers the battlefield, and her associated Twisted Magic Orb (Bramble, Mist, or Moon) rolls into initiative.\_</strong></span></p><h3><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">During Combat</strong></span></h3><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong>Our Bond Maintains Us</strong><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">: When the priestesses are reduced below their shared HP thresholds (66% and 33%), change the Ritual Leader to a priestess that has not yet been the leader. The Ritual Leader battleground effect swaps, and the new leader’s associated Twisted Magic Orb hazard rolls into initiative. Remember to toggle on the lights in the lighting layer when you activate a hazard.\_</strong></span></p><p></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong>Immobile: </strong><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">The priestesses cannot move (or be moved) from their ritual positions (except to Stand if knocked Prone). Each has a ranged strike to make up for this, and don’t forget the other priestesses can use the Ritual Leader as the origin point for any of their spells!\_</strong></span></p><p></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong>Spell Mimicking: </strong><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Each priestess has a reaction (Nutrients for the Briars, A Pleasant Dream Taken, or Premonitions of a Dark Future) that if successful, allows them to to cast the spells of their enemies. Each priestess has a blank prepared spellcasting entry on their sheet to track and cast mimicked spells. When you copy a spell, you can add it there, and then delete it after you cast it, or after one round passes. Note: They can only store one mimicked spell at a time, so you don’t need the second slot in that entry unless you’re using the Your Magic Enhances Us modification.\_</strong></span></p><p></p><p>The stairs are not considered part of the battle area, any PC who plans to end their turn on a staircase is considered to have retreated (be clear about this.)</p><p></p><p>The middle of the ritual has a 5ft radius dome surrounding the Maw Vessel, this can not be affected or moved through by any means.</p><h3><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Strategy</strong></span></h3><ul><li><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\" role=\"presentation\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Each priestess is a powerful, intelligent spellcaster who will use her spells for maximum impact.\_</strong></span></p></li><li><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\" role=\"presentation\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Don’t be afraid to have the priestesses spend turns using buff spells like Haste or Villainy (Heroism). Due to the health thresholds from </strong><strong>Our Bond Maintains Us, </strong><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">this combat plays out like a marathon, not a sprint.\_</strong></span></p></li><li><p><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">The priestesses will attempt to mimic any useful spells with their reaction, but also be flexible and cast whatever is most useful once their turn comes up, even if it means losing the mimicked spell.\_</strong></span></p></li></ul><h3><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Modifications</strong></span></h3><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong>The Blood Protects Us: </strong><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">This modification forces players to move and position much more carefully, as they can only affect things in the same third of the arena as them. Line of effect can be complicated - as the GM, you get to make the final call about how abilities interact with this modification. As a general rule, players can only affect creatures or areas within the third of the Apex they are currently standing in. Movement through the blood lines is not restricted.\_Highlight that the blood glows and looks sinister. Do not inform the players what this means until someone tries to do something beyond the lines. This will consume the actions.</strong></span></p><p><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\"><br /></strong></span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong>Your Magic Enhances Us: </strong><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">The priestesses can be much more flexible with which spells they choose to copy, and save them to use at the most optimal time.\_</strong></span></p><p><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\"><br /></strong></span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong>Our Ritual Maintains Us: </strong><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">With this modification, the Twisted Magic Orbs that activate when a priestess becomes the Ritual Leader cannot be fully disabled. They can be disabled only until they have one action remaining (or reduced to 15 feet for the Bramble orb), forcing the players to deal with their ongoing effects.\_</strong></span></p><h3><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Defeating the Trio</strong></span></h3><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Once the 66% and 33% HP thresholds have been reached each Priestess may be killed. Once all 3 are dead any hazards still active are destroyed, and the players defeat the encounter.\_</strong></span></p><h3><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Notes</strong></span></h3><ul style=\"margin-top:0;margin-bottom:0;padding-inline-start:48px\"><li><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\" role=\"presentation\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Three full spellcasters can be a lot to manage in the moment, familiarizing yourself with their spell lists ahead of time is essential!\_</strong></span></p></li><li><p><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">By design, the priestesses have a mix of offensive, defensive, and supportive spells. Thanks to their HP thresholds in </strong><strong>Our Bond Sustains Us</strong><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">, they’re a lot tankier and harder to kill than most spellcasters. You don’t need to (and really shouldn’t) just cast AOE damaging spells three times a round.\_</strong></span></p></li></ul><h3><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Loot</strong></span></h3><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">The entirety of the treasure budget is given out in raw GP, paid by the NPC used for the hook.</strong></span></p><p><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\"><br /></strong></span></p><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Additionally, players unlock the ability to customize their Soul Seed, gaining access to the Plant Aspect.</strong></span></p><h3><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Asset Credits</strong></span></h3><p dir=\"ltr\" style=\"line-height:1.38;margin-top:0pt;margin-bottom:0pt\"><span style=\"font-family:Signika\"><strong style=\"font-weight:normal\" id=\"docs-internal-guid-31a247cb-7fff-f42f-e8c8-66e959079a23\">Thanks go out to Locke for the map and encounter design, and Blythe, Haoran, Kelani, Kona, Kosta, Kouzo, Reginald-8 and Seren for playtest and design support.</strong></span></p>"
