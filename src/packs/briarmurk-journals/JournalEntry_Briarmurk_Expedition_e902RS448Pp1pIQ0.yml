  - sort: 200000
    name: 'Briarmurk Mission A: Obscure The Lunar Lens'
    type: text
    _id: UBQY7beRKQh0i0qj
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<h3>Hook</h3><p>The moon is watching us wherever we go. We need to blind them… or at least make it harder for them to watch us. We have some anti-scrying rituals that if you can get to somewhere closer to the giant moon perhaps you can obscure some of its vision. If this is successful we need you to do some quick covert scouting of the streets so we can find where the Maw Vessel is. Bring your most trusted caster as this will require their capabilities to weave the ritual together (or at least those knowledgeable)!</p><h3>Required Elements</h3><p>While adventuring through the lost city hidden within Briarmurk the party will be hindered by acidic blood rain falling from the incredibly large blood moon over the city. During encounters, the GM will need to provide areas for the party to hide under approximately every 20-40 ft away from each other (it should be approximately one stride, adjust if needed to match the slowest PC in your party) a minimum of 3x3 squares large (adjust so the entire party can fit under this space if your group has lots of animal companions or includes large PCs). This gives players a chance to hide from the rain. If they end their turn not beneath any cover (and are being rained on) they take <strong>#Hazard 2-16 Complex Damage#</strong> as acid damage with no save. All NPCs are immune to this effect. Players are assumed to be taking precautions to not stay under the rain while in exploration mode.</p><p>This expedition requires 3 encounters (2 moderate, 1 dependent upon the ritual below) with the above stated Acidic Blood Rain effect. Finally, after the second encounter, being as close as they can be to the Blood Moon, while under cover they can perform the following ritual (with a Rank equal to the (APL/2) rounded up), after which defenders will potentially be sent to repel the PCs;</p><p><strong>Lunar Obstruction</strong></p><p><strong>Cast</strong> 30 minutes <strong>Cost</strong> Materials Provided; <strong>Secondary Casters</strong> 2</p><p><strong>Primary Check</strong> Arcana, Nature, Occultism, Religion; <strong>Secondary</strong> Arcana, Diplomacy, Nature, Occultism, Performance, Religion.</p><p><strong>Targets</strong> 1 Blood Moon</p><p>You attempt to influence the Blood Moon to obstruct their vision partially in as subtle a way as possible.</p><p><strong>Critical Success</strong> Strands of Magic can be seen from the moon connecting to a small red light atop one of the taller and more grandiose ziggurats, additionally you can take over the ritual for just a moment; capable of seeing three women standing about 90ft apart; one clad in bones with a bow, one in fine attire with ethereal shards around her, and one large woman with a wicked spear atop a triangular ziggurat with a pulsating fleshy chunk in the middle, surrounded by three shining orbs within a ritual of blood before you subtly drop the magic threads; unnoticed. Players now have a chance to move unobstructed and record a little bit of the terrain in a map. Their next encounter will be in the streets with a moderate encounter without the rain effect.</p><p><strong>Success</strong> Players would notice the moon not take notice of their actions, giving them a chance to move unobstructed and record a little bit of the terrain in a map. Their next encounter will be in the streets with a moderate encounter.</p><p><strong>Failure</strong> The eye on the moon takes a moment, as if a bit distracted before lo, the next encounter is triggered as a moderate encounter with an additional 20 experience in the encounter where the players performed the ritual.\_</p><p><strong>Critical Failure</strong> The eye on the moon looks directly at you as a pulse travels nearby. The next encounter is triggered as a moderate encounter with an additional 10*players experience in the encounter where the players performed the ritual. The players will hear (and potentially see) many creatures coming towards them and may run instead of fighting but if they do their rewards for the mission are limited to 70% of the usual reward.</p><h3>Ritual DCs Quick Reference Table</h3><table><tbody><tr><td><p><strong>APL</strong></p></td><td><p><strong>Ritual Rank</strong></p></td><td><p><strong>Primary Check DC</strong></p></td><td><p><strong>Secondary Check DC</strong></p></td></tr><tr><td><p>1</p></td><td><p>1</p></td><td><p>21</p></td><td><p>16</p></td></tr><tr><td><p>2</p></td><td><p>1</p></td><td><p>21</p></td><td><p>16</p></td></tr><tr><td><p>3</p></td><td><p>2</p></td><td><p>24</p></td><td><p>19</p></td></tr><tr><td><p>4</p></td><td><p>2</p></td><td><p>24</p></td><td><p>19</p></td></tr><tr><td><p>5</p></td><td><p>3</p></td><td><p>27</p></td><td><p>22</p></td></tr><tr><td><p>6</p></td><td><p>3</p></td><td><p>27</p></td><td><p>22</p></td></tr><tr><td><p>7</p></td><td><p>4</p></td><td><p>29</p></td><td><p>24</p></td></tr><tr><td><p>8</p></td><td><p>4</p></td><td><p>29</p></td><td><p>24</p></td></tr><tr><td><p>9</p></td><td><p>5</p></td><td><p>32</p></td><td><p>27</p></td></tr><tr><td><p>10</p></td><td><p>5</p></td><td><p>32</p></td><td><p>27</p></td></tr><tr><td><p>11</p></td><td><p>6</p></td><td><p>35</p></td><td><p>30</p></td></tr><tr><td><p>12</p></td><td><p>6</p></td><td><p>35</p></td><td><p>30</p></td></tr><tr><td><p>13</p></td><td><p>7</p></td><td><p>37</p></td><td><p>32</p></td></tr><tr><td><p>14</p></td><td><p>7</p></td><td><p>37</p></td><td><p>32</p></td></tr><tr><td><p>15</p></td><td><p>8</p></td><td><p>40</p></td><td><p>35</p></td></tr></tbody></table><h3>Recommended Locations</h3><p>This mission takes place outside in a ziggurat city. Pyramid/Ziggurat exteriors and city street maps are the best options.</p><h3>Recommended Creatures</h3><p>Ideal creatures include undead, humanoids (swamp dwelling creatures such as Iruxi, or swamp adapted zealots, kept alive for many years), plant, fungus, ooze, animals, and beasts.</p><h3>Recommended Loot</h3><p>Up to 50% of the loot budget can be given out as loot related to blood, water, mist, dream, plant, or moon themed items. The remainder is to be given as gold. If the players successfully complete the Lunar Obstruction ritual provide them an additional 10% reward as gp.</p><p><br class=\"Apple-interchange-newline\" /></p>"
