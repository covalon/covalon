  - sort: 400000
    name: 'Briarmurk Mission C: Memories of A Time Long Past'
    type: text
    _id: XEHXxvM86xdxlcks
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<h3>Hook</h3><p>We felt the heavy dreaming of the mists of Briarmurk already. It seemed more clear, like a dream of the past when we were brought under. If you're brave enough we need some adventurers to sleep and see what can be discovered about these mists.</p><h3>Required Elements</h3><p>This mission includes two moderate combat encounters and a chase skill challenge.</p><p>Players drink a sleep aid provided by the Dungeoneering Society, which allows them to dream and explore the ancient pyramid city beneath Briarmurk during its prime. The Portal Guide warns them their spirit is vulnerable in this dream - if they die while asleep, they die in the waking world as well. In the dream of ancient Briarmurk, the city is clean, the sun shines bright in the sky, and the smells of incense and food are thick in the air, though all the people remain slightly blurry and difficult to interact with.\_</p><p>Three times during this mission, once before each encounter, players have the chance to investigate a historical object from the table below. Each player can roll one <strong>#DC+2#</strong> check per object using an applicable skill (you can determine the skills you allow, these should generally be Wis, Int, or Cha based skills), gaining 2 History Points on a Critical Success, 1 History Point on a Success, and losing 1 History Point on a Critical Failure. If the party gains <strong>#Party Size-2#</strong> History Points for an object, they learn that object's secret.\_</p><p></p><table><tbody><tr><td data-colwidth=\"104\"><p>Object</p></td><td><p>Description</p></td><td data-colwidth=\"379\"><p>Secret</p></td></tr><tr><td data-colwidth=\"104\"><p>Mural of the Sun</p></td><td><p>A woman is in prayer to a great glorious sun above the city. Crops seem to flourish and offerings seem to be given to the sun.</p></td><td data-colwidth=\"379\"><p>An inscription on the mural reads in Common 'Praise be unto Aelia who grants her chosen Rashai her blessings, may the sunlight bathe us forever and keep away the night.'</p></td></tr><tr><td data-colwidth=\"104\"><p>Glyphed Pot</p></td><td><p>A pot for plants with glyphs all over it, it seems to depict plants growing in abundance around a massive tree.</p></td><td data-colwidth=\"379\"><p>An inscription on the pot reads in Common 'Praise be unto Erimia who grants her chosen Asira her blessings, may the plants forever grow in abundance and keep our tables plentiful with the harvest.'</p></td></tr><tr><td data-colwidth=\"104\"><p>Holy Scriptures</p></td><td><p>A book with beautiful gold gilding and thick pages, these scriptures are beautiful to look at aesthetically.</p></td><td data-colwidth=\"379\"><p>Reading the scriptures this is a prayer to the a pantheon of three deities; Aelia, Erimia, and Tycheam. The prayers speak of a ritual where the three bring their powers together for a large blessing that brings bountiful life.</p></td></tr><tr><td data-colwidth=\"104\"><p>Trade Manifests from a Market</p></td><td><p>This stack of papers indicates the movement of goods; specifically a manifest of incoming hides, meats, plants, and herbs.</p></td><td data-colwidth=\"379\"><p>Going through the papers each one is signed by the Terrateotl Tradeyards, Terrateotl Merchants Guild, or the Terrateotl Apothecary.</p></td></tr><tr><td data-colwidth=\"104\"><p>Beautiful Red Flowers</p></td><td><p>Several large gardens of flowers seem to be being plucked and used regularly here. They are tall red, many flowered plants.</p></td><td data-colwidth=\"379\"><p>These are flowers that shouldn’t be. They have a strange iron scent to them. The pollen looks sort of like blood… and perhaps a slight reminder of The Maw’s creations.</p></td></tr><tr><td data-colwidth=\"104\"><p>A Slate Tablet</p></td><td><p>A hefty black tablet with carvings that seem easier to read with your eyes half-closed.</p></td><td data-colwidth=\"379\"><p>An inscription on the tablet's back reads in Common 'Praise be unto Tycheam who grants their chosen Terina their blessings, may our dreams be embraced and may wisdom forever be granted from them.'</p></td></tr></tbody></table><p>After completing the third history point section, the mists thicken into a giant, spectral monster that starts to devour the dream, and the PCs! Begin the chase sequence below.</p><h3>Chase Sequence</h3><p>When the chase sequence begins, all players roll Perception for initiative - this determines how quickly they react to the event and the order in which they'll be attempting to escape from The Collapsing Mist, who is placed at the end of initiative.\_On each of The Collapsing Mist's turns, it attempts to harm the retreating Covalonians, dealing\_<strong>#Hazard 2-16 Complex Damage#</strong> damage with a <strong>#Hazard 2-16 HDC#</strong>\_basic save for Tiers 4-5, and <strong>#Hazard 2-16 HDC -2#</strong> for Tiers 1-3. If a damage is split between two different types each should be half of the required damage (totaling to the appropriate hazard amount).</p><p>The players must overcome a series of Obstacles in order to escape from The Mist. On their turn, a player can attempt a check to Overcome the current Obstacle and earn Chase Points for their party.</p><p>Critical Success\_The party gains 2 Chase Points.<br />Success The party gains 1 Chase Point.<br />Critical Failure The party loses 1 Chase Point.</p><p>Alternatively, instead of making a check to Overcome the Obstacle, a player can gain three actions as normal that they can use to support their fellow party members. A player might even have a spell or ability that allows them to succeed at Overcoming the Obstacle without even needing to make a check, at the GM's discretion. Players cannot Delay during the chase, nor can they attack The Mist.</p><p>Once enough Chase Points have been achieved to clear an Obstacle, the entire party moves onto the next Obstacle. Chase Points do not carry over between Obstacles. Use <strong>#DC#</strong> for Tier 1-3 and <strong>#DC+2#</strong> for Tiers 4 and 5 for the DC of all checks to overcome obstacles. Each Obstacle requires a number of Chase Points to clear based on the size of the party; if there are less than 6 players in the party, reduce the amount of required Chase Points to equal the party size.</p><p>You can edit the journal below with the required Save DCs and damage, the abilities are traited.</p><hr /><h5>The Mist's Presence</h5><p>Chase Points\_6;\_Overcome\_Religion or Occultism to dampen the effects, Melee unarmed strike to close doors as you escape, Fire trait spell to keep the group warm</p><p>The Collapsing Mists coalesce, chilling the area and attempting to pull the spirits of Covalonians out of them.</p><p>Damage: @Damage[(XdX)[spirit],(XdX)[cold]] Save: @Check[will|dc:xx|basic|traits:divine,magical,spirit,cold] save)</p><hr /><h5>Blockades in the Way</h5><p>Chase Points\_6;\_Overcome\_Athletics to move objects, Acrobatics to squeeze through, Crafting or Thievery to disasemble the blockade</p><p>You are quickly halted by blockades of stacked objects you were certain were not there before. Force your way out!</p><p>Damage: @Damage[(XdX)[bludgeoning]] Save: @Check[fortitude|dc:xx|basic] save)</p><hr /><h5>Leave Our City!</h5><p>Chase Points\_6;\_Overcome\_Stealth to go unnoticed, Intimidation to scare them off, Diplomacy to calm them, Deception to convince them you're not actually with the Covalonians</p><p>The citizens seem outraged by your presence now that The Mist has marked you; they begin to throw things at you all!</p><p>Damage: @Damage[(XdX)[slashing]] Save: (@Check[reflex|dc:xx|basic] save)</p><hr /><h5>Briar Thorns Emerge</h5><p>Chase Points\_6;\_Overcome Nature to counteract the magic, Survival to Spot a path, or take a failure to physically force your way through for an automatic success, Perception (#DC+5# for this option)</p><p>Thick roots and twisting thorns tear through the ground and get in your way.</p><p>Damage: @Damage[(XdX)[piercing]] Save: @Check[fortitude|dc:xx|basic|traits:primal,magical,plant] save)</p><hr /><h5>Sun Drops</h5><p>Chase Points\_6;\_Overcome\_Arcana or Nature to craft magical defenses, Performance to dance through the rain</p><p>The sun begins to drip, The Mists blurring and rending the sun apart.</p><p>Damage: @Damage[(XdX)[fire]] Save: (@Check[reflex|dc:xx|basic|traits:fire,magical,arcane] save)</p><hr /><h5>Wake Up!</h5><p>Chase Points Special;\_Overcome\_Special</p><p>The Covalonians are barely outpacing the mist, now is the last thing they have to do. Under the pressure they have to imagine being slapped across the face as they get over their bodies. Everyone must now perform one final save and instance of damage. ending the encounter. Allow your players to RP this portion. No matter the outcome of the roll the players all awaken and leave the dream (if this final basic save takes a player to dying, they are unconscious and dying but not in the dream anymore, along with everyone else).</p><p>Damage: @Damage[(XdX)[bludgeoning]] Save: @Check[will|dc:xx|basic] save)</p><p>The Chase Sequence is the final encounter of the adventure. After completing the Chase Sequence, the GM should return the players to the outpost and conclude the adventure.</p><h3>Recommended Locations</h3><p>This mission takes place inside of ziggurats, or city streets in a dream induced vision of the past (in a dream) before the city sank into the murk.</p><h3>Recommended Creatures</h3><p>Ideal creatures include humanoids (NOT swamp adapted), plant, fungus, ooze, animals, and beasts.</p><h3>Recommended Loot</h3><p>This mission's rewards are given out as GP. If at least 2 secrets are revealed increase the rewards by 10% given as GP.</p>"
