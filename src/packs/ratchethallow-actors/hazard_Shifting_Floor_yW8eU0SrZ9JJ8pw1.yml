  details:
    isComplex: true
    level:
      value: 2
    disable: >-
      <p>On a successful disable, the Shifting Floor is deactivated for one
      round. Once all enemies have been defeated the Shifting Floor is Disabled
      Permanently.</p>

      <p>To disable the Hazard, 2 successes are required on either a
      @Check[type:Athletics|dc:21|name:Disable Shifting
      Floor|traits:action:disable-a-device] (untrained),
      @Check[type:crafting|dc:21|name:Shifting
      Floor|traits:action:disable-a-device] (trained), or
      @Check[type:Theivery|dc:21|name:Disable Shifting
      Floor|traits:action:disable-a-device] (trained) check.</p>
    description: >-
      <p>A 10x10 section of the floor moves horizontally moving any creatures on
      it with it. If it moves a creature so that it would trigger another
      hazard, that hazard will activate at the start of the creatures turn.</p>
    reset: ''
    routine: >-
      <p><strong>Routine</strong> A single 10x10 section of the floor slides up
      to 30 feet in a straight line moving any creatures on it with it.
      Creatures that are large in size or greater fall prone and do not move as
      the floor slides out from under them.</p>

      <p>This is a forced movement effect and DOES NOT provoke attacks of
      opportunity or other reactions triggered by a "movement" action.</p>

      <p>The area where the floor was is replaced with new flooring and does not
      create a pit or hole.</p>
