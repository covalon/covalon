    system:
      description:
        gm: ''
        value: >-
          <p>When the Lord of Gears hits a target with its grappling hook, it
          can choose to use a second action to pull itself to the target instead
          of pulling the target towards it, as long as the target is within the
          first range increment. The targeted creature must succeed on a
          @Check[type:reflex|dc:33|basic:true] save or take Fist Strike damage
          as the Lord of Gears slams into them. This movement does not trigger
          reactions.</p><p>This can move through creatures, but cannot end in
          the same space as one. The Lord of Gears can choose which space it
          ends up in around its target. For the purposes of multi-attack
          penalty, this counts as a normal Grappling Hook attack (and so still
          doesn't increase the penalty until after a follow-up Hydraulic
          Punch).</p>
