          @UUID[Compendium.pf2e.conditionitems.Item.VcDeM8A5oI6VqhbM]{Restrained}.</p><p>If
          Grappling Hook is immediately followed by Hydraulic Punch, only
          increase multi-attack penalty once, after the Hydraulic Punch.
          Hydraulic Punch releases the grab if it hits, as it pushes the target
          away.</p><p>The Lord of Gears can move while it has a target grabbed
