    disable: >-
      <p>On a successful disable, the Steam Vent is disabled.</p>

      <p>To disable the Hazard, 2 successes are required on either a
      @Check[type:Nature|dc:16|name:Disable Arcing
      Horns|traits:action:disable-a-device] (trained),
      @Check[type:crafting|dc:16|name:Arcing
      Horns|traits:action:disable-a-device] (trained), or
      @Check[type:Theivery|dc:16|name:Disable Arcing
      Horns|traits:action:disable-a-device] (trained) check.</p>
    description: >-
      <p>A vent in the floor nearly indistinguishable from any other vent, when
      a creature stands on it releases a 10x10 burst of steam, dealing fire
      damage and concealing the area for one turn.</p>
    reset: ''
    routine: >-
      <p>The Aura increases in diameter by 5 feet up to a maximum of 20 feet
      total aura, any creature that is in the increased aura size must make a
      @Check[type:reflex|dc:16|basic:true] and takes fire damage (as noted in
      the attack listed in the attacks section).</p>

      <p>Creatures inside the Steam Aura are
      @UUID[Compendium.pf2e.conditionitems.Item.DmAIPqOBomZ7H95W]{Concealed} to
      all creatures outside of the steam and all creatures outside the steam are
      @UUID[Compendium.pf2e.conditionitems.Item.DmAIPqOBomZ7H95W]{Concealed} to
      all creatures inside the steam.</p>
