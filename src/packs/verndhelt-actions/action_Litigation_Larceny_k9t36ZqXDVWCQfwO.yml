    value: "<p data-pm-slice=\"1 1 []\"><strong>Frequency</strong> Once per turn</p>\n<p><strong>Requirements</strong> You are adjacent to the Infernal Contract</p>\n<p>You attempt to seize control of the Infernal Contract! Attempt a Diplomacy, Deception, Society, Thievery or applicable Lore check. The DC for Litigation Larceny is a Very Hard check of the boss's level for Tiers 4 and 5 and a Hard check for Tiers 3. On a success, you take control of the Contract, and it works for you. This effect lasts until the start of your next turn, when the contract automatically returns to the most powerful creature in the room. The contract flies up to its speed to them when this happens.\_</p>\n<div data-visibility=\"gm\">\n<p>The most powerful creature in the room is always Yazeri or Solarius.\_</p>\n</div>"
