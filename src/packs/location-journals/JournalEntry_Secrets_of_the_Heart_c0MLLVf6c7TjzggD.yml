  - sort: 100000
    name: Map the Megadungeon Briefing
    type: text
    _id: DpdP064TzT2APejy
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<h2>Background</h2><p>Before the Cataclysm, Covalon was a small barony ruled by Baron Freetide. Thanks to an artifact called the Heart of Terra, Covalon became the last bastion of civilization, growing into the city it is now after the apocalypse. Covalonians have struggled for years against a foe called The Maw. In attempts to defeat it, they realized the Maw has vessels all over the world of Elleaterra. Via our various Expeditions, we’ve started travelling the world to destroy these vessels, and reclaim pre-cataclysm civilizations there. In our last Expedition, we destroyed the Maw vessel in Varceta, but the Heart struggled. Its power is spread too thin.</p><p>This worrying development launched an investigation into where Baron Freetide obtained the Heart. Our research and communions with the Heart itself have led us to a frozen island in the reaches of Pudersno, to the ancient ruin of an underground civilization once inhabited by antfolk - Xoria. We must explore and map this expansive underground ruin to restore the Heart.</p><h2>Overview</h2><p>Players must explore these ruins (“The Megadungeon”) floor by floor. “Floor” isn’t literal, it just describes a general depth. On each floor, we must @UUID[Compendium.covalon.secrets-of-the-heart-items.Item.sBpMYHheCLJF0z5t]{Map the Megadungeon} to locate new Zones (abstracted geographical locations in the ruins), and complete specific floor objectives before we can discover and begin exploring the next floor.</p><h2>How to run Map the Megadungeon Adventures</h2><p>Each floor of the Megadungeon has specific required elements in addition to the following general outline.</p><p>When you run an adventure for this event, either the GM or the PCs pick a discovered Zone to explore from the <a href=\"https://docs.google.com/spreadsheets/d/1dzilC2b26GZB2L30auCc-rcilIjtGiM1QBzTSyek_8I/edit?usp=sharing\">Map the Megadungeon</a> spreadsheet. The flavor of the zone can influence what kind of maps and monsters you use for your session, such as using aquatic monsters in the Underground Lake, or fungus/plant monsters in the Mushroom Farmlands. You’re also free to stick to the recommended locations and monsters for that floor as a whole. During the adventure, all PCs have access to the @UUID[Compendium.covalon.secrets-of-the-heart-items.Item.sBpMYHheCLJF0z5t]{Map the Megadungeon} exploration activity. This activity can be used instead of Raise a Shield, Scout, Repeat a Spell, etc. PCs will have the chance to use this activity as described on the required elements for each floor.</p><p>These adventure descriptions also use the same key terms as expeditions, as listed below.</p><ul><li><strong>#Creature [Table Number] [Modifier]#</strong> should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=995\">Building Creatures</a> section of the Gamemastery Guide. For example, \"#Creature 2-8 Minimum# means that you should reference the Building Creatures rules, look for Table 2-8, and use the value in the Minimum column for the creature's level (adjusted for elite or weak as appropriate).</li><li><strong>#Hazard [Table Number] [Modifier]#\_</strong>should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=1043\">Building Hazards</a> section of the Gamemastery Guide. For example, \"#Hazard 2-16 Simple Damage# means that you should reference the Building Hazards rules, look for table 2-16, and use the value in the Simple Damage column for the hazard's level.</li><li><strong>#DC [Modifier]#\_</strong>should be replaced by a value according to the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=554\" target=\"_blank\" rel=\"noopener\">DCs by Level</a> table in the Core Rulebook. If a modifier is included, the value should be adjusted accordingly. For example, \"#DC +5#\" means that you should reference the DCs by Level table, find the value appropriate for the party's average level, then add 5 to it.</li></ul><h2>Reporting a Completed Adventure</h2><p>One of the PCs in your group must volunteer to be the Cartographer. At the end of the adventure, the Cartographer is responsible for adding any gained Map Points to the zone they explored and filling out the Adventure Log line in the <a href=\"https://docs.google.com/spreadsheets/d/1dzilC2b26GZB2L30auCc-rcilIjtGiM1QBzTSyek_8I/edit?usp=sharing\">Map the Megadungeon</a> spreadsheet. The GM also needs to post in #dungeon-summary with any special findings from the adventure (as described on each floor), and ping @Kelani (Kelani does not need to ping herself). For the body of your summary, feel free to copy/paste whatever your cartographer posts in the Adventure Log!</p><h2>Required Loot</h2><p>Map the Megadungeon adventures follow the same EXP and loot values as a dungeon. All adventures in the Megadungeon should include at least one, up to <strong>#Party Size#</strong> number of Xorian Crystals from Appendix A. All these items can be found in the “Xorian Crystals” item folder. The rest of the loot budget follows normal dungeon loot guidelines: recovered magic items, ancient valuables or coins, raw gold flavored as valuable metals or magical reagents, etc.</p><p></p>"
