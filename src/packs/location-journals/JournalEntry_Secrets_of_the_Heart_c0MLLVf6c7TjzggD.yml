  - sort: 300000
    name: 'Floor One: Hidden Things and Secret Lore'
    type: text
    _id: PdwuBHjQOIIoxl4D
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h2>Hook</h2><p>We’ve found the archaeological dig site where the Heart
        of Terra came from, but the tunnels leading below are labyrinthine and
        dangerous. We need adventurers to map the area and bring back anything
        you can find that can shed light on the people who lived here, and what
        we may be dealing with as we delve deeper.</p><h2>Required
        Elements</h2><p>This floor’s adventures consist of three moderate
        encounters. At least a third of the total EXP budget for the session
        must be spent on hazards. You may use the hazards in the Secrets of the
        Heart Floor One actors folder, or any other hazards you see fit. Hazards
        not from this module should be flavored as mysterious ancient technology
        powered by a strange mixture of primal and divine magic reminiscent of
        the Heart of Terra.</p><p>Before each of the three encounters, each PC
        can choose to attempt to
        @UUID[Compendium.covalon.secrets-of-the-heart-items.Item.sBpMYHheCLJF0z5t]{Map
        the Megadungeon}. For every <strong>#Party Size/2#</strong> (round down)
        Map Points they earn, they find a Secret Item from Table 1 below. This
        level of the megadungeon is particularly active. If the players attempt
        to rest for longer than about ten minutes, (or thirty minutes for tiers
        1 and 2) their rest is interrupted by the next encounter, and they lose
        one chance to Map the Megadungeon.</p><p>When posting your dungeon
        summary, ping @Kelani and include the number of Secret Items discovered.
        Nature is an applicable skill to
        @UUID[Compendium.covalon.secrets-of-the-heart-items.Item.sBpMYHheCLJF0z5t]{Map
        the Megadungeon} on this floor, as the geography is mostly natural
        caves.</p><h2>Recommended Locations</h2><p>Signs of civilization can be
        seen on this floor, but the geography is still mostly natural. Maps can
        include underground caves, passages, tunnels, giant mushroom forest,
        underground rivers or lake shores.</p><h2>Recommended
        Creatures</h2><p>Hazards as per the Required Elements. Cave dwelling
        animals/beasts/aberrations, “classic” dungeon monsters such as oozes,
        aquatic monsters in river or lake zones, fungus or plant monsters in
        fungal zones, constructs flavored as ancient constructions of failing
        primal and divine magic (avoid electrical or clockwork constructs),
        earth or other elementals thematic to the zone.</p><h2>Table 1 - Floor
