  - sort: 1000000
    name: 'Appendix B - Mission B: Creating Troops in Foundry'
    type: text
    _id: CfSqRAoQCoPt09zH
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Troops are a bit tricky to use in Foundry. While you can use a single gragantuan token for a healthy troop, this makes it difficult to reduce the size of the troop as it takes damage. By using the Token Attacher module and the Link Actor Data setting, it's possible to create robust troops that work better with the system rules.</p><ol><li>Download, install, and enable the <a href=\"https://github.com/KayelGee/token-attacher\" target=\"_blank\" rel=\"noopener\">Token Attacher</a> module.</li><li>Import the creatures that you want to create troops for, and give them unique names. For example, if you need to make two Gravespire Troops, import two of them from the Compendium and name one \"Gravesquire Troop A\" and the other \"Gravesquire Troop B.\"</li><li>In the Prototype Token settings for the creature, on the \"Identity\" tab, check the \"Link Actor Data\" box.</li><li>In the Prototype Token settings for the creature, go to the \"Appearance\" tab, unlock the \"Size: Dimensions (Grid Scpaces)\" setting and set the width and height to 1. (You\_<strong>must</strong> click the lock icon to unlock the setting even if the width and height already appear to be 1 by 1.) Be sure to click Update Token afterwards.</li><li>Place sixteen of the actor tokens onto the map, in a 4x4 grid.</li><li>Select <strong>the first (top-left)</strong> of the actor tokens and open the Token Attacher UI (it's the chain link icon found under Token Controls in the top-left of Foundry).</li><li>Now select all sixteen of the tokens, and then de-select (shift+click) the first (top-left) token.</li><li><p>Select \"Attach Selected Elements.\"</p><ul><li>If you get an error here that says \"element already in a chain of attachments,\" it's because you have the first token selected. Select all tokens, click \"detatch all elements,\" close the Token Attacher UI, then start over again from step 6.</li></ul></li></ol><p>You can now control the entire troop by controlling the token in the top-left. Reducing the HP of the top-left token will similarly reduce the HP on all of the tokens. When you need to delete some of the tokens due to the troop crossing an HP threshold, you can select the first token, \"detach all elements,\" delete the required number of tokens, then perform steps 6-8 again to recreate the attachment.</p>"
