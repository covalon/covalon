  - sort: 300000
    name: 'Drifthaven Mission B: Shred and Smear'
    type: text
    _id: cZpGyGd3R9wRvx4g
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<h3>Hook</h3><p>Drifthaven is a veritable hive of undead. While most of them are mindless and have slow reflexes, they're still numerous enough to render almost any strategies involving stealth or subterfuge completely useless. <em>Almost.</em> It's risky, but by attracting the attention of the undead army and luring them to a trap, and detonating a huge amount of vitality energy, it may be possible to destroy a significant portion of the army and distract the rest away from the clandestine operations being carried out by other Covalon agents.\_<strong>Note: Any PCs with negative healing will be asked to use a special item that will temporarily disable their negative healing for the duration of this adventure. Please make this clear to the players in the scheduled-events hook for this adventure.</strong></p><h3>Required Elements</h3><ol><li><p>This mission follows a five-scene structure, and the requirements of each scene are fairly rigid. The GM should not add any additional scenes or encounters beyond the ones mentioned in this journal; these scenes account for the entirety of the XP budget for a party of six.</p></li><li><p>There are three variations of Scene 4, and the actions of the players in that scene can lead to one of six variations of Scene 5. The available variations of Scene 5 are dependent on the selected variation of Scene 4, so while prepping this adventure, the GM should choose one of the following variations:</p><p>\_</p><table><tbody><tr><td><p style=\"text-align:center\">\_</p></td><td><p style=\"text-align:center\"><strong>Necromatic Weapon</strong></p></td><td><p style=\"text-align:center\"><strong>Final Encounter</strong></p></td></tr><tr><td><p style=\"text-align:center\"><strong>Variation #1</strong></p></td><td><p style=\"text-align:center\">The Vesitbule</p></td><td><p style=\"text-align:center\">Graveknight-Captain</p></td></tr><tr><td><p style=\"text-align:center\"><strong>Variation #2</strong></p></td><td><p style=\"text-align:center\">The Unshaper</p></td><td><p style=\"text-align:center\">Undead Horde</p></td></tr><tr><td><p style=\"text-align:center\"><strong>Variation #3</strong></p></td><td><p style=\"text-align:center\">B.F.C. (Big Fiendish Cannon)</p></td><td><p style=\"text-align:center\">Zombie Colossus</p></td></tr></tbody></table></li><li><p>There is an in-game time limit for this adventure, so players are restricted on when they can take time for long exploration activities (such as using Treat Wounds or Refocus). Each scene will specify how much time the players can take before they need to move on.</p></li><li><p>Players always can always flee and abandon the mission. Depending on their perfomance, fleeing adventurers may still earn rewards. See the \"Required Loot\" section for more information.</p></li></ol><h3>Scene 1: Mission Briefing</h3><p>The mission briefing NPC gives the players four Overinfused Vitality Energy Crystals, which are highly unstable and are set to detonate in\_<strong>just under one in-game hour</strong>, and confers the following information:</p><ul><li><p>Scouts have been watching Drifthaven from afar for quite some time, and believe they have identified one of the yurts to be an armory for the undead army. The primary goal of this mission will be for the PCs to infiltrate the armory and destroy it.</p></li><li><p>The sheer volume of undead in Drifthaven prevents Covalon from hiding its other missions. The party's secondary goal is to divert attention from their allies by destroying the armory as loudly as possible before escaping in the ensuing chaos.</p></li><li><p>Players can rig the Overinfused Vitality Energy Crystals to destroy the armory and help slay the undead their blasts will draw.</p><ul><li><p>Any PCs in the party with the Negative Healing ability are provided a Scrap of the Contract Forged in Unholy Flames. Once signed, the contract disables their Negative Healing ability for 1 hour.\_<strong>PCs who refuse to sign are prohibited from participating for their own safety.</strong></p></li></ul></li><li><p>They need to draw attention, but they need to reach the armory alive. The PCs will need to take vantage on a nearby hill to observe the city and plan their infiltration.</p></li></ul><p>The players can take as much time as they need to prepare during this scene, including making daily preparations and usage of any long exploration activities.</p><h3>Scene 2: Hatching a Plan</h3><p>The PCs travel to a hilltop overlooking Drifthaven. There is immense corruption in the city. Scores of undead walk on black, wilted fields amid yurts now stitched of flesh rather than canvas.</p><p>From here, the PCs can see the armory and draw a strategy to safely approach it. Each player makes a Recall Knowledge check. This check can be made with any skill other than Stealth, and the DC is\_<strong>#DC+2#</strong>, or\_<strong>#DC#</strong> for Intelligence skills. (Stealth is not appropriate because the goal of this mission is to be as\_<em>unstealthy</em> as possible.)</p><p>Players earn a Strategy Point by succeeding their check, or two on a critical success, and lose one on a critical failure. Record the party's total Strategy Points, but do not reveal the total, which will be relevant in later parts of the adventure.</p><p>Some example strategies include shoving through packs of undead(Athletics), shouting to draw their attention (Diplomacy, Deception, Performance), or reciting prayers for protection (Religion). GMs should encourage creative ideas, granting circumstance bonuses for particularly appropriate approaches.</p><p>Players can take up to 30 minutes of in-game time for this scene, but they probably won't need to use many long exploraiton activities that they didn't already perform in Scene 1.</p><h3>Scene 3: The Approach</h3><p>Narrate the players' approach to the armory yurt, incorporating your players' strategies and rolls. Successes draw undead or protect the players. Failures expose them to danger.\_<strong>There is no time for PCs to perform long exploration activities during this scene.</strong></p><p>The players reach the armory yurt, but they've attracted a little\_<em>too</em>\_much attention and must thin out the gathered undead before they can rig the crystals. The party faces three Mixed Undead Swarms, with additional modifiers determined by their number of Strategy Points.\_\_</p><p>\_</p><table><tbody><tr><td data-colwidth=\"238\"><p style=\"text-align:center\">4 or more Strategy Points</p></td><td><p style=\"text-align:center\">No modifiers</p></td></tr><tr><td data-colwidth=\"238\"><p style=\"text-align:center\">3 Strategy Points</p></td><td><p style=\"text-align:center\">Each PC is off-guard until their first turn.</p></td></tr><tr><td data-colwidth=\"238\"><p style=\"text-align:center\">2 Strategy Points</p></td><td><p style=\"text-align:center\">As above, and all enemies receive a +2 circumstance bonus to their initiative.</p></td></tr><tr><td data-colwidth=\"238\"><p style=\"text-align:center\">1 Strategy Point</p></td><td><p style=\"text-align:center\">As above, and all PCs are afflicted with <strong>#Tier#</strong>d4 persistent bleed damage for a maximum of 3 rounds.</p></td></tr><tr><td data-colwidth=\"238\"><p style=\"text-align:center\">0 or less Strategy Points</p></td><td><p style=\"text-align:center\">As above, and all PCs are frightened 1 (if T1 or T2) or slowed 1 (if T3 or higher) for 1 round.</p></td></tr></tbody></table><p>\_</p><p>After defeating the Mixed Undead Swarms, the PCs proceed inside the armory yurt.</p><h3>Scene 4: Sabotage</h3><p>The players have only 10 minutes to sabotage the armory before more undead close in. They can use the time to Rig a Crystal or Junk the Equipment in addition to any exploration activities they can normally use.</p><p>The party earns Strategy Points and Crystal Points in this Scene. Strategy Points earned in this scene are cumulative with ones earned earlier. Do not reveal the total.</p><hr /><p><strong>RIG A CRYSTAL</strong></p><section class=\"traits\"><p>Manipulate</p></section><p><strong>Requirements</strong> one overinfused vitality energy crystal</p><p>You spend 5 minutes to rig one of the overinfused vitality energy crystals to the fleshflaps of the yurt. The party gains 1 Crystal Point.</p><hr /><p><strong>JUNK THE EQUIPMENT</strong></p><section class=\"traits\"><p>Manipulate</p></section><p>You spend 5 minutes to destroy equipment in the armory. The party gainst 1 Strategy Point.</p><hr /><p>When a player uses the Junk the Equipment activity, they attempt a secret\_<strong>#DC+2#\_</strong>Perception check. On a success, they find one of three unique necromatic weapons:</p><ol><li>The Vestibule: a longsword with a blade made of pure void energy</li><li>The Unshaper: a Dwarven scattergun modified to unleash an arsenal of void energy grapeshot</li><li>The B.F.C.: a big fiendish (hand) cannon configured to unleash massive blasts of void energy.</li></ol><p>The vitality crystal explosion will destroy the weapon, but the players believe they can use a crystal to turn the weapon against its makers. They gain access to the following activity:</p><hr /><p><strong>HACK THE WEAPON</strong></p><section class=\"traits\"><p>Manipulate</p></section><p><strong>Requirements\_</strong>one overinfused vitality energy crystal (one of the ones used for the Rig a Crystal activity can be reappropriated for this activity; the party loses 1 Crystal Point if they do so)</p><p>You spend 5 minutes attempting to use an overinfused vitality energy crystal to hack the necromatic weapon, causing it to wield vitality energy instead of void. Attempt a <strong>#DC#</strong> Crafting or Religion check. On a success, the crystal is consumed and the weapon changes to deal vitality damage. On a failure, the crystal is not consumed and the player can try again (no additional penalty for critical failure).</p><hr /><p>The necromatic weapon is a magical weapon that has the normal statistics of a @UUID[Compendium.pf2e.equipment-srd.Item.LJdbVTOZog39EEbi]{Longsword}, @UUID[Compendium.pf2e.equipment-srd.Item.jcIabnkJgjwzK6Og]{Dwarven Scattergun}, or @UUID[Compendium.pf2e.equipment-srd.Item.4LJEpZ2HkCu9BvHI]{Hand Cannon}, except it deals void damage instead of its normal damage type and does not require ammunition. (If the weapon was successfully hacked, it deals vitality damage instead.)</p><p>\_</p><p>A discovered necromantic weapon can be taken, regardless of whether it is hacked. An unhacked weapon is destroyed if it is within the area of the vitality energy explosion in Scene 5. A hacked weapon not used for its special purpose in Scene 5 is consumed in a burst of vitality energy just before the players return to camp. If player behavior creates a scenario not listed here, refer to @UUID[.JxNSYzQ4alnZSPpz]{Mission B Appendix A: Edge Cases}.</p><h3>Scene 5: Crescendo</h3><p>After the 10 minutes of Scene 4 have expired, the players must face the gathered undead horde outside the yurt while they wait for the overinfused vitality crystals to detonate. <strong>There is no time for PCs to perform long exploration activities during this scene.</strong> The encounter the players face is dependent on which variation is in play:</p><ol><li>The Vesitbule: a Graveknight-Captain and two Gravesquire Troops (or a Skeletal Grand Champion and two Skeletal Troops for T1 and T2)</li><li>The Unshaper: an Undead Horde and two Mixed Undead Swarms</li><li>The B.F.C.: a Zombie Colossus and two Zombie Troops</li></ol><p>The players know they must survive four full rounds for the crystals to explode, but their number of Crystal points determines the force of the explosion.</p><table style=\"width:100%;margin-left:auto;margin-right:auto\" border=\"1\"><colgroup><col style=\"width:50.4854%\"></col><col style=\"width:49.5146%\"></col></colgroup><tbody><tr><td style=\"text-align:center\">4 Crystal Points</td><td>The vitality energy explosion immediately destroys all creatures in the encounter with the negative healing ability.</td></tr><tr><td style=\"text-align:center\">3 or less Crystal Points</td><td>The vitality energy explosion deals\_<strong>#Creature 2-12 Unlimited Use#\_</strong>vitality damage to all creatures in the encounter one time for each Crystal Point (maximum 3 times).\_</td></tr></tbody></table><p>The Graveknight-Captain (or Skeletal Grand Champion), Undead Horde, and Zombie Colossus all have special ability that prevents them from taking any damage unless they are targeted by an attack from a hacked necromantic weapons. Parties that did not hack a weapon must survive for until the end of round 4, while parties who did must rely on the weapon to disable their foe's damage immunity.</p><p>A party that earned fewer than 3 Crystal points and did not hack a weapon cannot defeat the Graveknight-Captain (or Skeletal Grand Champion), Undead Horde, or Zombie Colossus and must flee to survive. Fleeing fails the secondary objective, but players still earn rewards based on their accumulated Strategy Points. If you encounter a situation involving the players' use with the necromatic weapon that this adventure text doesn't cover, please see @UUID[.JxNSYzQ4alnZSPpz]{Mission B Appendix A: Edge Cases}.</p><p>After completing the encounter, the explosion thins the undead enough for the party to safely return to camp. A fleeing party puts the undead on high alert, endangering other Covalon agents in Drifthaven.</p><h3>Recommended Locations</h3><p>Fairgrounds or meadows/plains featuring lots of tents.</p><h3>Recommended Creatures</h3><p>This adventure only uses the creatures mentioned in the above scenes, which can be found in the actors compendium of the Drifthaven folder.</p><p>These creatures are: Mixed Undead Swarm, Graveknight-Captain, Gravesquire Troop, Skeletal Grand Champion, Skeletal Troop, Undead Horde, Zombie Colossus, and Zombie Troop. <strong>Use elite and weak modifiers to adjust to the average party level as neccessary.</strong></p><p>For an elegant workflow to run troops in Foundry, see @UUID[.hBo1IoyL48Ehcl6w]{Mission B Appendix B: Creating Troops in Foundry}. For a less elegant, but faster workflow, you can use Link Actor Data and 16 tokens to represent a troop (each troop will require a separate character sheet).</p><h3>Recommended Loot</h3><p>100% of the treasure budget should be awarded in the form of raw gp, with the following breakdown:</p><ul><li>10% per Strategy Point earned (maximum 7)</li><li>40% if the PCs defeat the encounter in Scene 5 without fleeing</li></ul><p>The total amount of raw gp the players can earn is 110% of the total treasure budget by completing all of the above objectives.</p><p>\_</p>"
