  - sort: 700000
    name: Drifthaven Finale
    type: text
    _id: Hlc5m9N6pKnZOv3p
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h2>Lich Faltyr and the 7000 Skeletons</h2><h3>Hook</h3><p>Once again
        death seeps through the cracked ground of Drifthaven. Reports of
        Faltyr's vile miasma has come to our attention and we need assistance of
        the adventurers to clear out his grasp of the land once again! We cannot
        allow his rituals to complete lest we risk losing our
        sapling!</p><h3>Spooky, Scary, and Too Many Skeletons</h3><p>The Maw has
        spawned a copy of Faltyr to continue to grow the necromantic holding of
        the Drifthaven area. He comes for the sapling, which Covalon must defend
        at all costs.</p><p>The players begin at the south entrance of Faltyr's
        great hall. One Lurching Troop and one Skeleton Sorcerer Troop are
        waiting for the players as they arrive, with Faltyr and two more
        Lurching Troops awaiting in the final room. Choose one of Faltyr's
        contingencies to be active and roll for any modifications. For Hard
        Mode, use all three modifications (<strong>Extra Precautions, Greater
        Soul Cages, Unholy Reservoir</strong>).</p><p>The players must take a
        slow and deliberate path in order to make it to the great hall safely or
        they may risk gathering the attention of the wandering undead hordes.
        This prevents use of items or abilities that grant effects with a
        duration of lass than 8 hours before combat.</p><p>The players must wade
        through the hordes of skeletons in order to find a key that is present
        around one of the members of the Skeleton Sorcerer Troop. The players
        must either
        @UUID[Compendium.pf2e.actionspf2e.Item.RDXXE7wMrSPCLv5k]{Steal} the key
        or defeat the troop in its entirely. The moment the troop is defeated
        the key shines bright, yanking itself from whomever was holding it and
        unlocking the door to proceed.</p><p>When the door is unlocked and
        opened add Faltyr to in the initiative immediately following the current
        turn, rolling initiative for his two Lurching Troops as normal. The
        room's ceiling is 10 feet high and any windows present in the room are
        impassable terrain. Players can escape the encounter through the hall's
        southern entrance, if needed.</p><p><strong style="font-weight:normal"
        id="docs-internal-guid-51da8832-7fff-e854-9cec-a72737876399">This Finale
        is balanced for parties with an APL at the middle of their tier. If the
        party’s APL is a full level above or below the middle, apply the Weak or
        Elite Template to all hostile creatures.</strong></p><h3>Contingencies
        for any Occasion</h3><p>This Finale uses custom "contingencies" that
        Faltyr has prepared for the party that is attempting to slay him. These
        abilities are meant to be chosen with the party in mind, using the one
        that seems to work best against the group that you are running for. Some
        contingencies have different forms depending on what tier the game is
        being run for.</p><h3>Tactics Overview</h3><p>Faltyr is a wisened lich
        ready to use any and every tactic and ability they have at their
        disposal to prevent his defeat. Using
        @UUID[Compendium.covalon.drifthaven-actors.Actor.nCvGcFBfN9L6JxDO.Item.Cg7u0gqOlrsVF5jo]{Channel
        Energy} only when it is safe to do so will help maximize his life as
        Faltyr will prioritize his own safety at all times. In the event that
        players attempt to "redecorate" Faltyr's domain by using walls to
        outplay him, Faltyr has access to the
        @UUID[Compendium.covalon.drifthaven-actors.Actor.nCvGcFBfN9L6JxDO.Item.UpCfIFeSDntwB88V]{Domain
        Control} ability to remove them.</p><p>Faltyr's Skeleton Sorcerer Troop
        have been trained to enact cruelty and malice at every available moment.
        Each of its abilities should be used to inflict the most amount of
        damage against the party, even at the cost of having its allies within
        its blast range.</p><p>Faltyr's Lurching Troops are mindless and should
        be treated as such. Their only goal is to hinder the movement of
        intruders and are instructed to use their
        @UUID[Compendium.covalon.drifthaven-actors.Actor.Fpbo0NSA44JvxV5m.Item.8FPunrCDILzCnLCv]{Grasp
        of the Grave} ability to grab onto enemies whenever possible. If the
        Lurching Troop already has any number of enemies grabbed, it is free to
        use its actions to lash out with full effect.</p><p>Encourage the
        players to roleplay their movement through the hordes of Faltyr's undead
        and play up the power fantasy of destroying dozens of
        enemies.</p><h3>Loot</h3><p dir="ltr"
        style="line-height:1.38;margin-top:5pt;margin-bottom:5pt">The entirety
        of the treasure budget is given out in raw GP, paid by the NPC used for
        the hook. Additionally, players unlock the ability to customize their
        Soul Seed and gain access to the Death<strong> </strong>aspect.</p>
