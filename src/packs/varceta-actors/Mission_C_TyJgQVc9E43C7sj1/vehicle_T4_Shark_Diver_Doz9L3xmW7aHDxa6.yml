  - type: action
    name: Spin
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Requirements</strong> You are at the piloting/jaws control
          mechanism. The Sharp Turn action must have been taken.</p><p>Attempt a
          piloting check, with the following effects. If the Shields! ability is
          active, half all the angles. </p><p><strong>Critical Success</strong>
          You can spin the shark's heading up to 180
          degrees.</p><p><strong>Success </strong>You can spin the shark's
          heading up to 90 degrees.</p><p><strong>Failure </strong>You can spin
          the shark's heading up to 90 degrees, but you either over or
          undershoot by up to 45 degrees.</p><p><strong>Critical Failure
          </strong>The shark spins to a random angle and becomes
          <em>uncontrolled.</em></p>
