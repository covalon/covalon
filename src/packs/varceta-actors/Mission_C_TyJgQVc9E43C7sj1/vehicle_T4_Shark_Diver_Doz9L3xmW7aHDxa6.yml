  - type: action
    name: Easy to Repair
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>The Dungeoneering Society's best have designed this vehicle to be
          especially easy to patch up from the inside. If you have the
          @UUID[Compendium.pf2e.feats-srd.Item.ASy9AKEIRxPYUi5o]{Quick Repair}
          feat, you count as one proficiency rank higher when you use it on the
          Shark Diver. If you're already Legendary in crafting, you restore an
          additional 5 hit points, or 10 hit points on a critical success to
          Repair. The DC to Repair the Shark Diver is equal to its Piloting
          DC.</p>
