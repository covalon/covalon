  - type: action
    name: Control Mechanisms
    system:
      description:
        gm: ''
        value: >-
          <p>There are four control mechanisms located in each quadrant of the
          Shark Diver. The Jaws, Port Guns, Starboard Guns, and the Tail. There
          is space for two PCs at each control mechanism, and a PC must be
          adjacent to a control mechanism to use it. Abilities used at a control
          mechanism can only affect targets in a 180 degree hemisphere around
          that mechanism's side of the shark. IE, the Jaws attack can only
          target enemies in reach in a 180 degree arc in the direction of the
          shark's current heading.</p><p>Strikes made from the control
          mechanisms count as either melee (Jaws/Tail) or ranged (Jolt Gun)
          simple weapon Strikes for the purposes of any abilities the player
          using it may have, such as the Precision ranger edge, Sneak Attack,
          Reactive Strike, Power Attack, etc. </p><p>The control mechanisms can
          transmit spells and any other auditory effects (Demoralize, Bon Mot)
          to the outside. A PC must be adjacent to a control mechanism to use
          this effect, and can only target creatures in a 180 arc around
          whatever side of the shark their mechanism is, at whatever the range
          of their spell or ability is.</p>
      rules: []
      slug: null
