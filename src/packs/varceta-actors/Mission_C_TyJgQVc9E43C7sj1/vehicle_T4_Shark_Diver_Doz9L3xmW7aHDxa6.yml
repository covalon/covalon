    name: Prepare / Unleash Electricity
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Special </strong>This action can only be taken at the port
          and starboard control mechanisms.</p><p><strong>Frequency</strong>
          once per ten minutes; <strong>Effect</strong> A crew member must use
          this activity on their turn to prepare the electrical components at
          one of the Jolt Gun control stations, and then a second crew member
          can use this ability again within a round at the other Jolt Gun
          control station to unleash a huge electrical blast, dealing
          @Damage[8d12[electricity]] damage to all creatures within 15 feet of
          the shark diver. Crew and passengers of the shark diver are
          unaffected. Affected creatures must attempt a
          @Check[reflex|dc:30|basic] save.<br /></p>
