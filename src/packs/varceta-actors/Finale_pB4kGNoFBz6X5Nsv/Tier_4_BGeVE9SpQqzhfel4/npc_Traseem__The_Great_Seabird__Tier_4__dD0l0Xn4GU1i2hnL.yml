  - type: action
    name: 'Modification: Death Chill'
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>The Reaper's Call is coated in a thin ghostly poison. Their first
          successful strike each round, even if that Strike does no damage (such
          as due to resistance) applies Death Chill. If several people are
          struck at once it affects them all.</p><p>While a creature is clumsy
          from Death Chill, it is
          @UUID[Compendium.pf2e.conditionitems.Item.3uh1r86TzbQvosxv]{Doomed}
          with the same value;</p><p><strong>Saving Throw</strong>
          @Check[fortitude|dc:31|traits:poison];</p><p><strong>Maximum
          Duration</strong> 6 rounds;</p><p><strong>Stage 1</strong>
          @Damage[2d6[poison]] damage and
          @UUID[Compendium.pf2e.conditionitems.Item.i3OJZU2nk64Df3xm]{Clumsy 1}
          (1 round);</p><p><strong>Stage 2</strong> @Damage[3d6[poison]] damage
          and @UUID[Compendium.pf2e.conditionitems.Item.i3OJZU2nk64Df3xm]{Clumsy
          1} (1 round);</p><p><strong>Stage 3</strong> @Damage[5d6[poison]]
