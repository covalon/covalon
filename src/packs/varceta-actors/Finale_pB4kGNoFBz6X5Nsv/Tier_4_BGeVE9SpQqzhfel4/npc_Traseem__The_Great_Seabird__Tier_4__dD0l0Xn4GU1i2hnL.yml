  - type: action
    name: Death Is Never The End
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>When Traseem dies, the Maw's corruption reanimates them into Tras
          and Eem. Allow the player that slew Traseem to finish their turn.
          Then, add Tras to the map on the Material Plane, and Eem to the map on
          the Ethereal Plane. Add Tras to the initiative directly after the
          player who killed Traseem, and Eem directly after Tras.</p><p>Before
          Tras's first turn, three players are forcibly sent to the ethereal
          plane (the first, third, and fifth player in initiative) along with
          their summons/companions, gaining the Phaselocked - Ethereal Plane
          effect. The remaining three players are forcibly locked to the
          Material Plane. Replace the Phaseshift action on their character
          sheets with Phaselocked Phaseshift.</p><p>On Tras's first turn, they
          do nothing except prepare to use Kneel Forever on their second turn,
          gaining the Ready to Reap effect. When this happens, read the
          following aloud to your players: "<span style="font-family:Roboto,
          sans-serif">As Traseem breaks into two, the body remaining on the
          material plane lifts its scythe in the stance of a farmer ready to cut
          down wheat</span><span style="font-family:'gg sans', 'Noto Sans',
          'Helvetica Neue', Helvetica, Arial, sans-serif">. The creature is
          clearly preparing for an incredibly powerful attack.</span><span
          style="font-family:Roboto, sans-serif">"</span></p>
        gm: ''
      publication:
        title: ''
        authors: ''
        license: OGL
