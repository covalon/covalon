  - type: action
    name: Mortals And Their Paltry Trinkets
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>As they are bound, Traseem shrieks in frustration, unbinding
          players from their items. All players attempt a
          @Check[will|dc:32|traits:aura,divine,teleportation]. This affects all
          PCs only once, at the beginning of the encounter. Uninvested items can
          not include armour. If a Tattoo, Graft or similar item is targeted it
          is simply turned off for the day (this should not destroy any items).
          See the Varceta Finale journal entry for how these items can be
          retrieved.</p><p>(This ability can be modified by Modification:
          Trifling Trinkets)</p><p><strong>Critical Success</strong> The
          creature is unaffected.</p><p><strong>Success</strong> One of the
          creature's invested items (at random) is uninvested and teleported to
          the Ethereal Plane.</p><p><strong>Failure</strong> One of the
          creature's held weapons, shields, or items (at random) is teleported
          to the Ethereal Plane. One of their invested items (at random) is also
          uninvested teleported.</p><p><strong>Critical Failure</strong> Two of
          the creature's held weapons, shields, or items (at random) are
          teleported to the Ethereal Plane. Two of their invested items (at
          random) are also uninvested teleported.</p>
        gm: ''
      publication:
        title: ''
        authors: ''
        license: OGL
