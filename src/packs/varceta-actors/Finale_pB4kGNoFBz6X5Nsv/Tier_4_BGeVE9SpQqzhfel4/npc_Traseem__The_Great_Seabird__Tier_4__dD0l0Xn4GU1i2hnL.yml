          Out <strong>MUST </strong>be used on each of Traseem's turns, and
          never both.</p><p><span style="font-family:Roboto,
          sans-serif">Ethereal waves crash over the battlefield. All creatures
          on either plane standing outside the circle of bones take
          </span>@Damage[8d6[cold]] damage with a
