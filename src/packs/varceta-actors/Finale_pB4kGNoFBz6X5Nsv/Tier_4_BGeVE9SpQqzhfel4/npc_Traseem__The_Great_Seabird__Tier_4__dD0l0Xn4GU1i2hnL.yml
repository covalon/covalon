items:
  - type: action
    name: The Reaper's Blade
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>Traseem, The Great Seabird wields a massive scythe. All of their
          strikes with The Reaper's Call affect a 15 foot cone. Roll the attack
          once and compare the result to the AC of all targets. The cone may be
          angled however you wish and a target does not need to be within 30ft
          to be struck by the cone. Traseem is immune to their own strikes and
          is <strong>immune to being disarmed.</strong></p>
        gm: ''
