  - type: action
    name: Aura of Despair
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>The mere presence of the Reaper causes all living creatures in
          their vicinity to shiver in fear. Any living creature within 30 feet
          of the Reaper has to make a @Check[type:will|dc:29] save the first
          time they are exposed to Aura of Despair.</p><p>No matter the result
          of the check, affected creatures are immune to Aura of Despair for 1
          minute.</p><p><strong>Critical Success</strong> The creature is
          unaffected.</p><p><strong>Success</strong> The creature is
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          1}.</p><p><strong>Failure</strong> The creature is
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          2}.</p><p><strong>Critical Failure</strong> The creature is
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          2} and
          @UUID[Compendium.pf2e.conditionitems.6uEgoh53GbXuHpTF]{Paralyzed} for
          1 turn.</p>
