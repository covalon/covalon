  - sort: 100000
    name: Alatar Briefing
    type: text
    _id: zoQgQrPdnAKKdim7
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<h2>Background</h2><p>Before the Cataclysm, Alatar was an extremely diverse collection of communities allied with one another. Richer communities generally lived higher up in the mountains, and adhered to extremely strict laws and social norms.</p><p>When the Cataclysm came, it rained mind warping energy from the sky, causing the living to go mad, and the dead to rise. The poorer, lower communities perished to the undead swarms, while the better protected communities eventually fell to madness. However, one small keep survived, somehow avoiding the fate of its neighbors.</p><p>Through unknown means, Governor Alekin has sheltered Alataran survivors, and founded the city of Alatar Nova. Sat atop the mountains of the northern reaches, this walled city survives, not unlike Covalon. Could we finally have found an ally in this Post Cataclysm world?</p><p>For more information on Alatar, see its entry in the <a href=\"https://covalon.github.io/covalon-guide/\">Covalon Player’s Guide</a>.</p><h2>Mission Overview</h2><p>Unlike other Expeditions, our path to Alatar began with a formal, diplomatic invitation from Governor Alekin to visit Alatar Nova, and participate in a new holiday - the Festival of Light. Covalonians designed and sailed a Pneumatic Enchanted Nexus Glider and Underwater Intercontinental Navigator, or PENGUIN from our Pudersno camp into the mountains of Alatar. We were greeted cordially by the Governor’s advisor, Natalia, and given lodgings at the New Dawn Inn, all to ourselves. Unfortunately, the Governor has fallen ill after overworking himself in preparations for the festival, but we’ve been invited to enjoy the festivities until he is ready to receive us properly.</p><h3>Updated Overview</h3><p>After investigating Alatar Nova and its Festival of Light, we began to grow suspicious of the Governor’s true allegiances. Unfortunately, we found ourselves betrayed. The New Dawn Inn was filled with a sleeping gas, our PENGUIN seized, and the Covalon delegation forced to seek shelter hidden in the bowels of the city. The emotionless, Maw-infected attackers that pursued us have proved our worst suspicious - Alatar Nova is harboring a vessel of the Maw. We must discover where it’s being hidden in the castle, while ensuring the security of our new hidden base of operations. </p><h2>How to Run an Expedition</h2><p>Expeditions are composed of two subtypes: missions and finales. Missions are a set of three dungeon-like adventures that are narratively linked, but can be completed in any order. Each mission must include predetermined narrative and mechanical elements while sticking to a theme of locations, creatures, and loot, which are included in its associated journal entry, with the specifics of the blanks to be filled in by the GM of the adventure. Like other adventure types, Dungeon Guides must submit their expedition missions for approval.</p><p>When reading the instructions for an expedition, you may see key terms surrounded by number signs. These indicate that the term should be replaced by a value that's dependent on the adventure's average party level. When submitting your expedition for approval, you must include the values you plan to replace these terms with. Here is a list of terms:</p><ul><li><strong>#Creature [Table Number] [Modifier]#</strong> should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=995\">Building Creatures</a> section of the Gamemastery Guide. For example, \"#Creature 2-8 Minimum# means that you should reference the Building Creatures rules, look for Table 2-8, and use the value in the Minimum column for the creature's level (adjusted for elite or weak as appropriate).</li><li><strong>#Hazard [Table Number] [Modifier]#\_</strong>should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=1043\">Building Hazards</a> section of the Gamemastery Guide. For example, \"#Hazard 2-16 Simple Damage# means that you should reference the Building Hazards rules, look for table 2-16, and use the value in the Simple Damage column for the hazard's level.</li><li><strong>#DC [Modifier]#\_</strong>should be replaced by a value according to the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=554\" target=\"_blank\" rel=\"noopener\">DCs by Level</a> table in the Core Rulebook. If a modifier is included, the value should be adjusted accordingly. For example, \"#DC +5#\" means that you should reference the DCs by Level table, find the value appropriate for the party's average level, then add 5 to it.</li></ul><p>Finales are singular encounters against a narratively significant threat that conclude an expedition. They come in two versions: normal mode and hard mode. Before a finale is cleared for the first time, it can only be run by Covalon administrators and moderators, and is ran at hard mode. Afterwards, the finale can be ran by any Dungeon Guide at normal mode (though players can request hard mode if they'd like). Normal mode can be run in Tier 3 or above, and hard mode can only be run in Tiers 4 or 5. Unlike missions, finales use a specific map and specific creatures, included with this module.</p><p>Each finale comes with three variant modifications. When running a normal mode finale, a GM choose one of the three modifications to use, or can roll [[/r 1d3]] to randomly determine which modification to use. When running a hard mode finale, the GM uses all three modifications.\_There are no additional rewards for completing hard mode.</p><h2>Reporting a Completed Expedition</h2><p>When reporting a completed expedition in the Dungeon Summaries channel, use the\_<strong>exact name</strong> of the adventure as the adventure's title. For example, if you ran the first mission of Ikouga, the summary's title should be \"Alatar Mission A: A Hunting We Shall Go\" exactly. The summary should otherwise follow the same format as dungeons.</p><p>Finally, any narrative-based knowledge or intrigue that the players gain as a result of the expedition should be left out of the summary. For example, if the players complete a bonus objective that allows them to learn special information as detailed in the Required Elements or Recommended Loot section of each journal entry, that should be left out of the dungeon summary.</p>"
