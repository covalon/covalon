  - sort: 200000
    name: 'Alatar A: A Hunting We Shall Go'
    type: text
    _id: i56hEAxDgpMQMf4p
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h2>Hook</h2><p><s>Covalon has been invited to an evening of Festival of
        Light celebrations, including a hunt, feast, and entertainment with some
        of the citizens of Alatar Nova. We’re sending you in as a diplomatic
        delegation. See what you can learn about our new potential allies, but
        be careful how much information you share about Covalon. It would be
        better to hide our true capabilities, for now.</s></p><p><strong>New
        Hook</strong> (See Replayability section below!!!)</p><p>We still have
        more to learn about Alatar Nova. A group of citizens is gathering for a
        hunt and a feast, as part of their ongoing Festival of Light
        celebrations. Get your disguises ready and tag along to see what you can
        learn, but be careful to blend in with the collective.</p><h2>Required
        Elements</h2><h3>Scene One: The Hunt</h3><p>The PCs meet with a group of
        guards for a hunt in the mountains around Alatar Nova. During the hunt,
        they face two moderate combat encounters, which can be run in any order.
        Narrate the guards’ participation in combat, but do not roll them or
        their foes into initiative. Their participation in these encounters is
        purely narrative, as is their foes’.</p><p>In one encounter, the PCs
        hunt creatures like animals, beasts, plants, unintelligent elementals,
        or other creatures that can provide meat, salt, or other ingredients for
        the feast. Feel free to be creative! In the other, the party is attacked
        by hostile undead among the mountains. The undead are creatures or
        citizens of Alatar risen during the Cataclysm. You can run these
        encounters in any order.</p><p>During both combats, the players have
        access to the
        @UUID[Compendium.covalon.alatar-items.Item.2QgUMVN3o5X4gYDp]{Combat
        Ruse} action. PCs can use this action to disguise their true combat
        talents from the Alatarans, gaining Ruse Points. These Ruse Points
        determine how easily the players are able to learn information about
        Alatar Nova in Scene Two.</p><p>The DC for Combat Ruse is
        <strong>#DC#</strong> in Tiers 1, 2, and 3, or <strong>#DC+2#</strong>
        in Tiers 4 and 5. You can lower the DC if the PC uses a relevant lore or
        roleplays out a particularly convincing ruse, at your
        discretion.</p><h3>Scene Two: The Feast</h3><p>After returning from
        their hunt, the guards bring the players back to Alatar Nova for
        feasting, games, and entertainment. Pick three festival games from the
        list below or improvise your own. Choose games suitable to your party's
        skills. Each PC can participate in any or all of the three
        games.</p><p>The games are the party’s final chance to earn Ruse Points.
        PCs can earn Ruse Points by succeeding at a check using Deception or the
        game’s listed skills, gaining one Ruse Point on a success, or two on a
        Critical Success.</p><p>If a PC wants to go for a win at a festival
        game, instead of gaining ruse points, they must use the game’s listed
        skills. If they win, they gain a +1 circumstance bonus to their check to
        Gather Information (see below), and you can choose to flavor some of the
        party’s loot reward as festival winnings.</p><p>The DC to win (or gain a
        Ruse Point) in a festival game is <strong>#DC#</strong> in Tiers 1, 2,
        and 3, or <strong>#DC+2#</strong> in Tiers 4 and 5.</p><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">Festival
        Games</span></strong></span></p><p><em>Lantern Crafting</em> - The
        Alatarans craft beautiful paper lanterns imbued with magical light,
        before releasing them to float in the streets all at once. The maker of
        the lantern most admired by spectators wins the contest. A participating
        PC must succeed a check using Crafting, Arcana, Nature, Occultism,
        Religion, or an applicable lore to outdo the locals. If multiple PCs
        participate, whoever rolls highest wins.</p><p><em>Storytelling</em> -
        The crowd gathers in a large circle around the participants, who take
        turns telling increasingly outlandish tales. A participating PC must
        succeed a check using Performance, Society, Deception, Diplomacy,
        Intimidation, or an applicable lore to one-up the locals. If multiple
        PCs participate, whoever rolls highest wins.</p><p><em>Flame
        Juggling</em> - Participants hold flaming wooden dowels and must keep
        them in the air longer than the other contestants. A participating PC
        must succeed a check using Thievery, Performance, or an applicable lore
        to beat the locals. If multiple PCs participate, whoever rolls highest
        wins.</p><p><em>Tug of War</em> - Participants split into two teams,
        each holding one end of a long cord with colorful flags. If the PCs want
        to be on the same team, one must succeed at an Athletics check to beat
        the locals. Other PCs on the same team can Aid. If the PCs want to be on
        opposite teams, whichever team rolls higher wins. If someone attempts to
        fail this challenge on purpose to gain Ruse Points, their team loses if
        they roll highest.</p><p><em>Feast Tasting</em> - Participants are
        blindfolded and challenged to identify all the spices used in tonight’s
        feast. A participating PC must succeed a check using Perception or an
        applicable lore to beat the locals. This competition can have multiple
        winners if multiple PCs succeed at the check.</p><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">Gathering
        Information</span></strong></span></p><p>Each PC can attempt to Gather
        Information about Alatar Nova once during this scene using Diplomacy,
        Perception, or Society. The party’s Ruse Points determine the DC for
        this check. You can lower the DC for a PC that has feats related to
        Gathering Information (such as Streetwise or Discreet Inquiry). See the
        tables below for the default Gather Information DC based on your party
        size. A PC that wins a festival game during Scene Two gains a +1
        circumstance bonus to their check.</p><p>PCs that succeed to Gather
        Information gain one Information Point, or two Information Points on a
        critical success. This impacts their rewards at the end of the session,
        see Recommended Loot.</p><table><tbody><tr><td><p>Ruse Points (Party of
        4)</p></td><td><p>7 or
        fewer</p></td><td><p>8-11</p></td><td><p>12-15</p></td><td><p>16 or
        more</p></td></tr><tr><td><p>Ruse Points (Party of 5)</p></td><td><p>9
        or fewer</p></td><td><p>10-14</p></td><td><p>15-19</p></td><td><p>20 or
        more</p></td></tr><tr><td><p>Ruse Points (Party of 6)</p></td><td><p>11
        or fewer</p></td><td><p>12-17</p></td><td><p>18-23</p></td><td><p>24 or
        more</p></td></tr><tr><td><p>Gather Information
        DC</p></td><td><p>#DC+5#</p></td><td><p>#DC+2#</p></td><td><p>#DC#</p></td><td><p>#DC-2#</p></td></tr></tbody></table><h3>Alatar
        Nova Citizen RP Guidelines</h3><p>Players have the opportunity to
        interact directly with citizens of Alatar Nova in this mission. The
        citizens are generally friendly, calm, and easy going. They do not get
        upset, flustered, scared, or show strong emotions at all. With a
        <strong>#DC+2#</strong> Perception check to Sense Motive, PCs note that
        the citizen they're speaking with seems strangely “flat”, as though
        they're acting out an emotion instead of really feeling it. If asked
        about their personal history, the citizen shares that they are a
        survivor from Pre-Cataclysm Alatar who was saved by the Governor. The
        city is very insular, anything that isn't normal daily business is
        handled by the Governor, his advisor, or the guards.</p><p>PCs that
        Detect Magic or succeed at a <strong>#DC+2#</strong> Arcana or Occultism
        check discover some kind of magical influence on the citizens. Magic
        that attempts to read their thoughts or psyches automatically fails,
        reacting as though their minds are empty. If questioned about this, the
        citizen explains that the Governor has devised a safe, benign way to
        protect them all from the madness that destroyed Alatar, but they aren't
        allowed to share more than that with outsiders.</p><p>Other than the
        guards that accompany the PCs in Scene One, the citizens of Alatar Nova
        are not fighters, and never leave the city. They don’t know much about
        the outside world, or the Maw. They’ve heard tales of Covalon’s bravery
        and genuinely wish to forge an alliance. The guards know a bit more, as
        they defend the city walls and scout the surrounding mountains for
        survivors. They occasionally bring in other survivors they find, who
        bring news of the outside world.</p><p>If the PCs seem like they want to
        take hostile action against any citizens of Alatar Nova, remind them
        that they are explicitly on a diplomatic mission for Covalon and they
        are not authorized to attack, only to gather information and report
        back, defending themselves as necessary.</p><h3>A Note on
        Replayability</h3><p>After the Governor’s betrayal of Covalon, the
        citizens of Alatar begin to act distinctly less like people and more
        like emotional husks, acting out the motions of life on autopilot. The
        DC to Sense Motive on the Alatarans is reduced to <strong>#DC-5#.
        </strong>Instead of being explicitly invited in as diplomats, the PCs
        are performing reconnaissance while pretending to be citizens of Alatar.
        Change the hook as noted. Combat Ruse is changed slightly to be a
        measure of how well a PC blends in with the Alatar Nova Citizens and
        doesn't raise suspicion towards themselves. Mechanically, the mission is
        unchanged.</p><p><strong>New Hook:</strong> We still have more to learn
        about Alatar Nova. A group of citizens is gathering for a hunt and a
        feast, as part of their ongoing Festival of Light celebrations. Get your
        disguises ready and tag along to see what you can learn, but be careful
        to blend in with the collective.</p><h2><span
        style="font-family:var(--sans-serif)">Recommended
        Locations</span></h2><p>For Scene One: mountainous or forested maps,
        alpine rivers or lakes, caves, etc. Scene Two should not require a
        battlemap, but you can use any urban manor, courtyard, or city street
        map if you wish.</p><h2>Recommended Creatures</h2><p>For the hunt in
        Scene One: Animals, Beasts, Plants, or Elementals indigenous to
        mountainous areas. There can be rivers or lakes nearby if you wish to
        use aquatic monsters.</p><p>For the undead attack in Scene One: Undead
        flavored as humanoids or creatures that were killed during the Cataclysm
        and continue to roam the area. Any intelligent undead have gone mad, and
        attack on sight.</p><h2>Recommended Loot</h2><p>Gold or magical items
        flavored as gifts from the Alatarans or winnings from the Festival
        Games. PCs gain a percentage of the total loot value and an additional
        Secret from the list below based on how many Information Points they
        were able to earn.</p><table><tbody><tr><td><p>Information Points (Party
        of 4)</p></td><td><p>2 or less</p></td><td><p>3-4</p></td><td><p>5 or
        more</p></td></tr><tr><td><p>Information Points (Party of
        5)</p></td><td><p>2 or less</p></td><td><p>3-5</p></td><td><p>6 or
        more</p></td></tr><tr><td><p>Information Points (Party of
        6)</p></td><td><p>3 or less</p></td><td><p>4-6</p></td><td><p>7 or
        more</p></td></tr><tr><td><p>Treasure Reward</p></td><td><p>90% and no
        secret</p></td><td><p>100% and one secret</p></td><td><p>110% and two
        secrets</p></td></tr></tbody></table><p><strong>Secrets</strong></p><ol><li><p>You
        hear conflicting stories about the Governor’s advisor, Natalia. Some
        describe her as endlessly optimistic and a hands-on member of the
        community, while others say she's standoffish and easily irritated, and
        others say she's always morose and lamenting being swamped with
        work.</p></li><li><p>Many citizens of Alatar Nova are looking forward to
        a mysterious final celebration that's supposed to happen at the end of
        the Festival of Light. They don't share details, but they mention it
        will definitely seal the alliance between Covalon and Alatar
        Nova.</p></li><li><p>Asking around, you realize none of the citizens you
        speak with have been inside the Governor's castle recently. Apparently
        he very rarely lets anyone inside other than his advisor and the city
        guards.</p></li><li><p>No one really seems to be able to tell you where
        Natalia came from, if she’s a survivor from Pre-Cataclysm Alatar or
        elsewhere, or what she did before coming to Alatar Nova. From all
        accounts, she just appeared in the city several years ago and
        immediately started working with Governor Alekin.</p></li><li><p>Asking
        about customs, you learn from an offhand, casual comment that every
        citizen of Alatar Nova has undergone a special ritual to protect them
        from madness. Only the Governor can cast this ritual, and it happens at
        the castle as soon as a survivor is brought into the city, or a child is
        born. Details of this ritual aren’t talked about
        openly.</p></li><li><p>Every citizen you talk to does not even seem
        slightly interested in leaving Alatar Nova. As far as they say, it is a
        paradise. The city guard defends the walls, but the average citizen is
        not a fighter. Why would they ever leave the Governor’s
        protection?</p></li></ol><p></p>
