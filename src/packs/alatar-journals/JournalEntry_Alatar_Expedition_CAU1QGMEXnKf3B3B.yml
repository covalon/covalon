  - sort: 300000
    name: 'Alatar C: Kill the Queen'
    type: text
    _id: Fd6iK7AUJ6NAaRRd
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h2>Hook</h2><p>The Governor's advisor, Natalia, has been spotted in the
        sewers near our outpost! We don't know if she has discovered our new
        camp, but we simply can't risk giving our position away. Find her as
        quickly as possible and stop her by all means necessary before she can
        report back to Governor Alekin.</p><h2>Required
        Elements</h2><ol><li><p>Clarify at the start of the session that this
        mission is time-sensitive: Because the party is chasing the advisor,
        their ability to rest is limited. If the party rests for more than 10
        minutes after any encounter (20 minutes in T1/T2), they immediately lose
        track of the advisor and fail the mission. After each encounter, offer
        the party the chance to skip rests to speed their pursuit. They might
        gain additional information based on how much time they saved (See
        Recommended Loot).</p></li><li><p>This mission consists of three
        Moderate encounters. The second and third encounter include some
        additional required elements:</p><ol><li><p>Immediately before the
        second encounter, the party catches a glimpse of the advisor before she
        disappears. Start the encounter with a level <strong>#APL#</strong>
        <strong>Glimpse of the Queen</strong> Simple Hazard (The stat blocks are
        balanced for the middle of the tier, use the Adjustment toggle to adjust
        them for other APLs). When setting up the encounter, select an emotion
        for the Hazard, which alters its damage type and secondary effect.
        Describe the Hazard as the advisor unleashing a single area attack
        before fleeing the encounter, then let the party roll initiative against
        her lackeys. This Hazard should not be factored into the exp budget for
        the second encounter.</p></li><li><p>The third encounters contains two
        level <strong>#APL - 1#</strong> <strong>Queen of Alatar</strong>
        monsters (Use Elite or Weak adjustments as needed). When setting up the
        encounter, select <strong>a different emotion for each of them</strong>
        to alter the damage type of their
        attacks.</p></li></ol></li></ol><h2>Recommended Locations</h2><p>The
        first encounter occurs in an urban map, ideally a sewer or
        junkyard.</p><p>For the second and third encounters, the party can leave
        the sewers and e.g. chase the advisor into the city of Alatar itself,
        the forests outside of Alatar, or even the outer reaches of the
        palace.</p><h2>Recommended Creatures</h2><p>The first encounter should
        consist of abominations, oozes, animals, or amphibious creatures who
        could reasonably live in the sewers or junkyards of Alatar.</p><p>The
        second and third encounters should mostly contain humanoid enemies,
        flavored as soldiers and palace guards of Alatar under the direct
        command of the advisor.</p><p>Upon closer inspection (Especially after a
        combat), the soldiers, palace guards, and advisors look a little bit
        strange - reminiscent of Maw corruption, but much less
        extreme.</p><h2>Recommended Loot</h2><p>At least 50% of the treasure
        budget should be given out in raw GP, paid by the Portal Guide NPC. The
        remaining treasure should be given out as magic items and consumables
        related to fire, ice, acid, or mental effects, flavored as items carried
        by the advisor herself, or found in the sewers during the
        chase.</p><p><strong>Special:</strong> In T1, T2, and T3, loot must
        contain at least six appropriately leveled <strong>Elixirs of
        Life</strong> (Minor, Lesser, and Moderate, respectively), which are
        handed out by the Portal Guide NPC <strong>at the start of the
        session</strong>.</p><p>If the party decides not to rest after the first
        encounter, they get an early glimpse of the advisor, and notice that she
        seems strangely emotional (Based on whichever emotion was chosen for the
        Hazard in the second encounter) compared to when we first met her during
        the Festival of Light.</p><p>If the party decides to skip the rest after
        the second encounter, they manage to corner the advisor when she is
        alone, and notice that she seems to act very mechanically, not unlike
        some citizens they saw before. Before they can attack, the second
        advisor and the reinforcements arrive, forcing the party into
        combat.</p><p>In addition, the players receive additional GP equal to 5%
        of the treasure budget for each skipped rest (Flavored as a pouch of
        gems on the advisor's body).</p>
