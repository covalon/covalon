  - sort: 400000
    name: Alatar Finale
    type: text
    _id: SN9HV4iF0dzR45tw
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h1>Hook</h1><p>Despite our hopes, it turned out that Governor Alekin
        was just yet another puppet of the Maw. Our scouts have managed to map
        out his castle, and found the Maw Vessel in his throne room. It's time
        we take this fight to him and end this charade for good!</p><h1>Before
        Combat</h1><p>Alekin will use multiple tokens during this fight. To
        ensure the game runs as smoothly as possible, you can take the following
        preparation steps:</p><ul><li><p>Make sure “Link Actor Data” is toggled
        on in Alekin’s Prototype Token Settings. This will make sure HP and
        conditions are tracked properly.</p></li><li><p>Since any token on the
        map can be destroyed at any time, it is easier to use a separate token
        outside of the map to track Alekin’s initiative. This way, all tokens on
        the map can be removed without removing Alekin from initiative by
        accident.</p></li><li><p>Before revealing the map, select one emotional
        state for Alekin to start with (Open Alekin’s sheet and select one
        emotion from the dropdown).</p></li><li><p>At the start of his turn,
        Alekin will summon another Decoy. You can copy the initiative token
        outside of the map during the players’ turns to prepare a token you can
        quickly drag in.</p></li><li><p>Before rolling initiative, place one
        Alekin token on the throne, and two more invisible tokens in the arena
        (As instructed by Escapism). Reveal them just before rolling initiative,
        but after the players have chosen their starting squares. These tokens
        are summoned by Escapism upon rolling initiative, and can be targeted by
        abilities triggered by rolling initiative, like
        Battlecry.</p></li></ul><h1>During Combat</h1><ul><li><p>Emotionally
        Unstable: Whenever Alekin uses an Emotional ability (Outburst,
        Breakdown, Exposure, Jab), his emotional state switches after the
        ability has been resolved. Move to the next emotion in the dropdown list
        (Or back to the top if you reach the bottom) and describe this as him
        changing his demeanor to match his new emotion.</p></li><li><p>Escapism:
        Whenever Alekin is targeted by an effect, roll 1d&lt;number of Alekin
        tokens on the map&gt;. On a 1, resolve the effect as normal. On any
        other number, the targeted token was a Decoy and is either destroyed or
        unaffected (As described in Escapism). If multiple tokens are targeted
        by e.g. an area effect, roll a single die to determine who the real
        Alekin is for this instance of damage (E.g. by counting from top to
        bottom), and resolve the effect accordingly.</p></li><li><p>Detachment:
        Whenever Alekin hits an HP threshold (As listed in Detachment and his HP
        notes), he summons an Aspect. Set Alekin’s HP to the threshold value
        (Ignoring any damage beyond the threshold), move the Aspect into the
        targeted square, and resolve Detachment as described. The Aspect takes
        over all conditions from Alekin, counts as Alekin for all intents and
        purposes (Hunt Prey, Exploit Vulnerability, Demoralize Immunity, etc),
        and Alekin counts as a new target for all of these
        abilities.</p></li></ul><h2>Strategy</h2><ul><li><p>Alekin’s main damage
        comes from his AoE abilities, Emotional Outburst and Emotional
        Breakdown. Since he can use any of his tokens to calculate line of
        effect and distances, you can use Escapism to position Alekin before
        using any of his abilities.</p></li><li><p>If you encounter a party with
        many Resistances, you can use Emotional Exposure or Emotional Jab to
        change the damage type of his next AoE ability to a more suitable
        type.</p></li><li><p>Decoys are Alekin’s main resource. Keeping many of
        them alive makes him a lot harder to hit, while using them to fuel his
        offensive abilities (Psychic Vampire and Emotional Breakdown) can allow
        him to deal very high damage in a short amount of time. Try to keep at
        least one Decoy alive at the end of Alekin’s turn to make use of their
        passive ability.</p></li><li><p>Since large, persistent AoE effects can
        easily cripple Alekin by stripping him of his Decoys, use Grasp of Envy
        to Counteract them. Only use Grasp of Envy for particularly powerful
        effects, since it takes an action and destroys a Decoy that could
        otherwise be used for e.g. Psychic Vampire
        instead.</p></li><li><p>Because the Aspects’ Empower Emotion effects
        don't stack with each other, you will usually select one Aspect per turn
        to use Empower Emotion, while the others (If any) will either use
        Manifest Emotion to control the battlefield, or simply spend their turns
        attacking.</p></li></ul><h2>Modifications</h2><ul><li><p>Contingency:
        With Contingency, Aspects are much more durable, which allows you to let
        them stay in melee with players or inside of area effects without
        risking losing them.</p></li><li><p>Environmentally Friendly:
        Environmentally Friendly turns Emotional Breakdown from a desperate
        all-out maneuver into a much less costly area effect, allowing you to
        punish players for stacking too much.</p></li><li><p>Rigged Decoys:
        Rigged Decoys deals damage to players destroying a Decoy in melee. To
        get the best use out of this ability, make sure to position Decoys close
        to players, and try to keep multiple Decoys alive at the end of Alekin’s
        turn.</p></li></ul><h2>Win Condition</h2><p>Since the Aspects are
        intrinsically connected to Alekin, they can not exist without him. When
        Alekin reaches 0 HP, he and all of his Decoys die, and his Aspects
        disappear.</p><h1>Additional Notes</h1><ul><li><p>The first time a party
        member successfully recalls knowledge on Alekin and asks a question
        about any of his defenses (Highest Save, lowest Save, AC, etc), do not
        answer the question, but instead tell them that his defenses seem to
        shift based on his emotions. Further Recall Knowledge actions can reveal
        his lowest or highest save for a particular emotional
        state.</p></li><li><p>The throne room is 30 feet high, and Wall of
        Denial is 20 feet tall, allowing Large and smaller characters with a Fly
        Speed to bypass them. The hazardous terrain created by Aspect of Anger’s
        Manifest Emotion entirely fills the cubes it is created in, allowing
        characters to safely cross them if they are at least 5 feet above the
        ground.</p></li><li><p>Alekin has All-Around Vision as long as he has at
        least two tokens on the map. Make sure to properly activate and
        deactivate the “At Least 1 Decoy Active” toggle whenever Decoys are
        created or destroyed to turn this ability on and
        off.</p></li><li><p>When Detachment is triggered by the first hit of a
        multi-hit ability, the ability is resolved as follows: Damage from
        abilities that combine damage for the purpose of Weaknesses and
        Resistances (Twin Takedown, Double Slice, Flurry of Blows, etc) is fully
        nullified beyond the HP threshold, while abilities that count as two
        separate hits (E.g. Spellstrike) resolve normally, automatically
        targeting the newly summoned Aspect with the second
        attack.</p></li><li><p>All Aspects have a toggle to turn off their
        respective aura (Aura Enabled). In most cases, this toggle should not be
        turned off, it is merely meant as a convenience tool to deactivate the
        aura of Aspects that are e.g. walled in or caught inside of spells like
        Containment.</p></li><li><p>Whenever a new Aspect uses Empower Emotion,
        make sure that all other Aspect’s Empower Emotion is turned off, and
        remove any leftover effects from NPCs and players if necessary. Due to
        how auras work in Foundry, especially Empowered Bad Bargain can not
        automatically be removed.</p></li></ul><h1>Loot</h1><p>The entirety of
        the treasure budget is given out in raw GP, paid by the NPC used for the
        hook.</p><p>Additionally, players unlock the ability to customize their
        Soul Seed, gaining access to the Emotion Aspect.</p>
