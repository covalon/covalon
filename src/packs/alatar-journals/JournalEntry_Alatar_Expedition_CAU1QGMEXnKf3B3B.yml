  - sort: 200000
    name: 'Alatar B: Infiltrate the Castle'
    type: text
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h2>Hook</h2><p>We’ve been betrayed! Who could have seen this coming? We
        know that Alatar’s nobility cannot be trusted, but we still need to
        search the castle to find the source of the Maw’s influence. We don’t
        know what we’ll find in there — get in, get your information, and get
        out.</p><h2>Required Elements</h2><p>This expedition includes two
        moderate encounters and one skill challenge. Scene Three must include at
        least one creature with the troop trait. Make sure you review the rules
        for <a href="https://2e.aonprd.com/Rules.aspx?ID=3364">troops</a> before
        running this mission.</p><h3>Scene One: Efficient Strike</h3><p>Players
        face a moderate encounter as they make their way into the castle. The
        Party must end this encounter as quickly as possible so they have time
        to gather information before they’re noticed. Keep track of how many
        rounds this battle lasts — you’ll need that number for the next
        scene.</p><h3>Scene Two: Cat and Mouse</h3><p>The players infiltrate the
        castle, attempting to map the floors while avoiding the guards. This is
        a skill challenge encounter that lasts a number of rounds equal to 8
        minus the number of rounds the encounter in Scene 1 lasted (to a minimum
        of 3 rounds). </p><p>Each round, the players must decide as a group to
        either <strong>Map the Castle</strong> or <strong>Avoid the
        Guards.</strong> If they decide to <strong>Map the Castle</strong>, each
        PC attempts a Survival, Society, or Perception check. If they decide to
        <strong>Avoid the Guards</strong>, each PC attempts a Stealth, Thievery,
        or magical tradition (Arcana, Occultism, Nature, or Religion) check. The
        DC of these checks is <strong>#DC#</strong> in Tiers 1-3, or
        <strong>#DC+2#</strong> in Tiers 4 and 5. If at least half the party
        succeeds, the players gain a victory point towards whichever activity
        the party decided to take that round. </p><p>Players can Follow the
        Expert during this scene. At your discretion, a PC can use a tier
        appropriate spell or ability (Clairvoyance, Invisibility, Quiet Allies,
        etc)  to reduce the DC of these checks. </p><p>If the party gains at
        least 3 Victory Points towards Mapping the Castle, they succeed at the
        mission and gain an additional loot reward as per Recommended Loot.
        </p><p>If the party gains at least 3 Victory Points towards Avoiding the
        Guards, they can take exploration activities for the combat in Scene 3,
        all enemies are Off Guard for the first round of combat in Scene 3, and
        they gain an information reward described in  Recommended Loot. If they
        gain fewer than 3 points, they do not get to take exploration activities
        and the PCs are Off Guard for the first round of combat. </p><h3>Scene
        Three: Tactical Retreat</h3><p>As they flee the castle, the players are
        pursued by Alatar’s military forces. They face a moderate encounter that
        must include at least one creature with the troop trait. </p><h2><span
        style="font-family:var(--sans-serif)">Recommended
        Locations</span></h2><p>For the first and second scenes: empty city
        streets, castle/manor interiors</p><p>For scene three: exterior
        castle/manor grounds (courtyards, gardens, etc), city outskirts, city
        wall</p><h2>Recommended Creatures</h2><p>Creatures with the humanoid,
        construct, troop, or animal trait that would reasonably be involved in
        or utilized by Alatar’s military are appropriate in this expedition.
        Creatures from NPC Core and Battlecry! are especially
        recommended.</p><h2>Recommended Loot</h2><p>At least 50% of the treasure
        budget should be given out in raw gp, with the other 50% containing
        thematic and level-appropriate permanent or consumable items, which can
        include formulas. </p><p>If the party earned at least 3 Victory Points
        towards mapping the castle in Scene Two, they gain 10% additional loot
        reward as gold. </p><p>If they earned at least 3 Victory Points towards
        avoiding the guards, they notice their pursuers and other castle staff
        seem to be rapidly switching between extreme emotions, laughing
        hysterically one moment to sobbing loudly the next, or screams of anger
        turning on a dime to screams of terror.</p><p></p><p></p>
