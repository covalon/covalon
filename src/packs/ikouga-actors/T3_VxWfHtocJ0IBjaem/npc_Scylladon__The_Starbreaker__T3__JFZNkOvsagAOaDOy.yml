  - type: action
    name: Modification - Tentacular Absorption
    system:
      actionType:
        value: reaction
      description:
        value: >-
          <p><strong>Trigger</strong> A damaging effect hits two or more
          targets, at least one of which is a tentacle.</p><hr
          /><p><strong>Effect</strong> One of the affected tentacles absorbs the
          damage into itself. The affected tentacle gets a result one degree of
          success worse against the save, or an attack gets an additional degree
          of success against it.</p><p>Targets other than that tentacle gain an
          additional degree of success against the save, or attacks against them
          get a result one degree of success worse.</p><p>For the purpose of
          chain lightning, as this reaction can only be triggered if the first
          tentacle does not critically succeed, when used treat it as the
          reaction being used on the first tentacle (i.e. reduce the degree of
          success of the first target by one, then increase the degree of
          success of all future saves against the spell) to avoid retroactive
          critical successes ending the spell.</p>
