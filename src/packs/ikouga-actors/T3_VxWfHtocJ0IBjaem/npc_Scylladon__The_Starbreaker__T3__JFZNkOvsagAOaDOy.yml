    system:
      description:
        gm: ''
        value: "<p>Scylladon creates a sphere 30-foot radius sphere of swirling water within 120 feet. All creatures and unsecured objects in the area move towards the center, depending on their\_@Check[type:reflex|dc:29] saving throws. This follows the rules for <span style=\"font-family:var(--font-primary)\"><a style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\" href=\"https://2e.aonprd.com/Rules.aspx?ID=451\">forced movement.</a></span> Creatures that are Grabbed by a tentacle automatically critically succeed. If there’s not enough space near the center of the sphere, creatures and objects nearer to the center move first, and others move as far as they can without being blocked, up to the amount set by their saving throw outcomes.</p><p><br />Critical Success:\_The creature is unaffected.<br />Success:\_The creature moves 5 feet toward the center.<br />Failure:\_The creature moves 15 feet toward the center.<br />Critical Failure:\_The creature moves 30 feet toward the center.</p>"
      rules: []
      slug: null
