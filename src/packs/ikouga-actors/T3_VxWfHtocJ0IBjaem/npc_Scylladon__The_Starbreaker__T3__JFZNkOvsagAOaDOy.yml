  - name: Magical Kraken - Air Bubble
    type: action
    img: >-
      https://assets.forge-vtt.com/bazaar/systems/pf2e/assets/icons/actions/TwoActions.webp
    effects: []
    folder: null
    sort: 450000
    flags:
