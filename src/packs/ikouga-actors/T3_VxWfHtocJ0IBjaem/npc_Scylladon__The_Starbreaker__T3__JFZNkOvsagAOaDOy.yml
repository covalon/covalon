        IDKeysFlag: ''
        RemoveKeyonUseFlag: false
        LPFormulaFlag: ''
        LPFormulaOverrideFlag: false
        LBFormulaFlag: ''
        LBFormulaOverrideFlag: false
        ReplacementItemFlag: ''
    system:
      description:
        gm: ''
        value: "<p>A bubble of air 10 feet in diameter forms in an unoccupied space within 120 feet. This bubble of air must form underwater and remain underwater for the duration. When Scylladon first uses this ability, and each time they @UUID[Compendium.pf2e.actionspf2e.3f5DMFu8fPiqHpRg]{Sustain} it on subsequent turns, Scylladon can roll the orb up to 10 feet in any direction. The bubble can move through the spaces of any creatures or obstacles that can fit inside it.</p><p>The bubbles collects creatures it moves through, using the rules of @UUID[Compendium.pf2e.bestiary-ability-glossary-srd.zU3Ovaet4xQ5Gmvy]{Engulf}. Any Large or smaller creature whose space the bubble tries to move through can attempt a @Check[type:reflex|dc:29] save to avoid being engulfed. If a creature succeeds at this save, it can either let the orb pass (remaining in its space or moving out of the bubble's path into a space of the creature's choice) or allow itself to be pushed in front of the bubble to the end of the bubble's movement. The bubble can try to Engulf a creature only once per turn.\_</p><p>\_</p><p>A creature that fails its save is pulled into the bubble. It becomes @UUID[Compendium.pf2e.conditionitems.kWc1fhmv9LBiTuei]{Grabbed}, moves along with the orb and can breath normally. An engulfed creasture can get free either by Swimming with a successful @Check[type:athletics|dc:28] check or by @UUID[Compendium.pf2e.actionspf2e.SkZAQRkLLkmBQNB9]{Escaping}, against the same DC as the Engulf. A creature that critically failed its initial Reflex Save is stuck and can <strong>not</strong> attempt to escape using a Swim check. The orb can contain as many creatures as can fit in its space.\_</p>"
      rules: []
      slug: null
