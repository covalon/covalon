        value: "<p>Scylladon emits a cloud of black, venomous ink in a @Template[type:burst|distance:10] within 120 feet. This cloud has no effect outside water. Creatures inside the ink cloud are exposed to Scylladon Kraken Ink at the start of their turn and are @UUID[Compendium.pf2e.conditionitems.iU0fEDdBp3rXpTMC]{Hidden} to all observers. Creatures outside the Ink Cloud are also @UUID[Compendium.pf2e.conditionitems.iU0fEDdBp3rXpTMC]{Hidden} to creatures inside it. This is a visual effect, so alternative means of perception are not blocked.</p><p>Creatures in the initial burst of the Ink Cloud (not the lingering effect) must make a @Check[type:fortitude|dc:28] save or suffer the following effects:</p><p><strong>Success:</strong> The creature is unaffected by the ink.</p><p><strong>Failure:</strong> The creature is @UUID[Compendium.pf2e.conditionitems.XgEqL1kFApUbl5Z2]{Blinded} for 1 round.</p><p><strong>Critical Failure:</strong> The creature is @UUID[Compendium.pf2e.conditionitems.XgEqL1kFApUbl5Z2]{Blinded} for 3 rounds.</p><p>The Ink created by Scylladon's Ink Cloud ability is also considered Difficult Terrain.\_</p><p>Scylladon can't use Ink Cloud again until the start of its next turn, and the cloud dissipates after 1 minute.</p>"
