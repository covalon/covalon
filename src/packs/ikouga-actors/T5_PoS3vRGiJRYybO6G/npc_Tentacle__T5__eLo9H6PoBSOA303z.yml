    system:
      description:
        gm: ''
        value: >-
          <p>Scylladon is covered in the trophies of its past kills, and thick
          shipwreck armor covers many of its weak points. Scylladon and her
          tentacles have Construct Armor until damaged by a critical hit or
          falling below 50% health. Use the Construct Armour active toggle to
          turn it on.</p><p>Scylladon and her tentacles also have Hardness 15 as
          long as Construct Armor is active. To enable it, add the Construct
          trait to Scylladon and all tentacles, set the Hardness stat to 15, and
          remove the Construct trait.</p>
      rules:
        - domain: ac
          key: RollOption
          label: Construct Armour active
          option: construct-armor
          toggleable: true
          value: false
        - key: FlatModifier
          predicate:
            - and:
                - construct-armor
                - gt:
                    - hp-percent
                    - 50
          selector: ac
          value: 4
