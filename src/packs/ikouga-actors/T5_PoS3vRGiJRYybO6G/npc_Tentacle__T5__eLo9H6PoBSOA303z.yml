        LBFormulaOverrideFlag: false
        ReplacementItemFlag: ''
    system:
      description:
        gm: ''
        value: "<p>When a creature is Grabbed by a Tentacle, that creature can <strong>not</strong> attempt to Escape using the basic @UUID[Compendium.pf2e.actionspf2e.SkZAQRkLLkmBQNB9]{Escape} action. A creature that is Restrained by a Tentacle can attempt to Escape, but a successful Escape results in the creature being Grabbed, not freed.</p><p>When a tentacle is brought to half HP, any creature currently grabbed by it can attempt to make a single special Escape check as a free action. The ally who brought the tentacle to the HP threshold is considered to have taken sufficient preparation to use their reaction to Aid.</p><p>Allies of a grabbed player can help them escape by Shoving the grabbed player, as a grabbed player affected by forced movement will break the grab as normal.</p><p>If a Tentacle has a creature Grabbed, it does not lose the Grabbed condition at the end of the Tentacle's next turn. It remains Grabbed until it Escapes or the Tentacle is destroyed.\_If a Tentacle has a creature Restrained, the Restrained condition is reduced to Grabbed at the end of the Tentacle's next turn.</p><p data-visibility=\"gm\">You should allow abilities such as Liberating Command or Freedom of Movement to allow characters to Escape as normal.</p>"
      rules: []
      slug: null
