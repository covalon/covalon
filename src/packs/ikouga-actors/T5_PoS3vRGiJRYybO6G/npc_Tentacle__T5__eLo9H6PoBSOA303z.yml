  - _id: VHVtAB6vYtYv1TLi
    name: Independent
    type: action
    img: >-
      https://assets.forge-vtt.com/bazaar/systems/pf2e/assets/icons/actions/Passive.webp
    effects: []
    folder: null
    sort: 0
    flags:
      LocknKey:
        IDKeysFlag: ''
        RemoveKeyonUseFlag: false
        LPFormulaFlag: ''
        LPFormulaOverrideFlag: false
        LBFormulaFlag: ''
        LBFormulaOverrideFlag: false
        ReplacementItemFlag: ''
    system:
      description:
        gm: ''
        value: >-
          <p>Tentacles do not get their own turn, they act at the end of
          Scylladon's turn, similar to minions with the Independent feat.
          </p><p>Each Tentacle gains two actions per round.</p><p>Its first
          action can only be used to Swim higher or lower if it isn't in reach
          of a creature.</p><p>Its second action can only be used to make an
          Athletics check to Grapple a creature within 10 feet, or, if it
          already has a creature grabbed, it uses this second action to use
          Crushing Grip instead.</p><p>Because Tentacles extend from the floor,
          they can be attacked from any square beneath them while they are
          "swimming" at a higher elevation.</p><p>If a Tentacle is holding an
          unconscious target at the start of its turn, it will release that
          target.</p><p>Only one Tentacle at a time may grapple a target; if the
          only available target is already in another Tentacles grasp, the
          Tentacle does nothing.</p>
      rules: []
      slug: null
