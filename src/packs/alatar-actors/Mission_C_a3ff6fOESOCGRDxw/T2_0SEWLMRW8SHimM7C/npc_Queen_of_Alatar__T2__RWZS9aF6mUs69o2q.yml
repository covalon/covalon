  - type: action
    name: Emotionally Unstable
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>The Queen of Alatar is heavily influenced by the energy of emotions
          Governor Alekin has been absorbing from the citizens of Alatar. Upon
          placing the Queen of Alatar on the map, choose or randomly select an
          emotion for her, which alters the damage type and secondary effects of
          her abilities.</p>
        gm: ''
      publication:
        title: ''
        authors: ''
        license: OGL
        remaster: false
      rules:
        - key: RollOption
          domain: all
          option: emotion
          toggleable: true
          alwaysActive: true
          suboptions:
            - label: Happiness
              value: fire
            - label: Sadness
              value: cold
            - label: Fear
              value: mental
            - label: Disgust
              value: acid
          value: true
          selection: fire
