items:
  - type: action
    name: Emotional Outburst
    system:
      actionType:
        value: reaction
      description:
        value: >-
          <p><strong>Trigger</strong> The Hazard is triggered.</p><hr /><p>The
          Queen of Alatar releases a magical blast charged with the energy of
          emotions on creatures in a @Template[cone|distance:30] with a
          @Check[reflex|dc:20] Save, then escapes from combat, leaving the party
          to fight with her soldiers.</p><p>On a Failure, any targeted creature
          is affected by a condition based on her current
          emotion:</p><ul><li><p>Happiness: 1st-rank
          @UUID[Compendium.pf2e.spells-srd.r8g7oSumKOHDqJsd]{Agitate} for 1
          round.</p></li><li><p>Sadness: Unable to use Reactions for 1
          round.</p></li><li><p>Fear:
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          1}</p></li><li><p>Disgust:
          @UUID[Compendium.pf2e.conditionitems.Item.fesd1n5eVhpCSS18]{Sickened
          1}</p></li></ul>
