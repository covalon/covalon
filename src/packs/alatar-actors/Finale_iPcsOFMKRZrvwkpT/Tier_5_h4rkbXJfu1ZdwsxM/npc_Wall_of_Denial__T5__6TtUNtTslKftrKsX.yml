    blurb: ''
    publicNotes: >-
      <p><span id="ctl00_RadDrawer1_Content_MainContent_DetailedOutput">The wall
      blocks physical effects from passing through it, and because it's made of
      force, it blocks <a style="text-decoration:underline"
      href="https://2e.aonprd.com/Traits.aspx?ID=222"><span
      style="text-decoration:underline">incorporeal</span></a> and <a
      style="text-decoration:underline"
      href="https://2e.aonprd.com/Equipment.aspx?ID=284"><span
      style="text-decoration:underline">ethereal</span></a> creatures as well.
      <a style="text-decoration:underline"
      href="https://2e.aonprd.com/Traits.aspx?ID=156"><span
      style="text-decoration:underline">Teleportation</span></a> effects can
      pass through the barrier, as can <a style="text-decoration:underline"
      href="https://2e.aonprd.com/Traits.aspx?ID=163"><span
      style="text-decoration:underline">visual</span></a> effects (since the
      wall is transparent).<br /><br /><em>Wall of Denial </em>is immune to
      effects of its level or lower that attempt to <a
      style="text-decoration:underline"
      href="https://2e.aonprd.com/Rules.aspx?ID=371"><span
      style="text-decoration:underline">counteract</span></a> it. The wall is
      automatically destroyed by a <a style="text-decoration:underline"
      href="https://2e.aonprd.com/Spells.aspx?ID=76"><em><span
      style="text-decoration:underline">disintegrate</span></em></a> spell of
      any rank.</span></p>
