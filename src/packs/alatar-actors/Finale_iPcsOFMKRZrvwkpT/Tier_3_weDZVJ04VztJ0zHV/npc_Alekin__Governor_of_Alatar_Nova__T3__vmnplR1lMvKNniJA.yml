  - type: action
    name: Detachment
    system:
      actionType:
        value: free
      description:
        value: >-
          <p><strong>Trigger</strong> Alekin takes damage that would bring him
          to or below one of his HP thresholds (240, 180, or 120 HP) for the
          first time.</p><hr /><p>Instead of taking the full blow, Alekin splits
          off an Aspect of himself to take the blow for him. Execute the
          following steps in this order:</p><ol><li><p>Prevent any damage of the
          triggering damage instance beyond the triggering
          threshold.</p></li><li><p>Alekin Steps into an unoccupied adjacent
          space. If there are no eligible spaces, he may teleport to the closest
          unoccupied space instead.</p></li><li><p>Summon an Aspect into
          Alekin's old square. The Aspect enters initiative immediately after
          the current actor's turn.</p></li><li><p>The newly summoned Aspect
          takes over all effects on Alekin. For the purpose of targeted
          abilities and immunities like Hunt Prey or Demoralize, the Aspect
          counts as the old creature, and Alekin counts as a new
          creature.</p></li></ol><p>Detachment can only trigger once for each
          threshold.</p><p><strong>Special:</strong> Alekin can use this ability
          even if an effect would otherwise prevent him from acting.</p>
        gm: ''
      publication:
