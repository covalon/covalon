  - type: action
    name: Decoys
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>Alekin's body is just an expendable shell he can summon or destroy
          at will. He can summon additional bodies to move between, which are
          called Decoys.</p><p>Whenever at least one Decoy is present, Alekin's
          soul rapidly moves back and forth between his current body and all
          Decoys. He is considered to be in all squares occupied by any of his
          Decoys for the purpose of targeting and effect ranges, and has
          All-Around Vision as long as at least one Decoy is present.</p><p>If
          Alekin is targeted by a hostile effect, roll 1d&lt;number of active
          Decoys + 1&gt;. On a 1, Alekin was inhabiting the targeted Decoy at
          that moment and takes all effects normally. On any other result, the
          target was merely a Decoy. If the triggering effect was a successful
          attack roll that would have dealt damage, or a failed save against a
          damaging effect, the Decoy is destroyed.</p><p>Some of Alekin's
          abilities allow him to use Decoys for other purposes. In most cases,
          any Decoys used for these abilities are then destroyed.</p><p>For the
          purpose of abilities, the number of active Decoys is always equal to
          the number of boss tokens on the map, minus 1.</p>
        gm: ''
      publication:
        title: ''
        authors: ''
        license: OGL
        remaster: false
      rules:
        - key: RollOption
          domain: all
          option: multiple-decoys
          label: At Least 1 Decoy Active
          toggleable: true
          value: false
        - key: ActiveEffectLike
          mode: override
          path: system.attributes.flanking.flankable
          value: false
          predicate:
            - multiple-decoys
