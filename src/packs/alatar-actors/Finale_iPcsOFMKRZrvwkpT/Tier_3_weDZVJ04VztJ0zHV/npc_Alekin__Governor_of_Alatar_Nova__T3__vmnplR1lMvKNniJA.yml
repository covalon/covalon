  - folder: T8AzYUgNIAgTJ9Iz
    img: systems/pf2e/icons/spells/agitate.webp
    name: Agitate (Emotionally Unstable Effect)
    system:
      description:
        gm: ''
        value: >-
          <p>You send the target's mind and body into overdrive, forcing it to
          become restless and hyperactive. During the duration, the target must
          Stride, Fly, or Swim at least once each turn or take 2d8 mental damage
          at the end of its turn. The GM might decide to add additional move
          actions to the list for creatures that possess only a more unusual
          form of movement. The duration of this effect depends on the target's
          Will save.</p><hr /><p><strong>Critical Success</strong> The spell has
          no effect.</p>

          <p><strong>Success</strong> The duration is 1 round.</p>

          <p><strong>Failure</strong> The duration is 2 rounds.</p>

          <p><strong>Critical Failure</strong> The duration is 4 rounds.</p><hr
          /><p><strong>Heightened (+1)</strong> The damage increases by 2d8.</p>
