  - type: action
    name: Emotional Breakdown
    system:
      actionType:
        value: action
      description:
        value: >-
          <p><strong>Requirement</strong> Alekin has at least one Decoy
          active.</p><hr /><p>Alekin sacrifices all of his Decoys to deal
          devastating damage to his enemies. Select one body for Alekin to move
          into, then destroy all other bodies, dealing @Damage[11d6] damage with
          a Basic Save to all enemies in a @Template[type:emanation|distance:10]
          around any of the destroyed Decoys. On a failed save, targeted
          creatures are affected by a condition, as listed below.</p><p>Targets
          standing in more than one emanation are only affected once, but the
          outcome of their save is considered to be one stage lower than the
          rolled result.</p><p>Then, Alekin is healed by half of the highest
          instance of damage dealt (After applying Resistances and
          Weaknesses).</p><p><strong>Happiness: </strong>Emotional Breakdown
          deals Fire damage with a
          @Check[reflex|dc:29|basic|options:damaging-effect].</p><p><strong>Sadness:
          </strong>Emotional Breakdown deals Cold damage with a
          @Check[fortitude|dc:29|basic|options:damaging-effect].</p><p><strong>Fear:
          </strong>Emotional Breakdown deals Mental damage with a
          @Check[will|dc:29|basic|options:damaging-effect].</p><p><strong>Disgust:
          </strong>Emotional Breakdown deals Acid damage with a
          @Check[fortitude|dc:29|basic|options:damaging-effect].</p>
