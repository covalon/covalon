  - type: action
    name: Emotionally Unstable
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>Alekin's emotions are starting to spiral out of control as the
          party confronts him, constantly altering his mood and affecting his
          abilities.</p><p>After Alekin uses an Emotionally Unstable ability,
          advance his Emotionally Unstable to the next stage (Happiness -&gt;
          Sadness -&gt; Fear -&gt; Disgust -&gt; Happiness), which alters the
          damage type and secondary effects of the next Emotionally Unstable
          ability he uses.</p><p>The following abilities count as Emotionally
          Unstable abilities:</p><ul><li><p>Emotional
          Exposure.</p></li><li><p>Emotional Jab.</p></li><li><p>Emotional
          Outburst.</p></li><li><p>Emotional
          Breakdown.</p></li></ul><p><strong>Special:</strong> Using Emotional
          Jab for Reactive Strike does not advance Emotionally Unstable.</p>
        gm: ''
      publication:
        title: ''
        authors: ''
        license: OGL
        remaster: false
      rules:
        - key: RollOption
          domain: all
          option: emotion
          toggleable: true
          alwaysActive: true
          suboptions:
            - label: Happiness
              value: fire
            - label: Sadness
              value: cold
            - label: Fear
              value: mental
            - label: Disgust
              value: acid
          value: true
          selection: acid
        - key: DamageAlteration
