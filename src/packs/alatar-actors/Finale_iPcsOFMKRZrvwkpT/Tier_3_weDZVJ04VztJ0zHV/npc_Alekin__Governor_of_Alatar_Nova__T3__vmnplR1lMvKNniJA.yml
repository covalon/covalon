    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>When a Decoy is damaged, it explodes, dealing @Damage[5d6] damage
          in a @Template[type:emanation|distance:10] with a Basic
          Save.</p><p>The save depends on Alekin's current
          emotion:</p><p><strong>Happiness:</strong>
          @Check[reflex|dc:30|basic|options:damaging-effect].<br
          /><strong>Sadness:</strong>
          @Check[fortitude|dc:30|basic|options:damaging-effect].<br
          /><strong>Fear:</strong>
          @Check[will|dc:30|basic|options:damaging-effect].<br
          /><strong>Disgust:</strong>
          @Check[fortitude|dc:30|basic|options:damaging-effect].</p><p><em>Note:
          Effects that destroy a Decoy without damaging it (Like Psychic
          Vampire, Emotional Breakdown, Grasp of Envy, or any other abilities
