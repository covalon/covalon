        value: >-
          <p>When Alekin's Aspect spawns, it gains an emotional attunement based
          on Alekin's current HP.</p><p>This determines the damage type of the
          Aspect's attack and the bonus granted by their Manifest Emotion and
          Emotional Aura abilities.</p><table><tbody><tr><td
          data-colwidth="224"><p><strong>Boss HP
          Percentage</strong></p></td><td><p><strong>Aspect</strong></p></td></tr><tr><td
          data-colwidth="224"><p>80%</p></td><td><p>Aspect of
          Anger</p></td></tr><tr><td
          data-colwidth="224"><p>60%</p></td><td><p>Aspect of
          Bargain</p></td></tr><tr><td
          data-colwidth="224"><p>40%</p></td><td><p>Aspect of
          Denial</p></td></tr></tbody></table>
