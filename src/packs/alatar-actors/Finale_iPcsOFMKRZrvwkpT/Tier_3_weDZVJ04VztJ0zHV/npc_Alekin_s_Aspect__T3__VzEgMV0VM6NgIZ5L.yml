  - type: action
    name: Manifest Emotion
    system:
      actionType:
        value: action
      description:
        value: >-
          <p>The effect of this ability depends on the Aspect's
          emotion.</p><p><strong>Aspect of Anger</strong></p><p>Select up to 4
          unoccupied consecutive squares within the Aspect's Emotional Aura and
          set them on fire. Any creature entering or starting their turn in one
          of these squares takes @Damage[6d6] with a
          @Check[reflex|dc:25|basic|options:damaging-effect].</p><p>For the
          purpose of Aspect of Bargain, each set of four squares counts as a
          single effect.</p><p><strong>Aspect of Bargain</strong></p><p>The
          Aspect counteracts up to 2 magical effects created by Alekin or an
          Aspect within the Aspect's Emotional Aura, and then heal Alekin by two
          times the counteracted effect's level for each counteracted
          effect.</p><p><strong>Aspect of Denial</strong></p><p>Select up to 2
          unoccupied consecutive squares within in the Aspect's Emotional Aura.
          Each of these squares becomes surrounded by a transparent wall of
          force (See Wall of Denial for stats). All four walls surrounding any
          of these squares count as a single segment for the purpose of tracking
          HP.</p><p>For the purpose of Aspect of Bargain, each set of two
          squares squares counts as a single effect.</p>
        gm: ''
      publication:
        title: ''
