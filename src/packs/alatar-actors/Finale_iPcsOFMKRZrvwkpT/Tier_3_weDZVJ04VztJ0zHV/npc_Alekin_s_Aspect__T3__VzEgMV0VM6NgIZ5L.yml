  - type: action
    name: Emotional Aura
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>The Aspect's attunement to its emotions is so powerful, its
          influence expands far beyond its own body. Creatures within 60 feet of
          the Aspect are constantly under an effect depending on the Aspect's
          emotion.</p><p>These effects end immediately when the Aspect is
          destroyed, or when an affected creatures leaves the
          aura.</p><p><strong>Aspect of Anger: </strong>All allies are under the
          effect of
          @UUID[Compendium.pf2e.spells-srd.IAjvwqgiDr3qGYxY]{Courageous
          Anthem}.</p><p><strong>Aspect of Bargain: </strong>All enemies gain a
          Weakness to all damage equal to half their level.</p><p><strong>Aspect
          of Denial: </strong>All allies are under the effect of
          @UUID[Compendium.pf2e.spells-srd.bH0kPuf7UKxRvi2P]{Rallying
          Anthem}.</p>
        gm: ''
      publication:
        title: ''
        authors: ''
        license: OGL
        remaster: false
