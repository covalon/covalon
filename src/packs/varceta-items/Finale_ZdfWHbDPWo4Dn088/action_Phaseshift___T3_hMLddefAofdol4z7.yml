  description:
    value: >-
      <p><strong>Requirement </strong>You are adjacent to a Lava
      Tether</p><p><strong>Effect </strong>You use the Lava Tether to shift from
      the Material Plane to the Ethereal Plane, or vice versa. You always appear
      in the same square relative to the Lava Tether, or as close as possible if
      that space is occupied. If you have an animal companion, summon, familiar,
      eidolon, etc, they also Phaseshift with you from their current position.
      Companions, summons, familiars, eidolons, etc cannot use this action.</p>
