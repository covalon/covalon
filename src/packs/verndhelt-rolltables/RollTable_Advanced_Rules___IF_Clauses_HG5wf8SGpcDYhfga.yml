name: Advanced Rules - IF Clauses
_id: HG5wf8SGpcDYhfga
img: icons/svg/d20-grey.svg
description: >-
  <p>At specific intervals during the battle, the Contract will create new
  advanced rules by randomly rolling one IF clause and one THEN clause. Advanced
  rules do not have a limit on the number of times they can trigger per turn,
  and the effects trigger after the triggering action is complete. "I" and "me"
  always refer to the creature controlling the Contract. "You" refers to the
  triggering creature. Any effects that reference spells use a version of that
  spell heightened to the highest rank of spell that the Contract would be able
  to cast.</p>
