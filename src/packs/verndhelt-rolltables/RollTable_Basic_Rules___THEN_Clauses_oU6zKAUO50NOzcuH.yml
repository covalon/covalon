description: >-
  <p>At the beginning of the battle, the Contract will create a new basic rule
  by randomly rolling one IF clause and one THEN clause. Basic rules only
  trigger once per turn, and the effects trigger after the triggering action is
  complete. "I" and "me" always refer to the creature controlling the Contract.
  "You" refers to the triggering creature. Any effects that reference spells use
  a version of that spell heightened to the highest rank of spell that the
  Contract would be able to cast.</p>
