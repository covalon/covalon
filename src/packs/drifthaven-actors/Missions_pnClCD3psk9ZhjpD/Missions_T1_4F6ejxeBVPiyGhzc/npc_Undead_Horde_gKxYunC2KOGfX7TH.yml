    name: Troop Movement
    sort: 800000
    system:
      description:
        gm: ''
        value: >-
          <p>Whenever a troop Strides, it first Forms Up as a free action to
          condense into a 20-foot-by-20-foot area (minus any missing squares),
          then moves up to its Speed. This works just like a Gargantuan creature
          moving; for instance, if any square of the troop enters difficult
          terrain, the extra movement cost applies to the whole troop.</p>
