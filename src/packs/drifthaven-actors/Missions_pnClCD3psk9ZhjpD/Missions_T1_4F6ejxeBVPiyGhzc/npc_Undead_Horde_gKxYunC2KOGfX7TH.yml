  - type: action
    img: systems/pf2e/icons/default-icons/action.svg
    name: Here Comes the Horde
    system:
      description:
        gm: ''
        value: >-
          <p>The undead horde is so vast and numerous that it seemingly has no
          end. This effectively makes it immune to all damage. If the undead
          horde is targeted with a Strike from a hacked Unshaper, the Strike
          automatically succeeds, the horde loses its immunity to damage from
          this ability (as its members are culled in uncountable numbers), and
          then the hacked Unshaper is destroyed after the Strike is
          resolved.</p>
