    system:
      description:
        gm: ''
        value: >-
          <p>You have fewer actions. Slowed always includes a value. When you
          regain your actions at the start of your turn, reduce the number of
          actions you regain by your slowed value. Because slowed has its effect
          at the start of your turn, you don't immediately lose actions if you
          become slowed during your turn.</p>
