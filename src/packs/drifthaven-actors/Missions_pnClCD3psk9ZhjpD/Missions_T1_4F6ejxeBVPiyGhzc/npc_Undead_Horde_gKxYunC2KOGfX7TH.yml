  - _id: YNpN5FwvZ27Zfviz
    img: systems/pf2e/icons/actions/OneAction.webp
    name: Dead Man's Onslaught
    sort: 700000
    system:
      description:
        gm: ''
        value: >-
          <p><span class="action-glyph">1</span> to <span
          class="action-glyph">3</span></p>

          <p><strong>Frequency</strong> once per round</p>

          <hr />

          <p><strong>Effect</strong> The troop lashes out at any enemies in
          their squares or within @Template[type:emanation|distance:5]{5 feet}
          (@Check[type:reflex|dc:18|basic:true] save). The effect depends on the
          number of actions.</p>

          <p><span class="action-glyph">1</span> @Damage[(1d6+5)[bludgeoning]]
          damage</p>

          <p><span class="action-glyph">2</span> @Damage[(2d6+4)[bludgeoning]]
          damage, creatures that fail their save are forcibly moved 5 ft towards
          the center of the horde.</p>

          <p><span class="action-glyph">3</span> @Damage[(2d6+4)[bludgeoning]]
          damage, creatures that fail their save are forcibly moved 10 ft
          towards the center of the horde.</p>
      rules: []
