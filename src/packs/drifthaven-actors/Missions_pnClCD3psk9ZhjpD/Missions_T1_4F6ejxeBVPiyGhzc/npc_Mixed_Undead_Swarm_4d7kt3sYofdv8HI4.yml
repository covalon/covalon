  - type: action
    img: systems/pf2e/icons/default-icons/action.svg
    name: Mixed Undead "Tactics"
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Frequency</strong> once per round.</p>

          <hr />

          <p>The undead viciously attack enemies within their squares or within
          5 feet (@Check[type:reflex|dc:15|basic:true] save). Up to three
          actions can be used when performing this activity, and its effects
          depend on the number of actions used.</p>

          <p><span class="pf2-icon">1</span>: @Damage[2d6[bludgeoning]]
          damage.</p>

          <p><span class="pf2-icon">2</span>: @Damage[3d6[bludgeoning]]
          damage.</p>

          <p><span class="pf2-icon">3</span>: @Damage[3d6[bludgeoning]] damage
          and an affected creature is grabbed by the Mixed Undead Swarm.</p>
