          class="action-glyph">2</span></p>

          <p><strong>Frequency</strong> once per round</p>

          <hr />

          <p><strong>Effect</strong> The zombies lash out at any enemies in
          their squares or within @Template[type:emanation|distance:5]{5 feet}
          (@Check[type:reflex|dc:19|basic:true] save). The damage depends on the
          number of actions.</p>

