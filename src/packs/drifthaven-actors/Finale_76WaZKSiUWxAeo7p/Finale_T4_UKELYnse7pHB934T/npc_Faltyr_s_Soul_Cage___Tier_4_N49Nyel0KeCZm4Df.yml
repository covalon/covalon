  - type: action
    img: systems/pf2e/icons/default-icons/action.svg
    name: Spell Reflection
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Trigger</strong> A soul cage is targeted by a spell</p><hr
          /><p><strong>Frequency</strong> Once per soul
          cage</p><p><strong>Effect</strong> The soul cage tries to counteract
          the spell by attempting an @Check[type:arcana]{Counteract Check} using
          Lich Faltyr’s skill bonus for its counteract check. If it successfully
          counteracts the spell, the effect is turned back on the caster, using
          all statistics of the original cast (Including spell DCs and attack
          rolls).</p>
