  - type: action
    img: systems/pf2e/icons/conditions-2/dead.webp
    name: Contained Magic
    system:
      description:
        gm: ''
        value: "<p><strong>Trigger</strong> A soul cage is destroyed</p><p><strong>Effect\_</strong>Faltyr's magic contained in the soul cage rebounds, triggering one of the following effects, as chosen by Faltyr:</p><hr /><p><strong>Rise My Armies</strong> Summon one Lurching Troop.</p><hr /><p><strong>Shade Of Darkness</strong> Every enemy must make a @Check[type:will|dc:30|name:Shade Of Darkness] or suffer the following effects:</p><p><strong>Critical Success</strong> The creature is unaffected.<br /><strong>Success</strong> The creature is @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained 1}.<br /><strong>Failure</strong> The creature is @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained 2}.<br /><strong>Critical Failure</strong> The creature is @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained 3}.</p><hr /><p><strong>Grasp Of Death</strong> Every enemy takes @Damage[(5d10)[void]] with a @Check[type:fortitude|dc:30|basic|name:Grasp Of Death]. Depending on the save, they suffer additional effects:</p><p><strong>Failure</strong> The creature takes full damage and positive effects heal it only half as much as normal for 1 round.<br /><strong>Critical Failure</strong> The creature takes double damage and positive effects heal it only half as much as normal for 1 minute.</p>"
      rules: []
