items:
  - type: action
    name: Energy Reservoir
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>Soul Cages are immobile constructs fueling Faltyr's magic. They do
          not actively participate in combat, and can only use two actions:
          Spell Reflection and Contained Magic.</p><p>They can be disabled using
          one of the following checks, which disables their Contained Magic
          ability, reduces their Hardness, and affects some of Faltyr's
          abilities, but does not have any other effects.</p><p>Alternatively, a
          critical hit dealing damage to the Soul Cage reduces the Hardness as
          well, but does not disable any
          abilities.</p><p>@Check[type:thievery|dc:31|name:Crack the
          hourglass|traits:action:disable-a-device]
          (Expert)</p><p>@Check[type:arcana|dc:29|name:Displace the
          enchantments|traits:action:disable-a-device]
          @Check[type:nature|dc:29|name:Displace the
          enchantments|traits:action:disable-a-device]
          @Check[type:religion|dc:29|name:Displace the
          enchantments|traits:action:disable-a-device]
          @Check[type:occultism|dc:29|name:Displace the
          enchantments|traits:action:disable-a-device]
          (Trained)</p><p>@Check[type:lore: Lich|dc:26|name:Displace the
          enchantments|traits:action:disable-a-device] (Trained)</p>
        gm: ''
      publication:
        title: ''
        authors: ''
        license: OGL
        remaster: false
      rules:
        - key: RollOption
          domain: all
          option: disabled
          label: Disabled (By Disable Device)
          toggleable: true
          value: false
        - key: RollOption
          domain: all
          option: broken
          label: Construct Armor Broken by Critical Hit
          toggleable: true
          value: false
        - key: ActiveEffectLike
          mode: multiply
          path: system.attributes.hardness.value
          phase: afterDerived
          predicate:
            - or:
                - disabled
                - broken
          value: 0.5
