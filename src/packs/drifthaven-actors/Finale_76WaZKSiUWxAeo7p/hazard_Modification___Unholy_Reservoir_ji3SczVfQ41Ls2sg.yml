    description: "<p>Through Faltyr's magic the halls have been inscribed with unholy magics. Whenever his troops fall in battle their magic is pooled in a catalyst of terrible power.</p>\n<p>When this modification is active, set it at the bottom of initiative.\_</p>\n<p><strong>Trigger</strong> A troop would fall to an HP threshold or die.</p>\n<hr />\n<p><strong>Effect </strong>The undoing of the fallen troops's magic is pooled into the inscriptions along the walls and floors of the great hall. When Unholy Reservoir's turn begins the energy releases and empties forming a stronger effect corresponding to the death witnessed.</p>"
