    name: Channel Energy
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Requirements</strong> At least one soul cage is currently
          active.</p>

          <hr />

          <p><strong>Effect</strong> Lich Faltyr gathers energy for a larger,
          more devastating magic against his foes. During Lich Faltyr’s next
          turn he can use the Grave Maker ability. If a soul cage is broken or
          disabled before Lich Faltyr’s next turn his concentration is broken
          and the energy dissipates preventing him from using Grave Maker.</p>
