  - type: action
    img: systems/pf2e/icons/default-icons/action.svg
    name: Consume Energy
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Trigger</strong> Lich Faltyr is targeted by a spell.</p>

          <hr />

          <p><strong>Effect</strong> Lich Faltyr opens their boney maw to
          consume the magic targeting them. It tries to counteract the spell by
          attempting an Arcana check for its counteract check. If it
          successfully counteracts the spell, Lich Faltyr becomes
          @UUID[Compendium.pf2e.conditionitems.Item.nlCjDvLMf2EkV2dl]{Quickened}
          until the end of their next turn and gains Temp HP equal to twice the
          level of the counteracted spell. Lich Faltyr can use the extra action
          for only Channel Energy, Strike, Stride, and Fly actions. Lich Faltyr
          cannot Consume Energy for <em>[[/br 1d4 #Recharge Consume Energy]]{1d4
          Rounds}</em>.</p>
      rules: []
      slug: null
