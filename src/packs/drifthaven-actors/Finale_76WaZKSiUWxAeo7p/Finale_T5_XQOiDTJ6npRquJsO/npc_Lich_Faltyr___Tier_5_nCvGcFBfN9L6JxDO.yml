  - img: systems/pf2e/icons/spells/freedom-of-movement.webp
    name: Freedom of Movement (Constant)
    system:
      description:
        gm: ''
        value: >-
          <p>You repel effects that would hinder a creature or slow its
          movement. While under this spell's effect, the target ignores effects
          that would give them a circumstance penalty to Speed. When they
          attempt to
          @UUID[Compendium.pf2e.actionspf2e.Item.SkZAQRkLLkmBQNB9]{Escape} an
          effect that has them
          @UUID[Compendium.pf2e.conditionitems.Item.eIcWbB5o3pP6OIMe]{Immobilized},
          @UUID[Compendium.pf2e.conditionitems.Item.kWc1fhmv9LBiTuei]{Grabbed},
          or
          @UUID[Compendium.pf2e.conditionitems.Item.VcDeM8A5oI6VqhbM]{Restrained},
          they automatically succeed unless the effect is magical and of a
          higher level than the freedom of movement spell.</p>
