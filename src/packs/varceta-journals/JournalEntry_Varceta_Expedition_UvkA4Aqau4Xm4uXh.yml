    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<h2>Background</h2><p>Varceta is a land of towering volcanos and rocky plains, dotted with smaller villages and castles. Vampire clans ruled from these castles, all in reverence to the Queen. When The Cataclysm brought natural disasters across the world, the Queen's children betrayed her, and Varceta became its own downfall due to infighting and civil war.</p><p>What most don't know is that during the height of the chaos, a contingent of psychopomps arrived in Varceta. They slaughtered the vampire lords, seeing it as their duty to eradicate the undead threat. These monitors continue to rule from the old Queen's castle, under the direction of a mysterious psychopomp leader. Their goals have become twisted by the Maw Vessel in Varceta, and now the psychopomps seek to eradicate all remaining survivors in Varceta and beyond, if they are not stopped.</p><p>For more information on Varceta, see its entry in the <a href=\"https://covalon.github.io/covalon-guide/\">Covalon Player's Guide</a>.</p><h2>Mission Overview</h2><p>Covalonians crafted an entire herd of clockwork carousel horses to ride from our Ratchethallow District to Varceta. On the way, we discovered the corpse of one Maw infected psychopomp before we arrived in Varceta, only to be confronted by a patrol of survivors. After discussion with their leader, a dhampir woman named Adelaide of the Nightsinger Clan, we've agreed to work with the locals against the shared threat of the Maw influenced psychopomps. Covalon's expedition camp in Varceta is adjoined with the resistance's camp, hidden along volcanic shores. We will need to work with the local resistance to neutralize the psychopomp threat, and destroy the Varcetan Maw Vessel.</p><h2>How to Run an Expedition</h2><p>Expeditions are composed of two subtypes: missions and finales. Missions are a set of three dungeon-like adventures that are narratively linked, but can be completed in any order. Each mission must include predetermined narrative and mechanical elements while sticking to a theme of locations, creatures, and loot, which are included in its associated journal entry, with the specifics of the blanks to be filled in by the GM of the adventure. Like other adventure types, Dungeon Guides must submit their expedition missions for approval.</p><p>When reading the instructions for an expedition, you may see key terms surrounded by number signs. These indicate that the term should be replaced by a value that's dependent on the adventure's average party level. When submitting your expedition for approval, you must include the values you plan to replace these terms with. Here is a list of terms:</p><ul><li><strong>#Creature [Table Number] [Modifier]#</strong> should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=995\">Building Creatures</a> section of the Gamemastery Guide. For example, \"#Creature 2-8 Minimum# means that you should reference the Building Creatures rules, look for Table 2-8, and use the value in the Minimum column for the creature's level (adjusted for elite or weak as appropriate).</li><li><strong>#Hazard [Table Number] [Modifier]#\_</strong>should be replaced by a value according to a table in the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=1043\">Building Hazards</a> section of the Gamemastery Guide. For example, \"#Hazard 2-16 Simple Damage# means that you should reference the Building Hazards rules, look for table 2-16, and use the value in the Simple Damage column for the hazard's level.</li><li><strong>#DC [Modifier]#\_</strong>should be replaced by a value according to the <a href=\"https://2e.aonprd.com/Rules.aspx?ID=554\" target=\"_blank\" rel=\"noopener\">DCs by Level</a> table in the Core Rulebook. If a modifier is included, the value should be adjusted accordingly. For example, \"#DC +5#\" means that you should reference the DCs by Level table, find the value appropriate for the party's average level, then add 5 to it.</li></ul><p>Finales are singular encounters against a narratively significant threat that conclude an expedition. They come in two versions: normal mode and hard mode. Before a finale is cleared for the first time, it can only be run by Covalon administrators and moderators, and is ran at hard mode. Afterwards, the finale can be ran by any Dungeon Guide at normal mode (though players can request hard mode if they'd like). Normal mode can be run in Tier 2 or above, and hard mode can only be run at the highest tier, intended for max level characters. Unlike missions, finales use a specific map and specific creatures, included with this module.</p><p>Each finale comes with three variant modifications. When running a normal mode finale, a GM choose one of the three modifications to use, or can roll [[/r 1d3]] to randomly determine which modification to use. When running a hard mode finale, the GM uses all three modifications.\_There are no additional rewards for completing hard mode.</p><h2>Reporting a Completed Expedition</h2><p>When reporting a completed expedition in the Dungeon Summaries channel, use the\_<strong>exact name</strong> of the adventure as the adventure's title. For example, if you ran the first mission of Ikouga, the summary's title should be \"Ikouga Mission A: Retame the Island\" exactly. The summary should otherwise follow the same format as dungeons.</p><p>Finally, any narrative-based knowledge or intrigue that the players gain as a result of the expedition should be left out of the summary. For example, if the players complete a bonus objective that allows them to learn special information as detailed in the Required Elements or Recommended Loot section of each journal entry, that should be left out of the dungeon summary.</p><h2>Credits</h2><p>Thank you to Pepper, Yara, and Kelani for designing the Varceta missions, and thank you to Komainu for providing maps and designing the Varceta finale!</p><p></p>"
