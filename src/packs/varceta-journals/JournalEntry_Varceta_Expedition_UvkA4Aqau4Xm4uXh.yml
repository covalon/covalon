  - sort: 800000
    name: 'Appendix D: Death-Chilled Template'
    type: text
    _id: sMzkJZUONdjoracu
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>This adjustment can be applied to enemies to represent members of the
        psychopomp forces. </p><p><span
        style="font-family:Signika">Death-Chilled
        Adjustments:</span></p><ul><li><p><span style="font-family:Signika">Add
        the Monitor trait</span></p></li><li><p><span
        style="font-family:Signika">Add lifesense (precise) (60
        ft)</span></p></li><li><p><span style="font-family:Signika">Add the
        Requian language if the creature is intelligent and can
        speak</span></p></li><li><p><span style="font-family:Signika">Add
        immunity to Disease</span></p></li><li><p><span
        style="font-family:Signika">Add resistance to Poison and Void equal to
        #Creature 2-8[Minimum]</span></p></li><li><p><span
        style="font-family:Signika">Add resistance to Cold equal to #Creature
        2-8[Maximum]</span></p></li><li><p><span style="font-family:Signika">Add
        weakness to Fire equal to #Creature
        2-8[Maximum]</span></p></li><li><p><span style="font-family:Signika">In
        Tier 1 and Tier 2, add the Ghost Touch rune to all the creature’s
        strikes. In Tier 3+, also add 1d6 Spirit damage to all the creature’s
        strikes.</span></p></li></ul>
