  - sort: 600000
    name: 'Appendix B: H.O.R.S.E. Information'
    type: text
    _id: EWHw1xVDGeI1j3Qo
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>During the travel portion of Varceta, every player had the chance to
        build their very own mechanical horse mount. These mounts have since
        been adjusted to the harsh conditions of Varceta by Covalon’s crafters
        and can be used as protective armor against the volcanic heat. All
        abilities are available in the Varceta Expedition folder and can be
        added to player sheets via drag and drop.</p><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">At the start
        of this mission, every player may choose <strong>one active ability and
        one passive effect </strong>from the following list, which they will
        have access to during the entire mission. Even if players polmorph or
        otherwise, they still have access to the abilities (the exoskeleton is
        not absorbed, it shifts with the player). </p><h3 dir="ltr"
        style="line-height:1.38;margin-top:16pt;margin-bottom:4pt">Passive
        Effects</h3><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">Passive
        effects grant a permanent bonus that lasts for the entire mission.
        Eidolons, Familiars, Pets, and other non-summoned minions gain the same
        passive effects as their master, with no restrictions.</p><div dir="ltr"
        style="margin-left:0pt"><table
        style="border:none;border-collapse:collapse"><colgroup><col></col><col></col></colgroup><tbody><tr
        style="height:0pt"><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><strong>Name</strong></p></td><td
        style="border-left:solid #000000 1pt;border-right:solid #000000
        1pt;border-bottom:solid #000000 1pt;border-top:solid #000000
        1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><strong>Effect</strong></p></td></tr><tr
        style="height:0pt"><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Lava
        Stride</p><p>@UUID[Compendium.covalon.varceta-items.Item.VPOwZxyN6AKL6V09]{HORSE
        Effect: Lava Stride}</p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Treat lava as
        Difficult Terrain solid ground for abilities with the Move trait. If a
        character with Lava Stride ends their turn on lava, they will still sink
        as normal. This also prevents damage from touching lava if the character
        ends their movement outside of lava.</p></td></tr><tr
        style="height:0pt"><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Thermal
        Insulation</p><p>@UUID[Compendium.covalon.varceta-items.Item.tyhCzLNbJVpHigvk]{HORSE
        Effect: Thermal Insulation}</p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Resistance to
        Fire equal to <strong>#level / 2#</strong>.</p></td></tr><tr
        style="height:0pt"><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Heat
        Redistributor</p><p></p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">The character
        is under the effect of a permanent Potion of Retaliation. They may
        choose between the Cold and Fire variant when selecting this ability,
        but can not change this choice later on.</p><p></p><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Use the
        statistics of the Minor potion for T1, Lesser for T2, Moderate for T3,
        and Greater for T4/T5.</p></td></tr><tr style="height:0pt"><td
        style="border-left:solid #000000 1pt;border-right:solid #000000
        1pt;border-bottom:solid #000000 1pt;border-top:solid #000000
        1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Clockwork Speed
        Boosters</p><p>@UUID[Compendium.covalon.varceta-items.Item.2vxUHf5x3mtACC20]{HORSE
        Effect: Clockwork Speed Boosters}</p></td><td style="border-left:solid
        #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Item Bonus to
        Land Speed of 10 feet (For T1-3) or 15 feet (For
        T4/T5).</p></td></tr></tbody></table></div><h3 dir="ltr"
        style="line-height:1.38;margin-top:16pt;margin-bottom:4pt">Active
        Abilities</h3><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">Active
        abilities can be used exactly once per player and mission. Eidolons,
        Familiars, Pets, and other non-summoned minions gain access to the same
        abilities as their master, but their use is still limited to exactly one
        per player: A character’s Eidolon or Familiar may use their action to
        activate the chosen active ability, but this consumes the charge for
        both the minion and their master (And vice versa). To determine the
        strength of an ability, always use the corresponding character’s
        level.</p><div dir="ltr" style="margin-left:0pt"><table
        style="border:none;border-collapse:collapse"><colgroup><col></col><col></col></colgroup><tbody><tr
        style="height:0pt"><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><strong>Name</strong></p></td><td
        style="border-left:solid #000000 1pt;border-right:solid #000000
        1pt;border-bottom:solid #000000 1pt;border-top:solid #000000
        1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><strong>Ability</strong></p></td></tr><tr
        style="height:0pt"><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><span
        class="action-glyph">2 </span>Secondary Coolant
        Tank</p><p>@UUID[Compendium.covalon.varceta-items.Item.3krWuZLm49sQgHJd]{HORSE
        Ability: Secondary Coolant Tank}</p></td><td style="border-left:solid
        #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Deal 1d8 Cold
        damage per two player levels (Rounded up) in a 30-foot cone, with a
        Basic Reflex Save against <strong>#Class DC#</strong>.</p></td></tr><tr
        style="height:0pt"><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><span
        class="action-glyph">2 </span>External
        Thrusters</p><p>@UUID[Compendium.covalon.varceta-items.Item.dSWm75Nkcv5uJUju]{HORSE
        Ability: External Thrusters}</p></td><td style="border-left:solid
        #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Stride twice,
        then Strike against one enemy in reach, dealing 1/1d4/2d4/3d4/4d4 (For
        T1/T2/T3/T4/T5) additional Fire damage on a hit. This additional damage
        is doubled on a critical hit.</p></td></tr><tr style="height:0pt"><td
        style="border-left:solid #000000 1pt;border-right:solid #000000
        1pt;border-bottom:solid #000000 1pt;border-top:solid #000000
        1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><span
        class="action-glyph">2 </span>Sonic
        Damper</p><p>@UUID[Compendium.covalon.varceta-items.Item.OStLpe2eSDO0K8Ug]{HORSE
        Ability: Sonic Damper}</p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Gain
        10/15/20/25/30 (For T1/T2/T3/T4/T5) Temp HP for one
        minute.</p></td></tr></tbody></table></div><p></p>
