  - sort: 500000
    name: 'Appendix A: Survivor Groups'
    type: text
    _id: ixiGnIhQEh6Bwerp
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p></p><table><tbody><tr><td data-colwidth="80"><p></p></td><td
        data-colwidth="142"><p>Healers</p></td><td><p>Militia</p></td><td><p>Battle
        Mages</p></td><td data-colwidth="140"><p>Townsfolk</p></td></tr><tr><td
        data-colwidth="80"><p>Description</p></td><td
        data-colwidth="142"><p>Clerics and acolytes of various
        deities</p></td><td><p>Survivors trained in martial
        combat</p></td><td><p>Varcetan survivors skilled in battle
        magic</p></td><td data-colwidth="140"><p>The common folk, who've
        survived against all odds</p></td></tr><tr><td
        data-colwidth="80"><p>Influence Skills</p></td><td
        data-colwidth="142"><p>Religion, Medicine</p></td><td><p>Athletics,
        Weapon attack rolls</p></td><td><p>Arcana, Nature, Occultism, Spell
        attack rolls</p></td><td data-colwidth="140"><p>Performance Deception,
        Diplomacy, Survival</p></td></tr><tr><td
        data-colwidth="80"><p>Weaknesses</p></td><td data-colwidth="142"><p>The
        camp's healers are particularly impressed by healing spells that don't
        have the Vitality or Void trait. If a spellcaster uses a leveled spell
        or otherwise limited use ability that meets the above criteria as part
        of their show, the DC to impress the healers is 5
        lower.</p></td><td><p>The militia are impressed not necessarily by magic
        or unlimited resources, but by effective improvisation. The DC to
        impress the militia by making a weapon attack with an improvised or
        non-magical/unruned weapon is 3 lower.</p></td><td><p>The camp's mages
        are easily impressed by AoE damage spells. If a spellcaster expends a
        leveled spell that does damage in an area as part of their show, the DC
        to impress the Mages is 5 lower.</p></td><td data-colwidth="140"><p>The
        children and younger members of the camp are particularly in awe of
        stories about deeds in battle and defeating undead monsters. If the
        performers boast about their own prowess against undead, whether by
        deception or performance, the DC to impress the commoners is 3
        lower.</p></td></tr><tr><td data-colwidth="80"><p>Type I
        Assist</p></td><td data-colwidth="142"><p>Players gain half the effects
        of False Vitality cast at the highest spell level for the APL. (If APL
        is 2, give players 3 temp hp. If APL is 1, give players 1 temp
        hp.)</p></td><td><p>Last encounter is moderate instead of moderate + 20
        xp.</p></td><td><p>Cannons do force damage equal to [building creatures
        2-10 low] per apl (use Caster Assist I in Psychannon block)</p></td><td
        data-colwidth="140"><p>Players gain a +1 bonus to saves against fear in
        the next encounter (emotion, visual, mental traits as per Marshal
        ded)</p></td></tr><tr><td data-colwidth="80"><p>Type II
        Assist</p></td><td data-colwidth="142"><p>Players gain effects of False
        Vitality cast at the highest spell level for the APL. (If APL is 2, give
        players 5 temp hp. If APL is 1, give players 3 temp
        hp.)</p></td><td><p>Last encounter is moderate - 20 xp instead of
        moderate + 20 xp.</p></td><td><p>Cannons do force damage equal to
        [building creatures 2-10 moderate] per apl (use Caster Assist II in
        Psychannon block)</p></td><td data-colwidth="140"><p>Players gain an
        extra temp hero point per player for the next
        encounter</p></td></tr></tbody></table>
