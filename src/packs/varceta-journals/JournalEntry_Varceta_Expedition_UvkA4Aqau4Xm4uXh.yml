  - sort: 200000
    name: 'Varceta Mission A: Raise Morale'
    type: text
    _id: UwJFBcg7WT9xUSfa
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<h3>Hook</h3><p>Is it possible? Covalon <span style=\"font-family:Signika\">has located a camp of rebel survivors that might be able to aid in our fight against the psychopomp armie</span>s, but we’ll need to prove we can be trusted before they’ll help us. You’ll need to make quite the impression to win them over…</p><h3>Required Elements</h3><ol><li><p>During Scene 2, the party must impress different demographics of the Varcetans gathered in the camp. The influence skills, special requirements, and rewards for each group is listed in Appendix A: Survivor Groups.</p></li><li><p>During Scene 3, the party has access to a Semi-Automatic Psychannon, which you can find in the Varceta Actors folder.</p></li></ol><h3>Scene 1: Surveilled Ambush</h3><p>The players face a moderate encounter a few miles outside of the Varcetan survivor’s camp. Afterwards, a Varcetan scout who saw the whole thing ushers them quickly to the camp, where they’ll activate scene 2.</p><h3>Scene 2: The Best Goddamn Talent Show This Town’s Ever Seen!</h3><p>This scene contains four phases. The party must succeed at skill checks during each phase to accumulate Influence Points.</p><p>Critical Success The party gains 2 Influence Points.</p><p>Success The party gains 1 Influence Point.</p><p>Critical Failure The party loses 1 Influence Point.</p><ul><li><p>Once each player has contributed to a phase, compare the amount of Influence Points they have to the Outcome Table below, using the highest threshold possible.</p></li><li><p>Using the initiative tracker to see who has already acted is useful, but feel free to let players act in any order they want during each phase.</p></li></ul><h4><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Phase 1: Watch and Learn</span></strong></span></h4><p>The camp is filled with several groups of survivors, and the party needs to get to know the people here in order to figure out what will impress each group.</p><p>Applicable Skills: <strong>#DC#</strong> Perception, Society, or Diplomacy</p><div><table><colgroup><col></col><col></col></colgroup><tbody><tr><td><p>Minimum of Influence Points required</p></td><td><p>Outcome</p></td></tr><tr><td><p>[Party Size + 1] points</p></td><td><p>The party learns the influence skills and special DC-lowering prereqs for each group they spoke with.</p></td></tr><tr><td><p>[Party Size] points</p></td><td><p>The party learns the influence skills for each group they spoke with.</p></td></tr><tr><td><p>[Party Size / 2] (rounded down) points</p></td><td><p>The party learns 1 influence skill for each group they spoke with.</p></td></tr><tr><td><p>1 or less points</p></td><td><p>The party might’ve watched, but they definitely didn’t learn. They don’t learn any influence skills for any of the groups, and must walk into the rest of the phases blind.</p></td></tr></tbody></table></div><h4><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Phase 2: Set Up Backstage</span></strong></span></h4><p>The party needs to plan exactly how they’ll impress the folks in the camp.</p><p>Applicable Skills: <strong>#DC#</strong> Crafting or Athletics to create props, Deception to create disguises, or Performance to practice your act.\_</p><div><table><colgroup><col></col><col></col></colgroup><tbody><tr><td><p>Minimum of Influence Points required</p></td><td><p>Outcome</p></td></tr><tr><td><p>[Party Size + 1] points</p></td><td><p>Thanks to the party’s stellar preparation, the DCs for the next stage become <strong>#DC-1#</strong>.</p></td></tr><tr><td><p>[Party Size] points</p></td><td><p>The DCs for the next stage remain as <strong>#DC#</strong>.</p></td></tr><tr><td><p>[Party Size / 2] (rounded down) points</p></td><td><p>The DCs for the next stage become <strong>#DC+1#</strong>.</p></td></tr><tr><td><p>1 or less points</p></td><td><p>Oh, boy. The DCs for the next stage become <strong>#DC+2#</strong>.</p></td></tr></tbody></table></div><h4><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Phase 3: Time to Shine!</span></strong></span></h4><p>The party must use the skills they discovered (or failed to discover) to impress their new\_ Varcetan friends! Each player must choose a group to impress with their performance– please note that the party can gain more than 1 Type I Assist from the different groups, but cannot earn more than 1 Type II Assist overall.</p><p></p><div><table><colgroup><col></col><col></col></colgroup><tbody><tr><td><p>Minimum of Influence Points required per group</p></td><td><p>Outcome</p></td></tr><tr><td><p>5 points</p></td><td><p>Well done! The party gains this group’s listed Type II Assist.</p></td></tr><tr><td><p>3 points</p></td><td><p>The party gains this group’s listed Type I Assist.</p></td></tr><tr><td><p>&lt;3 points</p></td><td><p>The party does not gain either of this group’s listed Assists.</p></td></tr></tbody></table></div><h4><span style=\"text-decoration:underline\"><strong><span style=\"text-decoration:underline\">Phase 4: Call to Arms</span></strong></span></h4><p>Regardless of how Phase 3 went, the party gets one last chance to impress their audience and rouse them into bravery! The party makes a group Diplomacy, Intimidation, or Society roll against <strong>#DC#</strong>, which any party member may abstain from. Take the average of the party’s rolls to see if they clear the DC, and then change their benefits from Phase 3 accordingly.</p><div><table><colgroup><col></col><col></col></colgroup><tbody><tr><td><p>Level of Success</p></td><td><p>Outcome</p></td></tr><tr><td><p>Crit Success</p></td><td><p>The party gains an extra Influence Point towards impressing all listed groups.</p></td></tr><tr><td><p>Success</p></td><td><p>The party gains an extra Influence Point towards impressing one specific group, which they must decide on together.</p></td></tr><tr><td><p>Failure</p></td><td><p>The party fails to pump up the crowd, but they don’t lose any points.</p></td></tr><tr><td><p>Crit Fail</p></td><td><p>Woof. The players lose an Influence Point from whichever of the groups they had acquired the most Points towards impressing. Good job, guys.</p></td></tr></tbody></table></div><p></p><p>Once this phase is completed, move to Scene 3 as scouts report an advancing attack by psychopomp enemies attracted by the noise. Players may take exploration activities.</p><h3>Scene 3: Deter Advancing Forces</h3><p>The party faces a <strong>moderate + 20 experience</strong> encounter against psychopomp forces, with the assistance of a Semi-Automatic Psychannon and the Assists they earned from Phase 2.</p><h3>Recommended Locations</h3><p>For the first encounter: volcanic wastelands, city ruins</p><p>For the rest of the session: exterior volcanic fortress/camp</p><h3>Recommended Creatures</h3><p>Creatures with the psychopomp trait; celestials, animals, beasts with the death-chilled adjustment (Appendix D: Death-Chilled Template) who would reasonably work under the psychopomp army; creatures with the cold trait and the death-chilled adjustments.</p><h3>Recommended Loot</h3><p>At least 50% of the treasure budget should be given out in raw gp. The rest of the budget must contain one to three level appropriate formulae, and fire themed items.</p><p> If the players earned a Type II Assist from any of the groups, they gain a gold bonus equal to 10% of the total loot budget and also learn about experimental magically enhanced lava with touches of void energies that has made effective bindings for and weapons against the psychopomp forces– they’re being referred to in hushed whispers as ‘lava tethers.’</p>"
