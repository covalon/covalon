  - sort: 400000
    name: 'Varceta Mission C: Submarine Surveillance'
    type: text
    _id: uKyr6csEjOdZhhz0
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h3>Hook</h3><p>We know the psychopomp forces are gathering under the
        volcanic sea. The Society crafted a specialized Shark Diver submarine
        that will allow us to dive down and perform some reconnaissance. Any
        information you can gather will be very valuable when we launch our
        assault on the Varcetan Maw Vessel.</p><h3>Required Elements</h3><p>This
        mission takes place entirely underwater, with the PCs using a special
        vehicle called a Shark Diver. The Shark Diver uses a modified version of
        the <a href="https://2e.aonprd.com/Rules.aspx?ID=3116">Vehicle Rules</a>
        from GM Core. It will be helpful for you and your players to review
        those rules before playing this mission as well as the <a
        href="https://2e.aonprd.com/Rules.aspx?ID=2438">Aquatic Combat</a>
        rules. A map of the inside of the Shark Diver is provided as Appendix C:
        Map of the Shark Diver. It's recommended that you add this map as a tile
        to the corner of any battle maps you use and keep track of PC's
        positions inside the submarine on that tile during combats. The full
        descriptions of all special submarine actions are in the Shark Diver
        vehicle stat blocks. The shark is not meant to feel limiting for
        characters, so try to rule in favor of the player when possible for
        class features and feats (IE, allowing a toxicologist to poison the
        shark's jaws, or allowing a swashbuckler to Feint while at the jaw or
        tails controls).</p><p>Choose three locations of interest from the table
        below for the PCs to encounter as they explore the depths. Each PC can
        use the <strong>Psychopomp Reconnaissance</strong> activity once at each
        location. The DC for this activity is <strong>#APL#</strong>, or
        <strong>#APL-5# </strong>for an applicable lore, at the GM's discretion.
        Allow PCs to be creative with what skills they choose to use for this
        activity. If the PCs earn at least <strong>#Party Size -1#</strong>
        Observation Points at an individual Location of Interest, they learn
        that location's secret.</p><p><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">Psychopomp R</span></strong><span
        style="font-family:'Google Sans', Roboto, Arial,
        sans-serif"><strong><span
        style="text-decoration:underline">econnaissance</span></strong></span></span></p><p><em>[Exploration][Concentrate]</em></p><p>You
        assist your group's efforts to stealthily learn what you can from the
        gathered psychopomps. Attempt a skill check based on how you would like
        to assist, such as Crafting or a magical tradition skill to carefully
        pilot the ship, Perception to keep watch, Stealth to provide guidance on
        keeping the Shark Diver hidden from sight, Religion to recall knowledge
        on psychopomps, Diplomacy or Performance to keep your group focused
        during the long stakeout, or some other check related to the location
        you're trying to surveil, at the GM's discretion.</p><section
        class="statblock"><p><strong>Critical Success</strong> You earn 2
        Observation Points (OP).</p><p><strong>Success</strong> You earn 1
        OP.</p><p><strong>Failure</strong> You earn no
        OP.</p><p><strong>Critical Failure</strong> You lose 1
        OP.</p><table><tbody><tr><td data-colwidth="177"><p
        style="text-align:center"><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">Location of
        Interest</span></strong></span></p></td><td><p
        style="text-align:center"><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">Description</span></strong></span></p></td><td><p
        style="text-align:center"><span
        style="text-decoration:underline"><strong><span
        style="text-decoration:underline">Secret</span></strong></span></p></td></tr><tr><td
        data-colwidth="177"><p>Kelp Forest</p></td><td><p>Within a massive
        forest of overgrown kelp, a group of psychopomps are combing through the
        kelp looking for…something.</p></td><td><p>You realize the psychopomps
        are gathering specialized plant reagents from the kelp and algae. These
        particular plants are common ingredients in Antidotes. And these
        psychopomps sure are gathering a lot of them.</p></td></tr><tr><td
        data-colwidth="177"><p>Underwater Boneyard</p></td><td><p>A vast plain
        on the ocean floor, strewn with bones. Psychopomps lurk near the edges,
        dropping further corpses on the already piled high
        bones.</p></td><td><p>The bones are from a variety of creatures of both
        the sea and the land. For psychopomps to be treating the dead so
        carelessly, they have truly lost their way. The largest of the bodies
        are of massive undersea monsters - the majority of these died from being
        beheaded.</p></td></tr><tr><td data-colwidth="177"><p>Volcanic
        Forge</p></td><td><p>Volcanic flame bubbles out of vents in the ocean
        floor. A contingent of psychopomp crafters work to forge and maintain
        various weapons and armor.</p></td><td><p>Many of the weapons the
        psychopomps are working on are of Varcetan make, most likely recovered
        from attacks on Varcetan survivors. While processing these weapons, you
        notice one of the psychopomps seems to concentrate on the weapon, and
        then a burst of magic dissipates around it.</p></td></tr><tr><td
        data-colwidth="177"><p>Trench Garrison</p></td><td><p>A fortified
        encampment of psychopomp forces, surrounded by rock walls with sentries
        posted. In the center of the inner courtyard, soldiers drill in routine
        formations.</p></td><td><p>In addition to gleaning valuable information
        about their general tactics, you realize a captain or commander is
        trying to teach a particular ability to the others. The captain's form
        shimmers and becomes ghostly as he demonstrates, and then concentrates
        on another psychopomp, turning them ghostly as
        well.</p></td></tr><tr><td data-colwidth="177"><p>Coral Reef
        Cache</p></td><td><p>Much closer to the surface than you would suspect,
        you spot a patrol of psychopomps guarding something within a cluster of
        colorful coral.</p></td><td><p>You manage to hide in waiting long enough
        and find a window to steal the cache for yourselves. It's a weapons
        cache containing a half dozen, wickedly sharp psychopomp-made scythes.
        Not only are they incredibly sharp, they have strangely placed grips,
        clearly designed for two different wielding styles.</p></td></tr><tr><td
        data-colwidth="177"><p>Hidden Shrine</p></td><td><p>A large stone statue
        of a looming, bird shaped creature wearing a hood, its face obscured.
        Psychopomps come and go individually or in small groups, seemingly
        paying respects.</p></td><td><p>While this shrine does seem like it was
        originally dedicated to the Grey Ocean, it's more recently been carved
        over with much more vicious symbology. Something is pushing these
        psychopomps to be much more aggressive, and it's getting worse. Further,
        you manage to get close enough to the shrine to make out the hooded face
        - a bird wearing a skull mask with two
        faces.</p></td></tr></tbody></table></section><p>At any points of your
        choosing during the mission, the PCs encounter two moderate combats. The
        PCs do not have to stay inside the Shark Diver during these combats (ie
        PCs have prepared Water Breathing, etc and want to fight while
        swimming), but any creature underwater at the end of their turn will
        take bludgeoning damage based on Tier due to the water pressure with no
        save. Make sure players are aware that the water pressure is dangerous
        before they leave the Shark. You're also free to use enemies that are
        incorporeal or have teleporting abilities and use them to enter the
        shark diver itself! Hint: Many psychopomps can cast
        Translocate.</p><table><tbody><tr><td><p>Tier 1</p></td><td><p>Tier
        2</p></td><td><p>Tier 3</p></td><td><p>Tier 4</p></td><td><p>Tier
        5</p></td></tr><tr><td><p>@Damage[1d6[bludgeoning]]</p></td><td><p>@Damage[3d6[bludgeoning]]</p></td><td><p>@Damage[5d6[bludgeoning]]</p></td><td><p>@Damage[7d6[bludgeoning]]</p></td><td><p>@Damage[9d6[bludgeoning]]</p></td></tr></tbody></table><p></p><h3>Recommended
        Locations</h3><p>Underwater maps. The oceans around Varceta are volcanic
        and rocky, with areas of thick vegetation and steep
        drop-offs.</p><h3>Recommended Creatures</h3><p>Underwater animals or
        beasts, Aquatic creatures with the Death-Chilled adjustment, Psychopomps
        adjusted with the <a
        href="https://2e.aonprd.com/MonsterTemplates.aspx?ID=20">Water
        Template</a> from Rage of Elements</p><h3>Recommended Loot</h3><p>The
        PCs gain the entire loot budget as gold based on how many total OP they
        obtained. The following point totals are for a party of 6. To adjust for
        a smaller party, divide each threshold by 6, and then multiply by your
        party size (Round down). If the party gained a Secret at any location of
        interest, they get an investigation bonus equal to 10% of the total
        budget.</p><p>At Least 12: 100%</p><p>At Least 9: 90%</p><p>6 or less:
        80%</p>
