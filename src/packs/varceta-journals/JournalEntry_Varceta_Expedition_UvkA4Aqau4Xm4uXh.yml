  - sort: 300000
    name: 'Varceta Mission B: Stoke the Flames'
    type: text
    _id: z6WSASJPEeoXwQwm
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h2 dir="ltr" style="line-height:1.38;margin-top:18pt;margin-bottom:6pt"
        id="docs-internal-guid-6f6c207d-7fff-cd98-864f-d53f24c8e9bb">Hook</h2><p
        dir="ltr" style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">Our
        scouts noticed a particular lack of Psychopomps at the volcanic shores
        of Varceta, and they think it might have something to do with the
        volcanic rocks out there. We need someone to head out there and gather
        some samples so we can test our theories.</p><h2 dir="ltr"
        style="line-height:1.38;margin-top:18pt;margin-bottom:6pt">Required
        Elements</h2><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt"
        role="presentation">At the beginning of the mission, every player
        chooses a HORSE (Heat-Operated and -Resistant Supportive Exoskeleton)
        based on the mechanical horses used to arrive in Varceta to traverse the
        dangerous volcanic ridge with.</p><p>Everyone gains access to one active
        and one passive ability of their choice, as described in Appendix B:
        H.O.R.S.E. Information. </p><p>Every encounter during scene 2 happens on
        the same map, which can be found in the Varceta Maps
        folder.</p><p>During scene 2, two encounters exclusively consist of
        Reaper Minions, which can be found in the Varceta Actors
        folder.</p><p>If the Reaper catches up to the party during scene 2, they
        are immediately forced into the encounter of scene 3. The monster stats
        for this encounter can be found in the Varceta Actors folder.</p><h2
        dir="ltr"
        style="line-height:1.38;margin-top:18pt;margin-bottom:6pt">Scene 1:
        Unexpected Resistance</h2><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">On their way
        along the volcanic ridge, the party gets into a <strong>Moderate
        difficulty encounter</strong> as they meet resistance from local fire
        elementals and other creatures native to these areas.</p><h2 dir="ltr"
        style="line-height:1.38;margin-top:18pt;margin-bottom:6pt">Scene 2: The
        Reaper’s Chase</h2><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">The party can
        take a moment to rest and survey their surroundings. They will notice a
        large deposit of volcanic rocks, but before they can start gathering any
        significant amounts, they see an army of shadowy figures approaching.
        They are forced into a <strong>Hybrid Chase</strong>, alternating
        between skill challenges and easy encounters. The exact order of skill
        challenges and encounters can be chosen by the GM, but it should always
        alternate between skill challenges and encounters.</p><p>At any point
        (In both skill challenges and encounters) during this Chase, players may
        use their entire turn to <strong>gather volcanic rock</strong>, which
        does not require any checks. Spending one turn on gathering rocks yields
        one Victory Point. Victory Points are only relevant for determining the
        loot of this mission, and do not affect the Chase in any way.</p><p
        dir="ltr" style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">In
        addition, the party may drop all of their gathered volcanic rock (And
        forfeit all Victory Points) during any skill challenge round to create a
        distraction and safely escape from the Reaper.</p><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">After beating
        all eight challenges (Four skill challenges and four combat encounters)
        without being caught by the Reaper, the party successfully escapes and
        completes the mission.</p><p>In Tier 5 and Tier 4, the Reaper starts two
        obstacles behind the party and advances by one objective at the end of
        every round (For skill challenges) or at the end of the third round (For
        encounters), so if the party fails a total of two objectives, they are
        forced into the Reaper encounter (See scene 3).</p><p>In Tiers 3 and
        below, the Reaper starts three obstacles behind, so they must fail three
        objectives to trigger the Reaper encounter.</p><h3 dir="ltr"
        style="line-height:1.38;margin-top:16pt;margin-bottom:4pt">Skill
        Challenges</h3><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">All skill
        challenges consist of one round, in which the party has to collect a
        certain number of Chase Points to succeed in this round. A successful
        skill check grants one Chase Point, a critical success grants two Chase
        Points, and the party loses one Chase Point on a critical failure. Chase
        Points can never drop below zero, and any surplus Chase Points the party
        acquires have no effect. The DCs for these checks are always <strong>#DC
        by level + 2#</strong> for general skills and <strong>#DC by
        level#</strong> for applicable Lore skills.</p><p>If the party reaches
        the Chase Point threshold for the current objective before the end of
        the round, they manage to keep their distance from the Reaper, and any
        players who haven’t acted yet can <strong>use their turn to gather
        volcanic rock</strong>.</p><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">If they fail
        to meet the threshold, they move on to the next objective, but the
        Reaper catches up by one obstacle.</p><div dir="ltr"
        style="margin-left:0pt"><table
        style="border:none;border-collapse:collapse;table-layout:fixed;width:468pt"><colgroup><col></col><col></col><col></col><col></col></colgroup><tbody><tr
        style="height:0pt"><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><strong>Objective</strong></p></td><td
        style="border-left:solid #000000 1pt;border-right:solid #000000
        1pt;border-bottom:solid #000000 1pt;border-top:solid #000000
        1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><strong>Description</strong></p></td><td
        style="border-left:solid #000000 1pt;border-right:solid #000000
        1pt;border-bottom:solid #000000 1pt;border-top:solid #000000
        1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><strong>Chase
        Point Threshold</strong></p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><strong>Applicable
        Skills</strong></p></td></tr><tr style="height:0pt"><td
        style="border-left:solid #000000 1pt;border-right:solid #000000
        1pt;border-bottom:solid #000000 1pt;border-top:solid #000000
        1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Cross the Lava
        Stream</p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">The party’s
        path is blocked by a stream of lava running down the mountainside. They
        have to find a way to safely cross it.</p></td><td
        style="border-left:solid #000000 1pt;border-right:solid #000000
        1pt;border-bottom:solid #000000 1pt;border-top:solid #000000
        1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><strong>#Party
        size - 2#</strong></p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Crafting,
        Acrobatics, Survival, or applicable Lores.</p><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">A player with
        the Lava Stride mount ability can take an automatic success instead of
        attempting a check.</p></td></tr><tr style="height:0pt"><td
        style="border-left:solid #000000 1pt;border-right:solid #000000
        1pt;border-bottom:solid #000000 1pt;border-top:solid #000000
        1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Avoid the Rock
        Avalanche</p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">During their
        chase, the party accidentally caused a rock avalanche. They have to
        avoid the rocks to the best of their abilities without slowing down too
        much.</p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><strong>#Party
        size - 1#</strong></p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Fortitude,
        Reflex, Perception, or applicable Lores.</p></td></tr><tr
        style="height:0pt"><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Ward Off the
        Angered Fire Elementals</p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">The high-speed
        chase has stirred up some of the local fire elementals. The party
        doesn’t have enough time to stop and properly fight them off, they just
        have to somehow pacify or stop the enraged creatures.</p></td><td
        style="border-left:solid #000000 1pt;border-right:solid #000000
        1pt;border-bottom:solid #000000 1pt;border-top:solid #000000
        1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><strong>#Party
        size - 1#</strong></p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Arcana, Nature,
        Occultism, Religion, or applicable Lores.</p></td></tr><tr
        style="height:0pt"><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Sneak Past the
        Patrols</p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">The party
        almost ran into some Psychopomp patrols. They have to find a way past
        them without alerting anyone.</p></td><td style="border-left:solid
        #000000 1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt"><strong>#Party
        size - 2#</strong></p></td><td style="border-left:solid #000000
        1pt;border-right:solid #000000 1pt;border-bottom:solid #000000
        1pt;border-top:solid #000000 1pt;vertical-align:top;padding:5pt 5pt 5pt
        5pt;overflow:hidden;overflow-wrap:break-word"><p dir="ltr"
        style="line-height:1.2;margin-top:0pt;margin-bottom:0pt">Stealth,
        Deception, Athletics, or applicable
        Lores.</p></td></tr></tbody></table></div><h3 dir="ltr"
        style="line-height:1.38;margin-top:16pt;margin-bottom:4pt">Encounters</h3><p
        dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">There is a
        total of <strong>four encounters</strong> during this chase,
        representing small groups of enemies the party fights off while
        escaping. Two of these encounters should be <strong>Low
        difficulty</strong> encounters using fire elementals and other creatures
        native to the area (See Recommended Creatures), while the other two
        always consist of <strong>two Reaper Minions</strong> (Adjust for higher
        or lower APL using Weak and Elite templates). In combat, any player
        <strong>may forfeit their turn to gather volcanic rock</strong> instead.
        If they choose to do so, their turn ends immediately, but the party
        gains one Victory Point for this mission.</p><p>Each of these encounters
        happens on the premade Lava Fields map in the Varceta Maps folder, and
        for each encounter, the party always starts in one of the starting zones
        (Square and rectangle regions marked on the map, except for the northern
        zone), while the enemies start in one of the other zones (Except for the
        northern zone).</p><p>Players always start these encounters <strong>with
        their reactions available and their weapons drawn</strong> (If they
        choose to).</p><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">If they manage
        to beat the encounter before the end of round 3, they manage to keep
        their distance from the Reaper. If they take longer, the Reaper catches
        up by one obstacle. If the distance to the Reaper ever reaches zero, the
        party will immediately be forced into the Reaper encounter (See scene 3)
        as soon as the current combat ends.</p><h2 dir="ltr"
        style="line-height:1.38;margin-top:18pt;margin-bottom:6pt">Scene 3: The
        Reaper</h2><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">If the party
        chooses to face the Reaper at the start of scene 2, or if the Reaper
        catches up to the party, they are forced into an encounter with the
        Reaper.</p><p>Use the provided map for this encounter, with the party
        starting in the center zone, one Reaper Minion each in the eastern and
        western zones, and the Reaper in the southern zone. The party can only
        escape from this encounter by reaching the northern zone (Across the
        lava stream). If they choose to run, they lose all Victory Points they
        gained from gathering volcanic rock, but automatically escape from the
        Reaper and immediately end the mission.</p><p><strong>Special:</strong>
        For T1, replace the Reaper with a third Reaper Minion.</p><h2 dir="ltr"
        style="line-height:1.38;margin-top:18pt;margin-bottom:6pt">Recommended
        Locations</h2><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">Scene 1: Rocky
        cliffsides or mountainside maps with little to no
        vegetation.</p><p>Scene 2: Use the premade map in the Varceta Maps
        folder.</p><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">Scene 3: Use
        the premade map in the Varceta Maps folder.</p><h2 dir="ltr"
        style="line-height:1.38;margin-top:18pt;margin-bottom:6pt">Recommended
        Creatures</h2><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">For scene 1
        and the fire-themed encounters of scene 2, use creatures with the Fire
        trait, creatures who would live close to volcanos, or creatures who were
        influenced by the intense heat of these volcanos (See the <a
        href="https://2e.aonprd.com/MonsterTemplates.aspx?ID=18">Fire
        Template</a> from Rage of Elements).</p><h2 dir="ltr"
        style="line-height:1.38;margin-top:18pt;margin-bottom:6pt">Recommended
        Loot</h2><p dir="ltr"
        style="line-height:1.38;margin-top:0pt;margin-bottom:0pt">The full
        treasure budget should be given out in raw gp, flavored as payment for
        the mined resources, as described in scene 2. The exact amount depends
        on the number of Victory Points gained during scene 2.</p><div dir="ltr"
        style="margin-left:0pt"><table
        style="border:none;border-collapse:collapse;table-layout:fixed;width:468pt"><colgroup><col></col><col></col></colgroup><tbody><tr
