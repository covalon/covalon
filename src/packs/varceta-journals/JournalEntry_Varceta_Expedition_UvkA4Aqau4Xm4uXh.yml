  - sort: 450000
    name: Varceta Finale
    type: text
    _id: n4sh1ulTU06JpxNk
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<h2>Hook</h2><p>Magical energies are brewing atop a nearby volcano; a facsimile of The Great Seabird must be coming. Using our specialized Lava Tethers we can bind them in place, and strike them down while they are weak. Set them up, bind it, and cut down this Maw abomination.</p><h2>Before Combat</h2><h3>Player Prep</h3><p>The Maw was controlling the leader of the enemy psychopomps, <strong>Traseem, the Great Seabird, </strong>and now its created a foul fascimile of our old foe. Due to the Maw’s influence, Traseem and its fascimilies lack the neutrality of typical psychopomps, and we need to use Varcetan fire magic to put them down. Lured atop a nearby volcano, the fascimile will be chained to the peak by special Lava Tethers.</p><p>It requires time and effort to keep the Lava Tethers active, so <strong>PCs can only use buffs with 8 hour+ durations</strong>.\_</p><h3>Starting the Finale</h3><p>Add @UUID[Compendium.covalon.varceta-items.Item.dxjdb31ZoQ8FEdf4]{Phaseshift} (or @UUID[Compendium.covalon.varceta-items.Item.hMLddefAofdol4z7]{Phaseshift - T3}, in Tier 3) to your players character sheets.</p><p>Explain that the left side of the map represents the material plane, the right the ethereal plane, and they can use the Lava Tethers to move between.</p><p>PCs <strong>must</strong> start in two groups of three, adjacent to each of the Lava Tethers. They start on the Material Plane (left map). Players <strong>must</strong> stay in the central 40 foot radius dome area of the maps during the encounter or they are considered to have retreated. Make your players aware of this restriction.\_</p><p>The facsimile of Traseem spawns in above the volcano in an explosion of ghastly energy, and then gets locked in place by the Lava Tethers.</p><p>Traseem exists on both the Material and Ethereal Planes. Using the Lava Tethers, the PCs can traverse between the two. Players can vaguely see and hear things happening on the other plane, but <strong>players cannot target or affect creatures on the other plane.</strong>\_</p><h2>During Combat</h2><h3>Initiative Start - Paltry Trinkets</h3><p>Once initiative is rolled, all players will need to save against Mortals and their Paltry Trinkets. Players are only affected by this ability once.</p><p>Lost items fall into the ethereal plane, in the same relative square of the player they were taken from. These squares must be indicated in some fashion.</p><p>Reveal and use the @UUID[Compendium.covalon.varceta-actors.Actor.u6sjssMlFZ5s8SJM]{Paltry Trinkets} lootbox to hold the items, and use whatever method you prefer for reminding players where their items are on the map. Alternatively, if you have the PF2E Toolbox module, you can enable and use it's Droppeth feature to drop items directly on the map.</p><p>The players will likely need to use @UUID[Compendium.covalon.varceta-items.Item.dxjdb31ZoQ8FEdf4]{Phaseshift} to collect teleported gear.</p><p>To reinvest an item, they will need to use an action to pick it up, and an action to re-equip it (<strong>this effect ignores the normal restrictions on investment slots and uninvesting/reinvesting items</strong>).</p><h3>Phase 1 - Expected Combat Flow</h3><p>Every turn, Traseem <strong>must</strong> use either Waves Crash In or Tides Rush Out, alternating between the two. You can use the off-map tile to keep track of this.</p><p>They will always try to hit as many characters as possible with their AOE scythe attacks. They should be able to reach anywhere in the arena thanks to their Reaper’s Blade.</p><p>Traseem will use Reave Magic as necessary to remove debuffs or dangerous spell effects from the field.\_</p><h3>Phase 2 - Set Up</h3><p>When Traseem is reduced to zero HP, they are reanimated as Tras, the Body Returned and Eem, the Spirit Reborn as per Death is Never the End.</p><p>If this interrupts a player's turn, resolve the player's turn first before proceeding with the setup.</p><p>Add Tras to the initiative directly after the player who killed Traseem, and Eem directly after Tras.</p><p>Players then get phase locked to the ethereal or material plane, depending on the initiative order. <strong>Players 1, 3, and 5 in initiative</strong> are ethereal plane bound. Add the @UUID[Compendium.covalon.varceta-items.Item.yfmYPysaabpaKmkh]{Ethereal Plane Bound} effect to ethereal locked PCs as a visual reminder. <strong>Players 2, 4, and 6 in initiative </strong>are material plane bound. Players that are not on their respective bound plane immediately teleport there, in the same relative square they were in.</p><p>Add the @UUID[Compendium.covalon.varceta-items.Item.y8p2YCAQs4qqcer6]{Phaselocked Phaseshift} (or @UUID[Compendium.covalon.varceta-items.Item.CqxVlQlCgv5gAt27]{Phaselocked Phaseshift - T3} in Tier 3) action to all character's sheets. It is the same as Phaseshift <strong>except they snap back to the plane they are locked to at the beginning of their next turn in the same relative square they were in on the opposite plane</strong>.</p><h3>Phase 2 - Expected Combat Flow</h3><p>On Tras’s first turn, they will <strong>ONLY</strong> Prepare to Reap, gaining the @UUID[Compendium.covalon.varceta-items.Item.vpsOPIozi9jEb35A]{Ready to Reap} effect. <strong>Make sure to heavily telegraph this ability!</strong></p><p>Eem then takes a normal turn.</p><p>When the round returns to Tras’s initiative, they only use Kneel Forever. This ability automatically hits any non-dying creatures on the material plane, regardless of line of effect, sight, or cover. The only way to dodge it is to use the Lava Tethers to shift to the other plane.\_</p><p>After using Kneel Forever, Tras’s turn ends again, and Eem takes another normal turn. At the end of Eem's turn, Eem gains Ready to Reap.</p><p>Tras will take a normal turn on their next initiative, getting Ready to Reap at the end of it, while Eem unleashes Soul Carver and does nothing else, back and forth in a cycle.</p><p>Tras must use Tides Rush Out on their normal turns. Eem must use Waves Crash In on on their normal turns.</p><p><strong>This is what your rounds should look like:</strong></p><p><em>Round 1</em><br /><strong>Tras</strong>: Prepare to Reap, end turn.<br /><strong>Eem</strong>: <span class=\"action-glyph\">111 </span>including Waves Crash In, end turn.</p><p><em>Round 2</em><br /><strong>Tras</strong>: Kneel Forever, end turn.<br /><strong>Eem</strong>: <span class=\"action-glyph\">111 </span>including Waves Crash In. <span class=\"action-glyph\">F </span>Prepare to Reap, end turn.</p><p><em>Round 3</em><br /><strong>Tras</strong>: <span class=\"action-glyph\">111</span> including Tides Rush Out. <span class=\"action-glyph\">F</span> Prepare to Reap, end turn.<br /><strong>Eem</strong>: Soul Carver, end turn.</p><p>… repeat rounds 2 and 3 until players meet the win condition.</p><h3>Win Condition</h3><p>Tras and Eem cannot be reduced below 1 HP until they both reach 1 HP, at which point the volcano erupts and kills them both, ending the encounter.\_</p><h2>Additional Notes</h2><ul><li><p>Traseem cannot move, but they have Tides Rush Out which can push away enemies grappling them and Reave Magic to counteract persistent AOE effects like Slither or Blade Barrier.\_</p></li></ul><ul><li><p>For the PCs, this fight is all about movement and careful positioning. Waves Crash In and Tides Rush Out can be used to clump up PCs and hit them with AOE scythe strikes. Punish them if they stand too close together.\_</p></li></ul><ul><li><p>When the Unstable Tethers modification is in use, you can track which tether the player used last on the parchment in the bottom of the map. Before the game, add the PCs names to the “Player” lines and mark as needed (the X icons are Tiles).\_</p></li></ul><ul><li><p>If players try to hide behind walls, Traseem is not too bothered, as they can still affect PCs through walls using Waves Crash In and Tides Rush Out. Later, Tras and Eem's Kneel Forever and Soul Carver hit enemies regardless of walls or cover.</p></li><li><p>PCs can always escape from either plane by leaving the center 40 foot radius dome. If they escape from the ethereal plane, they simply pop back into the material plane once they're far enough from the Lava Tethers.\_</p></li></ul><ul><li><p>Traseem always alternates back and forth between Waves Crash In and Tides Rush Out; there is a scroll beneath the map to assist you in remembering which one was used last (the X icon is a Tile). Waves Crash In/Tides Rush Out do not have to be used at a specific point during Traseem's turn, it can be used at any point.</p></li><li><p>When they split into Tras and Eem, Tras only has access to Tides Rush Out, and Eem only has access to Waves Crash in. They <strong>must</strong> each use their respective tides ability on turns where they do not use Kneel Forever or Soul Carver (or Tras's very first turn, where they only Prepare to Reap).</p></li><li><p>Tras and Eem always take their turns one after the other, and cannot delay. If a player tries to delay between them, they get pushed after Eem. If a player would be reordered in the initiative above Eem (such as from gaining the dying condition), they get reordered to above Tras instead.\_</p></li></ul><h2>Loot</h2><p>The entirety of the treasure budget is given out in raw GP, paid by the NPC used for the hook.</p><p>Additionally, players unlock the ability to customize their Soul Seed, gaining access to the <strong>Fire aspect</strong>.\_</p><h2>Asset Credits</h2><p>Thanks go out to Komainu for the map; and to Kelani, Komainu, Kouzo, and Seren for creating the encounter.</p>"
