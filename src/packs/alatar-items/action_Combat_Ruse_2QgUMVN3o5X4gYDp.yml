  description:
    value: >-
      <p><strong>Frequency </strong>Once per round</p><hr /><p>You hide your
      full combat potential, keeping your true capabilities concealed from our
      potential allies in Alatar Nova. Attempt a skill check related to your
      combat style. This is usually Athletics or Acrobatics for physical combat,
      a skill associated with a magic tradition to disguise your spellcasting,
      or Deception or Performance to bluff about your abilities. At the GM’s
      discretion, you may use another skill to create a suitable ruse. This
      action always has the Auditory or Visual trait and may gain the Linguistic
      trait, depending on the nature of your ruse.</p><p><strong>Critical
      Success</strong> Your ruse is exceptional! You gain 2 Ruse
      Points.</p><p><strong>Success</strong> You pull off the ruse, you gain 1
      Ruse Point.</p><p><strong>Failure</strong> You fail to perform a
      convincing ruse.</p><p><strong>Critical Failure</strong> Your ruse is not
      only a failure, but an obvious one. You lose 1 Ruse Point.</p>
