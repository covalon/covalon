        gm: ''
        value: >-
          <p>Gentle restorative magic pushes back the effects of toxins and more
          complex maladies. Choose an affliction on the target, such as a curse,
          disease, or poison. If it has advanced past stage one, reduce the
          stage by one. This reduction can be applied only once to a given case
          of an affliction, with the case ending when it's completely cured.
