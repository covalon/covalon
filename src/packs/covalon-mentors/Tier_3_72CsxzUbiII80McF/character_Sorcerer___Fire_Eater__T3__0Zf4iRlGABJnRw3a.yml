    img: systems/pf2e/icons/spells/elemental-gift.webp
    name: Elemental Gift
    system:
      description:
        gm: ''
        value: >-
          <p>An elemental force fills your target, granting the target the
          swiftness of air, the ruggedness of earth, the sting of fire, or the
          flexibility of water, depending on which element you choose. Choose an
          element when you Cast the Spell. The target gains the benefit of that
          element as described below, and this spell gains that trait's
          element.</p>

          <ul>

          <li><strong>Air</strong> The target gains a +30-foot status bonus to
          its land Speed and gains a fly Speed equal to its land Speed without
          the status bonus.</li>

          <li><strong>Earth</strong> While on the ground, the target gets a +2
          status bonus to Fortitude and Reflex saves against effects that would
          @UUID[Compendium.pf2e.actionspf2e.Item.7blmbDrQFNfdT731]{Shove} or
          @UUID[Compendium.pf2e.actionspf2e.Item.ge56Lu1xXVFYUnLP]{Trip} it, and
          to saves against effects that would attempt to knock it
          @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone}. In
          addition, the ground adjacent to the target is difficult terrain, and
          the difficult terrain moves with the target, though the target ignores
          this difficult terrain with its own movement.</li>

          <li><strong>Fire</strong> The target's melee unarmed Strikes and melee
          weapon Strikes deal 1d6 persistent fire damage on a hit.</li>

          <li><strong>Metal</strong> The target's Strikes using a metal weapon
          or an unarmed attack deal an additional 1d4 electricity damage on a
          hit and get a +1 status bonus to the attack roll if the target is made
          of metal or wearing metal armor.</li>

          <li><strong>Water</strong> The target takes on a watery sheen, gaining
          resistance 5 to fire and a swim Speed equal to its land Speed.</li>

          <li><strong>Wood</strong> The target gains a number of temporary Hit
          Points equal to the spell's rank, then gains half that number of
          temporary HP at the start of each of its turns.</li>

          </ul>

          <p>@UUID[Compendium.pf2e.spell-effects.Item.AF4vQ1xoOiJ1ewH1]{Spell
