  - folder: D7UVaOiB40wTR6kv
    img: systems/pf2e/icons/spells/eat-fire.webp
    name: Eat Fire
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Trigger</strong> You would take fire damage.</p>

          <hr />

          <p>You consume and ingest fire, making it less harmful to you. You
          gain resistance 5 to fire damage until the end of the current turn.
          During the remaining duration of the spell, you can use the Belch
          Smoke action. The spell ends if you fall
          @UUID[Compendium.pf2e.conditionitems.Item.fBnFDH2MTzgFijKf]{Unconscious},
          inhale, or exhale (this includes speaking).</p>

          <p>@UUID[Compendium.pf2e.spell-effects.Item.BGv44XBGtD4zOJBd]{Spell
          Effect: Eat Fire}</p>

          <p><strong>Belch Smoke</strong> <span class="action-glyph">1</span>
          You exhale what remains of the smoke, ending the spell and creating a
          smoke cloud in a @Template[burst|distance:5] within 20 feet. All
          creatures within the smoke cloud are
          @UUID[Compendium.pf2e.conditionitems.Item.DmAIPqOBomZ7H95W]{Concealed},
          and all other creatures are concealed to them. The smoke lasts for 1
          minute or until dispersed by a strong wind.</p>

          <hr />

          <p><strong>Heightened (+3)</strong> The resistance increases by 5.</p>
      rules: []
