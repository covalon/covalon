      appearance: >-
        <p>A leopard spotted catfolk with dramatic flair. Sparks of fire alight
        around him when he feels strong emotions. </p>
      backstory: >-
        <p>Fire Eater doesn't remember much about his childhood, until he was
        taken in by a travelling circus. They raised him, and he quickly found
        an affinity for fire. His flashy acts earned him his name. His caravan
        was destroyed in the Cataclysm, lost to the sands of Primrose. He
        wandered for a time before finally finding Covalon. Now, he can often be
        found performing and drinking at the Snail, when he's not out for
        adventure on portals and patrols. He's a daredevil and a bit of flirt,
        but he truly cares about the people he has left to protect.</p>
