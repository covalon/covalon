  - folder: lPzcDrjGDFbzuF2r
    img: systems/pf2e/icons/spells/detect-alignment.webp
    name: Clear Mind
    system:
      description:
        gm: ''
        value: >-
          <p>You drive mental contamination from the target's mind. Attempt to
          counteract an effect of your choice imposing one of these conditions
          on the target:
          @UUID[Compendium.pf2e.conditionitems.Item.sDPxOjQ9kx2RZE8D]{Fleeing},
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened},
          and
          @UUID[Compendium.pf2e.conditionitems.Item.e1XGnhKNSQIm5IXg]{Stupefied}.
          If you failed to counteract the effect but you would have if its
          counteract rank were 2 lower, instead suppress the effect until the
          beginning of your next turn. The effect's duration doesn't elapse
          while it's suppressed. This spell can't counteract or suppress
          conditions that are part of curses, diseases, or a natural state of
          the target.</p>

          <hr />

          <p><strong>Heightened (4th)</strong> Add
          @UUID[Compendium.pf2e.conditionitems.Item.yblD8fOR1J8rDwEQ]{Confused},
          @UUID[Compendium.pf2e.conditionitems.Item.9qGBRpbX9NEwtAAr]{Controlled},
          and
          @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed} to
          the list of conditions.</p>

          <p><strong>Heightened (6th)</strong> Add
          @UUID[Compendium.pf2e.conditionitems.Item.3uh1r86TzbQvosxv]{Doomed} to
          the list of conditions.</p>

          <p><strong>Heightened (8th)</strong> Add
          @UUID[Compendium.pf2e.conditionitems.Item.dfCMdR4wnpbYNTix]{Stunned}
          to the list of conditions.</p>
