  - img: icons/sundries/flags/banner-symbol-sun-gold-red.webp
    name: Cause
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: classfeature
      description:
        value: >-
          <p>You devote yourself to a specific cause in your deity's name. Some
          are limited to sanctification, as noted in parentheses. Your cause
          adds to your edicts and anathema and grants you a special reaction
          called your champion's reaction, which appears after the divider,
          along with its upgrades if you gain the relentless reaction and
          exalted reaction class features at higher levels.</p>

          <p><strong>@UUID[Compendium.pf2e.classfeatures.Item.8YIA0jh64Ecz0TG6]{Desecration}
          (Unholy):</strong> You selfishly corrupt and destroy.</p>

          <p><strong>@UUID[Compendium.pf2e.classfeatures.Item.h1NGH4TVeBljftni]{Grandeur}
          (Holy):</strong> You exemplify the glory and splendor of the celestial
          realms.</p>

          <p><strong>@UUID[Compendium.pf2e.classfeatures.Item.EQ6DVIQHAUXUhY6Y]{Iniquity}
          (Unholy):</strong> You destroy, take advantage, and act with
          dishonor.</p>

          <p><strong>@UUID[Compendium.pf2e.classfeatures.Item.peEXunfbSD8WcMFk]{Justice}:</strong>
          You follow laws and mete out just punishment.</p>

          <p><strong>@UUID[Compendium.pf2e.classfeatures.Item.FCoMFUsth4xB4veC]{Liberation}:</strong>
          You oppose tyranny and fight for freedom.</p>

          <p><strong>@UUID[Compendium.pf2e.classfeatures.Item.HiIvez0TqESbleB5]{Obedience}:</strong>
          You enforce hierarchies and order.</p>

          <p><strong>@UUID[Compendium.pf2e.classfeatures.Item.UyuwFp0jQqYL2AdF]{Redemption}
          (Holy):</strong> You try to redeem those who commit wicked deeds.</p>
        gm: ''
      level:
        value: 1
