  - folder: 0Z6sKp3ActW2pM2e
    img: systems/pf2e/icons/actions/Passive.webp
    name: Treat Wounds
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: interaction
      description:
        value: >-
          <p><strong>Requirements</strong> You're wearing or holding a
          @UUID[Compendium.pf2e.equipment-srd.Item.s1vB3HdXjMigYAnY]{Healer's
          Toolkit}.</p>

          <hr />

          <p>You spend 10 minutes treating one injured living creature
          (targeting yourself, if you so choose). The target is then temporarily
          @UUID[Compendium.pf2e.feat-effects.Item.Lb4q2bBAgxamtix5]{immune} to
          Treat Wounds actions for 1 hour, but this interval overlaps with the
          time you spent treating (so a patient can be treated once per hour,
          not once per 70 minutes).</p>

          <p>The Medicine check DC is usually 15, though the GM might adjust it
          based on the circumstances, such as treating a patient outside in a
          storm, or treating magically cursed wounds. If you're an expert in
          Medicine, you can instead attempt a DC 20 check to increase the Hit
          Points regained by 10; if you're a master of Medicine, you can instead
          attempt a DC 30 check to increase the Hit Points regained by 30; and
          if you're legendary, you can instead attempt a DC 40 check to increase
          the Hit Points regained by 50. The damage dealt on a critical failure
          remains the same.</p>

          <p>If you succeed at your check, you can continue treating the target
          to grant additional healing. If you treat it for a total of 1 hour,
          double the Hit Points it regains from Treat Wounds.</p>

          <p>The result of your Medicine check determines how many Hit Points
          the target regains.</p>

          <p>@UUID[Compendium.pf2e.pf2e-macros.Macro.6duZj0Ygiqv712rq]{Treat
          Wounds}</p>

          <hr />

          <p><strong>Critical Success</strong> The target regains [[/r
          4d8[healing] #Treat Wounds]] Hit Points and loses the
          @UUID[Compendium.pf2e.conditionitems.Item.Yl48xTdMh3aeQYL2]{Wounded}
          condition.</p>

          <p><strong>Success</strong> The target regains [[/r 2d8[healing]
          #Treat Wounds]] Hit Points, and loses the wounded condition.</p>

          <p><strong>Critical Failure</strong> The target takes [[/r 1d8[damage]
          #Treat Wounds (Critical Failure)]] damage.</p>
        gm: ''
      publication:
        license: ORC
        remaster: true
        title: Pathfinder Player Core
        authors: ''
      rules: []
      traits:
        value:
          - exploration
          - healing
          - manipulate
