  - _id: NsKJ9L8OUgnf9Ke1
    folder: bvcUjAQ4cW6WxtUO
    img: icons/sundries/books/book-red-exclamation.webp
    name: Orc Weapon Familiarity
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: ancestry
      description:
        value: >-
          <p>In combat, you favor the brutal weapons that are traditional for
          your orc ancestors. You gain access to all uncommon weapons with the
          orc trait. You have familiarity with weapons with the orc trait plus
          the falchion and greataxe—for the purposes of proficiency, you treat
          any of these that are martial weapons as simple weapons and any that
          are advanced weapons as martial weapons.</p>

          <p>At 5th level, whenever you get a critical hit with one of these
