  - img: icons/creatures/birds/songbird-yellow-flying.webp
    name: Liberation
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: classfeature
      description:
        value: >-
          <p>You will see all people free from bondage and
          prohibitions.</p><p><strong>Edicts</strong> oppose slavery and
          tyranny, fight for others' freedom to make their own decisions,
          respect choices others make for their own
          lives</p><p><strong>Anathema</strong> force or threaten someone to act
          a certain way, engage in slavery or tyranny</p><hr
          /><p><strong>Champion's Reaction</strong>
          @UUID[Compendium.pf2e.actionspf2e.Item.IX1VlVCL5sFTptEE]{Liberating
          Step}</p><p><strong>Relentless Reaction (9th Level)</strong> You
          punish those who ensnare your allies. If the triggering enemy was
          using any effects to make your ally
          @UUID[Compendium.pf2e.conditionitems.Item.kWc1fhmv9LBiTuei]{Grabbed},
          @UUID[Compendium.pf2e.conditionitems.Item.VcDeM8A5oI6VqhbM]{Restrained},
          @UUID[Compendium.pf2e.conditionitems.Item.eIcWbB5o3pP6OIMe]{Immobilized},
          or
          @UUID[Compendium.pf2e.conditionitems.Item.6uEgoh53GbXuHpTF]{Paralyzed}
          when you used Liberating Step, that enemy takes persistent spirit
          damage equal to your Charisma modifier.</p><p><strong>Exalted Reaction
          (11th Level)</strong> In addition to the ally affected by Liberating
          Step, you and all other allies in your champion's aura can Step as a
          free action. You and your allies gain the benefit even if the ally who
          benefited from Liberating Step can't move.</p>
