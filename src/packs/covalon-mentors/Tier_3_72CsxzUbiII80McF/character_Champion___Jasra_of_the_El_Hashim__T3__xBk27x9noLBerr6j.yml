      description:
        value: >-
          <p>You @UUID[Compendium.pf2e.actionspf2e.Item.BlAOM2X92SI6HMtJ]{Seek}
          meticulously for hidden doors, concealed hazards, and so on. You can
          usually make an educated guess as to which locations are best to check
