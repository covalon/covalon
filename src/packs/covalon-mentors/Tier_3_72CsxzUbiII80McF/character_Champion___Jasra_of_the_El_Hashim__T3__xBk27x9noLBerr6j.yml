  - img: icons/magic/light/explosion-star-glow-orange.webp
    name: Devotion Spells
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: classfeature
      description:
        value: >-
          <p>Your deity's power grants you special divine spells called devotion
          spells, which are a type of focus spell. Choose either
          @UUID[Compendium.pf2e.spells-srd.Item.ZL97DcoJ8us6EwAF]{Shields of the
          Spirit} or a spell based on your deity's divine font
          (@UUID[Compendium.pf2e.spells-srd.Item.zNN9212H2FGfM7VS]{Lay on Hands}
          if your deity allows <em>heal</em>,
          @UUID[Compendium.pf2e.spells-srd.Item.jFmWSIpJGGebim6y]{Touch of the
          Void} if your deity allows <em>harm</em>).</p>

          <p>It costs 1 Focus Point to cast a focus spell. When you gain your
          first devotion spell, you also gain a focus pool of 1 Focus Point. You
          refill your focus pool during your daily preparations, and you regain
          1 Focus Point by spending 10 minutes using the Refocus activity to
          pray to your deity or do service toward their causes.</p>

          <p>Your devotion spells are divine spells. Your spellcasting attribute
          is Charisma.</p>

          <p>Focus spells are automatically heightened to half your level
          rounded up. Certain feats give you more focus spells. The maximum
          Focus Points your focus pool can hold is equal to the number of focus
          spells you have, but can never be more than 3 points.</p>
        gm: ''
      level:
        value: 1
      prerequisites:
        value: []
