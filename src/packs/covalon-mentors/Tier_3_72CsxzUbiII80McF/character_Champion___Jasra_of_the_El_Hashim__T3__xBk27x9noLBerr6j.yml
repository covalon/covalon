    biography:
      appearance: >-
        <p>An imposingly tall Dromaar, Jasra is often recognized by her facial
        scars and large tusks as she often remains in her armor. The armor
        itself has many identifying marks however as it is covered in etchings
        to remember the many tales of victorious battles.</p>
      backstory: >-
        <p>Jasra is the last living member of her Orc hold. The El-Hashim were a
        mighty tribe, who enforced peace between many opposing tribes. Jasra, as
        a shaman of The Three Sisters, was both a warrior and a healer. After
        the Cataclysm killed all her people, she devoted herself completely to
        her faith, which led her to Covalon.</p><p>Jasra is a caretaker, and
        puts others before herself. She believes strongly in independence and
        everyone having the right to stand up for themselves.</p>
