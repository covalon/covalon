  - img: icons/skills/melee/hand-grip-sword-red.webp
    name: Weapon Expertise
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: classfeature
      description:
        value: >-
          <p><strong>Champion, Exemplar, Investigator, Magus</strong> You've
          dedicated yourself to learning the intricacies of your weapons. Your
          proficiency ranks for simple weapons, martial weapons, and unarmed
          attacks increase to expert.</p>

          <p><strong>Druid, Kineticist</strong> You've improved your combat
          skill. Your proficiency rank for simple weapons and unarmed attacks
          increases to expert.</p>

          <p><strong>Guardian</strong> Sometimes, the best defense is a good
          offense. Your proficiency ranks for simple weapons, martial weapons,
          and unarmed attacks increase to expert.</p>

          <p><strong>Oracle</strong> You've dedicated yourself to learning the
