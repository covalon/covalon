  - name: The Three Sisters
    type: deity
    effects: []
    system:
      description:
        gm: ''
        value: >-
          <div class="item d-flex flex-wrap" data-markdown="1"><div
          class="flex-even column" data-markdown="1"><p>Amongst the younger
          deities of the world, the Three Sisters were not widespread worshiped
          in the land like other gods. Those who did discovered them through
          their experiments and observations of the world. Each Sister has their
          own interest, based on the three main areas of worship, but no one can
          tell each Sister apart as they are identical triplets with no
          individual names or styles. Some outsiders believe that there is only
          one goddess, as most worshipers only ever meet one of the Sisters if
          they ever do something to earn their presence. Only true scholars or
          heroes have met either two or all of the Sisters, usually when great
          discoveries have occurred. Few know what their personalities are like,
          but they have been described as eager to learn and easily excited by
          new experiments and findings about the
          world.</p><p><strong>Edicts</strong> learn new truths about the world,
          heal those who are wounded, create and discover new formulas<br
          /><strong>Anathema</strong> destroy knowledge you come across, torture
          an enemy, wallow in entropy<br /></p></div></div>
