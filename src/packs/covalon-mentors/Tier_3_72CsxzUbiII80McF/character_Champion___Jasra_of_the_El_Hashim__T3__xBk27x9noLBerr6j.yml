        value: >-
          <p>Experience and training have taught you that water has just enough
          surface tension for a master sprinter to traverse the surface.</p>

          <p>When you Stride in a straight line, if you move at least half your
          Speed over ground, you can move any amount of the remaining distance
          across a level body of water. If you don't end your Stride on solid
          ground, you fall into the water.</p>

