  - img: icons/magic/light/explosion-star-glow-silhouette.webp
    name: Blessing of the Devoted
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: classfeature
      description:
        value: >-
          <p>Your deity blesses your service with a boon. This might come in the
          form of a spirit that visits you and inhabits your items or body, a
          mysterious divine tattoo upon your body, or the like. Choose one of
          the following blessings, or any other to which you have access.</p>

          <p><strong>Blessed Armament</strong>: Select one weapon or handwraps
          of mighty blows. You gain that armament's critical specialization
          effect, and you grant the armament a property rune of your choice from
          the following list:
          @UUID[Compendium.pf2e.equipment-srd.Item.P6v2AtJw7AUwaDzf]{Fearsome},
          @UUID[Compendium.pf2e.equipment-srd.Item.JQdwHECogcTzdd8R]{Ghost
          Touch},
          @UUID[Compendium.pf2e.equipment-srd.Item.qlunQzfnzPQpMG6U]{Returning},
          @UUID[Compendium.pf2e.equipment-srd.Item.roeYtwlIe65BPMJ1]{Shifting},
          or
          @UUID[Compendium.pf2e.equipment-srd.Item.LwQb7ryTC8FlOXgX]{Vitalizing}.
          During your daily preparations, you can change the spirit to inhabit a
          different armament, grant a different rune, or both.</p>

          <p><strong>Blessed Shield:</strong> In your hands, a shield gains the
          minor
          @UUID[Compendium.pf2e.equipment-srd.Item.x9SNVpAAnXKJeoqp]{Reinforcing}
          rune. As you go up in level, the shield gains the reinforcing rune of
          your level (lesser at 7th level, moderate at 10th level, greater at
          13th level, major at 16th level, and supreme at 19th level). If your
          shield already has the appropriate reinforcing rune for your level, or
          if it's a
          @UUID[Compendium.pf2e.equipment-srd.Item.f9ygr5Cjrmop8LWV]{Sturdy
          Shield} of the same level as the appropriate reinforcing rune, the
          shield's Hardness instead increases by 1.</p>

          <p><strong>Blessed Swiftness:</strong> You gain a +5-foot status bonus
          to Speed. If you're mounted, your mount gains the bonus instead. In
          addition, when the movement of one of your allies triggers an enemy's
          reaction while the ally is in your champion's aura, the ally gains a
          +2 status bonus to all defenses against that reaction.</p>
        gm: ''
      level:
        value: 3
      prerequisites:
        value: []
      publication:
        license: ORC
        remaster: true
        title: Pathfinder Player Core 2
        authors: ''
