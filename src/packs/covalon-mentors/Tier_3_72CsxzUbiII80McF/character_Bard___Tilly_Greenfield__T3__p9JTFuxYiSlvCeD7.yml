  - img: icons/sundries/books/book-symbol-spiral-silver-blue.webp
    name: Spell Repertoire
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: classfeature
      description:
        value: >-
          <p><strong>Bard</strong> The collection of spells you can cast is
          called your spell repertoire. At 1st level, you learn two 1st-rank
          occult spells of your choice and five occult cantrips of your choice.
          You choose these from the common spells from the occult list or from
          other occult spells to which you have access. You can cast any spell
          in your spell repertoire by using a spell slot of an appropriate spell
          rank.</p>

          <p>You add to this spell repertoire as you increase in level. Each
          time you get a spell slot (see the Bard Spells per Day table), you add
          a spell to your spell repertoire of the same rank. At 2nd level, you
          select another 1st-rank spell; at 3rd level, you select two 2nd-rank
          spells, and so on. When you add spells, you might add a higher-rank
          version of a spell you already have, so you can cast a heightened
          version of that spell.</p>

          <p>Though you gain them at the same rate, your spell slots and the
          spells in your spell repertoire are separate. If a feat or other
          ability adds a spell to your spell repertoire, it wouldn't give you
          another spell slot, and vice versa.</p>

          <p><strong>Swapping Spells in Your Repertoire</strong></p>

          <p>As you gain new spells in your repertoire, you might want to
          replace some of the spells you previously learned. Each time you gain
          a level and learn new spells, you can swap out one of your old spells
          for a different spell of the same rank. This spell can be a cantrip.
          You can also swap out spells by retraining during downtime.</p><hr
          /><p><strong>Oracle</strong> The collection of spells you can cast is
          called your spell repertoire. At 1st level, you learn two 1st-rank
          divine spells of your choice and five divine cantrips of your choice.
          You choose these from the common spells on the divine list or from
          other divine spells to which you have access. You can cast any spell
          in your spell repertoire by using a spell slot of an appropriate spell
          rank.</p>

          <p>You add to this spell repertoire as you increase in level. Each
          time you get a spell slot (see the Oracle Spells per Day table), you
          add a spell to your spell repertoire of the same rank. At 2nd level,
          you select another 1st-rank spell; at 3rd level, you select two
          2nd-rank spells, and so on. When you add spells, you might add a
          higher-rank version of a spell you already have, so you can cast a
          heightened version of that spell.</p>

          <p>Your spell slots and the spells in your spell repertoire are
          separate. If a feat or other ability adds a spell to your spell
          repertoire, it wouldn't give you another spell slot, and vice
          versa.</p>

          <p><strong>Swapping Spells in Your Repertoire</strong></p>

          <p>As you gain new spells in your repertoire, you might want to
          replace some of the spells you previously learned. Each time you gain
          a level and learn new spells, you can swap out one of your old spells
          for a different spell of the same rank. This spell can be a cantrip.
          You can also swap out spells by retraining during downtime.</p><hr
          /><p><strong>Psychic</strong> The collection of spells you can cast is
          called your spell repertoire. At 1st level, you learn one 1st-rank
          occult spell of your choice and three occult cantrips of your choice.
          You choose these from the common spells from the occult list or from
          other occult spells to which you have access. You can cast any spell
          in your spell repertoire by using a spell slot of an appropriate spell
          rank. Your choice of conscious mind also grants you additional spells
          in your repertoire, starting with an additional 1st-rabk spell and two
          cantrips listed in your conscious mind, which you cast as psi
          cantrips.</p>

          <p>You add to this spell repertoire as you increase in level. Each
          time you get a spell slot (see Table 2), you add a spell to your spell
          repertoire of the same level. At 2nd level, you select another
          1st-rank spell; at 3rd level, you select one 2nd-level spell, and so
          on. When you add spells, you might add a higher-rank version of a
          spell you already have, so you can cast a heightened version of that
          spell. Your conscious mind also adds additional spells to your
          repertoire as you gain spells of higher levels.</p>

          <p>Though you gain them at the same rate, your spell slots and the
          spells in your spell repertoire are separate. If a feat or other
          ability adds a spell to your spell repertoire, such as the spells you
          gain from your conscious mind, it wouldn't give you another spell
          slot, and vice versa.</p>

          <p><strong>Swapping Spells in Your Repertoire</strong></p>

          <p>As you gain new spells in your repertoire, you might want to
          replace some of the spells you previously learned. Each time you gain
          a level and learn new spells, you can swap out one of your old spells
          for a different spell of the same rank. This spell can be a cantrip.
          You can also swap out spells by retraining during downtime.</p><hr
          /><p><strong>Sorcerer</strong> The collection of spells you can cast
          is called your spell repertoire. At 1st level, you learn two 1st-rank
          spells of your choice and four cantrips of your choice, as well as an
          additional spell and cantrip from your bloodline. You choose these
          from the common spells from the tradition corresponding to your
          bloodline, or from other spells from that tradition to which you have
          access. You can cast any spell in your spell repertoire by using a
          spell slot of an appropriate spell rank.</p>

          <p>You add to this spell repertoire as you increase in level. Each
          time you get a spell slot (see the Sorcerer Spells per Day table
          above), you add a spell to your spell repertoire of the same rank.
          When you gain a new rank of spells, your first new spell is always the
          sorcerous gift spell for that rank that's listed in your bloodline,
          but you can choose the other spells. At 2nd level, you select another
          1st-rank spell; at 3rd level, you gain a new spell from your bloodline
          and two other 2nd-rank spells, and so on. When you add spells, you
          might select a higher-rank version of a spell you already know so that
          you can cast a heightened version of that spell.</p>

          <p>Though you gain them at the same rate, your spell slots and the
          spells in your spell repertoire are separate. If a feat or other
          ability adds a spell to your spell repertoire, it wouldn't give you
          another spell slot or vice versa.</p>

          <p><strong>Swapping Spells in Your Repertoire</strong></p>

          <p>As you gain new spells in your spell repertoire, you might want to
          replace some of the spells you previously learned. Each time you gain
          a level and learn new spells, you can swap out one of your old spells
          for a different spell of the same rank. This spell can be a cantrip,
          but you can't swap out bloodline spells. You can also swap out spells
          by retraining during downtime.</p><hr /><p><strong>Summoner</strong>
          The collection of spells you can cast is called your spell repertoire.
          At 1st level, you learn two 1st-rank spells of your choice and five
          cantrips of your choice. You choose these from the common spells from
          the tradition corresponding to your eidolon, or from other spells from
          that tradition to which you have access. You can cast any spell in
          your spell repertoire by using a spell slot of an appropriate spell
          rank. Your spell slots and the spells in your spell repertoire are
          separate. If a feat or other ability adds a spell to your spell
          repertoire, it doesn't give you another spell slot, and vice
          versa.</p>

          <p>You add to this spell repertoire as you increase in level. Each
          time you get a spell slot (see Table 2–4: Summoner Spells per Day),
          you add a spell of the same rank to your spell repertoire. At 2nd
          level, you select another 1st-rank spell. At 3rd level, you add the
          first 2nd-rank spell to your repertoire. At 4th level you gain your
          second and your spell repertoire reaches its maximum size of five
          spells.</p>

          <p>At 5th level, in addition to adding two 3rd-rank spells to your
          repertoire, you lose your lowest rank of spell slots. Any time you
          lose a rank of spell slots, you lose two spells in your repertoire as
          well. These can come from spells you already know or out of the number
          of new spells you're learning. On levels in which you don't change
          your spell slots, you can swap out multiple spells, as described
          below.</p>

          <p><strong>Swapping Spells in Your Repertoire</strong></p>

          <p>As you gain new spells in your repertoire, you might want to
          replace some of the spells you previously learned. Each time you gain
          a level and learn new spells, you can swap out one of your old spells
          for a different spell of the same rank. If it's a rank at which you
          lose a set of lower-rank slots, you can replace the two in either
          order. You can also instead swap a cantrip. You can also swap out
          spells by retraining during downtime.</p>

          <p>At 6th level and every even level thereafter, you can swap out any
          number of your spells for different spells of a rank you can cast.
          When you do, you must keep at least one spell you can cast with your
          lowest rank of spell slots so you don't end up with slots you can't
          use. For instance, at 6th level you would need to keep at least one
          2nd-rank spell, but all your other spells could be 3rd rank.</p>
        gm: ''
