    system:
      actionType:
        value: passive
      actions:
        value: null
      category: skill
      description:
        value: >-
          <p>When you
          @UUID[Compendium.pf2e.actionspf2e.Item.EEDElIyin4z60PXx]{Perform},
          compare your result to the Will DC of one observer. If you succeed,
          the target is
          @UUID[Compendium.pf2e.conditionitems.Item.AdPVz7rbaVSRxHFg]{Fascinated}
          by you for 1 round. If the observer is in a situation that demands
          immediate attention, such as combat, you must critically succeed to
          fascinate it and the Perform action gains the incapacitation trait.
          You must choose which creature you're trying to fascinate before you
          roll your check, and the target is then temporarily immune for 1
          hour.</p>

          <p>If you're an expert in Performance, you can fascinate up to four
          observers; if you're a master, you can fascinate up to 10 observers;
          and if you're legendary, you can fascinate any number of observers at
          the same time.</p>
