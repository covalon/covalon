      description:
        value: >-
          <p>You subtly weave your spellcasting into a performance. If the next
          action you use is to Cast a Spell, the spell gains the subtle trait,
          hiding the shining runes, sparks of magic, and other manifestations
          that would usually give away your spellcasting. The trait hides only
          the spell's spellcasting actions and manifestations, not its effects,
          so an observer might still see a ray streak out from you or see you
          vanish into thin air.</p>

          <p>As part of using Melodious Spell, you can choose to
          @UUID[Compendium.pf2e.actionspf2e.Item.GkmbTGfg8KcgynOA]{Create a
          Diversion},
          @UUID[Compendium.pf2e.actionspf2e.Item.2u915NdUyQan6uKF]{Demoralize},
