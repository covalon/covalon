    img: systems/pf2e/icons/spells/shield.webp
    name: Shield
    system:
      description:
        gm: ''
        value: >-
          <p>You raise a magical shield of force. This counts as using the Raise
          a Shield action, giving you a +1 circumstance bonus to AC until the
          start of your next turn, but it doesn't require a hand to use.</p>

          <p>While the spell is in effect, you can use the
