  - _id: 4gjf8jymEaeOj6Dg
    img: systems/pf2e/icons/default-icons/background.svg
    name: Fireworks Performer
    system:
      description:
        gm: ''
        value: >-
          <p>Few celebrations in Tian Xia are complete without a show of
          fireworks, and your job is to make sure they go off without a hitch.
          You load the fireworks, set the fuses, and choreograph the
          performance, bringing the show together in a finale of lights and
          explosions. Then it's time to pack up your gear and move on to the
          next civic holiday or religious festival. Of course, someone who
          travels the roads with a pack full of high explosives is bound to run
          into an adventure or two along the way, and so over time, your
          fireworks have been spent in support of that life.</p>

          <p>Choose two attribute boosts. One must be to
          <strong>Intelligence</strong> or <strong>Charisma</strong>, and one is
          a free attribute boost.</p>

          <p>You're trained in the Performance skill and the Fireworks Lore
          skill. You gain the
          @UUID[Compendium.pf2e.feats-srd.Item.7LB00jkh6JaJr3vS]{Fascinating
          Performance} skill feat.</p>
