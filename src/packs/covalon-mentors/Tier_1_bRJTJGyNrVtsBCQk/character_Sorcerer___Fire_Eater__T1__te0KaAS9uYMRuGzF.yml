        gm: ''
        value: >-
          <p><em>Curious and gregarious wanderers, catfolk combine the features
          of felines and humanoids in both appearance and temperament. They
          enjoy learning new things, collecting new tales and trinkets, and
          ensuring their loved ones are safe and happy. Catfolk view themselves
          as the chosen guardians of natural places in the world and are often
          recklessly brave, even in the face of overwhelming opposition. They
          believe that strong communities, breadth of experience, and continual
          self-improvement aid them in this fight.</em></p>

