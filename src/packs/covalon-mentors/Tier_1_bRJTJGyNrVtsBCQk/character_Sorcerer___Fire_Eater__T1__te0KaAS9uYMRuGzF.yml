        value: >-
          <p><strong>Activate</strong> <span class="action-glyph">1</span>
          (manipulate)</p><hr /><p>This thin, black liquid imparts a bone-deep
          chill while rapidly repairing an undead creature's physical or
          spiritual form. When you dash <em>oil of unlife</em> onto an undead
          creature, or a living creature with void healing, the oil absorbs
          quickly into its body, and the creature regains
          @Damage[(2d8+5)[healing]]{2d8+5 Hit Points}. You can pour <em>oil of
          unlife</em> on an incorporeal undead; in this case, the creature
          absorbs the oil into itself.</p>
