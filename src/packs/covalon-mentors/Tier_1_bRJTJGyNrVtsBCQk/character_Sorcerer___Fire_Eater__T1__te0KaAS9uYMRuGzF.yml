          Blast}</p>

          <p><strong>Blood Magic—Elemental Fury</strong> Elemental energy
          wreathes your form and infuses your magic. Either you gain a +2 status
          bonus to Intimidation checks for 1 round, or a target takes 1 damage
          per spell rank; this damage type is listed under your elemental
          influence. If the spell already deals that type of damage, combine it
          with the spell's initial damage before determining weaknesses and
          resistances.</p><h3>Elemental Influences</h3><p>At 1st level, choose
          the type of elemental that influenced your bloodline: air, earth,
          fire, metal, water, or wood. You can't change this later. You are
          granted different spells at certain ranks according to this
          influence.</p><ul><li><strong>Air—Sorcerous Gifts</strong> cantrip:
