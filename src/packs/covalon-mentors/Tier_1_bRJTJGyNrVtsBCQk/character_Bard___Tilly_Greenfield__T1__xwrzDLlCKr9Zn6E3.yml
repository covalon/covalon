  - img: icons/equipment/head/hat-pointed-leather-black-glowing.webp
    name: Occult Spellcasting
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: classfeature
      description:
        value: >-
          <p>You draw upon magic from esoteric knowledge. You are a spellcaster
          and can cast spells of the occult tradition using the Cast a Spell
          activity.</p>

          <p>As a bard, when you cast spells, your incantations might be musical
          riffs or clever limericks, your gestures might incorporate dance and
          dramatic pantomiming, and you might accompany your spellcasting by
          playing a musical instrument.</p>

          <p>Each day, you can cast up to two 1st-rank spells. You must know
          spells to cast them, and you learn them via the spell repertoire class
          feature. The number of spells you can cast each day is called your
          spell slots.</p>

          <p>As you increase in level as a bard, your number of spells per day
          increases, as does the highest rank of spells you can cast.</p>

          <p>Some of your spells require you to attempt a spell attack roll to
          see how effective they are, or have your enemies roll against your
          spell DC (typically by attempting a saving throw). Since your key
          ability is Charisma, your spell attack rolls and spell DCs use your
          Charisma modifier.</p>
