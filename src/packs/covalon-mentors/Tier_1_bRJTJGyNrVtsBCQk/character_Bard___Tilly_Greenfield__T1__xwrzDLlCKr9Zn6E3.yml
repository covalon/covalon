      backstory: >-
        <p>Tilly Greenfield grew up in a family of performers in Ostengrad. As a
        child, she was happy to spend her days singing and writing songs,
        offering entertainment to the magical students. When the Cataclysm hit,
        Tilly barely escaped with her life, and vowed to carry on the legacy of
        her family wherever civilization may start again. Cheerful, easy-going,
        and a little mischevious, Tilly took right to the adventuring life that
        the Dungeoneering Society offered.</p><p>Tilly is a warm, good-humored
        woman that remains positive no matter the circumstances. It is easy to
        get her riled up when she sees folks being exploited or treated like
        property, though.</p>
