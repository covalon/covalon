  - img: icons/tools/instruments/pipe-flue-tan.webp
    name: Composition Spells
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: classfeature
      description:
        value: >-
          <p>You can infuse your performances with magic to create unique
          effects called compositions. Compositions are a special type of spell
          that often require you to use the Performance skill when casting them.
          Composition spells are a type of focus spell. It costs 1 Focus Point
          to cast a focus spell, and you start with a focus pool of 1 Focus
          Point. You refill your focus pool during your daily preparations, and
          you can regain 1 Focus Point by spending 10 minutes using the Refocus
          activity to perform, write a new composition, or otherwise engage your
          muse.</p>

          <p>Focus spells are automatically heightened to half your level
          rounded up, much like cantrips. Focus spells don't require spell
          slots, and you can't cast them using spell slots. Taking feats can
          give you more focus spells and increase the size of your focus pool,
          though your focus pool can never hold more than 3 Focus Points. You
          learn the
          @UUID[Compendium.pf2e.spells-srd.Item.WILXkjU5Yq3yw10r]{Counter
          Performance} composition spell, protecting against auditory and visual
          effects.</p>

          <h2>Composition Cantrips</h2>

          <p>Composition cantrips are special composition spells that don't cost
          Focus Points, so you can use them as often as you like. Composition
          cantrips are in addition to the cantrips you choose with bard
          spellcasting. Unlike other cantrips, you can't swap out composition
          cantrips gained from bard feats at a later level, unless you swap out
          the specific feat via retraining.</p>

          <p>You learn the
          @UUID[Compendium.pf2e.spells-srd.Item.IAjvwqgiDr3qGYxY]{Courageous
          Anthem} composition cantrip, which boosts your allies' attacks,
          damage, and defense against fear.</p>
        gm: ''
