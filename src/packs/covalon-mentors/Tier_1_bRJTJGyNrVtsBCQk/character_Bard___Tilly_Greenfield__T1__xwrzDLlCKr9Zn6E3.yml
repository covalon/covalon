  - img: icons/weapons/thrown/bomb-spiked-purple.webp
    name: Caltrops
    system:
      description:
        gm: ''
        value: >-
          <p>These four-pronged metal spikes can damage a creature's feet. You
          can scatter caltrops in an empty square adjacent to you with an
          Interact action. The first creature that moves into that square must
          succeed at a @Check[acrobatics|dc:14|name:Avoid Caltrops|showDC:all]
          check or take @Damage[1d4[piercing]] damage and 1 persistent bleed
          damage. A creature taking persistent bleed damage from caltrops takes
          a –5-foot penalty to its Speed. Spending an Interact action to pluck
          the caltrops free reduces the DC to stop the bleeding. Once a creature
          takes damage from caltrops, enough are ruined that other creatures
          moving into the square are safe. Deployed caltrops can be salvaged and
          reused if no creatures took damage from them. Otherwise, enough are
          ruined that they can't be salvaged.</p>

          <p>@UUID[Compendium.pf2e.equipment-effects.Item.5DaEI4I7cVdOD507]{Effect:
          Caltrops}</p>
