  - img: icons/weapons/axes/axe-double-gold.webp
    name: Cleric Spellcasting
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: classfeature
      description:
        value: >-
          <p>Your deity bestows on you the power to cast divine spells. You are
          a spellcaster, and you can cast spells of the divine tradition using
          the Cast a Spell activity. As a cleric, your chants generally invoke
          your deity and their powerful servants by name or title, while your
          gestures are followed by sacred symbols or other representations of
          your deity.</p>

          <p>At 1st level, you can prepare two 1st-rank spells and five cantrips
          each morning from the common spells on the divine spell list or from
          other divine spells to which you gain access and learn via Learn a
          Spell. Prepared spells remain available to you until you cast them or
          until you prepare your spells again. The number of spells you can
          prepare each day is called your spell slots.</p>

          <p>As you increase in level as a cleric, the number of spells you can
          prepare each day increases, as does the highest rank of spell you can
          cast, as shown in Cleric Spells per Day table above.</p>

          <p>Some of your spells require you to attempt a spell attack to see
          how effective they are or for your enemies to roll against your spell
          DC (typically by attempting a saving throw). Since your key attribute
          is Wisdom, your spell attack modifier and spell DC use your Wisdom
          modifier.</p>

          <h2>Heightening Spells</h2>

          <p>When you get spell slots of 2nd rank and higher, you can fill those
          slots with stronger versions of lower-rank spells. This increases the
          spell's rank, heightening it to match the spell slot. Many spells have
          specific improvements when they are heightened to certain ranks.</p>

          <h2>Cantrips</h2>

          <p>Some of your spells are cantrips. A cantrip is a special type of
          spell that doesn't use spell slots. You can cast a cantrip at will,
          any number of times per day. A cantrip is always automatically
          heightened to half your level rounded up—this is usually equal to the
          highest rank of cleric spell slot you have. For example, as a
          1st-level cleric, your cantrips are 1st-rank spells, and as a
          5th-level cleric, your cantrips are 3rd-rank spells.</p>
        gm: ''
      level:
        value: 1
      prerequisites:
        value: []
      publication:
        license: ORC
        remaster: true
        title: Pathfinder Player Core
        authors: ''
      rules: []
      traits:
