  - img: systems/pf2e/icons/features/classes/deity.webp
    name: Deity (Cleric) (Gunvald)
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: classfeature
      description:
        value: >-
          <p>As a cleric, you are a mortal servitor of a deity you revere above
          all others. Your deity grants you the trained proficiency rank in one
          skill and with the deity's favored weapon. If the favored weapon is
          uncommon, you also get access to that weapon.</p>

          <p>Your deity also adds spells to your spell list. You can prepare
          these just like you can any spell on the divine spell list once you
          can prepare spells of their rank as a cleric. Any of these spells that
          aren't normally on the divine list are still divine spells if you
          prepare them this way.</p>

          <h2>Sanctification</h2>

          <p>Depending on your deity, their sanctification can make you holy or
          unholy. This gives you the holy or unholy trait, which commits you to
          one side of a struggle over the souls of the planes and may be
          referenced in other abilities. If you "can be" holy or unholy
          according to your deity, you make that choice, and if you "must be"
          holy or unholy you gain the trait automatically. If you gain the
          opposing trait in some way, you lose the previous trait until you
          complete an atone ritual.</p>

          <h2>Anathema</h2>

          <p>Acts fundamentally opposed to your deity's ideals are anathema to
          your faith. Learning or casting spells, committing acts, and using
          items that are anathema to your deity remove you from your deity's
          good graces.</p>

          <p>Casting spells with the unholy trait is almost always anathema to
          deities who don't allow unholy sanctification, and casting holy spells
          is likewise anathema to those who don't allow holy sanctification.
          Similarly, casting spells that are anathema to the tenets or goals of
          your faith could interfere with your connection to your deity. For
          example, casting a spell to create undead would be anathema to
          Pharasma, the goddess of death. Many actions that are anathema don't
          appear in any deity's formal list. For borderline cases, you and your
          GM determine which acts are anathema.</p>

          <p>If you perform enough acts that are anathema to your deity, you
          lose the magical abilities that come from your connection to your
          deity. The class features that you lose are determined by the GM, but
          they likely include your divine font and all cleric spellcasting.
          These abilities can be regained only if you repent by conducting an
          atone ritual.</p>
        gm: ''
      level:
        value: 1
      prerequisites:
        value: []
      publication:
        license: ORC
        remaster: true
        title: Pathfinder Player Core
        authors: ''
      rules:
        - choices:
            filter:
              - or:
                  - item:category:deity
