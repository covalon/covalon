  - img: icons/magic/light/orb-hands-humanoid-yellow.webp
    name: Cloistered Cleric
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: classfeature
      description:
        value: >-
          <p>You are a cleric of the cloth, focusing on divine magic and your
          connection to your deity's domains.</p>

          <p><strong>First Doctrine (1st):</strong> You gain the
          @UUID[Compendium.pf2e.feats-srd.Item.hT4INKGtly4QY8KN]{Domain
          Initiate} cleric feat.</p>

          <p><strong>Second Doctrine (3rd):</strong> Your proficiency rank for
          Fortitude saves increases to expert.</p>

          <p><strong>Third Doctrine (7th):</strong> Your proficiency ranks for
          the spell attack modifier and spell DC statistics increase to
          expert.</p>

          <p><strong>Fourth Doctrine (11th):</strong> You gain expert
          proficiency with your deity's favored weapon, simple weapons, and
          unarmed attacks. When you critically succeed at an attack roll using
          your deity's favored weapon, you apply the weapon's critical
          specialization effect; you can use your spell DC in place of your
          class DC.</p>

          <p><strong>Fifth Doctrine (15th):</strong> Your proficiency ranks for
          the spell attack modifier and spell DC statistics increase to
          master.</p>

          <p><strong>Final Doctrine (19th):</strong> Your proficiency ranks for
          the spell attack modifier and spell DC statistics increase to
          legendary.</p>
