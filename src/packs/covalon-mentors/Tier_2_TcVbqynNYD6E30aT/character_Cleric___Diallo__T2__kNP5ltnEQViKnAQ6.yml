    biography:
      appearance: >-
        <p>An otherwise unremarkable man, Diallo is often known by his cheerful
        smile and composed, practiced movements. He carries the air of a
        professional medic and soldier.</p>
      backstory: >-
        <p>Gornlar born and raised Diallo worked for the town guard when he came
        of age. Diallo excelled at his job, often performing healing services
        for both the wounded guards but also the townsfolk. The terrors brought
        about by Ashgut and Fjordcarver and their hordes of dragons however put
        this to an end; the town was burnt down and most of the people were
        slain before they even knew what happened. Being one of very few who
        survived Diallo found Covalon by chance, and wishing to prevent the fate
        of his town again he devoted himself to aiding new adventurers, helping
        keep them safe and healthy.</p>
