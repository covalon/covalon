  - folder: wnvibtD90h7CStDC
    img: systems/pf2e/icons/spells/protectors-sacrifice.webp
    name: Protector's Sacrifice
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Trigger</strong> An ally within 30 feet takes damage.</p>

          <hr />

          <p>You protect your ally by suffering in their stead. Reduce the
          damage the triggering ally would take by 3. You redirect this damage
          to yourself, but your immunities, weaknesses, resistances and so on do
          not apply.</p>

          <p>You aren't subject to any conditions or other effects of whatever
          damaged your ally (such as poison from a venomous bite). Your ally is
          still subject to those effects even if you redirect all of the
          triggering damage to yourself.</p>

          <hr />

          <p><strong>Heightened (+1)</strong> The damage you redirect increases
          by 3.</p>
