  - img: icons/magic/fire/flame-burning-hand-white.webp
    name: Divine Font (Healing)
    system:
      actionType:
        value: passive
      actions:
        value: null
      category: classfeature
      description:
        value: >-
          <p>Through your deity's blessing, you gain additional spells that
          channel either the life force called vitality or its counterforce, the
          void. When you prepare your spells each day, you can prepare
          additional
          @UUID[Compendium.pf2e.spells-srd.Item.rfZpqmj0AIIdkVIs]{Heal} or
          @UUID[Compendium.pf2e.spells-srd.Item.wdA52JJnsuQWeyqz]{Harm} spells,
          depending on your deity. The divine font spell your deity provides is
          listed in the Divine Font entry for your deity; if both are listed,
          you can choose between <em>heal</em> or <em>harm</em>. Once you
          choose, you can't change your choice short of divine intervention.</p>

          <p><strong>Healing Font:</strong> You gain 4 additional spell slots
          each day at your highest rank of cleric spell slots. You can prepare
          only <em>heal</em> spells in these slots. At 5th level, the number of
          additional slots increases to 5, and at 15th level, the total number
          of additional slots increases to 6.</p>

          <p><strong>Harmful Font:</strong> You gain 4 additional spell slots
          each day at your highest rank of cleric spell slots. You can prepare
          only <em>harm</em> spells in these slots. At 5th level, the number of
          additional slots increases to 5, and at 15th level, the total number
          of additional slots increases to 6.</p>
        gm: ''
