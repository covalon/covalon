        value: >-
          <p><strong>Trigger</strong> An enemy you can see is about to make a
          ranged attack.</p><hr /><p>You curse an enemy to suffer a kickback as
          they make a ranged attack, potentially causing them to miss. The
          triggering enemy attempts a Will save.</p><hr /><p><strong>Critical
          Success</strong> The target is unaffected.</p>

          <p><strong>Success</strong> The recoil from their ranged attack causes
          the target to be
          @UUID[Compendium.pf2e.conditionitems.Item.AJh5ex99aV6VTggg]{Off-Guard}
          until the beginning of their next turn.</p>

          <p><strong>Failure</strong> The recoil imposes a –1 status penalty to
          the ranged attack and renders the target off-guard until the beginning
          of their next turn.</p>

          <p>@UUID[Compendium.pf2e.spell-effects.Item.sxIEPmpuBfqSeck3]{Spell
          Effect: Curse of Recoil (Failure)}</p>

          <p><strong>Critical Failure</strong> The recoil imposes a –2 status
          penalty to the ranged attack and renders the target off-guard until
          the beginning of their next turn. Until the start of their next turn,
          any additional ranged attacks made with the same weapon, spell, or
          ability take the same penalty.</p>

          <p>@UUID[Compendium.pf2e.spell-effects.Item.P4PRme5opSzyPIM2]{Spell
          Effect: Curse of Recoil (Critical Failure)}</p>
