  - img: icons/tools/hand/lockpicks-steel-grey.webp
    name: Thieves' Toolkit (Infiltrator)
    system:
      description:
        gm: ''
        value: >-
          <p>You need a thieves' toolkit to
          @UUID[Compendium.pf2e.actionspf2e.Item.2EE4aF4SZpYf0R6H]{Pick Locks}
          or @UUID[Compendium.pf2e.actionspf2e.Item.cYdz2grcOcRt4jk6]{Disable
          Devices} (of some types) using the Thievery skill. An infiltrator
          thieves' toolkit add a +1 item bonus to checks to Pick Locks and
          Disable Devices.</p>

          <p>If your thieves' toolkit is broken, you can repair it by replacing
          the lock picks with
          @UUID[Compendium.pf2e.equipment-srd.Item.BznmPaRjI4Orb0IH]{Replacement
          Picks} appropriate to your tools; this doesn't require using the
          Repair action. If you wear your thieves' toolkit, you can draw and
          replace it as part of the action that uses it.</p>
      rules:
        - key: FlatModifier
          predicate:
