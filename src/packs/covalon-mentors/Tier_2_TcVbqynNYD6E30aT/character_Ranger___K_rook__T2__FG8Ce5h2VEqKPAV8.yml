  - img: systems/pf2e/icons/actions/OneAction.webp
    name: Hunt Prey
    system:
      actionType:
        value: action
      actions:
        value: 1
      category: offensive
      description:
        value: >-
          <p>You designate a single creature as your prey and focus your attacks
          against that creature. You must be able to see or hear the prey, or
          you must be tracking the prey during exploration.</p>

          <p>You gain a +2 circumstance bonus to Perception checks when you
          @UUID[Compendium.pf2e.actionspf2e.Item.BlAOM2X92SI6HMtJ]{Seek} your
          prey and a +2 circumstance bonus to Survival checks when you
          @UUID[Compendium.pf2e.actionspf2e.Item.EA5vuSgJfiHH7plD]{Track} your
          prey. You also ignore the penalty for making ranged attacks within
          your second range increment against the prey you're hunting.</p>

          <p>You can have only one creature designated as your prey at a time.
          If you use Hunt Prey against a creature when you already have a
          creature designated, the prior creature loses the designation and the
          new prey gains the designation. Your designation lasts until your next
          daily preparations.</p>
