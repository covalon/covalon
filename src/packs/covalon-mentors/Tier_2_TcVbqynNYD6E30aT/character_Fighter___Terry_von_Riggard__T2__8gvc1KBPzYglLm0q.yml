    biography:
      appearance: >-
        <p>A handsome blonde man with a strong jaw and a charming smile. His
        weapons and armor gleam, clearly well taken care of. </p>
      backstory: >-
        <p>Terry is the son of a minor noble house, given over to a travelling
        knight as a squire in his youth. The Cataclysm saw hordes of undead
        overthrow his kingdom and his teacher led him on a hit and run escape
        but died in the process. He eventually found Covalon. Now he works with
        the guard and dreams of regaining his titles.</p><p>Terry is outgoing
        and headstrong, he keeps a civil tongue unless severe circumstances
        warrant it. He is noble born and always tries to maintain that air of
        superiority. He is distrustful of spellcasters, suspecting court wizards
        of causing the undead horde that destroyed his lands. He views martial
        combat as the truest expression of skill and prowess. Though not a
        devout man, he pays respects to Derelis to honor his late master.</p>
