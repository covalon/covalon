      category: class
      description:
        value: >-
          <p><strong>Requirements</strong> You are wielding a one-handed melee
          weapon and have a free hand.</p>

          <hr />

          <p>You snap your free hand over to grip your weapon just long enough
          to add momentum and deliver a more powerful blow to your opponent.
          Make a Strike with the required weapon. You quickly switch your grip
          during the Strike in order to make the attack with two hands. If the
          weapon doesn't normally have the two-hand trait, increase its weapon
          damage die by one step for this attack. If the weapon has the two-hand
          trait, you gain the benefit of that trait and a circumstance bonus to
          damage equal to the weapon's number of damage dice. When the Strike is
          complete, you resume gripping the weapon with only one hand. This
          action doesn't end any stance or fighter feat effect that requires you
          to have one hand free.</p>
