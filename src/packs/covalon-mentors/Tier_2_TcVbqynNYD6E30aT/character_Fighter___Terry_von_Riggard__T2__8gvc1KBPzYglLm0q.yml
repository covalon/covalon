  - folder: 0Z6sKp3ActW2pM2e
    img: systems/pf2e/icons/actions/OneAction.webp
    name: Grapple
    system:
      actionType:
        value: action
      actions:
        value: 1
      category: interaction
      description:
        value: >-
          <p><strong>Requirements</strong> You have at least one free hand and
          your target is no more than one size larger than you.</p><hr /><p>You
          attempt to grab a creature or object with your free hand. Attempt an
          [[/act grapple]]{Athletics} check against the target's Fortitude DC.
          You can grapple a target you already have
          @UUID[Compendium.pf2e.conditionitems.Item.kWc1fhmv9LBiTuei]{Grabbed}
          or
          @UUID[Compendium.pf2e.conditionitems.Item.VcDeM8A5oI6VqhbM]{Restrained}
          without having a hand free.</p><hr /><p><strong>Critical
          Success</strong> Your target is restrained until the end of your next
          turn unless you move or your target Escapes.</p>

          <p><strong>Success</strong> Your target is grabbed until the end of
          your next turn unless you move or your target Escapes.</p>

          <p><strong>Failure</strong> You fail to grab your target. If you
          already had the target grabbed or restrained using a Grapple, those
          conditions on the target end.</p>

          <p><strong>Critical Failure</strong> If you already had the target
          grabbed or restrained, it breaks free. Your target can either grab
          you, as if it succeeded at using the Grapple action against you, or
          force you to fall and land
          @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone}.</p>
