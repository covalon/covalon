    disable: >-
      <p>Thievery DC 33 (expert) to erase the rune (requires thieves' tools and
      two successes), or&nbsp;<em>dispel magic</em> (6th level; counteract DC
      33) to counteract the rune</p>
    description: >-
      <p>A large arcane sigil carved into sandstone tile glows with a sapphire
      hue.</p>
    reset: >-
      <p>After 10 minutes of the sultan no longer being in danger, the sigil
      destroys its currently summoned elemental and resets.</p>
    routine: >-
      <p>(1 action) the sigil commands its summoned water elemental, giving it
      two actions (the water elemental does not have its own initiative). If the
      sigil's summoned water elemental was destroyed, it summons a new one
      instead (of the same type listed in the Defend the Sultan! reaction), but
      can't command it until next turn.&nbsp;<span style="font-family:
      var(--font-primary); font-size: var(--font-size-14);">Any creatures
      summoned by the Marid summoning sigil lose the Water-Bound ability if they
      have it.</span></p>
