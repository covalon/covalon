  - _id: jquesl9soDT9XMQp
    name: 'Modification: Vizier of Flames'
    type: action
    img: systems/pf2e/icons/actions/Passive.webp
    effects: []
    folder: null
    sort: 0
    flags: {}
    system:
      description:
        gm: ''
        value: >-
          <p>Saddam Syed has mastered efreeti fire magic. He begins combat with
          a flame vortex within 20 feet of him. The vortex is a cylinder with a
          radius of 5 feet and a height of 40 feet, and any flying creatures
          treat the squares occupied by the vortex as difficult terrain.</p>

          <p>Once per turn, as a free action, Saddam can direct the flame vortex
          to move up to 20 feet in a straight line. Each creature the vortex
          moves through takes [[/r 4d4[bludgeoning]]] damage and [[/r
          4d6[fire]]] damage with a <span
          style="font-family:var(--font-primary);font-size:var(--font-size-14)">@Check[type:reflex|dc:38|basic:true]
          save as gusts of fiery winds buffet them. Creatures who move through
          the vortex on their turn also take the damage with a basic Reflex
          save, but each individual creature can take damage from the vortex
          only once per round.</span></p>
      rules: []
      slug: null
