  - _id: BCaTMPAq9TmAYj1U
    name: 'Modification: Vizier of Stone'
    type: action
    img: systems/pf2e/icons/actions/Passive.webp
    effects: []
    folder: null
    sort: 0
    flags: {}
    system:
      description:
        gm: ''
        value: "<p>Saddam Syed has mastered shaitan earth magic. As a single action, he can touch a creature to inflict them with a petrifying curse. The target must succed at a <span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">@Check[type:fortitude|dc:38|basic:false] save or be afflicted with the shaitan noble's curse.</span><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\"> The curse progresses in stages, similar to a disease. Only one creature may be afflicted with the shaitan noble's curse at a time.</span></p>\n<p><strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">Shaitan Noble's Curse</span></strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">\_(curse, arcane, transmutation) A successful or critically successful save does not reduce the stage of the curse; it only prevents the curse from progressing, and a critical failure is treated as a failure instead. The curse ends automatically when Saddam dies, the afflicted creature moves at least 100 feet away from Saddam, or if the creature ends their turn next to a creature who has not been afflicted with the shaitan noble's curse in the past 10 minutes. In the latter case, that adjacent creature is immediately afflicted with stage 1 of the curse (if multiple qualifying creatures are adjacent, the GM chooses 1).\_<strong>Saving Throw\_</strong></span><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">@Check[type:fortitude|dc:38|basic:false]; <strong>Stage 1\_</strong>slowed 1 (1 round); <strong>Stage 2\_</strong>slowed 2 (1 round); <strong>Stage 3\_</strong>petrified for 3 rounds and the curse ends</span></p>"
      rules: []
