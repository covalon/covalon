  - _id: QfyMP9swtDPX10ga
    name: Return to Dust
    type: action
    img: systems/pf2e/icons/actions/ThreeActions.webp
    effects: []
    folder: null
    sort: 0
    flags: {}
    system:
      description:
        gm: ''
        value: "<p><strong>Frequency\_</strong>once per day</p>\n<p><strong>Special\_</strong>Saddam Syed can use this ability if he has less than three actions due to being slowed, stunned, or a similar effect, using all of his available actions for the turn instead.</p>\n<hr />\n<p><em>\"You mortals who dare to oppose me are born from dust, and to dust, I shall return you!\"</em></p>\n<p>\_</p>\n<p>Saddam Syed invokes his strongest air magic to temporarily disintegrate his enemies into dust clouds. All creatures in the arena that don't have the elemental trait must attempt a\_<span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">@Check[type:fortitude|dc:38|basic:false].</span></p>\n<p>\_</p>\n<p>After using this ability, Saddam Syed may immediately use Sudden Squall, though this consumes his reaction as normal.\_</p>\n<p>\_</p>\n<p><strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">Critical Success</span></strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\"> The creature is unaffected.</span></p>\n<p><strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">Success</span></strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\"> The creature disintegrates into a sentient dust cloud. The creature becomes affected by a 6th-level @Item[hmhXmqSzk5inxHTz]{Spell Effect: Elemental Form (Air)} spell, except they must choose air for the elemental form, they cannot dismiss the effect, the effect lasts until the end of Saddam Syed's next turn, and the creature gains weakness 20 to attacks and effects with the air trait (excluding this one).</span></p>\n<p><strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">Failure</span></strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\"> As success, but the creature gains weakness 25 to attacks and effects with the air trait (excluding this one).</span></p>\n<p><strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">Critical Failure</span></strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\"> As success, but the creautre gains weakness 40 to attacks and effects with the air trait (excluding this one).</span></p>\n<div data-visibility=\"gm\">\n<p><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">As this is a polymorph effect, it can only affect creatures who are already under a polymorph effect by counteracting it. Return to Dust's counteract modifier is +28. [[/r 1d20+28]]</span></p>\n</div>"
      rules: []
      slug: null
