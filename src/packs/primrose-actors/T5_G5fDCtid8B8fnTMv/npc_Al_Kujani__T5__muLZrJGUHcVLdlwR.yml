      description:
        gm: ''
        value: "<p><strong>Trigger: Al-Kujani</strong>\_takes damage.</p>\n<hr />\n<p>Saddam whips the whirlwind surrounding him into a frenzied squall. All other creatures in the whirlwind must attempt a <span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">@Check[type:fortitude|dc:38|basic:false] save. Creatures with the air trait are immune.</span></p>\n<p>\_</p>\n<p><strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">Critical Success</span></strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\"> The creature is unaffected.</span></p>\n<p><strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">Success</span></strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\"> The creature is pushed 5 feet away from Saddam.</span></p>\n<p><strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">Failure</span></strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\"> The creature is pushed 20 feet away from Saddam.</span></p>\n<p><strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">Critical Failure</span></strong><span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\"> The creature is pushed 20 feet away from Saddam and falls prone.</span></p>"
