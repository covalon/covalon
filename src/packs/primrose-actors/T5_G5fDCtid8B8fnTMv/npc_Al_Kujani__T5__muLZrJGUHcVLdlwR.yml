    system:
      description:
        gm: ''
        value: "<p><strong>Frequency</strong> once per round</p>\n<p><strong>Requirements\_</strong>The crystal elemental serving as Al-Kujani's soul cage is alive.</p>\n<hr />\n<p>Al-Kujani taps into his soul cage's power to cast a spell. First, Al-Kujani receives 1 point of damage. Then, Al-Kujani can cast one of his innate spells without exhausting its daily usage, and its casting time is reduced by 1 action. If Al-Kujani chooses to cast\_<em>elemental annihilation wave</em> in this way, he can cast the two round version for a total of three actions.</p>\n<div data-visibility=\"gm\">\n<p>When Al-Kujani receives a point of damage from Further Wish, it triggers Sandstorm Armor and allows him to use Sudden Squall if he wishes.</p>\n<p>\_</p>\n<p>When using this ability, you should narratively describe that Al-Kujani is pulling power from the crystal elemental.</p>\n</div>"
