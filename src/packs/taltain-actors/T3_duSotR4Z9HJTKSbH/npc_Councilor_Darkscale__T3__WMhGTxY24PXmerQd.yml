      description:
        gm: ''
        value: >-
          <p>Shadows coalesce around Darkscale and transport him through the
          Shadow Plane to an area of darkness or low-light within 120ft. This
          movement does not trigger reactions.</p><p>Darkscale can always sense
          the presence or absence of shadows within the range of Shadow Jump,
          and doesn't need line of sight to a location to target it with Shadow
          Jump.</p>
