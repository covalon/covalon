      Helvetica, Arial, sans-serif, 'Apple Symbols'">A Maw aberration based on
      Covalon's former Head Doctor, Kelani Snowdrop (ysoki inventor), Carloni
      prefers grafting machinery and other experimental treatments instead of
      traditional medicine.</span></p>
    privateNotes: >-
      <p>Carloni uses her Thunder-Thrower to target enemies that her fellow
      councilors are attacking while she uses Battle Graft to nimbly "heal" her
      allies. If the opportunity presents itself to where she can hit a decent
      number of allies and/or enemies with Ultravolt!, she should take it,
      especially if it can also hit a pillar.</p>
