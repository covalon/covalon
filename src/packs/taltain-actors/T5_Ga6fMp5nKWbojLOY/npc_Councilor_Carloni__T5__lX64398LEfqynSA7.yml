    system:
      description:
        gm: ''
        value: "<p><strong>Frequency\_</strong>once per day</p><hr /><p>Carloni's eyes gleam with menace and madness... and lightning. She shoots a 120ft line of lightning. Creatures caught in the bolt take @Damage[14d6[electricity]] damage with a @Check[type:reflex|dc:31|basic:true]. Allies of the Ratfolk Doctor caught in the bolt gain @Damage[5d8+10] temporary hit points.\_</p><p>\_</p><p>If the bolt collides with a pillar of the arena, the pillar creates a 10 foot emanation with the same effect. A creature may only be affected by Ultravolt! once per use of the ability.</p>"
