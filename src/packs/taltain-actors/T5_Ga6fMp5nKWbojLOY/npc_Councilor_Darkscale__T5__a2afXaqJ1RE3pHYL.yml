    blurb: ''
    publicNotes: >-
      <p><span style="font-family:'gg sans', 'Noto Sans', 'Helvetica Neue',
      Helvetica, Arial, sans-serif, 'Apple Symbols'">Darkscale is a Maw
      recreation of Sej the Starless (kobold fighter), who once served as
      Covalon's Captain of the Guard. Darkscale and Sej are both skilled
      fighters with a penchant for conjuring magical darkness, but Darkscale
      prefers to deal with lawbreakers swiftly and without mercy, ignoring due
      process.</span></p>
    privateNotes: >-
      <p>Darkscale should use Agitating Shadows immediately upon his first turn
      to sow chaos among the PCs. Although the other councilors will also be
      affected by the sight limit form this ability, they can use the darkness
      to reach opportune positions for future turns. Aside from that, he can use
      Shadow Jump to quickly travel the battlefield and his powerful Strikes to
      inflict large amounts of damage on high-priority targets.</p>
