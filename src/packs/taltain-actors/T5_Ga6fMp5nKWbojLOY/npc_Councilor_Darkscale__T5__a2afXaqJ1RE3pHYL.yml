  - img: systems/pf2e/icons/actions/Reaction.webp
    name: Reactive Strike
    system:
      actionType:
        value: reaction
      actions:
        value: null
      category: defensive
      description:
        value: >-
          <p><strong>Trigger</strong> A creature within your reach uses a
          manipulate action or a move action, makes a ranged attack, or leaves a
          square during a move action it's using.</p>

          <hr />

          <p>You lash out at a foe that leaves an opening. Make a melee Strike
          against the triggering creature. If your attack is a critical hit and
          the trigger was a manipulate action, you disrupt that action. This
          Strike doesn't count toward your multiple attack penalty, and your
          multiple attack penalty doesn't apply to this Strike.</p>
