    system:
      description:
        gm: ''
        value: >-
          <p>Darkscale unleashes shadows that permeate the arena and last for 1
          round. Enemies inside these shadows must make a
          @Check[type:will|dc:31] save. On a failure, they are affected by a
          4th-rank @Compendium[pf2e.spells-srd.r8g7oSumKOHDqJsd]{Agitate} spell
          as if they had failed the save against the spell.</p><p>These shadows
          do not affect the light level of the arena, but they prevent enemies
          from seeing further than 10 feet away from them unless they have
          greater darkvision.</p>
