    blurb: ''
    publicNotes: >-
      <p><span style="font-family:'gg sans', 'Noto Sans', 'Helvetica Neue',
      Helvetica, Arial, sans-serif, 'Apple Symbols'">Oster is a Maw recreation
      of Donkla (goblin alchemist), who once served as Covalon's Foreman, leader
      of the Crafting Union. The real Donkla was unfortunately slain battling a
      Maw fascimile in Ratchethallow, but Covalonians remember his brave spirit,
      along with his fiery alchemical inventions. Oster is the head of urban
      development in Taltain, but it is rumored he simply burns down any
      districts he doesn't like, to build them anew.</span></p>
    privateNotes: >-
      <p>Oster should attempt to use his Mega Bomb when he can hit as many PCs
      as possible without hitting any of his allies; if he rolls well on
      initiative, his first turn is opportune for this. His Pyromaniac ability
      gives his HP some significant heft, so he shouldn't be adverse to fighting
      on the front lines.</p>
