  - type: action
    img: systems/pf2e/icons/actions/TwoActions.webp
    name: 'Oscillating  Form: Fire and Ice'
    system:
      description:
        gm: ''
        value: >-
          <p>The Assembled Council laughs with elemental glee. Pick two
          @Template[type:burst|distance:10] within 60ft. Creatures in the first
          area take @Damage[15d6[cold]] damage, creatures in the second area
          take @Damage[15d6[fire]] damage, both with a
          @Check[type:fortitude|dc:35|basic:true].</p><p>A creature that fails
          its save also becomes @Compendium[pf2e.conditionitems.Clumsy]{Clumsy
          1} for 1 round if it took cold damage or
          @Compendium[pf2e.conditionitems.Enfeebled]{Enfeebled 1} for 1 round if
          it took fire damage. The bursts cannot overlap. If a creature is
          somehow in both bursts, The Assembled Council decides by which of the
          two instances the creature is affected, but it can not be affected by
          both.</p>
