    blurb: ''
    publicNotes: >-
      <p><span style="font-family:'gg sans', 'Noto Sans', 'Helvetica Neue',
      Helvetica, Arial, sans-serif, 'Apple Symbols'">Belle is a Maw recreation
      of Covalon's once Troupemaster, Clara Houser (human swashbuckler). The
      real Clara is known for her flashy performances, friendly personality, and
      skill with her bladed whip. Belle's whip is just as dangerous as Clara's,
      but her personality is far more cruel.</span></p>
    privateNotes: >-
      <p>Belle prefers to stay close to enemy spellcasters so she can interrupt
      them with Not Your Line!. She should focus on using her reach to trip
      enemy spellcasters or problematic enemies, and if she's in range of an
      ally, she can also use Whip into Shape! to make efficient use of an action
      instead of spending it on a third attack roll.</p>
