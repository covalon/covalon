    system:
      description:
        gm: ''
        value: >-
          <p>You splash a glob of acid that splatters your target and nearby
          creatures. Make a spell attack. If you hit, you deal 1d6 acid damage
          plus [[/r (1[splash])[acid]]]. On a critical success, the target also
          takes [[/r 1[persistent,acid]]] damage.</p>

          <hr />

          <p><strong>Heightened (3rd)</strong> The initial damage increases to
          1d6 + your spellcasting ability modifier, and the
          @UUID[Compendium.pf2e.conditionitems.Item.lDVqvLKA6eF3Df60]{Persistent
          Damage} increases to [[/r 2[persistent,acid]]].</p>

          <p><strong>Heightened (5th)</strong> The initial damage increases to
          2d6 + your spellcasting ability modifier, the Persistent Damage
          increases to [[/r 3[persistent,acid]]], and the splash damage
          increases to [[/r (2[splash])[acid]]].</p>

          <p><strong>Heightened (7th)</strong> The initial damage increases to
          3d6 + your spellcasting ability modifier, the Persistent Damage
          increases to [[/r 4[persistent,acid]]], and the splash damage
          increases to [[/r (3[splash])[acid]]].</p>

          <p><strong>Heightened (9th)</strong> The initial damage increases to
          4d6 + your spellcasting ability modifier, the Persistent Damage
          increases to [[/r 5[persistent,acid]]], and the splash damage
          increases to [[/r (4[splash])[acid]]].</p>
      rules: []
