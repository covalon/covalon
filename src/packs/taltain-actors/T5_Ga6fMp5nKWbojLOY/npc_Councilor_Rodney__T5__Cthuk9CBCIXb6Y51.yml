      of Zhaal Revane (human wizard), who once served as Covalon's Magister,
      after Arto Applefield. Zhaal is well known as the founder of Covalon's
      necromancy focused guild, the House of Dusk and Dawn. Rodney share's
      Zhaal's penchant for void magic and summoning undead, but Rodney's
      passions are far less controlled.</span></p>
    privateNotes: >-
      <p>Rodney uses his powerful control spells to debilitate enemies, and then
      follows up with high damage necromancy spells or his Summon Explosive
      Zombie ability.</p>
