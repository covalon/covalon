    img: >-
      https://assets.forge-vtt.com/bazaar/systems/pf2e/assets/icons/spells/enervation.webp
    name: Enervation
    system:
      description:
        gm: ''
        value: >-
          <p>Extending a finger, you fire a beam of negative energy that weakens
          the life force of any creature it touches. Each living creature in the
          line must attempt a Fortitude save.</p>

          <hr />

          <p><strong>Critical Success</strong> The creature is unaffected.</p>

          <p><strong>Success</strong> The creature takes [[/r
          2d8[persistent,void]]] damage.</p>

          <p><strong>Failure</strong> The creature takes [[/r
          4d8[persistent,void]]] damage and becomes
          @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained
          1}.</p>

          <p><strong>Critical Failure</strong> The creature takes [[/r
          4d8[persistent,void]]] damage and becomes
          @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained 2}
          and @UUID[Compendium.pf2e.conditionitems.Item.3uh1r86TzbQvosxv]{Doomed
          1}.</p>

          <hr />

          <p><strong>Heightened (+2)</strong> The persistent negative damage
          increases by [[/r 1d8[persistent,void]]] damage on a success, or by
          [[/r 2d8[persistent,void]]] damage on a failure or critical
          failure.</p>
