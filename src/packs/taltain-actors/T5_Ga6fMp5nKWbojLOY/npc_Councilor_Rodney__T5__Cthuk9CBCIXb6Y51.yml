        value: >-
          <p>You curse the target, filling it with terror at the loss of its
          blood. The target must attempt a Will save.</p>

          <hr />

          <p><strong>Critical Success</strong> The target is unaffected.</p>

          <p><strong>Success</strong> The target is
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          1}.</p>

          <p><strong>Failure</strong> The target is
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          2}. Until it stops bleeding, its frightened value can't decrease below
          frightened 1.</p>

          <p><strong>Critical Failure</strong> As failure, but the target is
          @UUID[Compendium.pf2e.conditionitems.Item.TBSHQspnbcqxsmjL]{Frightened
          3}.</p>

          <hr />

          <p><strong>Heightened (4th)</strong> You even terrify witnesses with
          the copious quantities of blood. You can target up to four creatures
