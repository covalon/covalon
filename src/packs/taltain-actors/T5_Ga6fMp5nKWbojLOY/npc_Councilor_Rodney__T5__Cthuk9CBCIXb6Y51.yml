  - _id: qJRJYuBU6AFGtR3Q
    img: >-
      https://assets.forge-vtt.com/bazaar/systems/pf2e/assets/icons/spells/necrotize.webp
    name: Necrotize
    system:
      description:
        gm: ''
        value: >-
          <p>You necrotize part of a creature's body, harming it and
          debilitating it as its body putrefies, mimicking the natural process
          of decay. The target takes 12d6 negative damage and one of the
          following debilitations; roll [[/r 1d4]] to randomly determine which.
          The effects depend on its Fortitude save.</p>

          <ol>

          <li><strong>Bones</strong> The target's bones necrotize and become
          spongy and weak, giving it weakness 3 to bludgeoning damage.</li>

          <li><strong>Joints</strong> The target's joints necrotize, making its
          movements ungainly and clumsy. It becomes
          @UUID[Compendium.pf2e.conditionitems.Item.i3OJZU2nk64Df3xm]{Clumsy
          1}.</li>

          <li><strong>Legs</strong> The target's legs necrotize, as well as any
          other limbs associated with forms of movement, making it harder for
          the creature to move. The target takes a -10-foot status penalty to
          its Speeds.
          @UUID[Compendium.pf2e.spell-effects.Item.ndj0TpLxyzbyzcm4]{Spell
          Effect: Necrotize (Legs)}</li>

          <li><strong>Muscles</strong> The target's muscles necrotize, rotting
          away. The target becomes
          @UUID[Compendium.pf2e.conditionitems.Item.MIRkyAjyBeXivMa7]{Enfeebled
          1}.</li>

          </ol>

          <hr />

          <p><strong>Critical Success</strong> The target is unaffected.</p>

          <p><strong>Success</strong> The target takes half damage and the
          debilitation lasts until the end of your next turn.</p>

          <p><strong>Failure</strong> The target takes full damage and the
          debilitation lasts for 1 minute.</p>

          <p><strong>Critical Failure</strong> The target takes double damage,
          and you can pick a second debilitation to apply, in addition to the
          one you rolled randomly. Both debilitations last for 1 minute.</p>

          <hr />

          <p><strong>Heightened (+1)</strong> The damage increases by 2d6.</p>
      rules: []
