  - _id: MhDqy7KOeW0cMmxJ
    img: >-
      https://assets.forge-vtt.com/bazaar/systems/pf2e/assets/icons/spells/vampiric-maiden.webp
    name: Vampiric Maiden
    system:
      description:
        gm: ''
        value: >-
          <p>A ghostly iron maiden snaps shut on the target and drains its
          vitality for your gain. This deals [[/r 4d4[piercing]]] damage and
          [[/r 4d4[void]]] damage, and the target must attempt a Fortitude save.
          You gain temporary HP equal to the negative damage the target takes
          (after applying resistances, weaknesses, and the like). You lose any
          remaining temporary HP after 1 minute.</p>

          <hr />

          <p><strong>Critical Success</strong> The target is unaffected.</p>

          <p><strong>Success</strong> The target takes half damage.</p>

          <p><strong>Failure</strong> The target is briefly trapped within the
          vampiric maiden. The target takes full damage and is
          @UUID[Compendium.pf2e.conditionitems.Item.eIcWbB5o3pP6OIMe]{Immobilized}
          by the iron maiden for 1 round or until it uses an
          @UUID[Compendium.pf2e.actionspf2e.Item.pvQ5rY2zrtPI614F]{Interact}
          action to extricate itself, whichever comes first.</p>

          <p><strong>Critical Failure</strong> The target takes double damage
          and is Immobilized by the vampiric maiden for 1 round or until it
          @UUID[Compendium.pf2e.actionspf2e.Item.SkZAQRkLLkmBQNB9]{Escapes}(the
          DC is your spell DC), whichever comes first.</p>

          <hr />

          <p><strong>Heightened (+1)</strong> The piercing and negative damage
          increase by [[/r 1d4]] each.</p>
      rules: []
      slug: vampiric-maiden
