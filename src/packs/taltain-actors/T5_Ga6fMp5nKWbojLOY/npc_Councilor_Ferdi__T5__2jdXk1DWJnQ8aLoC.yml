    blurb: ''
    publicNotes: >-
      <p><span style="font-family:'gg sans', 'Noto Sans', 'Helvetica Neue',
      Helvetica, Arial, sans-serif, 'Apple Symbols'">Ferdi is a Maw recreation
      of Hazi (iruxi gunslinger), who once served as Covalon's High Priest. The
      real Hazi is a valiant defender of the Heart of Terra and Covalon's church
      of various faiths. Ferdi is well known among the people of Taltain as the
      High Inquisitor, due to his near unstoppable pursuit of those he deems
      heretics.</span></p>
    privateNotes: >-
      <p>Ferdi should try to use Hunt Heretic every turn, if possible. His
      Hatred of Heretics ability requires him to focus on attacking creatures
      with visible symbols of deity, and the 100 ft. range of his rifle will
      allow him to do so in most circumstances. While Agitating Shadows is in
      effect, Ferdi can use Chameleon Skin to become undetected to the PCs, and
      he can also use it before using Hunt Heretic to make his target
      flat-footed.</p>
