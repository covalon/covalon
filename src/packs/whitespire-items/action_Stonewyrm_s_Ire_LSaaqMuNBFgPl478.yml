  description:
    value: >-
      <p><strong>Trigger </strong>This creature ends its turn within the aura of
      a Runic Wardstone.</p><p><strong>Effect </strong>The creature begins
      channeling Maw-touched power. At the start of its next turn, if it is
      still within the aura of a Wardstone, it explodes into Maw goop. This
      kills the monster and deals <strong>#Table 2-12 Area Damage
      Unlimited#</strong> Acid damage (@Damage[1d1[acid]]) in an emanation equal
      to 10 feet in Tiers 1-3, 15 feet in Tier 4, and 20 feet in Tier 5, with a
      <strong>#Table 2-11 Spell DC High#</strong> basic Reflex save
      (@Check[type:reflex|dc:XX|basic]) . The explosion also damages the
      Wardstone's enchantments, dealing 1 point of damage to it.</p>
