  description:
    value: >-
      <p>While in a Maw Frenzy, the Stonewyrm gains the following
      abilities.</p><ul><li><p>Access to the Earthen Frenzy and Death Throes
      actions.</p></li><li><p>Earthen Spike strikes deal an additional 3d6 bleed
      damage.</p></li><li><p>Jaws strikes deal an additional 2d10 persistent
      poison damage.</p></li><li><p>The Stonewyrm becomes
      @UUID[Compendium.pf2e.conditionitems.nlCjDvLMf2EkV2dl]{Quickened}. It can
      use this Quickened action only for Death Throes, Raise Cliffs, or
      Resilience of Mountains.</p></li><li><p>The Stonewyrm's Poisonous
      Exhalation recharges on a critical hit.</p></li><li><p>The Stonewyrm
      cannot be reduced below 1 hp.</p></li></ul>
