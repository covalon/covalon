  _migration:
    version: 0.955
    previous: null
  description:
    value: >-
      <p>Due to failing the Stonewyrm's breath weapon save, you are turning to
      stone and might become
      @UUID[Compendium.pf2e.conditionitems.dTwPJuKgBQCMxixg]{Petrified}.</p><p>You
      must attempt a @Check[fortitude|traits:earth,poison,primal] save at the
      end of each of your turns. </p><p>On a failed save, your
      @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed} condition
      increases by 1. </p><p>A successful save decreases your Slowed condition
      by 1. </p><p>If you become fully unable to act due to the Slowed
      condition, you are petrified permanently.</p><hr /><p><em>For automation
      purposes, this effect applies Slowed equal to its value. Tick up or down
      as needed to track Slowed. The level of this effect is equal to the
      Stonewyrm's level.</em></p>
