folder: oGy4hhyMrasXHk5L
name: 'Effect: Curse of Decay'
type: effect
effects: []
system:
  _migration:
    version: 0.955
    previous: null
  description:
    value: >-
      <p></p><div data-visibility="gm"><p>As the Stonewyrm draws closer to
      death, its enemies crumble into dust. This curse is activated by the
      Mawtouched Lifeforce and Death Throes abilties.</p><p><strong>Maximum
      Duration </strong>None, but the curse stops progressing immediatly when
      the Stonewyrm is killed. After its death, afflicted creatures stay
      permanently at whatever stage they reached until the curse is
      removed.</p><p><strong>Stage 1 - 2
      </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy 1},
      @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled 1}, and
      @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained 1} (1
      round)</p><p><strong>Stage 3 - 4
      </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy 2},
      @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled 2}, and
      @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained 2} (1
      round)</p><p><strong>Stage 5 - 6
      </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy 3},
      @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled 3}, and
      @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained 3} (1
      round)</p><p><strong>Stage 7 - 8
      </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy 4},
      @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled 4}, and
      @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained 4} (1
      round)</p><p><strong>Stage 9
      </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy 5},
      @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled 5}, and
      @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained 5} (1
      round)</p><p><strong>Stage 10 </strong>The creature's flesh crumbles to
      dust, leaving behind only its gear.</p></div>
