name: The Living Mandate
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>The Living Mandate is an unseen manifestation of mortals' rejection of
      the natural world and all it entails. They have existed since the start of
      the very first civilization to stray from the wilds, to carve its place
      unto the world and rise above the rest, growing as more and more have
      followed. Called by many names or philosophies they exist as an ideal or
      guiding deity in various cultures. Long ago, many believed that they
      watched over all civilization, ensuring progress at any cost. Though
      lacking any major allegiances, they heavily favour those who seek to
      innovate, to change, to seize their destiny. They have come to be
      characterized by ambition, progress and liberty. However, there are always
      two sides to a coin and with unrestricted progress comes greed,
      destruction, war and more. Still, always, The Living Mandate always sides
      with unrestricted advancement regardless of consequences. Now their
      worshippers include a variety of individuals from all backgrounds, good or
      bad, each seeking to manifest their destiny.</p><p><strong>Edicts</strong>
      Create personal and societal improvement, grow your lands, accrue
      wealth</p><p><strong>Anathema</strong> give to charity, join a workers
      union, hoard wealth without use</p>
