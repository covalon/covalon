name: The Cheshire
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>The final goddess of an unknown pantheon. Records suggest that she was
      just another goddess of the end, set to reap souls. Until her rebellion,
      spurred by but a single question. There are claims that all she wanted was
      a bit of fun, a bit of variety. The rest of the pantheon, purportedly took
      offence. Wile the rest of the history remains murky, one thing has been
      ascertained… the question which started it all? The question which brings
      Chessie to town? "Would you please… die for me?"</p><p><br
      /><strong>Edicts</strong> have fun and play pranks, make jokes and enjoy
      yourself, always prioritise your own needs and desires<br
      /><strong>Anathema</strong> failing to fight for your freedoms, control
      the life and deaths of others at the behest of an institution or god,
      concern yourself with the plights of others to the detriment of
      yourself<br /></p>
