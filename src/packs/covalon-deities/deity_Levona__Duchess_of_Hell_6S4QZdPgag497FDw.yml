    value: >-
      <p>The Duchess of Hell worked her way through the ranks, proving to all
      with the right deals power can be grasped. However, though power can be
      grasped, Levona keeps a tight grip on Hell, showing no mercy to those that
      would attempt to wrest it from her.<br /><strong>Edicts</strong> come out
      ahead in contracts, show no mercy to those beneath your station, be
      subservient to those above you<br /><strong>Anathema</strong> break a
      contract, show mercy, insult Levona in any way</p>
