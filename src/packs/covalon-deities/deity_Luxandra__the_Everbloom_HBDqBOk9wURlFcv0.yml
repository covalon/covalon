name: Luxandra, the Everbloom
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <div class="item d-flex flex-wrap" data-markdown="1"><div class="flex-even
      column" data-markdown="1"><p>Before destruction befell Elleaterra,
      Luxandra was the matron goddess to artists, performers, and lovers the
      world over. Since the end times, her followers have clung to hope that she
      still hears them, giving them the inspiration to still create even though
      the world is bleak. She revealed herself commonly through a well placed
      brush stroke, an impeccably put together outfit, or through acts of true
      love. Her followers, few as they may be now, still hold to these ideals so
      that the Everbloom may once again brighten their
      lives.</p><p><strong>Edicts</strong> create works of art, dress as well as
      one is able, appreciate beauty in all things, actively seek improvement,
      foster and nurture love<br /><strong>Anathema</strong> destroy a work of
      art (unless saving a life in the process), be slovenly in one’s
      appearance, let one’s abilities languish, interfere with genuine
      love</p></div></div>
