name: Hestora
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>Hestora is a deity of the home, of earth and flames. She grants
      guidance to those who wish to provide safety and rest to others. She
      prefers to let her actions, and food speak for her. Stories say Hestora
      was formed from the ashes of the first flames. It was there she built the
      first fireplace and where she calls home. Inviting all for safety and
      comfort.</p><p><br /><strong>Edicts</strong> appreciate a warm hearth,
      protect the home, teach communities to defend themselves, harvest with
      skill<br /><strong>Anathema</strong> deny support to loved ones, sow
      discord in a community, allow harm to come to children, refuse to provide
      for the family or community</p>
