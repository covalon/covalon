name: The Eyes
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <div class="item d-flex flex-wrap" data-markdown="1"><div class="flex-even
      column" data-markdown="1"><p>Lurking in the deepest reaches of the sea,
      The Eyes watch, The Eyes wait. The Eyes share knowledge with any who seek
      it. For those that touch upon The Eyes truth are forever reshaped, and
      their souls forever marked by madness. The Eyes know all, and see all, but
      require it's followers to seek more madness and fear, to learn more
      secrets of the unending void. For only in the rantings of a mad broken
      soul, can the truth be seen. The eyes followers attempt to destroy the
      minds of others, for a broken mind serves as sustanance to The Eyes,
      although the followers do not know this. The Eyes cares not for it's
      followers as long as they continue to feed them with broken minds and
      knowledge. As long as madness exists in the world, The Eyes will always be
      waiting.</p><p><strong>Edicts</strong> spread fear and madness to your
      foes, learn secrets<br /><strong>Anathema</strong> take or hostages,
      remove madness or fear, destroy secret knowledge</p></div></div>
