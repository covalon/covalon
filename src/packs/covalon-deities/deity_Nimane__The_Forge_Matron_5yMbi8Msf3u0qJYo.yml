name: Nimane, The Forge Matron
type: deity
system:
  description:
    gm: ''
    value: >-
      <p><span style="font-family:BookInsanityRemake">The Forge Matron appears
      as a tall, strong woman with goat like legs, and is said to live deep
      underneath a volcano, eternally perfecting her craft. Legendary tales say
      the strongest of all magical swords, armors, and other armaments are
      smelted under her blessing. Originally worshipped by mountain dwelling
      dwarves, Nimane grew in popularity due to the craftsmanship and skill of
      her followers. Now, her worshippers include all races of blacksmiths and
      craftsmen who value the quality of their work above all else, particularly
      those who specialize in weapons and armor. You can be sure a smith who
      worships the Forge Matron will deliver your money’s
      worth.</span></p><p><strong>Edicts</strong> <span
      style="font-family:BookInsanityRemake">perfect your chosen craft, learn to
      use the things you make, respect other crafters, teach and learn
      freely</span><br /><strong>Anathema</strong> <span
      style="font-family:BookInsanityRemake">sell your work for less than it’s
      worth, give up on bettering your skills, make shoddy work on purpose,
      disrespect fellow honest crafters</span></p>
