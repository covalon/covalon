name: Golgolgoss, the Watcher
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>Some say Golgolgoss came from the first sunbleached skull, others say
      they sprouted with the first tree, but those who know of the deity can
      agree they have been watching over the cycle of life and death from the
      beginning. Appearing as a giant figure shrouded in a cloak of leaves with
      a head made of many different skulls in the shape of a majestic moose
      skull, they stand vigil over nature's role in the world. Despite their
      appearance and duties, they are a Jolly being with a laugh that sounds
      like dry leaves in the wind. Rarely appearing to civilization at all, this
      deity will teach those in wilderness to survive and create life, and that
      death is just as important as life and should not be feared. Even Undeath
      serves its role to Golgolgoss as the creation often leads to new soil
      brought to the surface, and their decay will continue to foster new life.
      Artificial constructs are considered an affront to the deity, being seen
      as a mockery of life that contributes nothing to its
      cycle.</p><p><strong>Edicts</strong> bury a seed or body every day,
      protect new life, teach others to survive<br /><strong>Anathema</strong>
      create constructs, end life needlessly, disrespect the dead</p>
