name: The Path of the Great Spirits
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <div class="item d-flex flex-wrap" data-markdown="1"><div class="flex-even
      column" data-markdown="1"><p>"The Great Spirits" refers to an ancient
      deity whose name has long been forgotten and is now called by this
      collective title. The practice of worshiping them is referred to as
      "walking the path" and is mostly worshiped by tribal communities and those
      with more animist and ancestral worshiping tendencies that rely on the
      wisdom of those who have passed.</p><p>Those who dedicate themselves to
      walking the path of the Great Spirits see themselves as indistinguishable
      from the flora and fauna around them, and are therefore one with their
      ancestors buried in the lands on which they live. Since the Cataclysm, the
      survivors of those who walk the path have dedicated themselves to
      restoring the world to its natural balance and the return of others to
      their rightful ancestral lands.</p><p><strong>Edicts</strong> perform
      rites and rituals for the dead, teach others how to live in balance with
      nature, create ancestral records, resist illegitimate claims to land or
      power<br /><strong>Anathema</strong> disturb the graves of others,
      needlessly destroy natural resources, intentionally destroy ancient
      relics, deny your connection to a lineage, deny others the right to
      choose</p></div></div>
