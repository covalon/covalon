folder: null
name: Mendastarum, Devourer of Truth
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p><span style="font-family:BookInsanityRemake">Once long ago, there was
      an angel named Seruline, made by a god of truth and compassion, revered by
      many. Seruline was kind and fair and always sought the truth in
      everything. As her kindness spread though, her shadow grew, and as she
      grew stronger so too did her shadow. Finally, on a celebration of this
      angel, her shadow rose up and consumed her, trapping her in magical
      bindings before her followers. In desperation, the god that created
      Seruline offered a deal to the shadow to release her in exchange for
      anything the god could provide, but the shadow had learned all the angel
      did, and with a simple trick changed the deal with the god, gaining all
      their power and consuming the pair. From that day Mendastarum became a god
      to devour all knowledge, replacing it with deception and
      misinformation.</span><br class="Apple-interchange-newline" /><span
      style="font-family:BookInsanityRemake">The followers of Mendastarum never
      say his name directly, instead claiming the name of the angel he consumed
      as the source of their worship. Many come to Mendastarum seeking the
      knowledge to change or escape their deals or bindings, but more often than
      not they become tricked themselves, forced into servitude of this deity in
      exchange for broken pieces of the knowledge they seek. Others still come
      to Mendastarum with a desire for lost knowledge, or a desire to wipe out
      information, and willingly serve his goals in the hopes of reward. Whether
      forced or willing though, these followers seek out lost or hidden
      knowledge, learning it for themselves before destroying or changing it so
      no others can have it.</span></p><p><strong>Edicts</strong> <span
      style="font-family:BookInsanityRemake">Spread misinformation, seek
      forbidden or lost knowledge, deface what you learn so others may not learn
      it</span></p><p><strong>Anathema</strong> <span
      style="font-family:BookInsanityRemake">Speak the name Mendastarum to one
      that doesn’t know it, willingly share or be neglectful in protecting your
      secrets, correct a false assumption</span></p>
