name: Heures
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>Heures is the dragon deity that possesses the wisdom of ages. Heures is
      said to have grown so old and wise she ascended to godhood to guide all
      beings as they age. Her worship was continued as small cults across the
      world. Much of the cult's time was spent documenting the lives and wisdom
      of the elderly. While the cataclysm destroyed much of the recorded wisdom,
      failure is a chance to try again with
      wisdom.</p><p><strong>Edicts</strong> guide others through transitions in
      life, acknowledge Wyrms as mighty beings, consider the opinions of
      elders<br /><strong>Anathema</strong> avoid personal change, desecrate or
      destroy knowledge, be idle in your learning</p>
