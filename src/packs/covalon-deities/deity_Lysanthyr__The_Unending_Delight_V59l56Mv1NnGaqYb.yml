name: Lysanthyr, The Unending Delight
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <div class="item d-flex flex-wrap" data-markdown="1"><div class="flex-even
      column" data-markdown="1"><p>The sweet scent of roses catching your nose,
      the taste of honey dripping upon your tongue, the sinuous sensation of
      silk on your skin; these are the blessings of Lysanthyr. As old as
      consciousness itself, Lysanthyr is a truly ancient deity of sensation,
      pleasure and vanity. He expects his followers to seek out new experiences,
      enjoy existence and the partake in the pleasures it offers. The body is
      sacred to Lysanthyr and followers are expected to take care to preserve
      and perfect their bodies, for the body is the vessel by which the mind can
      derive pleasure from the world. To this end, he is associated with various
      cults of undeath and immortality. His worship rose to particular
      prominence in the nation of Varceta, where the ruling vampires often made
      sacrifices in his honour in hopes of being blessed with fleeting glimpses
      of their reflections. To know if Lysanthyr holds your heart you need only
      ask one question, ”Would you like to live
      deliciously?”</p><p><strong>Edicts</strong> indulge your senses, embellish
      your beauty, preserve your body, gaze upon your reflection<br
      /><strong>Anathema</strong> shatter a mirror, practice asceticism, waste a
      meal</p></div></div>
