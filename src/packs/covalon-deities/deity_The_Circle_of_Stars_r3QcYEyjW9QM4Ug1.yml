name: The Circle of Stars
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p><span style="font-family:BookInsanityRemake">The Circle of Stars is a
      loose pantheon of celestial deities of both day and night. It is
      worshipped primarily by agrarian cultures who place heavy reliance on
      their community’s safety. They recognize the union of the sun, moon, and
      stars as important as the union between seed and soil. The sun provides
      their crops, the night provides their rest, while the moon and stars keep
      them lit well enough to keep watch over their fields. Different
      communities and individuals may value different gods or goddesses within
      the pantheon differently, placing a greater emphasis on love or
      celebration of newcomers, or on maintaining a purifying fire in the face
      of the undead. Regardless, those who worship The Circle of Stars form
      strong bonds with those around them, and will do anything to keep them
      safe.</span></p><p><strong>Edicts</strong> <span
      style="font-family:BookInsanityRemake">foster community with bonds as
      bright as stars, heal the downtrodden, improve your talents for the sake
      of your community, celebrate your bonds
      regularly</span></p><p><strong>Anathema</strong> <span
      style="font-family:BookInsanityRemake">turn away a weary or wounded
      traveler, allow harm to come to a member of your community through
      negligence, maintain bonds with those who do not honor
      yours</span></p><p><strong>Members</strong> <span
      style="font-family:BookInsanityRemake">Aelia, Noctune, Trella</span></p>
