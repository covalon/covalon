name: The Great and Noble Manaat Al-Karim
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>Long ago the Great and Noble Janni Manaat al-Karim established a grand
      city in the great southern deserts. For several centuries this long lost
      city was a hub for trade, magic, and intellectual discourse. The city
      became home to many genie and their kin.</p><p>Her brother jealous of her
      success poisoned her drink causing her to fall into a deep sickness. For a
      year and a day her people prayed for her recovery. At the end their
      prayers were answered and she ascended.</p><p>Angered that his plan had
      failed her nameless brother cursed the city causing it to fall into ruin.
      Manaat was unable to prevent the destruction of her life's work but was
      able to protect many of its citizens as they fled. Sadly the curse lives
      on preventing her followers from ever reestablishing their holy
      city.</p><p>Since these ancient times Manaat has continued to protect and
      guide her people as they have shifted from cosmopolitan citizens into
      semi-nomadic tribes making ends meet in small villages and trade caravans
      throughout the deserts they call home.<br /><strong>Edicts</strong> To
      care for and promote the diaspora, to make honorable trades<br
      /><strong>Anathema</strong> To make vows, to use poison, speak her
      brother's name, to serve an evil genie</p>
