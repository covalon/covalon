name: Kohtalo, Patron of Fate Forgers
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p><span style="font-family:BookInsanityRemake">Kohtalo is the goddess of
      ambitious souls. Being one of the oldest and initially, most obscure
      Goddesses, through her own efforts and the efforts of her followers she’s
      gained greater recognition. Kohtalo was a Goddess of dreams, who was often
      overshadowed by other deities, but through completing a set of several
      challenges and tasks she was granted greater influence and sway. Through
      this experience she gained an appreciation for ambition. She blesses those
      who seek to forge their own fate and defy the odds, especially underdogs.
      Unlike many deities that effect fate, she gets a great deal of amusement
      from those who don’t accept their fate and actively fight against it,
      often putting her end goals and involvement in the lives of mortals at
      odds with other fate deities. Kohtalo’s favored weapon is the pick,
      signifying the desire to create a new life and path for oneself. She
      resents anyone who chooses a life of complacency or takes advantage of
      those weaker then themselves as it poses no challenge and doesn’t better
      anyone.</span></p><p><strong>Edicts</strong> <span
      style="font-family:BookInsanityRemake">bettering yourself by your own
      efforts, pursuing fame and glory for your achievements, crafting,
      rewarding yourself for your achievements.</span><br
      /><strong>Anathema</strong> <span
      style="font-family:BookInsanityRemake">abandoning projects or work,
      accepting charity, victimizing the weak or helpless, accepting bad
      circumstances, complacency or not having an ambitious life goal</span></p>
