name: Heleniel, The Sin Seeker
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>Heleniel is a beacon of hope for those who have lost all. She protects
      the weak and absent, and encourages her faithful to fulfill their duty in
      doing the same. She represents balance and justice. She is a favorite of
      those with little means, and is at the heart of new civilizations and
      their expansion. Her symbol is an eye and a bleeding dagger.</p><p><br
      /><strong>Edicts</strong> protect the weak, encourage the righteous,
      vanquish evildoers, be a bastion of the people<br
      /><strong>Anathema</strong> abandon those in need, attack without just
      cause, allow sinners to go unrepented<br /></p>
