    value: >-
      <p>Erimia, The Wild Mother, Mother Nature, she has been called many names.
      She protects all that grows and all that is born from the earth.</p><p><br
      /><strong>Edicts</strong> guide civilization to grow in harmony with
      nature, live sustainably and according to natural cycles, preserve areas
      of natural wilderness, protect the balance of nature, protect endangered
      species<br /><strong>Anathema</strong> cause damage to natural settings,
      kill animals for reasons other than self-defense or sustenance, remove an
      element or indigenous species from a natural area, encourage imbalance in
      nature, allow abuse of natural resources</p>
