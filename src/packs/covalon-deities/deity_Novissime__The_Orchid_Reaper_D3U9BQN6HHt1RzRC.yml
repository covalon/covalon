name: Novissime, The Orchid Reaper
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>The god of assassins, Novissime is a well known deity in what was once
      the nation of Varceta. Their followers were known for their swords with
      blood-red handles and sharp blades. Some stories claim that Novissime
      became a deity by slaying another, known only as ‘The Orchid’, by using
      his razor sharp legs as weapons in a peaceful meeting. Due to their brutal
      nature, they are equal parts respected and feared, as their agents aim to
      uphold the image that the deity has earned. Novissime, however, is not a
      chaotic god and while they have a brutal side, they are also an
      intelligent deity, thinking before acting so as not to regret his
      decision.</p><p><strong>Edicts</strong> Wield his favoured weapon in
      combat, openly show your worship through symbols and weaponry<br
      /><strong>Anathema</strong> Abandoning contracted work, recklessly rush
      into battle, show mercy to those you have sworn to slay</p>
