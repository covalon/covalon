name: Zegarek
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>Zegarek was most often followed by the more bold of the hunters from
      the earlier days of Gornlar. His teachings encouraged his clerics to join
      the rangers and fighters in their hunting trips and bounty hunts. His
      Favored Weapon is the hornbow as it was often crafted from the pieces,
      usually the horn, of the largest of prey and forced their users to hunt
      from horseback or close by. The temples to Zegarek were often used as
      early hunting lodges where his followers would share stories of their
      hunts be they beast or humanoid in nature. They were also places where
      anyone could drop off bounties to be claimed or where merchants could make
      requests when certain animal meats were in short
      supply.</p><p></p><p><strong>Edicts</strong> hunt with short ranged
      weapons, use every part of your kill, give your enemy a quick end, use eye
      contact to strike fear in your enemy<strong><br />Anathema</strong> engage
      your enemy from further than 60ft, let your enemy suffer in pain, use
      torture to get what you want, forget your enemy’s face</p>
