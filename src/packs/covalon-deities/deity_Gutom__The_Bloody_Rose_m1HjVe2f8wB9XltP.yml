name: Gutom, The Bloody Rose
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p><span style="font-family:BookInsanityRemake">The Bloody Rose is less of
      a god and moreso an entity that demands worship — an amalgamation of
      carnivorous plants and predatory animals seething with malice and blight
      in equal measure. When it goes unmaintained, crops wither, oceans rise,
      and hideous things crawl from the depths caked in black loam to enact its
      vengeance upon an innocent world. Its priests include crazed leshies and
      dryads bursting with putrefaction and vegetative tumors, a hollow sort of
      glee moving in their eyes. Some others, living in harsh and dangerous
      regions like Briarmurk, simply worship The Bloody Rose in hopes of gaining
      even a shred of its might. Is this truly divinity, or some monstrous
      parasite readying to burst from under the
      earth?</span></p><p><strong>Edicts</strong> <span
      style="font-family:BookInsanityRemake">Test yourself against nature, make
      animals and plants more dangerous, use what you
      kill</span></p><p><strong>Anathema</strong> <span
      style="font-family:BookInsanityRemake">Cower from fights, cut down a
      tree</span></p>
