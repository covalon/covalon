name: Unmortus, The Dead Guardian
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <div class="item d-flex flex-wrap" data-markdown="1"><div class="flex-even
      column" data-markdown="1"><p>Often depicted as a soldier armored in skulls
      and bones and a sword with his blade between his feet, Unmortus is revered
      as the god of eternal vigilance and the one who never fell. Long ago, in
      the beginnings of civilization, he was worshipped as a god of protection
      and the homeland and the protector of the heavens. He was restless and
      unyielding to his duty to the heavens, right until his unfortunate demise
      against a forgotten enemy. However, from his death, he rose again and kept
      his watch in unlife. Unfortunately, due to his new undead nature, his name
      fell into obscurity, with only a few nations knowing of him. Regardless,
      he keeps his vigil, even if the gods or mortals he protects despise him
      due to his nature.</p><p>His followers pledge their soul to the defense of
      their nation, and connect it to the realm of the dead so that they can be
      risen in order to defend the nation long after they have perished.
      Sometimes called bone lords, death knights, or the living dead, they are
      often looked upon with mistrust and sometimes open antagonism. Stoically,
      they press onward. They work forever for their homeland, their every
      breath in service of its defense.</p><p><strong>Edicts</strong> defend
      your homeland, improve your homeland, continue your duty by any means<br
      /><strong>Anathema</strong> abandon your nation, abandon your allies,
      disrespect your fallen comrades</p></div></div>
