name: A'shir, the Fated Flame
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p><span style="font-family:BookInsanityRemake">A’shir was once a god of
      fate and time, a god of diviners, worshiped by those wishing to see a
      glimpse into their own futures. He worked closely with the other gods in
      order to keep order in the world. That is until one day A’shir revealed a
      grim prophecy, that he would one day turn against the gods, destroying
      them and all their creations. The gods quickly grew fearful of A’shirs
      prophecy and swiftly imprisoned him deep within the plane of fire where
      they thought none would ever survive long enough to set him free. For ages
      he was imprisoned, the flames of the realm searing his flesh, it was not
      long before his understanding gave way to anger. With each passing year
      his rage grew until it mixed with the potent magics in the realm of fire,
      transforming him into a beast of fire and hatred. Still bound by divine
      chains, A’shir now vows to destroy the other gods and all they have made
      for their crimes against him.ssionate, warmhearted people and are known
      for healing those in need, no matter the personal cost, their
      truthfulness, and their endless patience.<br /><br
      /><strong>Edicts</strong> stoke flames, divine the future, help bring
      about the fated end<br /><strong>Anathema</strong> Put out flames, Worship
      other gods, attempt to escape your fate</span></p>
