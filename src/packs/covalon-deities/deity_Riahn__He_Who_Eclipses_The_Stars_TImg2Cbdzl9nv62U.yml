name: Riahn, He Who Eclipses The Stars
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <div class="item d-flex flex-wrap" data-markdown="1"><div class="flex-even
      column" data-markdown="1"><p><span
      style="font-family:BookInsanityRemake">Riahn, twin deity to Trella, was
      once known as the God of the South Star. His role in the sky was to offer
      alternate paths of travel to Trella, but over time people viewed Trella as
      the guiding star, causing him to be viewed as the star that would lead
      travellers astray. One day, the South Star no longer gave its light,
      leaving a void in the sky. Riahn is still there, watching, but as he moves
      through the sky, he sometimes eclipses the light of the other stars, going
      unnoticed by many but for the few who worship him this is seen as a good
      omen. Worshippers of Riahn typically involve those who act unseen, but are
      most definitely there, doing backdoor deals and looking for that which is
      hidden in the dark.</span></p><p><strong>Edicts</strong> find hidden
      secrets, make and uphold deals, hide your worship, help those in need.<br
      /><strong>Anathema</strong> stealing from those with little wealth,
      selling secrets, not upholding a deal, giving up on your
      comrades.</p></div></div>
