name: Sinnesh, The Den Mother
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <div class="item d-flex flex-wrap" data-markdown="1"><div class="flex-even
      column" data-markdown="1"><p>The Den Mother is an ancient being who
      originally gained power due to the worship of warren dwelling Ysoki. She
      is a deity of earth, family, and crafting, usually depicted as either a
      matronly Ysoki woman or as a massive subterranean rat. Though still
      somewhat of a patron diety to many Ysoki clans, she has also become
      popular with all folk who live or travel beneath the surface, mine and
      utilize underground resources, or value strong familial ties. Her holy
      symbol is a rat, curled up as though sleeping in a snug
      den.</p><p><strong>Edicts</strong> respect natural caves and underground
      spaces, value the knowledge of your elders, utilize the resources you
      gather, assist underground travellers<br /><strong>Anathema</strong> end
      the life of a child, let precious minerals or metals go to waste, abandon
      a family member who cherishes and respects you</p></div></div>
