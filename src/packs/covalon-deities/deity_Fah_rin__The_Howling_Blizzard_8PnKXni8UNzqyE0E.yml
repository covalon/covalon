name: Fah'rin, The Howling Blizzard
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p><span style="font-family:'gg sans', 'Noto Sans', 'Helvetica Neue',
      Helvetica, Arial, sans-serif, 'Apple Symbols'">Every year, as the long
      winters of the north end, stories of the cold months would find their way
      to the cities from those that live in the countryside. Many stories claim
      that the howls on the wind during blizzards were often accompanied by a
      feeling of being watched by something just out of view. Stories of Fah’rin
      tell of a massive wolf-like deity that seeks to halt the world; burying it
      beneath layers of snow and ice, perfectly preserved, perfectly still.
      Followers of Fah’rin can often be seen carrying her unholy symbol, a
      wolven face with an open maw, its fangs made of ice.</span></p><p><span
      style="font-family:'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica,
      Arial, sans-serif, 'Apple Symbols'"><strong>Edicts</strong> sculpt ice
      into vicious shapes, do not fear the cold, perfect
      yourself</span></p><p><span style="font-family:'gg sans', 'Noto Sans',
      'Helvetica Neue', Helvetica, Arial, sans-serif, 'Apple
      Symbols'"><strong>Anathema</strong> create fires for warmth, intentionally
      melt ice, harm a wolf that has done you no wrong</span></p>
