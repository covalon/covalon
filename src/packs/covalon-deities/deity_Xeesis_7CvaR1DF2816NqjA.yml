    value: >-
      <div class="item d-flex flex-wrap" data-markdown="1"><div class="flex-even
      column" data-markdown="1"><p>A relatively unkown deity, Xeesis is a god of
      secrets and hidden knowledge. They would ofte nuse their hidden knowledge
      to trick other gods for more secrets to possess. Xeesis is the god who hid
      away the goloma when the gods and demons arose to steal the eyes of all
      the races. Because what better secret than an entire race? They admire
      cunning and intrigue over brute strength, unless its all part of the
      trick; whether it's to fool a farmer for the fun of it, steal secrets from
      a lich doing magical research, or pull off the ultimate prank of defying
      fate itself.</p><p><strong>Edicts</strong> find hidden knowledge, protect
      secrets, mislead others<br /><strong>Anathema</strong> share secrets
      without reason, destroy knowledge, spread worship of
      Xeesis</p></div></div>
