name: The Grey Ocean
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>The Grey Ocean is a place: a beach made of seaglass, a great sea full
      of silted water and the dissolving wreckage of soul matter as it decays
      and reforms and joins the cycle anew. When undead are created, material is
      removed from Her purview, damaging the tide of life and death. Great
      beasts lurk in Her depths, the psychopomps the easiest to understand among
      them, but greater things hiding somewhere beneath Her waves. She is a home
      to all, a cradle, a tomb. One day, She will crash in on herself, the
      placid water giving birth to something new, far beyond death and souls.
      She is the gateway, the path, and the resting place at the end of the
      road. She is the knife. She is the meal. She calls.</p><p><strong>Edicts
      </strong>Destroy undead, help others through painful changes, respect the
      dead<br /><strong>Anathema </strong>Create undead, destroy recorded
      knowledge, pollute a body of water</p>
