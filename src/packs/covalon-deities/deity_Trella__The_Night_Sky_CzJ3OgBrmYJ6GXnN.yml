name: Trella, The Night Sky
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <div class="item d-flex flex-wrap" data-markdown="1"><div class="flex-even
      column" data-markdown="1"><p>Trella is a lesser-known deity of thoughtful
      travel. She encompasses the inky black and starlight of the night sky.
      Trella provides navigation for the lost. Her guidance directs travelers
      and enlightens minds. Her moving the moon and stars in the sky remind us
      to move and explore existence. Her celestial patterns provide insight into
      the future directions of the world. Worshippers of Trella come from many
      walks of life but all have a thirst for exploration and
      self-improvement.</p><p><strong>Edicts</strong> travel the world to learn
      about yourself, aid and provide charity to others on physical and
      spiritual journeys.<br /><strong>Anathema</strong> be complacent with your
      position or situation, horde wealth, lie to travelers. </p></div></div>
