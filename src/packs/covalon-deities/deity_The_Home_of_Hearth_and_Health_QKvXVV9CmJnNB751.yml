name: The Home of Hearth and Health
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p><span style="font-family:BookInsanityRemake">The Home of Hearth and
      health is a pantheon envisioning the three members as a family of
      siblings. The home is a chaotic place made up of individuals with
      different opinions and goals but when all members of a home work together
      to create a safe and positive place to live then all can flourish.
      Worshippers take this idea and try to embody it in their home and
      communities. Worshippers of the home foster growth and empathy while also
      protecting the home from cruelty and threats. The faith of The Home forms
      both in places surrounded by comfort and those in need of
      it.</span></p><p><strong>Edicts</strong> <span
      style="font-family:BookInsanityRemake">provide aid to the sick and
      wounded, teach communities to defend themselves, defend friends and the
      innocent, appreciate a warm hearth</span></p><p><strong>Anathema</strong>
      <span style="font-family:BookInsanityRemake">allow harm to come to
      children, deny someone shelter or food, deny support to loved ones, create
      undead</span></p><p><strong>Members</strong> Aelia, Fayne Lightfeet,
      Hestora</p>
