name: Fayne Lightfeet
type: deity
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>Fayne is a deity of small folk, trickery, crafting, and hospitality. In
      a world run by predominately bigfolk, and even bigger monsters that cause
      terror and destruction. Fayne teaches small folk of all ancestries to use
      cunning, guile, wit, and charm. Fayne preaches to be kind but always be
      prepared. Fayne encourages to provide comfort to those in need, if you
      have plenty it is your duty to provide to those who do not. However not
      everyone is kind and you must be ready. Using traps, poison, or whatever
      else you can to protect yourself and those in your care. Fayne often stays
      in Elysium but travels across the planes reminding larger Deities to
      remain humble.</p><p><br /><strong>Edicts</strong> be skilled and clever,
      defend friends and the innocent, engage in mischief that doesn’t harm
      others, create useful or beautiful items<br /><strong>Anathema</strong>
      abandon a friend in need, deny someone shelter or food, suffer a bully’s
      insults to you or another without retort<br /></p>
