    blurb: he/him grizzled dwarf history keeper
    publicNotes: >-
      <p>The last stoneteller of the famous Stoneheart clan, one of the founding
      families of Whitespire that created the Sons of the Iron Fathers, the
      republic that ran the city. Morag is very knowledgeable about the history,
      myths, and legends, including the myth of the Stonewyrm. </p>
    privateNotes: >-
      <p>Morag is not explicitly used for any of the Whitespire missions. This
      stat block and brief description/background have been provided in case
      you'd like to include him as an NPC in the Whitespire Camp.
      </p><p><strong>The Stonewyrm</strong></p><p>A legendary draconic beast
      that was subdued generations and generations ago before Whitespire was
      founded. Said to be larger than mountains, the ancient dwarven clans
      forced it to retreat into its impenetrable nest of adamantine, where it
      slumbers even now.</p><p><strong>Whitespire’s Demise</strong></p><p>During
      the Cataclysm, Morag experienced firsthand the crazed draconic frenzy that
      fell upon Whitespire. As a guardian of ancient knowledge, he led survivors
      into the secret catacombs below the city. This kept them safe for a time,
      until a strange magical gas began to flow upwards from the depths. All
      those who encountered it turned to stone. Remembering the myths of
      Whitespire’s founding, Morag believes this gas to be exhalations of the
      Stoneworm itself, deep in slumber. Faced with unending draconic hordes
      above, and the Stonewyrm’s Breath below, the dwarven survivors in the
      Catacombs slowly dwindled and all hope was lost. The last of the survivors
      were scattered in a draconic attack and turned to stone, including Morag,
      and that’s the last thing he remembers before the Covalonians arrived and
      saved him.</p><p></p>
