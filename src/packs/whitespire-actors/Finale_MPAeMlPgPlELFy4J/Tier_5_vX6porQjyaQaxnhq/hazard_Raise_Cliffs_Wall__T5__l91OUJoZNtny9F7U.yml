      description:
        value: >-
          <p><em>The walls from Raise Cliffs are covered in dangerous
          spikes.</em></p><p>Increase each wall's HP to 100 (instead of
          70).</p><p>If a creature deals damage to a wall from within 10 feet,
          the spikes automatically deal
          @Damage[@actor.system.attributes.hardness[piercing]] damage back to
          that creature equal to its hardness.</p><p><strong>Make sure to edit
          the hazard's current health when using the toggle.</strong></p>
