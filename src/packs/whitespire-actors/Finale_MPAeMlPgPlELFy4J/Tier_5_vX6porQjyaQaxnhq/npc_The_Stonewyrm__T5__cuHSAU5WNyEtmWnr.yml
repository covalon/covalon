  - folder: lPzcDrjGDFbzuF2r
    img: >-
      https://assets.forge-vtt.com/bazaar/core/icons/tools/smithing/furnace-fire-metal-orange.webp
    name: Mythic Heat Metal
    system:
      description:
        gm: ''
        value: >-
          <p>This spell heats the targeted metal to become red-hot for a moment.
          This is usually harmless to an unattended metal item, which doesn't
          get a saving throw, though the GM might rule that flammable materials
          connected to the object catch fire or melt. If you target an item worn
          or carried by a creature, or you target a creature made primarily of
          metal, the heat deals @Damage[(@item.level*2)d6[fire]] damage and
          @Damage[(@item.level)d4[persistent,fire]] damage to the creature,
          which must attempt a Reflex saving throw.</p><p>If you target an item
          held by the creature, the creature can
          @UUID[Compendium.pf2e.actionspf2e.Item.wQYmDStjdjn0I26t]{Release} the
          item to improve their degree of success by one step from the result of
          their saving throw. The persistent damage is associated with the
          object and damages whichever creature is holding or wearing it. It has
          no effect if no one is holding the item, but you continue to attempt
          flat checks to end the persistent damage as normal, since the item
          remains hot and can sear someone who picks it up.</p><hr
          /><p><strong>Critical Success</strong> The creature is
          unaffected.</p><p><strong>Success</strong> The creature takes half
          damage and the object deals no persistent fire
          damage.</p><p><strong>Failure</strong> The creature takes full damage
          and the object deals full persistent damage.</p><p><strong>Critical
          Failure</strong> As failure, but the creature takes double damage and
          the object deals double persistent damage.</p>
      rules: []
