items:
  - type: action
    name: Indomitable Presence
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>The Stonewyrm is truly massive. The entire battle arena is
          encircled by the Stonewyrm's coils. </p><p>Players can only target the
          head of the beast (its token). </p><p>The Stonewyrm is immune to
          forced movement and cannot be knocked Prone. </p><p>The Stonewyrm's
          head cannot move, and stays at its position on the north end of the
          arena.</p>
