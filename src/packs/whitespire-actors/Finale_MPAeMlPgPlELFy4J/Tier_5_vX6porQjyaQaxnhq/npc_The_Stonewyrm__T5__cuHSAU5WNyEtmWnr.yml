  - type: action
    name: 'Modification: Curse of Greater Decay'
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p><strong>Modification: The Stonewyrm's death curse is much more
          potent. Use Curse of Greater Decay instead of Curse of
          Decay.</strong></p><hr /><p>As the Stonewyrm draws closer to death,
          its enemies crumble into dust. This curse is activated by the
          Mawtouched Lifeforce and Death Throes abilties.</p><p><strong>Saving
          Throw </strong>@Check[will|dc:36]</p><p><strong>Maximum Duration
          </strong>None, but the curse stops progressing immediatly when the
          Stonewyrm is killed. After its death, afflicted creatures stay
          permanently at whatever stage they reached until the curse is
          removed.</p><p>Use
          @UUID[Compendium.covalon.whitespire-items.Item.SRRbA7aR6kOoWtrS]{Effect:
          Curse of Greater Decay} to track the stages of this curse, it will
          automatically apply and increment the associated
          conditions.</p><p><strong>Stage 1
          </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy
          1}, @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled
          1}, and @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained
          1} (1 round)</p><p><strong>Stage 2
          </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy
          2}, @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled
          2}, and @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained
          2} (1 round)</p><p><strong>Stage 3
          </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy
          3}, @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled
          3}, and @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained
          3} (1 round)</p><p><strong>Stage 4
          </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy
          4}, @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled
          4}, and @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained
          4} (1 round)</p><p><strong>Stage 5
          </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy
          5}, @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled
          5}, and @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained
          5} (1 round)</p><p><strong>Stage 6
          </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy
          6}, @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled
          6}, and @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained
          6} (1 round)</p><p><strong>Stage 7
          </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy
          7}, @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled
          7}, and @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained
          7} (1 round)</p><p><strong>Stage 8
          </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy
          8}, @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled
          8}, and @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained
          8} (1 round)</p><p><strong>Stage 9
          </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy
          9}, @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled
          9}, and @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained
          9} (1 round)</p><p><strong>Stage 10 </strong>The creature's flesh
          crumbles to dust, leaving behind only its gear.</p>
