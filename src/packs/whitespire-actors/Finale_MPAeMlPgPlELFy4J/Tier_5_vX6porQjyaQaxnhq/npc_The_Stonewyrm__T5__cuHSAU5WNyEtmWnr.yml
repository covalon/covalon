  - type: action
    name: Raise Cliffs
    system:
      actionType:
        value: action
      description:
        value: >-
          <p>The Stonewyrm raises up to three walls from the earth anywhere in
          the arena. Each wall is 1 inch thick, 30 feet long, and reaches from
          the floor to the ceiling (60 ft up). Walls are placed on the border
          between squares, must be conjured in an open space in a straight line,
          and cannot pass through creatures or objects. You cannot form a closed
          triangle with this ability (you can make three walls of a box). Each
          wall has AC 10, Hardness 15, 70 Hit Points, is immune to critical hits
          and precision damage, has weakness 10 to bludgeoning damage, and
          automatically fails all saving throws.</p><p>When placed in parallel,
          each wall must be at least 10 feet apart.</p><p>You can use the
          drawing tool or the template below to mark the location of each wall,
          and track each wall's HP using a separate
          @UUID[Compendium.covalon.whitespire-actors.Actor.l91OUJoZNtny9F7U]{Raise
          Cliffs Wall (T5)} actor. When a wall is destroyed, it destroys the
          entire 30 foot
          segment.</p><p>@Template[line|distance:30|width:0.25]</p><p>If the
          Stonewyrm uses this ability again, any previous walls disappear.</p>
        gm: ''
