  - type: action
    name: Mawtouched Lifeforce
    system:
      actionType:
        value: free
      description:
        value: >-
          <p><strong>Trigger </strong>The Stonewyrm would
          die.</p><p><strong>Effect </strong>The Maw refuses to let its vessel
          die. Do the following.</p><ul><li><p>Set the Stonewyrm to 1 hp and
          apply the
          @UUID[Compendium.covalon.whitespire-items.Item.K5mxflTPJqPMbB3h]{Maw
          Frenzy (T5)} effect. The Stonewyrm gains buffs and abilities as noted
          in the effect.</p></li><li><p>Every creature in the arena is exposed
          to Curse of Decay (or Curse of Greater Decay, if that modification is
          in effect).</p></li><li><p>Describe how the enchantments on
          @UUID[Compendium.covalon.whitespire-actors.Actor.aphptC8c8EHXrzjt]{The
          Den Mother (T5)} drill whirr to life, recovering from the initial push
          through the Stonewyrm's maw-adamantine cocoon. Perform the Den
          Mother's reaction and add it to the initiative
          tracker.</p></li><li><p>Add
          @UUID[Compendium.covalon.whitespire-items.Item.B1qFNjfOX1dACQpL]{Power
          the Den Mother} to your PCs sheets.</p></li></ul>
