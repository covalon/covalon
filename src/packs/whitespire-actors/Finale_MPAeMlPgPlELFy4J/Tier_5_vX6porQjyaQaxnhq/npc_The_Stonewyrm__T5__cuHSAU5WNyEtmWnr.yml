  - type: action
    name: Resilience of Mountains
    system:
      actionType:
        value: action
      description:
        value: >-
          <p>The Stonewyrm calls upon earthen magic, targetting a single magical
          effect with <strong>a duration and an area</strong>, or an ongoing
          <strong>magical effect or curse on itself,</strong> and attempts to
          counteract it. It's counteract modifier for this is [[/r 1d20+29
          #Resilience of Mountains]]{+29}, and its counteract level is half its
          creature level, rounded up.</p>
