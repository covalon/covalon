  - type: action
    name: Curse of Decay
    system:
      actionType:
        value: passive
      description:
        value: >-
          <p>As the Stonewyrm draws closer to death, its enemies crumble into
          dust. This curse is activated by the Mawtouched Lifeforce and Death
          Throes abilties.</p><p><strong>Saving Throw
          </strong>@Check[will|dc:36]</p><p><strong>Maximum Duration
          </strong>None, but the curse stops progressing immediatly when the
          Stonewyrm is killed. After its death, afflicted creatures stay
          permanently at whatever stage they reached until the curse is
          removed.</p><p>Use
          @UUID[Compendium.covalon.whitespire-items.Item.EE6yzIBKSpyYxxTy]{Effect:
          Curse of Decay} to track the stages of this curse, it will
          automatically apply and increment the associated
          conditions.</p><p><strong>Stage 1
          </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy
          1}, @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled
          1}, and @UUID[Compendium.pf2e.conditionitems.4D2KBtexWXa6oUMR]{Drained
          1} (1 round)</p><p><strong>Stage 2
          </strong>@UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy
          1}, @UUID[Compendium.pf2e.conditionitems.MIRkyAjyBeXivMa7]{Enfeebled
