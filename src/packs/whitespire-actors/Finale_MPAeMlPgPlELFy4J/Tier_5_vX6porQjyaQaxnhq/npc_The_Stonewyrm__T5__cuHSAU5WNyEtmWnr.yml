  - type: action
    name: Poisonous Exhalation
    system:
      actionType:
        value: action
      description:
        value: >-
          <p>The Stonewyrm exhales a poisonus gas that turns flesh to stone.
          Creatures in a @Template[cone|distance:100] take
          @Damage[16d6[poison]|options:area-damage]
          (@Check[fortitude|dc:36|basic|options:area-effect] save) with the
          following additional effects. The Stonewyrm can't use this ability
          again for [[/gmr 1d4 #Recharge Poisonous Exhalation]]{1d4
          rounds}.</p><hr /><p><strong>Critical Success</strong> The creature is
          unaffected.</p><p><strong>Success</strong> The creature takes half
          damage and is
          @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 1} for
          one round.</p><p><strong>Failure</strong> The creature takes full
          damage and is
          @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 1} and
          @UUID[Compendium.covalon.whitespire-items.Item.dW8603EhXd6F1tgY]{Turning
          to Stone}. The target must attempt a @Check[fortitude|dc:34] save at
          the end of each of its turns. On a failed save, the slowed condition
          increases by 1 (or 2 on a critical failure). A successful save reduces
          the slowed condition by 1. If a creature becomes fully unable to act
          due to the slowed condition, they become petrified permanently as a
          stone statue.</p><p><strong>Critical Failure</strong> The creature
          takes double damage, and then as Failure, except it is initially
          @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 2}.</p>
        gm: ''
