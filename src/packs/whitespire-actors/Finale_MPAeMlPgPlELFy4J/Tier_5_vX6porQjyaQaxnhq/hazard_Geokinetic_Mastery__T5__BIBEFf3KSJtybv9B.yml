  - type: action
    name: 'Routine: (Modification) Geokinetic Legend'
    system:
      actionType:
        value: action
      description:
        value: >-
          <p>The Stonewyrm's earthen battlefield effects are more dangerous. Use
          the upgraded effects below instead of the default ones. Changes are in
          <strong>bold.</strong></p><p>On its initiative, use one of four
          battlefield effects below. This ability must cycle through every
          effect before it can repeat. When this ability is used again, all
          ongoing effects from the previous instance immediately end.</p><hr
          /><p><strong>Spike Stones </strong>The Stonewyrm conjures long, sharp
          spikes of solid rock in <strong>three</strong>
          @Template[burst|distance:20]s. These areas are difficult terrain and
          hazardous terrain.</p><p>Creatures on the ground take
          <strong>@Damage[(@actor.flags.pf2e.spikeDamageMod*1)[piercing]|options:flat,area-damage,hazardous-terrain]</strong>
          damage for each square of spiked stone they enter, combined and taken
          once at the end of the creature's movement action.</p><p>(Damage
          buttons below for ease, click what you
          need.)</p><p>@Damage[(@actor.flags.pf2e.spikeDamageMod*1)[piercing]|options:flat,area-damage,hazardous-terrain]
          @Damage[(@actor.flags.pf2e.spikeDamageMod*2)[piercing]|options:flat,area-damage,hazardous-terrain]
          @Damage[(@actor.flags.pf2e.spikeDamageMod*3)[piercing]|options:flat,area-damage,hazardous-terrain]
          @Damage[(@actor.flags.pf2e.spikeDamageMod*4)[piercing]|options:flat,area-damage,hazardous-terrain]
          @Damage[(@actor.flags.pf2e.spikeDamageMod*5)[piercing]|options:flat,area-damage,hazardous-terrain]
          @Damage[(@actor.flags.pf2e.spikeDamageMod*6)[piercing]|options:flat,area-damage,hazardous-terrain]
          @Damage[(@actor.flags.pf2e.spikeDamageMod*7)[piercing]|options:flat,area-damage,hazardous-terrain]
          @Damage[(@actor.flags.pf2e.spikeDamageMod*8)[piercing]|options:flat,area-damage,hazardous-terrain]
          @Damage[(@actor.flags.pf2e.spikeDamageMod*9)[piercing]|options:flat,area-damage,hazardous-terrain]
          @Damage[(@actor.flags.pf2e.spikeDamageMod*10)[piercing]|options:flat,area-damage,hazardous-terrain]
          @Damage[(@actor.flags.pf2e.spikeDamageMod*11)[piercing]|options:flat,area-damage,hazardous-terrain]
          @Damage[(@actor.flags.pf2e.spikeDamageMod*12)[piercing]|options:flat,area-damage,hazardous-terrain]</p><hr
          /><p><strong>Earthen Grasp </strong>Earthen claws erupt from the
          earth. <strong>All creatures take</strong>
          <strong>@Damage[7d6[piercing]|options:area-damage] with a
          @Check[reflex|dc:36|basic|traits:primal,earth,magical]</strong>
          <strong>save. The creature also</strong> becomes
          @UUID[Compendium.pf2e.conditionitems.kWc1fhmv9LBiTuei]{Grabbed} on a
          failure (or
          @UUID[Compendium.pf2e.conditionitems.VcDeM8A5oI6VqhbM]{Restrained} on
          a critical failure) until the start of Geokinetic Mastery's next turn.
          [[/act escape dc=30 traits=primal,earth,magical]].</p><hr
          /><p><strong>Seismic Tremor </strong>The earth trembles and roils. All
          creatures<strong> take</strong>
          <strong>@Damage[7d6[bludgeoning]|options:area-damage] with a
          @Check[reflex|dc:36|basic|traits:primal,earth,magical]. A creature is
          also</strong> knocked
          @UUID[Compendium.pf2e.conditionitems.j91X7x0XSomq8d60]{Prone} on a
          failure.</p><hr /><p><strong>Scouring Sand </strong>Dirt and dust
          fills the arena. All creatures must attempt a
          @Check[fortitude|dc:36|traits:primal,earth,magical] save, becoming
          @UUID[Compendium.pf2e.conditionitems.TkIyaNPgTZFBCCuh]{Dazzled} on a
          <strong>success</strong> (or
          @UUID[Compendium.pf2e.conditionitems.XgEqL1kFApUbl5Z2]{Blinded} on a
          <strong>failure or a critical failure</strong>) until the start of
          Geokinetic Mastery's next turn.</p>
        gm: ''
      publication:
        title: ''
        authors: ''
        license: OGL
        remaster: false
