  details:
    description: >-
      <p>The Stonewyrm's mastery over the element of earth manifests as
      environmental effects that occur every round. This is <strong>not
      </strong>a hazard that can be disabled, its an ongoing environmental
      effect that continues for the entire encounter.</p><p>Geokinetic Mastery's
      effects have the magical, primal, and earth traits, and are considered the
      same level as the Stonewyrm. Its effects to not affect the Stonewyrm. </p>
    level:
      value: 13
    isComplex: true
    disable: <p>Cannot be disabled. </p>
    routine: >-
      <p>On its initiative, use either Routine: No Modification or Routine
      (Modification) Geokinetic Legend.</p>
