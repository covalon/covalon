  - type: action
    name: Mountain's Wrath
    system:
      actionType:
        value: reaction
      description:
        value: >-
          <p><strong>Trigger </strong>The Stonewyrm rolls
          initiative.</p><p><strong>Effect </strong>Put Geokinetic Mastery in
          the initiative order <em>directly before the Stonewyrm. </em>Creatures
          cannot delay between Geokinetic Mastery and the Stonewyrm. If a
          creature's initiative would be moved before the Stonewyrm (such as if
          they go to dying), place them before Geokinetic Mastery
          instead.</p><p><strong>Special </strong>If the Stonewyrm does not roll
          highest in initiative, begin Geokinetic Mastery's routine as part of
          this reaction at the start of combat, before any PCs take their
          turn.</p>
