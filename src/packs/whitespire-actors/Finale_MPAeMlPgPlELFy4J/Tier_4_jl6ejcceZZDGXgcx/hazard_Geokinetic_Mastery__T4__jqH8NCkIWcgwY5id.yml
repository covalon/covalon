  - type: action
    name: 'Routine: (Modification) Geokinetic Legend'
    system:
      actionType:
        value: action
      description:
        value: >-
          <p>The Stonewyrm's earthen battlefield effects are more dangerous. Use
          the upgraded effects below instead of the default ones. Changes are in
          <strong>bold.</strong></p><p>On its initiative, use one of four
          battlefield effects below. This ability must cycle through every
          effect before it can repeat. When this ability is used again, all
          ongoing effects from the previous instance immediately end.</p><hr
          /><p><strong>Spike Stones </strong>The Stonewyrm conjures long, sharp
          spikes of solid rock in <strong>three</strong>
          @Template[burst|distance:15]s. These areas are difficult terrain and
          hazardous terrain. A creature that moves on the ground through the
          area takes <strong>3 piercing damage</strong> for every 5 feet it
          moves (taken once, at the end of the creature's movement action).
          (Damage buttons below for ease, click what you
          need.)</p><p>@Damage[1[piercing]|options:area-damage],
          @Damage[4[piercing]|options:area-damage],
          @Damage[7[piercing]|options:area-damage],
          @Damage[10[piercing]|options:area-damage],
          @Damage[13[piercing]|options:area-damage]</p><p>@Damage[3[piercing]|options:area-damage],
          @Damage[6[piercing]|options:area-damage],
          @Damage[9[piercing]|options:area-damage],
          @Damage[12[piercing]|options:area-damage],
          @Damage[15[piercing]|options:area-damage]</p><p>@Damage[5[piercing]|options:area-damage],
          @Damage[8[piercing]|options:area-damage],
          @Damage[11[piercing]|options:area-damage],
          @Damage[14[piercing]|options:area-damage],
          @Damage[17[piercing]|options:area-damage]</p><hr /><p><strong>Earthen
          Grasp </strong>Earthen claws erupt from the earth. <strong>All
          creatures take</strong>
          <strong>@Damage[2d6[piercing]|options:area-damage] with a
          @Check[reflex|dc:30|basic|traits:primal,earth,magical]</strong>
          <strong>save. The creature also</strong> becomes
          @UUID[Compendium.pf2e.conditionitems.kWc1fhmv9LBiTuei]{Grabbed} on a
          failure (or
          @UUID[Compendium.pf2e.conditionitems.VcDeM8A5oI6VqhbM]{Restrained} on
          a critical failure) until the start of Geokinetic Mastery's next turn.
          Escape DC 26.</p><hr /><p><strong>Seismic Tremor </strong>The earth
          trembles and roils. All creatures<strong> take</strong>
          <strong>@Damage[2d6[bludgeoning]|options:area-damage] with a
          @Check[reflex|dc:30|basic|traits:primal,earth,magical]. A creature is
          also</strong> knocked
          @UUID[Compendium.pf2e.conditionitems.j91X7x0XSomq8d60]{Prone} on a
          failure.</p><hr /><p><strong>Scouring Sand </strong>Dirt and dust
          fills the arena. All creatures must attempt a
          @Check[fortitude|dc:30|traits:primal,earth,magical] save, becoming
          @UUID[Compendium.pf2e.conditionitems.TkIyaNPgTZFBCCuh]{Dazzled} on a
          <strong>success</strong> (or
          @UUID[Compendium.pf2e.conditionitems.XgEqL1kFApUbl5Z2]{Blinded} on a
          <strong>failure or a critical failure</strong>) until the start of
          Geokinetic Mastery's next turn.</p>
