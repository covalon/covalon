  - type: action
    name: Drill Forward
    system:
      actionType:
        value: action
      description:
        value: >-
          <p>The Den Mother moves forward 60 feet if a PC critically succeeded
          at Power the Den Mother, or 30 feet if a PC succeeded. This ignores
          difficult terrain.</p><p>If it impacts a wall, it deals
          @Damage[35[piercing]] damage to that wall. If this is enough to
          destroy the wall, its movement is not interrupted.</p><p>For each
          subsequent wall the drill impacts, it deals 10 less damage.
          @Damage[25[piercing]], @Damage[15[piercing]]</p><p>If the drill
          impacts a wall and the damage it deals to that wall is not enough to
          destroy the wall, its movement stops.</p><p>If the drill would impact
          a PC, that PC is harmlessly pushed out of the way and the drill
          continues its movement.</p><p>If the Den Mother impacts with the
          Stonewyrm, the Stonewyrm is immediately slain, bypassing its Maw
          Frenzy via Heart of Terra infused power.</p>
