  details:
    description: >-
      <p>An ancient Dwarven invention, this rune inscribed mine cart moves on
      its own, and has been enchanted to provide protection from the Stonewyrm’s
      Breath effect.</p><p>Stonewyrm's Breath is listed here for ease of
      reference.</p><hr /><p><strong>Stonewyrm’s
      Breath</strong></p><p><em>[Environmental][Primal][Poison]</em></p><p>Poisonous
      gas wells up from the bottom of the catacombs. Creatures that end their
      turn within the area of the hazard must attempt a <strong>#DC#</strong>
      (@Check[type:fortitude|dc:XX]) Fortitude Save or become
      @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 1}. If the
      creature was already Slowed, its Slowed value instead increases by 1 on a
      failed save. If a creature becomes unable to act due to the slowed
      condition from this effect, it becomes permanently
      @UUID[Compendium.pf2e.conditionitems.dTwPJuKgBQCMxixg]{Petrified}. A
      creature’s Slowed condition reduces by 1 each time it ends its turn
      outside the hazard’s area.</p><p>Stonewyrm’s Breath is a magical effect
      that cannot be counteracted. Spells or other abilities that would cleanse
      the air (such as Cleanse Air) have their durations reduced to 1 round.
      Effects that provide breathable air (such as an Everair Mask) do not
      protect from Stonewyrm’s Breath - this deep in the catacombs, it is not an
      inhaled effect.</p>
    level:
      value: 9
    isComplex: true
