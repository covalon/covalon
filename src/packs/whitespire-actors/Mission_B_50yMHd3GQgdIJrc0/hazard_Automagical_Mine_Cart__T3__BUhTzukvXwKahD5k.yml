  - type: action
    name: Minecart Drift
    system:
      actionType:
        value: action
      description:
        value: >-
          <p><strong>Prerequisite </strong>None of the PCs (or their companions)
          have the @UUID[Compendium.pf2e.conditionitems.yZRUzMqrMmfLu0V1]{Dying}
          condition.</p><p><strong>Effect </strong>The Automagical Mine Cart
          moves 30 feet forward along the minecart tracks. Any creatures or
          objects in the path are pushed out of the way harmlessly.</p><hr
          /><p>Outside of combat, the Cart moves consistently along the tracks
          at 30 feet per round (as long as no PCs are Dying). Players cannot
          ride in the cart, the ore they're transporting is too delicate and
          reactive. </p><p><strong>Note: </strong>You can reduce the cart's
          speed to 20 feed per round if your PCs are particularly slow (ie: Tier
          1 dwarves with full plate). </p>
