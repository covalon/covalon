items:
  - type: action
    name: Exhale
    system:
      actionType:
        value: reaction
      description:
        value: >-
          <p><strong>Trigger</strong> A creature approaches within 15 feet of
          the hidden crack in the stonework.</p><p><strong>Effect</strong> A
          blast of thick, stale air is expelled, creating a 10 foot square of
          lingering poison (as per the inhaled trait) on the triggering
          creature. The triggering creature and any creatures that later enter
          the area must attempt a
          @Check[fortitude|dc:34|traits:earth,poison,inhaled].</p><hr
          /><p><strong>Critical Success</strong> The creature is
          unaffected.</p><p><strong>Success</strong> The creature takes half of
          @Damage[(2d12+15)[poison]] and is
          @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 1} for 1
          round.</p><p><strong>Failure</strong> The creature takes full damage,
          is @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 1}
          and must attempt a
          @Check[fortitude|dc:30|traits:earth,poison,inhaled,incapacitation] at
          the end of each of its turns; this ongoing save has the incapacitation
          trait. On a failed save, the slowed condition increases by 1 (or 2 on
          a critical failure) as stone growths creep across their body. A
          successful save reduces the slowed condition by 1. When a creature
          becomes fully unable to act due to the slowed condition from this
          hazard, the effect then ends in a flash of gray light, leaving the
          target petrified permanently as they become a statue. The spell also
          ends if the slowed condition is removed, which causes the stone to
          break off harmlessly.</p><p><strong>Critical Failure</strong> As
          failure, but the creature takes double damage and is initially
          @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 2}.</p>
