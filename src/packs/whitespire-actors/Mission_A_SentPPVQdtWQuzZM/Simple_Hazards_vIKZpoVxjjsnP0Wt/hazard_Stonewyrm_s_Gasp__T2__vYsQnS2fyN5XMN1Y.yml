items:
  - type: action
    name: Exhale
    system:
      actionType:
        value: reaction
      description:
        value: >-
          <p><strong>Trigger</strong> A creature approaches within 15 feet of
          the hidden crack in the stonework.</p><p><strong>Effect</strong> A
          blast of thick, stale air is expelled, creating a 10 foot square of
          lingering poison (as per the inhaled trait) on the triggering
          creature. The triggering creature and any creatures that later enter
          the area must attempt a
          @Check[fortitude|dc:26|traits:earth,poison,inhaled].</p><hr
          /><p><strong>Critical Success</strong> The creature is
          unaffected.</p><p><strong>Success</strong> The creature takes half of
          @Damage[(2d8+7)[poison]] and is
          @UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy 1} for 1
          round as stone scales begin to grow over its
          body.</p><p><strong>Failure</strong> The creature takes full damage
          and is @UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy
          1}. The creature can attempt a
          @Check[fortitude|dc:22|traits:earth,poison,inhaled] at the end of each
          of its turns, removing the clumsy condition on a
          success.</p><p><strong>Critical Failure</strong> As failure, but the
          creature takes double damage. </p>
