    description: >-
      <p>Concentrated poisonous gas is expelled from a crack in the stone of the
      catacombs. Creatures with the Stonewyrm Touched adjustment (Appendix A)
      are immune to this hazard.</p>
    level:
      value: 5
    isComplex: false
    disable: >-
      <p>@Check[nature|dc:23|traits:action:disable-a-device]{Nature},
      @Check[survival|dc:23|traits:action:disable-a-device]{Survival},
      @Check[crafting|dc:23|traits:action:disable-a-device]{Crafting}, or
      @Check[thievery|dc:23|traits:action:disable-a-device]{Thievery} to
      carefully block the gap or safely disperse the accumulated gas.</p>
