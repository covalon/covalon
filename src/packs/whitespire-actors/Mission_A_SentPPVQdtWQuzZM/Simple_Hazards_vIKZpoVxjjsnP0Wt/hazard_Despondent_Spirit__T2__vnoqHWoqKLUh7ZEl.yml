  details:
    description: >-
      <p>A dwarven ghost sobs quietly as it lingers over the bones of their
      deceased loved ones. </p>
    level:
      value: 5
    isComplex: false
    disable: >-
      <p>@Check[religion|dc:22|traits:action:disable-a-device]{Religion} or
      @Check[occultism|dc:22|traits:action:disable-a-device]{Occultism} to
      exorcise the
      spirit.</p><p>@Check[diplomacy|dc:22|traits:action:disable-a-device]{Diplomacy},
      @Check[deception|dc:22|traits:action:disable-a-device]{Deception},
      @Check[performance|dc:22|traits:action:disable-a-device]{Performance} or
      another skill (at the GM's discretion) to soothe the spirit.</p>
    routine: ''
    reset: >-
