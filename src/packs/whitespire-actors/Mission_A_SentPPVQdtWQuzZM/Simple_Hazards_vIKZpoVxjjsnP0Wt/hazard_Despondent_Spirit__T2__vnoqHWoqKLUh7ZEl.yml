items:
  - type: action
    name: Share Pain
    system:
      actionType:
        value: reaction
      description:
        value: >-
          <p><strong>Trigger</strong> A creature fails to disable the haunt,
          speaks to it in a language other than dwarven, or otherwise takes some
          action that upsets the spirit.</p><p><strong>Effect</strong> The
          spirit lashes out in anger, wanting to share its burden. The
          triggering creature (or the closest creature) must attempt a
          @Check[will|dc:22|traits:emotion,mental] save.</p><hr
          /><p><strong>Critical Success</strong> The creature is
          unaffected.</p><p><strong>Success</strong> The creature takes half of
          @Damage[(4d8+7)[mental]] damage.</p><p><strong>Failure</strong> The
          creature takes full damage and begins to sob uncontrollably. It is
          unable to take reactions for 1 round.</p><p><strong>Critical
          Failure</strong> The creature takes double damage and can't use
          reactions for a minute.</p>
