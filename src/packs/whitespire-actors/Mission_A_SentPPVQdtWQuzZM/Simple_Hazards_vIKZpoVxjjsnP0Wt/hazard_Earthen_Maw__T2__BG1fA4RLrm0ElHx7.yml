      <p>@Check[arcana|dc:23|traits:action:disable-a-device]{Arcana},
      @Check[nature|dc:23|traits:action:disable-a-device]{Nature},
      @Check[religion|dc:23|traits:action:disable-a-device]{Religion},
      @Check[occultism|dc:23|traits:action:disable-a-device]{Occultism}, or
      @Check[thievery|dc:23|traits:action:disable-a-device]{Thievery} to banish
      the primal magics animating the stonework.</p>
    routine: ''
    reset: >-
      <p>1 day. Upon a successful disable check or reaching its broken
      threshold, the jaws meld back into the stonework, leaving no sign of their
      presence.</p><p>If a creature Escapes but the hazard is still active,
      Consume can be triggered again if a creature moves within its Jaws range.
      This cannot trigger in the same turn as a creature escapes the jaws. </p>
