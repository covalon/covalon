  details:
    description: >-
      <p>Poisonous gas built up underground bursts forth from three cracked
      vents in the stone. Space these out based on your battlemap, as a general
      rule they should be no more than 1-2 strides apart from each other. The
      hazard's "area" is the entire map.</p><p>Creatures with the Stonewyrm
      Touched adjustment (Appendix A) are immune to this hazard.</p>
    level:
      value: 2
    isComplex: true
    disable: >-
      <p>@Check[survival|dc:14|traits:action:disable-a-device]{Survival},
      @Check[crafting|dc:14|traits:action:disable-a-device]{Crafting},
      @Check[thievery|dc:14|traits:action:disable-a-device]{Thievery} or
      @Check[nature|dc:14|traits:action:disable-a-device]{Nature} to block off
      one of the vents.</p><p>All three vents must be successfully disabled or
      brought to their broken threshold (half HP) to completely shut off the
      hazard.</p>
    routine: >-
      <p>(1 action) Poison continues to spew from the remaining vents. Creatures
      in the area must attempt a
      @Check[fortitude|dc:18|traits:inhaled,poison,primal,magical] save. The DC is
      lowered by 2 for each vent successfully disabled (or broken). As noted in
      the inhaled trait, a creature can use an action on its turn to hold its
      breath and gain a +2 circumstance bonus to this save.</p><p>One vent
      disabled: @Check[fortitude|dc:16|traits:inhaled,poison,primal,magical], Two vents
      disabled:
      @Check[fortitude|dc:14|traits:inhaled,poison,primal,magical]</p><hr><p><strong>Critical
      Success</strong> The creature is
      unaffected.</p><p><strong>Success</strong> The creature takes half of
      @Damage[(2d4)[poison]] damage.</p><p><strong>Failure</strong> The creature
      takes full damage and is
      @UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy 1} for 1
      round as stone scales begin to manifest on its
      skin.</p><p><strong>Critical Failure </strong>The creature takes doubled
      damage and is
      @UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy 1} and
      @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 1} for 1
      round.</p>
    reset: <p>The poisonous gas takes 1 day to reaccumulate. </p>
    publication:
      title: 'Covalon: Whitespire Expedition'
      authors: ''
      license: OGL
      remaster: false
