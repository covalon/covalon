          adjustment enters the area of the
          hazard.</p><p><strong>Effect</strong> Stone spikes shaped like massive
          claws erupt from all surfaced. Creatures in the area within 10 feet of
          a stone surface take @Damage[(1d8+2)[piercing]] damage with a
          @Check[reflex|dc:18|basic|traits:earth] save. On a failure, the
          creature is also
          @UUID[Compendium.pf2e.conditionitems.eIcWbB5o3pP6OIMe]{Immobilized} by
