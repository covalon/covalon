  details:
    description: >-
      <p>Primal magic infuses a section of the catacombs, causing the stone
      itself to roil with anger and crush intruders. The "area" of the hazard is
      the entire battlemap. </p>
    level:
      value: 2
    isComplex: true
    disable: >-
      <p>@Check[arcana|dc:16|traits:action:disable-a-device]{Arcana},
      @Check[nature|dc:16|traits:action:disable-a-device]{Nature},
      @Check[religion|dc:16|traits:action:disable-a-device]{Religion}, or
      @Check[occultism|dc:16|traits:action:disable-a-device]{Occultism} to
      banish the primal magic infusing the nearby
      stone.</p><p>@Check[thievery|dc:16|traits:action:disable-a-device]{Thievery},
      @Check[athletics|dc:16|traits:action:disable-a-device]{Athletics}, or
      @Check[crafting|dc:16|traits:action:disable-a-device]{Crafting} to
      mitigate the effects by reinforcing the tunnel walls.</p><p>Three total
      successes are required to disable the hazard (a critical success to
      Disable a Device counts as two successes). The hazard loses one action in
      its routine per each success.</p>
    routine: >-
      <p>(3 actions) The hazard uses each of its actions to strike a different
      creature with an Earthen Spike. These strikes do not increment MAP.</p>
    reset: <p>1 day. </p>
