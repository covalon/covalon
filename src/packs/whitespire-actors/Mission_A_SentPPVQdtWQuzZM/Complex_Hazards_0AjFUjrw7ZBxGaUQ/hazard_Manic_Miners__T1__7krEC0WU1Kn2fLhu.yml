items:
  - type: action
    name: Neverending Toil
    system:
      actionType:
        value: reaction
      description:
        value: >-
          <p><strong>Trigger</strong> Living creatures enter the area of the
          haunt.</p><p><strong>Effect</strong> The dwarven spirits shout
          profanities and insist that the PCs join in the work. All living
          creatures in the area of the haunt must attempt a
          @Check[will|dc:18|traits:mental] save.</p><hr /><p><strong>Critical
          Success</strong> The creature is
          unaffected.</p><p><strong>Success</strong> The creature is
          @UUID[Compendium.pf2e.conditionitems.AJh5ex99aV6VTggg]{Off-Guard} for
          one round.</p><p><strong>Failure</strong> The creature is compelled to
          join the miners' work. At the end of its next turn, it takes
          @Damage[(1d6+2)[mental]] damage unless it spends at least one action
          to Strike a stone surface.</p><p><strong>Critical Failure</strong> As
          failure, but the creature takes the mental damage unless it spends two
          actions to Strike a stone surface.</p>
