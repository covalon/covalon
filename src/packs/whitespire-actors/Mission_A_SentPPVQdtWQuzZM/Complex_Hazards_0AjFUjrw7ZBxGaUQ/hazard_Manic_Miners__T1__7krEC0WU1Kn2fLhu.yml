  details:
    description: >-
      <p>The spirits of ancient dwarven miners lingers in the catacombs over
      their rusty and broken tools, driven to madness by their neverending
      work.</p>
    level:
      value: 2
    isComplex: true
    disable: >-
      <p>@Check[religion|dc:15|traits:action:disable-a-device]{Religion} or
      @Check[occultism|dc:15|traits:action:disable-a-device]{Occultism} to
      exorcise the
      spirits.</p><p>@Check[diplomacy|dc:15|traits:action:disable-a-device]{Diplomacy},
      @Check[deception|dc:15|traits:action:disable-a-device]{Deception},
      @Check[intimidation|dc:15|traits:action:disable-a-device]{Intimidation} or
      another social skill (at the GM's discretion) to calm, trick, or scare off
      the spirits.</p><p>Three total successes are required to completely
      disable the hazard. A critical success to disable counts as two
      successes.</p><p>One success is also earned towards disabling the hazard
      if the haunt takes damage equal to one third of its total HP.</p>
    routine: >-
      <p>(1 action) The dwarves continue to urge all nearby creatures to join
      their work. The haunt uses Neverending Toil on any creatures in the area
      that are not currently affected.</p><p>Creatures that are already affected
      must attempt a @Check[will|dc:18|traits:mental] save with the below
      effects. The DC is lowered by 2 for each success completed towards
      disabling the hazard.</p><p>One success: @Check[will|dc:16|traits:mental],
      Two successs: @Check[will|dc:14|traits:mental]</p><hr><p><strong>Critical
      Success</strong> The amount of actions a creature must spend striking a
      stone surface to avoid taking damage decreases by
      2.</p><p><strong>Success</strong> The amount of actions a creature must
      spend striking a stone surface to avoid taking damage decreases by
      1.</p><p><strong>Failure</strong> The amount of actions a creature must
      spend striking a stone surface to avoid taking damage increases by
      1.</p><p>If a creature would ever need to spend more actions than it has,
      the damage it takes at the end of its turn is doubled unless it spends all
      its actions to Strike stone surfaces.</p>
    reset: >-
      <p>The spirits return after 1 day, unless their broken mining equipment is
      recovered and repaired. </p>
    publication:
      title: 'Covalon: Whitespire Expedition'
      authors: ''
      license: OGL
      remaster: false
  saves:
    fortitude:
