  details:
    description: "<h4>Red Eye (Huge, Vehicle)</h4>\n<p><strong>Space </strong>15 feet long, 30 feet wide, 10 feet high. (10-feet wide with wings furled)</p>\n<p><strong>Crew </strong>1 pilot, <strong>Passengers </strong>2</p>\n<div>\n<p><strong>Piloting Check </strong>Piloting Lore (#DC#) or Nature/Crafting (#DC+2#)</p>\n<hr /></div>\n<p><strong>AC </strong>#2-5 low-2# <strong>Fort</strong> #2-6 moderate#</p>\n<p><strong>Hardness </strong>5\_x #tier-1# <strong>HP </strong>30 x #tier­­# (BT HP/2)</p>\n<div>\n<p><strong>Immunities </strong>critical hits, object immunities, precision damage</p>\n<hr /></div>\n<p><strong>Speed </strong>Fly 40 feet (Wind, Clockwork)</p>\n<p><strong>Collision </strong>2d10 per tier <strong>#DC# </strong>Reflex</p>\n<p><strong>Sluggish </strong>This vehicle must move twice its length for each 90-degree turn it makes</p>\n<p><strong>Collapsing Wings </strong>When unfurled, the Red-Eye’s wings are uneven terrain creatures traversing their spaces must attempt a #DC# check to Balance. Any creatures standing atop the wings when someone uses the Furl Wings activity can attempt to Grab an Edge (DC 15) to avoid falling. Climbing Kits can prevent a creature's fall, but a creature saved by a Climbing Kit dangles from the end of a 40-foot rope until it can Climb (DC15) back up the jostling line.</p>\n<hr />\n<p><strong>Flash </strong>◆ (light, magical, manipulate) A crew member activates the magical lanterns lining the Red Eye’s railing with a #DC-1# Divine or Crafting check with the following effects, which last one round and are unaffected by Middlemist’s Darkness.</p>\n<ul>\n<li><strong>Critical Success</strong> The Red Eye’s Body sheds bright light in a 30-feet radius, with dim light for an additional 30. Creatures within the light must attempt a #DC-1# save or be dazzled</li>\n<li><strong>Success</strong> As critical success, but the radius of each type of light is 20 feet.</li>\n<li><strong>Failure</strong> The lights fizzle and pop, emitting dim light in a 20-foot radius.</li>\n<li><strong>Critical Failure</strong> The lights spark dangerously. The activating creature takes #2-16 Simple Damage# fire damage with a #DC# basic Reflex save.</li>\n</ul>\n<p><strong>Electric Broadside\_</strong><strong><span class=\"pf2-icon\">3</span></strong> (electricity, magical, manipulate) A crackling beam of energy erupts from the one side of the Red Eye’s body at an angle of the activating crew member’s choice, dealing #2-16 Complex Damage) electricity damage to all creatures in a 60-foot line (#DC+1# basic Reflex save).</p>\n<p><strong>Furl Wings <span class=\"pf2-icon\">1</span></strong> (manipulate) The Pilot can spend one action to open or close to furl the wood and canvas wings that keep the Red Eye gliding. While the Red Eye’s wings are furled, it drops by 60 feet each round and its width is reduced to 10 ft. While plummeting, the Red Eye’s body is uneven ground (#DC#)</p>\n<p>\_</p>"
