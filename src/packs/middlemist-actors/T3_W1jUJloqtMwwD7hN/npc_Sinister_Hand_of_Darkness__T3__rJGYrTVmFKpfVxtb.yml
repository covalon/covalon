  - _id: 9L5FGnBuWHOMU0n7
    name: Clap [4 Actions]
    type: action
    img: systems/pf2e/icons/actions/ThreeActions.webp
    effects: []
    folder: null
    sort: 0
    flags:
      LocknKey:
        IDKeysFlag: ''
        RemoveKeyonUseFlag: false
        LPFormulaFlag: ''
        LPFormulaOverrideFlag: false
        LBFormulaFlag: ''
        LBFormulaOverrideFlag: false
        ReplacementItemFlag: ''
    system:
      description:
        gm: ''
        value: "<p>Clap can only be used if both hands can act simultaneously. Instead of using actions for other abilities, each hand can commit up to three actions to Clap, readying itself for a Clap until the end of the current round.</p><p>When a total of 4 actions have been committed to Clap in a single round, both hands immediately execute the following routine:</p><ol><li><p>Both hands may Fly up to 100 feet. They have to move for the same distance in the same direction if they choose to, and can not change the distance to each other during this movement.</p></li><li><p>The hands then slam together in a @Template[type:square|distance:10] centered around any point between them.\_Creatures in the square take @Damage[6d6[bludgeoning]] damage\_with a @Check[type:reflex|dc:26|basic:true] save. On a failure, creatures fall @Compendium[pf2e.conditionitems.j91X7x0XSomq8d60]{Prone}.</p></li><li><p>The reverberations of the Clap create a\_@Template[type:emanation|distance:30]. Creatures in the emanation take @Damage[6d6[sonic]] damage with a @Check[type:fortitude|dc:26|basic:true] save. On a failure, creatures are @Compendium[pf2e.conditionitems.9PR9y0bi4JPKnHPR]{Deafened} for 1 round.\_</p></li><li><p>After slamming together, each hand may Fly to any point within the emanation.</p></li></ol><p>After using Clap, the hands can not use this ability again for [[/br 1d4 # rounds]]{1d4 rounds}.</p>"
      rules: []
      slug: null
      _migration:
        version: 0.933
