    system:
      description:
        gm: ''
        value: "<p>The Shadow Titan commands shadows to do its bidding. When it uses this action, it may choose to spend 1-3 actions with the following effects:</p><p><span class=\"pf2-icon\">a\_\_</span>The Shadow Titan wrests control of one creature's shadow, and commands it to take a single action that creature can take.\_</p><p><span class=\"pf2-icon\">2\_</span>The Shadow Titan wrests control of one creature's shadow, and commands it to take up to two actions at once.\_</p><p><span class=\"pf2-icon\">3\_</span>The Shadow Titan wrests control of two creatures' shadows, and commands both of them to take up to two actions at once.\_</p><p>\_</p><p>The shadows created from Bind Shadow use the host creatures statistics, equipment, abilities and modifiers to resolve their actions. After the shadows resolve their actions, they return to their host. Shadows cannot take two single actions for the <span class=\"pf2-icon\">2</span> and <span class=\"pf2-icon\">3</span> action versions.\_</p><p>The resources used by the shadows do not remove the resource from the host creature.\_</p><p>The Shadow Titan cannot use Bind Shadows again for [[/br 1d4 #Recharge Bind Shadows]]{1d4 rounds}.</p><p>\_</p>"
      rules: []
      slug: null
