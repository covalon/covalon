items:
  - type: action
    name: Overcome By Silence
    system:
      actionType:
        value: reaction
      description:
        value: >-
          <p><strong>Trigger </strong>A living creature enters a square adjacent
          to the crystal</p><hr /><p><strong>Effect </strong>The crystal cracks,
          spilling magical shadows in a 5 foot emanation. All living creatures
          in the area must attempt a @Check[will|dc:34|] save with the following
          effects.</p><p><strong>Critical Success </strong>The creature is
          unaffected</p><p><strong>Success </strong>The creature is
          @UUID[Compendium.pf2e.conditionitems.Item.TkIyaNPgTZFBCCuh]{Dazzled}
          for one round by clinging shadows</p><p><strong>Failure </strong>The
          creature is
          @UUID[Compendium.pf2e.conditionitems.Item.XgEqL1kFApUbl5Z2]{Blinded}
          and silenced by shadows for three rounds. A silenced creature can make
          no sounds and can't use abilities with the sonic or auditory trait,
          including casting spells. The creature can attempt a
          @Check[will|dc:30|] at the end of each of its turns, ending the effect
          on a success.</p><p><strong>Critical Failure </strong>As Failure, but
          the creature is affected for ten rounds.</p>
