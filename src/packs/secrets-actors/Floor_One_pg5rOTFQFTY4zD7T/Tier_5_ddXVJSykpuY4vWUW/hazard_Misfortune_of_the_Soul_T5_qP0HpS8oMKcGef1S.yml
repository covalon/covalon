    emitsSound: encounter
  details:
    description: <p>This crystal shimmers like gold, truly a fortunate find!</p>
    level:
      value: 14
    isComplex: true
    disable: >-
      <p>@Check[arcana|dc:38|traits:action:disable-a-device]{Arcana},
      @Check[nature|dc:36|traits:action:disable-a-device]{Nature}, or
      @Check[religion|dc:36|traits:action:disable-a-device]{Religion} to siphon
      out the
      magic.</p><p>@Check[occultism|dc:36|traits:action:disable-a-device]{Occultism}
      to ward off bad luck and infuse the crystal with good
      luck.</p><p>@Check[thievery|dc:36|traits:action:disable-a-device]{Thievery}
      or @Check[crafting|dc:38|traits:action:disable-a-device]{Crafting} to
      break the crystal.</p><p>Three successes are required to fully deactivate
      the crystal. A critical success counts as two successes.</p>
    routine: >-
      <p><span style="font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue',
      Helvetica, Arial, sans-serif">(1 Action) If no creature is currently
      afflicted by Poor Unfortunate Soul, one PC within 90 feet is randomly
      targetted by that effect. Otherwise, every PC afflicted by Poor
      Unfortunate soul (including the creatures within 15 feet, or 30 feet on a
      critical failure) must attempt a
      </span>@Check[reflex|basic|dc:34|traits:misfortune,magical,divine,primal]<span
      style="font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica,
      Arial, sans-serif"> save with the following effects.</span></p><p><span
      style="font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica,
      Arial, sans-serif"><strong>Critical Success</strong> The creature is
      unaffected</span></p><p><span style="font-family: 'gg sans', 'Noto Sans',
      'Helvetica Neue', Helvetica, Arial, sans-serif"><strong>Success</strong>
      The creature has a minor accident, such as a stumble or a rock falling on
      them, taking half of </span>@Damage[(4d12)[bludgeoning]]<span
      style="font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica,
      Arial, sans-serif"> and becoming
      @UUID[Compendium.pf2e.conditionitems.Item.i3OJZU2nk64Df3xm]{Clumsy 1} for
      1 round.</span></p><p><span style="font-family: 'gg sans', 'Noto Sans',
      'Helvetica Neue', Helvetica, Arial, sans-serif"><strong>Failure</strong>
      As success, but the creature takes full damage, and also becomes
      @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone}.</span></p><p><span
      style="font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica,
      Arial, sans-serif"><strong>Critical Failure</strong> As failure, but the
      creature is
      @UUID[Compendium.pf2e.conditionitems.Item.i3OJZU2nk64Df3xm]{Clumsy 2}, and
      takes double damage.</span></p>
    reset: ''
