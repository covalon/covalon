  - type: action
    name: Poor Unfortunate Soul
    system:
      actionType:
        value: reaction
      description:
        value: >-
          <p><strong>Trigger </strong>A PC comes within 90ft of this
          crystal.</p><hr /><p><strong>Effect</strong> The triggering creature
          must roll a
          @Check[will|dc:36|traits:misfortune,magical,divine,primal,curse] with
          the following effects.</p><p><strong>Success </strong>The creature is
          unaffected</p><p><strong>Failure </strong>The creature gains a curse
          of bad luck so powerful that it surrounds them. The creature and all
          its allies within 15 feet must roll twice and take the worse result on
          all attack rolls and skill checks, this is a misfortune and effect
          that lasts until the hazard is disabled or
          destroyed.</p><p><strong>Critical Failure </strong>As failure, but it
          affects all allies within 30 feet.</p>
