    emitsSound: encounter
  details:
    description: >-
      <p>Swirling energies of light and dark mix beautifully in perfect harmony
      in this crystal.</p>
    level:
      value: 2
    isComplex: true
    disable: >-
      <p>@Check[nature|dc:16|traits:action:disable-a-device]{Nature},
      @Check[religion|dc:16|traits:action:disable-a-device]{Religion},
      @Check[arcana|dc:18|traits:action:disable-a-device]{Arcana}, or
      @Check[occultism|dc:18|traits:action:disable-a-device]{Occultism} to
      siphon out the
      magic.</p><p>@Check[thievery|dc:16|traits:action:disable-a-device]{Thievery}
      or @Check[crafting|dc:16|traits:action:disable-a-device]{Crafting} to
      break the crystal.</p><p>Three successes are required to deactivate the
      crystal. A critical success counts as two successes.</p>
    routine: >-
      <p>(1 action) <span style="font-family: 'gg sans', 'Noto Sans', 'Helvetica
      Neue', Helvetica, Arial, sans-serif">The air shakes as the crystal emits
      beams of white and black energies. All PCs within 30ft must attempt a
      </span>@Check[fortitude|basic|dc:18|traits:magical,divine,primal,void,vitality,curse]
      with the following effects.</p><p><strong>Critical Success</strong> The
      creature is unaffected</p><p><strong>Success</strong> The creature takes
      half of @Damage[(2d6)[void]] (If the creature is a void healer they
      instead take @Damage[(2d6)[vitality]])</p><p><strong>Failure</strong> The
      creature takes full damage</p><p><strong>Critical Failu</strong>re The
      creature takes double damage and gains void healing (or vitality healing
      if they are not normally a vitality healer). This effect is a curse that
      lasts 10 minutes</p>
    reset: ''
    publication:
      title: Secrets of the Heart
      authors: Covalon
      license: ORC
      remaster: true
  saves:
    fortitude:
      value: 12
    reflex:
      value: 7
    will:
      value: 0
