    emitsSound: encounter
  details:
    description: >-
      <p>This dark blackish purple stone swirls with condensed earthen
      energies.</p>
    level:
      value: 2
    isComplex: true
    disable: >-
      <p>@Check[nature|dc:16|traits:action:disable-a-device]{Nature} or
      @Check[religion|dc:16|traits:action:disable-a-device]{Religion} to siphon
      out the
      magic.</p><p>@Check[thievery|dc:16|traits:action:disable-a-device]{Thievery}
      to break the
      crystal.</p><p>@Check[athletics|dc:18|traits:action:disable-a-device]{Athletics}
      to smash the boulder.</p><p>Three successes are required to fully
      deactivate the hazard. A critical success counts as two successes. Players
      must be adjacent to the boulder to attempt disable checks.</p>
    routine: >-
      <p>(1 action) The adamantine boulder begins to move in a 30 foot line,
      attempting to bowl over PCs. Each creature in the line must attempt a
      @Check[reflex|dc:18|traits:earth,magical,divine,primal] save with the
      following effects. The bolder stops its path if it impacts a wall. A PC
      can also choose to attempt to stop the boulder instead of dodging, rolling
      a @Check[fortitude|dc:20|traits:earth,magical,divine,primal] save instead
      of a reflex save.</p><p><strong>Critical Success</strong> The creature
      takes no damage. If it rolled a Reflex save, it may
      @UUID[Compendium.pf2e.actionspf2e.Item.UHpkTuCtyaPqiCAB]{Step}. If it
      rolled a Fortitude save, it stops the path of the
      boulder.</p><p><strong>Success</strong> The creature takes half of
      @Damage[(1d6+5)[bludgeoning]] damage. If it rolled a Reflex save, it may
      Step. If it cannot Step, it gets a failure instead. If it rolled a
      Fortitude save, it gets a critical success
      instead</p><p><strong>Failure</strong> The creature takes
      @Damage[(1d6+5)[bludgeoning]] damage. If it rolled a Fortitude save, it
      gets a critical failure instead.</p><p><strong>Critical Failure</strong>
      The creature takes doubel of @Damage[(1d6+5)[bludgeoning]] damage and is
      knocked
      @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone}.</p>
    reset: ''
    publication:
      title: Secrets of the Heart
      authors: Covalon
      license: ORC
      remaster: true
  saves:
    fortitude:
      value: 12
    reflex:
      value: 7
    will:
      value: 0
