    weaknesses: []
    resistances: []
    emitsSound: encounter
  details:
    description: >-
      <p><span style="font-family:Roboto, sans-serif">This soothing pink crystal
      glows with a calming blue light, filling the room with a pale, pinkish
      purple light. Noticing the light has a Stealth DC of 0.</span></p>
    level:
      value: 8
    isComplex: true
    disable: >-
      <p>@Check[nature|dc:26|traits:action:disable-a-device]{Nature} or
      @Check[religion|dc:26|traits:action:disable-a-device]{Religion} to siphon
      out the
      magic.</p><p>@Check[occultism|dc:28|traits:action:disable-a-device]{Occultism}
      to counter the overflowing
      emotions.</p><p>@Check[thievery|dc:26|traits:action:disable-a-device]{Thievery}
      to break the
      crystal.</p><p>@Check[diplomacy|dc:26|traits:action:disable-a-device]{Diplomacy},
      @Check[Intimidation|dc:26|traits:action:disable-a-device]{Intimidation},
      or @Check[performance|dc:26|traits:action:disable-a-device]{Performance}
      to help your allies regulate their emotions again.</p><p>Diplomacy,
      Intimidation, or Performance can be attempted from anywhere, PCs must be
      adjacent to the crystal to attempt the other disable options.</p><p>Three
      successes are required to deactivate this crystal. A critical success
      counts as two successes.</p>
    routine: >-
      <p>(1 action) Emotions are brought bubbling to the surface, all PCs within
      80ft must roll a
      @Check[will|dc:26|traits:emotion,magical,divine,primal,mental] to resist
      the upwelling of emotions. Choose or randomly pick an emotion from below,
      all four emotions must be used before repeating any. On a failure the PC
      gains that emotion's effect for 1 round.</p><p><strong>Anger</strong> -
      The affected player enters a rage. <span style="font-family: Roboto,
      sans-serif">They can't use actions with the concentrate trait unless they
      also have the rage trait. Additionally they are
      @UUID[Compendium.pf2e.conditionitems.Item.AJh5ex99aV6VTggg]{Off-Guard}.</span></p><p><strong>Fear</strong>
      - The affected player is
      @UUID[Compendium.pf2e.conditionitems.Item.sDPxOjQ9kx2RZE8D]{Fleeing} until
      they are atleast 60ft away from all targets it is unfriendly or hostile
      towards.</p><p><strong>Pride</strong> - The affected player is affected by
      a success from the
      @UUID[Compendium.pf2e.spells-srd.Item.Mkbq9xlAUxHUHyR2]{Paranoia}
      spell.</p><p><strong>Sloth</strong> - The affected player is
      @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed 1}.</p>
    reset: ''
    publication:
      title: Secrets of the Heart
      authors: Covalon
      license: ORC
      remaster: true
  saves:
    fortitude:
      value: 21
    reflex:
      value: 16
    will:
      value: 0
