  details:
    description: >-
      <p>A pale crystal with dull magic contained within, infused with the
      vitality of beasts.</p>
    level:
      value: 8
    isComplex: true
    disable: >-
      <p>@Check[nature|dc:26|traits:action:disable-a-device]{Nature},
      @Check[religion|dc:26|traits:action:disable-a-device]{Religion},
      @Check[arcana|dc:28|traits:action:disable-a-device]{Arcana}, or
      @Check[occultism|dc:28|traits:action:disable-a-device]{Occultism} to
      siphon out the
      magic.</p><p>@Check[thievery|dc:26|traits:action:disable-a-device]{Thievery}
      or @Check[crafting|dc:26|traits:action:disable-a-device]{Crafting} to
      break the crystal.</p><p>Three successes are required to deactivate the
      crystal. A critical success counts as two successes.</p>
    routine: >-
      <p>(3 actions) For each action, the crystal attempts to reshape the form
      of a different creature within 60 feet. The creature must attempt a <span
      style="font-family: Roboto,
      sans-serif">@Check[fortitude|dc:25|traits:polymorph,magical,divine,primal]
      with the following effects. </span>The crystal loses 1 action for each
      successful check to disable the trap.</p><p><strong>Success </strong>The
      creature is unaffected</p><p><strong>Failure </strong>The creature's <span
      style="font-family: Roboto,
      sans-serif">@UUID[Compendium.pf2e.conditionitems.Item.MIRkyAjyBeXivMa7]{Enfeebled},
      @UUID[Compendium.pf2e.conditionitems.Item.i3OJZU2nk64Df3xm]{Clumsy}, and
      @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained}
      conditions increase by 1, up to a maximum of 4. The clumsy and enfeebled
      conditions last until the drained is removed (if drained is reduced,
      enfeebled and clumsy are too).</span></p><p><strong>Critical Failure
      </strong>As failure, but the creatures conditions increase by 2.</p>
    reset: ''
    publication:
      title: Secrets of the Heart
      authors: Covalon
      license: ORC
      remaster: true
  saves:
    fortitude:
      value: 21
    reflex:
      value: 16
    will:
      value: 0
