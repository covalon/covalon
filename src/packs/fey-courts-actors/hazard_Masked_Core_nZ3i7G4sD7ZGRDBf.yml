    system:
      description:
        gm: ''
        value: >-
          <p><strong>Trigger </strong>An enemy within 30 feet uses a move action
          or leaves a square during a move action it's using.</p>

          <hr />

          <p>The creature must succeed at a <strong>#Hazard 2-16 HDC#</strong>
          @Check[type:fortitude|dc:HDC] save or its move action is disrupted. It
          takes a -1 circumstance penalty to this save if it's wearing metal
          armor or holding a metal object, and on a critical failure is pushed
          10 feet away from the Masked Core.</p>

          <div data-visibility="gm">

          <p>In Tier 5, the masked core gains an extra reaction at the start of
          its turn, which it can only use for Thunderstruck.</p>

