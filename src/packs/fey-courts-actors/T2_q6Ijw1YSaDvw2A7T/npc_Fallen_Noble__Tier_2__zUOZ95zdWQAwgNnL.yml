  - img: systems/pf2e/icons/spells/guidance.webp
    name: Guidance
    system:
      description:
        gm: ''
        value: >-
          <p>You ask for the guidance of supernatural entities, granting the
          target a +1 status bonus to one attack roll, Perception check, saving
          throw, or skill check the target attempts before the duration ends.
          The target chooses which roll to use the bonus on before rolling. If
          the target uses the bonus, the spell ends. Either way, the target is
          then temporarily immune for 1 hour.</p>

          <p>@UUID[Compendium.pf2e.spell-effects.Item.3qHKBDF7lrHw8jFK]{Spell
          Effect: Guidance}</p>

          <p>@UUID[Compendium.pf2e.spell-effects.Item.3LyOkV25p7wA181H]{Effect:
          Guidance Immunity}</p>
