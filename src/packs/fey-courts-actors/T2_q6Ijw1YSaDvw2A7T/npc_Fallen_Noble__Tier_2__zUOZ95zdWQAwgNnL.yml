  - img: systems/pf2e/icons/spells/electrified-crystal-ward.webp
    name: Glass Shield
    system:
      description:
        gm: ''
        value: >-
          <p>You summon a layer of clear glass to keep you from harm. This
          cantrip functions as the
          @UUID[Compendium.pf2e.spells-srd.Item.TVKNbcgTee19PXZR]{Shield} spell,
          except it has Hardness 2 and 4 Hit Points. If this shield breaks,
          provided the breaker is within 5 feet, they must succeed at a basic
          Reflex save or take @Damage[1d4[piercing]] damage from the glass
          shards.</p>

          <p>@UUID[Compendium.pf2e.spell-effects.Item.oDDS6D2KTjpbA491]{Spell
          Effect: Glass Shield}</p>

          <hr />

          <p><strong>Heightened (3rd)</strong> The shield has Hardness 4 and 8
          Hit Points, and the damage increases to 1d4 + your spellcasting
          attribute modifier.</p>

          <p><strong>Heightened (5th)</strong> The shield has Hardness 7 and 16
          Hit Points, and the damage increases to 2d4 + your spellcasting
          attribute modifier.</p>

          <p><strong>Heightened (7th)</strong> The shield has Hardness 10 and 24
          Hit Points, and the damage increases to 3d4 + your spellcasting
          attribute modifier.</p>

          <p><strong>Heightened (9th)</strong> The shield has Hardness 12 and 32
          Hit Points, and the damage increases to 4d4 + your spellcasting
          attribute modifier.eld</p>
