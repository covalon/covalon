  - img: icons/magic/air/air-smoke-casting.webp
    name: Magnetic Repulsion
    system:
      description:
        gm: ''
        value: >-
          <p>You adjust your magnetic polarity, causing metal objects to jump
          and shudder away from you. Attacks made with metal objects against you
          take a -1 status penalty, and the squares adjacent to you are
          difficult terrain for creatures wearing metal armor. For creatures
          made entirely of metal, the penalty to their attack rolls is -2 and
          the squares adjacent to you are greater difficult terrain.</p>

          <p>While this spell is active, you require an additional Interact
          action before using a metal object (including to Strike with a metal
          weapon), and if you're wearing metal armor, you're
          @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed
          1}.</p>

          <hr />

          <p><strong>Heightened (+3)</strong> The status penalty to attack rolls
          increases by 1.</p>
