  - img: systems/pf2e/icons/spells/noxious-metals.webp
    name: Noxious Metals
    system:
      description:
        gm: ''
        value: >-
          <p>This spell forces toxic metal to coalesce on the skin or surface of
          all living creatures in the area, dealing @Damage[4d6[poison]] damage
          with a basic Fortitude save. Any creature that has the plant trait,
          has the wood trait, or has an anathema toward metal, takes the
          following effects depending on the result of that Fortitude save.</p>

          <hr />

          <p><strong>Critical Success</strong> The creature suffers no
          additional effects.</p>

          <p><strong>Success</strong> The creature takes
          @Damage[1[persistent,poison]] damage and is
          @UUID[Compendium.pf2e.conditionitems.Item.fesd1n5eVhpCSS18]{Sickened
          1} as long as it takes this persistent damage.</p>

          <p><strong>Failure</strong> As success, except
          @Damage[1d4[persistent,poison]] damage and
          @UUID[Compendium.pf2e.conditionitems.Item.fesd1n5eVhpCSS18]{Sickened
          2}.</p>

          <p><strong>Critical Failure</strong> As success, except
          @Damage[1d8[persistent,poison]] damage and
          @UUID[Compendium.pf2e.conditionitems.Item.fesd1n5eVhpCSS18]{Sickened
          3}.</p>

          <hr />

          <p><strong>Heightened (+1)</strong> The initial poison damage
          increases by [[/r 2d6]].</p>
      rules: []
      slug: noxious-metals
