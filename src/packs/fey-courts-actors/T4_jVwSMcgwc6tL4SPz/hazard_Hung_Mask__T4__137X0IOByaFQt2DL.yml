    description: >-
      <p>Recall Knowledge: <strong>#DC# </strong>Arcana, Nature or Crafting.<br
      />These masks seem tied to Lethallica's life force. Even if they were
      defeated, they could use one of those masks to rise again.</p><p>Even on a
      failed Recall Knowledge check, someone at least expert in Arcana, Nature
      or Crafting recognizes the metal that each mask and pool is made of,
      revealing their names.</p><p>This mask is <strong>not</strong>
      automatically destroyed by effects such as
      <em>@UUID[Compendium.pf2e.spells-srd.r7ihOgKv19eJQnik]{Disintegrate}</em>
      and is instead affected as if it was a creature. It doesn't get <span
      style="font-family:Roboto, sans-serif">a result one degree of success
      worse than the outcome of its save for being critically hit</span>.
      Resistance and hardness apply normally.</p>
