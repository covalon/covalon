    description: >-
      <p>The orbs from the Siccabyssium Pool linger at the end of their path and
      move again when a new orb arrives. A creature can take damage only once,
      even if multiple orbs pass through its space. They don't impede movement
      and can stay in a creature’s space. Lethallica’s Metalligrasp also
      functions from the orbs’ spaces.</p><p>Orbs automatically fail all saves,
      have object immunities, immunity to critical hits and precision damage,
      and don’t trigger reactions by Flying. They ignore the difficult terrain
      from Flying upward.</p><p>If the pool is disabled, the orbs
      disappear.</p><p>There can only be a maximum of 4 orbs out at a time.</p>
