  - type: action
    name: Beneath the Seven Masks
    system:
      description:
        gm: ''
        value: >-
          <p>Lethallica has 7 masks that they can wear, each made of a different
          skymetal. They begin the finale wearing a mask of your
          choice.</p><p>Each mask acts as a "lifebar", providing bonuses to
          saves and extra effects on Strikes. When Lethallica is reduced to 0
          HP, their worn mask is destroyed and immediately replaced by one of
          the remaining hung masks (which you remove from the map). They're also
          fully healed and become
          @UUID[Compendium.pf2e.conditionitems.nlCjDvLMf2EkV2dl]{Quickened} for
          1 round. All negative effects and conditions are
          removed.</p><p><em>Remember that Lethallica can't be reduced to 0 HP
          while their Super Regeneration is active!</em></p><p>When their last
          worn mask is destroyed, Lethallica reveals their true, <strong>rusted
          form</strong>. They're fully healed one last time, become Quickened
          for 1 minute, gain 100 temporary Hit Points and all negative effects
          and conditions are removed. They then activate their Corrosion of the
          Metal Plane ability.</p><hr /><p>See the Notes tab on Lethallica's
          sheet for more details on each mask's passive effects. They're all
          automated via the Worn Mask entry at the top of the Main tab.</p>
      rules:
        - key: RollOption
          domain: all
          option: seven-masks
          suboptions:
            - label: Abysium
              value: abysium
            - label: Adamantine
              value: adamantine
            - label: Djezet
              value: djezet
            - label: Inubrix
              value: inubrix
            - label: Noqual
              value: noqual
            - label: Orichalcum
              value: orichalcum
            - label: Siccatite
              value: siccatite
            - label: Rust Form (Maskless)
              value: rust
          toggleable: true
          alwaysActive: true
          label: Worn Mask
          value: true
          selection: rust
        - key: FlatModifier
          selector: fortitude
          value: 6
          predicate:
            - or:
                - seven-masks:abysium
                - seven-masks:adamantine
          label: Mask (Abysium or Adamantine)
        - key: FlatModifier
          selector: reflex
          value: 6
          predicate:
            - or:
                - seven-masks:inubrix
                - seven-masks:orichalcum
                - seven-masks:siccatite
          label: Mask (Inubrix, Orichalcum or Siccatite)
        - key: FlatModifier
          selector: will
          value: 6
          predicate:
            - or:
                - seven-masks:djezet
                - seven-masks:noqual
          label: Mask (Djezet or Noqual)
        - diceNumber: 1
          dieSize: d6
          key: DamageDice
          predicate:
            - or:
                - seven-masks:djezet
                - seven-masks:noqual
                - seven-masks:orichalcum
          selector: strike-damage
        - diceNumber: 2
          dieSize: d6
          key: DamageDice
          predicate:
            - seven-masks:inubrix
          selector: strike-damage
        - diceNumber: 3
          dieSize: d6
          key: DamageDice
          predicate:
            - seven-masks:adamantine
          selector: strike-damage
        - key: Note
          outcome:
            - success
            - criticalSuccess
          predicate:
            - seven-masks:abysium
          selector: strike-attack-roll
          text: >-
            On a hit, the target must succeed at a @Check[fortitude|dc:33] or
            become
            @UUID[Compendium.pf2e.conditionitems.fesd1n5eVhpCSS18]{Sickened 1}
            (@UUID[Compendium.pf2e.conditionitems.fesd1n5eVhpCSS18]{Sickened 2}
            on a critical failure). On a critical hit, the target gets one
            degree of success worse than it rolled on its save.
          title: Abysium Strikes
          visibility: owner
        - key: Note
          outcome:
            - success
            - criticalSuccess
          predicate:
            - seven-masks:djezet
          selector: strike-attack-roll
          text: >-
            On a hit, the target must succeed at a @Check[will|dc:33] or become
            @UUID[Compendium.pf2e.conditionitems.e1XGnhKNSQIm5IXg]{Stupefied 1}
            (@UUID[Compendium.pf2e.conditionitems.e1XGnhKNSQIm5IXg]{Stupefied 2}
            on a critical failure) for 1 round. On a critical hit, the target
            gets one degree of success worse than it rolled on its save.
          title: Djezet Strikes
          visibility: owner
        - key: Note
          predicate:
            - seven-masks:inubrix
          selector: strike-attack-roll
          text: >-
            This special inubrix passes through most defenses. The Strike can't
            trigger Shield Block. If the target has any circumstance bonus to
            AC, reduce that bonus by 2 for this attack.
          title: Inubrix Strikes
          visibility: owner
        - key: Note
          outcome:
            - success
            - criticalSuccess
          predicate:
            - seven-masks:noqual
          selector: strike-attack-roll
          text: >-
            Lethallica can produce the effects of an 8th-rank
            <i>@UUID[Compendium.pf2e.spells-srd.9HpwDN4MYQJnW0LG]{Dispel
            Magic}</i> spell against the target, with a +25 counteract modifier.
            [[/r 1d20+25 #Counteract]]
          title: Noqual Strikes
          visibility: owner
        - key: Note
          outcome:
            - success
            - criticalSuccess
          predicate:
            - seven-masks:orichalcum
          selector: strike-attack-roll
          text: >-
            On a hit, the target must succeed at a @Check[fortitude|dc:33] or
            become @UUID[Compendium.pf2e.conditionitems.i3OJZU2nk64Df3xm]{Clumsy
            1} (Clumsy 1 and
            @UUID[Compendium.pf2e.conditionitems.xYTAsEpcJE1Ccni3]{Slowed 1} on
            a critical failure) for 1 round. On a critical hit, the target gets
            one degree of success worse than it rolled on its save.
          title: Orichalcum Strikes
          visibility: owner
        - key: Note
          outcome:
            - success
            - criticalSuccess
          predicate:
            - seven-masks:siccatite
          selector: strike-attack-roll
          text: >-
            The Strike deals either @Damage[3d6[persistent,fire]] or 
            @Damage[3d6[persistent,cold]].
          title: Siccatite Strikes
          visibility: owner
        - key: DamageDice
          diceNumber: 2
          dieSize: d12
          damageType: poison
          category: persistent
          predicate:
            - seven-masks:rust
          selector: strike-damage
        - key: Resistance
          type:
            - cold
            - fire
          value: '11'
          predicate:
            - seven-masks:siccatite
          exceptions:
            - siccatite
        - key: Resistance
          type: spells
          value: '11'
          predicate:
            - seven-masks:noqual
          exceptions:
            - noqual
        - key: Resistance
          type: magical
          value: '5'
          predicate:
            - seven-masks:djezet
          exceptions:
            - djezet
        - key: Resistance
          type: physical
          value: '5'
          predicate:
            - seven-masks:adamantine
          exceptions:
            - adamantine
        - key: Resistance
          type: all-damage
          value: '3'
          predicate:
            - seven-masks:orichalcum
          exceptions:
            - orichalcum
        - key: Resistance
          type: void
          value: '11'
          predicate:
            - seven-masks:abysium
          exceptions:
            - abysium
        - key: EphemeralEffect
          selectors:
            - strike-attack-roll
          predicate:
            - seven-masks:inubrix
          uuid: Compendium.pf2e.spell-effects.Item.ZVPlFsk5Zimd8Mc9
