      details: ''
    level:
      value: 15
    blurb: ''
    publicNotes: >-
      <p>Lethallica, the Sky Liege, is an arrogant and cocky individual who
      loves to show off. They have no qualms asking the party what they think of
      the Fey Courts' new "decoration", or exhibiting their expensive-looking
      garments obviously made from fey clothes. Nonetheless, they waste no time
      in attempting to destroy the party once the fight begins.</p>
    privateNotes: >-
      <ul><li><p><strong>Abysium Mask:</strong> Fortitude +6; Strikes can cause
      the Sickened condition. Resists void from non-abysium
      sources.</p></li><li><p><strong>Adamantine Mask:</strong> Fortitude +6;
      Strikes deal an extra 3d6 damage. Resists physical from non-adamantine
      sources.</p></li><li><p><strong>Djezet Mask:</strong> Will +6; Strikes
      <span style="font-family:Roboto, sans-serif">deal an extra 1d6 damage
      and</span> can cause the Stupefied condition. Resists magic from
      non-djezet sources.</p></li><li><p><strong>Inubrix Mask:</strong> Reflex
      +6; Strikes deal an extra 2d6 damage, reduce circumstance bonuses to AC by
      2 and can't trigger Shield Block</p></li><li><p><strong>Noqual
      Mask:</strong> Will +6; Strikes deal an extra 1d6 damage and can produce
      the effect of an 8th-rank <em>dispel magic. </em>Resists non-noqual
      spells.</p></li><li><p><strong>Orichalcum Mask:</strong> Reflex +6;
      Strikes deal an extra 1d6 damage and can cause the Clumsy or Slowed
      conditions. Resists all damage from non-orichalcum
      sources.</p></li><li><p><strong>Siccatite Mask:</strong> Reflex +6;
      Strikes deal an extra 3d6 persistent damage (either cold or fire, choose
      on each hit). Resists cold and fire from non-siccatite
      sources.</p></li><li><p><strong>Rust Form:</strong> Strikes deal an extra
      2d12 persistent poison damage</p></li></ul>
