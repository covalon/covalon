  - type: action
    name: Metalligrasp
    system:
      description:
        gm: ''
        value: >-
          <p>Lethallica’s attacks can easily reach the Skymetal Pools through
          the metal floor and walls. On their turn, Lethallica can calculate
          their reach (for Strikes and Athletics actions) from their own space
          and from the Skymetal Pools’ spaces.</p><p>Once a Skymetal Pool is
          disabled or destroyed, it can't be used for Metalligrasp.</p>
