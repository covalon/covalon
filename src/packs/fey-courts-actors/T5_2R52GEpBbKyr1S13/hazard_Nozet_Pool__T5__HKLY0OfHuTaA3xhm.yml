type: hazard
effects: []
system:
  saves:
    fortitude:
      value: 27
      saveDetail: ''
    reflex:
      value: 22
      saveDetail: ''
    will:
      value: 0
      saveDetail: ''
  attributes:
    ac:
      value: 32
    hp:
      value: 92
      max: 92
      temp: 0
      details: ''
    hardness: 22
    stealth:
      value: 0
      details: >-
        <p>For APL 13, set the AC to 31 and reduce the saves by 2.</p><p>For APL
        15, set the AC to 34, increase the saves by 1, and increase the Hardness
        <em>to</em> 25.</p><p>Make sure to use the dropdown above to adjust the
        rest of the sheet.</p>
    emitsSound: encounter
    resistances: []
  details:
    isComplex: true
    level:
      value: 14
    disable: >-
      <p>Arcana, Crafting, Nature, Thievery or <em>dispel magic</em>. A total of
      two successes are required to disable it. <br>A thieves's toolkit is
      required for Thievery, and either a thieves's toolkit or a repair toolkit
      is required for
      Crafting.<br>@Check[arcana|dc:31|traits:action:disable-a-device]
      @Check[nature|dc:31|traits:action:disable-a-device]
      @Check[thievery|dc:32|traits:action:disable-a-device]
      @Check[crafting|dc:33|traits:action:disable-a-device]</p><p>The counteract
      DC for <em>dispel magic </em>is <strong>#DC#</strong> and the Pool's
      counteract rank is <strong>APL/2 rounded up</strong>. A successful
      counteract counts as one successful disable, unless the counteract check
      was a critical success in which case it fully disables the Pool.</p>
    description: >-
      <p>A pool is filled with liquid <strong>noqual </strong>and<strong>
      djezet</strong> agitated by the Maw's influence, with a control panel next
      to it. It doesn't hinder movement.</p><p>This pool is <strong>not</strong>
      automatically destroyed by effects such as
      <em>@UUID[Compendium.pf2e.spells-srd.r7ihOgKv19eJQnik]{Disintegrate}</em>
      and is instead affected as if it was a creature.</p><hr /><p>While
      adjacent to this pool, players gain the
      @UUID[Compendium.covalon.fey-courts-items.Item.tBc6dWmVXcJUjX8p]{Sky
      Coating} action, even if it's disabled or destroyed.</p><hr /><p>A
      creature other than Lethallica that enters the pool takes
      @Damage[(3d12+15)[force]] damage and becomes
      @UUID[Compendium.pf2e.conditionitems.e1XGnhKNSQIm5IXg]{Stupefied 1} for 1
      round.</p><p>Once fully disabled or destroyed this pool can be traversed
      safely, and it can't be used for Lethallica's Metalligrasp.</p>
    reset: ''
    routine: >-
      <p>(1 action) Creatures besides Lethallica in a
      @Template[type:burst|distance:5] within 120 feet take
      @Damage[(4d10+20)[force]] with a
      @Check[will|basic:true|dc:34|traits:metal,magical] save. On a failed save,
      one benefical magical effect affecting the creature ends immediately. This
      ends the effect only for that creature.</p><p>Lethallica chooses which
      effect ends for each creature. This is a magical and metal effect.</p>
    publication:
      title: ''
      authors: ''
      license: ORC
      remaster: false
