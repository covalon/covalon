name: Sky Coating
type: action
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>While adjacent to a Skymetal Pool, you can use this action to coat an
      unarmed attack or a weapon you're wielding with the pool's metal(s). This
      causes it to count as the metal(s) contained in the pool on its next
      successful Strike within 1 minute, after which the coating wears
      off.</p><p>Alternatively, you can add the spellshape or infusion trait to
      this action, causing instead your next spell or impulse to count as the
      appropriate
      metal(s).</p><p>@UUID[Compendium.covalon.fey-courts-items.Item.wXSk0Wyev1d5t4id]{Effect:
