    img: systems/pf2e/icons/actions/Passive.webp
    name: Rope Snare
    sort: 2600000
    system:
      description:
        gm: ''
        value: >-
          <p>An erinys carries a coil of rope woven of their hair (use the
          statistics for
          @UUID[Compendium.pf2e.equipment-srd.Item.fyYnQf1NAx9fWFaS]{Rope}) that
          animates in their hands.</p>

          <p>When a creature is hit by the erinys's rope, a segment of the rope
          tears loose and wraps itself around the creature, imposing a 10-foot
          circumstance penalty to Speed. The piece that tears off is 10 feet
          long for a Medium or smaller creature, and doubles in length for each
          size larger than Medium.</p>

          <p>When a creature
          @UUID[Compendium.pf2e.actionspf2e.Item.SkZAQRkLLkmBQNB9]{Escapes} the
          effect (DC 26), the detached segment of rope withers away into useless
          black sludge.</p>

          <p>@UUID[Compendium.pf2e.bestiary-effects.Item.o0zqsH5kYopRanav]{Effect:
          Rope Snare}</p>
