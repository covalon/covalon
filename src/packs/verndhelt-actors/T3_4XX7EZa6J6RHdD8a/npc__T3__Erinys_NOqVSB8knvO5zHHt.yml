          2}; while it is sickened, it is also
          @UUID[Compendium.pf2e.conditionitems.Item.xYTAsEpcJE1Ccni3]{Slowed
          1}.</p>

          <hr />

          <p><strong>Heightened (+1)</strong> The damage increases by 1d10.</p>
