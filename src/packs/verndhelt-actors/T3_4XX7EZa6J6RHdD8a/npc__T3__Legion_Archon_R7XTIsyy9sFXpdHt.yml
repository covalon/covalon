      - type: unholy
        value: 10
  initiative:
    statistic: perception
  details:
    languages:
      value:
        - diabolic
        - draconic
        - empyrean
      details: tongues
    level:
      value: 7
    blurb: ''
    publicNotes: >-
      <p>Despite their flaming blades and heavy armor, legion archons are the
      diplomats of peace among the archons, preferring justice via compromise
      and mutual benefit rather than justice by the sword. Nonetheless, when
      forced to fight against fiendish powers-especially fiends that embody the
      sin of wrath-legion archons don't hesitate in battle, mounting offensives
      under divine commanders like Iomedae.</p>

      <hr />

      <p>Archons are guardians of Heaven and enemies of chaos and evil. They
      openly fight back the spread of fiends but also quietly nurture the seeds
      of virtue within mortals, teaching the denizens of the Material Plane how
      to act with honor and integrity, enact just laws, and cast off sin and
      temptation.</p>

      <p>Archons live in the immense seven-tiered mountain of Heaven. They
      manifest in the Garden at the mountain's peak from mortal souls who answer
      a mysterious voice. There they swear to forever serve the cause of justice
      and transform into their new archon forms. Intensely orderly in their
      metamorphosis, new archons begin as lantern archons or other lesser forms,
      transforming into ever-greater archons as their virtue and achievements
      grow. Each archon represents a particular virtue, such as hope, charity,
      justice, or courage, and they gain strength in the presence of mortals who
      exemplify this virtue. Due to their extremely lawful nature, archons
      sometimes find themselves at odds with azatas.</p>
    privateNotes: ''
    publication:
      title: Pathfinder Bestiary
      authors: ''
      license: OGL
      remaster: false
    creatureType: Celestial
