        value: >-
          <p>@Template[type:emanation|distance:30]{30 feet}
          @UUID[Compendium.pf2e.bestiary-ability-glossary-srd.Item.v61oEQaDdcRpaZ9X]{Aura}</p>

          <hr />

          <p>Enemies that start their turn in the area or enter it must attempt
          a @Check[type:will|dc:23] save.</p>

          <p>On a failure, they take a -1 status penalty to attack rolls, spell
          rolls, and damage rolls against any other target while in the aura for
          24 hours or until they damage the archon, whichever comes first. On a
          critical failure, they can't use hostile actions against any other
          target while in the area for 24 hours or until they damage the archon,
          whichever comes first.</p>

          <p>Regardless of the result, a creature is then temporarily immune to
          further menacing guardian auras for 24 hours.</p>
