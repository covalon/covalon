    name: Artifact
    system:
      description:
        gm: ''
        value: "<p>Items with this trait are artifacts. These magic items can't be crafted by normal means, and they can't be damaged by normal means. Artifacts are always\_<a href=\"https://2e.aonprd.com/Traits.aspx?ID=137\">rare</a>\_or\_<a href=\"https://2e.aonprd.com/Traits.aspx?ID=161\">unique</a>.</p>\n<p>\_</p>\n<p>The Infernal Contract can be affected by effects that cause Forced Movement or effects that can Interact such as @UUID[Compendium.pf2e.spells-srd.Item.pwzdSlJgYqN7bs2w]{Mage Hand}. The Infernal Contract is not affected by any effects except the Forced Movement.\_</p>"
