    name: Ambitious Object
    system:
      description:
        gm: ''
        value: "<p>The Infernal Contract always takes its turn first in initiative order and cannot be directly damaged. A creature adjacent to the Infernal Contract can attempt to use the Litigation Larceny action.\_</p>\n<p>\_</p>\n<p>The Infernal Contract has one action per turn that it can use only to Fly towards a creature that is in control of the contract or to Fly away from a creature that has attempted @UUID[Compendium.covalon.verndhelt-items.Item.k9t36ZqXDVWCQfwO]{Litigation Larceny} in the last round.\_</p>"
