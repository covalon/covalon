      description:
        gm: ''
        value: >-
          <p>You forge a temporary link between the target's life essence and
          your own. The target takes half damage from all effects that deal Hit
          Point damage, and you take the remainder of the damage. When you take
          damage through this link, you don't apply any resistances, weaknesses,
          or other abilities you have to that damage; you simply take that
          amount of damage. The spell ends if the target is ever more than 30
          feet away from you. If either you or the target is reduced to 0 Hit
