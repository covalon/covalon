  - _id: jqt0SoJZpFH4vCee
    flags:
      core: {}
    img: systems/pf2e/icons/spells/dominate.webp
    name: Dominate
    sort: 300000
    system:
      description:
        gm: ''
        value: >-
          <p>You take command of the target, forcing it to obey your orders. If
          you issue an obviously self-destructive order, the target doesn't act
          until you issue a new order. The effect depends on its Will save.</p>

          <hr /><strong>Critical Success</strong> The target is unaffected.

          <p><strong>Success</strong> The target is
          @UUID[Compendium.pf2e.conditionitems.Item.dfCMdR4wnpbYNTix]{Stunned 1}
          as it fights off your commands.</p>

          <p><strong>Failure</strong> The target follows your orders but can
          attempt a Will save at the end of each of its turns. On a success, the
          spell ends.</p>

          <p><strong>Critical Failure</strong> As a failure, but the target
          receives a new save only if you give it a new order that is against
          its nature, such as killing its allies.</p>

          <hr /><strong>Heightened (10th)</strong> The duration is unlimited.
      rules: []
      slug: dominate
