  - _id: yZRDv2nvR2V58CKr
    flags:
      core: {}
    img: systems/pf2e/icons/spells/heal.webp
    name: Heal
    sort: 1000000
    system:
      description:
        gm: ''
        value: >-
          <p>You channel positive energy to heal the living or damage the
          undead. If the target is a willing living creature, you restore 1d8
          Hit Points. If the target is undead, you deal that amount of positive
          damage to it, and it gets a basic Fortitude save. The number of
          actions you spend when Casting this Spell determines its targets,
          range, area, and other parameters.</p>

          <p><span class="pf2-icon">1</span> <strong>(somatic)</strong> The
          spell has a range of touch.</p>

          <p><span class="pf2-icon">2</span> <strong>(verbal, somatic)</strong>
          The spell has a range of 30 feet. If you're healing a living creature,
