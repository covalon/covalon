    img: systems/pf2e/icons/spells/banishment.webp
    name: Banishment
    sort: -100000
    system:
      description:
        gm: ''
        value: >-
          <p>You send the target back to its home plane. The target must attempt
          a Will save. You can spend an extra action while Casting this Spell
          and add a material component to give the creature a -2 circumstance
          penalty to its save. The component must be a specially gathered object
          that is anathema to the creature, and not from a spell component
          pouch. This spell fails if you aren't on your home plane when you cast
          it.</p>

          <hr /><strong>Critical Success</strong> The target resists being
          banished and you are
          @UUID[Compendium.pf2e.conditionitems.Item.dfCMdR4wnpbYNTix]{Stunned
          1}.

          <p><strong>Success</strong> The target resists being banished.</p>

          <p><strong>Failure</strong> The target is banished.</p>

          <p><strong>Critical Failure</strong> The target is banished and can't
          return by any means to the plane it's banished from for 1 week.</p>

          <hr /><strong>Heightened (9th)</strong> You can target up to 10
          creatures. The extra material component affects targets to which it is
          anathema.
      rules: []
      slug: banishment
