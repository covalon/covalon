  - type: action
    img: systems/pf2e/icons/default-icons/action.svg
    name: Keep Order
    system:
      description:
        gm: ''
        value: "<p><strong>Trigger</strong> A creature Yazeri can see uses a Concentrate or Linguistic action, or makes a Ranged Attack.\_</p>\n<p>Yazeri has years of experience keeping her subordinates in line. She barks a scathing insult towards the triggering creature and cracks her whip in their direction. Yazeri makes an @UUID[.vCjNDMRNHpHf5W5L]{Infernal Whip} attack against the creature, even if it is outside of its usual range. On a success, the creature takes [[/r (3d10+14)[sonic]]] damage. On a critical success the creature takes [[/r (6d10+28)[sonic]]] damage and the triggering action is disrupted.\_</p>"
